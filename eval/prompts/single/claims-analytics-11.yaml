id: claims-analytics-11
prompt: 'Here is test question #11 of 30:


  ---


  You are a healthcare data analyst at a regional payer processing claims from 847
  unique providers across 12 specialties. Your compliance team has flagged a potential
  duplicate claims issue in your Medicare Advantage book of business. You have a PostgreSQL
  database table called `claims` with the following columns: `claim_id` (VARCHAR),
  `provider_npi` (VARCHAR), `member_id` (VARCHAR), `service_date` (DATE), `cpt_code`
  (VARCHAR), `icd10_primary` (VARCHAR), `billed_amount` (NUMERIC), `paid_amount` (NUMERIC),
  `claim_status` (VARCHAR), `submission_date` (DATE), and `payer_claim_id` (VARCHAR).


  Your team defines a **duplicate claim** as any pair of claims sharing the same `member_id`,
  `provider_npi`, `cpt_code`, and `service_date`, but having different `claim_id`
  values. An **exact duplicate** also matches on `billed_amount`. A **near duplicate**
  matches all fields except `billed_amount` differs by less than 15%.


  Please deliver the following:


  1. A SQL query that identifies both exact and near-duplicate claim pairs, labeling
  each pair as `EXACT` or `NEAR`, and includes the dollar difference between billed
  amounts.

  2. A second SQL query that summarizes duplicate exposure by provider NPI — showing
  count of duplicate pairs, total overpayment risk (sum of the lower `paid_amount`
  in each duplicate pair), and the duplicate rate as a percentage of that provider''s
  total claim volume.

  3. A brief written explanation (4–6 sentences) of how you would prioritize which
  duplicate clusters to investigate first, considering both financial impact and provider
  history.'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: easy
