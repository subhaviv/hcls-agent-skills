id: ml-researcher-20
prompt: 'You are conducting a multi-site federated learning study to predict 90-day
  readmission after cardiac surgery across 7 hospital systems (sites A–G). Site characteristics:
  Site A (n=12,400, academic, 18% readmission rate), Sites B–D (n=3,200–4,800 each,
  community hospitals, 22–28% readmission rates), Sites E–F (n=1,100–1,800, rural
  critical access, 31–35% readmission rates), Site G (n=890, pediatric-only, 8% readmission
  rate). Features include 47 EHR-derived variables (vitals, labs, procedural codes,
  LOS), but Sites E–F are missing creatinine and BNP for ~40% of patients due to limited
  lab infrastructure.


  Your federated approach uses FedAvg with 10 communication rounds. A colleague argues
  you should exclude Sites E–F due to missing data and small size, and exclude Site
  G due to population mismatch. You suspect this would harm model fairness and generalizability.


  Provide: (1) A principled argument for or against excluding each problematic site,
  with specific statistical and ethical reasoning. (2) A missing data strategy compatible
  with federated constraints (no raw data sharing) that handles the differential missingness
  at Sites E–F. (3) A heterogeneity-aware federated training modification to FedAvg
  that addresses the non-IID distribution across sites. (4) A site-stratified evaluation
  plan specifying which metrics to report per site and globally, including calibration
  and fairness audits. (5) Python pseudocode (∼30 lines) implementing federated calibration
  evaluation where each site computes local reliability diagram statistics that are
  then aggregated centrally without sharing patient-level data.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: hard
