id: dicom-processing-24
prompt: 'You are a neuroimaging researcher who has just received a dataset of 847
  DICOM series from a multi-site fMRI study conducted across 3 scanner vendors (Siemens
  Prisma, GE Discovery MR750, Philips Ingenia). The data is organized in a flat directory
  structure where all DICOM files from all subjects and sessions are dumped into a
  single folder (`/raw_dicoms/`) with no subdirectory organization. Each DICOM file
  has the following key tags available: PatientID (e.g., "SUB_0042"), StudyDate (e.g.,
  "20230415"), SeriesDescription (e.g., "fMRI_REST_AP", "T1w_MPRAGE"), and SeriesInstanceUID.


  Your goal is to convert this entire dataset to NIfTI format following BIDS conventions,
  where the output should be organized as `sub-{ID}/ses-{date}/func/` or `anat/` depending
  on modality.


  Please provide:

  1. A Python script using `subprocess` to invoke `dcm2niix` that first groups DICOM
  files by `SeriesInstanceUID` using `pydicom`, organizes them into temporary per-series
  subdirectories, then runs `dcm2niix` with appropriate flags (`-z y`, `-b y`, `-f`
  with a filename template) on each group

  2. The specific `dcm2niix` command-line flags you would use and why, including how
  to handle the known Philips diffusion gradient scaling issue using the `-p` flag

  3. A post-conversion validation function that checks whether each expected NIfTI
  output has a corresponding `.json` sidecar and that the `RepetitionTime` field exists
  in the sidecar for functional scans

  4. How you would handle SeriesDescriptions that don''t cleanly map to BIDS modality
  labels'
target_skills:
- dicom-processing
domain: imaging
difficulty: intermediate
