id: variant-calling-15
prompt: 'Here is test question #15 of 30:


  ---


  You are setting up a somatic variant calling pipeline using GATK Mutect2 for a cohort
  of 45 tumor samples from a colorectal cancer study. You have matched normal tissue
  for only 28 of these samples; the remaining 17 are tumor-only. All samples were
  sequenced on an Illumina NovaSeq 6000 with 100x mean coverage using a WES capture
  kit targeting ~35 Mb. Your reference genome is GRCh38.


  You want to identify somatic SNVs and indels in known colorectal cancer driver genes
  including APC, KRAS, TP53, SMAD4, and PIK3CA, with high sensitivity but controlled
  false positive rates.


  Please provide the following:


  1. A recommended Mutect2 calling strategy that accounts for the mixed tumor-with-normal
  and tumor-only sample sets, including how to handle the panel of normals (PoN) construction
  — specify which samples should or should not contribute to the PoN and why.


  2. A bash script that runs Mutect2 in tumor-only mode for one sample (sample ID:
  CRC_T_017, BAM file: CRC_T_017.bam) using an appropriate gnomAD germline resource,
  generates a contamination estimate with GetPileupSummaries and CalculateContamination,
  and then runs FilterMutectCalls with the contamination table.


  3. An explanation of at least three FilterMutectCalls filter flags (e.g., `strand_bias`,
  `weak_evidence`, `germline`) that are particularly problematic for WES tumor-only
  calling and how you would decide whether to relax or retain each filter threshold.


  4. A brief justification for whether VQSR or hard filtering is more appropriate
  for the somatic variants produced by this pipeline.'
target_skills:
- variant-calling
domain: genomics
difficulty: intermediate
