id: genomic-variant-interpretation-30
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory identifies a variant in **BRCA2**:
  c.8754+3A>G (intron 21). You have the following data:


  - **gnomAD v3.1.2**: allele frequency = 0.000032 (8/251,340 alleles); no homozygotes

  - **SpliceAI scores**: DS_DL = 0.61, DS_AL = 0.04, DS_DG = 0.02, DS_AG = 0.08

  - **CADD Phred**: 24.3

  - **ClinVar**: 2 submissions — one "Uncertain Significance" (single submitter, no
  evidence provided, 2019), one "Likely Pathogenic" (research lab, functional RNA
  study showing ~40% reduction in canonical splice site usage, 2022)

  - **RNA splicing assay (in-house)**: confirms partial exon 21 skipping in ~35% of
  transcripts; remaining 65% show normal splicing

  - **BRCA2 NMD prediction**: skipping of exon 21 (120 bp, in-frame) produces a protein
  lacking amino acids 2882–2921 within the DNA-binding domain

  - **Family segregation**: variant present in 2 affected relatives (breast cancer),
  absent in 1 unaffected relative (limited pedigree)


  **Deliverables:**

  1. Systematically apply relevant ACMG/AMP 2015 criteria (name each criterion, specify
  strength, and justify inclusion or exclusion), paying special attention to how partial
  splicing and in-frame exon skipping affect PVS1 applicability.

  2. Assign a final classification with confidence reasoning.

  3. Explain how the conflicting ClinVar submissions should be weighted under current
  evidence-review guidelines.

  4. Describe what additional evidence (functional, segregation, or computational)
  would be sufficient to upgrade or downgrade this classification by one tier.'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: hard
