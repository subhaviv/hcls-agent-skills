id: cdisc-compliance-18
prompt: 'A clinical trial sponsor is preparing an FDA submission for Study XYZ-2847,
  a Phase III oncology trial with 412 patients. The SDTM submission includes a Tumor
  Results (TR) domain and a Response by Investigator (RS) domain. During Pinnacle
  21 validation, the following issues were flagged:


  1. **P21 Error**: TR.TRORRES contains free-text tumor measurement values like "~15mm
  (approx)" and "not measurable" alongside numeric values — TRSTRESN is populated
  for numeric records but TRSTRESC is missing for non-numeric records.

  2. **P21 Warning**: RS.RSEVAL has the value "INDEPENDENT REVIEW COMMITTEE" which
  is not in the current CDISC CT for EVAL (C78735) — the sponsor used CDISC CT 2019-03-29
  but the submission requires 2023-09-29.

  3. **P21 Error**: 47 TR records have VISITNUM populated but no corresponding VISIT
  value, while the Trial Visits (TV) domain only contains planned visits — these 47
  records represent unscheduled tumor assessments.


  The sponsor also collected a secondary reviewer''s independent tumor assessment
  stored currently in a SUPPRS dataset using QNAM="RSEVAL2", but a reviewer questions
  whether this should instead be handled via a new RS record with a different RSEVAL
  value or through RELREC.


  **Deliverables requested:**

  1. Explain the correct SDTM fix for each of the three Pinnacle 21 issues, citing
  relevant SDTMIG v3.3 rules

  2. Provide the recommended approach for the secondary reviewer data (SUPPRS vs.
  new RS records vs. RELREC), with justification

  3. Write example SAS code to recode TRSTRESC for the non-numeric tumor measurement
  records

  4. Identify which of the four issues carries the highest regulatory risk for FDA
  review and explain why'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: hard
