id: claims-analytics-15
prompt: 'A regional Medicare Advantage plan has provided you with a sample of X12
  837P professional claims from 847 unique providers over a 6-month period (January–June
  2024). The compliance team suspects systematic E&M upcoding among a subset of internal
  medicine and family practice providers. The dataset, when parsed, contains the following
  fields per claim line: rendering NPI, service date, CPT code, place of service code,
  diagnosis codes (ICD-10), billed charge amount, allowed amount, and units.


  Your task is to build a provider profiling pipeline to detect E&M upcoding anomalies.
  Specifically:


  1. **Write Python code** using pandas to compute, per provider, the distribution
  of office visit E&M codes (99202–99215), calculating the percentage of level-4 (99214)
  and level-5 (99215) codes as a share of all E&M visits. Flag providers where combined
  99214+99215 usage exceeds 2 standard deviations above the specialty peer mean.


  2. **Write a SQL query** (assume a `claims` table with the fields listed above)
  that identifies providers billing more than 10 distinct patients on a single calendar
  day — a potential indicator of impossible day scenarios — filtering to place of
  service code 11 (office) only.


  3. **Design a scoring rubric** that combines E&M upcoding percentile rank, impossible-day
  frequency, and average billed charge deviation from specialty peers into a single
  composite fraud risk score (0–100). Specify the weights you would assign each component
  and justify your choices.


  4. **Describe two additional billing pattern signals** beyond the three above that
  would strengthen or weaken a fraud referral decision for a provider flagged by your
  composite score.'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: intermediate
