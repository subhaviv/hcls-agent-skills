id: cell-type-annotation-16
prompt: "You have processed a 10x Genomics scRNA-seq dataset from 8 pediatric ALL\
  \ (acute lymphoblastic leukemia) bone marrow samples, containing approximately 45,000\
  \ cells after QC. Leiden clustering at resolution 0.6 produced 22 clusters. Initial\
  \ UMAP visualization suggests a mix of malignant B-cell precursors, normal hematopoietic\
  \ cells, and stromal populations.\n\nYou want to use **CellTypist** with majority\
  \ voting to annotate these clusters, leveraging the `Immune_All_High.pkl` model,\
  \ followed by a secondary round using `Immune_All_Low.pkl` for fine-grained immune\
  \ subtypes. After automated annotation, you need to validate results using canonical\
  \ marker genes.\n\n**Please provide:**\n\n1. Complete Python code using `celltypist`\
  \ and `scanpy` to:\n   - Run CellTypist with `majority_voting=True` at both high\
  \ and low resolution models\n   - Store both annotation layers in the AnnData object\
  \ as `celltypist_high` and `celltypist_low` in `adata.obs`\n   - Generate a UMAP\
  \ plot colored by each annotation layer side-by-side\n\n2. Code to create a dotplot\
  \ showing expression of these canonical markers across the `celltypist_high` clusters:\
  \ `CD19`, `CD79A`, `PAX5`, `CD34`, `MPO`, `LYZ`, `CD3D`, `CD3E`, `NKG7`, `GNLY`,\
  \ `CD14`, `FCGR3A`, `MKI67`, `TOP2A`\n\n3. A conflict resolution strategy: when\
  \ `celltypist_high` labels a cluster as \"B cells\" but marker gene evidence shows\
  \ high `MPO`/`LYZ` expression (suggesting myeloid contamination), write code to\
  \ flag these discordant clusters and apply a manual override stored in `adata.obs['final_annotation']`\n\
  \n4. Brief explanation of why majority voting is preferred over per-cell annotation\
  \ for this leukemia dataset"
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: intermediate
