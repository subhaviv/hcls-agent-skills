id: claims-billing-rules-22
prompt: 'A regional health plan is conducting a routine claims audit and has flagged
  a family medicine physician (Provider ID: FM-4471) for potential E&M upcoding. Over
  a 6-month period, the provider submitted 847 office visit claims with the following
  distribution:


  - 99211 (Level 1): 2 claims (0.2%)

  - 99212 (Level 2): 18 claims (2.1%)

  - 99213 (Level 3): 89 claims (10.5%)

  - 99214 (Level 4): 521 claims (61.5%)

  - 99215 (Level 5): 217 claims (25.6%)


  The national benchmark for family medicine shows approximately 50% of visits coded
  at 99213, 35% at 99214, and less than 5% at 99215. Additionally, 143 of the 99215
  claims were submitted on the same date as a minor procedure, and 97 of those included
  Modifier 25.


  Please provide:

  1. A statistical comparison of this provider''s E&M coding distribution against
  national benchmarks, identifying the degree of deviation at each code level

  2. An explanation of when Modifier 25 is appropriately used with same-day E&M and
  procedure codes, and an assessment of whether the 97 Modifier 25 claims warrant
  further scrutiny

  3. A determination of whether this pattern is more consistent with a coding error,
  billing fraud, or documentation deficiency — with reasoning

  4. Three specific audit steps the health plan should take next, including what documentation
  to request and what red flags to look for in the medical records'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: easy
