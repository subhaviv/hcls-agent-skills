id: structure-based-drug-design-17
prompt: 'You are optimizing a series of inhibitors targeting the bromodomain of BRD4
  (BD1), a well-validated epigenetic target in oncology. You have completed an initial
  virtual screening campaign and identified a promising fragment hit (compound **F-17**)
  with MW = 187 Da, cLogP = 1.4, and a weak binding affinity of Kd = 340 µM by SPR.
  Crystallography reveals F-17 binds in the KAc pocket, forming a hydrogen bond with
  N140 (the conserved asparagine) and a water-mediated contact with Y97.


  You now plan to grow this fragment into a lead compound using structure-based design.
  The crystal structure shows an unexplored hydrophobic sub-pocket (the WPF shelf)
  approximately 5 Å from the fragment, lined by W374, P375, and F376. The binding
  site has a SASA-accessible volume of ~900 ų and a Fpocket druggability score of
  0.82.


  **Provide the following:**


  1. A fragment-growing strategy that prioritizes vectors toward the WPF shelf, including
  specific chemical modifications to F-17 you would explore first and the rationale
  based on the structural data provided.


  2. A docking protocol recommendation (rigid vs. induced-fit, choice of scoring function,
  and grid box parameters) appropriate for this fragment-growing campaign, justifying
  each choice.


  3. A prioritization scheme for ranking the grown compounds before synthesis, specifying
  which computational methods (e.g., MM-GBSA, FEP, pharmacophore filtering) to apply
  at each stage and approximate compound counts to carry forward at each filter.


  4. Two potential liabilities in this design campaign and how you would address them
  computationally or experimentally.'
