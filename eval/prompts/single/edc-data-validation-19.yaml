id: edc-data-validation-19
prompt: 'Here is test question #19 of 30:


  ---


  You are validating SDTM datasets for a Phase III oncology trial (STUDY-ONC-447)
  with 312 enrolled subjects across 18 sites. During Pinnacle 21 Community validation,
  you receive the following critical findings that require programmatic resolution:


  1. **LB domain**: 47 records flagged for `LBSTRESU` values using non-standard units
  (`"K/uL"` instead of `"10^3/uL"` for leukocytes; `"g/dl"` instead of `"g/dL"` for
  hemoglobin)

  2. **AE domain**: 23 records where `AESTDTC` is a partial date (`"2023-05"`) but
  `AEENDTC` is a complete date, violating ISO 8601 partial date hierarchy rules

  3. **VS domain**: Systolic BP values for 8 subjects exceed physiologically implausible
  ranges (values between 220–310 mmHg) but have no associated queries in the EDC;
  diastolic BP for same subjects is within normal range (60–85 mmHg), suggesting possible
  unit entry error (kPa vs mmHg)

  4. **CM domain**: `CMDECOD` populated with verbatim terms rather than WHO Drug dictionary-coded
  terms for 156 records


  Please provide: (a) Python code using pandas to detect and flag all four issue categories
  from raw SDTM `.xpt` files loaded via `pyreadstat`, (b) automated correction logic
  with audit trail generation (original value, corrected value, rule applied, timestamp),
  (c) a prioritization schema ranking these findings by regulatory submission risk,
  and (d) the specific CDISC SDTMIG v3.3 rule references violated for each finding.'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: hard
