id: variant-calling-13
prompt: 'Here is test question #13 of 30:


  ---


  You are setting up a germline variant calling pipeline for a small research cohort
  of 18 whole-exome sequencing (WES) samples from patients with a rare connective
  tissue disorder. The samples were sequenced on an Illumina NovaSeq 6000 at ~100x
  mean coverage, aligned with BWA-MEM2 to GRCh38, and duplicates have already been
  marked with Picard. Your target genes of interest include FBN1, COL5A1, COL5A2,
  TNXB, and ADAMTS2.


  Your PI wants to proceed with joint genotyping using GATK HaplotypeCaller in GVCF
  mode followed by GenomicsDBImport and GenotypeGVCFs. After joint genotyping, you
  need to decide on a variant filtering strategy.


  Given the small cohort size of 18 samples, please provide:


  1. A recommendation on whether to use VQSR or hard filters for this cohort, with
  a clear justification based on GATK best practices and the specific cohort characteristics
  (cohort size, WES data type).


  2. A complete GATK hard filter command (using `gatk VariantFiltration`) for SNVs
  with appropriate filter expressions and recommended thresholds for QD, FS, MQ, MQRankSum,
  ReadPosRankSum, and SOR. Include the specific numeric cutoffs GATK recommends for
  WES data.


  3. A separate hard filter command for indels with the appropriate filter expressions
  for WES.


  4. A brief explanation (2-3 sentences) of why the QD and FS filters are particularly
  important for a high-coverage WES dataset like this one.'
target_skills:
- variant-calling
domain: genomics
difficulty: easy
