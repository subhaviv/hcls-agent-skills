id: clinical-data-standards-14
prompt: 'A pharmaceutical company is preparing an integrated safety summary for a
  Phase III oncology trial (N=847 patients) comparing a novel PARP inhibitor against
  standard chemotherapy. The safety team has collected adverse event data and needs
  to finalize the MedDRA coding strategy before database lock.


  The following raw AE terms have been reported and require coding decisions:


  1. "Bone marrow suppression" (n=124) — some sites coded this as LLT "Bone marrow
  suppression" under PT "Bone marrow failure," while others used PT "Myelosuppression"

  2. "Low platelets" (n=89) — variably coded as PT "Thrombocytopenia" or PT "Platelet
  count decreased"

  3. "Chemo brain" (n=34) — informal term requiring mapping

  4. "Fatigue and weakness" (n=67) — compound symptom entered as single term


  For each of the four cases above, provide: (a) the recommended MedDRA PT with justification,
  (b) the correct SOC assignment, (c) whether any HLT grouping consideration affects
  the frequency table presentation, and (d) a brief note on whether the two competing
  codes for cases 1 and 2 would fall under the same or different HLT/HLGT, and what
  the implication is for aggregate AE reporting. Additionally, explain the general
  principle for handling compound symptom terms like case 4 under MedDRA coding conventions.'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: intermediate
