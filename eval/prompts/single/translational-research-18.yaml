id: translational-research-18
prompt: 'Here is test question #18 of 30:


  ---


  Your team has developed a novel antisense oligonucleotide (ASO) targeting *KCNQ3*
  haploinsufficiency in a rare pediatric epileptic encephalopathy. Preclinical data
  show robust seizure reduction in a *Kcnq3*+/− mouse model (n=24, 78% reduction in
  spike-wave discharges, p<0.001), and intrathecal delivery achieves 85% target knockdown
  in CSF-adjacent neurons at 4 weeks. However, three complicating factors have emerged
  before your IND-enabling package:


  1. A recent natural history study (n=47 patients, ages 2–14) shows extreme phenotypic
  heterogeneity — 31% of patients carry the same p.Arg230Cys variant but have wildtype-range
  EEG burden, suggesting incomplete penetrance or modifier effects.

  2. Your lead biomarker, CSF KCNQ3 protein levels, shows only moderate test-retest
  reliability (ICC=0.61) across 3-month intervals in 18 healthy pediatric controls.

  3. A competing *KCNQ3* gain-of-function ASO program in adults with acquired epilepsy
  just reported unexpected dorsal root ganglion (DRG) toxicity at the same dose range
  you are targeting.


  Given these three complications, provide: (a) a structured go/no-go framework addressing
  whether this program is ready to advance to FIH, with explicit criteria thresholds
  for each complication; (b) a patient stratification strategy for the FIH trial that
  accounts for the penetrance heterogeneity, including which genomic or electrophysiological
  covariates you would pre-specify; (c) a biomarker qualification plan to improve
  or replace the CSF KCNQ3 readout before Phase 2, specifying context-of-use and acceptable
  ICC threshold; and (d) a DRG toxicity mitigation strategy with proposed non-clinical
  studies needed before proceeding.'
