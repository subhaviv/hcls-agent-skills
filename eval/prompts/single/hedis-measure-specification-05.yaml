id: hedis-measure-specification-05
prompt: 'A regional health plan is preparing for HEDIS MY2024 data submission and
  needs help analyzing their Controlling High Blood Pressure (CBP) measure performance.
  Their quality team has pulled the following member data snapshot:


  - Total members aged 18–85 with hypertension diagnosis: 12,400

  - Members excluded due to ESRD: 340

  - Members excluded due to pregnancy: 89

  - Members with a qualifying blood pressure reading of <140/90 recorded in the measurement
  year: 4,210

  - Members with blood pressure readings only in telehealth visits: 1,150

  - Members who disenrolled before completing 11 months of continuous enrollment:
  780

  - Members with hospice enrollment during the measurement year: 62


  The quality director wants to understand exactly how the CBP denominator and numerator
  should be constructed under NCQA specifications, and whether the telehealth-only
  BP readings count toward numerator compliance.


  Please provide the following:

  1. A step-by-step denominator calculation showing which exclusions apply and in
  what order, with a final eligible denominator count based on the figures above.

  2. A numerator eligibility analysis clarifying whether telehealth-captured blood
  pressure readings satisfy NCQA''s CBP numerator criteria for MY2024.

  3. The current CBP performance rate based on your calculated denominator and the
  compliant numerator subset.

  4. Two specific care gap closure strategies targeting the telehealth BP population,
  with rationale tied to HEDIS specification constraints.

  5. An explanation of how CBP measure performance affects CMS Star Ratings, including
  its triple-weighted status and the point threshold typically needed to move from
  3 to 4 Stars in this measure.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: intermediate
