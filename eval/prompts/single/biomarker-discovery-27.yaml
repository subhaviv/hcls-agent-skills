id: biomarker-discovery-27
prompt: 'You are conducting a multi-omics biomarker discovery study for predicting
  5-year recurrence in 312 early-stage non-small cell lung cancer (NSCLC) patients
  following surgical resection. You have three data modalities: (1) RNA-seq expression
  for 18,432 genes, (2) DNA methylation beta values for 27,580 CpG sites, and (3)
  47 clinical variables including TNM stage, age, smoking pack-years, and EGFR/KRAS
  mutation status. Of the 312 patients, 89 experienced recurrence within 5 years (events).
  You plan to build an integrated prognostic signature.


  **Please provide the following:**


  1. **Integration strategy**: Compare early, intermediate, and late fusion approaches
  for combining these three modalities. Given the sample size and event count, which
  approach do you recommend and why?


  2. **Feature pre-selection**: Before any model fitting, describe a statistically
  principled, leakage-free pipeline to reduce the RNA-seq and methylation features
  to a computationally tractable set. Specify any thresholds or filters you would
  apply.


  3. **Events-per-variable (EPV) analysis**: Calculate the maximum number of features
  that can be safely included in a final Cox proportional hazards model given these
  events, and explain how this constrains your integration strategy.


  4. **Cross-validation design**: Propose a nested cross-validation scheme that accounts
  for all three modalities simultaneously and avoids any form of data leakage across
  the feature selection, integration, and model-fitting steps.


  5. **Evaluation metrics**: Specify which metrics (with justification) you would
  use to evaluate discriminative performance, calibration, and clinical utility of
  the final integrated signature.


  6. **Python pseudocode** sketching the outer loop of your nested CV pipeline, showing
  where each modality''s feature selection occurs relative to train/test splits.'
