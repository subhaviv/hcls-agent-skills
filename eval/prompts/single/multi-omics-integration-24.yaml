id: multi-omics-integration-24
prompt: 'You are conducting a multi-omics study of treatment response in 187 pediatric
  acute lymphoblastic leukemia (ALL) patients treated with standard induction chemotherapy.
  You have collected the following data at diagnosis: bulk RNA-seq (18,432 genes),
  ATAC-seq chromatin accessibility (142,000 peaks), and plasma proteomics via mass
  spectrometry (2,847 proteins). However, due to sample quality issues, only 134 patients
  have all three omics layers, 38 have RNA-seq + proteomics only, and 15 have RNA-seq
  + ATAC-seq only. Clinical outcome is binary: complete remission (CR, n=151) vs.
  refractory disease (n=36). You want to identify coordinated multi-omic signatures
  distinguishing CR from refractory patients while maximizing use of the partially
  overlapping sample set.


  Please provide:


  1. A recommendation for whether to use MOFA+, SNF, or an alternative integration
  framework given the partial sample overlap, and justify your choice with specific
  reference to how each method handles missing omics layers.


  2. A concrete preprocessing strategy for harmonizing the three data modalities before
  integration, including normalization approaches appropriate for each omics type
  and any batch correction considerations.


  3. Python pseudocode (using any relevant libraries) implementing your chosen integration
  approach, including how to encode the partial overlap structure in the input data
  object.


  4. A downstream analysis plan for interpreting the resulting multi-omic factors
  or clusters in the context of CR vs. refractory outcome, specifying which enrichment
  or statistical tests you would apply to the top-loading features from each omics
  layer.'
target_skills:
- multi-omics-integration
domain: multi-omics
difficulty: intermediate
