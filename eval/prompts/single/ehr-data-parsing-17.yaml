id: ehr-data-parsing-17
prompt: 'You are working with a hospital''s laboratory information system that exports
  ORU^R01 HL7v2 messages for completed lab panels. Below is a representative message
  from a batch of 500 such messages:


  ```

  MSH|^~\&|LAB_SYS|CITY_HOSP|EHR|MAIN|20240315142233||ORU^R01|MSG004821|P|2.5

  PID|1||PT-88421^^^CITY_HOSP^MR||MORRISON^DIANA^LEE||19781204|F|||742 CEDAR LANE^^SPRINGFIELD^IL^62704||555-847-2291

  OBR|1|ORD-55921|LAB-78432|80053^COMPREHENSIVE METABOLIC PANEL^CPT|||20240315130045

  OBX|1|NM|2823-3^POTASSIUM^LN||3.2|mmol/L|3.5-5.1|L|||F

  OBX|2|NM|2160-0^CREATININE^LN||1.8|mg/dL|0.6-1.2|H|||F

  OBX|3|NM|17861-6^CALCIUM^LN||9.1|mg/dL|8.5-10.2|N|||F

  OBX|4|NM|2345-7^GLUCOSE^LN||287|mg/dL|70-99|H|||F

  ```


  Your task is to build a Python pipeline to process this batch. Provide the following
  deliverables:


  1. A Python function `parse_oru_message(hl7_text)` that extracts patient demographics
  from PID and all OBX results into a structured dictionary, including LOINC code,
  test name, value, units, reference range, and abnormal flag.


  2. A function `batch_to_dataframe(file_path)` that reads a file containing multiple
  HL7 messages (separated by `\n\n`) and returns a flattened pandas DataFrame with
  one row per OBX observation.


  3. A data quality check function `run_quality_checks(df)` that flags records where:
  the abnormal flag is missing, numeric values fall outside a configurable multiplier
  (default 3×) of the reference range bounds, or the LOINC code does not match a provided
  whitelist of 5 expected codes for this panel.'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: intermediate
