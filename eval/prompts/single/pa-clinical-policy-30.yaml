id: pa-clinical-policy-30
prompt: 'A 58-year-old Medicare Advantage patient with treatment-resistant major depressive
  disorder (TRD) has failed adequate trials of sertraline (200mg/day × 8 weeks), escitalopram
  (20mg/day × 10 weeks), and venlafaxine XR (225mg/day × 12 weeks), all documented
  with PHQ-9 scores remaining above 15. The treating psychiatrist is requesting prior
  authorization for esketamine nasal spray (Spravato) 56mg twice weekly for 4 weeks,
  then weekly maintenance. The MA plan''s formulary places Spravato on Tier 5 (specialty)
  requiring step therapy through two oral antidepressants plus one augmentation agent
  (e.g., aripiprazole or lithium), and the plan''s clinical policy cites their internal
  LCD equivalent requiring documentation of "inadequate response to at least three
  antidepressants of different classes AND one augmentation strategy."


  The patient has a documented contraindication to lithium (eGFR 28 mL/min/1.73m²,
  CKD Stage 4) and experienced QTc prolongation (QTc = 498ms) on aripiprazole, leading
  to its discontinuation after 3 weeks — which the plan is claiming does not satisfy
  the augmentation requirement because it was "not an adequate trial."


  Please provide: (1) A clinical policy analysis evaluating whether the documented
  contraindications legally and clinically satisfy the augmentation step therapy requirement
  under CMS Medicare Advantage step therapy rules (42 CFR §422.136) and relevant NCQA
  standards; (2) A structured appeal letter template with specific regulatory citations,
  clinical evidence references (including FDA approval basis for Spravato in TRD),
  and safety documentation requirements; (3) A peer-to-peer review preparation checklist
  with the five most critical clinical arguments; and (4) A FHIR Da Vinci PAS-compliant
  JSON snippet documenting the contraindication exceptions for the augmentation agents
  in the prior authorization request.'
