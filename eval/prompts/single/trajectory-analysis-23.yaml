id: trajectory-analysis-23
prompt: 'I have single-cell RNA-seq data from a mouse hematopoiesis experiment containing
  8,500 cells spanning hematopoietic stem cells (HSCs) through committed progenitors.
  The dataset includes the following cell type annotations: HSC (n=450), multipotent
  progenitors MPP (n=820), common myeloid progenitors CMP (n=1,100), granulocyte-monocyte
  progenitors GMP (n=1,650), megakaryocyte-erythrocyte progenitors MEP (n=1,480),
  and mature granulocytes (n=2,000) and monocytes (n=1,000). The data has been preprocessed
  and normalized, and I want to compute diffusion pseudotime (DPT) to order these
  cells along their differentiation trajectories.


  Please provide the following:


  1. **Step-by-step Python code** using Scanpy to compute a diffusion map and then
  run DPT, setting the root cell as the HSC cluster centroid (using the cell with
  the highest expression of *Slamf1* and *Cd34* as the root).


  2. **Visualization code** to plot the pseudotime values overlaid on a UMAP embedding,
  and a second plot showing pseudotime distribution as a violin plot split by cell
  type annotation.


  3. **Parameter recommendations** for `n_comps` in the diffusion map and `n_dcs`
  for DPT, explaining why those values are appropriate for a dataset with approximately
  6 distinct lineage branches.


  4. **Interpretation guidance** on how to validate that the computed pseudotime correctly
  recapitulates the known HSC → CMP → GMP and HSC → MEP branching topology.'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: easy
