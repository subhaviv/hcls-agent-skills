id: pa-decision-automation-18
prompt: 'Here is test question #18 of 30:


  ---


  Your health plan processes approximately 4,200 prior authorization requests per
  month for specialty biologics (adalimumab, ustekinumab, secukinumab) targeting inflammatory
  conditions. Your PA decision engine currently uses a rules-based system with an
  847-ms average adjudication latency and a 34% auto-denial rate. Internal audit reveals
  that 61% of denied cases are subsequently overturned on appeal, suggesting systematic
  errors in your adjudication logic. Historical PA data (18 months, ~75,600 decisions)
  includes X12 278 transaction fields, ICD-10 diagnosis codes, NDC drug codes, step
  therapy documentation flags, lab values (CRP, ESR, DAS28 scores), and prior treatment
  history.


  You suspect the rules engine is mishandling "step therapy exception" cases — specifically
  where patients have documented contraindications to first-line DMARDs (methotrexate
  hepatotoxicity risk flagged via AST/ALT elevation thresholds) but the contraindication
  evidence is buried in free-text loop notes within the 278 transaction (2300 loop,
  NTE segments).


  **Deliver the following:**


  1. A Python function to parse NTE segment free-text from X12 278 2300 loops and
  extract structured contraindication signals (specifically hepatotoxicity markers)
  using regex and a lightweight NLP approach.

  2. A feature engineering schema (minimum 12 features) suitable for training an XGBoost
  PA classifier, including how to encode step therapy exception status.

  3. A SHAP-based analysis design that identifies which features most frequently drive
  incorrect auto-denials in the step therapy exception subgroup.

  4. A revised rules-engine pseudocode that incorporates the extracted NTE contraindication
  signals as a pre-check override before standard adjudication logic runs.


  Assume the 278 data is already parsed into Python dictionaries per transaction.'
