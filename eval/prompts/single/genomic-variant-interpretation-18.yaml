id: genomic-variant-interpretation-18
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory reports a variant in *BRCA2*: NM_000059.4:c.8754+3A>G.
  The following evidence is available:


  - **SpliceAI scores**: Donor loss = 0.61, Acceptor gain = 0.04, Donor gain = 0.02,
  Acceptor loss = 0.01

  - **gnomAD v3.1 (non-cancer)**: 2 heterozygous alleles observed out of 152,310 total
  alleles (no homozygotes)

  - **ClinVar**: 1 submission classified as VUS (single submitter, no functional data,
  2019)

  - **RNA splicing study** (from a published functional assay in 47 BRCA2 carriers):
  this exact variant causes 73% aberrant transcripts with exon 19 skipping, 27% normal
  transcripts

  - **LOVD**: 3 families co-segregating with disease (LOD score ~1.8 across families)

  - **Exon 19 context**: In-frame skipping of exon 19 removes 61 amino acids from
  the DNA-binding domain; prior literature classifies exon 19 as "partially essential"
  with ~40% residual protein function reported in one mouse model study


  Please provide: (1) A systematic ACMG/AMP 2015 criterion-by-criterion evaluation,
  explicitly addressing PVS1 applicability given the partial exon essentiality and
  incomplete splicing penetrance; (2) A final variant classification with confidence
  justification; (3) An explanation of which single piece of additional evidence would
  most efficiently resolve remaining uncertainty; and (4) The appropriate clinical
  reporting language for this variant given the patient''s personal and family history
  context.'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: hard
