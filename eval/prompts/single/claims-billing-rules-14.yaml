id: claims-billing-rules-14
prompt: 'A regional health plan is conducting a quarterly claims audit and has flagged
  a high-volume orthopedic surgeon, Dr. Marcus Hale, for potential FWA. The data shows
  the following patterns over a 90-day period:


  - 847 claims submitted with CPT 27447 (total knee arthroplasty), which carries a
  90-day global surgery period

  - 312 claims for E&M visits (CPT 99213 or 99214) billed within the global period
  without Modifier 24 or 25 appended

  - 89 instances where CPT 97110 (therapeutic exercises) was billed on the same day
  as CPT 97530 (therapeutic activities) without Modifier 59

  - 23 claims where CPT 99214 was billed with Modifier 25 on the same date as a minor
  procedure (CPT 20610 – joint aspiration), but the documentation shows no separately
  identifiable medical decision-making documented in the note

  - Average E&M level for post-op visits is 99214 (Level 4), compared to a regional
  peer benchmark of 99212 (Level 2)


  Please provide the following:

  1. An analysis of which billing patterns represent likely coding errors versus intentional
  fraud, with reasoning for each category

  2. The specific NCCI edit violations present in this data and which modifier indicators
  apply

  3. A prioritized investigation plan identifying which pattern should be escalated
  to a Special Investigations Unit (SIU) first and why

  4. Recommended corrective actions for each identified issue, distinguishing between
  provider education responses and formal overpayment recovery actions'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: intermediate
