id: claims-analytics-17
prompt: 'Here is test question #17 of 30:


  ---


  A regional health plan has provided you with 18 months of professional claims data
  (approximately 2.3 million claims) from 847 providers across 12 specialties. The
  compliance team suspects a subset of internal medicine physicians may be systematically
  upcoding Evaluation & Management (E&M) services. Specifically, they want to investigate
  whether providers NPI-1234567890, NPI-9876543210, and NPI-4561237890 show anomalous
  distributions of office visit codes (99211–99215) compared to their specialty peers.


  Your task is to build a complete analytical pipeline with the following deliverables:


  1. **Python code** using pandas that calculates each provider''s E&M code distribution
  as a percentage of total E&M claims, then computes a peer group benchmark distribution
  using all internal medicine providers with at least 500 E&M claims in the period.


  2. **A chi-square statistical test** comparing each flagged provider''s distribution
  against the peer benchmark, with appropriate p-value thresholds and Bonferroni correction
  for multiple comparisons across the three providers.


  3. **An "upcoding score"** formula that weights the deviation toward 99214 and 99215
  codes more heavily (combined weight of 0.70) versus lower-complexity codes 99211–99213
  (combined weight of 0.30), and ranks the three providers.


  4. **SQL query** against a claims table schema (`claims(claim_id, npi, dos, cpt_code,
  billed_amount, allowed_amount, place_of_service)`) that flags providers whose 99215
  utilization rate exceeds 2.5 standard deviations above the specialty mean.


  5. **Brief narrative** (5–7 sentences) interpreting hypothetical results where provider
  NPI-1234567890 shows 99215 at 41%, NPI-9876543210 at 28%, and the peer average is
  18%.'
