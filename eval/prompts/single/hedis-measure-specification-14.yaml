id: hedis-measure-specification-14
prompt: 'A regional health plan is preparing for HEDIS MY2024 data submission and
  needs help analyzing their Controlling High Blood Pressure (CBP) measure performance.
  Their current data shows:


  - Total attributed members aged 18-85 with hypertension diagnosis: 12,847

  - Members excluded due to ESRD: 234

  - Members excluded due to pregnancy: 89

  - Members with a qualifying blood pressure reading < 140/90: 6,102

  - Members with no BP reading on file: 2,341

  - Members with BP readings ≥ 140/90: 4,081

  - Continuous enrollment exceptions pending review: 312 members who had a 45-day
  gap in coverage during the measurement year


  Please provide the following deliverables:


  1. **Denominator calculation**: Walk through the step-by-step denominator logic
  for CBP, applying all standard exclusions and explaining whether the 312 members
  with a 45-day coverage gap should be included or excluded, citing the specific NCQA
  continuous enrollment rule for this measure.


  2. **Numerator rate**: Calculate the current CBP compliance rate using the correct
  denominator, and identify what rate would be needed to move from the plan''s current
  3-Star threshold (58%) to a 4-Star threshold (68%) in terms of additional members
  needing compliant BP readings.


  3. **Prioritization framework**: Among the 2,341 members with no BP reading on file,
  propose a data-driven stratification approach (at least 3 tiers) to prioritize outreach,
  incorporating SDOH risk factors and visit likelihood signals.


  4. **SQL snippet**: Write a SQL query to identify members in the "no BP reading"
  cohort who had at least one primary care visit in the last 6 months but still lack
  a compliant BP result, as the highest-priority outreach targets.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: intermediate
