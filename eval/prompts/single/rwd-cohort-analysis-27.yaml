id: rwd-cohort-analysis-27
prompt: 'You are conducting a real-world evidence study using a commercial claims
  database (Optum Clinformatics, 2018–2023) to compare cardiovascular outcomes between
  two SGLT2 inhibitor medications: **Empagliflozin** (NDC prefix: 00597-0140) and
  **Dapagliflozin** (NDC prefix: 00310-0756) in patients with Type 2 Diabetes and
  established heart failure (HFrEF).


  **Cohort specifications:**

  - Index date: first pharmacy fill of either drug after January 1, 2019

  - Require: ICD-10 codes E11.x (T2DM) + I50.2x (HFrEF) within 12-month lookback

  - Exclude: prior SGLT2i use, eGFR < 30 (proxied by CKD stage 4–5: N18.4, N18.5),
  ESRD (N18.6)

  - 12-month continuous enrollment pre-index required

  - Final cohort: 8,420 Empagliflozin patients, 5,193 Dapagliflozin patients


  **Primary outcome:** Time to first MACE event (MI: I21.x, Stroke: I63.x, CV death:
  proxied by I46.x + death flag) within 24 months post-index.


  Please provide:

  1. A complete Python pipeline for cohort identification and 1:1 propensity score
  matching (age, sex, Charlson Comorbidity Index, baseline diuretic use CPT/NDC, LVEF
  proxy, prior hospitalization count), including SMD calculation before/after matching
  with a threshold of <0.10

  2. Kaplan-Meier survival curves for both cohorts with log-rank test and 95% confidence
  bands

  3. A Cox proportional hazards model with the top 3 confounders, plus Schoenfeld
  residuals test to validate the proportional hazards assumption

  4. Interpretation of a scenario where Schoenfeld residuals indicate a violation
  (p < 0.05) for the diuretic use covariate — what analytical adjustments would you
  recommend?'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: intermediate
