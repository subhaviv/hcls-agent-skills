id: aws-genai-ml-architect-21
prompt: 'A regional telehealth company, MediConnect, processes approximately 8,000
  clinical notes per day from 45 primary care physicians across 3 states. These notes
  contain PHI and are currently stored as unstructured text in an S3 bucket. The compliance
  team has confirmed a BAA is in place with AWS. MediConnect wants to build a simple
  clinical NLP pipeline to automatically extract ICD-10 diagnosis codes from these
  notes to reduce manual coding time.


  The engineering team is relatively new to AWS ML services and wants to start with
  a straightforward, managed solution rather than training custom models. They have
  a budget of approximately $2,000/month for this workload and need the solution running
  within 6 weeks.


  Please provide the following:


  1. **Service recommendation**: Should MediConnect use Amazon Comprehend Medical
  or deploy a custom model on SageMaker for ICD-10 extraction? Justify your choice
  given their constraints (timeline, budget, team experience).


  2. **Basic architecture diagram** (described in text): Outline the end-to-end pipeline
  from S3 ingestion through ICD-10 code output, including any necessary AWS services
  (e.g., Lambda, Step Functions, DynamoDB).


  3. **Cost estimate**: Provide a rough monthly cost breakdown for processing 8,000
  notes/day, assuming average note length of 500 words, using your recommended service.


  4. **HIPAA compliance checklist**: List 5 specific AWS configuration steps required
  to keep PHI secure throughout this pipeline (e.g., encryption settings, IAM policies,
  VPC considerations).'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: easy
