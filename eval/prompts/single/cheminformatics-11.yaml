id: cheminformatics-11
prompt: 'Here is test question #11 of 30:


  ---


  You are working with a small virtual screening hit list of 5 compounds represented
  as SMILES strings. Your task is to filter this list using both Lipinski''s Rule
  of Five and Veber''s rules, then compute pairwise Tanimoto similarity using Morgan
  fingerprints (radius=2, 2048 bits).


  **Compound library:**

  - Cpd_A: `CC(C)Cc1ccc(cc1)C(C)C(=O)O`

  - Cpd_B: `COc1ccc2cc(ccc2c1)C(C)N`

  - Cpd_C: `CC1=C(C(=O)Nc2ccccc2)C(c2ccccc2Cl)NC(=O)c2ccccc21` (MW ~430, 5 H-bond
  donors, 4 H-bond acceptors, rotatable bonds=3, TPSA=87)

  - Cpd_D: `CCCCCCCCCCCCCCCC(=O)O` (palmitic acid)

  - Cpd_E: `c1ccc2c(c1)cc1ccc3cccc4ccc2c1c34` (pyrene)


  **Requirements:**

  1. Write complete RDKit Python code that calculates MW, LogP, HBD, HBA, rotatable
  bonds, and TPSA for all 5 compounds, then flags each compound as passing or failing
  Lipinski RO5 (use standard cutoffs) and Veber rules (rotatable bonds ≤ 10, TPSA
  ≤ 140).

  2. Generate a 5×5 Tanimoto similarity matrix using Morgan fingerprints for all compounds.

  3. Based on your results, identify which compounds pass all filters and which pair
  of compounds is most similar to each other.

  4. Provide a brief interpretation (3–5 sentences) of why any failing compounds were
  eliminated.'
