id: ehr-data-parsing-12
prompt: 'Here is test question #12 of 30:


  ---


  You have received a batch of HL7v2 ORU^R01 messages from a hospital laboratory system
  containing complete blood count (CBC) results for 50 patients. Each message follows
  standard HL7v2.5 structure with MSH, PID, OBR, and multiple OBX segments. Below
  is a representative single message from the batch:


  ```

  MSH|^~\&|LAB|HOSP|EHR|HOSP|20240315142300||ORU^R01|MSG00123|P|2.5

  PID|1||PT98765^^^HOSP^MR||Johnson^Robert^A||19680422|M|||123 Elm St^^Springfield^IL^62701

  OBR|1|ORD445566|LAB778899|58410-2^CBC panel^LN|||20240315140000

  OBX|1|NM|6690-2^WBC^LN||7.2|10*3/uL|4.5-11.0|N|||F

  OBX|2|NM|789-8^RBC^LN||4.85|10*6/uL|4.50-5.90|N|||F

  OBX|3|NM|718-7^Hemoglobin^LN||13.1|g/dL|13.5-17.5|L|||F

  OBX|4|NM|4544-3^Hematocrit^LN||39.2|%|41.0-53.0|L|||F

  OBX|5|NM|777-3^Platelets^LN||142|10*3/uL|150-400|L|||F

  ```


  Using Python, please provide:

  1. A complete parsing function using the `hl7` library that extracts patient MRN,
  name, date of birth, sex, and all OBX lab values (LOINC code, test name, numeric
  value, units, reference range, and abnormal flag) from a single ORU^R01 message.

  2. A function that processes a list of such message strings and returns a flattened
  pandas DataFrame with one row per OBX observation.

  3. A data quality check function that identifies records where the abnormal flag
  is "L" or "H" and the numeric value actually falls within the stated reference range
  (i.e., a flag discrepancy), returning a summary report as a DataFrame.'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: easy
