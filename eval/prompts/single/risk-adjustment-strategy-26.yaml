id: risk-adjustment-strategy-26
prompt: 'A Medicare Advantage plan is preparing its 2024 risk adjustment submission
  strategy during the V24-to-V28 blended transition period (60% V24 / 40% V28 weighting
  for payment year 2024). The plan has identified 3,200 members with potential coding
  gaps through a retrospective chart review. The following subset of members has been
  flagged for HCC recapture analysis:


  - 847 members with documented Type 2 diabetes with CKD Stage 3 (ICD-10: E11.65 +
  N18.3) — currently only diabetes without complications coded

  - 412 members with Major Depressive Disorder, recurrent, moderate (ICD-10: F33.1)
  — depression not coded at all

  - 623 members with COPD with acute exacerbation (ICD-10: J44.1) — only "COPD unspecified"
  (J44.9) coded previously

  - 318 members with Peripheral Artery Disease (ICD-10: I73.9) — not coded despite
  clinical documentation


  Using the V24 and V28 HCC mapping tables and blended transition methodology, please
  provide:


  1. The HCC assignments for each ICD-10 code under both V24 and V28 models, noting
  any hierarchy conflicts or model differences

  2. The estimated incremental RAF score impact per member for each condition group
  under the blended 60/40 methodology

  3. A prioritization framework ranking these four coding gap categories by total
  revenue opportunity, assuming an average monthly capitation base rate of $950 per
  member

  4. Audit-defensibility criteria that must be met in the supporting clinical documentation
  before submitting each condition category

  5. A recommended workflow for prospective vs. retrospective recapture for each condition
  group going forward'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: intermediate
