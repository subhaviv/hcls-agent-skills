id: pa-clinical-policy-19
prompt: 'A 58-year-old Medicare Advantage patient with moderate-to-severe plaque psoriasis
  (BSA 22%, PASI 18.4) has failed two conventional DMARDs (methotrexate 15mg/week
  x 6 months, cyclosporine 3mg/kg/day x 4 months) and is now being evaluated for secukinumab
  (Cosentyx) 300mg. The payer''s formulary places secukinumab on Tier 4 (specialty)
  with a PA requirement citing step therapy through at least one TNF inhibitor (adalimumab
  preferred) before IL-17 inhibitors are considered.


  The treating dermatologist argues that the patient has a documented history of recurrent
  tuberculosis exposure (positive IGRA, treated latent TB 3 years ago), making TNF
  inhibitor therapy relatively contraindicated per ACR/AAD guidelines. Additionally,
  the patient has moderate hepatic impairment (Child-Pugh B), which affects methotrexate
  re-challenge eligibility.


  The payer issued a PA denial citing "failure to complete required step therapy."
  A peer-to-peer review was conducted but upheld the denial, and the case is now at
  Level 1 internal appeal.


  Please provide:

  1. A clinical policy analysis identifying which specific criteria support a step
  therapy exemption under CMS Medicare Advantage step therapy regulations (42 CFR
  §422.568 and CMS 2019 step therapy guidance)

  2. A structured appeal letter framework with the specific clinical evidence and
  regulatory citations needed to overturn the denial

  3. A FHIR Da Vinci PAS R4-compliant JSON snippet demonstrating how the step therapy
  exemption clinical rationale should be encoded in a `ClaimResponse` resource with
  appropriate `adjudication` and `supportingInfo` elements

  4. Risk stratification of the three most likely payer counterarguments and recommended
  physician response strategies for each'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: hard
