id: risk-adjustment-27
prompt: 'Here is test question #27 of 30:


  ---


  You are building a CMS-HCC risk adjustment pipeline for a Medicare Advantage plan
  with 12,000 members. Your claims data shows the following ICD-10 codes appearing
  frequently but inconsistently across members: E11.65 (Type 2 diabetes with hyperglycemia),
  E11.649 (Type 2 diabetes with hypoglycemia without coma), I50.32 (chronic diastolic
  heart failure), I50.22 (chronic systolic heart failure), N18.4 (chronic kidney disease,
  stage 4), and N18.3 (CKD stage 3b).


  Your pharmacy data reveals 847 members on insulin (NDC prefix 00169) with no diabetes
  HCC coded in the last 12 months, and 312 members on loop diuretics (furosemide,
  torsemide) with no heart failure HCC coded.


  Using the CMS-HCC Model V28 coefficient table, the relevant HCC mappings are: HCC37
  (Diabetes with Chronic Complications, coefficient 0.302), HCC38 (Diabetes without
  Complication, coefficient 0.105), HCC221 (Heart Failure, coefficient 0.323), HCC329
  (CKD Stage 4, coefficient 0.289), HCC330 (CKD Stage 3, coefficient 0.106).


  Please provide:

  1. Python code implementing the ICD-10-to-HCC crosswalk for these six codes, including
  hierarchy resolution logic that correctly suppresses lower-severity HCCs when higher-severity
  ones are present (e.g., E11.65 should suppress E11.649 mapping)

  2. SQL query to identify Rx proxy coding gaps using the pharmacy NDC prefixes described

  3. A RAF score projection function that computes the incremental RAF impact if all
  identified coding gaps were closed, assuming a base demographic RAF of 0.85 for
  the affected members

  4. Brief explanation of how V28 hierarchy resolution differs from V24 for the diabetes
  and CKD code sets provided'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: intermediate
