id: hedis-measure-specification-20
prompt: 'A regional health plan is preparing for HEDIS MY2024 data submission and
  has identified a complex enrollment scenario affecting their Controlling High Blood
  Pressure (CBP) measure performance. Their analytics team has flagged the following
  member cohort for review:


  **Member Profile:**

  - Total members initially identified in CBP denominator: 4,200

  - Members with a gap in enrollment (31–45 days) during the measurement year: 387

  - Members enrolled through Medicaid expansion with retroactive enrollment dating
  back 60 days: 142

  - Members who turned 18 during the measurement year: 89

  - Members with an ESRD diagnosis added mid-year: 203

  - Members with hypertension diagnosis only on a telehealth claim coded with POS
  02: 156


  **Current numerator (controlled BP <140/90):** 1,847 members


  Please provide the following deliverables:


  1. **Enrollment eligibility analysis**: For each of the five flagged subgroups,
  determine whether members should be retained in or removed from the denominator
  under NCQA''s CBP continuous enrollment and exclusion rules. Cite specific allowable
  gap provisions and anchor date logic.


  2. **Exclusion evaluation**: Identify which subgroups qualify as valid NCQA exclusions
  versus ineligible removals, and explain the audit risk if the plan incorrectly excludes
  them.


  3. **Adjusted rate calculation**: Using your eligibility determinations, recalculate
  the adjusted denominator and the resulting CBP compliance rate.


  4. **SQL pseudocode**: Write a SQL query structure that correctly filters the denominator
  population applying the enrollment gap rule, age anchor date, and ESRD exclusion
  logic simultaneously.


  5. **Star Rating impact**: If the adjusted rate shifts CBP performance by ±3 percentage
  points, estimate the directional Star Rating impact given CBP''s current triple-weighted
  status.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: hard
