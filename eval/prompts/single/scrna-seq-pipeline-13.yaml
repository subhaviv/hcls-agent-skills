id: scrna-seq-pipeline-13
prompt: 'You have just completed CellRanger alignment for a peripheral blood mononuclear
  cell (PBMC) dataset from 8 healthy donors. The output is stored in a directory called
  `filtered_feature_bc_matrix/` and contains approximately 45,000 cells total. Initial
  inspection suggests variable data quality across donors, with some samples potentially
  having higher mitochondrial content due to cold ischemia during sample processing.


  You want to perform standard quality control filtering before any downstream analysis.
  The dataset contains human cells, so mitochondrial genes are prefixed with "MT-".


  Please provide the following:


  1. **Complete Python code** using Scanpy to load the 10X data from `filtered_feature_bc_matrix/`,
  calculate QC metrics (total counts, number of genes detected, and percent mitochondrial
  reads), and generate violin plots and scatter plots to visualize the QC distributions.


  2. **Filtering thresholds**: Based on common PBMC best practices, specify reasonable
  cutoff values for minimum genes per cell, maximum genes per cell (to remove potential
  doublets), and maximum mitochondrial percentage. Justify each threshold briefly.


  3. **Code to apply the filters** and print a summary showing how many cells were
  removed at each filtering step (e.g., low-quality cells removed, potential doublets
  removed, high-MT cells removed) and the final cell count retained.


  4. **One additional QC metric** beyond the three listed above that would be particularly
  useful for this multi-donor PBMC dataset, and code to calculate and visualize it.'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: easy
