id: radiology-preprocessing-19
prompt: 'A research team is preprocessing 847 T1w MRI scans from a multi-site pediatric
  neuroimaging study (ages 6-17, sites A, B, C using Siemens 3T, GE 1.5T, and Philips
  3T scanners respectively). They report the following issues after running their
  initial pipeline:


  1. HD-BET skull stripping is leaving significant dural sinus tissue in ~23% of scans
  from the GE 1.5T site, while over-stripping temporal poles in ~31% of scans from
  the Philips 3T site

  2. N4BiasFieldCorrection is producing inconsistent results with convergence threshold
  0.001 and 4 fitting levels — some scans show residual intensity gradients particularly
  in posterior fossa regions

  3. ANTs SyN registration to MNI152 pediatric template (MNI_152_T1_1mm) is showing
  Jacobian determinant values outside the range [0.1, 10] in 67 scans, suggesting
  implausible deformations

  4. After registration, inter-site intensity distributions remain significantly different
  (Kolmogorov-Smirnov statistic > 0.35 between sites)


  The team wants to salvage their dataset without complete reprocessing. Please provide:

  - A diagnostic framework to identify root causes for each of the four issues

  - Specific parameter modifications and fallback strategies for skull stripping and
  bias correction

  - An ANTs command-line solution to detect and handle the problematic SyN registrations,
  including appropriate regularization parameters

  - A post-registration intensity harmonization approach using either WhiteStripe
  or RAVEL normalization, with Python pseudocode demonstrating the site-correction
  workflow


  Assume FSL 6.0.5, ANTs 2.4.3, and Python 3.9 with nilearn 0.10 are available.'
