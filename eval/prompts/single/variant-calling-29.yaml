id: variant-calling-29
prompt: 'You are analyzing a cohort of 47 whole-exome sequencing (WES) samples from
  a rare pediatric neurological disorder study. The samples were processed with BWA-MEM2
  and GATK HaplotypeCaller in GVCF mode, then combined using GenomicsDBImport. During
  joint genotyping with GenotypeGVCFs, you notice the following issues:


  1. The cohort is too small for VQSR to train reliably on SNPs (minimum ~30 samples
  is borderline, but your Ti/Tv ratio across samples averages only 1.89 instead of
  the expected ~2.5-3.0 for WES, suggesting systematic quality issues)

  2. Approximately 15% of samples show mean target coverage below 20x (range: 8x-95x
  across the cohort)

  3. Three samples are from a consanguineous family with expected high homozygosity,
  which is inflating certain VQSR annotation distributions


  Given these constraints, provide:


  (a) A decision framework explaining whether to use VQSR, hard filters, or a hybrid
  approach for this specific cohort, with justification citing the specific metrics
  above


  (b) A complete GATK hard-filter command set (bash code) using VariantFiltration
  with specific threshold values tuned for the low-coverage WES scenario, separately
  handling SNPs and indels


  (c) An explanation of how to handle the consanguineous samples specifically — should
  they be excluded from variant recalibration training, processed separately, or handled
  another way?


  (d) A strategy for post-filtering QC to verify your filtering approach worked correctly,
  including at least two specific metrics to compute and their expected ranges for
  a "clean" callset'
target_skills:
- variant-calling
domain: genomics
difficulty: hard
