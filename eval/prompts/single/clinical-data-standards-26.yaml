id: clinical-data-standards-26
prompt: 'A pharmaceutical company is preparing the adverse event frequency tables
  for a Phase III oncology trial submission. The safety database contains 847 treatment-emergent
  adverse events coded in MedDRA v26.0. The clinical team has flagged a coding inconsistency:
  events were coded inconsistently across three related preferred terms — "Nausea"
  (PT 10028813), "Vomiting" (PT 10047700), and "Nausea and vomiting" (PT 10028817)
  — with 124 events coded to "Nausea and vomiting" while similar events in the comparator
  arm were split between the individual PTs.


  Additionally, the team is debating whether to present gastrointestinal AEs at the
  PT level or aggregate to the HLT "Nausea and vomiting symptoms" for the primary
  safety table, given that the treatment arm shows a higher incidence when individual
  PTs are examined separately but a lower incidence when aggregated at HLT.


  Please provide:

  1. A brief explanation of the MedDRA hierarchy relationships between these three
  PTs and their parent HLT/HLGT/SOC, noting any special considerations about the "combination"
  PT "Nausea and vomiting"

  2. A recommendation on how to handle the cross-arm coding inconsistency for the
  124 events, including whether recoding is warranted and what MedDRA coding principles
  apply

  3. A specific recommendation on whether to present the primary safety table at PT
  or HLT level, with justification based on ICH E3 guidance and regulatory expectations

  4. A brief note on how this same data might be mapped to ICD-10 codes (R11.0, R11.1,
  R11.2) for any companion real-world evidence analysis'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: intermediate
