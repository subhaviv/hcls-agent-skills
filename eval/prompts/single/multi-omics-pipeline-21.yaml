id: multi-omics-pipeline-21
prompt: 'Here is test question #21 of 30:


  ---


  You are working with a multi-omics dataset from a colorectal cancer study involving
  85 tumor samples with matched RNA-seq (transcriptomics) and RPPA (reverse phase
  protein array) data. The RNA-seq data uses Ensembl gene IDs (e.g., ENSG00000141510
  for TP53), while the RPPA data uses antibody target names that correspond to UniProt
  accession numbers (e.g., P04637 for TP53). Before integrating these two layers using
  MOFA2 in R, you need to harmonize the feature identifiers so that matched molecular
  features share a consistent HGNC gene symbol identifier across both omics layers.


  Your tasks are:


  1. Write R code using the `biomaRt` package to map the Ensembl IDs from the RNA-seq
  layer to HGNC gene symbols, handling cases where one Ensembl ID maps to multiple
  HGNC symbols (keep the first alphabetically) and where no mapping exists (drop those
  features).


  2. Write a separate R code snippet using the `UniProt.ws` or `biomaRt` package to
  convert UniProt accession numbers from the RPPA layer to HGNC gene symbols, applying
  the same conflict resolution rules.


  3. After harmonization, describe how you would construct the MOFA2 input object
  in R using the `MOFA2` package, specifying the correct list structure for two views
  ("RNA" and "RPPA"), with samples as columns and features (HGNC symbols) as rows,
  and set the number of factors to 10 with a minimum R² threshold of 0.01 for variance
  explained.


  4. Briefly explain what to do with features that appear in only one omics layer
  after harmonization — should they be retained or dropped before MOFA2 training,
  and why?'
target_skills:
- multi-omics-pipeline
domain: multi-omics
difficulty: easy
