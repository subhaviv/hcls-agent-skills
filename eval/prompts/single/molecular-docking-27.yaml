id: molecular-docking-27
prompt: 'You are preparing a structure-based virtual screening campaign targeting
  the allosteric site of KRAS G12C (PDB: 6OIM) to identify covalent fragment hits
  from a library of 2,847 acrylamide-containing compounds. During validation, you
  perform redocking of the co-crystallized covalent inhibitor AMG-510 (sotorasib)
  and obtain an RMSD of 3.8 Å against the crystallographic pose, which exceeds your
  2.0 Å acceptance threshold.


  Your current setup uses the following parameters:

  - Grid box center: x=−3.2, y=18.7, z=−1.4 (Å)

  - Grid box dimensions: 20×20×20 Å

  - Exhaustiveness: 8

  - Vina scoring function: default (vina)

  - Ligand prepared using OpenBabel (obabel -h flag, Gasteiger charges)


  A colleague suggests the poor RMSD may stem from (1) incorrect grid box placement
  missing the switch-II pocket, (2) inadequate ligand preparation for a covalent compound,
  or (3) insufficient exhaustiveness for a flexible allosteric site.


  Please provide:

  1. A systematic diagnosis of which factor(s) most likely caused the 3.8 Å RMSD failure,
  with justification based on the specific parameters given

  2. Corrected grid box coordinates and dimensions appropriate for the KRAS switch-II
  pocket, explaining your reasoning

  3. A revised ligand preparation workflow using Meeko/ADFR suite instead of OpenBabel,
  including the specific command-line steps to handle the acrylamide warhead appropriately
  for non-covalent docking approximation

  4. Updated AutoDock Vina command with corrected parameters and exhaustiveness recommendation
  for screening 2,847 compounds efficiently while maintaining pose accuracy'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: intermediate
