id: cell-type-annotation-21
prompt: 'You have completed a scRNA-seq experiment on human peripheral blood mononuclear
  cells (PBMCs) from 8 healthy donors. After preprocessing and clustering with Scanpy,
  you have an AnnData object (`adata`) with 15,432 cells organized into 12 Leiden
  clusters (resolution=0.5). The object contains normalized, log-transformed counts
  in `adata.X` and UMAP coordinates in `adata.obsm[''X_umap'']`.


  You want to perform automated cell type annotation using **CellTypist** with the
  `Immune_All_Low.pkl` model, followed by **majority voting** to assign consensus
  labels per cluster.


  Please provide the following deliverables:


  1. **Complete Python code** to run CellTypist annotation with majority voting enabled,
  using `over_clustering=''leiden''` as the grouping key. Set the probability threshold
  to 0.5 and ensure the model is downloaded automatically if not present.


  2. **Code to store results** back into the AnnData object — specifically saving
  both the per-cell predicted labels and the majority-voting labels into `adata.obs`
  with clearly named columns (`celltypist_cell_type` and `celltypist_majority_vote`,
  respectively).


  3. **Visualization code** to generate two side-by-side UMAP plots: one colored by
  per-cell predictions and one colored by majority-vote labels, saved as a PNG file
  (`celltypist_annotation.png`) at 150 DPI.


  4. A brief explanation (3-5 sentences) of **why majority voting is preferred** over
  per-cell predictions when the goal is to assign a single label to each Leiden cluster
  in downstream analyses.'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: easy
