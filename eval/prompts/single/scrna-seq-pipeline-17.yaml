id: scrna-seq-pipeline-17
prompt: 'You are analyzing a single-cell RNA-seq dataset from a colorectal cancer
  study involving 8 patients (4 tumor, 4 adjacent normal tissue). After running CellRanger,
  you have 8 separate `filtered_feature_bc_matrix` directories. Initial cell counts
  per sample range from 3,200 to 7,800 cells. You''ve loaded all samples into a combined
  AnnData object with ~45,000 total cells and 33,538 genes.


  During QC inspection, you notice the following issues:

  - Sample "Patient3_Tumor" has a median mitochondrial gene percentage of 28% (vs.
  ~8% for other samples)

  - Two samples show a suspicious secondary peak in the n_genes_by_counts distribution
  around 200 genes

  - The combined dataset shows strong batch clustering by patient in the initial UMAP
  before any correction


  Your tasks are:


  1. **QC filtering strategy**: Provide specific, justified thresholds for filtering
  cells based on `n_genes_by_counts`, `total_counts`, and `pct_counts_mt`. Explain
  how you would handle Patient3_Tumor differently from other samples (per-sample vs.
  global thresholds).


  2. **Doublet detection**: Write Scanpy-compatible Python code using Scrublet to
  identify and flag doublets across all 8 samples, ensuring it runs per-sample before
  merging.


  3. **Batch correction decision**: Given the patient-level batch effects, compare
  Harmony vs. scVI for this specific scenario (8 patients, tumor/normal comparison).
  Recommend one approach with justification, then provide complete implementation
  code including neighbor graph construction and UMAP generation on the corrected
  embedding.


  4. **Validation**: Describe two quantitative metrics to confirm successful batch
  correction while preserving biological variation.'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: intermediate
