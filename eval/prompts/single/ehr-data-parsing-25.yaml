id: ehr-data-parsing-25
prompt: 'You are building a clinical data pipeline that receives HL7v2 ORU^R01 messages
  containing laboratory results from a hospital''s LIS system. Each message contains
  multiple OBX segments with different value types (NM for numeric, ST for string,
  CWE for coded entries). You need to parse these messages and perform data quality
  checks before loading into a data warehouse.


  Given the following sample HL7v2 message:


  ```

  MSH|^~\&|LIS|HOSPITAL|EHR|HOSPITAL|20240315142233||ORU^R01|MSG00847|P|2.5

  PID|1||MRN-10293^^^HOSPITAL^MR||Thornton^James^A||19681122|M|||742 Elm Street^^Boston^MA^02101

  OBR|1|ORD-5521|LAB-8834|85025^Complete Blood Count^CPT|||20240315140000

  OBX|1|NM|6690-2^WBC^LN||7.2|10*3/uL|4.5-11.0|N|||F

  OBX|2|NM|789-8^RBC^LN||3.1|10*6/uL|4.5-5.9|L|||F

  OBX|3|NM|718-7^Hemoglobin^LN||9.8|g/dL|13.5-17.5|L|||F

  OBX|4|ST|10331-7^Retic Comment^LN||Slight anisocytosis noted||||||F

  OBX|5|CWE|33761-3^Blood smear^LN||LA11882-0^Abnormal^LN||||||F

  ```


  Please provide:

  1. A Python function using the `hl7` library to parse this message and extract all
  OBX values into a pandas DataFrame with columns: `test_code`, `test_name`, `value`,
  `units`, `reference_range`, `abnormal_flag`, `value_type`

  2. A data quality check function that flags records where numeric OBX values fall
  outside reference ranges, handles the pipe-delimited range format (e.g., `4.5-11.0`),
  and accounts for non-numeric value types gracefully

  3. A brief explanation of how you would handle the CWE value type differently from
  NM and ST types during extraction'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: intermediate
