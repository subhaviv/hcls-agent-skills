id: pa-decision-automation-19
prompt: 'A regional health plan processes approximately 4,200 prior authorization
  requests monthly for specialty biologics (adalimumab, ustekinumab, secukinumab)
  treating inflammatory conditions. Your PA automation team has trained a gradient
  boosting classifier on 18 months of historical decisions (78% approval rate, 22%
  denial rate) achieving 91% overall accuracy. However, post-deployment audit reveals
  the model exhibits significant performance disparity: approval predictions for patients
  with Medicaid dual-eligibility show 34% false-negative rate versus 11% for commercially
  insured patients, suggesting potential algorithmic bias tied to socioeconomic proxies
  embedded in features like "prior step therapy completion" and "specialty pharmacy
  utilization history."


  Your SHAP analysis reveals that `step_therapy_duration_days`, `formulary_tier_adherence_score`,
  and `prior_specialist_visit_count` collectively contribute 67% of feature importance,
  but these variables correlate strongly (r > 0.6) with insurance type and zip-code-based
  SDoH indices.


  Deliverables requested:


  1. **Bias diagnosis**: Identify the specific fairness violation type (demographic
  parity, equalized odds, calibration) present in this scenario and explain why standard
  accuracy metrics masked it during validation.


  2. **Feature remediation strategy**: Propose a concrete feature engineering approach
  to decouple legitimate clinical signals from socioeconomic proxies, including at
  least two specific transformation techniques with pseudocode.


  3. **Retraining pipeline design**: Design a fairness-constrained retraining workflow
  using the Fairlearn or AIF360 library, specifying the constraint type, threshold
  parameters, and evaluation metrics beyond AUC.


  4. **FHIR PAS bundle modification**: Describe what additional FHIR resources or
  extensions should be captured at PA intake to enable fairer adjudication, referencing
  specific FHIR R4 resource types.


  5. **Regulatory risk assessment**: Identify which CMS and state-level regulatory
  frameworks create liability exposure for this disparity pattern.'
