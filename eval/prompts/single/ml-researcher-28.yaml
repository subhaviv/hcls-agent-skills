id: ml-researcher-28
prompt: 'You are developing a multi-site sepsis early-warning model using EHR data
  from four hospital systems (Sites A–D). Site A: 45,000 patients, academic medical
  center; Site B: 12,000 patients, community hospital; Site C: 28,000 patients, safety-net
  hospital with 67% Medicaid population; Site D: 8,000 patients, rural critical-access
  hospital. Sepsis prevalence varies: 8.2% (A), 5.1% (B), 11.4% (C), 4.3% (D). Your
  model uses 72-hour rolling windows of vitals, labs (including lactate, procalcitonin),
  and nursing flowsheet data. You have identified that Site D collected procalcitonin
  in only 23% of encounters, and Site C has a 4.2-hour median documentation lag for
  nursing notes.


  The intended use is a real-time alert firing 6 hours before sepsis onset, targeting
  ICU and step-down units. The development team proposes training on Sites A+B, validating
  on Site C, and holding out Site D entirely for "real-world" testing. They also propose
  using AUROC as the sole evaluation metric and applying SMOTE globally before any
  splitting.


  Provide: (1) a detailed critique of the proposed experimental design identifying
  at least five methodological flaws with specific consequences; (2) a revised data-splitting
  and cross-validation strategy that accounts for site heterogeneity and temporal
  structure; (3) the minimum set of evaluation metrics required for this clinical
  use case with justification, including how to handle the missing procalcitonin at
  Site D; (4) a subgroup fairness audit plan specifying which demographic and clinical
  subgroups must be tested and which statistical tests are appropriate; (5) a brief
  checklist of the TRIPOD+AI reporting items most critical for this deployment scenario.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: hard
