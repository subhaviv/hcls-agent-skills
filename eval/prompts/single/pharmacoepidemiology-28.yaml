id: pharmacoepidemiology-28
prompt: 'You are designing a pharmacoepidemiologic study using a large US commercial
  claims database (2010–2022, ~18 million continuously enrolled members) to evaluate
  whether GLP-1 receptor agonists (GLP-1 RAs) reduce the risk of major adverse cardiovascular
  events (MACE) compared to DPP-4 inhibitors in patients with type 2 diabetes. Your
  preliminary cohort definition identifies 142,000 new users of GLP-1 RAs and 198,000
  new users of DPP-4 inhibitors after a 180-day washout period.


  A colleague raises three concerns: (1) Some patients in both arms filled their index
  prescription but discontinued within 30 days — yet their follow-up time before discontinuation
  is being counted toward person-time, potentially creating immortal time bias. (2)
  Because GLP-1 RAs are often prescribed after metformin/sulfonylurea failure while
  DPP-4 inhibitors are sometimes used earlier in the treatment cascade, residual confounding
  by diabetes severity is likely. (3) Patients switch between GLP-1 RAs and DPP-4
  inhibitors over follow-up, making treatment a time-varying exposure.


  Please provide:

  1. A precise explanation of why concern #1 may or may not constitute immortal time
  bias in this specific setup, and how to correctly structure person-time to avoid
  it.

  2. A target trial emulation protocol (eligibility criteria, treatment strategies,
  assignment procedure, follow-up, outcomes, causal contrast) that addresses concern
  #2.

  3. A marginal structural model (MSM) specification using stabilized inverse probability
  of treatment weights (IPTW) to handle concern #3, including the weight model covariates,
  stabilization approach, weight truncation decision, and the final outcome model
  specification.

  4. An E-value calculation framework for the observed hazard ratio of 0.82 (95% CI:
  0.76–0.89) to quantify robustness to unmeasured confounding.'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: hard
