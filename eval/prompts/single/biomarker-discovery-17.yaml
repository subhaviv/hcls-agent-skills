id: biomarker-discovery-17
prompt: 'Here is test question #17 of 30:


  ---


  A research team at a cancer center has assembled a multi-omics dataset from 280
  early-stage non-small cell lung cancer (NSCLC) patients with the goal of building
  a **predictive biomarker** (not prognostic) for response to adjuvant pembrolizumab.
  The dataset includes: RNA-seq expression for 18,400 genes, somatic mutation calls
  for 412 genes (binary), and 6 clinical variables (age, stage, smoking history, ECOG
  score, tumor size, histology). The primary endpoint is pathologic complete response
  (pCR) at 12 weeks (binary outcome: 47 responders, 233 non-responders). The team
  plans to use LASSO logistic regression for feature selection followed by a final
  logistic model, evaluated via 5-fold cross-validation on the full dataset.


  **Please provide all of the following:**


  1. Identify at least **three methodological flaws** in the proposed analysis plan,
  explaining why each introduces bias or invalid performance estimates.


  2. Propose a **corrected analysis pipeline** that handles the class imbalance, high
  dimensionality, and appropriate cross-validation structure. Specify the exact CV
  strategy and why it is necessary here.


  3. Given the 47 events, calculate the **maximum number of candidate predictors**
  that can be reliably evaluated in the final model using the events-per-variable
  (EPV) rule, and explain how this should constrain the feature selection step.


  4. Explain the distinction between a **predictive vs. prognostic biomarker** in
  this clinical context, and describe one statistical test (with the relevant interaction
  term) that would formally establish predictive utility.


  5. Recommend **two evaluation metrics** appropriate for this imbalanced binary outcome
  beyond simple AUC, and justify each choice.'
