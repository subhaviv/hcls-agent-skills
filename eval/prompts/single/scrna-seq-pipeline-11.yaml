id: scrna-seq-pipeline-11
prompt: 'You have completed a CellRanger run on a human PBMC dataset containing approximately
  8,500 cells from a single donor. The output is stored in a directory called `filtered_feature_bc_matrix/`
  containing the standard `matrix.mtx.gz`, `barcodes.tsv.gz`, and `features.tsv.gz`
  files. You want to perform basic quality control before proceeding with downstream
  analysis.


  Your initial inspection suggests some low-quality cells may be present. You have
  decided to use the following QC thresholds as a starting point:

  - Minimum genes per cell: 200

  - Maximum genes per cell: 2,500

  - Maximum mitochondrial gene percentage: 5%


  Please provide the following deliverables:


  1. **Complete Python code** using Scanpy to load the 10X data from the `filtered_feature_bc_matrix/`
  directory into an AnnData object, calculate QC metrics (including mitochondrial
  percentage using genes prefixed with "MT-"), and apply the three filtering thresholds
  listed above.


  2. **Visualization code** to generate violin plots showing the distributions of
  `n_genes_by_counts`, `total_counts`, and `pct_counts_mt` both before and after filtering,
  so you can visually confirm the filtering worked correctly.


  3. **A brief explanation** (3-5 sentences) of why each of the three QC thresholds
  is biologically meaningful — specifically, what biological or technical artifact
  each threshold is designed to remove.


  Assume the working environment has `scanpy`, `anndata`, and `matplotlib` already
  installed. The code should print the number of cells and genes remaining after each
  filtering step.'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: easy
