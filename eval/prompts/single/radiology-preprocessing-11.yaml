id: radiology-preprocessing-11
prompt: 'You are setting up a standard T1-weighted MRI preprocessing pipeline for
  a neuroimaging study involving 45 healthy adult volunteers (ages 25-60). Your raw
  DICOM data has been converted to NIfTI format using dcm2niix, and the images have
  varying orientations from three different scanner sites (Siemens Prisma 3T, GE Discovery
  MR750, and Philips Ingenia 3T).


  Before running full preprocessing, you need to standardize the pipeline. Your planned
  steps are: (1) reorientation to standard space, (2) bias field correction using
  N4ITK, (3) brain extraction, and (4) registration to MNI152 1mm template.


  Please provide the following:


  1. **A complete bash script** implementing these four steps using FSL and ANTs tools,
  processing a single subject''s T1w image (input variable: `T1_INPUT`). Include appropriate
  parameters for N4BiasFieldCorrection (iterations, convergence threshold, shrink
  factor) and HD-BET or FSL BET for skull stripping with a fractional intensity threshold
  of 0.4.


  2. **A brief explanation** (3-5 sentences) of why reorientation with `fslreorient2std`
  must occur before bias field correction rather than after, and what artifacts could
  arise from incorrect ordering.


  3. **A quality control check** — write a short Python snippet using nibabel that
  verifies the output T1 image is in RAS orientation and has the expected MNI voxel
  dimensions of 1×1×1 mm after registration.


  Assume ANTs, FSL 6.0, and Python 3.9 with nibabel are available. Use SyN registration
  for the MNI step.'
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: easy
