id: risk-adjustment-strategy-22
prompt: 'A Medicare Advantage plan with 12,000 enrolled members is preparing for the
  2024 payment year, during which CMS applies a blended transition methodology combining
  V24 and V28 model outputs. The plan''s risk adjustment team has pulled the following
  aggregate data from their most recent submission:


  - Total members: 12,000

  - Average RAF score under V24: 1.42

  - Average RAF score under V28: 1.31

  - Members with at least one HCC mapped under V24 but dropped in V28: 2,850

  - Members with diabetes-related HCCs (HCC 18, 19, or 122 under V28): 3,100

  - Members currently coded only for "Type 2 diabetes without complications" (E11.9):
  1,400 of the 3,100 diabetes members


  The plan wants to understand the financial and strategic implications of the V24-to-V28
  transition before finalizing their 2024 coding and chart review priorities.


  Please provide the following:


  1. **Blended RAF Calculation**: Using the 2024 blended transition weights (60% V28,
  40% V24), calculate the plan''s estimated blended average RAF score and explain
  what this means for capitation revenue relative to a pure V24 or pure V28 environment.


  2. **HCC Mapping Impact**: Explain in plain terms why some HCCs present in V24 were
  removed or consolidated in V28, and what documentation strategies can help preserve
  risk capture for the 2,850 affected members.


  3. **Diabetes Coding Gap Analysis**: For the 1,400 members coded only with E11.9,
  identify what additional ICD-10 codes or clinical specificity could improve HCC
  capture under V28, and what audit-defensible documentation elements are required.


  4. **Prioritization Framework**: Recommend a simple prioritization matrix for chart
  review outreach targeting the highest RAF recovery opportunity within this member
  population.'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: easy
