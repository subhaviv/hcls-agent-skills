id: molecular-docking-12
prompt: 'You are setting up a molecular docking campaign to identify inhibitors of
  the fictional kinase **DYRK5B** (PDB ID: 7XQP, resolution: 2.1 Å). Before running
  virtual screening against a 5,000-compound library, you want to validate your docking
  protocol using a known co-crystallized ligand **compound LX-447** that is already
  present in the crystal structure.


  Your current setup uses the following parameters:

  - Grid box center: x=14.2, y=−8.7, z=22.5 (based on the co-crystallized ligand centroid)

  - Grid box dimensions: 20 × 20 × 20 Å

  - Exhaustiveness: 8

  - AutoDock Vina version 1.2.3


  After running redocking, you obtain the following top-3 pose RMSDs compared to the
  crystal pose: **0.87 Å, 1.43 Å, 2.91 Å**.


  Please provide:

  1. An assessment of whether this redocking result validates the protocol, citing
  the standard RMSD acceptance threshold used in the field

  2. A recommendation on whether the grid box size is appropriate for a kinase ATP-binding
  site, and whether it should be adjusted

  3. A complete Python code snippet using **Meeko** to prepare a single ligand SMILES
  (`CCc1ccc(NC(=O)c2cccc(Cl)c2)cc1`) for AutoDock Vina, outputting a `.pdbqt` file

  4. A brief explanation of why exhaustiveness=8 may or may not be sufficient for
  this validation run, and what value you would recommend for the full 5,000-compound
  screening campaign'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: easy
