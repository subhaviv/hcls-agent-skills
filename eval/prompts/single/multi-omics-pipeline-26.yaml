id: multi-omics-pipeline-26
prompt: 'You are integrating transcriptomic (RNA-seq) and proteomic (TMT mass spectrometry)
  data from a cohort of 87 colorectal cancer patients (45 microsatellite-stable, 42
  microsatellite-instable) processed across three batches. The RNA-seq data uses Ensembl
  gene IDs (GRCh38, ~18,000 genes after filtering), while the proteomics data contains
  UniProt accession numbers (~6,200 proteins quantified). Before integration, you
  need to harmonize identifiers and correct for batch effects.


  **Specific tasks:**


  1. **ID Harmonization**: Write R code using `biomaRt` to map Ensembl gene IDs to
  HGNC symbols and UniProt accession numbers, retaining only 1-to-1 mappings. Handle
  the case where ~12% of Ensembl IDs return multiple UniProt matches — specify your
  filtering strategy.


  2. **Batch Correction**: The RNA-seq data has integer counts; apply `ComBat-seq`
  with MSI status as a biological covariate across three batches. Show the full R
  code including the `sva` library call, and explain why `ComBat` (rather than `ComBat-seq`)
  would be inappropriate here.


  3. **MOFA2 Integration**: After harmonizing to ~4,800 shared features (HGNC symbols),
  configure a MOFA2 model in R with 15 factors, ARD priors enabled, and `likelihoods
  = c("gaussian", "gaussian")`. Include code to create the `MOFA` object from two
  named data matrices and set training options with `maxiter = 1000`.


  4. **Post-MOFA Enrichment**: For Factor 3 (which explains 8.2% variance), extract
  the top 200 RNA-seq feature weights and run `fgsea` against the MSigDB Hallmark
  gene set collection (50 pathways). Provide the complete code and specify the `nperm`
  and `minSize` parameters you would use and why.'
