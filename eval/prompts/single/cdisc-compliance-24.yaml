id: cdisc-compliance-24
prompt: 'A Phase III oncology trial (STUDY-4821) is preparing SDTM datasets for FDA
  submission. The trial collected tumor assessment data using RECIST 1.1 criteria,
  including target lesion measurements, non-target lesion responses, and overall tumor
  response. The clinical data team has mapped most findings to the TU (Tumor/Lesion
  Identification) and TR (Tumor Results) domains, but several issues have emerged
  during Pinnacle 21 validation:


  1. **SUPPTU needed**: 15 patients have laterality data (LEFT/RIGHT) for lesions
  that cannot fit in standard TU variables

  2. **RELREC linkage**: TR records need to link back to their parent TU lesion identification
  records

  3. **Controlled terminology conflict**: The team used "TARGET" and "NON-TARGET"
  for TUTESTCD but Pinnacle 21 flags these as non-standard; the current CDISC CT version
  in use is 2023-09-29

  4. **Timing variables**: 48 patients have tumor assessments performed on the same
  day as their study visit but TRDTC was populated while VISITNUM was left null in
  23 records


  Given this scenario, please provide:

  - A corrected SUPPTU structure showing the proper metadata columns and two example
  rows for laterality data

  - The correct RELREC dataset structure linking TU to TR with example rows for patient
  SUBJ-0042 who has 3 target lesions

  - The appropriate CDISC CT-compliant values for tumor lesion identification (replacing
  the flagged TUTESTCD values), citing the correct codelist

  - A prioritized remediation plan ranking these four issues by regulatory risk, with
  justification for each priority level'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: intermediate
