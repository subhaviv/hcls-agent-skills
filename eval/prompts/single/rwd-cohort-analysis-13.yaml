id: rwd-cohort-analysis-13
prompt: 'Here is test question #13 of 30:


  ---


  You are analyzing a claims database of 45,000 commercially insured patients diagnosed
  with Type 2 diabetes (ICD-10: E11.x) between January 2019 and December 2021. You
  want to compare 90-day cardiovascular event rates (composite of MI [ICD-10: I21.x]
  or stroke [ICD-10: I63.x]) between patients initiated on SGLT2 inhibitors (NDC codes
  representing empagliflozin, dapagliflozin, canagliflozin) versus GLP-1 receptor
  agonists (NDC codes representing semaglutide, liraglutide, dulaglutide) within 30
  days of their index diagnosis date.


  Your cohort has the following baseline characteristics after initial extraction:
  12,400 SGLT2i initiators and 9,800 GLP-1 initiators. Key covariates include age,
  sex, Charlson Comorbidity Index, prior hypertension (ICD-10: I10), prior hyperlipidemia
  (ICD-10: E78.x), baseline HbA1c proxied by lab CPT code 83036, and prior statin
  use (NDC prefix 00071 for atorvastatin).


  Please provide the following deliverables:

  1. Python code to calculate Proportion of Days Covered (PDC) for the index medication
  over a 180-day follow-up window, using a fill-gap capping rule of 30 days

  2. Python code to estimate propensity scores using logistic regression on the listed
  covariates, then compute Standardized Mean Differences (SMD) before and after 1:1
  nearest-neighbor matching with a caliper of 0.02

  3. A Kaplan-Meier survival curve comparing time-to-first cardiovascular event between
  matched cohorts, including log-rank test p-value

  4. A brief interpretation of what SMD threshold (<0.1) passing means for your analysis
  validity'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: easy
