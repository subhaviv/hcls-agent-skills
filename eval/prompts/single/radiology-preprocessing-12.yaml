id: radiology-preprocessing-12
prompt: 'You are setting up a standard T1-weighted MRI preprocessing pipeline for
  a retrospective study involving 847 subjects scanned across three different 3T scanners
  (Siemens Prisma, GE Discovery MR750, and Philips Ingenia). All images are in NIfTI
  format and have already been converted from DICOM. Before registration to MNI152
  space, you need to perform bias field correction and skull stripping.


  Your team has decided to use ANTs N4BiasFieldCorrection followed by HD-BET for brain
  extraction, then FSL''s FLIRT for linear registration to the MNI152_T1_1mm template.


  Please provide the following:


  1. A complete bash script that processes a single subject through the full pipeline
  (N4 bias correction → HD-BET skull stripping → FLIRT registration to MNI152), including
  appropriate parameters for each tool. Use 6 degrees of freedom for initial alignment
  and 12 DOF for final registration, with mutual information as the cost function.


  2. Specify the recommended N4BiasFieldCorrection parameters (shrink factor, convergence,
  B-spline grid resolution) appropriate for 3T T1w data.


  3. Explain what `fslreorient2std` does and whether it should be applied before or
  after bias field correction in this pipeline, and why.


  4. Identify two potential sources of registration failure that could arise from
  the multi-scanner acquisition setup, and suggest one quality control metric to detect
  each issue.'
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: easy
