id: ngs-quality-control-29
prompt: 'Here''s the research question:


  ---


  You are processing a whole-exome sequencing cohort of 48 tumor-normal pairs from
  a lung adenocarcinoma study. After running fastp with default parameters, MultiQC
  aggregates reveal a puzzling pattern: 12 samples show **bimodal quality score distributions**
  in read 2 (two distinct peaks at Q28 and Q15), while the remaining 36 samples appear
  normal. Additionally, mosdepth reports that these same 12 samples have median target
  coverage of 87× but with an unusually high coefficient of variation (CV > 0.85)
  across exonic regions, compared to CV < 0.35 for normal samples. FastQC flags "Per
  base sequence content" failures specifically in positions 1–7 of read 1 for ALL
  samples in the cohort.


  Given this context:


  1. **Diagnose** the three distinct QC anomalies described (bimodal Q-score distribution,
  high coverage CV, and positions 1–7 sequence content failure) — provide the most
  likely technical root cause for each, distinguishing between library preparation
  artifacts vs. sequencing platform issues vs. biological signal.


  2. **Write a fastp command** that specifically addresses the read 2 quality issue
  using a sliding-window approach with a minimum window quality of 20, minimum read
  length of 50 bp after trimming, and that also handles the positions 1–7 artifact
  in read 1 — using the standard file conventions (`sample_R1.fastq.gz`, `sample_R2.fastq.gz`,
  `THREADS=8`, output to `OUT`).


  3. **Write a mosdepth + shell command pipeline** to compute per-sample coefficient
  of variation of coverage across target intervals (assume `targets.bed`), outputting
  a TSV with columns `sample`, `mean_cov`, `sd_cov`, `cv` for all 48 samples.


  4. Recommend a **filtering threshold strategy** to flag and potentially exclude
  samples from downstream somatic variant calling based on these QC metrics.'
