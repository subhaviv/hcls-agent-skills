id: molecular-docking-24
prompt: 'You are setting up a structure-based virtual screening campaign targeting
  the allosteric pocket of KRAS G12C mutant (PDB: 6OIM) to identify covalent-fragment
  candidates from a 2,400-compound library. During validation, you performed redocking
  of the co-crystallized inhibitor AMG-510 and obtained an RMSD of 3.8 Å against the
  reference pose — well above the acceptable 2.0 Å threshold.


  Your current setup uses the following parameters:

  - Grid box center: x=−2.4, y=17.3, z=22.1 (Å)

  - Grid box dimensions: 15×15×15 Å

  - Exhaustiveness: 8

  - Receptor prepared using AutoDockTools (prepare_receptor4.py)

  - Ligand prepared using Open Babel (obabel -h flag for hydrogen addition)


  Upon visual inspection in PyMOL, you notice the docked pose places the acrylamide
  warhead of AMG-510 pointing away from Cys12, while the reference crystal pose shows
  it deeply buried in the switch-II pocket (S-IIP).


  Given this failed validation, provide the following deliverables:

  1. Diagnose at least three specific technical reasons why the redocking RMSD is
  3.8 Å, referencing the parameters and tools listed above

  2. Provide corrected grid box coordinates and dimensions appropriate for the S-IIP
  pocket of 6OIM, with justification

  3. Write a corrected Python/bash preparation pipeline using ADFR Suite and Meeko
  instead of the current tools, including proper handling of the covalent warhead
  for non-covalent docking approximation

  4. Recommend exhaustiveness and num_modes settings for both the validation redocking
  step and the full 2,400-compound screening campaign, with reasoning'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: intermediate
