id: risk-adjustment-29
prompt: 'A regional Medicare Advantage plan has 12,000 members and is preparing for
  their annual risk adjustment data validation (RADV) audit. Their data team has identified
  a critical edge case: 847 members have ICD-10 code E11.65 (Type 2 diabetes with
  hyperglycemia) submitted, but 312 of those members also have E11.649 (Type 2 diabetes
  with hypoglycemia without coma) submitted in the same measurement year. Additionally,
  203 members have both E13.10 (Other specified diabetes mellitus with ketoacidosis
  without coma) and E11.65 active in their claims.


  The CMS-HCC model v28 hierarchy rules must be applied, where HCC37 (Diabetes with
  Chronic Complications) trumps HCC38 (Diabetes without Complication). The plan uses
  demographic coefficients: age 70-74 female = 0.421, male = 0.389. Base diabetes
  HCC38 coefficient = 0.105, HCC37 = 0.302.


  Your task:

  1. Write Python code that resolves the HCC hierarchy conflicts for all three member
  overlap scenarios, correctly assigning final HCC codes per CMS v28 rules

  2. Calculate the RAF score delta (gain or loss) when hierarchy resolution is applied
  correctly versus incorrectly double-counting both HCCs for the 312-member group,
  assuming equal gender split and age band 70-74

  3. Identify which scenario (E11.65+E11.649 overlap vs. E13.10+E11.65 overlap) represents
  a higher audit risk and explain the coding logic

  4. Provide SQL to flag members where submitted claims would fail RADV hierarchy
  validation, including the specific rejection reason code'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: hard
