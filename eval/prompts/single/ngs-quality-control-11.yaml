id: ngs-quality-control-11
prompt: 'You have just received paired-end FASTQ files (`sample_R1.fastq.gz` and `sample_R2.fastq.gz`)
  from a whole-genome sequencing run on an Illumina NovaSeq 6000. Before proceeding
  with variant calling, your team lead has asked you to perform a comprehensive initial
  quality assessment of the raw reads.


  Using the standard tools available in your NGS QC pipeline (FastQC and MultiQC),
  complete the following tasks:


  1. **Write the exact shell commands** to run FastQC on both FASTQ files simultaneously,
  using `THREADS=8` and directing all output to the `qc_out` directory.


  2. **Write the MultiQC command** to aggregate the FastQC results from the `qc_out`
  directory into a single summary report, also saved in `qc_out`.


  3. **List four specific quality metrics** that FastQC reports on, and briefly explain
  (1–2 sentences each) what a "WARN" or "FAIL" flag on each metric would indicate
  about the sequencing data quality.


  4. **Describe the folder/file structure** you would expect to find in `qc_out` after
  successfully running both FastQC and MultiQC, listing at least five distinct output
  files or directories by name.


  Assume the FASTQ files are located in the current working directory, and that FastQC
  and MultiQC are already installed and available on the system PATH. No adapter trimming
  is required at this stage — focus only on the raw read QC assessment.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: easy
