id: rwd-cohort-analysis-19
prompt: 'You are conducting a real-world evidence study comparing two SGLT2 inhibitors
  — dapagliflozin (NDC prefix 0310-0488) and empagliflozin (NDC prefix 0597-0122)
  — for time-to-first hospitalized heart failure (HHF) in a Medicare claims database.
  Your cohort contains 12,847 dapagliflozin initiators and 9,203 empagliflozin initiators
  after applying a 180-day washout period and requiring ≥12 months of continuous enrollment
  pre-index. After 1:1 nearest-neighbor propensity score matching (caliper = 0.02
  SD of logit PS), you have 8,914 matched pairs. The outcome is identified using ICD-10
  code I50.x as a primary discharge diagnosis (CPT 99238/99239 for inpatient discharge).
  However, when you plot the Kaplan-Meier curves, the two arms visibly cross at approximately
  month 14, and the global log-rank p-value is 0.003 but Schoenfeld residuals show
  a statistically significant time-varying effect (p = 0.018 for the scaled residuals
  test).


  Please provide:

  1. A diagnostic interpretation of what the crossing KM curves and Schoenfeld residual
  violation mean for your Cox model inference, including which specific assumptions
  are compromised

  2. Three concrete statistical remediation strategies (e.g., time-splitting, restricted
  mean survival time, landmark analysis) with the tradeoffs of each in this Medicare
  HHF context

  3. Python code implementing a piecewise Cox model with a knot at month 14, including
  proper variance estimation using robust sandwich estimators

  4. A SMD balance table check recommendation for the top 10 covariates post-matching,
  specifying the threshold and what to do if SMD > 0.10 for any variable after matching'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: hard
