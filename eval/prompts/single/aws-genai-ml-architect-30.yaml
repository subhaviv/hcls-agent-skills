id: aws-genai-ml-architect-30
prompt: 'A regional health system (MedCore Health) is deploying a real-time clinical
  decision support system for sepsis prediction in their 12-hospital ICU network.
  The system must process streaming vitals (heart rate, MAP, SpO2, lactate, WBC) from
  847 concurrent ICU beds via HL7 FHIR R4 feeds, run inference on a fine-tuned XGBoost
  model (updated weekly via active learning), and surface alerts to clinicians within
  90 seconds of data ingestion. The model was trained on 2.3M de-identified patient
  encounters containing PHI-derived features; MedCore has executed BAAs with AWS but
  faces an upcoming Joint Commission audit requiring full model lineage, drift detection
  logs, and inference audit trails.


  Complicating factors: (1) Three hospitals run on-premises Epic systems with intermittent
  connectivity (15-minute outages occur ~3x/week), (2) the ML team wants to A/B test
  a competing LightGBM model without disrupting live alerts, (3) regulatory counsel
  requires that any PHI used in retraining never leave a specific AWS region (us-east-1),
  and (4) the InfoSec team mandates that model artifacts be encrypted with customer-managed
  KMS keys and that no model weights be accessible via public endpoints.


  Please provide:

  1. A complete AWS architecture diagram description (services, data flow, network
  topology) addressing all four constraints

  2. A SageMaker MLOps pipeline design for weekly retraining with PHI data residency
  controls

  3. Specific SageMaker endpoint configuration for A/B testing with traffic splitting
  and automatic rollback triggers

  4. A drift detection and audit logging strategy meeting Joint Commission requirements

  5. A Python code snippet using Boto3 that configures a SageMaker production variant
  with KMS encryption and sets up CloudWatch alarms for model quality drift thresholds'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: hard
