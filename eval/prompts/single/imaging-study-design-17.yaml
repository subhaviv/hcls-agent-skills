id: imaging-study-design-17
prompt: 'You are coordinating a multi-site longitudinal MRI study examining hippocampal
  atrophy as a biomarker for early Alzheimer''s disease progression across 4 scanner
  sites (2× Siemens Prisma 3T, 1× GE Discovery MR750 3T, 1× Philips Ingenia 3T). The
  study enrolls 280 participants (140 MCI converters, 140 stable MCI) with T1-weighted
  MPRAGE acquisitions at baseline, 12 months, and 24 months. Site-specific acquisition
  parameters vary slightly: TI ranges from 900–1100ms, voxel sizes from 0.9–1.2mm
  isotropic, and parallel imaging factors differ across vendors.


  Your radiomics pipeline extracts 47 hippocampal shape and intensity features per
  timepoint. Preliminary ICC analysis shows 12 features have test-retest ICC < 0.75
  at the same-site level before any harmonization.


  Please provide:


  1. A harmonization strategy recommendation comparing ComBat, longitudinal ComBat
  (longComBat), and DeepHarmonization for this specific design, with justification
  for which to apply and at which pipeline stage

  2. A concrete preprocessing pipeline (ordered steps) optimized for longitudinal
  hippocampal volumetry, specifying registration target choice (MNI vs. subject-native
  space) with rationale

  3. Python pseudocode implementing longComBat harmonization on a feature matrix with
  site and timepoint covariates, preserving biological variance for the MCI conversion
  label

  4. A statistical power re-estimation approach accounting for the 12 features with
  low ICC, including whether to drop, transform, or correct these features before
  the primary analysis'
target_skills:
- imaging-study-design
domain: imaging
difficulty: intermediate
