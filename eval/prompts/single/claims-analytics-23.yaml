id: claims-analytics-23
prompt: 'Here is test question #23 of 30:


  ---


  You are a healthcare data analyst working with a regional billing clearinghouse.
  Your team has received a batch of X12 837P professional claims files from a primary
  care group (Provider NPI: 1234567890) covering January through March 2024. The batch
  contains approximately 4,200 claim transactions across 1,850 unique patients.


  Your task is to analyze the Evaluation & Management (E&M) code distribution for
  this provider and compare it against expected specialty peer benchmarks for family
  medicine. The provider''s submitted E&M distribution is as follows:


  - 99211: 2% (84 claims)

  - 99212: 5% (210 claims)

  - 99213: 8% (336 claims)

  - 99214: 52% (2,184 claims)

  - 99215: 33% (1,386 claims)


  Industry benchmark for family medicine typically shows: 99213 ~35%, 99214 ~40%,
  99215 ~10–12%.


  Please provide the following deliverables:


  1. **Python code** using pandas to ingest a flat CSV representation of these claim
  counts and calculate the percentage deviation from benchmark for each E&M code,
  flagging any code where the provider''s rate exceeds the benchmark by more than
  15 percentage points.


  2. **A brief statistical interpretation** (3–5 sentences) explaining what this distribution
  pattern suggests about potential upcoding behavior, referencing the specific codes
  with the largest deviations.


  3. **A recommended SQL query** that, given a claims table with columns `(claim_id,
  npi, cpt_code, service_date, billed_amount)`, would extract the monthly trend of
  99215 claims as a percentage of total E&M claims for this NPI over the three-month
  period.'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: easy
