id: risk-adjustment-strategy-28
prompt: 'A Medicare Advantage plan with 42,000 members is navigating the 2025 transition
  year, where CMS applies a blended rate of 33% V28 and 67% V24 for risk score calculation.
  Your analytics team has identified a cohort of 3,800 members with documented Type
  2 diabetes with chronic kidney disease Stage 3 (ICD-10: E11.65 + N18.3).


  Under V24, this condition maps to HCC 18 (Diabetes with Chronic Complications) with
  a coefficient of 0.318, and CKD Stage 3 separately maps to HCC 136 with a coefficient
  of 0.289. Under V28, the mapping consolidates differently — E11.65 maps to HCC 37
  (coefficient 0.191) and N18.3 maps to HCC 329 (coefficient 0.144), with a disease
  interaction term of 0.213 for diabetes-CKD combinations.


  Additionally, 1,200 of these members also have documented heart failure (I50.9),
  which triggers hierarchy and interaction rules differently across model versions.


  Please provide:


  1. A step-by-step blended RAF score calculation for a single representative member
  with all three conditions, showing V24 and V28 component scores separately before
  blending

  2. An analysis of whether the V28 consolidation creates a net RAF gain or loss versus
  V24 for this specific comorbidity cluster, and by how much per member on average

  3. A prioritization framework for chart review outreach — which sub-segment of these
  3,800 members should be targeted first for prospective coding gap closure, and why

  4. Specific ICD-10 coding guidance and documentation requirements that would be
  audit-defensible for capturing the diabetes-CKD-heart failure triad under both model
  versions

  5. An estimate of annualized revenue impact across the full 3,800-member cohort
  assuming an average Medicare benchmark of $850 PMPM'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: hard
