id: risk-adjustment-strategy-24
prompt: 'A Medicare Advantage plan serving 12,400 members is preparing for the 2024
  payment year, which uses a blended transition methodology combining V24 (33%) and
  V28 (67%) model weights. Your analytics team has pulled a cohort of 847 members
  who have documented Type 2 diabetes with chronic kidney disease Stage 3 (ICD-10:
  E11.65 + N18.3) in their 2023 medical records, but only 612 of these members had
  both conditions coded on a qualifying claim submitted to CMS.


  The plan''s medical director wants to understand the financial and strategic implications
  before launching a targeted recapture campaign. Specifically, she needs:


  1. **HCC Mapping Analysis**: For the ICD-10 codes E11.65 and N18.3, identify the
  corresponding HCC categories under both V24 and V28 models, explain how the disease
  hierarchy resolves when both diabetes-with-CKD and standalone CKD codes are present,
  and calculate the incremental RAF score contribution under the blended 2024 methodology
  (assume a base RAF of 1.0 for illustration).


  2. **Gap Identification**: For the 235 members with undercoded conditions, describe
  what constitutes audit-defensible documentation requirements to support recapture,
  including what clinical evidence must appear in the medical record.


  3. **Revenue Impact Estimate**: Using a benchmark county rate of $950 PMPM and assuming
  the plan''s average risk score increases by the incremental RAF you calculated,
  estimate the annualized revenue impact of successfully recapturing all 235 members.


  4. **Recapture Strategy**: Recommend a prospective vs. retrospective approach for
  this specific cohort, with justification based on the coding gap characteristics
  and timeline constraints for 2024 payment year submission.'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: intermediate
