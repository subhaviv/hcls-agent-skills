  Patient is David Williams, member HUM-5534112, DOS 2026-05-02, claim CLM-2026-441872.
  The operative report confirms a complete colonoscopy to the cecum. Our contract
  is 80% of MPFS for GI endoscopy procedures. Is this a downcode and how do we
  dispute it?'
