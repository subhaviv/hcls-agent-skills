id: quality-measures-11
prompt: 'Here is test question #11 of 30:


  ---


  You are analyzing claims data for a regional health plan with 45,000 commercial
  members to calculate the **Breast Cancer Screening (BCS) HEDIS measure** for the
  current measurement year (January 1 – December 31, 2024).


  Your data environment includes three tables:

  - `members` (member_id, dob, gender, enrollment_start, enrollment_end, plan_type)

  - `claims` (claim_id, member_id, service_date, procedure_code, diagnosis_code, provider_npi)

  - `lab_results` (result_id, member_id, test_date, test_name, result_value)


  **Known parameters:**

  - Eligible population: females aged 52–74 as of December 31, 2024

  - Continuous enrollment requirement: enrolled for 11 out of 12 months in 2024, with
  no more than one gap

  - Numerator event: mammography (CPT codes 77067, 77066, 77065) or bilateral screening
  mammogram within the measurement year or the year prior (2023)

  - Your member data shows approximately 6,200 women fall in the eligible age range

  - Preliminary chart review suggests roughly 71% have a qualifying mammogram on file


  **Please provide the following deliverables:**


  1. A SQL query that identifies the **denominator population** (applying age and
  continuous enrollment criteria)

  2. A SQL query that identifies the **numerator** (members with a qualifying mammogram
  in 2023 or 2024)

  3. A final SQL query that **calculates the BCS rate** as a percentage, rounded to
  two decimal places

  4. A brief explanation (3–5 sentences) of any common **exclusion criteria** that
  should be considered for BCS and how they would modify the denominator query'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: easy
