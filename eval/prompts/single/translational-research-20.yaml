id: translational-research-20
prompt: 'A biotech company has completed a 24-month natural history study in 847 prodromal
  Huntington''s disease (HTT CAG ≥40) participants, stratifying by CAG-Age Product
  (CAP) score into low (CAP 40–65, n=312), medium (CAP 66–100, n=341), and high (CAP
  >100, n=194) groups. They have identified a putative target: SRSF6, a splicing factor
  whose dysregulation correlates with mutant HTT aggregation. Supporting evidence
  includes: (1) a GWAS hit at chr20q13.11 (rs7274811, p=2.1×10⁻⁸) modifying age of
  onset by ~3.1 years per risk allele; (2) an eQTL in caudate showing SRSF6 upregulation
  in risk allele carriers (β=0.34, FDR=0.003); (3) a Mendelian randomization estimate
  suggesting SRSF6 expression causally accelerates onset (IVW OR=1.41, 95% CI 1.18–1.68);
  but (4) a CRISPR knockdown of SRSF6 in YAC128 mice showed only 12% reduction in
  aggregates at 6 months with no motor benefit, and (5) a published proteomics dataset
  in post-mortem HD caudate shows SRSF6 protein is actually *decreased* 2.4-fold versus
  controls (FDR<0.01), directly contradicting the eQTL direction.


  Given this conflicting evidence package, provide: (A) a structured target confidence
  scorecard rating genetic, functional, and disease-relevance evidence with explicit
  flags for the contradictions; (B) a mechanistic hypothesis reconciling the eQTL-proteomics
  discordance; (C) a minimal 18-month "fail-fast" experimental plan to resolve the
  key uncertainties before IND filing, specifying model systems, assays, and go/no-go
  criteria; and (D) recommended biomarker strategy for target engagement if the program
  advances to FIH, including context-of-use statement and matrix selection rationale.'
