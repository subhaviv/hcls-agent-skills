id: hedis-measure-specification-19
prompt: 'A regional health plan (MedFirst Alliance) is preparing for its HEDIS 2024
  measurement year and has identified a complex enrollment scenario affecting their
  Controlling High Blood Pressure (CBP) measure performance.


  **Patient Cohort Data:**

  - 847 members identified with hypertension diagnosis (ICD-10: I10) during the measurement
  year

  - 312 members had a gap in enrollment between days 91–105 of the measurement year
  (15-day gap)

  - 89 members were enrolled in hospice during months 3–4

  - 156 members had a blood pressure reading documented only in a telehealth visit
  (audio-only modality)

  - 203 members turned 66 during the measurement year and had Medicare as secondary
  payer

  - 41 members had ESRD diagnosis codes present alongside hypertension


  **Specific Questions:**


  1. **Enrollment Analysis:** For the 312 members with the 15-day enrollment gap,
  provide a step-by-step determination of whether they satisfy CBP continuous enrollment
  requirements, citing the specific HEDIS allowable gap rule and how days are counted.


  2. **Exclusion Evaluation:** For the 89 hospice members and 41 ESRD members, specify
  which HEDIS exclusion category applies to each group, whether these are optional
  or mandatory exclusions, and the required documentation standards.


  3. **Telehealth Numerator Eligibility:** Analyze whether the 156 audio-only telehealth
  BP readings qualify for CBP numerator compliance under HEDIS 2024 telehealth guidance,
  distinguishing between audio-only vs. audio-video modalities.


  4. **Care Gap Prioritization:** Given that CBP carries a 3x weight in CMS Star Ratings,
  design a prioritization algorithm (in Python pseudocode) that ranks the remaining
  eligible members by likelihood of gap closure, incorporating age, visit history,
  and medication adherence proxy.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: hard
