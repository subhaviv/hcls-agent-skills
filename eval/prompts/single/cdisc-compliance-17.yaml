id: cdisc-compliance-17
prompt: 'A mid-size CRO is preparing SDTM datasets for an FDA NDA submission of a
  Phase 3 oncology trial (N=412 patients). The trial collected tumor assessment data
  including target lesion measurements, non-target lesion response, and overall response
  per RECIST 1.1 criteria. The data programmer is uncertain how to properly structure
  this data across SDTM domains.


  Specifically, the following variables need to be mapped:

  - TRTRESP (overall response: CR, PR, SD, PD) collected at each visit

  - Individual target lesion diameter measurements (up to 6 lesions per patient, labeled
  TL1–TL6)

  - Sum of diameter (SOD) calculations derived from TL1–TL6

  - Non-target lesion qualitative assessments (present/absent/not assessed)

  - Date of confirmed response and date of progression


  The programmer is considering splitting data between the TU (Tumor/Lesion Identification),
  TR (Tumor Results), and RS (Response) domains but is unsure about: (1) which variables
  belong in each domain, (2) whether SUPPQUAL is needed for the individual lesion
  identifiers TL1–TL6, (3) how to handle the SOD as a derived result, and (4) how
  RELREC should link records across TU, TR, and RS.


  Please provide:

  1. A domain mapping table showing which variables belong in TU, TR, and RS with
  key SDTM variable names (TUDTC, TRORRES, RSSTRESC, etc.)

  2. A recommendation on whether SUPPQUAL is required for lesion labels TL1–TL6 and
  the rationale

  3. The correct TRLNKID/TRLNKGRP usage for linking individual lesion measurements
  to SOD records

  4. A sample RELREC structure (5–8 rows) connecting a single patient''s TU, TR, and
  RS records'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: intermediate
