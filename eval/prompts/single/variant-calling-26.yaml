id: variant-calling-26
prompt: 'You are setting up a somatic variant calling pipeline for a cancer genomics
  study involving 45 tumor-normal paired samples from colorectal cancer patients.
  The tumors have estimated purity ranging from 0.35 to 0.85 based on pathology reports,
  and sequencing was performed on an Illumina NovaSeq 6000 with 150bp paired-end reads
  at approximately 120x tumor coverage and 60x normal coverage using a whole exome
  capture kit (Twist Comprehensive Exome, ~36 Mb target).


  Your team wants to identify somatic SNVs and indels using GATK Mutect2, but you
  are concerned about false positives given the low-purity samples. You have access
  to the gnomAD germline resource, a panel of normals (PoN) built from 40 unmatched
  normal samples sequenced on the same platform, and the COSMIC v97 database.


  Please provide:


  1. A complete GATK Mutect2 command for a single tumor-normal pair that incorporates
  the appropriate resources, including recommended flags to handle low-purity tumors
  (e.g., `--tumor-lod-to-emit`, `--min-allele-fraction`) with specific parameter values
  justified for this purity range.


  2. The subsequent FilterMutectCalls command including the `--tumor-segmentation`
  flag workflow (i.e., what additional GATK tools must run before FilterMutectCalls,
  and in what order).


  3. An explanation of why the PoN built from only 40 normals may introduce specific
  limitations in this WES context, and what minimum threshold GATK recommends.


  4. A post-filtering strategy to prioritize high-confidence somatic variants in known
  colorectal cancer driver genes (e.g., APC, KRAS, TP53, PIK3CA) using bcftools or
  similar command-line tools.'
target_skills:
- variant-calling
domain: genomics
difficulty: intermediate
