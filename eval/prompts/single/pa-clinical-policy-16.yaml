id: pa-clinical-policy-16
prompt: 'A 58-year-old Medicare Advantage patient with moderate-to-severe plaque psoriasis
  (BSA 22%, PASI 18) is requesting prior authorization for secukinumab (Cosentyx)
  300mg. The payer''s clinical policy requires: (1) documented failure of at least
  two conventional systemic therapies (methotrexate, cyclosporine, or acitretin) at
  adequate doses for minimum 12 weeks each, OR (2) contraindication to conventional
  therapies with supporting documentation. Chart review reveals the patient completed
  10 weeks of methotrexate 15mg/week (discontinued due to elevated LFTs at 2.5x ULN)
  and 14 weeks of cyclosporine 3mg/kg/day (discontinued due to hypertension and creatinine
  rise to 1.8mg/dL). The patient has documented comorbid psoriatic arthritis affecting
  6 joints.


  Please provide the following deliverables:


  1. **PA Criteria Analysis**: Evaluate whether this patient''s treatment history
  satisfies the payer''s step therapy requirements, specifically addressing whether
  the methotrexate trial duration (10 weeks vs. required 12 weeks) constitutes adequate
  trial given the documented adverse events.


  2. **Medical Necessity Letter Framework**: Draft the key clinical arguments for
  a Letter of Medical Necessity, incorporating the adverse event documentation, psoriatic
  arthritis comorbidity, and any relevant dermatology society guidelines (AAD/NPF)
  that support biologics after intolerance to conventional therapy.


  3. **Appeal Strategy**: If the PA is initially denied for insufficient methotrexate
  trial duration, outline a structured peer-to-peer review talking points document,
  including which clinical evidence and safety data should be cited to support that
  adverse-event-driven discontinuation at 10 weeks constitutes clinical failure.


  4. **FHIR Da Vinci PAS Mapping**: Identify which specific FHIR resources and extensions
  would capture the step therapy failure documentation for electronic prior authorization
  submission under the Da Vinci PAS framework.'
