id: pa-clinical-policy-18
prompt: 'A 58-year-old Medicare Advantage patient with treatment-resistant depression
  (TRD) has failed adequate trials of sertraline (150mg/day × 8 weeks) and venlafaxine
  XR (225mg/day × 10 weeks), both documented with PHQ-9 scores showing <25% improvement.
  The treating psychiatrist is requesting prior authorization for esketamine (Spravato)
  intranasal 56mg twice weekly. The payer''s current clinical policy requires failure
  of THREE adequate antidepressant trials before approving esketamine, while FDA labeling
  and the 2023 APA Practice Guideline for MDD specify two failed trials as sufficient
  for TRD designation.


  The patient also has a comorbid history of substance use disorder (alcohol, in remission
  18 months per AUDIT-C score of 1), which the payer''s policy lists as a relative
  contraindication requiring additional documentation.


  **Deliverables requested:**


  1. **Policy conflict analysis**: Evaluate the clinical and regulatory tension between
  the payer''s three-trial requirement versus FDA labeling/APA guideline two-trial
  standard, citing which authoritative sources support the appeal argument.


  2. **Medical necessity letter framework**: Draft the key clinical arguments (3-4
  paragraphs) a physician should include in a peer-to-peer review or formal appeal,
  specifically addressing the SUD comorbidity concern with current evidence on esketamine
  safety in patients with remote alcohol use disorder.


  3. **FHIR Da Vinci PAS implementation note**: Identify which specific FHIR resource
  elements (ClaimResponse, Task, or CommunicationRequest) should capture the "step
  therapy exception" rationale, and describe how the `reasonCode` and `supportingInfo`
  fields should be populated to document the guideline conflict for automated prior
  auth systems.


  4. **Escalation pathway**: If the peer-to-peer review fails, outline the Medicare
  Advantage appeals process stages with realistic timelines under 42 CFR § 422.566-422.618.'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: hard
