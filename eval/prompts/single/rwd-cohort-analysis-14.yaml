id: rwd-cohort-analysis-14
prompt: 'You are conducting a real-world evidence study using a commercial claims
  database (Optum CDM, 2018–2023) to compare time to first major adverse cardiovascular
  event (MACE) between patients newly initiated on SGLT2 inhibitors versus GLP-1 receptor
  agonists for type 2 diabetes management.


  Your cohort construction identified 18,420 SGLT2i initiators and 14,755 GLP-1 RA
  initiators after applying the following inclusion criteria: ≥1 T2DM diagnosis (ICD-10:
  E11.x), ≥12 months continuous enrollment pre-index, age 40–80, and no prior MACE.
  MACE is defined as MI (ICD-10: I21.x), stroke (I63.x), or CV death (I46.x, I51.x).


  After 1:1 nearest-neighbor propensity score matching (caliper = 0.02 SD), your matched
  cohort contains 11,340 pairs. Pre-match SMD for HbA1c category, baseline CV risk
  score, insulin use, and eGFR ranged from 0.08 to 0.31; post-match SMDs are all <0.10
  except eGFR (SMD = 0.13).


  Please provide the following:


  1. **Python code** to generate Kaplan-Meier curves for both treatment groups with
  95% confidence bands and log-rank test p-value, using a fictional but realistic
  dataset structure (columns: patient_id, treatment, time_to_event_days, event_flag).


  2. **Python code** to fit a Cox proportional hazards model adjusting for age, sex,
  baseline CV risk score, eGFR, and insulin use, and output a formatted hazard ratio
  table with 95% CIs.


  3. An assessment of whether the residual imbalance in eGFR (SMD = 0.13) warrants
  additional action, and what that action should be.


  4. Code to run Schoenfeld residual tests and interpret whether the proportional
  hazards assumption holds for the treatment variable.'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: intermediate
