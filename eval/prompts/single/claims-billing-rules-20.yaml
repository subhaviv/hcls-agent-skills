id: claims-billing-rules-20
prompt: 'A regional Medicare Advantage plan is conducting a targeted audit of a high-volume
  orthopedic group practice (Ortho Partners LLC) after a data analytics flag. The
  practice has 8 surgeons and billed 2,847 claims over 6 months. The following anomalies
  were identified:


  **Billing Pattern Data:**

  - Modifier 59 appended to CPT 29881 (knee meniscectomy) paired with CPT 29876 (synovectomy)
  in 73% of cases — industry benchmark is 12%

  - Modifier 25 used on 94% of same-day E&M visits (99213/99214) accompanying minor
  surgical procedures — benchmark is 31%

  - CPT 27447 (total knee arthroplasty) billed with CPT 20610 (joint aspiration) during
  the 90-day global period in 156 instances, using modifier 79

  - Two surgeons (Dr. Karev and Dr. Yang) show identical modifier usage ratios across
  all CPT codes to three decimal places

  - 23 claims show the same patient receiving procedures at two different facilities
  simultaneously (Place of Service 11 and 22 on the same date/time)


  **Your deliverables:**

  1. Analyze each anomaly and classify it as likely coding error, waste, or potential
  fraud — with specific CMS/NCCI regulatory citations supporting each classification

  2. Explain the NCCI edit logic governing the CPT 29881/29876 pair and when modifier
  59 is legitimately applicable

  3. Assess whether modifier 79 appropriately bypasses the global surgery period for
  CPT 20610, and under what clinical circumstances this would be valid versus abusive

  4. Interpret the statistical significance of identical modifier ratios between two
  providers and describe what investigative steps should follow

  5. Define the "impossible day" scenario present in the data and outline the specific
  CMS fraud referral threshold and escalation pathway'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: hard
