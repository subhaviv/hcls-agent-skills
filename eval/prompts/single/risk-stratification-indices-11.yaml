id: risk-stratification-indices-11
prompt: 'A care management team at Riverside Community Hospital is reviewing 30-day
  readmission risk for a cohort of 450 recently discharged patients. The team has
  collected the following aggregate data for the cohort:


  - Average length of stay: 4.2 days

  - 38% arrived via emergency department

  - 22% had a prior admission within the last 6 months

  - Top comorbidities documented: congestive heart failure (31%), type 2 diabetes
  (44%), chronic kidney disease stage 3 (27%), COPD (19%), and hypertension (68%)


  The team wants to implement the **LACE Index** as their primary readmission risk
  screening tool but is unsure how to interpret scores and set intervention thresholds.


  Please provide the following:


  1. **Brief explanation** of how the LACE Index is calculated, including what each
  letter in the acronym represents and the scoring range for each component.


  2. **Score interpretation guide**: Define low, moderate, and high risk categories
  using standard LACE cutoff thresholds, and explain what clinical actions are typically
  recommended at each tier.


  3. **Sample calculation**: Walk through a concrete example patient — a 67-year-old
  with a 5-day inpatient stay, admitted through the ED, with a LACE acuity score of
  1, and 2 prior admissions in the past 6 months — showing the step-by-step LACE score
  and resulting risk category.


  4. **One limitation** of using LACE alone for this cohort, given the high prevalence
  of chronic conditions documented, and suggest one complementary index or data source
  that could improve stratification accuracy.'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: easy
