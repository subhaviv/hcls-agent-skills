id: radiology-preprocessing-27
prompt: 'You are processing a dataset of 847 T1-weighted MRI scans from a multi-site
  neuroimaging study (3 sites: Site A with 312 scans at 1.5T, Site B with 289 scans
  at 3T, Site C with 246 scans at 3T). All scans were acquired with varying voxel
  sizes: Site A at 1.2×1.2×1.5mm, Sites B and C at 1.0×1.0×1.0mm isotropic. You need
  to build a standardized preprocessing pipeline that addresses inter-site harmonization
  before downstream cortical thickness analysis.


  Your pipeline must include: (1) reorientation to standard space using fslreorient2std,
  (2) brain extraction using HD-BET with default parameters, (3) N4 bias field correction
  via ANTs with 4 iterations across 3 shrink factors [4,2,1] and convergence threshold
  1e-6, (4) affine registration to MNI152 1mm template using ANTs SyN, and (5) intensity
  normalization.


  Specific concerns have emerged during QC review: 15 scans from Site A show significant
  Gibbs ringing artifacts, and 22 scans from Site B have partial brain coverage (superior
  slices missing approximately 12mm of cortex). Additionally, you suspect the multi-site
  acquisition differences may introduce systematic bias in cortical thickness measurements
  even after standard preprocessing.


  Please provide: (1) A complete bash/Python preprocessing script implementing all
  pipeline steps with proper parameter justification, (2) specific handling strategies
  for the 15 artifact-affected and 22 partial-coverage scans, (3) a recommendation
  on whether to apply additional ComBat harmonization after preprocessing and at what
  stage, and (4) QC metrics you would extract to validate successful preprocessing
  across all 847 scans.'
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: intermediate
