id: ml-researcher-26
prompt: 'A hospital system has collected a retrospective cohort of 8,340 adult ICU
  patients across three sites (Site A: n=4,200, Site B: n=2,650, Site C: n=1,490)
  to predict 30-day mortality. The dataset includes 47 structured EHR features (vitals,
  labs, comorbidities), free-text clinical notes from the first 24 hours, and ICD-10
  codes. The outcome prevalence is 18.3% overall but varies by site: Site A 16.1%,
  Site B 19.8%, Site C 22.4%. The team plans to use a gradient boosting model on structured
  features only, evaluate with AUROC, and split data randomly 70/20/10 for train/validation/test.


  Several concerns have been raised:

  1. Site C is a safety-net hospital serving predominantly low-income and minority
  patients

  2. The notes contain physician impressions that may encode implicit prognosis, creating
  potential leakage

  3. The team wants to eventually seek FDA 510(k) clearance as a clinical decision
  support tool


  Please provide:

  (a) A critique of the proposed train/validation/test splitting strategy, explaining
  at least two specific risks and recommending an alternative approach that accounts
  for site heterogeneity

  (b) An explanation of why AUROC alone is insufficient here, with two additional
  metrics the team should report and the clinical rationale for each

  (c) A fairness audit plan for Site C patients, naming at least two specific fairness
  metrics, how to compute them, and what thresholds would trigger model revision

  (d) A brief checklist (minimum 5 items) of what the team must address before an
  FDA 510(k) submission, referencing relevant FDA guidance documents or frameworks
  by name'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: intermediate
