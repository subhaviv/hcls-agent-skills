id: claims-billing-rules-30
prompt: 'A Medicare compliance audit team has flagged a high-volume orthopedic surgery
  group for potential FWA after claims analysis revealed the following pattern over
  a 6-month period across 847 patients:


  - Modifier 59 appended to CPT 29881 (knee arthroscopy with meniscectomy) in 73%
  of cases where CPT 29880 was also billed on the same date

  - Modifier 25 used on 91% of E&M visits (99213-99215) performed on the same day
  as minor procedures (CPT 20610, joint injections)

  - Global surgery period violations suspected: follow-up E&M visits billed within
  90-day global periods for 312 patients post-arthroscopy, using modifier 24 to bypass
  edits

  - Average E&M level for established patients is 99215 (Level 5) at 68% frequency,
  compared to a national benchmark of 12% for this specialty


  The audit team is uncertain whether these patterns represent systematic fraud, aggressive
  but potentially defensible coding practices, or widespread coder education failures.


  **Provide the following:**

  1. Analyze each of the four billing patterns against CMS/NCCI rules, identifying
  which represent clear violations versus defensible gray areas

  2. Explain the specific NCCI edit logic that applies to the CPT 29880/29881 pair
  and when modifier 59 is legitimately vs. improperly applied

  3. Describe the evidentiary thresholds that distinguish coding error from fraudulent
  intent under FWA investigation standards

  4. Recommend a structured audit methodology with specific documentation review criteria
  for each pattern

  5. Identify which pattern poses the highest False Claims Act liability exposure
  and explain why'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: hard
