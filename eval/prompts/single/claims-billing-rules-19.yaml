id: claims-billing-rules-19
prompt: 'A Medicare Part B claims audit has flagged a high-volume orthopedic surgery
  group practice for potential FWA. The practice performs arthroscopic knee procedures
  (CPT 29881) and bills modifier 59 on CPT 29876 in 73% of cases where both codes
  appear on the same claim — significantly above the national benchmark of 12%. Additionally,
  the practice shows the following patterns over a 6-month period (847 total claims):


  - 312 claims bill E&M code 99215 on the same date as a surgical procedure, with
  modifier 25 appended in all cases

  - 189 claims bill CPT 29881 during the global surgery period of a prior procedure
  (average 14 days post-op)

  - 64 claims show identical procedure code combinations across different patients
  on the same date of service

  - The practice''s average E&M level is 4.8, compared to a specialty peer average
  of 3.2


  Your task is to:

  1. Analyze each of the four billing patterns above and determine whether each represents
  a likely coding error, potential fraud, or a legitimate billing scenario — providing
  specific NCCI edit logic and CMS rules that apply to each pattern

  2. Identify which single pattern presents the strongest evidence of intentional
  fraud versus administrative error, and explain your reasoning using FWA investigation
  methodology

  3. Describe the specific documentation elements an auditor should request to distinguish
  fraud from error for the two highest-risk patterns

  4. Propose a quantitative risk-scoring framework (with weighted criteria) that could
  be applied systematically to flag similar practices in a claims database, including
  at least five scoring variables with defined thresholds'
