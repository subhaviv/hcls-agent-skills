id: hedis-measure-specification-12
prompt: 'A regional health plan is preparing for HEDIS MY2024 data submission and
  needs help analyzing their Controlling High Blood Pressure (CBP) measure performance.
  Their current data shows the following:


  - Total attributed members aged 18–85: 12,400

  - Members with a diagnosis of hypertension: 3,850

  - Members meeting continuous enrollment criteria (11 of 12 months): 3,210

  - Members with documented blood pressure <140/90 at most recent visit: 1,890

  - Members excluded due to ESRD: 145

  - Members excluded due to pregnancy: 38

  - Members excluded due to advanced illness: 67


  The plan''s current Star Rating for CBP is 3 stars, and they are targeting 4 stars
  for the upcoming cycle. The plan''s care manager, Sarah, is unsure whether members
  who had a blood pressure reading of 139/91 qualify for numerator compliance, and
  whether a reading taken during a telehealth visit counts as a valid numerator event
  under HEDIS specifications.


  Please provide the following deliverables:


  1. **Calculate the current CBP HEDIS rate** using the data provided, showing your
  denominator and numerator derivation step by step.

  2. **Clarify the blood pressure threshold rule** — does 139/91 meet numerator criteria,
  and explain why or why not.

  3. **Clarify telehealth visit validity** for blood pressure numerator events under
  HEDIS MY2024 specifications.

  4. **Identify the minimum number of additional compliant members** needed to achieve
  a 4-star threshold (assume 4 stars requires ≥65% compliance).

  5. **Recommend two actionable care gap closure strategies** the plan could implement
  to reach the target rate.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: easy
