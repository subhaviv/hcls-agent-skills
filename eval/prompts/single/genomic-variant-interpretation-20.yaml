id: genomic-variant-interpretation-20
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory identifies a variant in **BRCA2**:
  c.8754+3A>G (NM_000059.4). The following evidence is available:


  - **SpliceAI scores**: Donor loss: 0.61, Acceptor loss: 0.02, Donor gain: 0.08,
  Acceptor gain: 0.03

  - **MaxEntScan**: Reference score 9.2 → Variant score 4.7 (49% reduction)

  - **ClinVar**: 2 submissions — one "Uncertain Significance" (2019, no assertion
  criteria), one "Likely Pathogenic" (2021, criteria provided)

  - **gnomAD v3.1 (non-cancer)**: 3 heterozygous carriers out of 113,460 alleles (AF
  = 2.65×10⁻⁵); no homozygotes

  - **REVEL score**: Not applicable (splice variant)

  - **Functional data**: No published RNA studies for this specific variant; a nearby
  variant c.8754+4A>T has published evidence of partial exon 21 skipping (~40% aberrant
  transcript)

  - **Family history**: Proband''s mother and maternal aunt both affected with breast
  cancer; no segregation data available for this variant specifically


  **Deliverables requested:**


  1. Apply PVS1 with appropriate strength adjustment for this non-canonical splice
  variant, citing the Tayoun et al. 2018 decision framework

  2. Evaluate each applicable ACMG/AMP criterion (PS3, PM2, PP3, BP4, BS1, BS2) with
  explicit strength assignments

  3. Resolve the conflicting ClinVar submissions using ACMG guidelines for evidence
  weighting

  4. Provide a final classification with a semi-quantitative Bayesian points tally
  (using the Tavtigian et al. 2020 framework)

  5. Recommend clinical reporting language and genetic counseling considerations given
  the classification uncertainty'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: hard
