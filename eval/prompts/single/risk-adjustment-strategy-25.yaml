id: risk-adjustment-strategy-25
prompt: 'A Medicare Advantage plan with 18,400 members is navigating the CMS-HCC V24-to-V28
  blended transition period (75% V28 / 25% V24 weighting for payment year 2026). Your
  analytics team has identified a cohort of 340 members with documented Type 2 diabetes
  with chronic kidney disease (CKD) Stage 3 in their medical records, but current
  claims data shows inconsistent ICD-10 coding across the membership.


  Specifically:

  - 120 members have E11.65 (Type 2 diabetes with hyperglycemia) + N18.30 (CKD Stage
  3, unspecified) coded

  - 95 members have only E11.65 coded, with CKD mentioned in clinical notes but no
  N18 code submitted

  - 85 members have E11.9 (Type 2 diabetes without complications) + N18.30 coded

  - 40 members have only N18.30 coded, with diabetes referenced in problem lists


  Under V24, diabetes with CKD maps to HCC 18, while under V28, the same condition
  maps to HCC 37. The plan''s medical director wants to understand the RAF score implications
  before launching a prospective coding improvement initiative.


  Please provide:

  1. An analysis of how the disease hierarchy and HCC mapping differences between
  V24 and V28 affect RAF score calculations for each of the four member sub-groups
  under the 2026 blended weighting

  2. A prioritized recapture strategy identifying which sub-groups represent the highest-value,
  audit-defensible coding opportunities

  3. A concrete ICD-10 coding recommendation for each sub-group that would satisfy
  both clinical accuracy and CMS audit standards

  4. An estimate of the aggregate RAF score impact if all correctable coding gaps
  are addressed across the 340-member cohort'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: intermediate
