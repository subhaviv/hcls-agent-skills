id: trajectory-analysis-27
prompt: 'I''m analyzing single-cell RNA-seq data from a human hematopoietic stem cell
  differentiation study with 8,400 cells spanning the myeloid lineage (HSCs → CMPs
  → GMPs → monocytes and granulocytes). I''ve already completed preprocessing, clustering
  (12 clusters), and have spliced/unspliced count matrices generated by velocyto.
  My AnnData object is called `adata` with UMAP coordinates in `adata.obsm[''X_umap'']`
  and cluster labels in `adata.obs[''cell_type'']`.


  I want to perform a complete RNA velocity and fate mapping analysis using scVelo
  and CellRank. Specifically, I need:


  1. **scVelo workflow**: Code to run scVelo in dynamical mode (not steady-state),
  including filtering genes (min_shared_counts=20, n_top_genes=2000), moment computation,
  and velocity graph generation. Explain why dynamical mode is preferred for this
  multi-branching hematopoietic system.


  2. **Terminal state identification**: Use CellRank''s `RealTimeKernel` combined
  with a `VelocityKernel` to compute a transition matrix, then identify terminal states
  using the `GPCCA` estimator. The known terminal populations are monocytes (cluster
  8) and granulocytes (cluster 11) — explain how to validate these computationally
  are recovered correctly.


  3. **Fate probability visualization**: Code to compute and plot absorption probabilities
  toward the monocyte vs. granulocyte lineages, projected onto UMAP, and generate
  a lineage driver gene analysis for the top 15 genes distinguishing monocyte vs.
  granulocyte fate commitment.


  4. **Troubleshooting guidance**: My velocity arrows appear random/noisy in the GMP
  cluster — list three specific diagnostic steps to identify whether this reflects
  biology (genuine plasticity) or technical artifacts (poor splicing model fit).'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: intermediate
