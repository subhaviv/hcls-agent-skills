id: clinical-data-standards-13
prompt: 'A clinical trial team is preparing an adverse event frequency table for a
  regulatory submission. They have collected the following AEs from 120 participants
  and need help with MedDRA coding and SOC grouping:


  - "upset stomach" reported by 15 patients

  - "throwing up" reported by 12 patients

  - "loose stools" reported by 18 patients

  - "heart racing" reported by 8 patients

  - "fast heartbeat" reported by 8 patients

  - "headache" reported by 22 patients

  - "mild head pain" reported by 6 patients


  Please provide the following deliverables:


  1. **MedDRA coding**: For each verbatim term above, identify the most appropriate
  Lowest Level Term (LLT) and its corresponding Preferred Term (PT). Explain your
  reasoning for any terms where multiple PT options might exist.


  2. **SOC assignment**: Assign each PT to its primary System Organ Class (SOC). List
  the full SOC name as it appears in MedDRA.


  3. **Consolidation recommendation**: Identify which verbatim terms should be consolidated
  under a single PT in the frequency table, and calculate the combined patient count
  for each consolidated PT.


  4. **HLT grouping**: Group all identified PTs under their appropriate High Level
  Terms (HLTs), and explain in one sentence why grouping at HLT level rather than
  PT level might or might not be appropriate for this submission''s AE summary table.'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: easy
