id: pa-decision-automation-29
prompt: 'A regional health plan processes approximately 4,200 prior authorization
  requests monthly for specialty biologics (adalimumab, ustekinumab, secukinumab)
  treating inflammatory conditions. Your PA automation team has trained a gradient
  boosting classifier on 18 months of historical decisions (78,000 records), achieving
  91% overall accuracy. However, post-deployment audit reveals a troubling pattern:
  the model approves 94% of requests from large multi-specialty practices (>50 providers)
  but only 67% from solo/small practices (<5 providers), despite clinical criteria
  being ostensibly identical. SHAP analysis shows "submitting_provider_group_size"
  has the 3rd highest mean absolute SHAP value (0.34), and "prior_submission_attempt_count"
  ranks 5th (0.28).


  Your FHIR PAS bundle intake pipeline captures these fields from the CommunicationRequest
  and PractitionerRole resources. The clinical features (diagnosis codes, lab values,
  prior treatment history) show no statistically significant difference between practice
  size cohorts (p=0.61 for ICD-10 distribution, p=0.43 for step therapy completion
  rates).


  Deliverables required:

  1. Diagnose whether this disparity represents proxy discrimination, legitimate utilization
  patterns, or documentation quality differences — provide a structured analytical
  framework with specific statistical tests to distinguish these hypotheses

  2. Design a fairness-aware retraining strategy specifying which features to remove,
  transform, or constrain, including any adversarial debiasing or reweighting approaches
  appropriate for this scenario

  3. Write Python pseudocode implementing a SHAP-based audit function that flags individual
  PA decisions where protected/proxy features contribute disproportionately (define
  your threshold logic explicitly)

  4. Recommend FHIR PAS bundle modifications to capture documentation completeness
  metadata that could replace the proxy signal with a legitimate clinical quality
  indicator'
target_skills:
- pa-decision-automation
domain: healthcare-ops
difficulty: hard
