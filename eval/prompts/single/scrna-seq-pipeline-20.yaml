id: scrna-seq-pipeline-20
prompt: 'You are analyzing a single-cell RNA-seq dataset from a longitudinal study
  of 8 multiple sclerosis patients (4 treatment-naive, 4 post-interferon-beta treatment)
  across 3 time points (baseline, 6 months, 12 months), resulting in 24 samples totaling
  ~180,000 cells after CellRanger processing. Initial Scrublet analysis flagged 8.3%
  of cells as putative doublets, but you notice that two CD4+/CD8+ double-positive
  T cell clusters (expressing both CD4 and CD8A at >2.0 log-normalized counts) are
  being incorrectly removed by your doublet filter threshold of 0.25.


  Your Leiden clustering at resolution 0.5 produces 22 clusters, but after Harmony
  batch correction using both patient_id and time_point as covariates simultaneously,
  3 clusters completely merge while a known NK cell population (NKG7+, GNLY+, KLRD1+)
  splits into 5 sub-clusters, suggesting over-correction.


  Provide: (1) Python code using Scanpy to implement a biologically-aware doublet
  filtering strategy that preserves legitimate double-positive T cells while removing
  true doublets, using a combination of Scrublet scores and marker gene co-expression
  thresholds; (2) code to diagnose the Harmony over-correction issue by comparing
  cluster stability metrics before and after correction using silhouette scores and
  ARI against known cell type labels; (3) a revised batch correction strategy using
  scVI that accounts for the nested experimental design (time points within patients)
  with specific model architecture parameters; and (4) recommendations for choosing
  the optimal Leiden resolution after integration, including code to generate a clustering
  tree (using the schist or similar package) across resolutions 0.1 to 2.0 in 0.1
  increments.'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: hard
