id: clinical-data-standards-28
prompt: 'A global Phase III oncology trial is preparing its safety database lock for
  regulatory submission. The MedDRA version 26.0 coding review has flagged a problematic
  cluster of 47 adverse events that were verbatim-coded at the LLT level across three
  overlapping terms: "elevated liver enzymes" (LLT 10064760), "hepatic enzyme increased"
  (LLT 10019675), and "liver function test abnormal" (LLT 10024690). These LLTs map
  to two different Preferred Terms: "Hepatic enzyme increased" (PT 10019675) under
  HLGT "Hepatic and hepatobiliary disorders" and "Liver function test abnormal" (PT
  10024690) under the same HLGT, both rolling up to SOC "Hepatobiliary disorders"
  (SOC 10019805).


  A parallel ICD-10 mapping exercise for the same events produced codes spanning R74.01
  (elevation of levels of liver transaminase levels), R74.09 (other abnormal serum
  enzyme levels), and K76.9 (liver disease, unspecified), creating inconsistency in
  the cross-walk table.


  Your medical coding team must resolve this before submission. Please provide: (1)
  a decision framework explaining which MedDRA PT should be used as the preferred
  coding destination for verbatim terms describing nonspecific liver enzyme elevations,
  and under what clinical circumstances each PT is appropriate; (2) an analysis of
  whether these 47 events should be consolidated at PT or HLT level for the AE frequency
  table, with justification referencing ICH E3 and CIOMS III guidance; (3) a recommended
  ICD-10 to MedDRA crosswalk resolution for these three ICD-10 codes, specifying directionality
  and any one-to-many mapping caveats; and (4) identification of any SMQ (Standardised
  MedDRA Query) that should capture these events for signal detection, with the appropriate
  search algorithm tier.'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: hard
