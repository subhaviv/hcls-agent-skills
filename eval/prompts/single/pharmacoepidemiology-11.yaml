id: pharmacoepidemiology-11
prompt: 'A health system researcher wants to study whether metformin reduces the risk
  of colorectal cancer compared to sulfonylureas among patients with newly diagnosed
  type 2 diabetes using electronic health records from 2010–2022 (n = 45,000 eligible
  patients).


  The researcher has identified the following cohort definition: patients are considered
  "new users" if they have at least 180 days of look-back with no prior diabetes medication.
  The index date is defined as the first prescription fill date. Follow-up ends at
  colorectal cancer diagnosis, death, disenrollment, or December 31, 2022.


  Please provide the following:


  1. **Cohort entry criteria**: Explain why an active comparator new-user design is
  appropriate here, and identify at least two specific biases it helps avoid compared
  to a prevalent user design with a non-user comparator group.


  2. **Washout period justification**: The researcher is debating between a 180-day
  and 365-day look-back washout period. Given that the average time from diabetes
  symptom onset to diagnosis is approximately 3–5 years, which washout period would
  you recommend and why?


  3. **Propensity score approach**: Given a sample of 45,000 patients (roughly 28,000
  on metformin and 17,000 on sulfonylureas), recommend whether to use propensity score
  matching (1:1 or variable ratio), IPTW, or stratification. Justify your choice based
  on sample size, estimand (ATT vs. ATE), and potential for weight extremes.


  4. **Confounding by indication check**: Name two negative control outcomes that
  could be used to detect residual confounding in this specific study context, and
  explain the logic behind each choice.'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: easy
