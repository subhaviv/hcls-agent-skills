id: multi-omics-integration-11
prompt: 'A research team at Meridian Cancer Institute has collected multi-omics data
  from 85 colorectal cancer patients, measuring RNA-seq transcriptomics, reverse-phase
  protein array (RPPA) proteomics, and DNA methylation (850K EPIC array) across all
  85 samples. They want to identify patient subgroups driven by coordinated variation
  across all three omics layers using MOFA+ (Multi-Omics Factor Analysis Plus).


  Before running MOFA+, the team has already performed within-omics normalization:
  VST for RNA-seq (18,500 genes after filtering), z-score normalization for RPPA (217
  proteins), and M-values for methylation (filtered to 42,000 CpG sites with variance
  >0.1). They plan to extract 15 latent factors and use default MOFA+ convergence
  settings.


  Please provide the following:


  1. **Data preparation checklist**: List the specific preprocessing steps required
  before inputting these three matrices into MOFA+, including any feature selection
  recommendations and how to handle the large difference in feature dimensionality
  between omics layers (18,500 vs 217 vs 42,000).


  2. **MOFA+ configuration recommendations**: Specify key hyperparameters to set (number
  of factors, minimum explained variance threshold, sparsity priors), and justify
  whether to use a single-group or multi-group model given this study design.


  3. **Factor interpretation workflow**: After fitting MOFA+, describe a step-by-step
  approach to identify which factors are biologically meaningful, including how to
  use factor weights, variance explained per omics layer, and downstream enrichment
  analysis for the top-weighted features.


  4. **Sample code snippet** (Python using `mofapy2`) demonstrating how to create
  the MOFA+ input object from three pandas DataFrames (samples × features format)
  and initialize the model.'
target_skills:
- multi-omics-integration
domain: multi-omics
difficulty: easy
