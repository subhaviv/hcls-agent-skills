id: quality-measures-17
prompt: 'You are analyzing HEDIS Controlling High Blood Pressure (CBP) measure performance
  for Meridian Health Plan''s commercial population (ages 18–85) for measurement year
  2023. Your data warehouse contains the following tables: `members` (member_id, dob,
  gender, enrollment_start, enrollment_end, plan_type), `claims` (claim_id, member_id,
  service_date, diagnosis_codes, procedure_codes, provider_npi, place_of_service),
  and `bp_readings` (reading_id, member_id, reading_date, systolic, diastolic, source).


  Your preliminary analysis shows:

  - 42,300 members aged 18–85 with at least one hypertension diagnosis (ICD-10: I10–I16)

  - 31,150 members meet continuous enrollment criteria (11 of 12 months)

  - 18,200 members have at least one outpatient visit during the measurement year

  - 9,840 members have a qualifying BP reading on file

  - Of those, 6,120 members have a controlled reading (systolic <140 AND diastolic
  <90)


  Please provide the following deliverables:


  1. **Denominator and numerator logic**: Explain the HEDIS CBP denominator exclusions
  (e.g., pregnancy, ESRD, hospice) and how they would reduce the 31,150 figure, with
  approximate expected exclusion rates.


  2. **Measure rate calculation**: Compute the preliminary CBP rate and identify where
  the largest gap exists in the measurement funnel.


  3. **Care gap SQL query**: Write a SQL query against the three tables above to identify
  members who are in the denominator but lack a controlled BP reading, stratified
  by age band (18–39, 40–64, 65–85).


  4. **Intervention recommendation**: Suggest two data-driven outreach strategies
  to close the care gap, referencing the specific funnel drop-off points identified.'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: intermediate
