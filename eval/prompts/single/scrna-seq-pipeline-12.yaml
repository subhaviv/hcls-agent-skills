id: scrna-seq-pipeline-12
prompt: 'Here is test question #12 of 30:


  ---


  You have just received CellRanger output from a 10X Genomics experiment profiling
  8,500 peripheral blood mononuclear cells (PBMCs) from a healthy donor. The data
  is stored in the standard `filtered_feature_bc_matrix/` directory containing `matrix.mtx.gz`,
  `barcodes.tsv.gz`, and `features.tsv.gz` files. Before proceeding with any downstream
  analysis, you need to perform a thorough quality control pass to remove low-quality
  cells and potential doublets.


  Your QC criteria are as follows:

  - Minimum genes per cell: 200

  - Maximum genes per cell: 2,500

  - Maximum mitochondrial gene percentage: 15%

  - Use Scrublet to flag and remove predicted doublets (threshold: 0.25)


  Please provide the following deliverables:


  1. **Complete Python code** using Scanpy to load the 10X data, compute QC metrics
  (including mitochondrial percentage using genes starting with `"MT-"`), apply all
  four filtering criteria above, and run Scrublet for doublet detection and removal.


  2. **Violin plot code** to visualize the three core QC metrics (`n_genes_by_counts`,
  `total_counts`, `pct_counts_mt`) before and after filtering.


  3. A brief explanation of **why each QC threshold** was chosen and what biological
  or technical artifacts each is designed to remove.


  4. After filtering, approximately how many cells would you expect to retain from
  the original 8,500, and what does a high mitochondrial percentage typically indicate
  about cell quality?'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: easy
