id: cheminformatics-14
prompt: 'Here is test question #14 of 30:


  ---


  You are analyzing a small focused library of 5 compounds for a lead optimization
  campaign targeting a kinase. The SMILES strings are:


  - **Cpd-1**: `CC1=CC=C(C=C1)S(=O)(=O)N2CCN(CC2)C3=NC4=CC=CC=C4N3`

  - **Cpd-2**: `CC1=CC=C(C=C1)S(=O)(=O)N2CCN(CC2)C3=NC4=CC=CC=C4N3C`

  - **Cpd-3**: `c1ccc2c(c1)nc(n2)N1CCN(CC1)S(=O)(=O)c1ccc(cc1)Cl`

  - **Cpd-4**: `O=C(NCCN1CCCC1)c1ccc(cc1)Oc1ccc(cc1)F`

  - **Cpd-5**: `CC(=O)Nc1ccc(cc1)S(=O)(=O)Nc1ccc(cn1)C(F)(F)F`


  Using RDKit, please:


  1. **Calculate** the following descriptors for all 5 compounds: MW, LogP (Crippen),
  HBD, HBA, TPSA, and rotatable bond count.

  2. **Flag** which compounds pass both Lipinski''s Rule of Five AND Veber''s rules
  (TPSA ≤ 140 Å², rotatable bonds ≤ 10).

  3. **Compute** the pairwise Tanimoto similarity matrix using Morgan fingerprints
  (radius=2, nBits=2048), and identify the most similar pair.

  4. **Perform a PAINS screen** on all 5 compounds and report any alerts with the
  specific PAINS pattern name.

  5. Provide **complete, runnable Python code** using RDKit for all steps above, and
  summarize which compound(s) you would prioritize for further optimization based
  on the combined analysis.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: intermediate
