id: clinical-data-standards-23
prompt: 'A clinical trial safety team is preparing an adverse event frequency table
  for a regulatory submission. They have collected the following raw AE terms reported
  by investigators across 847 patients:


  - "stomach ache" (n=23)

  - "abdominal pain upper" (n=31)

  - "epigastric discomfort" (n=18)

  - "nausea" (n=67)

  - "feeling sick" (n=12)

  - "vomiting" (n=44)

  - "emesis" (n=9)

  - "loose stools" (n=15)

  - "diarrhea" (n=38)


  The team needs to code these terms using MedDRA version 26.0 and organize them for
  a standard safety summary table.


  Please provide the following:


  1. Map each raw investigator term to its most appropriate MedDRA Lowest Level Term
  (LLT) and corresponding Preferred Term (PT), noting any cases where the LLT and
  PT are identical versus distinct.


  2. Identify which High Level Term (HLT) and System Organ Class (SOC) each PT belongs
  to, confirming whether all terms fall under the same SOC.


  3. Calculate the combined patient count at the PT level (merging synonymous terms),
  and then calculate the aggregate count at the HLT level, explaining why HLT-level
  aggregation might be preferred in a regulatory submission summary table.


  4. Flag any coding ambiguity — specifically, identify which investigator term has
  the most uncertainty in its PT assignment and explain what additional clinical context
  would resolve it.'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: easy
