id: trajectory-analysis-19
prompt: 'Here is test question #19 of 30:


  ---


  You are analyzing a single-cell RNA-seq dataset of 8,400 hematopoietic stem and
  progenitor cells (HSPCs) from human bone marrow, with the goal of reconstructing
  the differentiation trajectory from HSCs toward erythroid and myeloid lineages.
  You have already run scVelo in dynamical mode and obtained RNA velocity vectors,
  but you are observing a troubling inconsistency: the velocity arrows in UMAP space
  point **against** the known biological direction for approximately 30% of cells
  in the CMP (common myeloid progenitor) cluster. Additionally, PAGA connectivity
  shows a spurious high-confidence edge (weight = 0.47) between the MEP cluster and
  the GMP cluster, which are biologically unrelated lineages.


  Your scVelo run used default parameters (min_shared_counts=30, n_top_genes=2000),
  and the velocity confidence scores for CMP cells average only 0.31. CellRank was
  subsequently run using a combination of velocity kernel and connectivity kernel
  (80/20 split), identifying HSPC_1 as root and both Erythroid_mature and Neutrophil_mature
  as terminal states.


  Given these specific issues, please provide:

  1. A diagnostic workflow to identify why velocity arrows are reversed in the CMP
  cluster, including at least three distinct biological and technical causes to investigate

  2. Code to re-run scVelo with corrected parameters and visualize velocity confidence
  scores overlaid on UMAP, colored by cluster

  3. An approach to filter or down-weight the spurious MEP-GMP PAGA edge before passing
  connectivity information to CellRank

  4. A recommendation on whether to adjust the velocity/connectivity kernel weighting
  in CellRank given the low confidence scores, with quantitative justification'
target_skills:
- trajectory-analysis
