id: risk-adjustment-strategy-27
prompt: 'A Medicare Advantage plan with 18,400 members is navigating the CMS-HCC blended
  transition period (60% V28 / 40% V24 weighting for payment year 2025). Their analytics
  team has pulled the following aggregate data from their most recent RAF reconciliation:


  - 3,200 members have Type 2 diabetes with chronic kidney disease (CKD) Stage 3 documented
  in V24 but the CKD staging was not revalidated in the current measurement year

  - 1,150 members carry an HCC for Major Depressive Disorder (MDD) under V24, but
  V28 restructured the mental health HCC hierarchy, potentially affecting their mapping

  - 890 members have a documented history of HF with reduced ejection fraction (HFrEF),
  but physician notes use "systolic heart failure" without explicit EF documentation

  - Average plan RAF score is 1.24 under V24 and 1.19 under V28, creating a blended
  score concern


  Please provide:

  1. A quantitative analysis of how the blended weighting impacts aggregate RAF scores
  and estimated capitation revenue risk (assume $950 PMPM base rate)

  2. An explanation of how V28 hierarchy restructuring affects MDD and HFrEF HCC mapping
  compared to V24, with specific HCC code references

  3. A prioritized coding gap recapture strategy for all three member cohorts, including
  documentation requirements that would satisfy both model versions

  4. A risk-tiering framework to determine which members should be targeted for prospective
  chart review versus retrospective coding gap closure, with specific criteria thresholds'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: intermediate
