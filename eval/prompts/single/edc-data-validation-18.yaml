id: edc-data-validation-18
prompt: 'You are working as a CDISC data standards programmer on a Phase III oncology
  trial (STUDY-ONC-2847) with 412 enrolled patients across 8 sites. Your EDC system
  (Veeva Vault CDMS) exports lab data in a non-standard flat file format that must
  be transformed into a compliant SDTM LB domain. During the transformation, you''ve
  identified three critical validation challenges:


  1. **Partial dates**: Approximately 23 lab records have collection dates recorded
  as "UNK-OCT-2023" or "15-UNK-2023" format that need ISO 8601-compliant imputation
  following CDISC rules before SDTM mapping.


  2. **Reference range violations**: The exported LBORRES values include 47 records
  where numeric results fall outside the site-defined reference ranges stored in a
  separate LBRANGE lookup table, but 12 of these may be legitimate due to a known
  assay calibration change at Site 04 on 15-NOV-2023.


  3. **Cross-domain consistency**: LBDTC timestamps must be validated against DS (disposition)
  domain — specifically, no lab collection should occur after the DSDTC for DSTERM="DEATH"
  or "STUDY DISCONTINUATION" for the same USUBJID.


  Please provide: (a) Python code implementing all three validation checks with detailed
  comments, (b) a prioritized findings report structure (as a pandas DataFrame schema)
  that flags P21-equivalent severity levels (Error/Warning/Notice), (c) handling logic
  for the Site 04 calibration edge case that queries whether out-of-range values fall
  within a ±15% tolerance window of the new reference ranges, and (d) the SDTM IG
  3.3-compliant imputation rules for each partial date pattern encountered.'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: hard
