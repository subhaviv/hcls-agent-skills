id: ehr-data-parsing-19
prompt: 'You are building a clinical data pipeline that receives HL7v2 ORU^R01 messages
  containing laboratory results for a cardiology department. The messages occasionally
  contain malformed segments, missing required fields, and non-standard local codes
  that must be mapped to LOINC. Below is a representative (but intentionally problematic)
  HL7v2 message:


  ```

  MSH|^~\&|LAB_SYS|CARDIO_HOSP|EHR|MAIN|20240315142233||ORU^R01|MSG004521|P|2.5

  PID|1||PT-88821^^^MRN||DOE^JANE^M||19781204|F|||123 MAPLE ST^^BOSTON^MA^02101

  OBR|1||ORD-5521|LOCAL-TROP^Troponin Panel|||20240315140000

  OBX|1|NM|LOCAL-TROP-I^Troponin I||0.87|ng/mL|0.00-0.04|HH|||F

  OBX|2|NM|LOCAL-BNP^BNP||1240||100-400|H|||F

  OBX|3|NM||eGFR||58|mL/min/1.73m2|>60|L|||F

  OBX|4|TX|LOCAL-INTERP^Clinical Interpretation||"Elevated troponin consistent with
  NSTEMI; BNP markedly elevated"|||||||F

  ```


  Write a Python solution (using `hl7apy` or raw string parsing) that:

  1. Parses this message and extracts all OBX segments into a pandas DataFrame with
  columns: `segment_seq`, `value_type`, `local_code`, `description`, `value`, `units`,
  `reference_range`, `abnormal_flag`

  2. Identifies and logs all data quality issues found (missing OBX-3 identifier in
  segment 3, missing units in segment 2, non-numeric value in a numeric field, etc.)

  3. Maps the three local codes (`LOCAL-TROP-I`, `LOCAL-BNP`, `LOCAL-INTERP`) to their
  correct LOINC codes (10839-9, 42637-9, and 59408-5 respectively) using a configurable
  dictionary

  4. Outputs a final quality-annotated DataFrame with a `loinc_code` column and a
  `dq_flags` column listing all issues per row'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: hard
