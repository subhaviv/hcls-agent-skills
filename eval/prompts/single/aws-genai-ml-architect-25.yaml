id: aws-genai-ml-architect-25
prompt: 'A regional oncology network with 12 hospitals is building a clinical decision
  support system to assist oncologists with treatment recommendations for non-small
  cell lung cancer (NSCLC) patients. The system must ingest structured EHR data (HL7
  FHIR R4 from AWS HealthLake containing ~847,000 patient records), unstructured clinical
  notes (averaging 340 notes per patient), and a curated corpus of 28,000 oncology
  research papers stored in S3.


  The system needs to surface relevant treatment protocols and similar patient cases
  when an oncologist submits a new patient''s profile. Response latency must be under
  4 seconds for 95th percentile queries during peak hours (estimated 200 concurrent
  users). The corpus must be updated weekly with new literature, and all PHI must
  remain within a HIPAA-compliant boundary with a signed BAA.


  The oncology team wants to use Claude 3 Sonnet via Amazon Bedrock as the generative
  component. The EHR data contains PHI and cannot be sent directly to the LLM.


  Please provide:

  1. A complete AWS architecture diagram description for this RAG system, specifying
  which AWS services handle each pipeline stage (ingestion, chunking, embedding, retrieval,
  generation)

  2. A PHI sanitization strategy that allows relevant clinical context to reach the
  LLM without exposing raw PHI, including which AWS services enforce this boundary

  3. A recommended embedding model and vector store configuration on AWS, with justification
  for handling both structured FHIR data and unstructured clinical notes

  4. A sample Python snippet using the Bedrock Knowledge Bases API or LangChain that
  demonstrates how to query this hybrid retrieval system

  5. Estimated monthly AWS cost breakdown for the retrieval and generation components
  assuming the 200 concurrent user load'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: intermediate
