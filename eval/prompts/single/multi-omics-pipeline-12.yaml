id: multi-omics-pipeline-12
prompt: 'Here is test question #12 of 30:


  ---


  You are analyzing a multi-omics dataset from a colorectal cancer study with 85 tumor
  samples and 40 healthy controls. You have three data layers: RNA-seq read counts
  (18,432 genes), reverse-phase protein array (RPPA) measurements for 217 proteins,
  and DNA methylation beta values for 12,500 CpG sites. All features are currently
  identified by different naming conventions: RNA-seq uses Ensembl gene IDs (e.g.,
  ENSG00000141510), RPPA uses gene symbols with antibody suffixes (e.g., TP53_pSer15),
  and methylation uses CpG probe IDs (e.g., cg00001245).


  Before running MOFA2 integration, you need to harmonize identifiers across all three
  layers so that overlapping molecular entities can be linked. Your goal is to map
  everything to HGNC gene symbols as the common namespace.


  Please provide:


  1. **R code** using `biomaRt` to convert the 18,432 Ensembl IDs to HGNC symbols,
  including handling of one-to-many mappings and missing values (drop unmapped features,
  keep the first match for duplicates).


  2. **A brief strategy** (3–5 sentences) for cleaning the RPPA antibody suffixes
  to extract the base gene symbol (e.g., TP53_pSer15 → TP53), and for linking the
  12,500 CpG probe IDs to their nearest annotated gene symbol using the `IlluminaHumanMethylation450kanno.ilmn12.hg19`
  annotation package in R.


  3. **R code** to construct the final named list of matrices required by `MOFA2::create_mofa()`,
  using only the genes present in all three layers after harmonization, with samples
  as columns and features as rows.'
target_skills:
- multi-omics-pipeline
domain: multi-omics
difficulty: easy
