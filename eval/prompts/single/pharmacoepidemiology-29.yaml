id: pharmacoepidemiology-29
prompt: 'You are conducting a pharmacoepidemiologic study using a large US claims
  database (n = 2.1 million beneficiaries, 2015–2022) to evaluate whether GLP-1 receptor
  agonists (GLP-1 RAs) reduce the risk of major adverse cardiovascular events (MACE)
  compared to SGLT-2 inhibitors in patients with type 2 diabetes. Both drug classes
  are indicated for cardiovascular risk reduction, making this an active comparator
  design. However, you face several methodological challenges:


  1. Physicians may switch patients to GLP-1 RAs mid-follow-up after an initial SGLT-2
  inhibitor prescription, creating time-varying treatment

  2. HbA1c and eGFR — strong confounders — are only partially captured in claims (available
  in ~40% of patients via linked lab data)

  3. Some patients fill a 90-day supply at cohort entry but discontinue within 30
  days, creating a potential immortal time problem if follow-up is counted from prescription
  fill

  4. The study period spans a formulary change in 2019 that shifted GLP-1 RA prescribing
  patterns substantially


  Given these constraints, provide: (a) a complete target trial emulation protocol
  specifying eligibility criteria, treatment strategies, assignment procedures, follow-up
  rules, and outcome definition; (b) a marginal structural model specification with
  stabilized IPTW to handle treatment switching, including the numerator and denominator
  model covariates; (c) a quantitative bias analysis approach for the partially missing
  HbA1c/eGFR data, specifying whether you would use multiple imputation, E-values,
  or probabilistic bias analysis and why; (d) R pseudocode implementing the stabilized
  weight calculation with censoring weights; and (e) a negative control outcome strategy
  to detect residual confounding introduced by the 2019 formulary change.'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: hard
