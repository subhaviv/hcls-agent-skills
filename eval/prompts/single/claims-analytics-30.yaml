id: claims-analytics-30
prompt: 'A regional health plan has flagged Provider NPI 1234567890 (specialty: internal
  medicine) for potential E&M upcoding after a routine audit. You have access to 18
  months of X12 837P professional claims data for this provider covering 4,847 unique
  beneficiaries. The provider''s E&M distribution shows: 99211 (2%), 99212 (4%), 99213
  (11%), 99214 (51%), 99215 (32%). The specialty peer benchmark for internal medicine
  in your network shows: 99211 (3%), 99212 (18%), 99213 (38%), 99214 (31%), 99215
  (10%).


  Additionally, the claims data reveals: 23 dates of service where the provider billed
  more than 24 units of face-to-face E&M time in a single day, a recurring pattern
  of 99215 paired with modifier -25 and a same-day procedure code 93000 (ECG) appearing
  in 847 claims, and Benford''s Law analysis of submitted charge amounts shows first-digit
  frequencies of 1: 8%, 2: 4%, 3: 19%, 4: 22%, 5: 18%, 6: 14%, 7: 7%, 8: 5%, 9: 3%.


  Please provide:

  1. Python code to calculate a chi-square test comparing this provider''s E&M distribution
  against the peer benchmark, including interpretation thresholds

  2. SQL logic to identify and flag the "impossible day" records exceeding 24 billable
  hours

  3. An assessment of whether the 99215+modifier-25+93000 pattern constitutes an NCCI
  violation or legitimate billing, with the specific edit rationale

  4. Interpretation of the Benford''s Law deviation and a fraud risk score (0–100)
  with weighted methodology combining all three signals'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: hard
