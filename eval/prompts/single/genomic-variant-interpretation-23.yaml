id: genomic-variant-interpretation-23
prompt: 'A clinical genetics laboratory is evaluating a germline variant identified
  in a 34-year-old woman with a strong family history of breast and ovarian cancer.
  The variant is a nonsense mutation in BRCA2: NM_000059.4(BRCA2):c.7558C>T (p.Arg2520Ter).


  The following evidence is available:

  - gnomAD v3.1 allele frequency: 0.000004 (2 heterozygous alleles out of 500,000
  total alleles; no homozygotes)

  - ClinVar submissions: 3 submissions all classified as "Pathogenic" from accredited
  laboratories, no conflicting interpretations

  - Functional studies: No direct functional data available for this specific variant

  - Segregation: Variant segregates with disease in 3 affected relatives (mother and
  two maternal aunts with breast cancer)

  - BRCA2 is a well-established tumor suppressor gene where loss-of-function is the
  disease mechanism


  Please provide the following:

  1. A systematic ACMG/AMP 2015 criteria evaluation, identifying each applicable criterion
  (e.g., PVS1, PS1, PM2, PP1, PP5) and explicitly stating whether each criterion applies
  and at what strength level

  2. A final variant classification based on the combined criteria

  3. A brief explanation of why PVS1 applies or does not apply in this specific case

  4. The appropriate filtering allele frequency threshold to use for this gene/disease
  context and whether PM2 is supported'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: easy
