id: trajectory-analysis-24
prompt: 'Here is test question #24 of 30:


  ---


  You are analyzing a scRNA-seq dataset of 8,400 human hematopoietic stem and progenitor
  cells (HSPCs) from bone marrow, spanning differentiation toward erythroid, myeloid,
  and lymphoid lineages. After running velocyto on your BAM files, you have a Loom
  file containing spliced and unspliced count matrices. You want to use scVelo''s
  dynamical model to characterize RNA velocity and then integrate this with CellRank
  to compute fate probabilities toward three putative terminal states: erythrocytes
  (cluster 7), neutrophils (cluster 12), and B-cell progenitors (cluster 15).


  Your dataset has the following characteristics:

  - HSCs are in clusters 0 and 1 (root population)

  - You have batch effects from two donors (donor_A: 4,200 cells, donor_B: 4,200 cells)

  - Many genes show high dropout in the unspliced layer (~40% sparsity)

  - You suspect a rare intermediate population (~200 cells in cluster 9) may represent
  a bipotent erythro-myeloid progenitor


  Please provide:

  1. A complete Python workflow using scVelo and CellRank (v2) to compute dynamical
  model velocities, set HSC clusters as root states, and derive absorption probabilities
  toward all three terminal states

  2. How to handle the batch effects before velocity estimation without losing biological
  signal

  3. Code to visualize a fate probability heatmap ordered by CellRank''s computed
  latent time, highlighting cluster 9 cells

  4. A statistical test to determine whether cluster 9 shows significantly mixed fate
  probabilities compared to committed progenitor clusters, and how to interpret the
  result in the context of bipotency'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: intermediate
