id: claims-analytics-14
prompt: 'A regional health plan has provided you with a month''s worth of X12 837P
  professional claims data (approximately 45,000 claim records) from 312 providers
  across 8 specialties. Your fraud analytics team suspects a subset of internal medicine
  providers may be engaged in systematic E&M upcoding. The raw transaction data has
  already been parsed into a pandas DataFrame called `claims_df` with the following
  columns: `claim_id`, `provider_npi`, `provider_specialty`, `service_date`, `patient_id`,
  `cpt_code`, `icd10_primary`, `billed_amount`, `units`, `place_of_service`.


  **Your tasks:**


  1. **Write Python code** to compute each internal medicine provider''s E&M code
  distribution across CPT codes 99211–99215, calculating the percentage of claims
  at each level and flagging providers whose 99214+99215 combined rate exceeds 2 standard
  deviations above the specialty peer mean.


  2. **Write a SQL query** (assume the DataFrame is loaded into a table called `claims`)
  that identifies providers billing more than 10 unique patients on a single service
  date with 99215 as the only E&M code — a pattern consistent with "cloning" or template
  abuse.


  3. **Implement a Benford''s Law analysis** in Python on the `billed_amount` column
  restricted to internal medicine claims, generating a chi-square goodness-of-fit
  statistic comparing observed leading-digit frequencies to expected Benford''s distribution,
  and interpreting whether the result suggests anomalous billing.


  4. **Provide a brief prioritization framework** (3–5 sentences) for triaging which
  flagged providers should be referred for a full clinical audit first, combining
  the statistical signals from tasks 1–3.'
