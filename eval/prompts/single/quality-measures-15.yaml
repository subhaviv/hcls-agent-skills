id: quality-measures-15
prompt: 'A regional health plan with 45,000 commercial members needs to calculate
  the **Breast Cancer Screening (BCS) HEDIS measure** for the current measurement
  year. Your analytics team has access to two tables in a SQL database:


  **`enrollments`** — columns: `member_id`, `plan_start_date`, `plan_end_date`, `dob`,
  `gender`


  **`claims`** — columns: `claim_id`, `member_id`, `service_date`, `procedure_code`,
  `diagnosis_code`, `claim_type` (values: ''medical'' or ''lab'')


  The measurement year is January 1, 2023 – December 31, 2023. The BCS measure targets
  women aged 52–74 who had a mammogram in the measurement year or the year prior (2022).
  Continuous enrollment requires 11 out of 12 months of coverage in the measurement
  year, with no more than one 45-day gap allowed.


  **Deliverables requested:**


  1. **Write a complete SQL query** that identifies the eligible denominator population
  (applying age, gender, and continuous enrollment criteria).


  2. **Write a second SQL query** that identifies numerator-eligible members (those
  with a qualifying mammogram claim using CPT codes 77067, 77066, 77065, or HCPCS
  G0202 in 2022 or 2023).


  3. **Calculate the measure rate** given these fictional summary results: denominator
  = 8,400 members, numerator = 5,628 members. Show your formula and result as a percentage.


  4. **Identify two common care gap detection strategies** a health plan could use
  to proactively close gaps before the measurement year ends, based on members currently
  in the denominator but not the numerator.'
