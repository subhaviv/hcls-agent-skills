id: trajectory-analysis-22
prompt: 'I have a scRNA-seq dataset of 4,200 mouse hematopoietic stem cells (HSCs)
  and progenitors captured during emergency granulopoiesis, processed through the
  standard Scanpy pipeline. The dataset contains the following annotated cell types:
  HSCs (n=420), common myeloid progenitors (CMPs, n=680), granulocyte-monocyte progenitors
  (GMPs, n=1,100), monocyte precursors (n=890), and mature granulocytes (n=1,110).
  I want to compute diffusion pseudotime (DPT) to order these cells along their differentiation
  trajectory, starting from HSCs as the root population.


  Please provide the following:


  1. **Step-by-step Python code** using Scanpy to compute diffusion maps and DPT,
  including how to set the root cell (use the HSC with the highest expression of *Slamf1*
  as the root), with appropriate parameters for `sc.tl.diffmap(n_comps=15)` and `sc.tl.dpt()`.


  2. **Visualization code** to generate a UMAP colored by DPT values and a separate
  plot showing DPT score distributions across the five cell type annotations using
  a violin plot.


  3. **Interpretation guidance** explaining what a bimodal DPT distribution in the
  GMP population might indicate biologically, and how you would investigate whether
  this reflects two distinct differentiation speeds or a true branching event.


  4. **Quality control recommendations** for validating the pseudotime ordering, including
  at least two known marker genes from the hematopoietic literature (e.g., *Mpo*,
  *Csf1r*) that should show monotonic expression changes along the trajectory.'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: easy
