id: dicom-processing-27
prompt: "You are managing a neuroimaging study with 47 participants who underwent\
  \ 3T MRI scanning. Each participant's DICOM data is organized in the following directory\
  \ structure:\n\n```\n/data/raw/sub-{ID}/\n  ├── T1w/          (192 slices, 1mm isotropic,\
  \ ~180 DICOM files)\n  ├── fMRI_rest/    (300 volumes, TR=2s, multiband factor 4,\
  \ ~36000 DICOM files)\n  └── DWI/          (64 directions + 5 b0s, ~7000 DICOM files)\n\
  ```\n\nYou need to convert all data to BIDS-compliant NIfTI format using dcm2niix.\
  \ However, you've encountered several complications:\n\n1. The fMRI series for 6\
  \ participants (sub-012, sub-019, sub-023, sub-031, sub-038, sub-044) were acquired\
  \ with a Siemens Prisma scanner that embeds slice timing information in the private\
  \ DICOM tag (0019,1029), which dcm2niix sometimes misparses for multiband sequences\n\
  2. The DWI data requires proper extraction of b-values and b-vectors into separate\
  \ .bval/.bvec files\n3. Three participants (sub-007, sub-015, sub-029) have duplicate\
  \ SeriesInstanceUIDs due to a scanner configuration error, causing dcm2niix to merge\
  \ incorrect series\n\nPlease provide:\n- A complete Python script using subprocess\
  \ to batch-convert all subjects with appropriate dcm2niix flags\n- Specific dcm2niix\
  \ parameters to handle the Siemens multiband slice timing issue\n- Code to detect\
  \ and resolve the duplicate SeriesInstanceUID problem using pydicom before conversion\n\
  - A validation routine that checks the resulting JSON sidecars for required BIDS\
  \ fields including SliceTiming, PhaseEncodingDirection, and TotalReadoutTime"
target_skills:
- dicom-processing
domain: imaging
difficulty: intermediate
