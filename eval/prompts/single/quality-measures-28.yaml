id: quality-measures-28
prompt: 'A regional health plan with 85,000 covered lives needs to calculate the **Diabetes
  Care — Poor Glycemic Control (CDC) HEDIS measure** for the 2024 measurement year.
  Your analytics team has identified 3,847 members who meet the initial denominator
  criteria (ages 18–75 with T2DM diagnosis), but several edge cases are creating disagreement
  about final denominator and numerator counts.


  **Specific complications to resolve:**


  1. **Continuous enrollment conflicts:** 412 members have a single 45-day gap in
  coverage during the measurement year due to a mid-year employer group transition
  where the plan retained the contract. Your medical director argues these members
  should remain in the denominator; your compliance officer disagrees.


  2. **Exclusion ambiguity:** 89 members have ICD-10 code Z79.4 (long-term insulin
  use) documented only in professional claims but not in pharmacy data, and 34 members
  have a gestational diabetes code (O24.4xx) alongside their T2DM codes.


  3. **Numerator logic dispute:** 156 members had HbA1c results of exactly 9.0% —
  your vendor is coding these as "passing" (not poorly controlled) while your internal
  team codes them as "failing."


  **Deliverables requested:**


  - A written ruling on each of the three edge cases with citations to the applicable
  HEDIS 2024 technical specification logic

  - A SQL query (PostgreSQL dialect) that implements the correct denominator with
  all exclusions applied, using tables: `members`, `medical_claims`, `pharmacy_claims`,
  and `lab_results`

  - A care gap detection query identifying members with HbA1c > 9.0% (strictly) who
  have had no endocrinology referral (specialty code 46) in the past 12 months

  - A brief recommendation on whether the 45-day gap members should be reported separately
  for internal quality improvement purposes'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: hard
