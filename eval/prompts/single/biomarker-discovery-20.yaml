id: biomarker-discovery-20
prompt: 'Here is test question #20:


  ---


  You are developing a **predictive biomarker** to identify which early-stage non-small
  cell lung cancer (NSCLC) patients will respond to adjuvant pembrolizumab versus
  observation alone. Your discovery cohort (n=312, 156 per arm) has undergone whole-exome
  sequencing and RNA-seq on FFPE tumor samples. You have extracted 47 candidate features:
  tumor mutational burden (TMB), 18 immune gene expression scores (including IFN-γ
  signature, TGF-β score, T-cell exhaustion score), 12 copy number alteration features,
  PD-L1 TPS by IHC, microsatellite instability status, and 14 somatic mutation binary
  flags (including *STK11*, *KEAP1*, *EGFR*, *KRAS* subtypes).


  The primary endpoint is disease-free survival (DFS) at 3 years. You have a planned
  external validation cohort of n=140 (90 pembrolizumab, 50 observation) from a different
  institution with slightly different RNA extraction protocols.


  **Specific concerns:**

  - Several candidate features are highly correlated (Pearson r > 0.75 between IFN-γ
  signature and CD8 T-cell score)

  - The observation arm has 22% 3-year DFS events vs. 31% in the pembrolizumab arm

  - STK11 mutation prevalence is 8% (25 patients total)

  - Your statistician warns about "predictive biomarker leakage" during cross-validation


  Please provide: **(1)** a precise definition distinguishing this as a predictive
  vs. prognostic biomarker and the statistical model structure required (interaction
  term design); **(2)** a feature selection strategy addressing collinearity and rare
  binary features; **(3)** a nested cross-validation scheme that correctly prevents
  predictive leakage; **(4)** appropriate evaluation metrics beyond standard C-index
  for this interaction setting; and **(5)** a power/sample size assessment for the
  external validation cohort given the event counts.'
