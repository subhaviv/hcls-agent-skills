id: molecular-docking-17
prompt: 'You are setting up a structure-based virtual screening campaign targeting
  the allosteric pocket of a fictional kinase **CLK7** (PDB: 7XKP, resolution 1.9
  Å). During validation, you perform redocking of the co-crystallized ligand **CMP-441**
  and obtain an RMSD of 3.8 Å against the reference pose — well above the acceptable
  2.0 Å threshold.


  Your setup details:

  - Grid box center: x=12.4, y=-8.7, z=31.2 (coordinates taken from the ligand centroid)

  - Grid box dimensions: 15 × 15 × 15 Å

  - Receptor prepared using `prepare_receptor4.py` from AutoDockTools (MGLTools 1.5.7)

  - Ligand CMP-441 prepared using Open Babel (`obabel input.mol2 -O ligand.pdbqt`)

  - Vina exhaustiveness: 8

  - CMP-441 has a fused tricyclic scaffold with one rotatable bond and a sulfoxide
  group


  Given this failed validation, provide the following:


  1. **Diagnose** at least three likely causes of the high RMSD, specifically considering
  the ligand''s chemical features and preparation pipeline

  2. **Recommend** a corrected preparation workflow for both receptor and ligand,
  specifying which tools (e.g., Meeko, ADFR Suite, obabel flags) should replace or
  supplement the current approach and why

  3. **Provide revised Vina configuration parameters** (exhaustiveness, grid box dimensions)
  with justification

  4. **Write a shell script** that implements your corrected preparation and docking
  workflow, including all relevant flags and commands

  5. Define a **pass/fail criterion** for the corrected redocking and explain what
  RMSD threshold you would use before proceeding to screen a library of 12,000 compounds'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: intermediate
