id: pa-clinical-policy-28
prompt: 'A 58-year-old patient with treatment-resistant major depressive disorder
  (MDD) has failed adequate trials of sertraline 200mg/day (12 weeks), escitalopram
  20mg/day (10 weeks), and venlafaxine XR 225mg/day (14 weeks), all with documented
  PHQ-9 scores above 18 throughout treatment. The treating psychiatrist is requesting
  prior authorization for esketamine (Spravato) intranasal 56mg twice weekly. The
  commercial payer''s current clinical policy (Policy CP-MH-2847) requires: (1) failure
  of two adequate antidepressant trials from different classes, (2) concurrent oral
  antidepressant use, (3) administration in certified healthcare settings, and (4)
  exclusion of active psychosis or uncontrolled hypertension. The patient''s chart
  shows BP readings of 148/92 and 152/94 on two recent visits, current lithium augmentation
  at 900mg/day, and a GAF score of 38.


  Please provide:

  1. A clinical necessity analysis assessing whether this patient meets or falls short
  of each PA criterion, citing specific chart findings and policy gaps

  2. An appeal strategy if the PA is initially denied based on the hypertension exclusion,
  including what clinical documentation and specialist attestations would strengthen
  the appeal

  3. A sample FHIR Da Vinci PAS (Prior Authorization Support) ClaimResponse resource
  snippet (JSON) showing how a partial approval or pending determination with a specific
  denial reason code would be structured for this case

  4. Recommendations for step therapy documentation that would satisfy CMS medical
  necessity standards if this patient were on Medicare Part B rather than commercial
  insurance'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: hard
