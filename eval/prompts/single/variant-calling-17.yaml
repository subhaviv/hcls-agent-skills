id: variant-calling-17
prompt: 'You are setting up a somatic variant calling pipeline for a cancer genomics
  study involving 45 tumor samples from colorectal adenocarcinoma patients. Each tumor
  sample has a matched normal from the same patient. Sequencing was performed on Illumina
  NovaSeq 6000 with 100bp paired-end reads at approximately 120x tumor coverage and
  60x normal coverage (WES, targeting ~50Mb exome with the Twist Comprehensive Exome
  panel).


  Your team wants to use GATK Mutect2 in tumor-with-matched-normal mode. You have
  access to a panel of normals (PoN) built from 45 unrelated healthy individuals sequenced
  on the same platform. You also have access to gnomAD r2.1.1 as a germline resource.


  Please provide the following:


  1. A complete Mutect2 calling command for a single tumor-normal pair (sample IDs:
  TUMOR_CRC_007 and NORMAL_CRC_007), including all recommended flags for WES somatic
  calling, appropriate interval padding, and contamination estimation setup.


  2. A step-by-step FilterMutectCalls workflow including the intermediate steps (GetPileupSummaries,
  CalculateContamination, LearnReadOrientationModel) with example commands for each
  step.


  3. An explanation of why the PoN built from only 45 normals may be insufficient
  and what threshold of PoN size GATK recommends, along with practical consequences
  for this study.


  4. Recommended post-filtering steps to reduce false positives specific to colorectal
  cancer biology, such as handling microsatellite instability (MSI) regions and COSMIC
  hotspot annotation.'
target_skills:
- variant-calling
domain: genomics
difficulty: intermediate
