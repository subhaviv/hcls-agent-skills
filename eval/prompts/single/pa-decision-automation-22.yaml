id: pa-decision-automation-22
prompt: 'A regional health plan processes approximately 8,400 prior authorization
  requests per month across musculoskeletal, oncology, and behavioral health service
  lines. Their PA operations team has extracted a sample of 500 historical decisions
  from their adjudication system and wants to build a simple rules-based decision
  engine before investing in ML approaches.


  The extracted dataset includes the following fields per request: `service_line`,
  `CPT_code`, `diagnosis_ICD10`, `requesting_provider_NPI`, `days_supply_requested`,
  `clinical_notes_present` (boolean), `peer_to_peer_requested` (boolean), `prior_auth_history_12mo`
  (integer count), `decision` (Approved/Denied/Pended), and `turnaround_hours`.


  From preliminary analysis, the team has observed: (1) 68% of denials in the musculoskeletal
  line involve CPT codes 27447 and 27130 with missing clinical notes, (2) behavioral
  health requests with `prior_auth_history_12mo` > 3 are approved at a 91% rate, and
  (3) oncology requests are pended at a rate of 34% regardless of documentation completeness.


  Please provide the following deliverables:


  1. A Python function that ingests this tabular dataset (as a pandas DataFrame) and
  applies a tiered rules-based decision logic using the observed patterns above, returning
  a predicted decision label for each row.


  2. A denial pattern summary table (as a markdown table) categorizing the top three
  denial drivers by service line based on the described patterns.


  3. Two concrete recommendations for reducing the 34% pend rate in oncology, framed
  around documentation requirements or workflow changes that could be implemented
  without changing clinical criteria.'
target_skills:
- pa-decision-automation
domain: healthcare-ops
difficulty: easy
