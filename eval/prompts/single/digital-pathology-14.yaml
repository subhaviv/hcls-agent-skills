id: digital-pathology-14
prompt: 'You are building a weakly-supervised multiple instance learning (MIL) pipeline
  for predicting microsatellite instability (MSI) status from H&E-stained colorectal
  cancer whole-slide images. You have 847 slides (512 MSI-High, 335 MSS) in SVS format
  stored on an S3 bucket, and you want to use the H-optimus-0 foundation model to
  extract patch-level features before training an ABMIL (Attention-Based MIL) aggregator.


  Your preprocessing requirements are:

  - Tissue segmentation using TIAToolbox''s `TissueMasker` with morphological closing
  kernel size 23

  - Extract 224×224 patches at 0.5 mpp (20× equivalent) with a minimum tissue coverage
  threshold of 75%

  - Batch feature extraction using H-optimus-0 with fp16 precision, batch size 64


  Please provide:


  1. **Complete Python code** using TIAToolbox to perform tissue masking and patch
  extraction for a single SVS slide, outputting patch coordinates and tissue coverage
  percentages to a Parquet file.


  2. **Feature extraction code** that loads H-optimus-0 from HuggingFace (`bioptimus/H-optimus-0`),
  processes extracted patches in batches of 64 with fp16, and saves per-slide feature
  matrices as `.pt` files (shape: N_patches × 768).


  3. **Class imbalance handling**: Given the 512:335 MSI:MSS ratio, recommend and
  implement a sampling strategy in PyTorch''s `DataLoader` for the ABMIL training
  phase.


  4. A **brief explanation** (4–6 sentences) of why operating at 0.5 mpp rather than
  1.0 mpp matters for MSI prediction specifically, considering the morphological features
  (tumor-infiltrating lymphocytes, glandular architecture) relevant to MSI status.'
target_skills:
- digital-pathology
domain: imaging
difficulty: intermediate
