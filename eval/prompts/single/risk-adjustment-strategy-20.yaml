id: risk-adjustment-strategy-20
prompt: 'A Medicare Advantage plan is preparing its 2024 risk adjustment submission
  and must navigate the CMS-mandated blended transition from V24 to V28 (60% V28 /
  40% V24 weighting for payment year 2025). Their data analytics team has identified
  a cohort of 847 members with documented Type 2 diabetes with chronic kidney disease
  (CKD) Stage 3 in their medical records, but current claims show inconsistent HCC
  capture across the two model versions.


  Specifically: In V24, this condition maps to HCC 18 (Diabetes with Chronic Complications)
  with a RAF coefficient of 0.318, and CKD Stage 3 maps separately to HCC 137 (Chronic
  Kidney Disease, Stage 3) with coefficient 0.069. In V28, the mapping restructures
  significantly — diabetes with CKD now maps to HCC 37 with coefficient 0.280, while
  CKD Stage 3 alone maps to HCC 329 with coefficient 0.106. Additionally, V28 introduces
  a new disease interaction flag (HCC_INT_19_37) for diabetes-CKD combinations worth
  0.156.


  The plan''s coding team is uncertain whether to pursue aggressive dual-condition
  documentation or rely on the interaction flag logic.


  Please provide:

  1. A blended RAF score calculation comparing three documentation strategies: (a)
  diabetes only, (b) diabetes + CKD separately, and (c) diabetes + CKD with interaction
  flag — showing per-member and cohort-level revenue impact assuming $850 per RAF
  unit per member per month

  2. A decision framework for determining which documentation strategy is clinically
  appropriate and audit-defensible under CMS guidelines

  3. Specific ICD-10 coding guidance and documentation requirements that would support
  the highest-value defensible strategy

  4. Risk ranking of each strategy under a CMS RADV audit scenario'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: hard
