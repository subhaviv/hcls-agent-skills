id: edc-data-validation-28
prompt: 'Here is test question #28 of 30:


  ---


  You are validating SDTM datasets for a Phase III oncology trial (STUDY-ONC-4471)
  with 847 subjects across 12 sites. The trial includes concurrent RECIST tumor assessments
  and ECOG performance status evaluations. You''ve identified a critical data quality
  issue: the TU (Tumor Results) domain contains `TULOC` values using a mix of controlled
  terminology from CDISC CT (e.g., "LYMPH NODE") and free-text anatomical descriptions
  (e.g., "left axillary lymph node, level II"), while the RS (Disease Response) domain
  has `RSSTRESC` values that appear inconsistent with the underlying TU measurements
  — specifically, 23 subjects show "PARTIAL RESPONSE" in RS but their corresponding
  TU records indicate sum-of-diameters increases of 8–18% from nadir (below the 20%
  RECIST 1.1 threshold but above 0%).


  Additionally, the trial has partial dates in the CE (Clinical Events) domain where
  `CESTDTC` is recorded as "2023-UN-15" for 14 records, and your define.xml is missing
  `MethodDef` elements for all derived variables in ADRS (ADaM response dataset).


  Please provide:

  1. Python code to flag non-standard `TULOC` values against the CDISC Controlled
  Terminology for C96587 (Tumor Location) codelist using a fuzzy-matching tolerance
  approach

  2. A cross-domain validation function that identifies the RS/TU inconsistency described
  above, accounting for the RECIST 1.1 rules for PR vs. SD classification

  3. A partial date imputation function for "UN" month/day patterns following CDISC
  partial date conventions

  4. An XML snippet showing correct `MethodDef` structure for a BOR (Best Overall
  Response) derived variable in define.xml 2.0'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: hard
