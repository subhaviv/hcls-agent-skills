id: pharmacoepidemiology-14
prompt: 'You are conducting a pharmacoepidemiologic study using a large claims database
  (n = 485,000 insured adults) to evaluate whether GLP-1 receptor agonists (GLP-1
  RAs) reduce the risk of major adverse cardiovascular events (MACE) compared to DPP-4
  inhibitors in patients with type 2 diabetes. You plan to use a new-user active comparator
  design with inverse probability of treatment weighting (IPTW).


  Your preliminary analysis reveals the following challenges:

  - Mean follow-up differs substantially: 18 months for GLP-1 RAs vs. 31 months for
  DPP-4 inhibitors

  - 23% of patients switch or discontinue their index drug within 6 months

  - HbA1c values are only available for 41% of patients (a key confounder)

  - Stabilized weights have a max value of 47.3 and an effective sample size reduction
  of 68%


  Given these specific challenges, provide the following deliverables:


  1. Explain how each of the four issues above threatens causal inference and which
  bias each introduces

  2. Describe your strategy for handling the missing HbA1c data within the propensity
  score framework, specifying whether you would use multiple imputation, a missing
  indicator variable, or a pattern mixture approach — and justify your choice

  3. Propose a weight-trimming or stabilization strategy to address the extreme weights,
  including the specific percentile threshold you would use and its tradeoffs

  4. Write R pseudocode implementing stabilized IPTW with your chosen missing data
  strategy and weight-trimming approach, using the `WeightIt` and `mice` packages

  5. Describe one negative control outcome you would select to detect residual confounding
  and explain your selection rationale'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: intermediate
