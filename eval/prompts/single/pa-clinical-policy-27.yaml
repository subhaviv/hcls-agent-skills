id: pa-clinical-policy-27
prompt: 'A regional Medicare Advantage plan (MedFirst Health, 47,000 members) is implementing
  Da Vinci PAS (Prior Authorization Support) FHIR R4 API and needs to align their
  clinical policy engine with CMS LCD L38072 for Continuous Glucose Monitoring (CGM)
  devices. Their current PA denial rate for CGM requests is 23%, and internal audit
  shows 31% of denials are later overturned on appeal, suggesting upstream policy
  misalignment.


  The plan''s current CGM policy requires: (1) Type 1 or insulin-dependent Type 2
  diabetes diagnosis, (2) minimum 4 fingerstick tests daily documented over 3 months,
  (3) endocrinologist attestation, and (4) A1C ≥ 7.5% within 90 days.


  Recent CMS updates to LCD L38072 expanded CGM coverage criteria, and the plan suspects
  their policy is more restrictive than Medicare allows.


  Please provide:


  1. **Policy Gap Analysis**: Identify specific discrepancies between MedFirst''s
  current CGM PA criteria and CMS LCD L38072 requirements, noting where the plan''s
  policy is more restrictive than CMS allows.


  2. **Revised Clinical Criteria**: Draft updated PA clinical criteria language that
  aligns with LCD L38072 while remaining operationally implementable.


  3. **FHIR PAS Implementation Guidance**: Provide a sample FHIR R4 `ClaimResponse`
  resource snippet (JSON) demonstrating how to communicate a CGM PA approval with
  relevant supporting clinical codes (CPT, HCPCS, ICD-10) using Da Vinci PAS profiles.


  4. **Appeal Strategy Template**: Create a 5-point documentation checklist for providers
  submitting peer-to-peer review requests for CGM denials under the revised policy.'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: intermediate
