id: pa-clinical-policy-24
prompt: 'A 58-year-old patient with moderate-to-severe plaque psoriasis (BSA 22%,
  PASI score 18.4) has been prescribed secukinumab (Cosentyx) 300mg by their dermatologist.
  The commercial payer''s prior authorization policy requires documented failure of
  two conventional systemic therapies (methotrexate AND cyclosporine) before approving
  any biologic. The patient''s chart shows: (1) methotrexate trial at 15mg/week for
  8 weeks discontinued due to elevated LFTs (ALT 3x ULN), and (2) no cyclosporine
  trial documented, though the prescribing dermatologist notes cyclosporine is contraindicated
  due to the patient''s Stage 3 CKD (eGFR 34 mL/min/1.73m²).


  The PA request was denied citing "incomplete step therapy — cyclosporine trial not
  documented." The dermatologist wants to appeal and also implement a FHIR Da Vinci
  PAS integration to streamline future PA submissions for their 340-patient dermatology
  practice.


  Please provide:

  1. A clinical appeal strategy with specific documentation elements needed to argue
  medical necessity and contraindication exception to the step therapy requirement,
  citing relevant CMS or state step therapy override criteria

  2. A peer-to-peer review talking points outline the dermatologist should use when
  speaking with the payer''s medical director

  3. A sample FHIR Da Vinci PAS ClaimInquiry resource (JSON format) that captures
  this patient''s step therapy documentation, including the contraindication for cyclosporine
  as a structured prior auth supporting detail

  4. Recommendations for how the practice should configure their PA workflow system
  to auto-flag contraindication exceptions across their 340-patient panel to prevent
  similar denials'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: intermediate
