id: rna-seq-analysis-24
prompt: 'You are analyzing a bulk RNA-seq dataset comparing tumor vs. normal tissue
  samples from 8 patients (4 tumor, 4 normal). You ran Salmon (v1.9) with `--validateMappings`
  and `--gcBias` flags on human transcriptome (GENCODE v43), achieving average mapping
  rates of 87% for normal samples but only 61% for tumor samples. After importing
  with tximport using `countsFromAbundance = "lengthScaledTPM"`, your DESeq2 analysis
  (design = `~ condition`) yields only 23 differentially expressed genes at padj <
  0.05, which seems surprisingly low given the known biology of this tumor type. Your
  collaborator suggests re-running with STAR + featureCounts instead, arguing the
  low mapping rates are causing the weak DE signal.


  Please provide:


  1. **Diagnostic steps** to investigate why tumor mapping rates are 26 percentage
  points lower than normal — list at least 4 specific causes to check and how to check
  each one


  2. **A recommendation** on whether switching to STAR + featureCounts is likely to
  resolve the DE signal issue, with justification


  3. **DESeq2 QC code** (R) that generates a PCA plot colored by condition and a sample
  distance heatmap using `vst`-transformed counts, plus checks for outlier samples
  using Cook''s distances


  4. **Parameter adjustments** to the current Salmon → tximport → DESeq2 pipeline
  that could improve sensitivity without switching aligners — include at least one
  change at each step


  Assume GRCh38 genome, paired-end 150bp reads, and that raw FASTQ QC with FastQC
  showed no obvious adapter contamination.'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: intermediate
