id: rna-seq-analysis-18
prompt: 'You are analyzing a bulk RNA-seq dataset comparing tumor vs. adjacent normal
  tissue from 8 patients (4 tumor, 4 normal). You ran STAR alignment (2-pass mode,
  STAR 2.7.10a) with the GRCh38 primary assembly and Gencode v43 annotation, achieving
  85-92% unique mapping rates. You then quantified with both featureCounts (strand-specific,
  `-s 2`) and Salmon (v1.10, with `--gcBias --seqBias` flags, using a decoy-aware
  index). However, when you load both count matrices into DESeq2, you observe dramatically
  different results:


  - **featureCounts**: 1,847 DEGs at padj < 0.05 (after `lfcShrink` with `type="apeglm"`)

  - **Salmon/tximport**: 312 DEGs at padj < 0.05 (same shrinkage)


  Key metadata: Your library prep used a dUTP-based stranded protocol (TruSeq Stranded
  Total RNA). Insert sizes average 180bp with 150bp paired-end reads. One Salmon sample
  (tumor_03) shows a median TPM of 0.3 across all genes, while others show median
  TPM ~4-8.


  Please provide:

  1. A diagnostic checklist (minimum 5 items) to identify the root cause of the discrepancy,
  prioritizing the most likely explanations given the protocol details

  2. Working R code using tximport and DESeq2 that correctly handles the Salmon output,
  including the appropriate `type` argument and size factor estimation method

  3. A specific recommendation on which quantification method to trust for this experiment
  and why, referencing the strandedness parameters and the tumor_03 anomaly

  4. The corrected featureCounts strandedness flag if you suspect misconfiguration'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: hard
