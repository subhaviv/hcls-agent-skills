id: aws-genai-ml-architect-13
prompt: 'A regional oncology clinic with 45,000 patient records wants to deploy a
  clinical NLP solution on AWS to automatically extract structured data from unstructured
  radiology reports (approximately 8,000 new reports per month). The reports contain
  PHI and include findings related to tumor size, location, staging, and treatment
  recommendations. The clinic has an existing AWS account with a signed BAA and wants
  to remain HIPAA compliant throughout.


  The engineering team is debating between two approaches:

  - **Option A**: Amazon Comprehend Medical with a custom post-processing Lambda pipeline

  - **Option B**: Amazon Bedrock (Claude Sonnet) with structured output prompting
  and Bedrock Guardrails


  The reports average 400 words each, and the clinic needs extracted data in a standardized
  JSON schema with fields for: tumor_location, tumor_size_cm, TNM_stage, recommended_treatment,
  and follow_up_timeframe.


  Please provide:

  1. A recommendation on which approach (A or B) better fits this use case, with justification
  covering accuracy, HIPAA compliance posture, and cost at the given volume

  2. A high-level AWS architecture diagram description showing all relevant services,
  data flow, and security controls (encryption, IAM, VPC considerations)

  3. A sample Python code snippet demonstrating how to invoke your recommended service
  and parse the output into the required JSON schema

  4. An estimated monthly cost breakdown for processing 8,000 reports/month, assuming
  average report size of 400 words (~600 tokens)'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: easy
