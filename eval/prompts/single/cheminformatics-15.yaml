id: cheminformatics-15
prompt: 'You are building a virtual screening pipeline for a kinase inhibitor program.
  Your compound library contains 50,000 molecules stored as SMILES strings in a CSV
  file (`library.csv` with columns: `compound_id`, `smiles`). You have identified
  a reference compound, **Ref-001**, with SMILES `CC1=C(C(=O)Nc2ccc(F)cc2)C(c2ccccc2Cl)N(C(C)=O)C1`
  that shows promising activity (IC50 = 23 nM) against your target kinase.


  Your task is to triage this library using a multi-stage filtering and similarity
  approach:


  **Stage 1 – Druglikeness filter:** Apply combined Lipinski Rule of Five AND Veber
  rules (rotatable bonds ≤ 10, TPSA ≤ 140 Å²) to retain only drug-like compounds.


  **Stage 2 – PAINS removal:** From the drug-like set, flag and remove any PAINS compounds
  using RDKit''s FilterCatalog.


  **Stage 3 – Similarity enrichment:** From the cleaned set, retrieve the top 50 most
  similar compounds to Ref-001 using Morgan fingerprints (radius=2, nBits=2048) and
  Tanimoto similarity, keeping only those with similarity ≥ 0.40.


  **Deliverables:**

  1. Complete, runnable Python code using RDKit that implements all three stages in
  sequence, reading from `library.csv` and writing filtered results to `stage1_druglike.csv`,
  `stage2_no_pains.csv`, and `stage3_similar.csv`.

  2. For `stage3_similar.csv`, include columns: `compound_id`, `smiles`, `tanimoto_score`,
  plus all computed Lipinski/Veber descriptors.

  3. A brief explanation (3–5 sentences) of why PAINS removal is placed after druglikeness
  filtering rather than before, from both a computational efficiency and medicinal
  chemistry perspective.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: intermediate
