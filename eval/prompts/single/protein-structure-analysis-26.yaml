id: protein-structure-analysis-26
prompt: 'You are analyzing a homodimeric enzyme (PDB ID: 7XKP) that undergoes conformational
  changes upon substrate binding. You have two structures: the apo form (chain A and
  B, 312 residues each) and the holo form (with substrate analog bound, also chain
  A and B). Initial visual inspection suggests the binding site loop (residues 145-168)
  shifts significantly, while the core beta-sheet (residues 45-89) remains rigid.


  Your tasks are:


  1. **Structural superposition**: Write Python code using Biopython to superimpose
  the holo structure onto the apo structure using only the rigid core residues (45-89,
  both chains). Report the expected RMSD calculation approach and explain why using
  all Cα atoms would give misleading results here.


  2. **Binding pocket analysis**: After superposition, describe how you would use
  fpocket to detect and compare binding pockets between apo and holo forms. What specific
  fpocket output metrics (druggability score, volume, hydrophobicity) would you examine,
  and what threshold values indicate a druggable pocket?


  3. **Ramachandran analysis**: The loop residues 150-155 in the apo form are suspected
  to occupy disallowed regions. Write code to extract phi/psi angles for these residues
  using Biopython''s `PPBuilder`, and specify what percentage threshold of residues
  in disallowed regions would raise structural quality concerns.


  4. **DSSP secondary structure**: Compare secondary structure assignments for residues
  145-168 between apo and holo forms. What DSSP codes would indicate the loop has
  gained helical character upon binding, and how would this affect your interpretation
  of the conformational change?


  Provide complete, runnable code snippets for the computational tasks.'
