id: clinical-data-standards-15
prompt: 'A clinical trial team is preparing an adverse event frequency table for a
  regulatory submission. They have collected the following AEs (with patient counts,
  N=120) that all relate to liver-related findings:


  - "Hepatocellular damage" (n=8)

  - "Hepatic steatosis" (n=5)

  - "Liver function test abnormal" (n=14)

  - "Alanine aminotransferase increased" (n=22)

  - "Aspartate aminotransferase increased" (n=19)

  - "Hepatotoxicity" (n=3)

  - "Drug-induced liver injury" (n=6)

  - "Hyperbilirubinaemia" (n=11)


  The team is debating whether to present this data at the Preferred Term (PT) level,
  aggregate to the High Level Term (HLT) level, or use a combination approach. They
  are also concerned that some terms may map to different SOCs depending on MedDRA
  version.


  Please provide: (1) the correct MedDRA PT coding for each listed AE, including which
  terms are already valid PTs versus synonyms/LLTs that need to be mapped up; (2)
  the HLT and HLGT groupings for each PT, confirming whether all fall under the same
  SOC; (3) a recommendation with justification on whether to present at PT or HLT
  level for this submission, considering regulatory guidance on AE frequency thresholds
  and clinical interpretability; and (4) identification of any terms that could present
  dual-SOC mapping challenges and how to resolve them.'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: intermediate
