id: pharmacoepidemiology-24
prompt: 'A large integrated health system wants to study whether initiating GLP-1
  receptor agonists (vs. DPP-4 inhibitors) reduces the risk of major adverse cardiovascular
  events (MACE) in adults with type 2 diabetes. You have access to electronic health
  records from 2015–2023 covering 180,000 patients with type 2 diabetes, including
  pharmacy dispensing records, lab values (HbA1c, eGFR, lipids), diagnoses, procedures,
  and mortality data.


  The research team proposes the following design: identify all patients who filled
  a prescription for either drug class at any point during the study window, define
  the index date as the first observed prescription, and follow patients until MACE,
  death, or end of study. They plan to use propensity score matching on baseline covariates
  measured in the 12 months before index date.


  You notice several methodological concerns with this proposal.


  **Please provide:**


  1. Identify at least three specific design flaws in the proposed study, explaining
  the bias mechanism for each (e.g., immortal time bias, prevalent user bias, confounding
  by indication).


  2. Redesign the study using a new-user active comparator framework, specifying:
  washout period length and rationale, covariate assessment window, eligible population
  criteria, and index date definition.


  3. Explain why propensity score matching may be suboptimal here compared to IPTW
  with stabilized weights, particularly given the presence of time-varying confounders
  like HbA1c and eGFR that may change during follow-up and affect both treatment continuation
  and MACE risk.


  4. Write pseudocode (or R code using the `WeightIt` and `survival` packages) implementing
  the redesigned study''s propensity score estimation and weighted Cox model for MACE.


  5. Propose two negative control outcomes appropriate for this study and explain
  what a non-null association would suggest about residual confounding.'
