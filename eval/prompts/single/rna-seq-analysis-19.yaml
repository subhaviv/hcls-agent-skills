id: rna-seq-analysis-19
prompt: 'You are analyzing a human tumor vs. normal RNA-seq dataset (12 tumor samples,
  10 normal samples) where you ran both STAR+featureCounts and Salmon quantification
  pipelines in parallel. After running DESeq2 on both count sources, you observe a
  puzzling discrepancy: Salmon-based analysis identifies 2,847 differentially expressed
  genes (padj < 0.05, |log2FC| > 1), while the STAR+featureCounts analysis identifies
  only 412 genes under identical DESeq2 parameters. Key technical details:


  - STAR alignment: average 78% uniquely mapped reads, 12% multi-mapped reads

  - featureCounts run with default parameters (no multi-mapping, no fractional counting)

  - Salmon run with `--gcBias --seqBias` correction flags, using a decoy-aware index

  - The gene set unique to Salmon includes many ribosomal protein genes (RPL/RPS family)
  and several long genes (>50kb) like *AHNAK*, *OBSCN*, and *TTN*

  - tximport used `countsFromAbundance = "lengthScaledTPM"` for the DESeq2 matrix


  Provide: (1) a mechanistic explanation for why these specific gene categories (ribosomal
  proteins, long genes) drive the discrepancy; (2) R code to diagnose whether the
  featureCounts multi-mapping exclusion is the primary culprit using a specific diagnostic
  plot; (3) the corrected featureCounts command-line parameters to make results more
  comparable; and (4) a recommendation on which quantification to trust for this dataset,
  with justification.'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: hard
