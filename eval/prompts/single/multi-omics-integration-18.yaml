id: multi-omics-integration-18
prompt: 'You are conducting a multi-omics study of treatment-resistant depression
  (TRD) involving 847 patients with whole-blood RNA-seq (transcriptomics), plasma
  proteomics (SomaScan 7k panel), and serum metabolomics (untargeted LC-MS). However,
  due to sample availability constraints, only 412 patients have all three omics layers,
  285 have RNA-seq + proteomics only, and 150 have RNA-seq + metabolomics only. Batch
  effects are a concern: RNA-seq was processed in 4 batches (n≈212 each), proteomics
  in 2 batches, and metabolomics in 3 batches across 18 months.


  Your primary goal is to identify multi-omic molecular subtypes of TRD and their
  associated biological pathways, while maximizing statistical power by leveraging
  the partial-overlap samples.


  Please provide:


  1. A justified integration strategy (early, intermediate, or late fusion) that explicitly
  handles the unequal sample overlap, explaining why alternatives are inferior in
  this context

  2. A step-by-step batch correction pipeline specifying which algorithm to use per
  omics layer (e.g., ComBat-seq, limma removeBatchEffect, WaveICA2.0) and the order
  of operations relative to integration

  3. Python or R pseudocode implementing a MOFA+ model that incorporates all three
  views with missing data groups, including hyperparameter choices (number of factors,
  sparsity priors, convergence criteria)

  4. A strategy for interpreting the resulting MOFA+ factors, including which factor-to-covariate
  association tests to run and how to prioritize factors for downstream enrichment
  analysis

  5. One specific statistical pitfall unique to this partial-overlap design that could
  inflate subtype discovery, and how to guard against it'
target_skills:
- multi-omics-integration
domain: multi-omics
difficulty: hard
