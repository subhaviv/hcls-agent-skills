id: risk-adjustment-15
prompt: 'Here is test question #15 of 30:


  ---


  You are building a CMS-HCC risk adjustment pipeline for a Medicare Advantage plan
  with 12,000 members. Your data team has extracted the following partial member snapshot
  for three beneficiaries in the current measurement year (2024, using CMS-HCC Model
  V28):


  | Member ID | Age | Sex | Medicaid Dual | ICD-10 Codes Submitted |

  |-----------|-----|-----|---------------|------------------------|

  | M-1042 | 71 | F | Yes | E11.65, E11.40, I50.32, N18.3 |

  | M-2187 | 68 | M | No | I10, J44.1, F32.1 |

  | M-3309 | 79 | F | Yes | E08.65, E11.65, I50.9, I50.32 |


  Using CMS-HCC Model V28 coefficients and hierarchy rules, provide the following
  deliverables:


  1. **ICD-10-to-HCC Crosswalk**: Map each ICD-10 code to its corresponding HCC category
  (or note if it maps to none). Identify which codes are dropped after hierarchy resolution
  for each member.


  2. **RAF Score Calculation**: Compute the estimated RAF score for each member, showing
  the demographic component (age/sex/Medicaid coefficients) and disease component
  separately. Use representative V28 coefficients and clearly state any assumptions.


  3. **Hierarchy Resolution Code**: Write a Python function `resolve_hierarchies(hcc_list:
  list[int]) -> list[int]` that accepts a raw list of HCC integers and returns the
  list after applying CMS V28 trump/hierarchy rules for at least the diabetes and
  heart failure families.


  4. **Coding Gap Flag**: For member M-2187, who fills metformin and a LABA/ICS inhaler
  combination but has only I10 and J44.1 coded, identify potential undercoded HCCs
  and explain the Rx proxy logic used.


  ---'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: intermediate
