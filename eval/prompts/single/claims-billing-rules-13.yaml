id: claims-billing-rules-13
prompt: 'A rural family medicine clinic submits claims for 847 office visits over
  a 6-month period. During a routine audit, the following pattern is identified in
  their E&M billing distribution:


  - 99211 (Level 1): 12 claims (1.4%)

  - 99212 (Level 2): 31 claims (3.7%)

  - 99213 (Level 3): 89 claims (10.5%)

  - 99214 (Level 4): 478 claims (56.4%)

  - 99215 (Level 5): 237 claims (28.0%)


  The national benchmark distribution for family medicine shows approximately: 99211
  (5%), 99212 (18%), 99213 (35%), 99214 (32%), 99215 (10%).


  Additionally, 91% of the 99215 claims were submitted by a single provider (Dr. Marcus
  Heller), and 73% of those high-complexity visits lack documented medical decision-making
  complexity in the chart notes — instead showing templated "high complexity" checkboxes
  with minimal free-text clinical reasoning.


  Please provide the following deliverables:


  1. Calculate the statistical deviation between this clinic''s E&M billing distribution
  and national benchmarks, and explain what this pattern suggests from a fraud, waste,
  and abuse (FWA) perspective.

  2. Identify the specific CMS documentation requirements that appear to be violated
  for 99215 billing under the 2023 E&M guidelines.

  3. Distinguish whether this scenario more likely represents a coding error, upcoding,
  or potential fraud — and explain the criteria used to make that determination.

  4. Recommend a structured audit response plan, including what additional documentation
  should be requested and what corrective actions are appropriate if violations are
  confirmed.'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: easy
