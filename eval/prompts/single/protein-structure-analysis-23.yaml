id: protein-structure-analysis-23
prompt: 'You have downloaded the crystal structure of a fictional kinase **KIN7B**
  (PDB ID: 7XKB) and loaded it using Biopython''s `Bio.PDB` module. The structure
  contains a single chain (Chain A) with 312 residues, resolved at 2.1 Å resolution.
  You need to perform a basic secondary structure and flexibility analysis before
  preparing the structure for docking.


  **Specific tasks:**


  1. **DSSP Assignment**: Write Python code using `Bio.PDB.DSSP` to assign secondary
  structure to each residue in Chain A. Print a summary table showing residue number,
  residue name, DSSP secondary structure code, and phi/psi angles (rounded to 1 decimal
  place) for residues 50–75.


  2. **B-factor Analysis**: Extract the B-factor (temperature factor) for every Cα
  atom in Chain A. Identify the top 5 most flexible residues (highest B-factors) and
  the top 5 most rigid residues (lowest B-factors). Report these as a printed summary.


  3. **Visualization Recommendation**: Based on the B-factor data, describe how you
  would color the KIN7B structure in PyMOL to visually highlight flexible vs. rigid
  regions using the `spectrum` command with B-factors. Provide the exact PyMOL commands.


  4. **Interpretation**: Residues 180–195 in KIN7B form the activation loop. If the
  average B-factor of this loop is 42.3 Å² compared to the overall chain average of
  18.7 Å², what does this suggest about the activation loop''s conformational behavior,
  and how might this affect downstream docking calculations?


  Assume the structure file is saved locally as `7xkb.pdb` and DSSP is installed at
  `/usr/bin/dssp`.'
target_skills:
