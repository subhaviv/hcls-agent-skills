id: cell-type-annotation-28
prompt: 'You are analyzing a 45,000-cell single-cell RNA-seq dataset from human bone
  marrow samples collected from 12 MDS (myelodysplastic syndrome) patients and 8 healthy
  donors. Initial Leiden clustering at resolution 0.8 produced 28 clusters. You have
  already run CellTypist with the `Immune_All_High.pkl` model using default settings,
  but the results are problematic: 6 clusters received "Undetermined" labels, 3 clusters
  show conflicting majority votes where the top two labels differ by less than 5%
  of cells, and one cluster (cluster 14) is annotated as "HSC/MPP" but expresses canonical
  mature erythroid markers (HBB, HBA1, GYPA) at high levels alongside SPINK2 and AVP.


  Your tasks are:


  1. Write Python code to re-run CellTypist on the problematic clusters only using
  `over_clustering=True` with `min_prop=0.3`, and cross-validate results against SingleR
  using the `HumanPrimaryCellAtlasData` reference. Show how to extract and compare
  the two sets of predictions programmatically.


  2. For cluster 14 specifically, write code to generate a dotplot showing expression
  of a manually curated panel of 20 marker genes spanning HSC, erythroid progenitor,
  mature erythroid, and megakaryocyte lineages, then implement a scoring function
  using `sc.tl.score_genes` for each lineage to quantitatively resolve the annotation
  conflict.


  3. Provide a decision logic function that takes per-cluster CellTypist confidence
  scores, SingleR delta scores, and marker gene scores as inputs and outputs a final
  annotation with a confidence tier (HIGH/MEDIUM/LOW/UNRESOLVED), including specific
  numeric thresholds you would use and justification for each threshold choice.'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: hard
