id: ngs-quality-control-23
prompt: 'You have completed initial sequencing of a whole-genome sequencing (WGS)
  cohort and need to run a comprehensive quality control pipeline before proceeding
  to variant calling. You have paired-end FASTQ files (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`)
  from a 30x coverage Illumina NovaSeq run, a coordinate-sorted BAM file (`sample.bam`
  with index), and reference genome `ref.fasta`. Assume `THREADS=8` and output directory
  `OUT=qc_out`.


  Your task is to perform a complete QC assessment with the following deliverables:


  1. **Raw read QC**: Write a bash command to run FastQC on both paired FASTQ files
  simultaneously, saving results to `OUT/fastqc_raw/`.


  2. **Adapter trimming**: Write a `fastp` command to trim adapters and low-quality
  bases from the paired FASTQs, outputting trimmed reads to `OUT/trimmed/sample_R1_trimmed.fastq.gz`
  and `OUT/trimmed/sample_R2_trimmed.fastq.gz`. Enable JSON and HTML report generation,
  set minimum read length to 50 bp, and use a quality threshold of Q20.


  3. **Coverage analysis**: Write a `mosdepth` command to calculate genome-wide coverage
  from `sample.bam` using 500 bp windows, with output prefix `OUT/mosdepth/sample`.


  4. **Aggregated QC report**: Write a MultiQC command to aggregate all QC outputs
  from the `OUT/` directory into a single HTML report saved to `OUT/multiqc/`.


  5. **Interpretation**: List three specific QC metrics you would examine in the MultiQC
  report to decide whether this sample passes QC for WGS variant calling, and briefly
  state the acceptable threshold for each metric.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: easy
