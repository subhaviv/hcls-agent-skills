id: cdisc-compliance-11
prompt: 'A clinical trial sponsor is preparing SDTM datasets for an FDA submission
  of a Phase III oncology study (Study ONC-2024-001, N=342 patients). The Adverse
  Events domain (AE) has been mapped, but the programming team is unsure how to handle
  several non-standard variables collected in the source CRF.


  The following additional AE data elements were collected but have no standard SDTM
  variable in the AE domain:

  - **AECAUSE2**: A second causality assessment from an independent safety reviewer
  (text, e.g., "RELATED", "NOT RELATED")

  - **AETRNUM**: Treatment number associated with the AE (numeric, 1–4, since patients
  could receive up to 4 sequential treatments)

  - **AESEVNUM**: Numeric severity score (1–5 scale) alongside the standard AESEV
  text variable


  The team is considering three options: (1) dropping these variables entirely, (2)
  adding them as non-standard variables directly in the AE domain, or (3) creating
  a SUPPAE dataset.


  Please provide:

  1. A clear recommendation on which approach is most CDISC-compliant for each of
  the three variables, with justification referencing SDTM Implementation Guide principles

  2. The correct SUPPAE row structure (STUDYID, RDOMAIN, USUBJID, IDVAR, IDVARVAL,
  QNAM, QLABEL, QVAL, QORIG, QEVAL) for AECAUSE2 using a fictional example patient
  (USUBJID = "ONC2024-001-0042", AESEQ = 3)

  3. A brief explanation of when QEVAL should be populated versus left null in SUPPQUAL
  datasets'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: easy
