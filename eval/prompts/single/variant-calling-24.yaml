id: variant-calling-24
prompt: 'Here is test question #24 of 30:


  ---


  You are setting up a somatic variant calling pipeline using GATK Mutect2 for a cohort
  of 45 tumor samples from a colorectal cancer study. All samples were sequenced on
  Illumina NovaSeq 6000 with 150bp paired-end reads at approximately 120x mean coverage
  using a custom 500-gene panel (WES-like capture). You have matched normal tissue
  for only 28 of the 45 tumor samples; the remaining 17 are tumor-only.


  Your sequencing facility has provided you with pre-aligned BAM files (aligned with
  BWA-MEM2 to hg38), and you have access to the GATK resource bundle including the
  gnomAD germline resource, the Panel of Normals (PON) built from 1000 Genomes normals,
  and the common biallelic SNPs VCF for contamination estimation.


  Please provide:


  1. A complete Mutect2 command-line invocation for a tumor-normal pair (sample IDs:
  `CRC_T_007` and `CRC_N_007`) that includes all recommended flags for a panel-based
  somatic calling workflow, including orientation bias filtering preparation.


  2. A separate Mutect2 command for a tumor-only sample (`CRC_T_031`) that appropriately
  compensates for the lack of a matched normal.


  3. A step-by-step FilterMutectCalls workflow for both scenarios, including the intermediate
  steps (GetPileupSummaries, CalculateContamination, LearnReadOrientationModel) with
  realistic file names.


  4. An explanation of the key parameter differences between the tumor-normal and
  tumor-only modes and why the tumor-only mode has a higher expected false positive
  rate, with one concrete mitigation strategy beyond using the PON.'
target_skills:
- variant-calling
domain: genomics
difficulty: intermediate
