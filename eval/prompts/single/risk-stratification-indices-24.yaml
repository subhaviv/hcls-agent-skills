id: risk-stratification-indices-24
prompt: 'A regional health system is preparing to launch a care transitions program
  targeting high-risk patients for 30-day readmission prevention. The analytics team
  has extracted the following cohort statistics from their EHR for the past 12 months:
  8,400 adult inpatient discharges, 30-day readmission rate of 14.2%, mean length
  of stay 4.1 days, and 38% of patients coming from ZIP codes in ADI national percentile
  ranks ≥85 (high deprivation). The team currently calculates LACE scores at discharge
  but is debating whether to incorporate Elixhauser comorbidity weighting or Charlson
  Comorbidity Index alongside LACE to improve stratification.


  The program has capacity to enroll only 600 patients per month in intensive post-discharge
  follow-up (phone coaching, home visits, medication reconciliation).


  Please provide the following:


  1. A comparative analysis of LACE, Charlson, and Elixhauser indices — specifically
  their strengths and limitations in predicting 30-day readmission for a mixed medical-surgical
  population like this one.


  2. A recommended composite stratification approach that incorporates SDOH factors
  (ADI percentile and relevant Z-codes such as Z59.x, Z60.x) alongside at least one
  comorbidity index. Justify your index selection over the alternatives.


  3. A proposed risk-tier cutoff framework (e.g., high/medium/low) with approximate
  score thresholds, designed to identify the roughly 600 highest-risk patients per
  month from the 700 average monthly discharges.


  4. A Python pseudocode snippet (10–20 lines) demonstrating how to compute a composite
  risk score by combining a normalized LACE score, Charlson score, and a binary ADI
  flag (ADI ≥85th percentile = 1), using example weights of 0.5, 0.3, and 0.2 respectively.'
