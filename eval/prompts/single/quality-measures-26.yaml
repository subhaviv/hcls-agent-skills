id: quality-measures-26
prompt: 'Here is test question #26 of 30:


  ---


  You are a healthcare data analyst at a regional health plan with 85,000 commercial
  members. Your team needs to implement the **HEDIS Controlling High Blood Pressure
  (CBP)** measure for the current measurement year. You have access to a claims database
  with the following tables: `members` (member_id, dob, gender, enrollment_start,
  enrollment_end), `medical_claims` (claim_id, member_id, service_date, dx_code, proc_code,
  place_of_service), and `bp_readings` (member_id, reading_date, systolic, diastolic,
  source).


  Your preliminary data pull shows 12,400 members aged 18–85 with at least one hypertension
  diagnosis (ICD-10: I10) in the past two years. Of these, 3,200 have been flagged
  as potentially non-compliant based on missing recent BP readings.


  **Deliverables required:**


  1. Write a SQL query to identify the **eligible denominator** population, enforcing
  HEDIS continuous enrollment rules (11 of 12 months, allowing one gap ≤ 45 days)
  for members aged 18–85 with an active hypertension diagnosis during the measurement
  year.


  2. Write a second SQL query to identify **numerator-compliant members** — those
  with a most recent BP reading where systolic < 140 AND diastolic < 90, with the
  reading occurring during the measurement year.


  3. Calculate the **expected CBP measure rate** if 68% of the 12,400 flagged members
  meet denominator criteria and current numerator compliance is 54%, then explain
  what rate improvement would be needed to reach the NCQA 75th percentile benchmark
  of 67%.


  4. Describe two **care gap intervention strategies** appropriate for the 3,200 non-compliant
  members, including which claims-based signals you would use to prioritize outreach.'
