id: cell-type-annotation-29
prompt: 'You are analyzing a single-cell RNA-seq dataset from 47 pediatric ALL (acute
  lymphoblastic leukemia) patients containing 284,000 cells across 38 Leiden clusters
  (resolution=1.2). Initial marker-based inspection reveals that clusters 12, 19,
  and 31 each express both T cell markers (CD3D, CD3E, TRAC) and myeloid markers (LYZ,
  CST3, CD14) at moderate levels, creating ambiguous annotations. Additionally, clusters
  7 and 22 show high expression of DNTT, CD34, and CD19 but lack mature B cell markers
  (MS4A1, CD27), suggesting they may represent leukemic blasts rather than normal
  progenitors.


  Your task is to resolve these annotation conflicts using a multi-method approach:


  1. Write Python code using CellTypist with `majority_voting=True` on the "Immune_All_High.pkl"
  model, followed by SingleR using the HumanPrimaryCellAtlasData reference, to generate
  two independent annotation layers. Include code to compute per-cluster annotation
  agreement scores between the two methods.


  2. For the ambiguous clusters (12, 19, 31), write code to perform over-clustering
  (Leiden resolution=3.5) within those clusters only, then re-annotate the sub-clusters
  to determine if they represent doublets or genuine mixed-phenotype cells. Include
  a doublet score threshold of 0.25 using Scrublet predictions.


  3. Design a marker gene dotplot (minimum 5 markers per lineage) covering T cells,
  B cells, myeloid cells, NK cells, and leukemic blasts, and write code to generate
  it.


  4. Provide a decision framework (as commented code logic) for reconciling conflicting
  CellTypist/SingleR calls, prioritizing leukemic blast identification when DNTT+CD34
  co-expression exceeds a log-normalized expression threshold of 1.5 in clusters 7
  and 22.'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: hard
