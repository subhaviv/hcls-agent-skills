id: radiology-preprocessing-24
prompt: 'You are building an automated T1w preprocessing pipeline for a multi-site
  neuroimaging study involving 847 participants across 4 scanner sites (Siemens Prisma
  3T, GE Discovery MR750 3T, Philips Achieva 3T, and Siemens Skyra 1.5T). Quality
  control has flagged that 23% of subjects processed with FSL''s BET show incomplete
  skull stripping — either leaving dura/meninges tissue or over-aggressively removing
  cortical gray matter near the temporal poles. Your team is considering switching
  to HD-BET for these failed cases while keeping BET for successful ones.


  Your preprocessing chain currently runs: fslreorient2std → N4BiasFieldCorrection
  (4 iterations, 50×50×50×50 convergence) → BET (f=0.35, g=0) → ANTs SyN registration
  to MNI152 1mm template.


  **Deliverables required:**


  1. Write a Python/bash hybrid script that automatically detects BET failures using
  brain volume thresholds (flag if extracted brain volume falls outside 900–1600 mL)
  and reruns those cases with HD-BET, logging all substitutions to a CSV file.


  2. Explain whether N4 bias correction should be applied before or after skull stripping
  in this pipeline, and whether the current convergence parameters are appropriate
  for 1.5T vs 3T data.


  3. Describe how you would harmonize the ANTs SyN registration quality across the
  4 scanner sites given intensity differences — specifically whether you would adjust
  the moving image metric (CC vs MI) and the gradient step size (currently 0.1).


  4. Propose a QC metric beyond brain volume (e.g., using registration Jacobian determinants
  or normalized cross-correlation to the MNI template) to catch registration failures
  post-hoc.'
