id: drug-repurposing-26
prompt: 'A rare pediatric neurological disorder called **Striatal Atrophy with Cognitive
  Decline (SACD)** has been linked to loss-of-function variants in *HDAC9* and upregulation
  of *BDNF* signaling through compensatory mechanisms. A research team has generated
  the following preliminary data from 47 SACD patient-derived iPSC neurons compared
  to 47 age-matched controls using L1000 transcriptomic profiling:


  **Top dysregulated genes (SACD vs. control):**

  - Upregulated: *HDAC1*, *HDAC3*, *REST*, *MECP2*, *NRXN1*

  - Downregulated: *SYP*, *DLG4*, *SHANK3*, *GRIN2B*, *MAP2*


  The team wants to identify FDA-approved drugs that could reverse this transcriptomic
  signature using a phenotype-based CMap approach, while also cross-referencing target-based
  candidates through DGIdb for HDAC1/HDAC3 inhibition.


  **Please provide:**

  1. A step-by-step CMap/L1000 query strategy to identify signature-reversing compounds,
  including how to compute a connectivity score and what threshold (τ score) to apply
  for candidate selection

  2. A ranked list of at least **4 plausible FDA-approved repurposing candidates**
  with their mechanisms of action and rationale for SACD relevance

  3. Python pseudocode to query DGIdb''s API for HDAC1 and HDAC3 inhibitors, filter
  by "approved" drug status, and output a ranked table by interaction score

  4. An assessment of the **top 2 candidates** for clinical translatability in pediatric
  patients, considering blood-brain barrier penetration, existing pediatric safety
  data, and dosing considerations

  5. A recommendation on whether target-based or phenotype-based evidence is stronger
  for this indication, with justification'
target_skills:
- drug-repurposing
domain: drug-discovery
difficulty: intermediate
