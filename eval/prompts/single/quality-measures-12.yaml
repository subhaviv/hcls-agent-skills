id: quality-measures-12
prompt: 'Here is test question #12 of 30:


  ---


  You are a healthcare data analyst at Meridian Health Plan, which covers 45,000 commercial
  members. Your medical director wants to evaluate performance on the **Breast Cancer
  Screening (BCS) HEDIS measure** for the current measurement year (January 1 – December
  31, 2024).


  Your claims database has the following tables:

  - `members` (member_id, dob, gender, enrollment_start, enrollment_end, plan_id)

  - `claims` (claim_id, member_id, service_date, procedure_code, diagnosis_code, place_of_service)

  - `pharmacy` (rx_id, member_id, fill_date, ndc_code, days_supply)


  Key parameters for your measure:

  - Eligible population: Female members aged 52–74 as of December 31, 2024

  - Continuous enrollment requirement: Enrolled for 11 out of 12 months in 2024 (allowing
  one gap of up to 45 days)

  - Numerator event: At least one mammogram (CPT codes 77067, 77066, 77065) in 2024
  **or** 2023

  - Current preliminary data shows 8,200 eligible members with a raw numerator count
  of 4,510


  Please provide the following deliverables:


  1. **SQL query** to identify the denominator (eligible, continuously enrolled female
  members aged 52–74) using the tables described above

  2. **SQL query** to identify numerator-qualifying mammogram claims within the two-year
  lookback window

  3. **Calculated measure rate** based on the preliminary numbers provided, expressed
  as a percentage rounded to two decimal places

  4. **Two specific recommendations** for closing care gaps based on this measure
  rate, assuming the national HEDIS 90th percentile benchmark is 77.4%


  ---'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: easy
