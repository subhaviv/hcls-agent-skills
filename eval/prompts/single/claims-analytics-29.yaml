id: claims-analytics-29
prompt: 'Here is test question #29 of 30:


  ---


  A regional Medicare Advantage plan has flagged a neurology group practice (NPI:
  1234567890, "Great Lakes Neurology Associates") for a comprehensive fraud investigation.
  The practice billed 847 claims over 6 months across 12 neurologists. Initial review
  reveals the following suspicious patterns: (1) Provider NPI 1234567891 billed CPT
  95819 (EEG, awake and asleep) and CPT 95957 (digital analysis of EEG) together on
  73% of claims — a known NCCI bundling conflict; (2) Three providers show E&M level
  99215 utilization rates above 89%, compared to a specialty peer benchmark of 31%;
  (3) Provider NPI 1234567895 logged 312 face-to-face patient encounters in a single
  31-day month; (4) Benford''s Law analysis of submitted charges shows a first-digit
  distribution where digit "5" appears at 28.4% frequency versus an expected 7.9%.


  Your deliverables are: (1) Write Python code using pandas to programmatically validate
  NCCI bundling conflicts for the CPT 95819/95957 pair across a claims DataFrame with
  columns `claim_id`, `npi`, `dos`, `cpt_codes` (list), `billed_amount`; (2) Build
  a provider-level E&M upcoding score that weights both utilization rate deviation
  from peer benchmark AND claim volume, returning a ranked DataFrame; (3) Calculate
  the maximum theoretically possible face-to-face encounters per month given CMS documentation
  requirements for 99215 (minimum 40 minutes per encounter) and flag the provider
  accordingly; (4) Write a Benford''s Law chi-square test function that returns a
  p-value and fraud risk classification ("Low", "Medium", "High") based on configurable
  significance thresholds. Include all edge cases and explain your fraud risk reasoning
  for each finding.'
target_skills:
