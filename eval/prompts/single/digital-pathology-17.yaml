id: digital-pathology-17
prompt: 'You are building a multiple-instance learning (MIL) pipeline for predicting
  microsatellite instability (MSI) status from H&E-stained colorectal cancer whole-slide
  images. Your dataset consists of 847 SVS files from the TCGA-COAD cohort (512 MSS,
  335 MSI-H), with slides scanned at 40× (0.25 mpp). You want to use the **UNI** foundation
  model (from MahmoodLab) to extract patch-level embeddings, then aggregate them using
  an attention-based MIL (ABMIL) classifier.


  Your specific requirements are:


  1. Use TIAToolbox''s `WSIReader` to extract non-overlapping 256×256 patches at **0.5
  mpp** (20× effective magnification) from tissue regions only, using Otsu-based tissue
  masking with a coverage threshold of 0.75.


  2. Write a Python function `extract_uni_embeddings(slide_path, model, processor)`
  that processes a single SVS file and returns a NumPy array of shape `(N, 1024)`
  where N is the number of valid patches, using batch inference with batch size 32.


  3. Implement a minimal **ABMIL** `nn.Module` in PyTorch with a 2-layer attention
  network (hidden dim=256) that takes a variable-length bag of embeddings `(N, 1024)`
  and outputs a slide-level binary prediction along with attention weights.


  4. Describe how you would handle class imbalance (MSS:MSI-H ≈ 60:40) during training,
  including a specific weighted loss configuration.


  5. Explain one potential failure mode specific to using UNI embeddings with colorectal
  WSIs from TCGA and how to detect it.'
target_skills:
- digital-pathology
domain: imaging
difficulty: intermediate
