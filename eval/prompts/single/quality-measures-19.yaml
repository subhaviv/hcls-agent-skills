id: quality-measures-19
prompt: 'A regional health plan with 85,000 covered lives needs to calculate the HEDIS
  Comprehensive Diabetes Care (CDC) measure bundle for the current measurement year.
  Your claims data warehouse contains the following tables: `medical_claims` (claim_id,
  member_id, service_date, diagnosis_codes[], procedure_codes[], pos_code), `pharmacy_claims`
  (claim_id, member_id, fill_date, ndc_code, days_supply), `lab_results` (member_id,
  result_date, loinc_code, result_value, result_unit), and `enrollment` (member_id,
  enrollment_start, enrollment_end, product_line).


  The complicating factors are: (1) 3,200 members have gaps in enrollment — specifically,
  they disenrolled for 47 days mid-year before re-enrolling, which falls near the
  45-day allowable gap threshold; (2) HbA1c results exist in two sources — lab_results
  table (LOINC 4548-4) and as structured data in medical claims via CPT 83036, with
  some members having conflicting values within the same 90-day window; (3) approximately
  890 members have a diabetes diagnosis only on a claim with POS code 23 (emergency
  department), which HEDIS excludes for denominator identification.


  Please provide: (1) Complete SQL logic for continuous enrollment validation accounting
  for the 45-day gap rule with the exact day-count boundary condition; (2) Denominator
  identification SQL that correctly excludes ED-only diabetes diagnoses; (3) Numerator
  logic for the HbA1c Control (<8%) sub-measure that reconciles duplicate/conflicting
  lab sources using HEDIS tie-breaking rules; (4) A care gap detection query identifying
  members who are in the denominator but missing each CDC sub-measure; (5) A brief
  explanation of how the 47-day gap members should be handled and why the POS 23 exclusion
  exists from a measurement integrity standpoint.'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: hard
