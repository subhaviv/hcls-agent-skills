id: scrna-seq-pipeline-22
prompt: 'You have completed a 10X Chromium scRNA-seq experiment on peripheral blood
  mononuclear cells (PBMCs) from 3 healthy donors. CellRanger output is stored in
  three separate directories: `sample_donor1/filtered_feature_bc_matrix/`, `sample_donor2/filtered_feature_bc_matrix/`,
  and `sample_donor3/filtered_feature_bc_matrix/`. Initial inspection suggests each
  sample contains approximately 5,000–7,000 cells before filtering.


  Your goal is to perform a complete quality control and preprocessing pipeline using
  Scanpy. Specifically, you need to:


  1. **Load all three samples** using `sc.read_10x_mtx()` and concatenate them into
  a single AnnData object, preserving donor identity as a batch label in `adata.obs[''batch'']`.


  2. **Apply QC filtering** using the following thresholds: minimum 200 genes per
  cell, maximum 6,000 genes per cell (to remove potential doublets), and mitochondrial
  gene percentage below 20%. Calculate and visualize these QC metrics using a violin
  plot before and after filtering.


  3. **Normalize and log-transform** the count matrix using `sc.pp.normalize_total()`
  with a target sum of 10,000, followed by `sc.pp.log1p()`.


  4. **Select highly variable genes** targeting the top 2,000 HVGs using the `seurat_v3`
  flavor, then scale the data (zero mean, unit variance, clipping max value at 10).


  5. **Run PCA** retaining 50 components and generate an elbow plot to justify the
  number of PCs used downstream.


  Please provide complete, runnable Python code for all five steps, including necessary
  imports and inline comments explaining each major operation. Also explain why mitochondrial
  gene percentage is used as a QC metric.'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: easy
