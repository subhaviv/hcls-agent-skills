id: pa-clinical-policy-22
prompt: 'A 58-year-old patient with moderate-to-severe rheumatoid arthritis (RA) has
  been prescribed Abatacept (Orencia) 125mg subcutaneous weekly by their rheumatologist.
  The patient''s insurer, BlueShield Meridian PPO, has issued a prior authorization
  denial citing failure to meet step therapy requirements. The denial letter references
  the plan''s RA Biologic Step Therapy Protocol (Policy #UM-RHEUM-2024-07), which
  requires documented trial and failure of two conventional synthetic DMARDs (csDMARDs)
  before approving any biologic agent.


  The patient''s medical record shows:

  - Methotrexate 20mg/week for 14 weeks — discontinued due to hepatotoxicity (ALT
  elevated 4x ULN)

  - Leflunomide 20mg/day for 6 weeks — discontinued due to GI intolerance and persistent
  diarrhea

  - Current DAS28-CRP score: 5.8 (indicating high disease activity)

  - Positive anti-CCP antibodies (>250 U/mL), RF positive

  - No prior biologic therapy


  The treating physician wants to appeal the denial and request a peer-to-peer review.


  Please provide:

  1. An analysis of whether the documented csDMARD trials satisfy typical step therapy
  adequacy criteria (duration, dosing, and discontinuation reasons)

  2. A structured appeal letter template the physician can use, citing the specific
  clinical evidence and medical necessity justification

  3. Three key talking points the physician should raise during the peer-to-peer review
  call

  4. An explanation of what "step therapy exception" protections exist under CMS and
  state law that may apply to this case'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: easy
