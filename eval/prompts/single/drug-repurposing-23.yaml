id: drug-repurposing-23
prompt: 'A small biotech company is evaluating **metformin** (an approved Type 2 diabetes
  drug) as a potential repurposing candidate for **pancreatic ductal adenocarcinoma
  (PDAC)**. Their preclinical team has generated the following data points:


  - Metformin inhibits Complex I of the mitochondrial electron transport chain, activating
  AMPK (gene: *PRKAA1*) and suppressing mTORC1 signaling

  - An in-house RNA-seq dataset from 45 PDAC tumor samples shows *PRKAA1* expression
  is downregulated (log2FC = -1.8, FDR = 0.003) compared to 20 normal pancreatic tissue
  controls

  - A retrospective cohort study of 312 diabetic patients with PDAC showed that metformin
  users (n=148) had a median OS of 14.2 months vs. 10.1 months in non-users (n=164),
  HR=0.71, p=0.04

  - OpenTargets lists an association score of 0.42 between *PRKAA1* and pancreatic
  cancer


  Given this information, please provide:


  1. A structured assessment of the repurposing evidence strength using a standard
  evidence hierarchy framework, scoring each data point

  2. An evaluation of the mechanism-of-action overlap and whether the proposed target
  (*PRKAA1*) is biologically plausible for PDAC

  3. A recommendation on whether to advance metformin to a Phase II trial in PDAC,
  with specific justification

  4. Two additional experiments or database queries (e.g., CMap, DGIdb, ChEMBL) the
  team should conduct to strengthen their repurposing case before committing to clinical
  investment'
target_skills:
- drug-repurposing
domain: drug-discovery
difficulty: easy
