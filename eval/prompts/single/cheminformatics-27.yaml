id: cheminformatics-27
prompt: 'You are building a virtual screening pipeline for a kinase inhibitor program.
  Your compound library contains the following 8 SMILES strings (with IDs):


  | ID | SMILES |

  |----|--------|

  | CPD001 | Cc1ccc(NC(=O)c2ccc(CN3CCN(C)CC3)cc2)cc1Nc1nccc(-c2cccnc2)n1 |

  | CPD002 | CC(C)(C)OC(=O)Nc1ccc(-c2ccc(NC(=O)Nc3ccc(Cl)c(C(F)(F)F)c3)cc2)cc1 |

  | CPD003 | O=C(Nc1ccc(Oc2ccc(NC(=O)c3csc(Nc4ccncc4)n3)cc2)cc1)c1ccncc1 |

  | CPD004 | c1ccc(-c2cccc(-c3cccc(-c4ccccn4)n3)n2)cc1 |

  | CPD005 | CC(=O)Oc1ccccc1C(=O)O |

  | CPD006 | Oc1ccc(CC2SC(=O)NC2=O)cc1 |

  | CPD007 | O=C(CCCN1CCC(n2c(=O)[nH]c3ccccc32)CC1)c1ccc(F)cc1 |

  | CPD008 | CC12CCC3c4ccc(O)cc4CCC3C1CCC2=O |


  Your task:

  1. Write RDKit Python code to compute MW, LogP, HBD, HBA, TPSA, and rotatable bonds
  for all 8 compounds, then flag which fail Lipinski''s Rule of Five (any 2+ violations)
  and which fail Veber''s rules (TPSA > 140 Å² or rotatable bonds > 10).

  2. Using RDKit''s PAINS filter (FilterCatalog), identify which compounds contain
  PAINS substructures and name the specific alert triggered.

  3. Calculate pairwise Tanimoto similarity using Morgan fingerprints (radius=2, 2048
  bits) between CPD001 and all others, then identify the most structurally similar
  compound.

  4. Provide a ranked shortlist of compounds suitable for further profiling, with
  justification.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: intermediate
