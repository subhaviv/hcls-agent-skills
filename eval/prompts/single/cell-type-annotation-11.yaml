id: cell-type-annotation-11
prompt: 'You have processed a 10x Genomics scRNA-seq dataset from human peripheral
  blood mononuclear cells (PBMCs) containing 8,500 cells across 14 Leiden clusters
  (resolution 0.5). Your AnnData object is stored as `adata` with raw counts in `adata.X`
  and UMAP coordinates already computed. You want to perform automated cell type annotation
  using CellTypist with the "Immune_All_High.pkl" model.


  Please provide the following:


  1. **Complete Python code** to run CellTypist annotation on this dataset, including
  any necessary preprocessing steps (normalization to 10,000 counts per cell, log1p
  transformation) performed on a copy of the data while preserving the original counts.


  2. **Code to run annotation twice**: once with `majority_voting=False` (per-cell
  predictions) and once with `majority_voting=True` using the existing Leiden clusters
  as the grouping variable (`over_clustering` parameter set to the Leiden column name
  `"leiden"`).


  3. **Code to generate a summary comparison** that prints, for each of the 14 Leiden
  clusters, both the majority-voted label and the top 3 most frequent per-cell predicted
  labels with their percentage of cells in that cluster.


  4. **A UMAP visualization** showing four panels: raw Leiden clusters, per-cell CellTypist
  predictions, majority-voted labels, and CellTypist confidence scores — saved as
  "celltypist_annotation_comparison.png" at 150 dpi.


  Assume CellTypist is already installed and the model is available via `celltypist.models.Model.load("Immune_All_High.pkl")`.'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: easy
