id: risk-adjustment-strategy-17
prompt: 'A Medicare Advantage plan is preparing its 2024 risk adjustment submission
  and must navigate the CMS-mandated blended transition from V24 to V28 (60% V28 /
  40% V24 weighting for payment year 2025). Their analytics team has pulled a cohort
  of 850 members with documented Type 2 diabetes and is seeing significant RAF score
  variance between the two model versions due to V28''s restructured diabetes HCC
  categories.


  Specifically, the team has identified three patient subgroups:

  - **Group A (320 members):** Type 2 diabetes with diabetic chronic kidney disease,
  Stage 3 (ICD-10: E11.65 + N18.3)

  - **Group B (215 members):** Type 2 diabetes with diabetic peripheral angiopathy
  without gangrene (ICD-10: E11.51)

  - **Group C (315 members):** Type 2 diabetes with hyperglycemia (ICD-10: E11.65
  + E11.649)


  The plan uses a prospective coding program and wants to maximize audit-defensible
  RAF scores under the blended model while ensuring clinical documentation integrity.


  Please provide:

  1. A comparative HCC mapping analysis showing how each ICD-10 code maps under V24
  vs. V28, including which HCC categories apply and any hierarchy changes between
  models

  2. The blended RAF score impact calculation methodology for each group, showing
  how the 60/40 weighting affects aggregate risk scores

  3. An identification of any disease interaction (coefficient) opportunities that
  exist in V28 but not V24 for these diagnoses

  4. Specific clinical documentation requirements that would make each group''s coding
  audit-defensible under a RADV audit scenario

  5. A prioritization recommendation for the plan''s prospective outreach efforts
  based on RAF uplift potential per member'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: intermediate
