id: radiology-preprocessing-18
prompt: 'You are processing a retrospective cohort of 847 T1w MPRAGE scans acquired
  across three different scanner sites (Site A: Siemens Prisma 3T, Site B: GE Discovery
  MR750 3T, Site C: Philips Ingenia 1.5T). Quality control reveals that 23% of scans
  from Site C have significant B1+ field inhomogeneity artifacts causing intensity
  gradients exceeding 40% variation across the brain volume, while 11% of scans from
  Site A show severe neck inclusion artifacts that are causing HD-BET to fail with
  incomplete brain masks (leaving dura and partial skull). Additionally, the Site
  B scans were acquired with a non-standard oblique orientation that is causing fslreorient2std
  to produce incorrect axis assignments in approximately 8% of cases.


  Your task is to design a robust preprocessing pipeline that addresses all three
  failure modes simultaneously. Specifically:


  1. Provide a detailed N4BiasFieldCorrection parameter tuning strategy (convergence
  thresholds, B-spline grid resolution, number of fitting levels) specifically optimized
  for the severe Site C inhomogeneity cases, explaining why default parameters fail
  here.


  2. Write an ANTs/FSL shell script that implements a fallback brain extraction strategy
  for the Site A neck-inclusion failures, using a two-stage approach with initial
  registration to MNI space to generate a prior mask before final HD-BET extraction.


  3. Design a validation approach using Dice coefficient thresholds to automatically
  detect the Site B orientation failures post-fslreorient2std, and provide correction
  logic.


  4. Specify the complete SyN registration parameters for final MNI152 normalization
  that account for the residual intensity differences between the three sites after
  bias correction.'
target_skills:
