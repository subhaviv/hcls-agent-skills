id: multi-omics-integration-20
prompt: 'You are analyzing a rare pediatric brain tumor cohort (n=47 patients) with
  four omics layers: whole-genome methylation arrays (850K CpG sites), RNA-seq (18,432
  expressed genes after filtering), reverse-phase protein arrays (RPPA, 217 proteins),
  and targeted metabolomics (LC-MS/MS, 312 metabolites). The sample overlap is incomplete:
  all 47 patients have methylation and RNA-seq data, only 31 have RPPA measurements,
  and only 22 have metabolomics data (with 18 patients having all four layers). Batch
  effects are present — methylation was processed in 3 batches, RNA-seq in 2 batches,
  and metabolomics across 2 instrument runs.


  You want to identify multi-omic subtypes with clinical relevance (overall survival,
  treatment response) and understand which molecular axes drive subtype differences.


  Please provide:


  1. A justified integration strategy recommendation — specifically whether to use
  MOFA+, iCluster+, or SNF given the partial sample overlap and data modality mix,
  including why the runner-up methods are suboptimal here.


  2. A concrete batch correction pipeline for each omics layer before integration,
  specifying which covariates to include in ComBat or limma::removeBatchEffect calls
  and how to handle the methylation M-value vs. beta-value choice.


  3. Python or R pseudocode (≥25 lines) implementing your chosen integration method
  with appropriate handling of missing samples across modalities.


  4. A strategy for validating the resulting factors/subtypes, including which survival
  analysis approach to use given n=47 and how to avoid overfitting when linking multi-omic
  factors to clinical outcomes.'
target_skills:
- multi-omics-integration
domain: multi-omics
difficulty: hard
