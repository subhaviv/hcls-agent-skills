id: rwd-cohort-analysis-11
prompt: 'You are analyzing a claims database containing 45,000 patients newly diagnosed
  with Type 2 diabetes (ICD-10: E11.9) between January 2019 and December 2020. You
  want to compare 90-day all-cause hospitalization rates between patients initiated
  on SGLT2 inhibitors (index NDC codes provided for empagliflozin, dapagliflozin,
  canagliflozin) versus GLP-1 receptor agonists (semaglutide, liraglutide, dulaglutide).
  Patients must have 12 months of continuous enrollment prior to the index date and
  6 months of follow-up. Exclude patients with prior heart failure (ICD-10: I50.x)
  or CKD Stage 4–5 (N18.4, N18.5) in the baseline period.


  Please provide the following deliverables:


  1. **Python code** to identify the eligible cohort from a simplified claims DataFrame
  (columns: `patient_id`, `date`, `icd10`, `ndc`, `enrollment_start`, `enrollment_end`),
  applying all inclusion/exclusion criteria and assigning treatment groups.


  2. **PDC calculation code** for each patient over the 180-day follow-up period using
  their pharmacy dispensing records, with a binary adherence flag at PDC ≥ 0.80.


  3. **Propensity score estimation** using logistic regression on baseline covariates
  (age, sex, HbA1c proxy via lab CPT code 83036, Charlson Comorbidity Index components),
  plus standardized mean difference (SMD) calculation before and after 1:1 nearest-neighbor
  matching.


  4. A brief explanation (3–5 sentences) of what SMD threshold indicates adequate
  covariate balance and why it matters for this specific comparison.'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: easy
