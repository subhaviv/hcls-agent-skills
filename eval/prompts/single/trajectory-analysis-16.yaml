id: trajectory-analysis-16
prompt: 'Here is test question #16 of 30:


  ---


  You are analyzing a single-cell RNA-seq dataset of 8,400 hematopoietic stem and
  progenitor cells (HSPCs) from bone marrow, spanning differentiation toward erythroid,
  myeloid, and lymphoid lineages. You have already computed a PAGA graph showing three
  major trajectory branches, but you now want to complement this with RNA velocity
  analysis using scVelo to validate the directionality of these branches.


  Your spliced/unspliced count matrices were generated using velocyto, and initial
  QC shows an average splicing ratio of 0.72. Key marker genes include *GATA1*, *MPO*,
  *ELANE*, *IL7R*, and *DNTT* for the three lineages. After running `scv.tl.velocity(adata,
  mode=''stochastic'')`, you notice that the erythroid branch shows coherent velocity
  arrows, but the lymphoid branch (marked by *IL7R*+/*DNTT*+ cells) has very low velocity
  confidence scores (mean < 0.4) and inconsistent arrow directions.


  Please provide:

  1. Three specific biological or technical reasons why the lymphoid branch might
  show poor velocity confidence in this context

  2. A recommendation for switching to the `dynamical` model, including the specific
  scVelo function calls and key parameters to adjust (particularly `n_top_genes` and
  `min_shared_counts`)

  3. Python code to compute and visualize velocity confidence scores stratified by
  lineage cluster, using a violin plot with cluster annotations

  4. A strategy to integrate these velocity results with CellRank to compute fate
  probabilities toward the three terminal states, including which `CellRank` kernel
  to use and how to combine it with a connectivity kernel for robustness'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: intermediate
