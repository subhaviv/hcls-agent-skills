id: cell-type-annotation-12
prompt: 'You have processed a 10x Genomics scRNA-seq dataset from human peripheral
  blood mononuclear cells (PBMCs) containing 8,500 cells across 14 Leiden clusters
  (resolution 0.5). You want to perform automated cell type annotation using CellTypist
  with the "Immune_All_High.pkl" model, followed by majority voting to assign consensus
  labels per cluster.


  Your AnnData object is stored as `adata` with PCA and UMAP already computed. The
  raw counts have been normalized to 10,000 counts per cell and log1p transformed,
  stored in `adata.X`.


  Please provide:


  1. **Complete Python code** to run CellTypist annotation using the `Immune_All_High.pkl`
  model with `majority_voting=True`, mapping predictions back to the Leiden clusters
  stored in `adata.obs[''leiden'']`


  2. **Visualization code** to generate two side-by-side UMAP plots: one colored by
  the per-cell predicted labels (`predicted_labels`) and one colored by the majority-voted
  cluster labels (`majority_voting`), with a figure size of (14, 6) and point size
  of 8


  3. **A summary table** using pandas showing each Leiden cluster number, its assigned
  majority-voted cell type label, the number of cells in that cluster, and the top
  3 most frequent per-cell predictions within that cluster (as a comma-separated string)


  4. **Brief explanation** (3-4 sentences) of why majority voting is preferred over
  per-cell predictions for downstream analysis when working with over-clustered data'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: easy
