id: protein-structure-analysis-11
prompt: 'You have been given a PDB file (`kinase_apo.pdb`) containing a monomeric
  serine/threonine kinase in its apo form (chain A only, 312 residues). You need to
  assess the overall structural quality and flexibility before preparing it for virtual
  screening.


  **Your tasks are:**


  1. **Parse the structure** using Biopython''s `Bio.PDB` module and extract all Cα
  atoms. Print the total residue count and identify any residues with missing Cα atoms
  (flag them by residue number).


  2. **B-factor analysis**: Calculate the mean and standard deviation of B-factors
  across all Cα atoms. Identify the top 10 most flexible residues (highest B-factors)
  and the top 10 most rigid residues (lowest B-factors). Output results as a formatted
  table.


  3. **DSSP secondary structure assignment**: Using the DSSP wrapper in Biopython,
  calculate the fraction of residues in α-helices, β-strands, and loops/coils. Assume
  DSSP is installed at `/usr/bin/dssp`.


  4. **Ramachandran assessment**: Extract φ/ψ dihedral angles for all non-terminal
  residues and count how many fall outside the favored regions (φ: −60°±40°, ψ: −45°±40°
  for helices; φ: −120°±40°, ψ: 130°±40° for strands). Report the outlier percentage.


  5. **Provide complete, runnable Python code** for all four tasks above using Biopython,
  with inline comments explaining each step. Assume the PDB file is well-formatted
  with standard atom naming conventions.'
