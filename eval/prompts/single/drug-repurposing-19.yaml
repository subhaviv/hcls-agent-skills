id: drug-repurposing-19
prompt: 'Here is test question #19:


  ---


  You are evaluating metformin as a repurposing candidate for idiopathic pulmonary
  fibrosis (IPF). Your team has generated the following conflicting evidence profile:


  **Supporting evidence:**

  - Connectivity Map (CMap/L1000) analysis shows metformin''s transcriptional signature
  negatively correlates (score: −0.78) with an IPF lung fibroblast gene expression
  signature derived from 47 IPF patients vs. 23 controls

  - In vitro: metformin (2mM) reduces TGF-β1-induced collagen deposition by 41% in
  MRC-5 fibroblasts (n=3 independent experiments)

  - AMPK activation suppresses mTORC1-driven fibroblast-to-myofibroblast transition
  in murine models

  - DGIdb query returns PRKAA1/PRKAA2 (AMPK catalytic subunits) as primary metformin
  targets with "known" interaction evidence


  **Conflicting evidence:**

  - A retrospective cohort study (n=2,847 diabetic IPF patients) shows no significant
  difference in FVC decline rate between metformin users and non-users (HR 0.97, 95%
  CI 0.89–1.06, p=0.51)

  - Metformin achieves poor lung tissue penetration (lung:plasma ratio ~0.3 in rodents)

  - IPF fibroblasts from 12 patients show heterogeneous AMPK expression (3/12 show
  <20% of normal AMPK protein levels)


  Please provide: (1) a structured evidence hierarchy ranking the six data points
  by translational weight, explaining your scoring rationale; (2) a mechanistic analysis
  of whether the conflicting clinical data invalidates the preclinical findings or
  whether confounders could reconcile them; (3) a recommendation on whether to proceed
  to a prospective trial, and if so, propose specific patient stratification criteria
  and a primary endpoint that addresses the identified weaknesses; (4) Python pseudocode
  to query DGIdb''s API for alternative fibrosis-relevant targets that metformin may
  modulate beyond AMPK.


  ---'
