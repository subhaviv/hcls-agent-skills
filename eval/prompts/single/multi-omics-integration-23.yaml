id: multi-omics-integration-23
prompt: 'You are analyzing a cohort of 89 pediatric acute lymphoblastic leukemia (ALL)
  patients with three omics layers collected at diagnosis: RNA-seq transcriptomics
  (18,432 genes), RPPA proteomics (258 proteins), and ATAC-seq chromatin accessibility
  (142,000 peaks). However, due to sample quality issues, only 61 patients have all
  three layers complete, 19 patients have transcriptomics and proteomics only, and
  9 patients have transcriptomics only. You want to identify latent biological factors
  that stratify patients into clinically meaningful subtypes associated with treatment
  response (complete remission vs. refractory disease).


  Please provide the following deliverables:


  1. **Integration strategy recommendation**: Explain whether early, intermediate,
  or late integration is most appropriate here, specifically addressing the partial
  sample overlap problem across the three omics layers.


  2. **Method selection**: Compare MOFA+ versus iCluster+ for this specific dataset
  configuration, including which handles missing views better and why.


  3. **Implementation outline**: Provide Python or R code (using the MOFA2 package)
  to set up the multi-omics object with the three data matrices, handle the partial
  overlap using MOFA+''s built-in missing data framework, and run the model with an
  initial test of K=5 and K=10 latent factors.


  4. **Factor interpretation plan**: Describe how you would identify which of the
  learned factors are biologically meaningful versus technical noise, including variance
  explained thresholds and downstream enrichment steps for the transcriptomic and
  chromatin accessibility weights.


  5. **Batch correction decision**: The RPPA data was collected in two batches (batch
  A: 52 patients, batch B: 37 patients). Should batch correction be applied before
  or after MOFA+ modeling, and what method would you use?'
target_skills:
- multi-omics-integration
domain: multi-omics
difficulty: easy
