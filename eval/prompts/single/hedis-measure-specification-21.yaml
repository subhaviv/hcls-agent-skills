id: hedis-measure-specification-21
prompt: 'A regional health plan is preparing for its annual HEDIS measurement period
  and needs to evaluate its Controlling High Blood Pressure (CBP) measure performance.
  The plan has identified the following patient cohort data:


  - Total attributed members aged 18–85: 12,400

  - Members with a diagnosis of hypertension: 3,850

  - Members with at least one outpatient visit during the measurement year: 2,940

  - Members with a recorded blood pressure reading ≤140/90 mmHg: 1,820

  - Members who were hospice patients during the measurement year: 47

  - Members with ESRD diagnosis: 63

  - Members with pregnancy diagnosis during the measurement year: 28


  The plan uses a 12-month continuous enrollment requirement with an allowable gap
  of up to 45 days.


  Please provide the following deliverables:


  1. **Denominator calculation**: Walk through the step-by-step logic to determine
  the eligible denominator population, applying all standard HEDIS CBP exclusions.
  Show which patient groups are removed and why.


  2. **Numerator calculation**: Identify what qualifies a member for the numerator
  and calculate the numerator rate using the data provided.


  3. **Rate calculation**: Compute the final CBP measure rate as a percentage, rounded
  to two decimal places.


  4. **Care gap prioritization**: Given that CBP is a 3-star weighted measure in CMS
  Star Ratings, recommend two actionable outreach strategies to close care gaps for
  the remaining non-compliant members, considering that approximately 34% of the non-compliant
  population has been flagged with transportation barriers (an SDOH factor).'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: easy
