id: digital-pathology-28
prompt: 'You are building a multi-resolution MIL pipeline for predicting BRCA1/BRCA2
  mutation status from H&E whole-slide images in a cohort of 847 ovarian cancer patients
  (TCGA-OV subset). Your slides are stored as SVS files and you plan to extract patches
  at two resolutions: 20× (0.5 mpp) and 5× (2.0 mpp). You want to use H-optimus-0
  as the feature extractor and implement an attention-based MIL aggregator that concatenates
  embeddings from both resolutions before the attention mechanism.


  Specific constraints and requirements:

  - Slides have variable staining quality; apply Macenko normalization using a reference
  slide (ref_slide.svs) before patch extraction

  - Tissue detection must use Otsu thresholding with a minimum tissue area of 500
  µm² per patch

  - Extract patches with 50% overlap at 20× and no overlap at 5×

  - Discard patches where >15% of pixels are background after normalization

  - H-optimus-0 embeddings are 1536-dimensional; your attention MIL head must handle
  the 3072-dimensional concatenated input

  - Implement gradient checkpointing to handle GPU memory constraints (16GB VRAM)

  - The aggregator should output both slide-level predictions and per-patch attention
  weights for interpretability


  Provide: (1) complete TIAToolbox code for the dual-resolution patch extraction pipeline
  with Macenko normalization, (2) PyTorch implementation of the dual-resolution attention
  MIL model with gradient checkpointing, (3) a training loop with weighted cross-entropy
  loss accounting for class imbalance (BRCA1/2 mutant: 312 patients, wild-type: 535
  patients), and (4) explain any pitfalls specific to dual-resolution MIL with foundation
  model embeddings.'
target_skills:
- digital-pathology
domain: imaging
