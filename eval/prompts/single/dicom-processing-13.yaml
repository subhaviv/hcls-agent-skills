id: dicom-processing-13
prompt: 'Here is test question #13 of 30:


  ---


  You are working in a neuroimaging research lab and have received a folder of raw
  DICOM files from a 3T MRI scanner (Siemens Prisma) containing a T1-weighted MPRAGE
  acquisition for a single subject. The DICOM series is stored in `/data/raw/sub-001/T1w/`
  and contains 192 slices with the following key header values: `EchoTime = 2.98 ms`,
  `RepetitionTime = 2300 ms`, `FlipAngle = 9 degrees`, `Manufacturer = SIEMENS`, `SeriesDescription
  = "t1_mprage_sag_p2_iso"`. The folder contains approximately 192 individual `.dcm`
  files named sequentially.


  Your task is to convert this DICOM series to NIfTI format following BIDS conventions.
  Please provide:


  1. The exact `dcm2niix` command you would run, including appropriate flags to: (a)
  output a compressed NIfTI (`.nii.gz`), (b) generate an accompanying JSON sidecar,
  (c) set the output filename to follow BIDS naming (`sub-001_T1w`), and (d) specify
  the output directory as `/data/bids/sub-001/anat/`.


  2. A brief explanation of what each flag in your command does.


  3. A short Python snippet using `nibabel` to verify the output NIfTI file has the
  expected dimensions (192 slices, and typical MPRAGE in-plane resolution of 256×256)
  and print the voxel size from the header.


  4. One common pitfall when converting multi-slice DICOM series with `dcm2niix` and
  how to avoid it.


  ---'
target_skills:
- dicom-processing
domain: imaging
