id: edc-data-validation-17
prompt: 'You are working as a clinical data manager on a Phase II oncology trial (STUDY-ONC-2847)
  with 145 enrolled patients. Your EDC system (Veeva Vault CDMS) exports SAS transport
  files for SDTM submission. You''ve received the latest data cut and need to validate
  the LB (Laboratory Results) domain before database lock.


  The LB dataset contains 12,847 records across 38 lab parameters. Known issues from
  the previous data cut included: (1) LBORRES values containing free-text units embedded
  in the result field (e.g., "4.2 mg/dL" instead of just "4.2"), (2) LBSTRESU not
  aligning with CDISC UNIT controlled terminology for three parameters (CREATININE
  mapped to "mg/dl" instead of "mg/dL", GLUCOSE mapped to "mmol/L" when the protocol
  specifies mg/dL, and ALT mapped to "U/L" vs. the required "u/L"), (3) LBDTC containing
  partial dates formatted as "2024-06" without imputation flags, and (4) critical
  toxicity flags missing when LBSTRESN exceeds NCI CTCAE Grade 3 thresholds for hemoglobin
  (<8.0 g/dL) and creatinine (>3x ULN).


  Please provide: (1) A Python script that reads the LB XPT file using the `pyreadstat`
  library, strips embedded units from LBORRES, corrects the three LBSTRESU mapping
  errors, and outputs a cleaned dataset; (2) A validation function that checks LBDTC
  partial dates and appends an LBDTCF imputation flag variable following CDISC partial
  date conventions; (3) A rule-based function that flags Grade 3+ toxicity records
  using the hemoglobin and creatinine thresholds, joining against a SUPPQUAL-style
  supplemental dataset containing patient-level ULN values; (4) A summary report generator
  that outputs a prioritized findings table with issue category, record count, and
  recommended action.'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: intermediate
