id: scrna-seq-pipeline-15
prompt: 'You are analyzing a single-cell RNA-seq dataset from a colorectal cancer
  study involving 8 patients (4 tumor, 4 adjacent normal tissue). After running CellRanger,
  you have 8 separate `filtered_feature_bc_matrix` directories. Initial quality metrics
  show variable cell counts per sample (ranging from 2,000–6,500 cells) and some samples
  have notably high mitochondrial gene fractions (up to 35% in two tumor samples).


  Your goal is to integrate all samples into a unified analysis while accounting for
  patient-level batch effects. Specifically:


  1. **Write Python/Scanpy code** to load all 8 samples using `sc.read_10x_mtx()`,
  add sample metadata (patient ID, tissue type), and concatenate them into a single
  AnnData object with unique cell barcodes.


  2. **Implement adaptive QC filtering** that applies per-sample thresholds for mitochondrial
  fraction (using median absolute deviation, MAD-based outlier detection with a 3-MAD
  cutoff) rather than a single global threshold, and filters cells with fewer than
  200 genes or more than 6,000 genes detected.


  3. **Apply Harmony batch correction** after PCA (using 30 PCs) to correct for patient-level
  effects, then compute a UMAP and run Leiden clustering at resolution 0.5. Include
  the necessary `sc.external.pp.harmony_integrate()` call with `key=''patient_id''`.


  4. **Identify marker genes** for each Leiden cluster using `sc.tl.rank_genes_groups()`
  with the Wilcoxon method, and write code to extract the top 5 marker genes per cluster
  into a pandas DataFrame.


  Provide complete, runnable code with brief inline comments explaining each major
  step.'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: intermediate
