id: molecular-docking-30
prompt: 'You are setting up a structure-based virtual screening campaign against a
  novel kinase target (PDB: 7XK2) with a known ATP-binding site. During validation,
  you perform redocking of the co-crystallized ligand (compound **KI-447**, MW 412
  Da, 6 rotatable bonds) and obtain an RMSD of 3.8 Å against the crystal pose — well
  above the 2.0 Å acceptance threshold.


  Investigating further, you notice the following:

  - The crystal structure has resolution 2.1 Å and contains a Mg²⁺ ion coordinated
  by Asp184 and Asn162 in the binding site

  - Your receptor was prepared using `prepare_receptor4.py` from ADFR Suite with default
  settings

  - The ligand PDBQT was generated via Open Babel (`obabel -ipdb -opdbqt --partialcharge
  gasteiger`)

  - Grid box: center (x=14.3, y=−22.7, z=8.1), size 20×20×20 Å, spacing 0.375 Å

  - Vina exhaustiveness=8, num_modes=9


  Your screening library contains 12,400 compounds. Provide:


  1. A systematic diagnosis of at least **four distinct technical factors** that likely
  caused the high redocking RMSD, with mechanistic explanations for each

  2. A corrected docking protocol (receptor prep, ligand prep commands, and grid box
  rationale) that addresses each identified issue

  3. A Python script using `subprocess` and `meeko` (or RDKit where appropriate) to
  automate corrected ligand preparation for the full 12,400-compound library, including
  error handling for problematic structures

  4. Recommended Vina parameters and a post-docking filtering strategy (with specific
  numeric cutoffs) to prioritize the top candidates from the virtual screen'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: hard
