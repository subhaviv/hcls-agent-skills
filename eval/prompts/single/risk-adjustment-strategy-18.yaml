id: risk-adjustment-strategy-18
prompt: 'A Medicare Advantage plan is navigating the 2024-2025 blended transition
  period (50% V24 / 50% V28) and has identified a cohort of 1,200 members with documented
  Type 2 diabetes with diabetic chronic kidney disease (ICD-10: E11.65). Under V24,
  this condition maps to HCC 18 (Diabetes with Chronic Complications) with a RAF weight
  of 0.318. Under V28, the same ICD-10 code maps to HCC 37 (Diabetes with Complications)
  with a RAF weight of 0.164, but also potentially triggers HCC 329 (Chronic Kidney
  Disease, Stage 3) separately if CKD stage documentation exists.


  The plan''s data shows: 680 members have explicit CKD stage documentation (stages
  3a-4) in their records, while 520 members have only the combination code E11.65
  without discrete CKD staging. Additionally, 340 of the 680 staged members also have
  a documented HbA1c >9.0% suggesting poorly controlled diabetes.


  Given this scenario, provide the following:


  1. Calculate the blended RAF impact per member under three documentation scenarios:
  (a) E11.65 only, (b) E11.65 plus staged CKD code (N18.3x), and (c) E11.65 plus staged
  CKD plus poor control (E11.65 + N18.3x + applicable poor-control HCC if one exists
  in V28)


  2. Identify which of the 1,200 members represents the highest RAF optimization opportunity
  and explain the V28 hierarchy resolution logic that applies


  3. Design a provider outreach protocol for the 520 members lacking CKD staging documentation,
  including specific clinical documentation elements required to be audit-defensible
  under CMS guidelines


  4. Estimate total annual revenue impact if all 520 undocumented members are successfully
  recaptured with appropriate CKD staging'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: hard
