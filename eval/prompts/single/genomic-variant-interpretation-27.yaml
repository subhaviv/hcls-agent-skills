id: genomic-variant-interpretation-27
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory reports the following variant in
  **BRCA2**: `NM_000059.4(BRCA2):c.7007G>A (p.Arg2336His)`.


  The following evidence is available:

  - **gnomAD v3.1.2**: allele frequency = 0.000031 (4 heterozygous carriers, 0 homozygous),
  population max (popmax) = 0.000089 in South Asian population

  - **ClinVar**: 2 submissions — one "Uncertain Significance" (2019, no evidence provided)
  and one "Likely Pathogenic" (2021, from a research lab citing segregation in 2 families)

  - **REVEL score**: 0.73

  - **CADD Phred**: 24.1

  - **SpliceAI scores**: all delta scores < 0.05

  - **Functional data**: One published study (PMID: 39XXXXXX) reports the variant
  shows intermediate HDR (homology-directed repair) activity at 62% of wild-type in
  a validated BRCA2 functional assay

  - **Segregation**: Variant co-segregates with disease in 3 affected relatives across
  2 families (LOD score ~1.4)


  Please provide:

  1. A systematic ACMG/AMP 2015 criteria assessment, explicitly evaluating which criteria
  apply (PS3, PP3, PP4, BS1, BP4, PM2, etc.) and at what strength

  2. A final classification with justification

  3. An explanation of why the 62% HDR functional result complicates PS3 application
  and what threshold is typically used for BRCA2 functional assays

  4. A recommendation on whether the segregation data (LOD ~1.4) meets the threshold
  for PP1 vs. PS2 vs. no credit, citing current ClinGen guidance'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: intermediate
