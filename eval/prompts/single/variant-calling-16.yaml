id: variant-calling-16
prompt: 'You are setting up a somatic variant calling pipeline for a cohort of 45
  tumor samples from a lung adenocarcinoma study. The samples were sequenced using
  Illumina NovaSeq 6000 with 100x mean tumor coverage and no matched normal tissue
  is available (tumor-only mode). Your reference genome is GRCh38, and you have access
  to the following GATK bundle resources: gnomAD germline resource (af-only-gnomad.hg38.vcf.gz),
  a panel of normals (PON) generated from 47 unmatched healthy blood samples sequenced
  on the same platform, and the small_exac_common_3 VCF for contamination estimation.


  Your primary targets of interest are EGFR exons 18-21, KRAS G12/G13, and TP53, but
  the pipeline should cover the full exome (WES capture kit: Agilent SureSelect Human
  All Exon V7).


  Please provide:


  1. A complete Mutect2 command for a single tumor sample (sample ID: LUAD_047, BAM
  file: LUAD_047_markdup.bam) incorporating all appropriate resources and flags for
  tumor-only mode, including an interval list for the capture kit regions.


  2. The full post-calling filtering workflow using FilterMutectCalls, including the
  GetPileupSummaries and CalculateContamination steps with appropriate commands.


  3. An explanation of why the PON from blood samples is still useful in tumor-only
  calling despite not being matched normals, and what its limitations are in this
  context.


  4. Recommended FilterMutectCalls thresholds or flags you would adjust given the
  100x coverage and the known challenge of distinguishing somatic variants from germline
  SNPs without matched normals.'
target_skills:
- variant-calling
domain: genomics
difficulty: intermediate
