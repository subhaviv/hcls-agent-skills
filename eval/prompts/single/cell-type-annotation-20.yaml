id: cell-type-annotation-20
prompt: 'You are analyzing a single-cell RNA-seq dataset from 45 pediatric ALL (acute
  lymphoblastic leukemia) patients containing 187,000 cells clustered into 34 Leiden
  clusters. You''ve run CellTypist with the `Immune_All_Low.pkl` model using default
  settings, but the results show concerning discrepancies: 8 clusters receive majority-vote
  labels of "B cells" yet display high expression of `CD3D`, `CD3E`, and `TRAC`; meanwhile,
  3 clusters labeled "T cells" show strong `MS4A1`, `CD79A`, and `PAX5` expression.
  Additionally, 4 clusters receive "Unknown" labels with low probability scores (0.31–0.44).


  Your task is to resolve these annotation conflicts systematically. Provide:


  1. **Diagnostic code** to generate a combined visualization showing CellTypist probability
  scores, marker gene dotplot (using `CD3D`, `CD3E`, `MS4A1`, `CD79A`, `PAX5`, `TRAC`,
  `IGHM`, `VPREB1`, `RAG1`, `RAG2`), and per-cluster entropy of probability distributions
  — all in a single figure


  2. **Code to re-run CellTypist** with `over_clustering` enabled, using the `Immune_All_High.pkl`
  model, with majority voting across the over-clustered partitions mapped back to
  original Leiden clusters


  3. **A conflict resolution function** that takes both model outputs and marker expression
  matrices as input, applies a decision rule prioritizing marker-based evidence over
  model predictions when probability scores fall below 0.65, and outputs a final annotation
  Series with a `confidence` column ("high"/"low"/"conflicted")


  4. **Brief explanation** (in code comments) of why label swapping between B and
  T cells occurs in CellTypist and how over-clustering addresses it'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: hard
