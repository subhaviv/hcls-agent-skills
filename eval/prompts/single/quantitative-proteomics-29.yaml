id: quantitative-proteomics-29
prompt: 'You are analyzing a TMT-16plex proteomics dataset from a clinical study comparing
  treatment-naive (n=8) versus drug-resistant (n=8) ovarian cancer tumor biopsies.
  The experiment used two TMT batches (8 samples per batch, with 2 bridge channels
  per batch using a pooled reference). After MaxQuant processing, you have reporter
  ion intensities for 6,847 proteins. Initial QC reveals:


  - Batch 2 shows a systematic ~1.8-fold higher median intensity across all channels
  compared to Batch 1

  - Protein ABCB1 shows 45% missing values concentrated exclusively in treatment-naive
  samples (MNAR pattern)

  - Protein HSP90AA1 shows 22% missing values randomly distributed across all samples
  (MCAR pattern)

  - PCA reveals that samples cluster primarily by batch (PC1 = 38% variance) rather
  than treatment group (PC2 = 14% variance)

  - The ratio compression coefficient (estimated from known spike-in standards) is
  approximately 0.71


  Please provide:

  1. A step-by-step normalization strategy that addresses both the batch effect and
  the systematic intensity difference, specifying whether to normalize before or after
  batch correction and which tools/methods to use

  2. Differential imputation approaches for ABCB1 versus HSP90AA1, with justification
  for each choice

  3. R code implementing the complete normalization and batch correction pipeline
  using the `limma` and `sva` packages, including bridge channel-based normalization

  4. An explanation of how ratio compression (coefficient = 0.71) affects your differential
  expression results for a protein showing a raw TMT ratio of 2.5-fold, and whether/how
  you would correct for it

  5. A statistical testing strategy that accounts for the paired batch design and
  the ratio compression correction'
target_skills:
- quantitative-proteomics
domain: proteomics
difficulty: hard
