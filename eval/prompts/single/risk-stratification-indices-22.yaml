id: risk-stratification-indices-22
prompt: 'A community health system is implementing a 30-day readmission reduction
  program and needs to select the most appropriate risk stratification tool for their
  Medicare population. Their data team has extracted the following summary statistics
  from their EHR for the past 12 months: 4,200 index admissions, average patient age
  71 years, 68% have 3 or more chronic conditions, 30-day readmission rate of 18.2%,
  and average length of stay of 5.3 days. The care coordination team currently has
  capacity to intervene with approximately 800 high-risk patients per month.


  The data team is debating between using the LACE Index and the Charlson Comorbidity
  Index (CCI) as their primary stratification tool. A clinical informatics analyst
  argues that LACE is preferable because it incorporates acuity of admission, while
  a physician champion prefers CCI because it reflects chronic disease burden.


  Please provide the following:


  1. A concise explanation of what each index measures and its primary intended use
  case (readmission prediction vs. mortality/comorbidity weighting)

  2. A recommendation for which index is more appropriate for this specific use case,
  with at least two clinical and two operational justifications

  3. A brief description of what LACE score components are (L, A, C, E) and how they
  would be calculated for a hypothetical patient: age 74, admitted for CHF exacerbation
  (semi-urgent), LOS of 6 days, 2 prior ED visits in the last 6 months, and a CCI
  score of 4

  4. Based on the program''s capacity constraint of 800 interventions/month, recommend
  a LACE score threshold cutoff and explain the tradeoff between sensitivity and specificity
  at that threshold'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: easy
