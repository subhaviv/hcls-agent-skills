id: risk-adjustment-strategy-12
prompt: 'A Medicare Advantage plan serving 45,000 members is preparing for the 2025
  payment year, during which CMS applies a blended transition methodology combining
  V24 and V28 model weights (50%/50% for payment year 2025). The plan''s analytics
  team has pulled the following summary data for a cohort of 1,200 members with documented
  Type 2 diabetes:


  - 680 members have diabetes with chronic kidney disease (CKD) Stage 3 coded under
  V24 HCC 18 (Diabetes with Chronic Complications)

  - 420 members have diabetes coded only as "uncontrolled" without complication specificity

  - 100 members have diabetes with peripheral vascular disease documented in clinical
  notes but not coded


  Under V28, CMS restructured the diabetes HCC categories, splitting complications
  into more granular mappings and eliminating some V24 HCC codes entirely.


  Please provide the following deliverables:


  1. **Conceptual explanation**: Describe how the 50/50 blended transition methodology
  calculates a member''s RAF score contribution from a single HCC, using the diabetes-with-CKD
  example as illustration.


  2. **Coding gap analysis**: For the 420 members with unspecified "uncontrolled"
  diabetes and the 100 members with undocumented PVD, explain what documentation improvements
  a provider would need to make to support more specific HCC capture, and why audit-defensible
  documentation matters here.


  3. **Prioritization framework**: Given limited chart review resources, recommend
  a simple prioritization approach (e.g., by RAF impact, clinical evidence availability,
  or audit risk) for deciding which of the three member groups to address first.'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: easy
