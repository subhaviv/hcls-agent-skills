id: clinical-data-standards-19
prompt: 'A pharmaceutical sponsor is preparing an integrated summary of safety (ISS)
  for a new anticoagulant, pooling data from three Phase III trials (APEX-1: n=2,847;
  APEX-2: n=3,102; APEX-3: n=1,956). The safety database uses MedDRA v26.0. During
  cross-trial reconciliation, the coding team identifies the following inconsistency:
  bleeding events were coded at different granularity levels across trials — APEX-1
  used "Gastrointestinal haemorrhage" (PT 10017955), APEX-2 used the more specific
  "Upper gastrointestinal haemorrhage" (PT 10046371) and "Lower gastrointestinal haemorrhage"
  (PT 10024796), while APEX-3 used the LLT "Gastric bleeding" (LLT 10017906).


  Additionally, the team must map these MedDRA-coded events to ICD-10-CM for a registry
  submission, and separately to SNOMED CT for an EHR-based pharmacovigilance study.
  The SNOMED CT concept "Gastrointestinal hemorrhage" (SNOMED: 74474003) has multiple
  child concepts with different clinical attributes.


  Please provide:

  1. A recommended MedDRA coding harmonization strategy for the ISS AE frequency table,
  specifying which PT(s) to use and justifying the choice based on MedDRA hierarchy
  rules, including whether HLT "Gastrointestinal haemorrhages NEC" (HLT 10017956)
  aggregation is appropriate here

  2. The correct ICD-10-CM codes for each distinct bleeding event category after harmonization,
  noting any multiaxial coding considerations

  3. A SNOMED CT mapping approach for the harmonized terms, identifying at least two
  relevant relationship types (beyond IS-A) that distinguish upper from lower GI hemorrhage
  in the SNOMED concept model

  4. A decision framework for future trials specifying when to code at PT versus LLT
  level for bleeding events in anticoagulant studies'
