id: translational-research-22
prompt: 'A preclinical team at a biotech has identified KPNA3 (karyopherin alpha 3)
  as a candidate target for ALS. They have the following data package supporting advancement
  to a first-in-human study:


  **Preclinical Evidence:**

  - KPNA3 knockdown in SOD1-G93A mice delayed motor neuron loss by 28% (p=0.04, n=12/group)

  - In vitro: KPNA3 siRNA reduced TDP-43 nuclear egress by 45% in iPSC-derived motor
  neurons

  - Human post-mortem ALS spinal cord shows 2.1-fold KPNA3 upregulation vs. controls
  (n=8 ALS, n=6 control)

  - A small-molecule KPNA3 inhibitor (KI-447) shows IC50 = 180 nM with acceptable
  CNS penetration (Kp,uu = 0.35)


  **Proposed Clinical Plan:**

  - Phase 1: 40 healthy volunteers, single ascending dose, primary endpoint = safety/tolerability

  - Phase 2: 120 ALS patients, 6-month duration, primary endpoint = ALSFRS-R slope


  **Your tasks:**

  1. Evaluate the strength of the preclinical-to-clinical translational package —
  identify the two most critical gaps that must be addressed before FIH

  2. Recommend a specific target engagement biomarker strategy for the Phase 1 study,
  including sample type, assay approach, and timing

  3. Critique the Phase 2 design and propose one modification to improve the probability
  of detecting a true signal within the 6-month window

  4. State whether this program is ready to advance to FIH and provide a one-sentence
  go/no-go recommendation with your primary rationale'
