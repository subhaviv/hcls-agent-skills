id: ml-researcher-30
prompt: 'A pharmaceutical company is developing a deep learning model to predict drug-induced
  liver injury (DILI) risk from molecular structures. Their dataset contains 4,847
  compounds: 612 DILI-positive (FDA-labeled), 2,103 DILI-negative (marketed drugs
  with clean safety records), and 2,132 compounds with ambiguous/disputed DILI status
  that they''ve excluded from training. They''re using an MPNN (message-passing neural
  network) with Morgan fingerprints as auxiliary features, trained on a random 80/20
  split. The model achieves AUROC=0.89 on the test set, and they''re preparing a regulatory
  submission to support a computational toxicology workflow under FDA''s PCCP pathway.


  However, a reviewer flagged three concerns: (1) random splitting may cause data
  leakage because structurally similar compounds appear in both train and test sets;
  (2) the 1:3.4 positive-to-negative ratio may not reflect real screening scenarios;
  (3) the excluded ambiguous compounds represent 44% of the dataset and may introduce
  systematic bias.


  Please provide:


  1. A rigorous splitting strategy that accounts for chemical space coverage — specify
  the algorithm, similarity threshold, and how to handle compound clusters that span
  both DILI classes

  2. A complete evaluation framework including which metrics are appropriate for this
  imbalance and regulatory context, with specific thresholds and justification

  3. A concrete plan for handling the 2,132 ambiguous compounds — should they be used
  in training, evaluation, or neither, and how does this affect reported performance?

  4. An assessment of what PCCP documentation this model would require, specifically
  addressing the "intended use" statement, performance characterization, and known
  limitations sections

  5. Python pseudocode (10-20 lines) implementing scaffold-based splitting using RDKit
  with a minimum cluster size constraint of 15 compounds'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: hard
