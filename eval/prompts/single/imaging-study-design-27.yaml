id: imaging-study-design-27
prompt: 'You are coordinating a multi-site diffusion MRI study investigating white
  matter microstructure changes in early Parkinson''s disease (PD) across 4 imaging
  centers (Sites A–D). You have enrolled 180 participants (90 PD patients, 90 age-matched
  controls; mean age 67±8 years). Each site uses a different 3T scanner: Site A (Siemens
  Prisma), Site B (GE Discovery MR750), Site C (Philips Achieva), Site D (Siemens
  Skyra). All sites acquired 64-direction DTI with b=1000 s/mm², but voxel sizes differ
  slightly: Sites A/D at 2.0mm isotropic, Sites B/C at 2.5mm isotropic.


  Your primary biomarker of interest is fractional anisotropy (FA) in the substantia
  nigra and 4 additional TBSS-defined white matter tracts. Secondary biomarkers include
  mean diffusivity (MD) and free-water corrected FA (FAt).


  Concerns raised by your statistician include: (1) significant site-driven variance
  detected in preliminary PCA of raw FA maps, (2) unequal sample sizes per site (Site
  A: n=62, Site B: n=38, Site C: n=45, Site D: n=35), and (3) one site (Site C) used
  a non-standard b0 acquisition (interleaved rather than preceding the DWI volumes).


  Please provide: (1) a recommended preprocessing pipeline for harmonizing DTI data
  across all four sites, including specific steps to address the voxel size discrepancy
  and the Site C b0 issue; (2) a ComBat harmonization strategy specifying which covariates
  to preserve and whether neuroCombat or longitudinal ComBat is more appropriate here;
  (3) a TBSS analysis plan that accounts for site as a confound; and (4) a power analysis
  consideration given the unequal site distribution and your target effect size of
  Cohen''s d=0.45 for FA differences in the substantia nigra.'
