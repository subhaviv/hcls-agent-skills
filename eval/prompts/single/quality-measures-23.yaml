id: quality-measures-23
prompt: 'Here is test question #23 of 30:


  ---


  You are analyzing claims data for a regional health plan with 45,000 commercial
  members. Your medical director wants to assess performance on the **Diabetes Care
  – HbA1c Poor Control (CDC) HEDIS measure** for the current measurement year (January
  1 – December 31, 2023).


  From your data warehouse, you have the following summary statistics available:

  - Total members aged 18–75 with a diabetes diagnosis (Type 1 or Type 2): 3,200

  - Members who met continuous enrollment criteria (enrolled for 11 of 12 months):
  2,850

  - Members with at least one HbA1c lab result during the measurement year: 2,100

  - Members whose most recent HbA1c result was **greater than 9.0%**: 630

  - Members with no HbA1c result on file: 750


  The measure is an **inverse measure** (higher rate = worse performance). The national
  90th percentile benchmark for this measure is 28%, and the plan''s internal target
  is to stay below 30%.


  Please provide the following deliverables:


  1. **Calculate the denominator and numerator** for the CDC HbA1c Poor Control measure,
  explaining any exclusions applied.

  2. **Compute the measure rate** as a percentage, rounded to one decimal place.

  3. **Interpret the result** relative to the 90th percentile benchmark and the internal
  target — is the plan performing well or poorly?

  4. **Write a SQL query** that would identify members contributing to the numerator
  (poor control), given a table called `lab_results` with columns: `member_id`, `test_date`,
  `test_name`, `result_value`, and a table called `enrollment` with columns: `member_id`,
  `month`, `year`, `enrolled`.'
