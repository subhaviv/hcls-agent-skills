id: edc-data-validation-15
prompt: 'You are working as a clinical data manager on a Phase II oncology trial (STUDY-ONC-042)
  with 180 enrolled patients. Your EDC system (Veeva Vault CDMS) exports data in CSV
  format, and you need to validate the SDTM LB (Laboratory Test Results) domain before
  database lock.


  The LB dataset contains 12,400 records with the following known issues you''ve been
  warned about: some LBORRES values contain free-text units appended (e.g., "45 mg/dL"
  instead of a numeric), LBDTC has approximately 340 partial dates in "YYYY-MM" format
  requiring imputation, and the LBSTRESU field contains non-standard unit strings
  like "mg/dl" and "MG/DL" that should map to the CDISC controlled terminology value
  "mg/dL".


  Critical lab parameters to range-check include: ALT (normal: 7–56 U/L, critical
  high: >500 U/L), Creatinine (normal: 0.6–1.2 mg/dL, critical high: >10 mg/dL), and
  Platelet Count (normal: 150–400 10^9/L, critical low: <50 10^9/L).


  Please provide:

  1. A Python function to parse and clean LBORRES by extracting numeric values and
  stripping appended unit text

  2. A partial date imputation function for LBDTC following CDISC conventions (impute
  to first of month, flag with LBDTC_IMPFL)

  3. A controlled terminology normalization function that maps LBSTRESU variants to
  CDISC standard values using a configurable lookup dictionary

  4. A range-check function that returns a prioritized findings DataFrame with columns:
  USUBJID, LBTESTCD, LBSTRESN, flag_type ("CRITICAL" or "OUT_OF_RANGE"), and visit
  label

  5. A brief explanation of how these functions should be integrated into a sequential
  validation pipeline'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: intermediate
