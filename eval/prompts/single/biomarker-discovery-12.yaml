id: biomarker-discovery-12
prompt: 'A research team has collected baseline blood samples from 180 patients with
  early-stage non-small cell lung cancer (NSCLC) enrolled in a single-center observational
  study. They measured expression levels of 847 genes using a NanoString panel and
  want to develop a prognostic biomarker signature to predict 2-year overall survival
  (OS). Of the 180 patients, 52 experienced the event (death) within 2 years.


  The team''s current plan is to:

  1. Run univariate Cox regression on all 847 genes

  2. Select genes with p < 0.05 (expecting ~120 genes)

  3. Run multivariate Cox regression on those 120 genes

  4. Report the model''s concordance index (C-index) on the same dataset as the final
  performance estimate


  They are excited because their preliminary C-index is 0.81.


  Please address the following:


  **A.** Identify all data leakage and methodological problems in their current approach,
  explaining why each issue will produce an overly optimistic C-index.


  **B.** Recommend a corrected analysis pipeline using appropriate feature selection
  and cross-validation strategies given the sample size and event count constraints
  (apply the events-per-variable rule).


  **C.** Specify which performance metrics beyond the C-index are most appropriate
  for this survival analysis context and why.


  **D.** Outline the minimum requirements for an external validation study that would
  be needed before this signature could be considered clinically actionable, including
  cohort characteristics and sample size justification.'
target_skills:
- biomarker-discovery
domain: single-cell
difficulty: easy
