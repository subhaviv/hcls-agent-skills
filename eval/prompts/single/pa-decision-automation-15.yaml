id: pa-decision-automation-15
prompt: 'Here is test question #15 of 30:


  ---


  Your team has built a gradient-boosted PA decision classifier trained on 18 months
  of historical prior authorization decisions (42,000 approved, 11,500 denied) for
  specialty medications across oncology, rheumatology, and neurology service lines.
  During a quarterly audit, your medical director flags that the model''s denial rate
  for biologic therapies in rheumatology (specifically adalimumab, etanercept, and
  ustekinumab) has climbed from 18% to 34% over the past 60 days without any corresponding
  policy change. You suspect a data drift issue, but the medical director also wants
  to ensure the model''s decisions remain clinically explainable to providers who
  appeal.


  Your task is to produce the following deliverables:


  1. **Drift detection approach**: Write Python pseudocode (using evidently or scipy)
  to compute Population Stability Index (PSI) across the top 10 input features for
  the rheumatology biologic subset, flagging features with PSI > 0.2 as high-drift
  candidates.


  2. **SHAP explanation pipeline**: Provide a Python code snippet that generates waterfall
  SHAP plots for a single denied PA case, using a pre-loaded `xgboost` model object
  and a feature vector representing a 52-year-old patient with RA, prior DMARD failure
  (methotrexate × 6 months), CRP of 4.2 mg/L, and DAS28 score of 5.8.


  3. **Denial pattern analysis**: Given that your denial reason codes cluster around
  codes `D101` (insufficient step therapy documentation) and `D204` (lab value out
  of range), propose three concrete workflow interventions — with specific EHR data
  fields or FHIR resource types to target — that would reduce upstream documentation
  gaps before PA submission.'
target_skills:
- pa-decision-automation
domain: healthcare-ops
difficulty: intermediate
