id: molecular-docking-28
prompt: 'You are setting up a structure-based virtual screening campaign targeting
  the allosteric site of KRAS G12C (PDB: 6OIM) using AutoDock Vina 1.2.3. During validation
  via redocking of the co-crystallized covalent inhibitor AMG-510 (sotorasib), you
  encounter an unexpected complication: the ligand contains a covalent warhead (acrylamide)
  that formed a bond with Cys12, but you need to perform non-covalent docking for
  your virtual screening library of 45,000 compounds.


  Your redocking validation produces an RMSD of 4.7 Å against the crystallographic
  pose, which exceeds your 2.0 Å acceptance threshold. Inspection reveals the grid
  box was defined as center_x=−2.3, center_y=3.1, center_z=1.8 (Å) with dimensions
  15×15×15 Å, based on the ligand centroid from the raw PDB file before removing the
  covalent bond.


  Additional complications: (1) the PDBQT preparation used `prepare_receptor4.py`
  from MGLTools, which flagged 3 missing side-chain atoms near the binding pocket
  (residues Tyr96, His95, Leu56); (2) your ligand library was prepared with OpenBabel
  using `obabel -isdf library.sdf -opdbqt -O ligands.pdbqt -p 7.4 --partialcharge
  gasteiger` as a single batch conversion.


  Provide: (a) a root-cause analysis identifying all factors contributing to the poor
  redocking RMSD; (b) a corrected grid box definition with justification; (c) a revised
  receptor and ligand preparation protocol using ADFR Suite and Meeko respectively,
  including specific command-line instructions; (d) criteria for determining whether
  non-covalent docking is scientifically valid for this covalent target, and how to
  handle the warhead-containing compounds in your 45,000-compound library.'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: hard
