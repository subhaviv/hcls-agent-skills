id: genomic-variant-interpretation-19
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory reports the following variant:
  **BRCA2 c.7977+3A>G** (NM_000059.4). The SpliceAI delta scores are: DS_AG=0.04,
  DS_AL=0.02, DS_DG=0.61, DS_DL=0.08. The variant is absent from gnomAD v3.1.2 (0/282,912
  alleles). ClinVar contains 2 submissions: one "VUS" from a commercial lab (2019,
  no evidence provided) and one "likely pathogenic" from a research consortium (2021,
  citing RNA studies showing ~40% aberrant splicing with partial exon skipping). The
  variant is located 3 nucleotides into intron 18. The patient''s tumor is unavailable
  for somatic analysis.


  Please provide the following:


  1. **ACMG/AMP criteria assessment**: Evaluate each potentially applicable criterion
  (PVS1, PS3, PM2, PP3, BP4, BS1, BA1, etc.) with explicit justification for applying
  or NOT applying each one, including the appropriate strength level for PVS1 given
  the splicing context and partial transcript rescue.


  2. **Final classification**: Assign a classification with a confidence statement,
  explaining how the conflicting ClinVar submissions and partial splicing data affect
  your reasoning.


  3. **SpliceAI interpretation**: Explain what the DS_DG=0.61 score specifically predicts
  mechanistically, and whether the 0.61 threshold meets the PP3/BP4 threshold criteria
  under current recommendations.


  4. **Clinical reporting language**: Draft a 3-sentence variant interpretation statement
  suitable for inclusion in a clinical genetics report, appropriate for a non-specialist
  ordering physician.'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: hard
