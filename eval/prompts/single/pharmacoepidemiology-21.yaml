id: pharmacoepidemiology-21
prompt: 'A health system database contains records for 45,000 patients newly diagnosed
  with type 2 diabetes between 2015 and 2022. A researcher wants to evaluate whether
  metformin use (vs. no treatment) reduces the risk of incident cardiovascular events
  (myocardial infarction or stroke) within 3 years of diabetes diagnosis.


  The researcher plans to identify all patients who filled a metformin prescription
  at any point in the first year after diagnosis as the "exposed" group, and patients
  who never filled any antidiabetic medication as the "unexposed" group. Follow-up
  begins at diagnosis date for both groups. The primary outcome is first cardiovascular
  event, and the researcher intends to use a Cox proportional hazards model with basic
  demographic adjustment (age, sex, race).


  A senior epidemiologist flags two major methodological problems with this design
  before the study begins.


  Please provide the following:


  1. **Identify and explain** the two primary methodological flaws in this study design
  (hint: consider both the exposure definition strategy and the follow-up structure).


  2. **Propose a corrected study design** that addresses both flaws, specifying how
  to define the cohort entry date, exposure status, and follow-up start.


  3. **Explain** why using an active comparator (e.g., sulfonylureas) instead of untreated
  patients would further strengthen the design, particularly in the context of confounding
  by indication.


  4. **Describe** one additional bias that remains even after fixing the above issues
  in a database study of newly diagnosed diabetic patients, and suggest a method to
  assess or quantify it.'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: easy
