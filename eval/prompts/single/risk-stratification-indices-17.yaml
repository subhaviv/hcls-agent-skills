id: risk-stratification-indices-17
prompt: 'A regional health system is preparing to launch a 90-day post-discharge outreach
  program with capacity to serve 200 high-risk patients per month. The care management
  team has collected the following data on 850 recently discharged patients and needs
  to select the most appropriate risk stratification approach.


  **Patient Population Snapshot:**

  - 340 patients with primary diagnoses of CHF, COPD, or pneumonia

  - 215 patients aged 75+ with 3+ chronic conditions

  - 180 patients with documented housing instability (Z59.0–Z59.2) or food insecurity
  (Z59.4)

  - 127 patients with Charlson Comorbidity Index scores ≥ 5

  - Average LACE score across cohort: 9.8 (range: 4–18)

  - ADI national percentile scores available for all patients (mean ADI = 74, SD =
  18)


  **Constraints:**

  - The EHR can auto-calculate LACE and Charlson scores but not Elixhauser

  - Staff have 15 minutes per patient for initial stratification review

  - The program specifically targets 30-day readmission prevention


  **Deliverables requested:**

  1. Compare LACE vs. Charlson CCI for this specific use case (30-day readmission,
  operational constraints), citing their respective predictive limitations

  2. Recommend a composite stratification approach that integrates the ADI scores
  and SDOH Z-codes alongside the available clinical indices

  3. Provide a tiered risk categorization schema (High/Medium/Low) with explicit numeric
  thresholds using the available data fields

  4. Write a Python function that accepts a patient dictionary with LACE score, CCI
  score, ADI percentile, and SDOH Z-code count, and returns the assigned risk tier
  and a brief rationale string'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: intermediate
