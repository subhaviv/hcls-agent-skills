id: rna-seq-analysis-22
prompt: 'You have completed a bulk RNA-seq experiment comparing gene expression in
  human hepatocytes treated with 10 µM metformin (n=4) versus DMSO vehicle control
  (n=4). Raw FASTQ files have been processed through Salmon (v1.9.0) using a human
  transcriptome index (GRCh38, Ensembl release 107) with the following flags: `--gcBias
  --seqBias --validateMappings`. The resulting `quant.sf` files are ready for downstream
  analysis.


  Your goal is to perform differential expression analysis using DESeq2. Specifically,
  you need to:


  1. **Write R code** using `tximport` to load the 8 Salmon quantification files into
  R, mapping transcript-level estimates to gene-level counts using a tx2gene table
  derived from the Ensembl GTF. Assume the `quant.sf` files are stored in subdirectories
  named `sample_1` through `sample_8`, and a pre-built `tx2gene` data frame is already
  available in your R environment.


  2. **Write the DESeq2 setup code**: construct the `DESeqDataSet` object from the
  tximport output, specifying the correct design formula for a two-group comparison
  (metformin vs. control), run the DESeq2 pipeline, and extract results with an adjusted
  p-value threshold of 0.05.


  3. **Apply log fold-change shrinkage** using the `apeglm` method and explain in
  2–3 sentences why shrinkage is recommended before generating a volcano plot.


  4. **List three quality-control checks** you would perform on the DESeq2 object
  before trusting the differential expression results (e.g., PCA, dispersion plots),
  briefly explaining what each check reveals.'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: easy
