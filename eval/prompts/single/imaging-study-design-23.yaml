id: imaging-study-design-23
prompt: 'A research team at Westbrook Medical Center is planning a multi-site longitudinal
  MRI study to track hippocampal volume changes in 120 patients with mild cognitive
  impairment (MCI) across 3 sites (Site A: Siemens Prisma 3T, Site B: GE Discovery
  MR750 3T, Site C: Philips Ingenia 3T) over 24 months with scans at baseline, 12
  months, and 24 months. All sites will acquire T1-weighted MPRAGE sequences with
  the following parameters: 1mm isotropic voxels, TR=2300ms, TE=2.98ms, TI=900ms,
  flip angle=9°. The team plans to use FreeSurfer 7.3 for hippocampal segmentation
  and wants to apply ComBat harmonization to remove scanner-related batch effects
  before analyzing longitudinal trajectories.


  Please provide:

  1. A recommended preprocessing pipeline order (skull stripping, registration, segmentation,
  harmonization) with justification for each step''s placement

  2. An explanation of whether longitudinal ComBat (longComBat) or cross-sectional
  ComBat should be applied here, and why

  3. A brief description of what biological covariates should be preserved (not regressed
  out) during ComBat harmonization

  4. A test-retest reliability assessment plan to validate that the harmonization
  is not removing true biological signal — specify what metric to use and what threshold
  would indicate acceptable reliability

  5. A short Python pseudocode snippet (10-15 lines) demonstrating how to structure
  the ComBat input dataframe with site, timepoint, and covariate columns for this
  specific study design'
target_skills:
- imaging-study-design
domain: imaging
difficulty: easy
