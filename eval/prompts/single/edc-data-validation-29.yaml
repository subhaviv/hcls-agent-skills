id: edc-data-validation-29
prompt: 'You are building an automated SDTM validation pipeline for a Phase III oncology
  trial (STUDY-ONC-4471) with 847 enrolled patients across 23 sites. The trial includes
  domains: DM, AE, CM, LB, VS, EX, TU (tumor assessment), and RS (response). Your
  team has identified three critical validation challenges:


  1. **Partial date handling**: Approximately 12% of AE start dates are partial (format
  UNK-MMM-YYYY or DD-UNK-YYYY), and these must be imputed conservatively before checking
  AE onset vs. first dose date (EXSTDTC) consistency.


  2. **Cross-domain consistency**: RECIST response categories in RS.RSSTRESC must
  align with TU domain lesion measurements — specifically, a "CR" (Complete Response)
  in RS requires ALL target lesions in TU to have TUTESTCD="DIAMETER" with TUSTRESN=0
  at the same VISITNUM. Any CR record without supporting TU evidence should be flagged
  as a critical discrepancy.


  3. **Controlled terminology drift**: Your LB domain contains 847 records where LBTESTCD
  values include legacy codes (e.g., "GLUCOS" instead of "GLUC", "BILIRBN" instead
  of "BILI") that don''t match CDISC CT version 2023-09-29.


  Provide: (a) Python code implementing all three validation checks with detailed
  inline comments, (b) a prioritization schema that classifies findings as Critical/Major/Minor
  with specific criteria for each severity level, (c) a sample output report structure
  (JSON format) capturing discrepancies with patient ID, site, domain, variable, offending
  value, and recommended action, and (d) a controlled terminology mapping dictionary
  for the legacy LB codes including at least 15 mappings with confidence scores.'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: hard
