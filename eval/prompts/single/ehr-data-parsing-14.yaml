id: ehr-data-parsing-14
prompt: 'You are working with a hospital''s ADT (Admit-Discharge-Transfer) feed that
  produces HL7v2 ADT^A01 messages. Your task is to parse a batch of these messages
  and extract patient demographics for downstream analytics. Below is a representative
  sample message:


  ```

  MSH|^~\&|ADMSYS|HOSPITAL_A|ANALYTICS|DW|20240315143022||ADT^A01|MSG00142|P|2.5

  EVN|A01|20240315143022

  PID|1||MRN789012^^^HOSPITAL_A^MR||DOE^JANE^MARIE^^MS||19851120|F|||123 MAPLE ST^^BOSTON^MA^02101^USA||^PRN^PH^^^617^5550192|||||S||ACC445566

  PV1|1|I|3N^301^A^HOSPITAL_A||||ATT001^SMITH^JOHN^R^DR|||SUR||||ADM|||||VIS20240315001||||||||||||||||||20240315140000

  ```


  You need to process a batch file containing 500 such messages where some messages
  may have missing PID fields, malformed phone numbers, or non-standard date formats
  in PID-7 (date of birth).


  **Deliverables:**


  1. Write a Python function `parse_adt_batch(filepath)` using the `hl7` library that
  reads the batch file, parses each ADT^A01 message, and extracts: MRN, last name,
  first name, middle name, date of birth (normalized to `YYYY-MM-DD`), gender, full
  address, and phone number.


  2. Return results as a pandas DataFrame with appropriate column names and handle
  missing fields by substituting `None`.


  3. Add a data quality report function `generate_dq_report(df)` that calculates completeness
  percentage per field and flags records where DOB cannot be parsed or phone number
  doesn''t match a 10-digit pattern.


  4. Include error handling for malformed segments and document any assumptions made
  about the HL7v2 field structure.'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: intermediate
