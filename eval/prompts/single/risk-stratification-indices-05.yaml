id: risk-stratification-indices-05
prompt: 'A regional health system is preparing to launch a 90-day post-discharge care
  management program targeting high-risk patients across three service lines: cardiology
  (n=1,240), orthopedics (n=890), and general medicine (n=2,100). The care management
  team has extracted the following aggregate data from their EHR for the past 12 months:


  - Average LACE scores: Cardiology = 11.2, Orthopedics = 7.8, General Medicine =
  9.4

  - Charlson Comorbidity Index means: Cardiology = 4.1, Orthopedics = 1.9, General
  Medicine = 3.3

  - 30-day readmission rates: Cardiology = 18.3%, Orthopedics = 6.1%, General Medicine
  = 14.7%

  - Approximately 34% of the combined cohort has ≥2 SDOH Z-codes documented (Z59.x,
  Z60.x, Z63.x)

  - Area Deprivation Index (ADI) national percentile average: 71st percentile across
  the full cohort


  The team wants to standardize on a single composite risk stratification approach
  but is debating whether to rely primarily on LACE, Charlson, or a blended model
  incorporating SDOH factors.


  Please provide:

  1. A comparative analysis of LACE vs. Charlson vs. Elixhauser for predicting 30-day
  readmission in each of these three service lines, noting where each index performs
  best and its limitations

  2. A recommended composite scoring framework that incorporates ADI and Z-code burden
  alongside clinical indices, with explicit weighting rationale

  3. A Python code snippet that takes patient-level inputs (LACE score, CCI score,
  ADI percentile, Z-code count) and outputs a composite risk tier (Low/Medium/High/Very
  High)

  4. Criteria for re-stratifying patients at 30 and 60 days post-discharge'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: intermediate
