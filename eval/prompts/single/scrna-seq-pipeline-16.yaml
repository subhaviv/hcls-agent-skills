id: scrna-seq-pipeline-16
prompt: 'You are analyzing a single-cell RNA-seq dataset from a study of colorectal
  cancer tumor microenvironment. The dataset contains cells from 8 patients (4 tumor,
  4 adjacent normal tissue) processed with 10X Genomics Chromium. After loading the
  CellRanger output, your initial AnnData object contains 42,000 cells × 33,538 genes.
  Preliminary inspection reveals significant batch effects between patients, and you
  suspect doublet contamination is inflating cell counts.


  Your QC metrics show the following distribution medians: 2,100 genes/cell, 5,800
  UMI counts/cell, and 8.2% mitochondrial reads. However, some cells reach up to 45%
  mitochondrial content and 28,000 UMI counts.


  Please provide:


  1. **QC filtering code** using Scanpy to remove low-quality cells and likely doublets
  using Scrublet, with justification for your chosen thresholds given these specific
  metrics (include mitochondrial, gene count, and UMI cutoffs)


  2. **Normalization and HVG selection pipeline** — normalize to 10,000 counts, log-transform,
  then select 3,000 highly variable genes using the Seurat v3 method, with any necessary
  parameter adjustments for multi-sample data


  3. **Batch correction strategy** — implement Harmony integration after PCA (using
  50 PCs) to correct for patient-level batch effects, then construct a neighborhood
  graph and compute UMAP, explaining why Harmony is appropriate here versus scVI


  4. **Leiden clustering** at resolution 0.5 and 0.8, with code to identify the top
  5 marker genes per cluster using Wilcoxon rank-sum test and filter results to show
  only genes with adjusted p-value < 0.01 and log2 fold-change > 1.5'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: intermediate
