id: cell-type-annotation-15
prompt: 'You have processed a 10x Genomics scRNA-seq dataset from 8 pediatric ALL
  (acute lymphoblastic leukemia) patients containing 42,000 cells that have been clustered
  into 28 Leiden clusters (resolution=1.2). Your AnnData object (`adata`) has UMAP
  coordinates stored in `obsm[''X_umap'']` and normalized/log-transformed counts in
  the `X` matrix. You suspect the dataset contains a mix of leukemic blasts, normal
  hematopoietic progenitors, and immune infiltrates (T cells, NK cells, myeloid cells).


  **Your tasks:**


  1. Run **CellTypist** with the `Immune_All_Low.pkl` model using majority voting
  mode, where over-clustering is performed at resolution=5.0 before majority voting
  collapses predictions back to your original 28 clusters. Store results in `adata.obs`
  with columns named `celltypist_cell_type` and `celltypist_conf_score`.


  2. Independently perform **marker-based annotation** by computing a dotplot for
  the following canonical markers: `CD19`, `CD34`, `MME` (CD10), `CD3E`, `CD8A`, `NKG7`,
  `CD14`, `MPO`, `GATA2`. The dotplot should group by the 28 Leiden clusters and display
  both mean expression and percent expressed.


  3. Write a **reconciliation function** `reconcile_annotations(adata, confidence_threshold=0.6)`
  that: (a) flags clusters where CellTypist confidence score falls below the threshold,
  (b) for flagged clusters, checks if any of the 9 marker genes listed above are in
  the top-15 differentially expressed genes (using pre-computed `adata.uns[''rank_genes_groups'']`),
  and (c) returns a final `annotation_df` DataFrame with columns: `cluster`, `celltypist_label`,
  `marker_label`, `final_label`, `needs_manual_review`.


  Provide complete, executable Python code using `scanpy`, `celltypist`, and `pandas`.'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: intermediate
