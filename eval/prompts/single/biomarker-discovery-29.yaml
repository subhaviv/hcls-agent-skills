id: biomarker-discovery-29
prompt: 'Here is test question #29 of 30:


  ---


  You are analyzing a prospective cohort of 312 treatment-naive non-small cell lung
  cancer patients (stage II-III) who received either chemoradiation alone (n=158)
  or chemoradiation plus immunotherapy (n=154). Your goal is to develop a **predictive
  biomarker** (not prognostic) for immunotherapy benefit using a 47-gene NanoString
  panel measured from pre-treatment FFPE biopsies. The primary endpoint is 2-year
  progression-free survival (PFS); 89 PFS events occurred in the chemo-only arm and
  71 in the immunotherapy arm.


  Complicating factors: (1) The gene panel includes 6 known interferon-gamma signature
  genes (IFNG, CXCL9, CXCL10, IDO1, HLA-DRA, STAT1) that are highly correlated (Pearson
  r > 0.85 pairwise); (2) 23% of samples have at least one missing gene measurement
  due to RNA quality issues; (3) A smaller external validation cohort of 88 patients
  (41 chemo-only, 47 immunotherapy) exists from a different institution using a slightly
  different NanoString codeset with 39 overlapping genes.


  Provide the following:

  1. A precise statistical definition distinguishing this predictive biomarker task
  from a prognostic one, including the correct interaction test formulation and why
  the overall cohort analysis would be misleading.

  2. A feature selection strategy that handles the multicollinearity among the IFN-γ
  genes without discarding biological signal, specifying any regularization choices
  and their hyperparameter tuning approach.

  3. A missing data handling plan that avoids leakage, including which imputation
  method to use and at what stage in the modeling pipeline.

  4. Python pseudocode for a nested cross-validation loop that correctly estimates
  predictive performance while accounting for the treatment interaction.

  5. A cross-platform harmonization approach for the external validation cohort given
  the 8 missing genes, and the minimum acceptable performance threshold to claim external
  replication.'
