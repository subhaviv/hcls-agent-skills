id: radiology-preprocessing-29
prompt: 'A research team is processing a dataset of 847 T1w MRI scans from a multicenter
  study (sites: Boston, Munich, Tokyo) acquired on 3T scanners (Siemens Prisma, GE
  Discovery, Philips Ingenia). During quality control, they discover that 23% of scans
  from the Tokyo site show severe intensity inhomogeneity artifacts due to a miscalibrated
  RF coil, and HD-BET skull stripping is failing on approximately 31% of these affected
  scans (producing incomplete brain masks with missing inferior temporal and cerebellar
  regions). Additionally, the Munich site used a non-standard FOV that excludes the
  top 15mm of cortex in some subjects.


  The team wants to register all scans to MNI152 2mm space using ANTs SyN for downstream
  VBM analysis. They are concerned that the intensity artifacts are propagating through
  the pipeline and corrupting the final normalized images.


  **Please provide:**


  1. A diagnostic framework explaining why N4BiasFieldCorrection may be insufficient
  for severe RF coil miscalibration artifacts and what alternative or supplementary
  correction strategies should be employed before skull stripping


  2. A Python/bash pipeline script using ANTsPy and FSL that implements: (a) enhanced
  bias correction with site-specific parameters, (b) a fallback skull stripping strategy
  combining HD-BET with FSL BET when HD-BET fails, (c) quality control metrics (Dice
  overlap with MNI brain mask, normalized mutual information) to flag poor registrations


  3. Specific ANTs SyN registration parameters (convergence, shrink factors, smoothing
  sigmas, transform parameters) optimized for data with residual intensity artifacts


  4. A strategy for handling the truncated FOV scans from Munich before MNI registration,
  including whether zero-padding or FOV exclusion is preferable for VBM validity'
target_skills:
