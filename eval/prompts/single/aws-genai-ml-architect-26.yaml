id: aws-genai-ml-architect-26
prompt: 'A regional cancer center is building a **clinical trial matching system**
  that needs to identify eligible patients from their EHR data and match them against
  847 active oncology trials. The system must process both structured data (ICD-10
  codes, lab values, medication lists) and unstructured clinical notes (~2,400 words
  average per patient). The center has 94,000 active patients with new notes ingested
  daily via HL7 FHIR R4 from their Epic system.


  **Technical constraints:**

  - PHI data cannot leave the VPC

  - Matching latency must be under 8 seconds per patient query

  - Trial eligibility criteria are updated weekly by research coordinators (non-technical
  users)

  - The system must provide explainable match scores with specific criterion-level
  justifications

  - Budget ceiling: $45,000/month AWS spend


  **Required deliverables:**


  1. **Architecture diagram description** comparing a Bedrock Knowledge Bases + Agents
  approach versus a SageMaker-hosted fine-tuned clinical NLP approach for the eligibility
  matching core — include specific AWS services for each path


  2. **RAG pipeline design** for the trial criteria corpus, specifying chunking strategy,
  embedding model selection (justify between Amazon Titan Embeddings v2 vs. a BiomedBERT
  variant on SageMaker), and vector store choice (OpenSearch Serverless vs. Aurora
  pgvector)


  3. **PHI handling architecture** ensuring HIPAA compliance with audit trails, including
  how to de-identify notes before embedding while preserving clinical semantics


  4. **Cost breakdown estimate** for both architectural approaches given the patient
  volume and ingestion rate


  5. **Sample Python code** for the FHIR-to-embedding preprocessing pipeline using
  AWS HealthLake and Amazon Comprehend Medical'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: intermediate
