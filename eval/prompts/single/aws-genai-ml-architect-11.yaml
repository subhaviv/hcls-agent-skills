id: aws-genai-ml-architect-11
prompt: 'A regional hospital network with 45,000 annual patient encounters wants to
  deploy a clinical NLP solution on AWS to automatically extract structured data from
  unstructured discharge summaries. The summaries contain PHI and are stored in Amazon
  S3. The team has limited ML expertise but has Python developers available.


  The solution needs to:

  - Extract diagnoses (ICD-10 codes), medications, and lab values from free-text notes

  - Process approximately 125 discharge summaries per day (averaging 800 words each)

  - Meet HIPAA compliance requirements with a signed BAA

  - Minimize operational overhead since there is no dedicated MLOps team

  - Stay within a monthly budget of $2,000


  The team is debating between two approaches:

  1. Using Amazon Comprehend Medical as a managed NLP service

  2. Fine-tuning a clinical BERT model on SageMaker using a dataset of 5,000 labeled
  discharge summaries they already have


  Please provide:

  1. A recommendation for which approach better fits this scenario with justification

  2. A high-level AWS architecture diagram description showing all required components
  (S3, IAM roles, processing service, output storage)

  3. A short Python code snippet demonstrating how to call the recommended service
  to extract entities from a sample discharge summary text

  4. An estimated monthly cost breakdown based on the given volume, and whether it
  fits within the $2,000 budget'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: easy
