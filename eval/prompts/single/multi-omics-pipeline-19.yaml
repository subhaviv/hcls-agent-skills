id: multi-omics-pipeline-19
prompt: 'You are integrating multi-omics data from a pancreatic ductal adenocarcinoma
  (PDAC) cohort of 87 patients with matched RNA-seq, proteomics (TMT-labeled, 10-plex),
  and ATAC-seq data. The RNA-seq data uses Ensembl gene IDs (GRCh38.p13), proteomics
  uses UniProt accessions, and ATAC-seq peaks are annotated with nearest-gene HGNC
  symbols. Before integration, you discover that the RNA-seq samples were processed
  in 3 batches (n=31, 28, 28) and proteomics in 2 batches (n=45, 42), with known batch
  metadata but no overlapping batch structure between modalities.


  Your tasks:


  1. Write R code using `biomaRt` to create a unified feature table mapping Ensembl
  IDs → HGNC symbols → UniProt accessions, handling one-to-many mappings by retaining
  only canonical UniProt entries (reviewed SwissProt). Include logic to flag genes
  where HGNC symbol conflicts exist between the Ensembl and ATAC-seq annotations.


  2. Describe the correct sequential order for applying ComBat (RNA-seq normalized
  counts, already log2-transformed) versus ComBat-seq (raw counts), specifying which
  is appropriate here and why. Then provide the `sva` package R code for batch correction,
  preserving a binary tumor-grade covariate (high vs. low) in the model.


  3. After harmonization, you run MOFA2 with 15 factors across all three modalities.
  Factors 3 and 7 show high variance explained in proteomics (>18%) but near-zero
  in RNA-seq (<1%). Propose two biological and two technical explanations for this
  dissociation, and describe what downstream validation steps (including a specific
  `clusterProfiler` GSEA call on Factor 3 protein weights) would distinguish between
  them.'
