id: aws-genai-ml-architect-14
prompt: 'A regional oncology network with 12 cancer centers needs to deploy a real-time
  clinical NLP pipeline on AWS to extract structured data from unstructured oncology
  pathology reports. The system must process approximately 3,500 pathology reports
  daily, each averaging 2,400 tokens, and extract entities including tumor staging
  (TNM classification), biomarker results (ER/PR/HER2, KRAS, EGFR, ALT1), treatment
  history, and ICD-10 codes. The extracted data must be written to Amazon HealthLake
  for downstream analytics and fed into a SageMaker-based recurrence prediction model.


  The organization has an existing AWS environment with a signed BAA, operates under
  HIPAA, and has a 6-month timeline to production. Their ML team has moderate AWS
  expertise but limited NLP fine-tuning experience. They are debating between using
  Amazon Comprehend Medical, a fine-tuned SageMaker endpoint with a biomedical BERT
  variant (BioBERT or ClinicalBERT), or Amazon Bedrock with Claude 3 Sonnet for the
  extraction layer.


  Please provide:

  1. A comparative analysis of all three NLP approaches against the specific oncology
  extraction requirements, including accuracy trade-offs, HIPAA compliance posture,
  and operational complexity

  2. A recommended architecture diagram description showing the end-to-end pipeline
  from report ingestion to HealthLake storage, including specific AWS services at
  each stage

  3. A sample AWS Step Functions state machine definition (JSON/YAML) orchestrating
  the extraction workflow with error handling and retry logic

  4. Estimated monthly AWS cost breakdown for the production workload at 3,500 reports/day

  5. The top three risks specific to PHI handling in this pipeline and corresponding
  mitigation controls'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: intermediate
