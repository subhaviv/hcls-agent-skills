id: scrna-seq-pipeline-26
prompt: 'You are analyzing a single-cell RNA-seq dataset from a colorectal cancer
  study involving 8 patients (4 tumor, 4 adjacent normal tissue). After running CellRanger,
  you have 8 separate `filtered_feature_bc_matrix` directories. Initial QC reveals
  the following per-sample statistics:


  - Tumor samples: median 2,800 genes/cell, median 12% mitochondrial reads, ~15,000
  cells total

  - Normal samples: median 3,100 genes/cell, median 6% mitochondrial reads, ~12,000
  cells total


  You suspect batch effects between patients and between tumor/normal conditions.
  You plan to use Harmony for batch correction. Your biological question focuses on
  identifying cancer-associated fibroblast (CAF) subpopulations and their marker genes.


  Please provide:


  1. **Complete Python/Scanpy code** to load all 8 samples with sample labels, concatenate
  into a single AnnData object, and perform QC filtering (justify your chosen thresholds
  for min_genes, max_genes, mt percentage, and min_cells).


  2. **Normalization and HVG selection code** using `sc.pp.normalize_total` and `sc.pp.highly_variable_genes`
  with `n_top_genes=3000`, followed by PCA (50 components).


  3. **Harmony integration code** using `harmonypy`, correcting for both `patient_id`
  and `condition` (tumor vs. normal) covariates simultaneously. Explain whether you
  should run Harmony on raw PCA or scaled PCA embeddings.


  4. **Leiden clustering code** at resolution 0.5, followed by UMAP visualization
  colored by cluster, condition, and patient_id.


  5. **Differential expression analysis** using `sc.tl.rank_genes_groups` with the
  Wilcoxon method to identify top 10 marker genes for each cluster, and a strategy
  to identify which clusters likely represent CAF populations based on known markers
  (*ACTA2*, *FAP*, *PDGFRA*, *COL1A1*).'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: intermediate
