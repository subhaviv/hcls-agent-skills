id: hedis-measure-specification-18
prompt: 'A regional health plan with 847,000 covered lives is preparing for HEDIS
  MY2024 data submission. Their analytics team has flagged a complex enrollment scenario
  affecting the Diabetes Care — HbA1c Poor Control (D5) measure and the Colorectal
  Cancer Screening (COL-E) measure simultaneously.


  **Patient Scenario — Member ID: FIC-2024-00391**

  - Date of birth: March 14, 1959 (age 65)

  - Health plan enrollment history: Enrolled January 1, 2023; disenrolled August 17,
  2023; re-enrolled October 3, 2023; remained enrolled through December 31, 2023

  - Medicare Advantage plan type (no Medicaid dual-eligibility)

  - ICD-10 diagnosis of Type 2 diabetes (E11.9) documented February 2023

  - HbA1c result of 9.4% on November 8, 2023

  - Colonoscopy performed September 2, 2023 (during gap period)

  - No other colorectal screening on record


  **Deliverables requested:**


  1. Determine whether Member FIC-2024-00391 meets the continuous enrollment criteria
  for BOTH D5 and COL-E under HEDIS MY2024 specifications, showing your step-by-step
  logic including allowable gap calculations.


  2. For whichever measures the member qualifies for, evaluate whether the available
  clinical events (HbA1c result, colonoscopy) satisfy the numerator criteria — including
  whether the colonoscopy performed during the enrollment gap is numerator-eligible.


  3. If the colonoscopy is deemed non-eligible due to the gap period, identify two
  alternative administrative or hybrid specification strategies the plan could use
  to capture colorectal screening evidence for similarly situated members in future
  measurement years.


  4. Write a SQL query that flags members with enrollment gaps exceeding 45 days who
  have clinical events occurring specifically within those gap windows, for audit
  preparation purposes.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: hard
