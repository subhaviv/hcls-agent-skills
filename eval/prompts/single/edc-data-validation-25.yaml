id: edc-data-validation-25
prompt: 'You are working as a clinical data manager on a Phase II oncology trial (STUDY-ONC-2847)
  with 180 enrolled patients. Your EDC system (Veeva Vault CDMS) exports data in SAS
  transport format. You need to validate the Laboratory Results (LB) SDTM domain before
  database lock.


  The LB dataset contains 12,400 records across 45 lab parameters. Known issues include:
  (1) some LBORRES values contain "<" or ">" symbols (e.g., "<0.5", ">100") that need
  numeric conversion for LBSTRESN, (2) LBBLFL (baseline flag) is inconsistently populated
  — some patients have multiple records flagged as baseline for the same parameter,
  (3) LBSTRESU units show mixed conventions (e.g., "mg/dL" vs "mg/dl" vs "MG/DL"),
  and (4) LBSTNRLO/LBSTNRHI reference ranges are missing for approximately 8% of records.


  Your CDISC controlled terminology version is CT 2023-03-31. The primary safety parameters
  requiring strict validation are ALT, AST, creatinine, and hemoglobin, with protocol-specified
  alert thresholds at 3× ULN for liver enzymes and <8 g/dL for hemoglobin.


  Please provide:

  1. A Python script that loads the LB SAS transport file, resolves the "</>"-prefixed
  values with appropriate imputation logic, standardizes LBSTRESU using a mapping
  dictionary, and flags duplicate baseline records

  2. A validation function that checks LBSTNRLO/LBSTNRHI completeness and identifies
  records exceeding protocol alert thresholds for the four priority parameters

  3. A controlled terminology checker that validates LBTESTCD and LBSTRESU against
  the CT 2023-03-31 CDISC codelist (provide at least 15 realistic LBTESTCD values
  to validate against)

  4. A prioritized output report (CSV) distinguishing critical findings from warnings'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: intermediate
