id: quantitative-proteomics-30
prompt: 'You are analyzing a TMT-16plex proteomics dataset from a clinical study comparing
  3 disease subtypes (n=15 patients per group, 45 total) processed across 4 TMT batches.
  After MaxQuant processing, you have a `proteinGroups.txt` file with ~6,800 protein
  groups. Initial QC reveals: (1) one batch has systematically 23% lower median intensities
  than the other three batches, (2) missing values constitute 31% of the matrix overall,
  but proteins like SERPINA3, CFB, and ORM2 show >80% missingness specifically in
  the "Subtype C" group while being nearly complete in Subtypes A and B, and (3) PCA
  shows samples cluster primarily by batch rather than disease subtype.


  You need to perform differential expression analysis to identify proteins distinguishing
  the three subtypes.


  Please provide:


  1. **Normalization strategy**: Explain why simple median centering is insufficient
  here and propose a two-step normalization approach that corrects both the batch
  intensity offset and within-batch channel variability. Include the specific R code
  using `limma` and `NormalizeRobust` or equivalent functions.


  2. **Imputation decision**: Given the mixed missingness pattern (the three proteins
  above show subtype-specific absence suggesting MNAR, while ~18% of remaining missingness
  appears random), describe a hybrid imputation strategy. Specify exact parameters
  for QRILC versus kNN application and how you would classify which proteins receive
  which treatment.


  3. **Differential expression model**: Write the complete `limma` model formula incorporating
  batch as a covariate, and explain why a standard one-way ANOVA without batch correction
  would inflate false positives given the described batch-subtype confounding structure.


  4. **Ratio compression assessment**: Describe one diagnostic plot you would generate
  to estimate TMT ratio compression magnitude in this dataset and how it would influence
  your fold-change interpretation threshold.'
target_skills:
- quantitative-proteomics
domain: proteomics
difficulty: hard
