id: scrna-seq-pipeline-14
prompt: 'You are analyzing a single-cell RNA-seq dataset from a colorectal cancer
  study involving 8 patients (4 tumor, 4 adjacent normal tissue). After running CellRanger,
  you have 8 separate `filtered_feature_bc_matrix` directories. Initial cell counts
  per sample range from 3,200 to 7,800 cells. You suspect significant batch effects
  between patients.


  Your preliminary QC shows the following concerning metrics across samples:

  - Median genes per cell: 1,850 (range: 400–6,200)

  - Median UMI counts: 3,100 (range: 600–45,000)

  - Mitochondrial gene percentage: bimodal distribution peaking at 4% and 22%


  **Deliverables requested:**


  1. **Write complete Python/Scanpy code** to load all 8 samples, concatenate them
  with proper sample labels, and apply QC filtering using adaptive thresholds (not
  fixed cutoffs) based on median absolute deviation (MAD). Include doublet detection
  using Scrublet.


  2. **Provide the normalization and HVG selection pipeline** — justify your choice
  of the number of highly variable genes (targeting ~3,000 HVGs) given the multi-sample
  nature of this dataset.


  3. **Write code to perform batch correction using Harmony** on the PCA embedding,
  then build the neighborhood graph and generate UMAP coordinates. Use `n_neighbors=20`
  and `min_dist=0.3`.


  4. **Explain how you would validate** that Harmony successfully removed batch effects
  while preserving biological variation between tumor and normal tissue, including
  at least two quantitative metrics you would compute.'
