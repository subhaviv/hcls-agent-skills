id: aws-genai-ml-architect-24
prompt: 'A regional health system with 340,000 active patients is building a real-time
  clinical decision support system to flag potential sepsis risk at the point of care.
  The system must process incoming HL7 FHIR R4 messages from 12 hospital EMRs, run
  inference against a fine-tuned XGBoost model (trained on 2.1M historical encounters
  with 47 clinical features including vitals, labs, and medication orders), and return
  a risk score with contributing feature explanations to clinicians within 800ms end-to-end.


  The architecture must meet HIPAA requirements, support a BAA with AWS, handle peak
  load of 4,200 FHIR messages per minute during morning rounds, and integrate with
  an existing Amazon HealthLake FHIR store. The team wants to use SageMaker for model
  hosting but is debating between a real-time endpoint and an asynchronous endpoint
  configuration. They also need SHAP-based explainability surfaced per prediction.


  Please provide:

  1. A recommended AWS architecture diagram description (components, data flow, AWS
  services) that satisfies the latency and compliance requirements

  2. A justified recommendation on SageMaker real-time vs. asynchronous endpoints
  given the 800ms SLA and peak throughput

  3. A Python code snippet showing how to invoke a SageMaker real-time endpoint with
  a FHIR-derived feature payload and parse a SHAP explanation response

  4. Specific SageMaker instance type recommendations for the inference endpoint,
  with cost-optimization strategies for off-peak hours (typically 11pm–5am when volume
  drops 90%)

  5. Identification of two architectural risks specific to PHI handling in this pipeline
  and mitigations for each'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: intermediate
