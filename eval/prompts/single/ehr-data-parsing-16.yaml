id: ehr-data-parsing-16
prompt: 'You are working with a hospital''s ADT (Admit, Discharge, Transfer) feed
  that delivers HL7v2 ADT^A01 messages for new patient admissions. Your team needs
  to extract patient demographics and insurance information from these messages to
  populate a downstream analytics database.


  Below is a representative sample message:


  ```

  MSH|^~\&|EPIC|HOSP01|ANALYTICS|DW|20240315142233||ADT^A01|MSG004521|P|2.5

  EVN|A01|20240315142233

  PID|1||MRN789012^^^HOSP01^MR||MARTINEZ^ELENA^ROSE^^MS||19881205|F|||742 MAPLE DRIVE^^CHICAGO^IL^60601^USA||3125559876^PRN^PH|||M||ACC987654^^^HOSP01^AN

  PV1|1|I|4WEST^401^A^HOSP01||||NPI1234567^JOHNSON^ROBERT^^^DR|||SUR||||ADM|||||VIP123^^^HOSP01^VN|BCBS|||||||||||||||||||||20240315140000

  IN1|1|PLAN445|BCBS001|BLUE CROSS BLUE SHIELD|PO BOX 1234^SUITE 100^CHICAGO^IL^60602|800-555-1234|GRP78901||MARTINEZ^ELENA^ROSE|SELF|19881205|742
  MAPLE DRIVE^^CHICAGO^IL^60601||||||||Y|||||POL-2024-789012

  ```


  Please provide:

  1. A Python function `parse_adt_a01(message_str)` that extracts: MRN, patient full
  name, date of birth, gender, full address, phone number, admission date, attending
  physician NPI and name, insurance plan name, insurance group number, and policy
  number

  2. The function should return a flat Python dictionary with snake_case keys

  3. Include error handling for missing or malformed segments using `hl7` library
  parsing conventions

  4. A second function `batch_parse_adt(file_path)` that reads a file containing multiple
  messages separated by newlines and returns a pandas DataFrame

  5. Add a data quality check that flags records where DOB is in the future or patient
  age exceeds 130 years'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: intermediate
