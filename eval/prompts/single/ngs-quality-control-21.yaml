id: ngs-quality-control-21
prompt: 'Here is test question #21 of 30:


  ---


  You have just completed sequencing a batch of 6 whole-genome sequencing (WGS) samples
  (sample_R1.fastq.gz / sample_R2.fastq.gz per sample, plus coordinate-sorted BAM
  files with indices). Before proceeding to variant calling, your team lead wants
  a comprehensive QC report for the entire batch. You have access to FastQC, fastp,
  mosdepth, Picard CollectWgsMetrics, and MultiQC, with `THREADS=8` and output directory
  `OUT=qc_out`.


  Please provide the following:


  1. **A bash script** that runs the complete QC pipeline for a single sample (named
  generically as `SAMPLE`, `R1`, `R2`, and `BAM` variables so it can be looped), including:
  raw read QC with FastQC, adapter trimming and per-read quality filtering with fastp
  (minimum base quality Q20, minimum read length 50 bp), post-trim FastQC, WGS coverage
  analysis with mosdepth (targeting 1× resolution, no BED file), and Picard CollectWgsMetrics
  against `ref.fasta` with minimum mapping quality 20 and minimum base quality 20.


  2. **A brief explanation** (3–5 sentences) of what each tool contributes to the
  overall QC picture and why running FastQC both before and after trimming is important.


  3. **A MultiQC command** that aggregates all outputs from the `OUT=qc_out` directory
  into a single HTML report, including a custom report title "WGS Batch QC Report".


  4. **Three specific QC thresholds** (with numeric values) you would use to flag
  a WGS sample as failing QC, referencing metrics from at least two different tools
  used in the pipeline.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: easy
