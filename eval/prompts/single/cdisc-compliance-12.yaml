id: cdisc-compliance-12
prompt: 'A clinical trial sponsor is preparing SDTM datasets for an FDA submission
  of a Phase III oncology study (Study XYZ-2024). The data management team has collected
  adverse event data and needs to map it to the AE domain. They have the following
  raw data fields that require mapping decisions:


  - **AETERM**: Verbatim adverse event term (e.g., "feeling sick to stomach")

  - **AESTDTC**: Start date/time of AE

  - **AEONGO**: Yes/No flag indicating if AE is ongoing

  - **AESEV**: Severity captured as Low/Medium/High (non-standard terminology)

  - **AEACN_CHEMO**: Action taken specifically for chemotherapy dose

  - **AEACN_RADIO**: Action taken specifically for radiotherapy dose

  - **STUDY_AENO**: Sponsor''s internal AE sequence number


  The study has 342 subjects across 3 treatment arms. The team is unsure how to handle
  the two action-taken fields (AEACN_CHEMO and AEACN_RADIO) and the non-standard severity
  terminology, and whether SUPPQUAL is needed.


  Please provide:

  1. A mapping table showing the correct SDTM AE domain variable name, CDISC controlled
  terminology value (where applicable), and any transformation needed for each raw
  field listed above

  2. A clear recommendation on whether AEACN_CHEMO and AEACN_RADIO belong in the AE
  domain directly or in SUPPQUAL, with justification citing SDTM Implementation Guide
  rules

  3. The correct CDISC CT values to replace Low/Medium/High severity ratings

  4. A brief SUPPQUAL structure example (showing STUDYID, RDOMAIN, USUBJID, IDVAR,
  IDVARVAL, QNAM, QLABEL, QVAL) for any variables you recommend placing there'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: easy
