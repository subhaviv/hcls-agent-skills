id: ngs-quality-control-19
prompt: 'You are processing a whole-exome sequencing cohort of 48 tumor-normal pairs
  for a somatic variant calling pipeline. After running FastQC on all samples, you
  observe the following patterns in a subset of tumor samples (12/48 pairs):


  - Per-base sequence quality drops sharply after cycle 130 in R2 reads (median Q
  score falls from Q35 to Q18)

  - "Sequence Duplication Levels" module flags WARN for all tumor samples, with estimated
  duplication rates between 35–52%

  - "Overrepresented Sequences" shows a 15 bp sequence (AGATCGGAAGAGCGTC) appearing
  in ~8% of reads

  - Insert size distribution (from Picard CollectInsertSizeMetrics) shows a bimodal
  peak at 145 bp and 320 bp for the flagged tumor samples, versus a unimodal 185 bp
  peak in matched normals


  Given these observations, provide the following deliverables:


  1. A diagnostic interpretation of all four QC signals and whether they represent
  true biological artifacts, technical artifacts, or expected WES characteristics
  — justify each conclusion with mechanistic reasoning.


  2. A complete `fastp` command for the affected tumor samples that addresses the
  identified issues, using appropriate flags for quality trimming, adapter handling,
  and length filtering. Include `--thread 8` and JSON/HTML output to `qc_out/`.


  3. A `mosdepth` command to assess whether the R2 quality drop is causing regional
  coverage loss in exonic targets, using the provided BAM and a BED file `targets.bed`,
  with per-base and quantized output.


  4. A MultiQC configuration snippet (YAML) that flags samples exceeding 40% duplication
  and Q-score drop thresholds as "fail" in the summary report.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: hard
