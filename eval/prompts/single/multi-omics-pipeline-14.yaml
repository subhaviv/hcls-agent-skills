id: multi-omics-pipeline-14
prompt: 'You are analyzing a multi-omics dataset from a colorectal cancer study involving
  847 tumor samples collected across three clinical sites (Boston, Houston, and Seattle).
  The dataset includes RNA-seq counts (18,432 genes), reverse-phase protein array
  (RPPA) measurements (258 proteins), and DNA methylation beta values (450K array,
  423,000 CpG sites). Before integration, you suspect significant batch effects due
  to sample collection site.


  Your analysis pipeline must accomplish the following:


  1. **Batch correction**: Write R code using `ComBat-seq` for the RNA-seq count data
  and standard `ComBat` for the RPPA continuous measurements, preserving tumor stage
  (I–IV) as a biological covariate. Explain why different ComBat variants are used
  for each data type.


  2. **ID harmonization**: The RPPA protein identifiers use UniProt accession numbers
  (e.g., P04637 for TP53), while RNA-seq uses Ensembl gene IDs (e.g., ENSG00000141510).
  Write R code using `biomaRt` to create a mapping table linking Ensembl IDs → HGNC
  symbols → UniProt accessions for the 258 RPPA proteins, handling one-to-many mappings
  by retaining only reviewed Swiss-Prot entries.


  3. **MOFA2 integration**: After harmonization and batch correction, provide R code
  to train a MOFA2 model on all three omics layers using 15 latent factors, with `likelihoods`
  set appropriately per data type (RNA-seq normalized, RPPA, methylation). Include
  code to extract and visualize variance explained per factor per omics layer.


  4. **Downstream enrichment**: For the top factor explaining the most RNA-seq variance,
  extract the top 200 positive-weight genes and run `clusterProfiler` GSEA against
  the KEGG pathway database, reporting adjusted p-value threshold of 0.05.'
