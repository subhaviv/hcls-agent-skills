id: protein-structure-analysis-14
prompt: 'You are analyzing a homodimeric enzyme, **TrpX synthase** (PDB ID: 7TXS),
  that undergoes a conformational change upon binding its cofactor PLP. You have two
  structure files: `7txs_apo.pdb` (apo form, 312 residues per chain) and `7txs_holo.pdb`
  (holo form with PLP bound). Initial visual inspection suggests the active site loop
  (residues 145–168) shifts significantly between states.


  **Your tasks:**


  1. **Write Python code using Biopython** to superpose the two structures using only
  the backbone atoms (N, CA, C) of the rigid core residues (1–144 and 169–312), then
  compute the per-residue RMSD across all Cα atoms to identify which regions move
  most.


  2. **Generate a contact map** for chain A of the holo structure using a Cβ distance
  cutoff of 8.0 Å, and highlight contacts that are present in the holo form but absent
  in the apo form (i.e., new contacts formed upon PLP binding).


  3. **Perform DSSP secondary structure assignment** on both structures and report
  which residues in the 145–168 loop change their secondary structure classification
  between apo and holo states.


  4. Using the per-residue RMSD values and B-factors from the holo structure, **identify
  the top 5 most flexible residues** outside the 145–168 loop region, and discuss
  whether high B-factor correlates with high RMSD in this case.


  5. Provide a brief interpretation (3–5 sentences) of what the combined RMSD, contact
  map, and DSSP data suggest about the **mechanism of cofactor-induced conformational
  change** in TrpX synthase.'
