id: protein-structure-analysis-29
prompt: 'Here is test question #29 of 30:


  ---


  You are analyzing a homodimeric enzyme (PDB ID: fictional "7XKP") that undergoes
  significant conformational change upon ligand binding. You have two structures:
  the apo form (chain A: 287 residues, resolution 1.8 Å) and the holo form with bound
  inhibitor compound "LIG-447" (chain A: 285 residues, resolution 2.1 Å). When you
  attempt global RMSD superposition using Biopython''s Superimposer on all Cα atoms,
  you obtain an RMSD of 4.7 Å, but visual inspection in PyMOL suggests the core β-sheet
  domain (residues 45–180) is nearly identical between the two forms while a peripheral
  helical subdomain (residues 200–270) shifts dramatically.


  Your tasks:

  1. Write Python code using Biopython to perform **domain-specific superposition**
  — first align only the core domain (residues 45–180), then calculate the RMSD of
  the peripheral subdomain (residues 200–270) **after applying the core-domain transformation
  matrix**, to quantify the true conformational change.

  2. The holo structure is missing residues 181–185 (disordered loop). Explain how
  this gap affects RMSD calculations and what masking strategy you should implement
  to avoid artificially inflated RMSD values.

  3. After superposition, use DSSP via Biopython to compare secondary structure assignments
  between apo and holo forms for residues 190–210 — write code that outputs a side-by-side
  comparison table showing any helix-to-coil or strand-to-coil transitions.

  4. Given that the peripheral subdomain shift likely opens a cryptic binding pocket,
  describe the fpocket parameters you would adjust (minimum alpha sphere radius, clustering
  distance) to detect shallow, transient pockets in the holo form, and explain the
  biological rationale.'
