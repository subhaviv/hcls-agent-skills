id: rwd-cohort-analysis-21
prompt: 'You are analyzing a claims database containing 45,000 patients newly diagnosed
  with Type 2 diabetes (ICD-10: E11.9) between January 2019 and December 2020. You
  want to compare 90-day all-cause hospitalization rates between patients initiated
  on SGLT2 inhibitors (index NDC codes provided for empagliflozin, dapagliflozin,
  and canagliflozin) versus GLP-1 receptor agonists (semaglutide and liraglutide).
  The observation window extends 365 days post-index date, with a 180-day pre-index
  baseline period for covariate assessment.


  Baseline covariates include age, sex, Charlson Comorbidity Index components (extracted
  via ICD-10 codes), prior hospitalization count, baseline HbA1c proxy (CPT 83036),
  statin use, ACE inhibitor/ARB use, and insurance type.


  Please provide the following deliverables:


  1. **Python code** to identify the two treatment cohorts, apply inclusion/exclusion
  criteria (≥18 years old, continuous enrollment during baseline, no prior diabetes
  medication use in baseline period), and calculate Proportion of Days Covered (PDC)
  over the 365-day follow-up for each patient.


  2. **Propensity score estimation** using logistic regression on the listed covariates,
  including code to assess covariate balance via Standardized Mean Differences (SMD)
  before and after 1:1 nearest-neighbor matching (caliper = 0.02).


  3. **Kaplan-Meier survival curves** for time-to-first hospitalization in both matched
  cohorts with log-rank test p-value, and a **Cox proportional hazards model** adjusting
  for any covariates with post-matching SMD > 0.10.


  4. A brief interpretation of what SMD threshold violations would mean for your analysis
  validity and how you would address them.'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: easy
