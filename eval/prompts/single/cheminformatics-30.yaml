id: cheminformatics-30
prompt: 'You are building a selectivity-focused compound library for a kinase drug
  discovery program. Your team has synthesized 8 compounds (SMILES below) and wants
  to understand their chemical diversity and flag any problematic scaffolds before
  progressing to expensive selectivity panels.


  **Compound Set:**

  - CPD-01: `CC1=CC=C(C=C1)S(=O)(=O)N2CCNCC2`

  - CPD-02: `CC1=CC=C(C=C1)S(=O)(=O)N2CCN(CC2)C(=O)C3=CC=CO3`

  - CPD-03: `O=C(CN1CCOCC1)NC2=CC=C(Cl)C=C2`

  - CPD-04: `O=C(CN1CCOCC1)NC2=CC=C(F)C=C2`

  - CPD-05: `c1ccc2c(c1)C(=O)c1ccccc1C2=O` (anthraquinone)

  - CPD-06: `O=C1c2ccccc2C(=O)c2c1ccc(O)c2` (hydroxyanthraquinone)

  - CPD-07: `CC(=O)Nc1ccc(O)cc1` (paracetamol)

  - CPD-08: `Cc1cc2cc(C)cc(C)c2n1CCc1ccccc1`


  **Tasks:**

  1. Write RDKit Python code to compute Morgan fingerprints (radius=2, nBits=2048)
  for all 8 compounds and generate a full pairwise Tanimoto similarity matrix. Identify
  which compound pairs have similarity > 0.7.

  2. Using RDKit''s FilterCatalog with the PAINS_A, PAINS_B, and PAINS_C filter sets,
  programmatically identify which compounds trigger PAINS alerts and report the specific
  alert names.

  3. Calculate MW, LogP, HBD, HBA, TPSA, and rotatable bonds for all compounds. Flag
  any that fail Lipinski RO5 **or** Veber rules (TPSA > 140 Å² or rotatable bonds
  > 10).

  4. Given that CPD-05 and CPD-06 are anthraquinones (known PAINS), and CPD-03/CPD-04
  are close analogs, provide a strategic recommendation on which compounds to prioritize
  and why, citing the computed data.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: hard
