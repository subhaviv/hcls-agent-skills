id: cell-type-annotation-23
prompt: 'You have completed a single-cell RNA-seq experiment on 45,000 PBMCs from
  8 healthy donors and have clustered the data into 22 Leiden clusters (resolution
  0.8) using Scanpy. You want to perform automated cell type annotation using CellTypist
  with the "Immune_All_Low.pkl" model, followed by majority voting to assign consensus
  labels to each cluster.


  Your AnnData object is stored as `adata` with raw counts in `adata.X`, UMAP coordinates
  already computed, and the Leiden cluster assignments in `adata.obs[''leiden'']`.
  The data has already been log1p-normalized to 10,000 counts per cell.


  Please provide the following deliverables:


  1. **Complete Python code** to run CellTypist annotation using the `Immune_All_Low.pkl`
  model with majority voting enabled, ensuring the model is downloaded automatically
  if not present locally. Store per-cell predictions in `adata.obs[''celltypist_cell_label'']`
  and majority-vote cluster labels in `adata.obs[''majority_voting'']`.


  2. **Visualization code** to generate two UMAP plots side-by-side: one colored by
  `leiden` clusters and one colored by `majority_voting` labels, with a shared figure
  size of (16, 6) and legends placed outside the axes.


  3. **Summary table code** using pandas to create a crosstab showing how many cells
  from each Leiden cluster (rows) map to each majority-voted cell type (columns),
  then print the top predicted cell type per cluster sorted by cluster number.


  4. A brief explanation (3-5 sentences) of what the `majority_voting` parameter does
  in CellTypist and why it is preferable to per-cell predictions when interpreting
  cluster-level biology.'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: easy
