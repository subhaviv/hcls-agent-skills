id: scrna-seq-pipeline-29
prompt: 'You are analyzing a single-cell RNA-seq dataset from a longitudinal study
  of 8 multiple sclerosis patients (4 treatment-naive, 4 post-interferon-beta treatment)
  across two sequencing batches. After loading the CellRanger output and initial QC
  filtering (min_genes=200, max_genes=5000, mt_threshold=20%), you have 42,000 cells
  remaining. Leiden clustering at resolution 0.5 produces 18 clusters, but you suspect
  batch effects are confounding your biological signal — UMAP visualization shows
  cells segregating primarily by batch rather than cell type.


  You attempt Harmony batch correction using `patient_id` as the covariate, but cluster
  7 (approximately 2,100 cells) shows a puzzling behavior: post-Harmony, it splits
  into two spatially distinct sub-populations in UMAP space, yet differential expression
  between these sub-populations reveals only 3 significant DEGs (MALAT1, NEAT1, and
  a mitochondrial gene MT-CO1) after FDR correction at 0.05.


  Given this scenario, please provide:


  1. A diagnostic framework with specific Scanpy/Python code to determine whether
  cluster 7''s split represents a true biological subpopulation, residual technical
  artifact, or doublet contamination — include scrublet integration and QC metric
  overlay code

  2. An explanation of why MALAT1 and NEAT1 appearing as top DEGs is suspicious and
  what technical artifacts they typically indicate

  3. Code to re-evaluate whether `patient_id` alone is sufficient as the Harmony covariate,
  or whether batch should be included separately, with a quantitative metric (LISI
  score or equivalent) to assess correction quality

  4. A decision tree for choosing between re-running Harmony with adjusted parameters
  versus switching to scVI for this specific dataset configuration'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: hard
