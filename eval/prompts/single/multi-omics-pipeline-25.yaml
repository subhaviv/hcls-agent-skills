id: multi-omics-pipeline-25
prompt: 'You are integrating multi-omics data from a colorectal cancer cohort of 87
  patients across three omics layers: RNA-seq (18,432 genes), RPPA protein expression
  (217 proteins), and DNA methylation (450K array, 485,512 CpG sites). The data was
  collected across two clinical sites (Site A: 52 patients, Site B: 35 patients) and
  a clear batch effect is visible in PCA plots for all three layers.


  Your analysis plan involves:

  1. Batch correction using ComBat-seq for RNA-seq counts and ComBat for the continuous
  RPPA and methylation data

  2. Running MOFA2 in R to identify latent factors across all three omics layers

  3. Performing clusterProfiler GSEA on the top factor loadings


  **Deliverables requested:**


  1. **R code** implementing ComBat-seq for the RNA-seq count matrix and ComBat for
  RPPA/methylation, using `site` as the batch variable while preserving `tumor_stage`
  (I–IV) as a covariate. Include a post-correction PCA visualization using ggplot2.


  2. **R code** to configure and train a MOFA2 model on the three corrected omics
  layers, setting 15 factors, 1000 maximum iterations, and convergence tolerance of
  1e-6. Extract the top 50 gene loadings from Factor 1.


  3. **R code** using clusterProfiler to run GSEA on the Factor 1 gene loadings (ranked
  by loading magnitude), targeting the Hallmark gene set collection from MSigDb. Include
  proper ranked list construction and a dotplot visualization of the top 15 enriched
  pathways.


  4. A brief explanation (4–6 sentences) of why ComBat-seq is preferred over standard
  ComBat for count data, and what MOFA2 factors biologically represent in this multi-omics
  context.'
target_skills:
- multi-omics-pipeline
domain: multi-omics
