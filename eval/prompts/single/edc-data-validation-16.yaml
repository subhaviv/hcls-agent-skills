id: edc-data-validation-16
prompt: 'You are working as a clinical data manager on a Phase II oncology trial (STUDY-ONC-2847)
  with 180 enrolled patients. Your team has just received an EDC export from Veeva
  Vault CDMS containing SDTM-mapped datasets for the LB (Laboratory) and VS (Vital
  Signs) domains. During a preliminary review, you suspect several data quality issues.


  **Known issues to investigate:**

  - LB domain contains LBTESTCD values including "NEUTROPHIL", "HGB", "PLT", "ALT",
  "CREAT" — some may not conform to CDISC CT (LBTESTCD codelist C65047)

  - VS domain has VSTESTCD values of "SYSBP", "DIABP", "PULSE", "TEMP", "WEIGHT",
  "HEIGHT", "BSA" — verify against codelist C66741

  - Numeric range checks needed: ALT > 500 U/L flagged as critical; hemoglobin < 5
  g/dL or > 20 g/dL flagged; systolic BP > 200 mmHg or < 60 mmHg flagged

  - LBSTRESU and VSSTRESU units must match expected standard units per test

  - Cross-domain check: any VS record with VSDTC must have a corresponding DM record
  with RFSTDTC; calculate study day (VSDY) and flag if VSDY > 365


  **Deliverables requested:**

  1. Python validation script that loads both domains from CSV files, checks controlled
  terminology against hardcoded CDISC CT codelists, applies all range checks, validates
  units, and performs the cross-domain date consistency check

  2. A prioritized findings report structure (as a pandas DataFrame) with columns:
  USUBJID, DOMAIN, VARIABLE, VALUE, RULE_ID, SEVERITY (Critical/Major/Minor), MESSAGE

  3. Summary statistics showing finding counts by severity and domain'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: intermediate
