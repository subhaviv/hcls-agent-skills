id: rna-seq-analysis-14
prompt: 'You are analyzing a bulk RNA-seq dataset comparing tumor vs. normal tissue
  across 12 samples (6 tumor, 6 normal) from a colorectal cancer study. You ran Salmon
  (v1.9.0) with the `--gcBias` and `--seqBias` correction flags on a decoy-aware transcriptome
  index, producing `quant.sf` files for each sample. You now need to bring these quantifications
  into DESeq2 for differential expression analysis.


  Your colleague suggests skipping tximport and instead rounding the Salmon TPM values
  directly into a DESeq2 count matrix, arguing it''s "simpler and equivalent." Meanwhile,
  your preliminary DESeq2 results using `lfcShrink` with the `apeglm` estimator show
  that *VEGFA* has a raw log2FoldChange of 3.8 (padj = 0.003) but after shrinkage
  drops to 1.2, while *MUC2* has a raw LFC of 2.1 (padj = 0.041) and shrinks only
  slightly to 1.95.


  Please provide:

  1. A technical explanation of why your colleague''s TPM-rounding approach is statistically
  problematic, referencing what information tximport preserves that TPM discards

  2. Working R code using tximport and DESeq2 to correctly import Salmon output and
  run the full DE analysis, including the `lfcShrink` step with `apeglm`

  3. An interpretation of the contrasting shrinkage behavior between *VEGFA* and *MUC2*,
  explaining what this pattern reveals about each gene''s expression variance across
  the 12 samples

  4. A recommendation on whether both genes should be considered biologically meaningful
  hits, with justification based on the shrinkage results'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: intermediate
