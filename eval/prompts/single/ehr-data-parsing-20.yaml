id: ehr-data-parsing-20
prompt: 'You are building a clinical data pipeline that receives HL7v2 ORU^R01 messages
  containing microbiology culture results. The messages include non-standard Z-segments
  (`ZMB`) appended by a legacy LIS system that encode antibiotic susceptibility data
  in a pipe-delimited format: `ZMB|1|Ampicillin^R|Ciprofloxacin^S|Vancomycin^I|Meropenem^S`.
  Your pipeline must handle three known edge cases: (1) OBX segments where `OBX-11`
  (observation result status) is `X` (results cannot be obtained), which should be
  excluded from analysis; (2) OBX-5 values containing free-text pathogen names with
  embedded commas and quotes that break naive CSV parsing; (3) messages where the
  MSH-9 trigger event is incorrectly set to `ORU^R30` instead of `ORU^R01` due to
  a vendor bug, but the message structure is otherwise valid ORU^R01.


  Given a batch of 500 such messages stored as a single file with `\n` as the message
  separator (not the standard `\r`), provide the following deliverables:


  1. A Python class `MicroORUParser` using the `hl7` library that correctly handles
  all three edge cases, parses both standard OBX fields and ZMB antibiotic susceptibility
  data, and normalizes the separator issue.

  2. A method `to_dataframe()` that outputs a pandas DataFrame with columns: `message_id`,
  `patient_mrn`, `organism`, `specimen_type`, `collection_datetime`, `antibiotic`,
  `susceptibility`, `result_status`.

  3. A data quality report function `generate_qc_report()` that flags messages with
  missing ZMB segments, invalid result statuses, and duplicate `(patient_mrn, collection_datetime,
  antibiotic)` combinations.

  4. Explain your approach to the vendor MSH-9 bug and why naive hl7 library parsing
  would fail without your fix.'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: hard
