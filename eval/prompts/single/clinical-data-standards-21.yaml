id: clinical-data-standards-21
prompt: 'A clinical trial safety team is preparing an adverse event frequency table
  for a regulatory submission. They have collected the following raw AE terms reported
  by investigators across 847 patients:


  - "stomach pain" (n=34)

  - "abdominal discomfort" (n=28)

  - "belly ache" (n=12)

  - "epigastric pain" (n=19)

  - "nausea" (n=67)

  - "feeling sick" (n=23)

  - "vomiting" (n=45)

  - "headache" (n=89)

  - "head pain" (n=31)

  - "migraine" (n=14)


  The team needs to organize these terms for a standard MedDRA-coded safety table.


  Please provide the following:


  1. For each raw investigator term listed above, identify the most appropriate MedDRA
  Lowest Level Term (LLT) and its corresponding Preferred Term (PT). Where multiple
  raw terms map to the same PT, explicitly identify that grouping.


  2. List the High Level Term (HLT) and System Organ Class (SOC) for each distinct
  PT identified, showing the full hierarchy path (LLT → PT → HLT → HLGT → SOC).


  3. Explain which level of the hierarchy (PT or HLT) is most appropriate for presenting
  AE frequencies in a standard regulatory submission table, and why.


  4. After applying MedDRA coding, calculate the consolidated frequency counts at
  the PT level and indicate what percentage of the 847-patient population each PT
  represents.'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: easy
