id: digital-pathology-15
prompt: 'You are building a multi-instance learning (MIL) pipeline for predicting
  microsatellite instability (MSI) status from H&E-stained colorectal cancer whole-slide
  images using TIAToolbox and the UNI foundation model. Your dataset consists of 847
  WSIs (512 MSI-high, 335 MSS) stored as `.svs` files, with slides averaging 40,000
  × 35,000 pixels at 40× magnification (0.25 mpp).


  Your pipeline must:

  1. Extract non-overlapping 256×256 patches at 20× magnification (0.5 mpp) from tissue
  regions only (excluding background, pen marks, and artifacts), using a minimum tissue
  coverage threshold of 75% per patch.

  2. Generate UNI embeddings for each patch in batches of 64 on a single A100 GPU,
  saving per-slide feature matrices as `.pt` files.

  3. Implement an ABMIL (Attention-Based MIL) aggregator in PyTorch that takes variable-length
  bags of patch embeddings (UNI outputs 1024-dim features) and produces a slide-level
  MSI prediction with an attention score map.

  4. Handle class imbalance using weighted random sampling during training.


  Please provide:

  - Complete Python code for the patch extraction step using TIAToolbox''s `get_wsireader`
  and tissue masking, with the 0.5 mpp and 75% tissue threshold parameters

  - Complete PyTorch code for the ABMIL aggregator class with gated attention mechanism

  - A training loop snippet that incorporates weighted random sampling using `WeightedRandomSampler`
  with the correct class weights for the 512/335 MSI/MSS split

  - Brief explanation of why gated attention is preferred over standard attention
  for this binary classification task'
target_skills:
- digital-pathology
domain: imaging
difficulty: intermediate
