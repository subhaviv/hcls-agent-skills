id: clinical-data-standards-16
prompt: 'A clinical trial team is preparing the adverse events summary table for a
  Phase III oncology study. They have collected 847 treatment-emergent adverse events
  across 312 patients and need to finalize MedDRA coding decisions before database
  lock. The medical coder has flagged three specific coding challenges:


  **Case A:** 23 patients reported "chemotherapy-induced peripheral neuropathy" —
  the coder is debating between coding at LLT "Peripheral neuropathy" (10034620) under
  PT "Peripheral neuropathy" (10034620) in SOC Nervous System Disorders versus using
  the more specific LLT "Neuropathy peripheral" (10029331).


  **Case B:** 67 patients have events that could be classified under either PT "Hyponatraemia"
  (10021036) in SOC Metabolism and Nutrition Disorders OR PT "Blood sodium decreased"
  (10005420) in SOC Investigations — both appear clinically equivalent in the source
  data.


  **Case C:** 14 patients have "immune checkpoint inhibitor-related pneumonitis" documented
  in source records, and the coder must decide between HLT-level grouping versus PT-level
  reporting in the safety table.


  Please provide: (1) A recommendation for each case with justification based on MedDRA
  hierarchy conventions and ICH E2A/E9 guidance; (2) An explanation of how the "primary
  SOC" rule applies to Case B and which SOC should be designated; (3) Guidance on
  when to present AE data at HLT versus PT granularity in a regulatory submission
  table, specifically addressing Case C; (4) A brief note on how these same events
  would be approached differently if mapping to ICD-10-CM for a real-world evidence
  study using the same source data.'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: intermediate
