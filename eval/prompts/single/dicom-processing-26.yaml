id: dicom-processing-26
prompt: 'You are a neuroimaging researcher at a university hospital managing a retrospective
  study involving 847 T1-weighted MPRAGE scans collected across three MRI scanners
  (Siemens Prisma 3T, GE Discovery MR750, and Philips Ingenia 3T) over five years.
  The DICOM files are organized in a flat directory structure with inconsistent naming
  conventions, and preliminary inspection reveals several issues:


  1. Some series contain **mixed slice thicknesses** (1.0mm and 1.2mm) within the
  same SeriesInstanceUID due to a scanner misconfiguration during 2019-2020

  2. The GE scanner produced **multi-echo DICOM files** where echo images are interleaved
  rather than separated into distinct series

  3. Approximately 12% of studies have **duplicate SeriesInstanceUIDs** across different
  patients due to a PACS export bug

  4. Some Philips scans have **private DICOM tags** containing burned-in PHI in pixel
  data overlays


  You need to convert this entire dataset to NIfTI format following BIDS specification
  using dcm2niix, while handling these anomalies programmatically.


  **Deliverables requested:**


  - A Python preprocessing script using `pydicom` that detects and separates mixed-slice-thickness
  series, resolves duplicate SeriesInstanceUIDs by appending StudyInstanceUID-derived
  suffixes, and flags studies with burned-in PHI overlays (DICOM tag 6000,3000)

  - The exact `dcm2niix` command-line invocation with appropriate flags for handling
  multi-echo GE data and generating BIDS-compatible output

  - A post-conversion validation function using `nibabel` that verifies voxel dimensions
  match expected 1.0mm isotropic resolution and reports any outliers'
target_skills:
- dicom-processing
domain: imaging
difficulty: intermediate
