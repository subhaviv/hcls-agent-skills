id: risk-stratification-indices-04
prompt: 'A regional health system is preparing to launch a 90-day readmission reduction
  program targeting their highest-risk Medicare Advantage patients. Their analytics
  team has pulled a cohort of 4,200 discharged patients from the past 6 months with
  the following distribution: 1,850 patients have LACE scores of 10+, 2,100 patients
  have Charlson Comorbidity Index (CCI) scores ≥3, and 1,400 patients appear in both
  high-risk categories. Additionally, the care management team wants to layer in social
  determinants of health using Area Deprivation Index (ADI) deciles, noting that 680
  patients in the cohort reside in ADI deciles 8–10 (high deprivation).


  The program has capacity to actively manage only 600 patients with intensive outreach.
  The team is debating whether to prioritize using LACE alone, CCI alone, or a combined
  composite approach that incorporates ADI.


  Please provide the following:


  1. A conceptual comparison of LACE vs. CCI for 30-day readmission prediction specifically
  in a Medicare Advantage population — including key strengths and limitations of
  each index in this context.


  2. A recommended prioritization strategy that integrates all three risk signals
  (LACE, CCI, ADI) to select the 600 highest-risk patients, with explicit logic for
  how you would weight or sequence these inputs.


  3. A sample SQL query (using standard ANSI syntax) that implements your recommended
  selection logic against a hypothetical patient table containing columns: `patient_id`,
  `lace_score`, `cci_score`, `adi_decile`, and `days_since_discharge`.


  4. One key metric the health system should track at 90 days to validate that the
  composite stratification approach outperforms single-index selection.'
target_skills:
