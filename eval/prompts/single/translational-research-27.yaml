id: translational-research-27
prompt: 'A biotech company has completed a 24-month natural history study in 312 patients
  with LRRK2-associated Parkinson''s disease (G2019S variant, confirmed by genotyping).
  They are now planning a Phase 2 proof-of-concept trial for a selective LRRK2 kinase
  inhibitor (compound NX-7741) and need to finalize their biomarker and endpoint strategy
  before an upcoming Type B meeting with FDA.


  Available data from the natural history study:

  - CSF Rab10 phosphorylation (pRab10/total Rab10 ratio): mean 2.3 ± 0.8 at baseline,
  showing 15% annual increase in non-treated patients

  - Dopamine transporter SPECT (DaT-SPECT) striatal binding ratio: mean 1.8 ± 0.4,
  declining ~8% annually

  - MDS-UPDRS Part III motor score: mean 22 ± 9, worsening ~3 points/year

  - Skin biopsy pRab10 levels correlate with CSF pRab10 (r = 0.71, p < 0.001)

  - 18% dropout rate over 24 months


  For a 12-month Phase 2 trial targeting 30% reduction in CSF pRab10 as primary endpoint,
  please provide:


  1. A critical evaluation of CSF pRab10 as a pharmacodynamic biomarker versus a prognostic/predictive
  biomarker — specify the context of use and what additional qualification data are
  needed

  2. A sample size calculation framework (with assumptions) for the primary endpoint,
  accounting for the observed variability and dropout rate

  3. Recommendation on whether DaT-SPECT or MDS-UPDRS Part III should serve as the
  key secondary endpoint, with justification based on effect size detectability at
  12 months

  4. A go/no-go decision framework with specific threshold criteria for advancing
  to Phase 3'
target_skills:
- translational-research
domain: cross-domain
difficulty: intermediate
