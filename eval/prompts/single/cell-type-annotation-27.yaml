id: cell-type-annotation-27
prompt: 'You have processed a single-cell RNA-seq dataset from 12 pediatric ALL (acute
  lymphoblastic leukemia) patients containing 45,000 cells clustered into 22 Leiden
  clusters (resolution 0.8). You want to perform hierarchical cell type annotation
  using CellTypist with majority voting, followed by marker-based refinement for ambiguous
  clusters.


  Your AnnData object is stored as `adata` with raw counts in `adata.layers[''counts'']`
  and log-normalized data in `adata.X`. The UMAP coordinates are already computed.


  **Specific requirements:**


  1. Write Python code to run CellTypist using the `Immune_All_High.pkl` model first,
  then re-run ambiguous clusters using `Immune_All_Low.pkl` for finer resolution.
  Enable majority voting with `over_clustering` set to your existing Leiden clusters.


  2. After CellTypist annotation, identify clusters where the majority voting confidence
  score falls below 0.6 — treat these as "ambiguous." For these ambiguous clusters,
  write code to generate a dotplot showing expression of the following canonical markers:
  `CD3D`, `CD3E`, `CD19`, `MS4A1`, `CD14`, `LYZ`, `GNLY`, `NKG7`, `CD34`, `DNTT`,
  `PAX5`, `VPREB1`.


  3. Write a function `resolve_ambiguous_clusters(adata, ambiguous_clusters, dotplot_genes)`
  that takes the ambiguous cluster IDs, computes mean expression per cluster for the
  marker genes, and assigns a final label using a simple nearest-centroid approach
  against a manually defined reference dictionary of canonical marker profiles.


  4. Provide a brief strategy (3-4 sentences) for handling clusters that still remain
  ambiguous after both CellTypist and marker-based approaches, specifically in the
  context of leukemic blast populations that may not match healthy immune reference
  models.'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: intermediate
