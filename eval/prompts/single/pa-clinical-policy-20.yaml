id: pa-clinical-policy-20
prompt: 'A 58-year-old Medicare Advantage patient with treatment-resistant depression
  (TRD) has been prescribed esketamine (Spravato) intranasal spray after failing adequate
  trials of three oral antidepressants (sertraline 200mg x 12 weeks, venlafaxine XR
  225mg x 10 weeks, and bupropion XL 450mg x 8 weeks). The plan''s formulary places
  esketamine on Tier 5 (specialty) with a prior authorization requirement referencing
  their internal UM policy aligned with CMS LCD L38354 criteria.


  The PA was denied with the reason: "Documentation does not demonstrate adequate
  trial of augmentation therapy prior to specialty medication use." The treating psychiatrist
  believes augmentation requirements are not clinically appropriate for this patient
  given a PHQ-9 score of 22 (severe) and a prior suicide attempt 6 months ago.


  **Deliverables required:**


  1. **Policy Analysis**: Evaluate whether CMS LCD L38354 actually mandates augmentation
  therapy as a prerequisite for esketamine coverage, and identify any clinical exceptions
  that may apply given this patient''s safety profile.


  2. **Appeal Strategy**: Draft a structured peer-to-peer review talking points document
  (bullet format) that the psychiatrist can use to argue medical necessity, citing
  specific clinical criteria and safety considerations.


  3. **FHIR Da Vinci PAS Implementation**: Provide a sample FHIR R4 `ClaimResponse`
  resource JSON snippet that correctly represents this PA denial with the appropriate
  `adjudication` error codes and `reasonCode` elements that a health IT developer
  would need to trigger an automated appeal workflow.


  4. **Step Therapy Exception**: Under CMS step therapy exception rules (42 CFR §422.136),
  identify which specific exception category applies and what documentation the provider
  must submit within what timeframe.'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: hard
