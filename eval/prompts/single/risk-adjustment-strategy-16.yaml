id: risk-adjustment-strategy-16
prompt: 'A Medicare Advantage plan serving 12,400 members is preparing its annual
  risk adjustment strategy for payment year 2025. The plan is operating under the
  CMS-mandated blended transition period, where payment year 2025 uses a 50/50 blend
  of V24 and V28 model weights.


  The plan''s data analytics team has identified the following coding gap opportunities
  from their retrospective chart review:


  - **847 members** with documented Type 2 diabetes with CKD Stage 3 in clinical notes,
  but only diabetes without complications coded (HCC 19 in V24)

  - **312 members** with documented Major Depressive Disorder, recurrent, severe —
  currently uncoded entirely

  - **523 members** with peripheral vascular disease documented alongside diabetes
  — only diabetes coded

  - **189 members** with COPD exacerbation history — currently coded as simple COPD


  The plan''s current average RAF score is **0.987**, and their benchmark target is
  **1.045**.


  Please provide the following deliverables:


  1. **HCC mapping analysis**: For each coding gap cohort, identify the relevant ICD-10
  codes, their V24 and V28 HCC assignments, and applicable disease hierarchy rules
  that may suppress or allow additive scoring.


  2. **Blended RAF impact calculation**: Estimate the incremental RAF score contribution
  per member for each cohort under the 50/50 blend, showing your methodology.


  3. **Prioritization framework**: Rank the four cohorts by ROI (RAF lift per outreach
  effort), factoring in clinical complexity and documentation requirements.


  4. **Audit-defensible documentation checklist**: For the highest-priority cohort,
  specify the clinical documentation elements required to withstand a CMS RADV audit.'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: intermediate
