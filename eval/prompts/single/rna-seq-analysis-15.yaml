id: rna-seq-analysis-15
prompt: 'You are analyzing a bulk RNA-seq dataset comparing tumor vs. normal tissue
  samples from 8 patients (4 tumor, 4 normal). You ran STAR alignment followed by
  featureCounts using default parameters (minimum mapping quality 10, unstranded library),
  yielding a count matrix. However, a colleague independently quantified the same
  samples using Salmon with default settings and imported counts via tximport. When
  you compare DESeq2 results from both pipelines, you notice:


  - The featureCounts-based analysis returns 847 differentially expressed genes (padj
  < 0.05, |log2FC| > 1)

  - The Salmon/tximport-based analysis returns 1,243 differentially expressed genes
  under identical DESeq2 thresholds

  - Overlap between the two gene lists is only ~68%

  - Three specific genes of biological interest (MYC, VEGFA, TP53) are significant
  in Salmon but not in featureCounts results


  Please provide:


  1. **Diagnostic steps**: List at least four specific technical reasons why Salmon
  might recover more DE genes than featureCounts in this scenario, focusing on multi-mapping
  reads, transcript-level quantification, and library type detection.


  2. **Validation approach**: Describe how you would determine which pipeline''s results
  are more reliable for this dataset, including at least two concrete QC metrics or
  tools you would use.


  3. **DESeq2 code**: Write R code that imports Salmon output via tximport and runs
  DESeq2 with appropriate size factor estimation, using `apeglm` shrinkage on the
  tumor vs. normal contrast, then filters results to padj < 0.05 and |log2FC| > 1.


  4. **Reconciliation strategy**: Explain how you would handle genes that are discordant
  between pipelines when writing up results for publication.'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: intermediate
