id: imaging-study-design-22
prompt: 'A multicenter glioblastoma trial is collecting pre-operative MRI at 4 sites
  using scanners from two vendors (Siemens 3T at Sites 1–2, GE 3T at Sites 3–4). The
  protocol includes T1-weighted post-contrast (T1CE), T2-FLAIR, and apparent diffusion
  coefficient (ADC) maps from DWI. The trial coordinator has collected 60 baseline
  scans (15 per site) and wants to extract radiomic features from the enhancing tumor
  volume as a potential imaging biomarker for predicting 6-month progression-free
  survival.


  Before running the full radiomics pipeline, the team is concerned about scanner-related
  variability inflating or masking true biological signal. They have test-retest phantom
  scans available from each site (same phantom scanned twice within one week) and
  a small subset of 8 patients who were scanned at two different sites within 72 hours.


  Please provide:


  1. A step-by-step preprocessing strategy for harmonizing the multi-site MRI data
  prior to feature extraction, specifying which steps address vendor differences versus
  site-specific drift.


  2. A quantitative protocol for assessing feature-level reproducibility using the
  phantom and dual-site patient data, including which statistical metrics to compute
  (with thresholds) to determine which features are "stable enough" to retain.


  3. A recommendation on whether to apply ComBat harmonization before or after feature
  extraction, with justification based on the available sample size (n=60) and the
  number of expected radiomic features (~1,000 from PyRadiomics defaults).


  4. A short Python pseudocode snippet (10–20 lines) demonstrating how to apply neuroCombat
  to a feature matrix while correctly encoding the site and vendor covariates.'
target_skills:
