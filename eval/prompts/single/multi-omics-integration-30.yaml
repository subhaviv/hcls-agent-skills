id: multi-omics-integration-30
prompt: 'You are conducting a multi-omics study of treatment-resistant depression
  (TRD) involving 847 patients with whole-blood RNA-seq (transcriptomics), plasma
  proteomics (SomaScan 7k panel), and serum metabolomics (untargeted LC-MS). However,
  due to sample availability constraints, only 412 patients have all three data types,
  285 have transcriptomics + proteomics only, and 150 have transcriptomics + metabolomics
  only. Batch effects are present: RNA-seq was processed in 4 batches across 18 months,
  proteomics in 2 batches, and metabolomics in 3 batches with known plate effects.
  You want to identify multi-omic factors that distinguish treatment responders (n=389)
  from non-responders (n=458) while maximizing use of all 847 samples.


  Provide the following:


  1. **Integration strategy recommendation**: Justify whether MOFA+ (with its ability
  to handle missing views) or an alternative method (SNF, iCluster+, or weighted concatenation)
  is most appropriate given the partial overlap structure, and explain how the incomplete
  block design affects factor interpretability.


  2. **Batch correction pipeline**: Specify the exact sequence of batch correction
  steps for each omics layer before integration, addressing whether correction should
  occur before or after integration and how to prevent over-correction that removes
  biological signal related to the TRD phenotype.


  3. **Sample weighting scheme**: Propose a mathematically explicit weighting approach
  that incorporates the 412 complete-overlap samples more heavily while still extracting
  signal from the 435 partial-overlap samples.


  4. **Python/R code skeleton**: Provide a MOFA+ implementation using the `mofapy2`
  package that correctly structures the incomplete data matrix with NaN placeholders,
  sets appropriate hyperparameters (number of factors K, sparsity priors), and extracts
  factor loadings for downstream responder vs. non-responder comparison.'
target_skills:
