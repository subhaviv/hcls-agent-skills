id: pharmacoepidemiology-27
prompt: 'You are conducting a pharmacoepidemiologic study using a large US claims
  database (n = 180,000 patients) to evaluate whether GLP-1 receptor agonists (GLP-1
  RAs) reduce the risk of major adverse cardiovascular events (MACE) compared to DPP-4
  inhibitors in patients with type 2 diabetes. Your team has implemented a new-user
  active comparator design with a 365-day washout period. Propensity scores were estimated
  using 47 baseline covariates, and you plan to use inverse probability of treatment
  weighting (IPTW) with stabilized weights.


  During analysis, you discover that 23% of GLP-1 RA initiators had their index date
  defined as the date of their first prescription fill, but the prescription was written
  45 days earlier during a hospitalization — a period during which MACE events could
  not be captured due to claims lag. Additionally, a reviewer raises concerns about
  time-varying confounding because HbA1c levels and concomitant antidiabetic medications
  change substantially over the 3-year follow-up period.


  Please provide:

  1. A diagnosis of the specific immortal time bias mechanism present in this scenario
  and how it would directionally affect your hazard ratio estimate

  2. A corrected index date definition strategy to eliminate this bias

  3. A step-by-step approach for implementing marginal structural models (MSMs) with
  time-varying confounding, including how to construct time-varying IPTW weights and
  handle censoring

  4. Pseudo-R² diagnostics and weight trimming thresholds you would apply to assess
  propensity score model performance and stabilized weight quality

  5. An E-value calculation framework for the observed HR of 0.78 (95% CI: 0.68–0.89)
  to quantify robustness to unmeasured confounding, with interpretation guidance for
  your clinical team'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: intermediate
