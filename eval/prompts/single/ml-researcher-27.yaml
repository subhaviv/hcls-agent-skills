id: ml-researcher-27
prompt: 'A research team at a regional cancer center has developed a deep learning
  model to predict 5-year survival in non-small cell lung cancer (NSCLC) patients
  using multimodal inputs: whole slide images (WSIs) of resected tumor tissue, structured
  EHR variables (age, stage, ECOG performance status, smoking pack-years), and somatic
  mutation status for 12 genes (EGFR, KRAS, TP53, ALK, ROS1, MET, BRAF, RET, NTRK1,
  ERBB2, KEAP1, STK11). The dataset contains 2,847 patients from three hospital sites
  (Site A: n=1,623, Site B: n=847, Site C: n=377), with 5-year mortality rate of 58%.
  The team used a leave-one-site-out cross-validation scheme and reports AUROC of
  0.81 on the held-out site. They plan to submit this as a Software as a Medical Device
  (SaMD) to the FDA under the De Novo pathway.


  Please provide:

  1. A critique of their validation strategy, specifically identifying at least three
  methodological risks in the current setup (including any leakage concerns with WSI
  preprocessing, temporal considerations, and site generalization adequacy given the
  sample sizes).

  2. A recommended revised validation framework that addresses these risks, including
  how to handle the class imbalance and multimodal fusion evaluation.

  3. A specific set of evaluation metrics beyond AUROC that should be reported, with
  justification for each in the context of a 5-year survival prediction tool.

  4. A fairness audit plan identifying which demographic subgroups to evaluate, what
  disparity metrics to compute, and thresholds that would be acceptable for FDA submission.

  5. A mapping of their current documentation gaps against the TRIPOD+AI checklist
  items most relevant to multimodal oncology models.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: intermediate
