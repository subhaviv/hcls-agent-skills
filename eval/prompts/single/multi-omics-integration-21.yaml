id: multi-omics-integration-21
prompt: 'You are analyzing a cohort of 95 pediatric acute lymphoblastic leukemia (ALL)
  patients with three omics layers collected at diagnosis: RNA-seq transcriptomics
  (all 95 patients), reverse-phase protein array (RPPA) proteomics (78 patients),
  and DNA methylation 450K arrays (all 95 patients). You want to discover latent biological
  factors that jointly explain variance across these three data types and associate
  them with two clinical outcomes: treatment response (complete remission vs. resistant
  disease) and 3-year event-free survival.


  You decide to apply MOFA+ (Multi-Omics Factor Analysis v2) to this dataset.


  Please provide the following deliverables:


  1. **Data preparation steps**: Describe how to handle the partial sample overlap
  (95/78/95) in MOFA+, including which MOFA+ parameter controls missing samples and
  what preprocessing (normalization, feature selection) you would apply to each omics
  layer before model fitting.


  2. **Model configuration**: Specify the recommended number of factors to request
  initially, the likelihood distributions appropriate for each data type (RNA-seq
  counts post-normalization, RPPA continuous values, methylation beta values), and
  whether to use group structure given the two outcome classes.


  3. **R code snippet**: Write a concise R code block using the MOFA2 package that
  creates the MOFA object from three named matrices, sets the model options with appropriate
  likelihoods, trains the model, and extracts the top factor weights for the methylation
  view.


  4. **Factor interpretation strategy**: After training, describe how to identify
  which of the 15 learned factors are clinically relevant, including the statistical
  test to associate factor scores with treatment response and a downstream enrichment
  approach for the transcriptomics weights of the top factor.'
target_skills:
