id: radiology-preprocessing-25
prompt: "You are processing a cohort of 847 T1-weighted MRI scans from a multi-site\
  \ neuroimaging study (3 sites: Site A with 312 scans at 1.5T, Site B with 289 scans\
  \ at 3T, Site C with 246 scans at 3T). The scans were acquired with varying protocols:\
  \ Site A uses a MPRAGE sequence (TR=2300ms, TE=2.98ms, TI=900ms, flip=9°, 1mm isotropic),\
  \ Site B uses a MPRAGE (TR=2530ms, TE=3.03ms, TI=1100ms, flip=7°, 1.0mm isotropic),\
  \ and Site C uses a SPGR sequence (TR=8.1ms, TE=3.2ms, flip=12°, 1mm isotropic).\
  \ \n\nDuring quality control, you notice that after N4 bias field correction and\
  \ HD-BET skull stripping, approximately 18% of Site C scans show incomplete brain\
  \ extraction (dura matter retention near temporal poles), and registration to MNI152\
  \ 1mm space using ANTs SyN shows mean Dice overlap scores of 0.89 for Sites A/B\
  \ but only 0.82 for Site C.\n\nPlease provide:\n1. A technical explanation of why\
  \ SPGR sequences may cause these specific preprocessing failures compared to MPRAGE\n\
  2. A modified ANTs N4BiasFieldCorrection command with optimized parameters specifically\
  \ for SPGR contrast characteristics\n3. A Python/bash workflow that applies site-specific\
  \ preprocessing adjustments, including a re-running strategy for the 18% failed\
  \ HD-BET cases using a fallback method\n4. Recommendations for harmonizing intensity\
  \ distributions across the three sites post-registration, specifying which ComBat\
  \ variant (neuroCombat, longCombat, or CovBat) would be most appropriate given this\
  \ study design"
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: intermediate
