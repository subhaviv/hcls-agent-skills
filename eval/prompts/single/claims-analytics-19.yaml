id: claims-analytics-19
prompt: 'A regional Medicare Advantage plan has flagged a high-volume pain management
  practice (Provider NPI: 1234567890, "Lakeview Pain Associates") for potential upcoding
  and unbundling violations. You have access to 18 months of X12 837P claims data
  for this provider covering 4,847 unique beneficiaries and 31,204 claim lines.


  Preliminary review shows the following suspicious patterns:

  - 94% of office visits billed at CPT 99215 (highest-complexity E&M), versus a specialty
  peer average of 23%

  - Frequent co-billing of CPT 97110 (therapeutic exercises) with 97530 (therapeutic
  activities) on the same date of service

  - Trigger point injections (CPT 20553) billed on 312 dates where the same beneficiary
  also received CPT 99215 with modifier 25

  - A subset of 89 beneficiaries show more than 365 units of service within a single
  calendar year


  **Deliverables required:**


  1. Write a Python function using pandas that ingests a parsed 837P DataFrame and
  flags all four anomaly types described above, returning a consolidated risk-scored
  DataFrame with an explanation column.


  2. Provide the specific NCCI Procedure-to-Procedure (PTP) edit pairs relevant to
  the 97110/97530 co-billing concern, and explain under what modifier conditions this
  bundling restriction can be bypassed.


  3. Design a SQL query that computes each provider''s E&M level distribution (99211–99215)
  as a percentage, then flags any provider whose 99215 rate exceeds 2.5 standard deviations
  above the specialty peer mean.


  4. Apply Benford''s Law analysis to the charge amounts for CPT 20553 across this
  provider and explain how to interpret a chi-square p-value of 0.003 in the fraud
  detection context.'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: hard
