id: digital-pathology-26
prompt: 'Here is test question #26 of 30:


  ---


  You are building a multi-instance learning (MIL) pipeline for predicting microsatellite
  instability (MSI) status from H&E-stained colorectal cancer whole-slide images.
  Your dataset consists of 847 WSIs (412 MSI-High, 435 MSS) stored as SVS files, each
  averaging 40,000 × 35,000 pixels at 20× magnification (0.5 mpp). You plan to use
  the UNI foundation model to extract patch-level embeddings, followed by an ABMIL
  (Attention-Based MIL) aggregator for slide-level classification.


  Your pipeline must:

  1. Use TIAToolbox to extract non-overlapping 256×256 patches at 0.5 mpp, filtering
  out background patches using Otsu thresholding with a tissue coverage threshold
  of 60%.

  2. Extract UNI embeddings (1024-dimensional) for each patch using batch inference
  with batch size 64 on a single A100 GPU, saving embeddings as `.pt` files keyed
  by slide ID.

  3. Implement an ABMIL aggregator in PyTorch with a 2-layer attention network (hidden
  dim 256, gated attention), outputting a slide-level probability for MSI-High.

  4. Handle class imbalance using weighted cross-entropy loss computed from training
  set label frequencies.

  5. Report how to properly split the 847 slides into train/val/test sets (70/15/15)
  while ensuring patient-level stratification to prevent data leakage — assume each
  slide has a `patient_id` field in its metadata CSV.


  Provide complete, runnable Python code for steps 2–4, a TIAToolbox patch extraction
  snippet for step 1, and a detailed explanation of the patient-level split strategy
  for step 5.'
