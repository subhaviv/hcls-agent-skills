id: multi-omics-pipeline-15
prompt: 'You are integrating transcriptomic (RNA-seq) and proteomic (TMT mass spectrometry)
  data from a cohort of 87 colorectal cancer patients (45 microsatellite stable, 42
  microsatellite instable) processed across three batches. After QC, you have 18,432
  genes in the RNA-seq matrix and 4,217 proteins in the proteomics matrix, but feature
  identifiers are mismatched: RNA-seq uses Ensembl gene IDs (e.g., ENSG00000141510)
  while proteomics uses UniProt accessions (e.g., P04637).


  Your tasks are:


  1. **ID Harmonization**: Write R code using `biomaRt` to create a mapping table
  linking Ensembl gene IDs to both HGNC symbols and UniProt Swiss-Prot accessions.
  Handle one-to-many mappings by retaining only entries with a single UniProt accession
  per Ensembl ID, and report how to handle genes like TP53 (ENSG00000141510) that
  may map to multiple isoforms (P04637, Q9Y2H0).


  2. **Batch Correction**: After subsetting to the 2,891 features present in both
  omics layers, apply `ComBat` to the log2-normalized RNA-seq data (continuous) and
  `ComBat-seq` to raw counts for a secondary analysis. Specify which function arguments
  to use for preserving the MSS/MSI biological covariate during correction.


  3. **MOFA2 Integration**: Provide R code to initialize and train a MOFA2 model on
  the batch-corrected data using 10 latent factors, setting `likelihoods` appropriately
  for each omics layer, and explain how to extract the top 15 feature weights from
  Factor 1 for downstream pathway analysis with `clusterProfiler`.'
target_skills:
- multi-omics-pipeline
domain: multi-omics
difficulty: intermediate
