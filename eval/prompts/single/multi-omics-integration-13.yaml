id: multi-omics-integration-13
prompt: 'A research team at Meridian Cancer Institute has collected multi-omics data
  from 85 colorectal cancer patients across three data layers: RNA-seq transcriptomics
  (18,432 genes after filtering), reverse-phase protein array (RPPA) proteomics (218
  proteins), and DNA methylation (450K array, 12,847 CpG sites after variance filtering).
  All 85 patients have complete data across all three omics layers, and the team wants
  to identify patient subgroups and the molecular features driving them.


  The team is considering running MOFA+ (Multi-Omics Factor Analysis) to perform intermediate
  integration and extract latent factors. They have limited computational resources
  and want to keep the analysis interpretable for a clinical audience.


  Please provide the following:


  1. **MOFA+ configuration recommendations**: Specify appropriate parameters including
  number of factors to initialize (justify your choice relative to sample size), which
  likelihood model to use for each data type (Gaussian, Bernoulli, or Poisson), and
  whether to use any sparsity-inducing priors.


  2. **R code** using the `MOFA2` package to set up and train the model on these three
  views, including data formatting, model options, and training options with reasonable
  convergence criteria.


  3. **Factor interpretation strategy**: Describe how to determine which factors are
  biologically meaningful versus technical noise, including a variance-explained threshold
  and at least two downstream analyses (e.g., enrichment, survival correlation) to
  annotate the top factors.


  4. **Comparison guidance**: Briefly explain when you would prefer iCluster+ over
  MOFA+ for this same dataset, naming at least two scenarios where iCluster+ would
  be the better methodological choice.'
target_skills:
- multi-omics-integration
domain: multi-omics
difficulty: easy
