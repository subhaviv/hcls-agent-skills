id: risk-stratification-indices-19
prompt: 'A regional health system is evaluating 30-day readmission risk for 4,200
  patients discharged from their cardiac service line over the past 12 months. Their
  data science team has constructed a composite risk model but is now debating whether
  to use the Charlson Comorbidity Index (CCI), Elixhauser Comorbidity Index (ECI),
  or LACE+ score as the primary stratification backbone. The dataset includes the
  following characteristics: mean patient age 67.3 years, 38% with heart failure as
  primary diagnosis, 22% with COPD, 41% with diabetes, 19% residing in ADI (Area Deprivation
  Index) deciles 8-10, and 8% with documented Z-codes for housing instability (Z59.0,
  Z59.1) or food insecurity (Z59.4).


  Preliminary internal validation shows CCI achieves AUC 0.61, ECI achieves AUC 0.68,
  and LACE+ achieves AUC 0.65 on this cohort. However, the care management team can
  only operationalize interventions for the top 15% highest-risk patients due to staffing
  constraints.


  Please provide:

  1. A comparative analysis of why ECI outperforms CCI in this specific cardiac population,
  referencing the mechanistic differences in comorbidity weighting between the two
  indices

  2. A recommendation on whether SDOH Z-codes and ADI decile data should be incorporated
  as independent variables or used as post-hoc stratification modifiers, with justification

  3. A decision framework for choosing between ECI and LACE+ given the 15% intervention
  threshold constraint, including a discussion of positive predictive value trade-offs
  at this operating point

  4. Pseudocode for a risk-tiering algorithm that integrates ECI, LACE+ score components,
  ADI decile, and Z-code flags into a unified composite score with explicit weighting
  rationale'
target_skills:
- risk-stratification-indices
