id: aws-genai-ml-architect-19
prompt: 'A regional health system (MedStar Valley) is deploying a **real-time clinical
  decision support system** for sepsis prediction in their 12-hospital ICU network.
  The system must process continuous HL7 FHIR R4 streams from 847 monitored beds,
  running inference on a fine-tuned XGBoost model (retrained weekly on 3 years of
  de-identified EHR data, ~2.1M records) alongside a secondary LLM-based narrative
  summarizer that interprets free-text nursing notes to enrich feature vectors.


  **Constraints:**

  - End-to-end latency must be ≤500ms from FHIR event ingestion to alert delivery

  - PHI is present in nursing notes; the system must maintain HIPAA BAA compliance
  across all services

  - The XGBoost model requires weekly automated retraining with drift detection (PSI
  threshold >0.15 triggers emergency retrain)

  - The LLM summarizer must be cost-optimized — nursing notes average 180 tokens,
  with ~12,000 inference calls/day

  - AWS HealthLake is already provisioned for FHIR storage


  **Deliverables requested:**

  1. A complete AWS architecture diagram description (services, data flow, integration
  points) covering ingestion → inference → alerting

  2. A decision analysis: should the LLM summarizer use **Amazon Bedrock** (with which
  model/tier) or a **SageMaker-hosted open-source model** (with which instance type),
  given the token volume and PHI constraints? Include a cost estimate comparison.

  3. A SageMaker MLOps pipeline design for weekly XGBoost retraining with PSI-based
  drift detection, including the specific AWS services for orchestration

  4. Identify two non-obvious HIPAA compliance risks in this architecture and propose
  mitigations'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: hard
