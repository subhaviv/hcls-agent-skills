id: aws-genai-ml-architect-16
prompt: 'A regional oncology network with 12 hospitals is building a clinical decision
  support system to assist oncologists with treatment recommendations for non-small
  cell lung cancer (NSCLC) patients. The system must ingest structured EHR data (HL7
  FHIR R4 from AWS HealthLake containing ~85,000 patient records) alongside unstructured
  pathology reports and radiology notes stored in S3. Oncologists need natural language
  query capability: e.g., "Show me patients with EGFR exon 19 deletions who failed
  first-line osimertinib and are candidates for platinum-based chemotherapy."


  **Constraints and requirements:**

  - All data is PHI; the system must be HIPAA-compliant with BAA coverage

  - Query latency must be under 4 seconds for 95th percentile

  - The oncology team has 3 ML engineers but limited LLM fine-tuning expertise

  - Budget cap: $45,000/month for inference infrastructure

  - Must support 200 concurrent oncologist users during peak hours (8am–6pm EST)

  - Audit logging of every query and retrieved document chunk is mandatory for regulatory
  review


  **Deliverables requested:**

  1. Recommend a RAG architecture using AWS-native services (Bedrock Knowledge Bases,
  HealthLake, OpenSearch Serverless, or alternatives) and justify each component choice

  2. Design the data ingestion pipeline for both FHIR structured data and unstructured
  clinical notes, including chunking strategy for pathology reports

  3. Specify the embedding model and LLM selection within Bedrock, with reasoning
  for NSCLC clinical context

  4. Provide a Python code snippet demonstrating the Bedrock Knowledge Base retrieval
  call with metadata filtering for FHIR patient attributes

  5. Identify the top 3 HIPAA/compliance risks in this architecture and propose mitigations'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: intermediate
