id: rna-seq-analysis-30
prompt: 'You are analyzing a bulk RNA-seq dataset from 6 tumor vs. 6 normal tissue
  samples. You ran STAR alignment (STAR 2.7.10a, hg38, GENCODE v42 annotation) and
  quantified with both featureCounts (v2.0.3, default parameters) and Salmon (v1.9.0,
  with `--gcBias --seqBias` flags, using a decoy-aware index). When you import Salmon
  results via tximport and run DESeq2, you identify 3,847 differentially expressed
  genes (padj < 0.05, |log2FC| > 1). However, when you use the featureCounts matrix
  directly in DESeq2 with identical sample metadata, you only find 1,203 DE genes
  — and critically, 287 genes appear in the featureCounts results but are absent from
  the Salmon results entirely.


  Upon inspection, you notice: (1) the mean library size differs between methods (Salmon:
  ~42M effective counts vs. featureCounts: ~38M raw counts), (2) several of the 287
  "featureCounts-only" genes cluster near centromeric regions in IGV, and (3) your
  Salmon index was built from the GENCODE v42 transcriptome FASTA but the featureCounts
  annotation used an older GTF (GENCODE v38).


  Please provide:

  1. A mechanistic explanation for each discrepancy observed

  2. A recommended "gold standard" reconciliation strategy, including which result
  set to trust and why

  3. R code using tximport + DESeq2 that correctly handles the annotation mismatch
  and applies apeglm shrinkage

  4. Specific QC checks (with code) to validate concordance between the two quantification
  methods before finalizing DE results'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: hard
