id: hedis-measure-specification-04
prompt: 'A regional health plan is preparing for its annual HEDIS submission and needs
  help evaluating two specific measures for a cohort of 1,200 attributed members ages
  18–75. The measures under review are **Controlling High Blood Pressure (CBP)** and
  **Diabetes Care – Blood Pressure Controlled (CDC-BP)**.


  The following data snapshot is available:

  - 340 members have a diagnosis of hypertension (ICD-10: I10) with no diabetes

  - 210 members have both hypertension and Type 2 diabetes (ICD-10: E11.x)

  - Of the 340 hypertension-only members, 95 have a documented BP reading of <140/90
  from a telehealth visit on March 15, 2024

  - Of the 210 dual-diagnosis members, 78 have a documented BP reading of <140/90,
  but 22 of those readings came from a home blood pressure device (patient-reported,
  no clinical supervision)

  - 40 members in the hypertension-only group were enrolled starting February 1, 2024
  (measurement year January 1–December 31, 2024)

  - 15 members have a documented ESRD diagnosis


  Given this scenario, provide the following:

  1. Determine which members are eligible for CBP vs. CDC-BP denominators, including
  how dual-diagnosis members are handled across both measures

  2. Evaluate whether the telehealth BP readings and home device readings meet NCQA''s
  allowable data source criteria for numerator compliance

  3. Apply continuous enrollment rules to the 40 late-enrollee members and determine
  their eligibility status

  4. Identify which members with ESRD should be excluded and from which measure(s)

  5. Recommend a prioritized care gap closure strategy for the non-compliant members
  remaining after exclusions'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: intermediate
