id: drug-repurposing-27
prompt: 'A rare pediatric neurological disorder called **Striatal Degeneration Syndrome
  (SDS)** affects approximately 340 children annually in North America. Whole-exome
  sequencing of 89 SDS patients has identified loss-of-function variants in **CAMK2D**
  (calcium/calmodulin-dependent protein kinase II delta) in 67% of cases, with secondary
  dysregulation of the **HDAC4/MEF2C** transcriptional axis confirmed by RNA-seq.
  The remaining 33% show no CAMK2D variants but have elevated **GSK3B** activity (3.2-fold
  increase vs. controls) and reduced **BDNF** signaling.


  Your team wants to pursue a target-based repurposing strategy using DGIdb and OpenTargets
  to identify approved drugs addressing both molecular subtypes.


  **Please provide:**


  1. **A structured DGIdb query strategy** — specify which interaction types, source
  databases, and minimum evidence score thresholds you would apply when querying CAMK2D,
  HDAC4, GSK3B, and BDNF as targets; explain how you would filter results for CNS-penetrant,
  pediatric-safe compounds


  2. **A ranked candidate list** (minimum 4 drugs) with mechanistic rationale for
  each, including which molecular subtype each addresses and any known pediatric pharmacokinetic
  concerns


  3. **A mechanism-of-action overlap analysis** identifying whether any single drug
  or combination could address both subtypes simultaneously


  4. **An evidence-strength scoring rubric** (using your own defined criteria) to
  rank these candidates for clinical translatability, incorporating existing safety
  data, trial precedent in pediatric CNS indications, and target engagement biomarker
  availability


  5. **A brief study design outline** for a 6-month proof-of-concept trial in 40 patients
  (20 per subtype) including primary endpoints and biomarker strategy'
target_skills:
- drug-repurposing
domain: drug-discovery
difficulty: intermediate
