id: cheminformatics-20
prompt: 'Here is test question #20 of 30:


  ---


  You are analyzing a set of 8 compounds from a fragment-based drug discovery campaign
  targeting a kinase. The SMILES strings are:


  1. `c1ccc(NC(=O)c2ccncc2)cc1` (MW=198, cLogP=2.1)

  2. `c1ccc(NC(=O)c2ccncc2F)cc1` (MW=216, cLogP=2.4)

  3. `c1ccc(NC(=O)c2cc(F)ncc2)cc1` (MW=216, cLogP=2.3)

  4. `c1cc(F)cc(NC(=O)c2ccncc2)c1` (MW=216, cLogP=2.5)

  5. `c1ccc(NC(=O)c2ccncc2Cl)cc1` (MW=233, cLogP=2.8)

  6. `c1ccc(NC(=O)c2cc(Cl)ncc2)cc1` (MW=233, cLogP=2.7)

  7. `c1ccc(NC(=O)c2ccncc2Br)cc1` (MW=277, cLogP=3.1)

  8. `c1ccc(NC(=O)c2cc(Br)ncc2)cc1` (MW=277, cLogP=3.0)


  You need to perform a **matched molecular pair (MMP) analysis** to understand how
  halogen substitution affects potency. Compounds 2–8 showed IC50 values (nM) of 340,
  280, 195, 120, 105, 88, 72 respectively, while compound 1 (unsubstituted) has IC50=520
  nM.


  **Deliverables:**

  1. Write Python code using `mmpdb` CLI commands or `rdkit` to enumerate all valid
  MMPs from this set, defining the transformation context (single-atom substitutions
  only, pyridine ring vs. aniline ring positions)

  2. Quantify the potency cliff between ortho vs. meta halogen positions on the pyridine
  ring using pIC50 transformations

  3. Identify which MMP transformation yields the largest activity gain per heavy
  atom added

  4. Recommend the next analog to synthesize based on MMP extrapolation, with SMILES
  and predicted IC50 range'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: hard
