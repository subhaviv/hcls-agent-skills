id: edc-data-validation-14
prompt: 'You are working as a clinical data manager on a Phase II oncology trial (STUDY-ONC-2847)
  with 156 enrolled patients. Your EDC system (Veeva Vault CDMS) exports data in CSV
  format, and you need to validate the SDTM LB (Laboratory Test Results) domain before
  database lock.


  The LB dataset contains 4,892 records with the following known issues to address:

  - LBTESTCD values include non-standard codes: "HGBA1C", "TRIG", "GLUC_F" that need
  mapping to CDISC CT (C65047)

  - LBSTRESU (standardized units) contains mixed formats: "g/dL", "G/DL", "g/dl" for
  the same test

  - Reference range checks needed: Hemoglobin (LBTESTCD="HGB") normal range 12.0–17.5
  g/dL, ALT (LBTESTCD="ALT") normal range 7–56 U/L, Creatinine (LBTESTCD="CREAT")
  normal range 0.6–1.2 mg/dL

  - LBDTC contains 23 records with partial dates in format "2023-05" (missing day
  component)


  Please provide:

  1. A Python validation script that performs controlled terminology checks against
  CDISC CT codelist C65047, normalizes unit formats, and flags out-of-range values
  with severity levels (critical/warning)

  2. Cross-form consistency logic that verifies LB collection dates (LBDTC) fall within
  the subject''s study participation window using DM domain (RFSTDTC, RFENDTC)

  3. A partial date imputation function following CDISC conventions (impute to first
  of month for start dates, last of month for end dates)

  4. A prioritized output report structure (JSON format) grouping findings by severity
  and USUBJID'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: intermediate
