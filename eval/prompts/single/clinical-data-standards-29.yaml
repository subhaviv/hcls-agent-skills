id: clinical-data-standards-29
prompt: 'A pharmaceutical company is conducting a Phase III oncology trial and has
  collected adverse event data that requires MedDRA v26.0 coding. The safety team
  is debating how to handle the following three problematic AEs in the frequency tables
  for the Clinical Study Report:


  1. **"Chemotherapy-induced peripheral neuropathy"** — 47 patients reported this.
  The verbatim terms were split between LLTs "Peripheral neuropathy" (PT: Peripheral
  neuropathy, HLT: Peripheral neuropathies, HLGT: Peripheral nervous system disorders,
  SOC: Nervous system disorders) and "Neuropathy peripheral" which maps to the same
  PT. Some reviewers want to also capture these under the PT "Neurotoxicity" in the
  same SOC.


  2. **"Immune checkpoint inhibitor-related pneumonitis"** — 23 patients. This exists
  as a verbatim term that could map to PT "Pneumonitis" (SOC: Respiratory disorders)
  OR PT "Immune-mediated pneumonitis" if available, OR potentially "Interstitial lung
  disease" depending on MedDRA version. The medical monitor suggests flagging this
  under both Respiratory SOC and Immune system disorders SOC.


  3. **"Grade 3 ALT elevation"** — 31 patients. The verbatim maps cleanly to PT "Alanine
  aminotransferase increased" but the team wants to group hepatic AEs using the Standardised
  MedDRA Query (SMQ) "Drug-induced liver injury" for a supplementary analysis.


  **Deliverables required:**

  - For each AE, recommend the single primary MedDRA PT and SOC assignment with justification

  - Explain when multi-SOC primary coding is permissible versus when to use SMQs instead

  - Describe the correct methodology for handling the ALT elevation in both the primary
  SOC table and the SMQ-based hepatic analysis

  - Identify which of the three cases represents the highest coding ambiguity risk
  for regulatory submission and why'
