id: risk-adjustment-strategy-14
prompt: 'A Medicare Advantage plan with 12,400 members is navigating the CY2025 blended
  transition period, where CMS applies a 50% V24 / 50% V28 weighting for risk score
  calculation. Your analytics team has pulled the following aggregate data from the
  plan''s most recent submission:


  - 3,200 members have HCC 18 (Diabetes with Chronic Complications) mapped under V24,
  but only 1,890 of those members have the equivalent V28 mapping confirmed

  - 847 members carry HCC 85 (Congestive Heart Failure) in V24; under V28 this category
  has been split into HCC 221, 222, and 223 based on severity

  - The plan''s current blended RAF score averages 1.42, but the finance team projects
  a target of 1.51 to meet capitation revenue goals

  - 420 members have documented ICD-10 code E11.65 (Type 2 diabetes with hyperglycemia)
  but no associated HCC capture in the current submission


  Given this scenario, please provide the following deliverables:


  1. A step-by-step explanation of how the 50/50 blended RAF score is calculated using
  both model versions, with a simplified numeric example using the diabetes cohort
  data above


  2. An analysis of the HCC 85 → V28 severity-split mapping challenge and what documentation
  requirements must be met to support HCC 221, 222, or 223 assignment


  3. A prioritized coding gap remediation strategy for the 420 members with E11.65
  but no HCC capture, including audit-defensible documentation criteria


  4. A risk assessment of whether the 1.51 RAF target is achievable given the transition
  constraints, with specific recommendations for prospective vs. retrospective intervention
  approaches'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: intermediate
