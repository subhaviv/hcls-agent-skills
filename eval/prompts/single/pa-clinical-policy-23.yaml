id: pa-clinical-policy-23
prompt: 'A 58-year-old patient with moderate-to-severe rheumatoid arthritis (RA) has
  been prescribed Abatacept (Orencia) 125mg subcutaneous weekly by their rheumatologist.
  The patient''s insurer, BlueCrest Health Plan, has a step therapy policy requiring
  documented failure of two conventional DMARDs (methotrexate and one additional csDMARD)
  plus one TNF inhibitor before approving any non-TNF biologic for RA. The patient''s
  medical records show:


  - 18 months of methotrexate (20mg weekly) with documented GI intolerance causing
  discontinuation at month 14

  - 6 months of leflunomide (20mg daily) with inadequate clinical response (DAS28
  score remained at 4.8)

  - No prior TNF inhibitor trial documented in the submitted records, though the rheumatologist
  notes in a clinical letter that the patient has "relative contraindications" to
  TNF inhibitors due to a history of recurrent serious infections (three hospitalizations
  for pneumonia in the past four years)


  BlueCrest has issued an initial PA denial citing incomplete step therapy compliance.
  The rheumatologist wants to pursue an expedited appeal and a peer-to-peer review.


  Please provide:

  1. An analysis of whether the TNF inhibitor step therapy requirement can be clinically
  overridden based on the documented infection history, citing relevant clinical policy
  principles

  2. A structured peer-to-peer talking points document the rheumatologist can use
  during the review call

  3. A recommended appeals letter outline with the specific clinical and regulatory
  arguments to include

  4. Identification of any CMS or industry-standard guidelines that support bypassing
  TNF inhibitor step therapy in immunocompromised RA patients'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: easy
