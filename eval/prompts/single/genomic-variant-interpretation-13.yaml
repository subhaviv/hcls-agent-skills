id: genomic-variant-interpretation-13
prompt: 'A clinical genetics laboratory is reviewing a variant identified in a 34-year-old
  woman with a family history of hereditary breast and ovarian cancer. Sequencing
  reveals a heterozygous variant in **BRCA2**: c.5946delT (p.Ser1982ArgfsTer22). The
  variant results in a frameshift leading to a premature stop codon 22 amino acids
  downstream.


  The following data are available:

  - **gnomAD v3.1 allele frequency**: 0.000008 (2 heterozygous alleles out of 251,000
  total alleles; no homozygotes observed)

  - **ClinVar entries**: 47 submissions — 45 classified as Pathogenic, 2 as Likely
  Pathogenic; no conflicting interpretations

  - **Inheritance**: Variant identified in the proband''s affected mother and maternal
  aunt (both with ovarian cancer)

  - **Functional domain**: Variant falls within the DNA-binding domain of BRCA2, upstream
  of the last exon

  - **BRCA2 gene**: Well-established tumor suppressor; loss-of-function is a known
  disease mechanism


  Please provide the following:


  1. A stepwise application of the relevant **ACMG/AMP 2015 criteria** for this variant,
  identifying each criterion code (e.g., PVS1, PS1, PM2, etc.) and explaining whether
  it is met, not met, or not applicable with brief justification.

  2. A final **variant classification** with the overall strength of evidence summarized.

  3. A brief explanation of why **PVS1** does or does not apply at full versus modified
  strength for this specific variant.

  4. One sentence describing the **clinical reporting implication** for this patient
  given the classification.'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: easy
