id: cheminformatics-13
prompt: 'Here is test question #13 of 30:


  ---


  You are working with a small focused library of 5 compounds that need to be evaluated
  for drug-likeness before progressing to in vitro testing. The compounds are provided
  as SMILES strings below:


  | ID | SMILES |

  |----|--------|

  | CPD-01 | CC(C)Cc1ccc(cc1)C(C)C(=O)O |

  | CPD-02 | CC(=O)Nc1ccc(O)cc1 |

  | CPD-03 | COc1ccc2c(c1)cc(=O)n2CC(=O)Nc1ccc(F)cc1 |

  | CPD-04 | O=C(O)c1ccc(NC(=O)c2cccc(Cl)c2)cc1 |

  | CPD-05 | CC(C)(C)c1ccc(cc1)C(O)=O |


  Using RDKit, perform the following tasks:


  1. **Calculate Lipinski Rule of Five descriptors** for each compound: molecular
  weight (MW), LogP (using Crippen method), hydrogen bond donors (HBD), and hydrogen
  bond acceptors (HBA). Flag any compound that violates one or more rules (MW > 500,
  LogP > 5, HBD > 5, HBA > 10).


  2. **Apply Veber rules** by computing rotatable bond count and topological polar
  surface area (TPSA) for each compound. Flag compounds with rotatable bonds > 10
  or TPSA > 140 Å².


  3. **Provide a summary table** combining all descriptors and flags for each compound.


  4. **Write complete, runnable Python code** using RDKit that computes all of the
  above descriptors and prints the final summary table.


  5. **Give a brief recommendation** (2–3 sentences) on which compounds appear most
  suitable for further progression based on the combined filtering results.


  ---'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: easy
