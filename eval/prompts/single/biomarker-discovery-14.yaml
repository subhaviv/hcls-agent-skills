id: biomarker-discovery-14
prompt: 'Here is test question #14 of 30:


  ---


  You are developing a **predictive biomarker** to identify which early-stage non-small
  cell lung cancer (NSCLC) patients will respond to adjuvant immunotherapy (pembrolizumab)
  versus those who will not, using a retrospective cohort of 310 patients (180 responders,
  130 non-responders) with matched tumor RNA-seq (18,500 genes), plasma proteomics
  (1,200 proteins), and 12 clinical variables (age, stage, smoking history, TMB, PD-L1
  TPS score, etc.).


  A junior analyst has already run LASSO logistic regression on the **combined 19,712-feature
  matrix** (genes + proteins + clinical), selected 47 features, and reports an AUC
  of 0.91 on a held-out 20% test set. They split the data once before any preprocessing.


  **Please provide all of the following:**


  1. Identify **at least three specific data leakage risks** in the analyst''s current
  workflow and explain the mechanistic reason each inflates performance.


  2. Design a **corrected modeling pipeline** using nested cross-validation with appropriate
  feature selection — specify the inner/outer fold structure, how normalization and
  feature selection must be positioned, and how to handle the class imbalance.


  3. Distinguish whether this biomarker is **prognostic or predictive** given the
  study design, and explain what additional data or study design element would be
  required to definitively establish predictive value.


  4. Recommend **two complementary evaluation metrics** beyond AUC that are appropriate
  for this clinical decision context, and justify each choice with reference to the
  intended clinical use case (selecting patients for adjuvant therapy).


  5. Write **Python pseudocode** (scikit-learn compatible) implementing the corrected
  nested CV pipeline with LASSO inside a `Pipeline` object.'
