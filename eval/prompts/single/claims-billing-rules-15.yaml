id: claims-billing-rules-15
prompt: 'A regional health plan is conducting a claims audit on a high-volume orthopedic
  surgery group practice. During a 6-month review period, analysts flagged the following
  billing patterns across 847 claims from a single surgeon (NPI: fictional):


  **Flagged Patterns:**

  - Modifier 59 appended to CPT 29881 (knee arthroscopy with meniscectomy) in 73%
  of claims where CPT 29880 was also billed on the same date

  - Modifier 25 used on 91% of E&M visits (99213–99215) performed on the same day
  as minor procedures (CPT 11720–11721, nail debridement)

  - CPT 27447 (total knee arthroplasty) billed with separate E&M codes during the
  90-day global surgery period on 34 occasions, without modifier 24 or 57

  - Average E&M level is 99215 (Level 5) for 68% of all office visits, compared to
  a specialty benchmark of 22%


  **Your tasks:**

  1. Identify which of these four patterns represent likely NCCI edit violations,
  improper modifier use, or global surgery period violations — and explain the specific
  CMS rule being violated in each case.

  2. Distinguish which patterns are more consistent with systematic billing fraud
  versus coding errors or upcoding, and explain your reasoning methodology.

  3. Recommend a structured audit escalation framework: define thresholds for education/correction
  versus prepayment review versus referral to a Special Investigations Unit (SIU).

  4. Draft 3 specific medical record documentation elements that reviewers should
  request to evaluate whether the modifier 25 usage on nail debridement visits is
  defensible.'
target_skills:
- claims-billing-rules
