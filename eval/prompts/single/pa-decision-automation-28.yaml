id: pa-decision-automation-28
prompt: 'A regional health plan processes approximately 4,200 prior authorization
  requests monthly for specialty biologics (adalimumab, ustekinumab, secukinumab)
  treating inflammatory conditions. Your PA automation team has trained a gradient
  boosting classifier on 18 months of historical decisions (78,432 records), achieving
  91% overall accuracy. However, post-deployment audit reveals a troubling pattern:
  the model approves 94% of requests from large academic medical centers but only
  67% of requests from independent rural practices, despite similar clinical profiles.
  SHAP analysis hints that features like "submitting_provider_type," "documentation_completeness_score,"
  and "ICD_code_specificity" are driving this disparity.


  Your task involves four deliverables:


  1. **Bias Audit Code**: Write Python code using SHAP and fairness metrics (equalized
  odds, demographic parity) to quantify the performance gap between provider cohorts,
  using `provider_type` as the sensitive attribute. Include threshold-specific analysis
  across decision probability bins (0.0–0.4, 0.4–0.7, 0.7–1.0).


  2. **Root Cause Analysis**: Given that documentation_completeness_score correlates
  0.71 with provider_type in your training data, explain the causal mechanism creating
  this proxy discrimination and whether this constitutes illegal disparate impact
  under ACA Section 1557.


  3. **Debiasing Strategy**: Propose a concrete remediation pipeline — should you
  apply pre-processing (reweighting), in-processing (adversarial debiasing), or post-processing
  (equalized odds calibration)? Justify your choice given that the model must maintain
  ≥88% accuracy and ≤72-hour turnaround SLA.


  4. **FHIR PAS Integration Fix**: Sketch how retraining with CRD/DTR-enriched FHIR
  PAS bundles (specifically Coverage.costToBeneficiary and Practitioner.qualification
  extensions) could structurally reduce documentation gaps driving the disparity.'
