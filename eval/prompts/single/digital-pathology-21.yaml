id: digital-pathology-21
prompt: 'You are working with a collection of 847 H&E-stained whole-slide images from
  the fictional "ONCO-BREAST-22" dataset, stored as SVS files on a local Linux server.
  Each slide has been scanned at 40× magnification (0.25 µm/pixel at level 0). You
  need to extract tissue patches for downstream feature extraction using the H-optimus-0
  foundation model.


  Your task involves the following specific requirements:


  1. Use TIAToolbox to read one of the slides (`ONCO_0042.svs`) and print its metadata
  including available magnification levels, dimensions at each level, and the vendor
  string.


  2. Generate a tissue mask for the slide at 1.25× effective magnification using TIAToolbox''s
  built-in tissue masker with Otsu thresholding, then save the mask as a PNG file.


  3. Extract non-overlapping 256×256 pixel patches at 0.5 µm/pixel (20× equivalent)
  from tissue regions only (requiring at least 75% tissue coverage per patch), saving
  patch coordinates to a CSV file with columns: `slide_id`, `x`, `y`, `width`, `height`,
  `mpp`.


  4. Write a PyTorch DataLoader that reads patches on-the-fly from the SVS file using
  the saved coordinates CSV, applies the correct preprocessing transforms required
  by H-optimus-0 (mean=[0.707223, 0.578729, 0.703617], std=[0.211883, 0.263526, 0.198481]),
  and returns batches of size 32.


  Please provide complete, runnable Python code for each of the four steps, using
  TIAToolbox ≥1.5 and PyTorch ≥2.0 APIs. Include brief comments explaining key parameter
  choices.'
target_skills:
- digital-pathology
domain: imaging
difficulty: easy
