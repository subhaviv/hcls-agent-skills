id: biomarker-discovery-26
prompt: 'A clinical research team has developed a 12-gene mRNA expression signature
  (genes: FOXM1, TOP2A, AURKA, CCNB1, MKI67, CDK1, BIRC5, CENPF, MYBL2, RRM2, TYMS,
  and CDKN2A) intended to predict 5-year distant metastasis-free survival (DMFS) in
  early-stage ER+/HER2- breast cancer patients. They have a discovery cohort of 340
  patients (87 events) from a single academic center with Affymetrix microarray data,
  and an independent external validation cohort of 210 patients (54 events) from a
  community hospital using RNA-seq.


  The team plans to: (1) fit a Cox proportional hazards model using all 12 genes simultaneously
  in the discovery cohort, (2) report the C-index on the same discovery data as their
  primary performance metric, and (3) apply the model directly to the RNA-seq validation
  cohort after log2 normalization.


  Please identify at least four methodological problems with this plan, explaining
  the statistical or biological consequences of each. Then provide: (a) a corrected
  analysis pipeline using nested cross-validation with bootstrap optimism correction,
  specifying the inner and outer loop structures; (b) R code implementing this corrected
  pipeline using the `survival` and `rms` packages; (c) a recommendation on whether
  time-dependent AUC or C-index is more appropriate here and why; (d) a strategy for
  harmonizing the microarray and RNA-seq data before cross-platform validation, naming
  at least one specific normalization method; and (e) a minimum events-per-variable
  calculation justifying whether 87 events are sufficient for this 12-predictor model.'
target_skills:
- biomarker-discovery
