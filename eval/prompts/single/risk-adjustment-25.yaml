id: risk-adjustment-25
prompt: 'Here is test question #25 of 30:


  ---


  You are building a CMS-HCC risk adjustment pipeline for a Medicare Advantage plan
  with 12,000 members. Your data team has extracted the following Rx proxy signals
  from the pharmacy claims database for members who have **no corresponding ICD-10
  diagnosis codes** documented in the current measurement year:


  | Drug Class | NDC Example | Suspected Condition | Member Count |

  |---|---|---|---|

  | Insulin (long-acting) | 00169-7501 | Diabetes w/ complications (HCC 18) | 340
  |

  | Warfarin | 00056-0173 | Atrial Fibrillation (HCC 96) | 215 |

  | Tacrolimus | 00469-0617 | Organ Transplant (HCC 186) | 88 |

  | Rivastigmine | 00078-0460 | Alzheimer''s / Dementia (HCC 52) | 127 |


  The plan uses CMS-HCC Model V28 with a community non-dual aged population (coefficient
  set applies). Assume an average base RAF of 0.950 for affected members.


  **Deliverables requested:**


  1. Write Python code that ingests this Rx proxy table, maps each drug class to its
  suspected HCC, applies the V28 HCC additive coefficient (use realistic approximate
  values), and calculates the **projected RAF lift per cohort** and **total revenue
  impact** assuming a $950 PMPM benchmark rate.


  2. Implement hierarchy resolution logic in the same script — specifically handle
  the case where a member flagged for both HCC 17 (Diabetes without complications)
  and HCC 18 (Diabetes with complications) should retain only HCC 18.


  3. Produce a prioritized outreach list sorted by individual RAF lift descending,
  and explain which cohort should be targeted first for provider coding gap closure
  and why.'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: intermediate
