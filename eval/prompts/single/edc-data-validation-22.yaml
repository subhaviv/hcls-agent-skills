id: edc-data-validation-22
prompt: 'You are working as a clinical data manager on a Phase II oncology trial (Study
  ONC-2024-07) with 85 enrolled patients. Your EDC system (Medidata Rave) exports
  CSV files for the Vital Signs form and the Adverse Events form. You need to perform
  basic cross-form consistency validation before SDTM mapping.


  The Vital Signs CSV contains columns: USUBJID, VSDAT, VSTESTCD, VSORRES, VSORRESU.
  The Adverse Events CSV contains columns: USUBJID, AESTDAT, AEENDAT, AEDECOD, AESEV.


  Apply the following validation rules:

  1. **Vital signs range checks**: Systolic BP must be 70–200 mmHg, Diastolic BP 40–120
  mmHg, Heart Rate 40–150 bpm, Temperature 35.0–42.0 °C

  2. **AE date consistency**: AEENDAT must not be earlier than AESTDAT; neither date
  should precede the earliest VSDAT for that subject (used as a proxy for first visit
  date)

  3. **Cross-form check**: Any subject with an AE of AESEV = "SEVERE" must have at
  least one vital signs record within ±3 days of AESTDAT


  Please provide:

  - A complete Python script using pandas that loads both CSVs, applies all three
  validation checks, and outputs a prioritized findings report as a DataFrame (with
  columns: USUBJID, CHECK_TYPE, FIELD, ISSUE_DESCRIPTION, PRIORITY where PRIORITY
  is "Critical", "Major", or "Minor")

  - Brief comments in the code explaining each validation block

  - A short summary (3–5 sentences) of how you would triage and resolve the flagged
  issues in a real trial setting'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: easy
