id: cell-type-annotation-26
prompt: 'You have processed a 10x Genomics scRNA-seq dataset from 8 pediatric ALL
  (acute lymphoblastic leukemia) bone marrow samples (4 diagnosis, 4 relapse) containing
  approximately 45,000 cells after QC. Leiden clustering at resolution 0.5 produced
  22 clusters. Initial UMAP visualization shows clear separation between lymphoid
  and myeloid compartments, but several clusters in the lymphoid region appear ambiguous
  — they could represent malignant B-cell precursors, normal B-cell developmental
  stages, or T-cell subpopulations.


  Your task is to implement a **hierarchical annotation strategy** using CellTypist
  with majority voting:


  1. Write Python code to run CellTypist using the `Immune_All_Low.pkl` model followed
  by the `Immune_All_High.pkl` model, applying majority voting at the cluster level
  (stored in `adata.obs[''leiden'']`). Use `over_clustering` parameter appropriately
  and explain when to use it versus standard cluster-level voting.


  2. After automated annotation, several clusters are labeled "Pro-B cells" and "Pre-B
  cells" — write code to generate a dotplot showing expression of canonical B-cell
  development markers: **PAX5, CD19, CD34, DNTT, VPREB1, RAG1, IGLL1, MME** across
  all 22 clusters to validate or refute these labels.


  3. Three clusters receive conflicting labels between the two models (e.g., cluster
  7: "Pro-B cells" vs "HSC/MPP", cluster 12: "Pre-B cells" vs "CLP", cluster 18: "T
  cells" vs "NKT cells"). Write code to extract these clusters and compute a per-cell
  confidence score comparison, then recommend a decision rule for resolving conflicts.


  Provide complete, runnable code with inline comments explaining key parameter choices.'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: intermediate
