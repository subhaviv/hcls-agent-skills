id: quality-measures-20
prompt: 'Here is test question #20 of 30:


  ---


  You are analyzing HEDIS Controlling High Blood Pressure (CBP) measure performance
  for a regional health plan with 847 eligible members in the measurement year 2023.
  Your claims and clinical data reveal the following complications:


  - 312 members have **two or more blood pressure readings** in the measurement year,
  but their most recent reading is from a telehealth visit coded with CPT 99453 (remote
  monitoring setup) rather than a standard office visit

  - 89 members were **continuously enrolled** for 10 out of 12 months but had a 45-day
  gap in coverage during March–April due to a retroactive eligibility reinstatement

  - 156 members have a diagnosis of **Stage 4 CKD (ICD-10 N18.4)** which may qualify
  them for exclusion, but only 71 have a confirmed nephrology encounter in the measurement
  year

  - Blood pressure values are stored inconsistently: some records use `bp_systolic`/`bp_diastolic`
  columns, others embed the reading in a free-text `vitals_note` field formatted as
  "BP: 128/82"


  Please provide: (1) SQL logic to correctly identify the denominator, applying the
  continuous enrollment rule with the retroactive gap scenario; (2) numerator logic
  that handles the telehealth BP reading edge case per HEDIS technical specifications;
  (3) exclusion criteria SQL for the CKD Stage 4 population with the encounter requirement;
  (4) a parsing approach for extracting BP values from the free-text `vitals_note`
  field using regex; and (5) a brief analysis of how each edge case affects the final
  CBP measure rate, with estimated rate impact given the member counts above.'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: hard
