id: molecular-docking-14
prompt: 'You are setting up a structure-based virtual screening campaign against the
  kinase domain of a fictional target protein **MAPK17** (PDB ID: 7XKP, resolution:
  2.1 Å). The crystal structure contains a co-crystallized inhibitor **LIG-441** in
  the ATP-binding pocket. Your ligand library contains 8,500 compounds in SDF format
  sourced from a commercial vendor, with a mix of neutral and ionizable molecules
  (estimated 30% having titratable groups at physiological pH).


  Before launching the full campaign, your team wants to validate the docking setup
  using redocking of LIG-441. Initial redocking attempts yielded an RMSD of 2.8 Å
  against the crystal pose, which exceeds your acceptance threshold of 2.0 Å.


  The grid box was initially defined as: center_x=14.2, center_y=−8.7, center_z=22.1
  with dimensions 20×20×20 Å, exhaustiveness=8.


  Please provide:


  1. **Diagnosis**: List at least three specific factors that could explain the poor
  redocking RMSD of 2.8 Å, referencing preparation steps, grid parameters, or Vina
  settings.


  2. **Revised protocol**: Provide corrected AutoDock Vina configuration parameters
  (config file format) with justified changes to grid box dimensions and exhaustiveness.


  3. **Ligand preparation pipeline**: Write a shell script using either `meeko` or
  `obabel` that handles the 8,500-compound library, including protonation state generation
  at pH 7.4, tautomer handling, and conversion to PDBQT format.


  4. **Validation criteria**: Define quantitative pass/fail thresholds for redocking
  RMSD and top-pose Vina score that should be met before proceeding to the full virtual
  screening campaign.'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: intermediate
