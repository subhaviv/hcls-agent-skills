id: ehr-data-parsing-28
prompt: 'You are building a clinical data pipeline that processes HL7v2 ORU^R01 messages
  containing lab results for a cardiology department. The messages include non-standard
  local extensions where the sending system (Epic) embeds JSON-encoded structured
  data in OBX-5 when OBX-2 is "ST" and the observation identifier (OBX-3.1) begins
  with "LOCAL-". Additionally, some messages contain repeat OBX segments for the same
  LOINC code (e.g., 2160-0 for serum creatinine) representing serial measurements
  taken minutes apart — but only the last occurrence should be retained per encounter.


  Given the following constraints:

  - Messages may have malformed MSH segments where MSH-9 (message type) is missing
  the trigger event component

  - Patient MRN in PID-3 may appear in multiple repetitions; only the repetition with
  assigning authority "EPIC" should be used

  - OBX-14 (date/time of observation) sometimes contains only a date (YYYYMMDD) without
  time, which must be normalized to midnight UTC


  Deliver the following:


  1. A Python class `ORUParser` using the `hl7` library that handles all edge cases
  above, including the JSON extraction from ST-typed LOCAL- observations and deduplication
  logic for repeat LOINC measurements


  2. A method `to_dataframe()` that returns a pandas DataFrame with columns: `mrn`,
  `encounter_id` (from PV1-19), `loinc_code`, `value`, `units`, `observation_datetime`
  (UTC-normalized), `local_payload` (dict or None)


  3. A quality check function `validate_extract(df)` that flags rows where `observation_datetime`
  is more than 48 hours before the message timestamp (MSH-7), where `value` is non-numeric
  for known quantitative LOINCs (provide a hardcoded set of 5 cardiac LOINCs), and
  where `local_payload` JSON failed to parse'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: hard
