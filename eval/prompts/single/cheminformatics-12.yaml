id: cheminformatics-12
prompt: 'Here is test question #12 of 30:


  ---


  You are working with a small virtual screening hit list of 5 compounds represented
  as SMILES strings. Your goal is to apply standard druglikeness filters before progressing
  to experimental assays.


  **Compound Library:**

  | ID | SMILES |

  |----|--------|

  | CPD-001 | CC(C)Cc1ccc(cc1)C(C)C(=O)O |

  | CPD-002 | COc1ccc2cc(ccc2c1)C(C)N |

  | CPD-003 | CC1=C(C(=O)Nc2ccccc2)C(c2ccccc2Cl)NC(=O)c2cccc(n2)C(F)(F)F |

  | CPD-004 | CCCCCCCCCCCCCCC(=O)O |

  | CPD-005 | c1ccc2c(c1)c(cc(=O)o2)N1CCOCC1 |


  **Task Requirements:**


  1. **Write Python code using RDKit** to compute the following Lipinski Rule of Five
  descriptors for each compound: molecular weight (MW), calculated LogP (CLogP), number
  of hydrogen bond donors (HBD), and number of hydrogen bond acceptors (HBA).


  2. **Apply Lipinski''s Rule of Five** — flag any compound that violates one or more
  rules (MW ≤ 500, CLogP ≤ 5, HBD ≤ 5, HBA ≤ 10). Clearly state which specific rules
  each flagged compound violates.


  3. **Additionally apply Veber''s oral bioavailability rules** (rotatable bonds ≤
  10, TPSA ≤ 140 Ų) — include these descriptors in your code and flag any additional
  failures.


  4. **Provide a ranked shortlist** of compounds that pass all filters, and briefly
  explain (1–2 sentences each) why any failing compounds should be deprioritized.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: easy
