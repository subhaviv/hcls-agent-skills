id: digital-pathology-25
prompt: 'You are building a weakly-supervised multiple instance learning (MIL) pipeline
  for predicting microsatellite instability (MSI) status from H&E-stained colorectal
  cancer whole-slide images. Your dataset consists of 847 slides (512 MSI-High, 335
  MSS) from three different scanners: Aperio GT450 (SVS format, 0.26 mpp), Hamamatsu
  NanoZoomer (NDPI format, 0.23 mpp), and Leica GT450 DFC (SVS format, 0.25 mpp).
  You plan to use H-optimus-0 as your feature extractor and ABMIL (Attention-Based
  MIL) as your aggregator.


  You are concerned about scanner-induced batch effects confounding your model. Your
  preprocessing pipeline must normalize all slides to a consistent resolution of 0.5
  mpp before patch extraction, and you want to apply Macenko stain normalization using
  a reference slide from the Aperio scanner.


  Please provide:


  1. A complete TIAToolbox-based Python function `extract_normalized_features()` that
  accepts a slide path, target mpp (0.5), a stain normalizer object, and a tissue
  mask threshold (0.8), performs tissue segmentation, extracts 256×256 patches at
  the target mpp, applies stain normalization, and returns H-optimus-0 embeddings
  as a NumPy array with shape `(N, 1536)`.


  2. A PyTorch implementation of the ABMIL aggregator class with gated attention,
  accepting variable-length bags of embeddings with input dimension 1536, hidden dimension
  256, and outputting a slide-level binary prediction with attention weights.


  3. A brief explanation (4-6 sentences) of how you would detect and mitigate scanner
  batch effects in this multi-scanner setting, specifically mentioning which statistical
  test you would use to quantify feature distribution shift across scanners before
  model training.'
target_skills:
- digital-pathology
domain: imaging
difficulty: intermediate
