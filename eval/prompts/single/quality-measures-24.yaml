id: quality-measures-24
prompt: 'Here is test question #24 of 30:


  ---


  You are a healthcare data analyst supporting a regional health plan with 85,000
  covered lives. Your medical director wants to evaluate performance on the **Diabetes
  Care — HbA1c Poor Control (CDC) HEDIS measure** for the current measurement year
  (January 1 – December 31, 2024).


  Your claims database contains the following relevant tables:

  - `enrollment` (member_id, start_date, end_date, plan_type)

  - `medical_claims` (claim_id, member_id, service_date, diagnosis_codes[], procedure_codes[],
  place_of_service)

  - `lab_results` (member_id, test_date, loinc_code, result_value, result_unit)

  - `pharmacy_claims` (member_id, fill_date, ndc_code, days_supply, quantity)


  **Known parameters:**

  - Eligible population: members aged 18–75 with Type 1 or Type 2 diabetes

  - Continuous enrollment requirement: enrolled for 11 of 12 months, with no more
  than one 45-day gap

  - Poor control threshold: most recent HbA1c result > 9.0% during the measurement
  year

  - Relevant LOINC for HbA1c: 4548-4, 4549-2, 17856-6

  - Your plan currently has 4,200 members flagged as diabetic; preliminary data suggests
  ~31% poor control rate


  Please provide:

  1. A SQL query implementing the full denominator logic (continuous enrollment +
  diabetes diagnosis identification using ICD-10 codes E11.x and E10.x)

  2. A SQL query for the numerator identifying members with HbA1c > 9.0% using the
  most recent qualifying lab result

  3. The calculated measure rate and interpretation of whether 31% is above or below
  the NCQA 90th percentile benchmark of 22%

  4. Two actionable care gap intervention recommendations targeting the poorly controlled
  population'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: intermediate
