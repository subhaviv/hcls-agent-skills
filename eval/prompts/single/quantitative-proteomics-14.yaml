id: quantitative-proteomics-14
prompt: 'You are analyzing a TMT-16plex proteomics dataset from a clinical study comparing
  treatment responders (n=8) vs non-responders (n=8) in colorectal cancer patients.
  After running MaxQuant, your `proteinGroups.txt` contains 6,847 protein groups.
  You notice the following issues in your data:


  1. The reporter ion intensity distributions across channels show a systematic shift,
  with channels 9-16 (non-responders) consistently ~23% lower than channels 1-8 (responders)

  2. Approximately 31% of protein groups have at least one missing value across channels

  3. A known housekeeping protein (GAPDH) shows a 1.8-fold difference between groups,
  which you believe is artifactual


  Your colleague suggests simply log2-transforming and applying quantile normalization
  before running limma, but you are concerned this approach may be inappropriate given
  the specific characteristics of your data.


  **Provide the following:**


  1. Diagnose the likely technical cause of the systematic channel shift and explain
  why quantile normalization may be inappropriate here compared to a reference-channel
  or median-centering approach

  2. Propose a complete normalization strategy that accounts for the housekeeping
  protein evidence, specifying the exact normalization steps in order

  3. For the 31% missing values, classify likely MNAR vs MAR missingness in TMT data
  and recommend appropriate imputation methods for each type

  4. Write R code implementing your recommended normalization pipeline using the `limma`
  and `MSnbase` packages, starting from a matrix called `tmt_intensities` (rows =
  proteins, columns = 16 TMT channels)'
