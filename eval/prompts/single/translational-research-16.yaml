id: translational-research-16
prompt: 'A biotech company has completed a 24-month natural history study in 312 patients
  with KCNQ3-associated developmental epileptic encephalopathy (DEE). They now have
  a candidate small molecule (VX-7741) that potentiates KCNQ3 channel activity in
  vitro (EC50 = 340 nM, ~3.5-fold increase in current amplitude). Preclinical data
  show 68% seizure frequency reduction in a Kcnq3-R230C knock-in mouse model at 30
  mg/kg BID, with target engagement confirmed by ex vivo patch-clamp. The natural
  history cohort showed mean baseline seizure frequency of 18.4 seizures/week (SD
  = 11.2), with high inter-patient variability driven partly by co-occurring GRIN2A
  variants (present in ~22% of the cohort).


  The team is debating whether to advance directly to a Phase 2b efficacy trial or
  insert an intermediate Phase 2a proof-of-mechanism (POM) study first. They have
  access to EEG biomarkers (interictal epileptiform discharge rate, high-frequency
  oscillations), a validated caregiver-reported seizure diary, and exploratory CSF
  KCNQ3 protein levels from 28 patients.


  Please provide:

  1. A structured go/no-go framework assessing readiness to advance, identifying the
  two most critical translational gaps

  2. A recommended Phase 2a POM study design (n, duration, primary POM endpoint, key
  secondary endpoints) that could de-risk the Phase 2b decision

  3. A biomarker qualification strategy for the EEG-based endpoints, specifying context
  of use and the minimum evidence package required

  4. A stratification/enrichment recommendation addressing the GRIN2A comorbidity
  subgroup and its impact on trial interpretation'
target_skills:
- translational-research
domain: cross-domain
difficulty: intermediate
