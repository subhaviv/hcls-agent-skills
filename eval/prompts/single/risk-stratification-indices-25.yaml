id: risk-stratification-indices-25
prompt: 'A regional health system is preparing to launch a care management program
  targeting high-risk patients for 30-day readmission prevention. Their analytics
  team has extracted the following cohort characteristics from their EHR for the past
  12 months:


  - Total discharged patients: 8,400

  - Mean LACE score: 9.2 (SD: 2.8)

  - Mean Charlson Comorbidity Index: 3.1 (SD: 1.9)

  - 30-day readmission rate: 14.3%

  - Z-code documentation rate: 22% of patients have at least one SDOH Z-code

  - Area Deprivation Index (ADI) data available for 91% of patients; 38% fall in ADI
  deciles 8–10 (high deprivation)


  The care management team can realistically enroll only 600 patients per quarter.
  Leadership wants to prioritize patients who are both clinically complex and socially
  vulnerable, but the analytics team is debating whether to use LACE alone, Charlson
  alone, or a composite approach.


  Please provide:

  1. A structured comparison of LACE vs. Charlson CCI for this specific use case (readmission
  prevention vs. comorbidity burden characterization), including which index better
  aligns with the program goal and why.

  2. A recommended composite risk stratification methodology that integrates LACE
  or CCI scores with ADI deciles and Z-code presence, including explicit weighting
  rationale.

  3. A SQL-style pseudocode query that would flag the top 600 quarterly enrollees
  using your recommended composite approach, assuming a patient table with fields:
  `patient_id`, `lace_score`, `cci_score`, `adi_decile`, `z_code_count`, `discharge_date`.

  4. A brief discussion of one key validity concern when combining clinical indices
  with SDOH variables in this composite scoring approach.'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: intermediate
