id: risk-stratification-indices-10
prompt: 'A regional health system is building a 30-day readmission risk model for
  their Medicare Advantage population (n=12,400 patients) and must choose between
  LACE+ and the Elixhauser Comorbidity Index as their primary stratification framework.
  Their data team has extracted the following summary statistics from the prior 12
  months: mean LACE+ score of 10.2 (SD=3.1), 30-day readmission rate of 14.7%, and
  Elixhauser scores ranging from -2 to 31 across the cohort. Notably, 23% of patients
  have 5+ comorbidities, 31% have documented SDOH Z-codes (primarily Z59.1 inadequate
  housing and Z60.2 social isolation), and the ADI national percentile for the primary
  service area averages 78 (range 52–99).


  The care management team wants to use the chosen index to tier patients into three
  intervention buckets: intensive case management, transitional care calls only, and
  no outreach. They are also concerned that neither index adequately captures SDOH
  burden in their population.


  Please provide:

  1. A comparative analysis of LACE+ vs. Elixhauser for this specific use case, including
  known limitations of each in high-comorbidity Medicare populations

  2. A concrete recommendation with justification for which index (or hybrid approach)
  to use, given the SDOH burden and ADI distribution

  3. A proposed scoring algorithm (in pseudocode or structured logic) that integrates
  Elixhauser or LACE+ with ADI percentile and Z-code count to produce a composite
  risk tier

  4. Suggested cut-points for the three intervention tiers based on the provided cohort
  statistics, with rationale for avoiding over-triage of the intensive tier given
  resource constraints'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: hard
