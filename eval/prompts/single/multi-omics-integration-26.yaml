id: multi-omics-integration-26
prompt: 'You are conducting a multi-omics study of treatment resistance in 847 ovarian
  cancer patients enrolled across three clinical sites (Site A: n=312, Site B: n=289,
  Site C: n=246). Each patient has bulk RNA-seq transcriptomics and RPPA (reverse
  phase protein array) proteomics data, but only 431 patients have all three layers
  including DNA methylation (850K EPIC array). The goal is to identify multi-omic
  signatures distinguishing platinum-sensitive (n=503) from platinum-resistant (n=344)
  patients.


  You suspect strong batch effects because RPPA was run in two separate batches (Batch
  1: Sites A+B, Batch 2: Site C), while RNA-seq and methylation were processed uniformly.
  Initial PCA of RPPA data shows PC1 explaining 34% of variance aligns perfectly with
  batch rather than biology.


  Please provide:


  1. A recommended integration strategy (early, intermediate, or late fusion) given
  the partial sample overlap and the RPPA batch confounding, with explicit justification
  for why you would or would not use MOFA+ versus SNF in this scenario.


  2. A step-by-step batch correction workflow specifically for the RPPA layer before
  integration, including which algorithm to apply (ComBat, limma removeBatchEffect,
  or RUV), and why, given that treatment response is partially confounded with site
  (Site C has 67% platinum-resistant patients versus 41% at Sites A+B).


  3. Python or R pseudocode (minimum 15 lines) implementing your chosen integration
  approach, handling the missing third omic layer for the 416 patients lacking methylation
  data.


  4. A strategy for interpreting the resulting multi-omic factors or clusters in terms
  of biological pathway enrichment, specifying which databases and statistical thresholds
  you would use.'
target_skills:
