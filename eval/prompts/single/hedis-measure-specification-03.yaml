id: hedis-measure-specification-03
prompt: 'A regional health plan is preparing for HEDIS measurement year 2024 and needs
  to evaluate their Controlling High Blood Pressure (CBP) measure performance. Their
  data team has pulled the following member snapshot:


  - Total members aged 18–85 with a hypertension diagnosis: 12,400

  - Members with continuous enrollment (11 of 12 months): 10,950

  - Members with one 45-day gap in coverage: 1,200

  - Members with two separate gaps totaling 60 days: 250

  - Members with an ESRD diagnosis: 380

  - Members with a pregnancy diagnosis during the measurement year: 145

  - Members with both ESRD and hypertension: 310 (subset of the 380)

  - Members with a valid blood pressure reading ≤139/89 on file: 6,800 (from the enrolled
  population before exclusions)


  Using HEDIS 2024 CBP measure specifications, please provide:


  1. A step-by-step calculation of the eligible denominator, clearly identifying which
  member groups qualify under continuous enrollment rules and which are excluded,
  with final denominator count.

  2. A determination of which exclusion criteria apply from the data above and how
  they reduce the denominator.

  3. A numerator calculation showing the compliant member count, assuming the 6,800
  members with controlled BP are distributed proportionally across eligible groups.

  4. The final CBP measure rate as a percentage, rounded to two decimal places.

  5. A brief explanation of why the "one 45-day gap" group is treated differently
  from the "two separate gaps" group under NCQA continuous enrollment rules.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: easy
