id: pharmacoepidemiology-12
prompt: 'A health system researcher wants to study whether metformin use reduces the
  risk of colorectal cancer compared to sulfonylureas among patients with newly diagnosed
  type 2 diabetes using electronic health records from 2010–2022 (n = 48,500 patients).


  The researcher plans to identify all patients with a new type 2 diabetes diagnosis
  and a first prescription for either metformin (n = 35,200) or a sulfonylurea (n
  = 13,300) within 90 days of diagnosis. Follow-up begins at the first prescription
  fill date and continues until colorectal cancer diagnosis, death, disenrollment,
  or end of study.


  Please provide the following:


  1. **Cohort definition**: Explain why this setup qualifies as an active comparator
  new-user design and what specific inclusion/exclusion criteria should be applied
  (including an appropriate washout period and its recommended length).


  2. **Bias identification**: Identify two specific biases this design is intended
  to prevent compared to a naïve prevalent-user design with a no-treatment comparator,
  and briefly explain the mechanism by which each bias is avoided.


  3. **Propensity score approach**: Recommend whether propensity score matching, inverse
  probability of treatment weighting (IPTW), or stratification is most appropriate
  for this study, given the sample size imbalance (35,200 vs. 13,300), and justify
  your choice with reference to estimand (ATT vs. ATE) considerations.


  4. **Confounding variables**: List five clinically meaningful covariates that must
  be included in the propensity score model for this specific comparison, explaining
  why each is relevant to both treatment selection and colorectal cancer risk.'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: easy
