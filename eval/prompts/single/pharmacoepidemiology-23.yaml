id: pharmacoepidemiology-23
prompt: 'A health system researcher wants to study whether new use of metformin reduces
  the risk of colorectal cancer compared to new use of sulfonylureas among patients
  with type 2 diabetes, using 5 years of electronic health records (EHR) data containing
  48,000 patients newly initiating either metformin (n=36,000) or a sulfonylurea (n=12,000).


  The researcher is considering three propensity score approaches: 1:1 nearest-neighbor
  matching, inverse probability of treatment weighting (IPTW) with stabilized weights,
  and propensity score stratification into quintiles. The propensity score model includes
  age, sex, BMI, HbA1c at initiation, prior colonoscopy, smoking status, and Charlson
  Comorbidity Index.


  Please provide the following:


  1. **Recommend** which propensity score method is most appropriate for this specific
  scenario given the sample size imbalance (3:1 ratio) and explain why the other two
  methods are less suitable.


  2. **Explain** what stabilized weights are, how they are calculated, and what weight
  range (e.g., 1st–99th percentile) would be considered acceptable before truncation
  is needed.


  3. **Identify** two potential sources of bias specific to this cancer outcome study
  (e.g., related to outcome latency or healthcare utilization differences between
  drug groups) and explain how each would affect the estimated hazard ratio.


  4. **Describe** how you would use a negative control outcome to assess residual
  confounding in this study, providing one specific example of an appropriate negative
  control outcome for this drug-cancer comparison.'
