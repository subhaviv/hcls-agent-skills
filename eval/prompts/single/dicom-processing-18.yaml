id: dicom-processing-18
prompt: 'You are processing a large neuroimaging dataset of 847 subjects for a multi-site
  BIDS-compliant study. Each subject has a 3D T1-weighted MPRAGE sequence acquired
  on either a Siemens Prisma (Site A, 312 subjects) or GE Discovery MR750 (Site B,
  535 subjects). When running dcm2niix (v1.0.20230411) on the GE data, you encounter
  two critical issues:


  **Issue 1:** Approximately 23% of GE series produce duplicate NIfTI outputs with
  suffixes `_e1` and `_e2`, suggesting dcm2niix is detecting multiple echo times even
  though these are single-echo acquisitions. Inspection of DICOM headers reveals `EchoNumbers`
  (0020,0013) alternates between 1 and 2 across slices within the same series, and
  `EchoTime` (0018,0081) is consistently 2.98ms throughout.


  **Issue 2:** The Siemens data converts correctly, but 18 subjects have NIfTI files
  where the sform and qform codes are both set to 0 in the nibabel-readable header,
  causing downstream FreeSurfer `recon-all` to fail with orientation errors.


  Please provide:

  1. A technical explanation of why each issue occurs at the DICOM protocol/header
  level

  2. A Python script using pydicom that identifies and corrects the problematic `EchoNumbers`
  tag in the GE DICOMs before conversion, writing corrected files to a staging directory

  3. A nibabel-based script that detects NIfTI files with invalid form codes and applies
  a correction using the affine matrix, with appropriate validation

  4. Recommendations for dcm2niix flags or configuration changes to prevent Issue
  1 in future acquisitions

  5. A quality control check to verify BIDS compliance after conversion using a method
  that catches both issues'
target_skills:
- dicom-processing
domain: imaging
difficulty: hard
