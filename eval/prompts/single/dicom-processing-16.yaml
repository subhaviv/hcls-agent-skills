id: dicom-processing-16
prompt: 'You are a neuroimaging researcher preparing a multi-site fMRI dataset for
  BIDS submission. Your scanner at Site A (Siemens Prisma 3T) exports DICOM files
  organized in a single flat directory containing 1,847 files from 12 different series
  belonging to 3 subjects. The series include T1w anatomicals, resting-state fMRI
  runs, and field maps. You need to convert this entire dataset to NIfTI format using
  dcm2niix while ensuring proper BIDS-compliant output structure.


  During a test conversion, you noticed the following issues:

  - Some DICOM files have `ImageType` tag (0008,0008) containing "DERIVED\\PRIMARY\\MOSAIC",
  indicating Siemens mosaic-encoded EPI data

  - Two series share identical `SeriesDescription` values ("rsfMRI") but have different
  `SeriesInstanceUID` values, corresponding to two separate runs for Subject 003

  - The output JSON sidecar for one field map series is missing the `IntendedFor`
  field

  - dcm2niix is producing a file named `%n_%p_%s` but you need BIDS-compliant naming
  like `sub-001_task-rest_run-01_bold`


  Your deliverables:

  1. Write the complete dcm2niix command with appropriate flags to handle mosaic unpacking,
  generate BIDS-compatible JSON sidecars, and organize output by subject/series

  2. Provide a Python script using `pydicom` to pre-sort the flat DICOM directory
  into per-series subdirectories based on `SeriesInstanceUID` before conversion

  3. Explain how dcm2niix handles Siemens mosaic EPI data and what the `-m` flag controls

  4. Provide a post-conversion Python snippet to programmatically add the `IntendedFor`
  field to the field map JSON sidecar'
target_skills:
- dicom-processing
domain: imaging
difficulty: intermediate
