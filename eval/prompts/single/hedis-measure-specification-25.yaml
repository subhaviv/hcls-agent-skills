id: hedis-measure-specification-25
prompt: 'A regional health plan is preparing for HEDIS MY2024 data submission and
  needs to evaluate performance on the **Controlling High Blood Pressure (CBP)** measure
  across a population of 8,400 eligible members. The quality analytics team has identified
  the following breakdown:


  - 6,200 members have a confirmed hypertension diagnosis with at least one blood
  pressure reading on record

  - 1,400 members have a hypertension diagnosis but **no BP reading** documented in
  the measurement year

  - 800 members have a hypertension diagnosis but BP readings only from **telehealth
  visits** conducted via audio-only (phone) encounters


  Additionally, the plan has flagged 320 members who were enrolled for only **9 of
  the 12 months** in the measurement year due to a gap in coverage between March 15
  and June 8.


  The team also wants to understand how CBP performance affects **CMS Star Ratings**,
  given that CBP is a triple-weighted measure in the 2024 Star Rating methodology.


  **Please provide:**

  1. A clear explanation of the CBP measure''s denominator, numerator, and exclusion
  criteria under HEDIS MY2024 specifications

  2. An analysis of whether the 800 audio-only telehealth BP readings are numerator-compliant,
  citing the relevant NCQA guidance

  3. A determination of whether the 320 members with the coverage gap meet continuous
  enrollment requirements, showing your calculation of the allowable gap

  4. A prioritization recommendation for closing care gaps among the 1,400 members
  with no BP reading, considering both Star Rating impact and common SDOH barriers

  5. A simple Python snippet that calculates the plan''s current CBP compliance rate
  and projects the Star Rating point impact if the 1,400 no-reading members achieve
  numerator compliance at a 60% success rate'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: intermediate
