id: multi-omics-integration-14
prompt: 'You are analyzing a cohort of 156 pediatric acute lymphoblastic leukemia
  (ALL) patients with three omics layers collected at diagnosis: RNA-seq (156/156
  samples), ATAC-seq chromatin accessibility (112/156 samples), and targeted metabolomics
  via LC-MS (89/156 samples). The metabolomics data was collected across two batches
  (Batch A: n=47, Batch B: n=42) using different instrument calibrations, and preliminary
  PCA shows a clear batch effect explaining 31% of variance in PC2.


  You want to identify multi-omic disease subtypes and link chromatin accessibility
  changes to transcriptional programs and metabolic rewiring.


  Please provide:


  1. **Integration strategy recommendation**: Justify whether early, intermediate,
  or late integration is most appropriate given the partial sample overlap pattern
  (all three layers: n=89; RNA+ATAC only: n=23; RNA only: n=44).


  2. **Batch correction plan**: Describe how to handle the metabolomics batch effect
  before integration, specifying whether to use ComBat, limma::removeBatchEffect,
  or a method that preserves biological variance, and why.


  3. **Method selection**: Compare MOFA+ versus SNF (Similarity Network Fusion) for
  this specific dataset structure, including how each handles missing views, and recommend
  one with justification.


  4. **Implementation outline**: Provide pseudocode or R/Python code skeleton configuring
  MOFA+ for this dataset, including how to specify the missing sample groups, set
  the number of factors (suggest a starting value), and enable ARD (Automatic Relevance
  Determination) priors.


  5. **Downstream interpretation**: Describe how you would identify which MOFA+ factors
  are metabolomics-driven versus chromatin-driven, and propose one enrichment strategy
  for the top weighted genes in a transcriptomics-dominant factor.'
target_skills:
- multi-omics-integration
domain: multi-omics
difficulty: intermediate
