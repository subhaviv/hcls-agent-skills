id: multi-omics-pipeline-16
prompt: 'You are integrating transcriptomic (RNA-seq) and proteomic (TMT mass spectrometry)
  data from a cohort of 87 colorectal cancer patients (45 microsatellite-stable, 42
  microsatellite-instable) collected across three clinical sites. The RNA-seq data
  uses Ensembl gene IDs (GRCh38.p13), while the proteomic data uses UniProt accession
  numbers. After initial QC, you have 18,432 genes and 6,891 proteins, with an estimated
  overlap of ~5,200 features once IDs are harmonized.


  You suspect batch effects exist across the three sites in both omics layers. After
  harmonization and batch correction, you plan to run MOFA2 to identify latent factors
  driving variation, followed by clusterProfiler over-representation analysis on the
  top factor loadings.


  Please provide the following:


  1. **R code** using `biomaRt` to map Ensembl IDs to HGNC symbols and UniProt accessions,
  handling one-to-many mappings by retaining only reviewed Swiss-Prot entries and
  preferring the canonical isoform.


  2. **R code** applying `ComBat` (for RNA-seq log-normalized counts) and `ComBat-seq`
  (for raw counts) to correct for site batch effects, preserving MSI status as a biological
  covariate. Explain when you would choose one over the other.


  3. **R code** to configure and run a MOFA2 model on the harmonized two-omics dataset
  with 15 factors, using default convergence criteria but setting `spikeslab_weights
  = TRUE` for sparse solutions.


  4. For the top 3 factors by explained variance, describe how you would extract feature
  weights, define a gene set from the top 200 loadings, and run `clusterProfiler::enrichGO`
  with appropriate universe definition.'
target_skills:
- multi-omics-pipeline
domain: multi-omics
difficulty: intermediate
