id: drug-repurposing-25
prompt: 'A rare pediatric neurological disorder called Synaptopathic Encephalopathy
  Type-3 (SET-3) has been linked to loss-of-function variants in the SHANK3 and NLGN1
  genes, resulting in disrupted glutamatergic synapse scaffolding. A cohort of 47
  pediatric patients (ages 3–12) shows progressive cognitive decline and seizure phenotypes.
  No approved therapies exist. Your team wants to pursue target-based drug repurposing
  using DGIdb and OpenTargets.


  **Your tasks:**


  1. **Target prioritization**: Using SHANK3 and NLGN1 as anchors, describe how you
  would query OpenTargets to identify associated druggable targets within the same
  synaptic pathway. Specify which data sources (genetic associations, pathways, mouse
  models) you would weight most heavily and why.


  2. **Candidate identification**: From DGIdb, outline a query strategy to retrieve
  approved drugs interacting with your prioritized targets. Write a Python pseudocode
  snippet (using the DGIdb GraphQL API) that fetches drug-gene interactions filtered
  by interaction type = "inhibitor" or "activator" and drug approval status = "approved."


  3. **Mechanism-of-action overlap analysis**: Two candidates emerge — **D-cycloserine**
  (partial NMDA receptor agonist) and **arbaclofen** (GABA-B agonist). Compare their
  mechanism-of-action overlap with the SET-3 disease pathway. Which is better aligned
  and why?


  4. **Translatability assessment**: Given the pediatric population (ages 3–12, n=47),
  identify at least three specific clinical translatability concerns for the leading
  candidate and propose how each could be addressed in a Phase 2 trial design.'
target_skills:
- drug-repurposing
