id: drug-repurposing-17
prompt: 'Here is test question #17 of 30:


  ---


  You are evaluating **metformin** as a repurposing candidate for **idiopathic pulmonary
  fibrosis (IPF)**, a progressive fibrotic lung disease with limited treatment options.
  Your team has generated the following preliminary data from a small retrospective
  cohort:


  - 847 IPF patients on metformin (for type 2 diabetes comorbidity) showed 23% slower
  FVC decline over 24 months vs. 1,203 IPF patients not on metformin (p = 0.031, adjusted
  for age, smoking, and baseline FVC)

  - RNA-seq from IPF lung tissue shows upregulation of **TGFB1**, **ACTA2**, **COL1A1**,
  and **MTOR** (all log2FC > 1.5, FDR < 0.05)

  - Metformin''s known targets include **AMPK activation** (via PRKAA1/PRKAA2), **mTOR
  inhibition**, and **mitochondrial complex I inhibition**


  Please provide the following:


  1. **Mechanism-of-action overlap analysis**: Map metformin''s known molecular targets
  to the IPF gene expression signature and evaluate the biological plausibility of
  the observed clinical effect

  2. **Evidence hierarchy ranking**: Using a structured repurposing evidence framework,
  score this candidate across preclinical, clinical, and mechanistic evidence tiers
  (assign numerical scores with justification)

  3. **Database query strategy**: Describe specific queries you would run in DGIdb
  and OpenTargets to strengthen or refute this repurposing hypothesis, including exact
  filter parameters and what outputs you would prioritize

  4. **Translatability assessment**: Identify the top 3 barriers to clinical translation
  and propose study design elements for a Phase II proof-of-concept trial (n, endpoints,
  biomarkers)'
target_skills:
- drug-repurposing
domain: drug-discovery
difficulty: intermediate
