id: edc-data-validation-11
prompt: 'Here is test question #11 of 30:


  ---


  You are working as a clinical data manager on a Phase II oncology trial with 85
  enrolled patients. Your team has just received a raw CSV export from Medidata Rave
  containing vital signs data across three visits (Screening, Week 4, Week 8). The
  export file includes the following columns: `USUBJID`, `VISIT`, `VSTEST` (test name),
  `VSORRES` (original result as string), `VSORRESU` (original unit), `VSDTC` (date
  of collection in ISO 8601 format).


  You need to perform automated range checks on the following vital signs using protocol-defined
  normal ranges:

  - Systolic Blood Pressure: 70–200 mmHg

  - Diastolic Blood Pressure: 40–120 mmHg

  - Heart Rate: 40–120 bpm

  - Body Temperature: 35.0–41.0 °C (some values may be reported in °F and need conversion)

  - Respiratory Rate: 8–30 breaths/min


  The dataset contains known issues: some `VSORRES` fields contain non-numeric strings
  like "not done" or "---", some temperature values are in °F, and some `VSDTC` values
  are partial dates (e.g., `"2023-06"`).


  Please provide:

  1. A Python function that loads the CSV, cleans and converts the data (including
  °F to °C conversion and partial date handling), and applies all five range checks

  2. A summary output showing, per visit and per vital sign, how many values are out-of-range,
  missing/unparseable, or valid

  3. A list of at least three additional cross-form consistency checks you would recommend
  implementing for this dataset'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: easy
