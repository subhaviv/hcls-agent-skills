id: molecular-docking-26
prompt: 'You are preparing a structure-based virtual screening campaign targeting
  the allosteric site of KRASG12C (PDB: 6OIM) to identify covalent fragment hits from
  a library of 2,847 acrylamide-containing compounds. During validation, you performed
  redocking of the co-crystallized covalent inhibitor AMG-510 (sotorasib) and obtained
  an RMSD of 3.8 Å compared to the crystal pose, which is above the acceptable 2.0
  Å threshold.


  Your current setup uses the following parameters:

  - Grid box center: x=−3.2, y=18.7, z=−1.4 (Å)

  - Grid box dimensions: 15×15×15 Å³

  - Exhaustiveness: 8

  - AutoDock Vina 1.1.2


  The receptor was prepared using AutoDockTools (prepare_receptor4.py) and ligands
  were converted using OpenBabel with the `--gen3d` flag. The co-crystallized ligand
  was extracted from the PDB file and minimized using MMFF94 force field before redocking.


  **Please provide:**

  1. A systematic diagnosis of the three most likely causes for the poor redocking
  RMSD, ranked by probability, with specific reasoning for each

  2. Concrete fixes for each identified issue, including corrected grid box parameters
  if repositioning is needed (the allosteric Switch-II pocket center coordinates in
  6OIM are approximately x=−3.2, y=18.7, z=−1.4 Å with the covalent ligand spanning
  ~22 Å in its longest dimension)

  3. A revised preparation workflow using Meeko instead of OpenBabel, including the
  exact command-line sequence for both receptor and ligand preparation

  4. The minimum exhaustiveness value recommended for a 22 Å ligand in a covalent
  docking context and justification'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: intermediate
