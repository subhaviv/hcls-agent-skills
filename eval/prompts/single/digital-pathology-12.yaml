id: digital-pathology-12
prompt: 'Here is test question #12 of 30:


  ---


  You are working with a cohort of 847 colorectal cancer whole-slide images in SVS
  format stored on a local SSD. Each slide was scanned at 40× (0.25 mpp). You need
  to extract tissue patches and generate feature embeddings using the H-optimus-0
  foundation model via TIAToolbox for a downstream multiple-instance learning (MIL)
  classification task predicting microsatellite instability (MSI) status.


  **Your specific requirements:**


  1. Slides must be processed at **0.5 mpp** (20× equivalent) using **256×256 pixel
  patches** with **no overlap**.

  2. Tissue must be segmented using TIAToolbox''s built-in tissue masker with a **minimum
  tissue coverage threshold of 0.75** per patch.

  3. Embeddings should be saved as individual `.pt` files (one per slide) containing
  a tensor of shape `[N, 1536]` where N is the number of valid patches.

  4. Any slide with fewer than **50 valid patches** after tissue filtering should
  be logged to a file called `excluded_slides.txt` and skipped.


  Please provide:

  - A complete, runnable Python script using TIAToolbox and the H-optimus-0 model
  that implements all four requirements above

  - A brief explanation of how H-optimus-0''s expected input normalization (mean and
  std values) should be handled in the preprocessing transform pipeline

  - The expected output directory structure for storing the `.pt` embedding files


  Assume H-optimus-0 is available via `torch.hub.load("bioptimus/H-optimus-0", "hoptimus0",
  pretrained=True)` and that a CUDA GPU is available.'
target_skills:
