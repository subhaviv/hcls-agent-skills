id: dicom-processing-21
prompt: 'Here is test question #21 of 30:


  ---


  You are working as a medical imaging data engineer at a research hospital. You have
  received a folder called `/data/raw/subject_001/` containing 312 DICOM files from
  a 3T MRI scanner (Siemens Prisma). The series represents a T1-weighted MPRAGE structural
  scan. You need to convert this DICOM series to NIfTI format for downstream FreeSurfer
  processing.


  Your conversion requirements are:

  - Output should be in compressed NIfTI format (`.nii.gz`)

  - The output filename should follow the pattern `sub-001_T1w`

  - The output directory should be `/data/nifti/subject_001/`

  - You want to generate a sidecar JSON file containing MRI acquisition parameters

  - Verbose output should be enabled during conversion

  - You want to avoid any automatic cropping of the field of view


  Please provide:

  1. The exact `dcm2niix` command with all appropriate flags to accomplish this conversion

  2. A brief explanation of what each flag in your command does

  3. A short Python snippet using `subprocess` to run this command programmatically,
  including basic error handling that checks the return code and prints stderr if
  the conversion fails

  4. A list of at least three files you would expect to find in the output directory
  after a successful conversion, with a brief description of each file''s contents


  Assume `dcm2niix` version 1.0.20230411 is installed and available in the system
  PATH.'
target_skills:
- dicom-processing
domain: imaging
difficulty: easy
