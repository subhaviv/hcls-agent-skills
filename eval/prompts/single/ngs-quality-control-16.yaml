id: ngs-quality-control-16
prompt: 'You have completed initial sequencing of a whole-exome sequencing (WES) cohort
  of 45 tumor-normal pairs. After running FastQC on the raw FASTQs, you notice several
  concerning patterns in a subset of samples: (1) per-base sequence quality drops
  below Q20 after cycle 130 in approximately 12 samples, (2) adapter content spikes
  above 15% starting at position 125 in 8 samples, and (3) a bimodal GC content distribution
  in 6 samples that may indicate contamination.


  Your pipeline uses the standard file naming conventions described in the skill context.
  The target intervals file is `exome_targets.bed` (converted to Picard interval format
  as `exome_targets.interval_list`). You need to process all samples through a complete
  QC remediation workflow.


  **Deliverables:**


  1. Write a `fastp` command to perform adapter trimming and quality filtering that
  addresses issues (1) and (2), using appropriate flags for paired-end data with 8
  threads, enforcing a minimum read length of 50bp and a sliding window quality cutoff.


  2. Write a `mosdepth` command to calculate per-target coverage for the WES data,
  then provide a one-liner `awk` command to flag any targets with mean coverage below
  20×.


  3. Write a Picard `CollectHsMetrics` command using the provided interval list to
  calculate hybrid-selection metrics, specifying the reference and an appropriate
  minimum base quality of 20.


  4. Provide a `multiqc` command that aggregates FastQC, fastp, mosdepth, and Picard
  outputs from the `qc_out` directory into a single report with a custom title "Tumor-Normal
  WES QC Report".


  5. For the 6 samples showing bimodal GC content, describe two bioinformatics approaches
  (no code required) to distinguish technical artifacts from true biological contamination.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: intermediate
