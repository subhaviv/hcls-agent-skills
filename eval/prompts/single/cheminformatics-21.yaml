id: cheminformatics-21
prompt: 'Here is test question #21 of 30:


  ---


  You are working on a fragment-based drug discovery project targeting a serine protease.
  Your team has synthesized 8 fragment hits from a biochemical screen, and you need
  to assess their drug-likeness using fragment-specific rules before progressing them
  to optimization. The fragments are represented as SMILES strings:


  | ID | SMILES |

  |----|--------|

  | F01 | c1ccc(NC(=O)c2ccco2)cc1 |

  | F02 | CC(=O)Nc1ccc(O)cc1 |

  | F03 | O=C(O)c1cccnc1 |

  | F04 | c1ccc2[nH]ccc2c1 |

  | F05 | CC1CCCCC1N |

  | F06 | O=C(NCc1cccs1)c1ccc(Cl)cc1 |

  | F07 | Nc1ccc(S(N)(=O)=O)cc1 |

  | F08 | c1ccc(Cc2ccccc2)cc1 |


  Using RDKit, please:


  1. **Write Python code** to calculate the following descriptors for each fragment:
  molecular weight (MW), LogP (Crippen), number of hydrogen bond donors (HBD), hydrogen
  bond acceptors (HBA), number of rotatable bonds (RotBonds), and heavy atom count
  (HAC).


  2. **Apply the Rule of Three (Ro3)** fragment filter (MW ≤ 300, LogP ≤ 3, HBD ≤
  3, HBA ≤ 3, RotBonds ≤ 3) and identify which fragments pass.


  3. **Generate a formatted summary table** of all descriptors alongside a Pass/Fail
  column for Ro3.


  4. **Recommend** which 3 fragments you would prioritize for optimization based solely
  on the computed descriptors and Ro3 compliance, providing a one-sentence justification
  for each choice.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: easy
