id: ngs-quality-control-20
prompt: 'You are processing a whole-exome sequencing dataset for a cohort of 48 tumor-normal
  pairs. After running fastp with default parameters, MultiQC aggregates suspicious
  patterns: 12 samples show >15% duplication rates, 6 samples have mean Q-scores dropping
  below Q20 after cycle 85 in R2, and 3 samples exhibit unexpected adapter content
  spikes at read positions 1-10 (suggesting ligation artifacts rather than standard
  Illumina adapter contamination). Coverage analysis with mosdepth reveals that 8
  tumor samples have mean target coverage >200x but with coefficient of variation
  >0.85, indicating extreme unevenness despite high depth.


  Your task is to:


  1. Write a fastp command that addresses the R2 quality degradation and positional
  adapter artifacts simultaneously, using per-read quality filtering that preserves
  reads with localized 3'' degradation while removing reads with 5'' artifacts. Include
  specific flags for the ligation artifact scenario.


  2. Provide a mosdepth command that generates per-base coverage for only the target
  regions, plus a quantized output distinguishing 0x, 1-10x, 10-100x, and >100x bins,
  then write a bash one-liner using the quantized output to flag samples where >5%
  of target bases fall in the 1-10x bin despite having mean coverage >150x.


  3. Explain what a CV >0.85 combined with high mean coverage most likely indicates
  biologically or technically, and describe which Picard metric (with the exact CollectHsMetrics
  output column name) would best distinguish between PCR amplification bias versus
  uneven capture efficiency as the root cause.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: hard
