id: rna-seq-analysis-21
prompt: 'A graduate student is analyzing bulk RNA-seq data from 12 mouse liver samples
  (6 wild-type controls vs. 6 knockout mice lacking the *Hnf4a* transcription factor).
  Samples were processed using Salmon v1.9 with a decoy-aware index built from the
  mouse GRCm39 genome and the GENCODE M31 transcript annotation. Quantification was
  run with `--gcBias --seqBias --validateMappings` flags. The student has 12 `quant.sf`
  files ready and wants to perform differential expression analysis using DESeq2.


  The student is unsure how to properly import Salmon output into DESeq2 and has written
  the following incomplete R code snippet:


  ```r

  library(tximport)

  library(DESeq2)


  files <- list.files("salmon_output", pattern = "quant.sf", recursive = TRUE, full.names
  = TRUE)

  names(files) <- paste0("sample_", 1:12)


  # Student is stuck here

  txi <- tximport(files, type = ???, tx2gene = ???)

  ```


  Please provide:

  1. A complete R code block that finishes the `tximport` call correctly, including
  how to build the `tx2gene` mapping table from a GTF file using the `txdbmaker` or
  `AnnotationDbi` approach

  2. The subsequent DESeq2 setup code using `DESeqDataSetFromTximport`, including
  an appropriate design formula and a properly constructed `colData` data frame for
  this 2-group experiment

  3. A brief explanation (3–5 sentences) of why using `tximport` with `countsFromAbundance
  = "lengthScaledTPM"` is recommended over simply rounding raw estimated counts when
  integrating Salmon output into DESeq2'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: easy
