id: quantitative-proteomics-12
prompt: 'You are analyzing a label-free quantification (LFQ) proteomics dataset from
  MaxQuant, comparing tumor versus adjacent normal tissue from 12 colorectal cancer
  patients (6 tumor, 6 normal). After loading the `proteinGroups.txt` file into R,
  you observe the following characteristics:


  - Total protein groups identified: 4,847

  - Proteins with complete quantification across all 12 samples: 2,103

  - Proteins missing in ≥50% of samples in at least one group: 891

  - The LFQ intensity distributions across samples show a noticeable systematic shift,
  with two samples (T04 and N02) having median intensities approximately 1.8-fold
  higher than the remaining samples


  Given this dataset, please provide the following:


  1. **Normalization recommendation**: Which normalization strategy is most appropriate
  for this dataset — median centering, quantile normalization, or VSN (Variance Stabilizing
  Normalization)? Justify your choice given the observed intensity shift in T04 and
  N02, and explain one scenario where your chosen method would be inappropriate.


  2. **Filtering and imputation strategy**: Should proteins missing in ≥50% of one
  group be retained or removed before imputation? For proteins that remain after filtering
  but still have sporadic missing values, recommend either kNN imputation or MinProb,
  explaining which missing-value mechanism (MCAR vs. MNAR) each method assumes.


  3. **Brief R code**: Write a concise R code snippet (using `limma` or base R) that
  applies median centering normalization to a log2-transformed LFQ intensity matrix
  called `lfq_matrix` (rows = proteins, columns = samples), then replaces remaining
  `NA` values using a simple column-wise minimum-based imputation.'
