id: edc-data-validation-24
prompt: 'You are working as a clinical data manager on a Phase II oncology trial (STUDY-ONC-2847)
  with 156 enrolled patients across 8 sites. Your EDC system (Medidata Rave) exports
  SAS transport files (.xpt) for SDTM domains. You have received the latest export
  and need to perform cross-form consistency validation before database lock.


  The following known issues have been flagged by the clinical team:

  - **DS (Disposition)** domain contains DSDECOD="COMPLETED" for 12 subjects whose
  **AE** domain has AE records with AEENDTF (end date partially missing) flagged as
  ongoing

  - **LB (Laboratory)** domain has LBSTRESN values for ALT that range from 2 to 4,890
  U/L — the ULN for ALT is 56 U/L; values >10× ULN may indicate serious hepatotoxicity
  and should cross-reference **AE** domain for corresponding liver-related AEs

  - **EX (Exposure)** domain shows 7 subjects with EXENDTC after their DS.DSSTDTC
  (study completion date)


  **Deliverables requested:**


  1. Write a Python script using `pandas` that loads these four SDTM `.xpt` files
  (DS, AE, LB, EX), performs all three cross-form consistency checks described above,
  and outputs a prioritized validation report as a CSV with columns: `USUBJID`, `Domain`,
  `Variable`, `Issue_Description`, `Severity` (Critical/Major/Minor)


  2. For the ALT hepatotoxicity check, implement NCI CTCAE Grade mapping (Grade 1–4)
  based on multiples of ULN


  3. Include logic to handle partial dates in AEENDTC using ISO 8601 conventions (e.g.,
  "2023-06" should be treated as ongoing if no day is present)'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: intermediate
