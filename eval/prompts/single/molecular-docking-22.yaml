id: molecular-docking-22
prompt: 'You are setting up a molecular docking campaign to identify potential inhibitors
  of the fictional kinase **DRAK3** (PDB ID: 7XQ2, resolution: 2.1 Å). During receptor
  preparation, you notice the crystal structure contains a co-crystallized ligand
  **DRK-001** in the active site, along with 3 zinc ions and 847 water molecules.
  You plan to use **AutoDock Vina** for docking and want to validate your setup through
  redocking before proceeding to screen a library of 2,400 compounds.


  Your grid box needs to be centered on the co-crystallized ligand DRK-001, which
  has centroid coordinates of **x=14.3, y=-8.7, z=22.1** (in Angstroms). The active
  site pocket analysis suggests a binding cavity volume of approximately **420 ų**.


  **Please provide the following:**


  1. A step-by-step receptor preparation protocol specifying which waters and cofactors
  to retain or remove, and which tool(s) to use (e.g., ADFR Suite/prepare_receptor
  vs. OpenBabel), with justification for your choices.


  2. Recommended grid box dimensions (x, y, z in Angstroms) appropriate for the 420
  ų cavity, and the complete Vina configuration file (`config.txt`) with all necessary
  parameters filled in, including `exhaustiveness` and `num_modes`.


  3. A brief redocking validation plan: specify the acceptable RMSD threshold for
  declaring the docking setup valid, and explain what you would do if DRK-001''s redocked
  pose yields an RMSD of **2.8 Å** against the crystal pose.'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: easy
