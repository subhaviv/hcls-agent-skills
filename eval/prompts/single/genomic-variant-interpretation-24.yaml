id: genomic-variant-interpretation-24
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory reports the following variant:
  **BRCA2 c.7976+3A>G**.


  Available evidence:

  - **SpliceAI scores**: Donor loss: 0.61, Acceptor loss: 0.02, Donor gain: 0.08,
  Acceptor gain: 0.03

  - **gnomAD v3.1 (non-cancer)**: 4 heterozygous alleles observed out of 152,310 total
  alleles (no homozygotes)

  - **ClinVar**: 2 submissions — one "Uncertain significance" (clinical lab, 2019),
  one "Likely pathogenic" (research lab, 2021, no assertion criteria provided)

  - **In silico RNA splicing functional study (published 2022)**: Patient-derived
  lymphocyte RNA showed ~65% reduction in canonical donor splice site usage with creation
  of a 47-nucleotide intronic pseudoexon insertion, confirmed by minigene assay

  - **Family history**: Two first-degree relatives with breast cancer (ages 38 and
  42 at diagnosis), one with ovarian cancer

  - **Co-segregation**: Variant tracked with disease in 2 affected relatives (LOD
  score ~0.6)


  Please provide:

  1. A systematic ACMG/AMP 2015 criteria evaluation, specifying which evidence codes
  apply (with strength levels), which do not apply, and your reasoning for each

  2. A final variant classification with justification

  3. An assessment of whether PVS1 is applicable given this is an intronic variant
  with functional RNA evidence, referencing the ClinGen PVS1 decision tree

  4. A brief clinical reporting recommendation, including whether this classification
  should alter the patient''s surgical risk-reduction counseling'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: intermediate
