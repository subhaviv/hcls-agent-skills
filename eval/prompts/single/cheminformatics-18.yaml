id: cheminformatics-18
prompt: 'Here is test question #18 of 30:


  ---


  You are analyzing a set of 8 compounds from an internal fragment-growing campaign
  targeting a kinase ATP-binding site. The SMILES for these compounds are:


  - **Cpd-01**: `c1ccc(NC(=O)c2ccncc2)cc1`

  - **Cpd-02**: `c1ccc(NC(=O)c2ccncc2)cc1F`

  - **Cpd-03**: `c1ccc(NC(=O)c2ccncc2)cc1Cl`

  - **Cpd-04**: `c1ccc(NC(=O)c2ccncc2)cc1OC`

  - **Cpd-05**: `c1ccc(NC(=O)c2ccncc2)cc1CF`  ← note: benzylic fluorine

  - **Cpd-06**: `c1ccc(NC(=O)c2ccncc2)cc1C(F)(F)F`

  - **Cpd-07**: `c1ccc(NC(=O)c2ccncc2)cc1S(=O)(=O)N`

  - **Cpd-08**: `c1ccc(NC(=O)c2ccncc2)cc1N`


  Your team wants to understand structure–activity relationships through matched molecular
  pair (MMP) analysis. Using RDKit and mmpdb conventions, please provide: (1) Python
  code to enumerate all valid MMPs from this set using RDKit''s fragmentation approach
  (single-cut, attachment-point-labeled SMILES), (2) a table listing each MMP with
  the transformation SMIRKS, the property context (MW, cLogP), and directionality,
  (3) identification of which transformation series would be most informative for
  optimizing lipophilicity while maintaining MW < 300 Da, and (4) a discussion of
  any edge cases in the fragmentation, specifically addressing why Cpd-05 and Cpd-08
  may require special handling.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: hard
