id: claims-analytics-13
prompt: 'Here is test question #13 of 30:


  ---


  You are a healthcare data analyst working with a mid-sized regional insurer. Your
  team has received a batch of X12 837P professional claim files from a primary care
  group (NPI: 1234567890) covering January–March 2024. Initial review suggests the
  provider may be systematically upcoding Evaluation & Management (E&M) office visit
  codes. The raw transaction data, once parsed, shows the following CPT code distribution
  across 1,200 claims:


  - 99211 (Level 1): 12 claims (1%)

  - 99212 (Level 2): 48 claims (4%)

  - 99213 (Level 3): 96 claims (8%)

  - 99214 (Level 4): 756 claims (63%)

  - 99215 (Level 5): 288 claims (24%)


  The national Medicare benchmark distribution for a family practice specialty is
  approximately 99211: 2%, 99212: 15%, 99213: 40%, 99214: 35%, 99215: 8%.


  Please provide the following deliverables:


  1. **Python code** using pandas to parse a simplified X12 837P segment structure
  (CLM, SV1 segments) into a structured DataFrame with columns: claim_id, npi, cpt_code,
  charge_amount, service_date.

  2. **Statistical analysis** comparing this provider''s E&M distribution against
  the national benchmark — calculate a chi-square goodness-of-fit test and interpret
  the result with a p-value threshold of 0.05.

  3. **A fraud risk score** (0–100) for this provider based on the E&M distribution
  deviation, with a clear explanation of how you weighted the components.

  4. **Two specific follow-up investigation steps** an SIU (Special Investigations
  Unit) analyst should take before escalating to formal audit.'
target_skills:
- claims-analytics
