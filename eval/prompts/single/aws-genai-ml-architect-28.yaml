id: aws-genai-ml-architect-28
prompt: 'A regional children''s hospital network (8 facilities, 340,000 pediatric
  patients) is building a **rare disease diagnostic support system** on AWS. The system
  must analyze unstructured clinical notes using NLP to surface potential rare disease
  indicators, then cross-reference against a curated knowledge base of 12,000 OMIM
  disorder entries and 2.3 million PubMed abstracts.


  **Specific constraints:**

  - Notes contain PHI and must never leave the VPC perimeter

  - The pediatric population requires age-appropriate dosing alerts flagged separately
  from adult references

  - Turnaround SLA: <8 seconds end-to-end for ED triage use cases

  - Current EHR (Epic) sends HL7 FHIR R4 events via webhook

  - Budget ceiling: $85,000/month across compute and storage

  - The medical informatics team wants explainability scores per suggested diagnosis
  (not just a ranked list)

  - System must maintain an audit trail meeting 21 CFR Part 11 requirements for potential
  FDA SaMD designation


  **Deliverables requested:**

  1. End-to-end AWS architecture diagram description (services, data flow, network
  boundaries)

  2. Decision rationale for choosing SageMaker vs. Bedrock for each NLP inference
  component, given the PHI and latency constraints

  3. How you would structure the Bedrock Knowledge Base (or alternative) to separately
  handle pediatric vs. adult reference literature

  4. A specific DynamoDB or Aurora schema snippet for the 21 CFR Part 11-compliant
  audit trail

  5. Cost breakdown estimating how the architecture fits within the $85K/month ceiling

  6. Identification of the single highest architectural risk and your mitigation strategy'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: hard
