id: cheminformatics-26
prompt: 'You are building a virtual screening pipeline for a kinase inhibitor program.
  You have a library of 500 compounds represented as SMILES strings, and you need
  to prioritize candidates for synthesis using a multi-stage filtering and similarity
  approach.


  **Your lead compound** has the SMILES: `CC1=C(C(=O)Nc2ccc(F)cc2)C(c2ccccc2)c2[nH]c3ccccc3c2C1`
  (a dihydroquinolinone scaffold).


  **Tasks:**


  1. **Write RDKit Python code** to compute the following descriptors for the lead:
  MW, LogP, HBD, HBA, TPSA, and rotatable bonds. Then apply both Lipinski Rule of
  Five AND Veber rules (TPSA ≤ 140 Å², rotatable bonds ≤ 10) simultaneously — print
  which rules pass or fail.


  2. **Write RDKit code** to screen the library using Morgan fingerprints (radius=2,
  2048 bits) and return all compounds with Tanimoto similarity ≥ 0.40 to the lead.
  Include a function that also flags any retrieved compound that fails Lipinski or
  Veber rules, outputting a prioritized DataFrame with columns: SMILES, Tanimoto,
  MW, LogP, Lipinski_pass, Veber_pass.


  3. **PAINS filtering**: Write code using RDKit''s FilterCatalog with the PAINS_A,
  PAINS_B, and PAINS_C filter sets to flag compounds from step 2 that contain pan-assay
  interference substructures. Add a `PAINS_flag` boolean column to the DataFrame.


  4. **Recommend a final prioritization strategy**: Given that you expect ~15% of
  similar compounds to be PAINS-positive and ~20% to fail Veber rules, describe how
  you would rank the remaining clean compounds and what additional filters you would
  apply before committing to synthesis.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: intermediate
