id: cheminformatics-16
prompt: 'You are building a virtual screening pipeline for a kinase inhibitor program.
  Your compound library contains 500 molecules in SMILES format, and you need to prioritize
  candidates for synthesis using a multi-stage filtering approach.


  **Your starting SMILES examples (representative subset):**

  - Cpd_001: `CC1=CC=C(C=C1)S(=O)(=O)N2CCN(CC2)C3=NC4=CC=CC=C4N3` (MW=356, cLogP=2.8)

  - Cpd_047: `COCCNC(=O)C1=CC2=C(S1)N=C(N2)C3=CC=C(Cl)C=C3F` (MW=380, cLogP=3.1)

  - Cpd_112: `CC(C)(C)OC(=O)N1CCC(CC1)N2C(=O)C3=CC=CC=C3C2=O` (MW=358, cLogP=2.4)

  - Cpd_203: `O=C1NC2=CC=CC=C2C(=O)N1CC3=CC=C(F)C=C3` (MW=282, cLogP=1.9)


  **Requirements:**

  1. Write a complete RDKit Python script that: (a) applies Lipinski Ro5 AND Veber
  rules simultaneously, (b) screens for PAINS using the FilterCatalog, and (c) computes
  Morgan fingerprints (radius=2, 2048 bits) with Tanimoto similarity against a reference
  compound `Cpd_REF: c1ccc2c(c1)ncc(n2)Nc3ccnc(n3)N` (a known kinase inhibitor scaffold).


  2. Define your filtering thresholds explicitly (MW, cLogP, HBD, HBA, TPSA, rotatable
  bonds) and explain why each threshold matters for oral kinase inhibitors specifically.


  3. After filtering, describe how you would cluster the surviving compounds by Tanimoto
  similarity (threshold=0.4) and select one representative per cluster for synthesis
  prioritization.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: intermediate
