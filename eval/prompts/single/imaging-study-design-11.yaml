id: imaging-study-design-11
prompt: 'A research team at Westbrook Medical Center is planning a multi-site MRI
  study to measure hippocampal volume as a biomarker for early Alzheimer''s disease
  progression. The study will enroll 180 participants (90 MCI patients, 90 healthy
  controls) across three sites: Site A uses a Siemens Prisma 3T scanner, Site B uses
  a GE Discovery MR750 3T scanner, and Site C uses a Philips Ingenia 3T scanner. All
  sites will acquire T1-weighted MPRAGE sequences, but with slightly different parameters:
  Site A uses TR/TE = 2300/2.98ms, Site B uses TR/TE = 2530/3.65ms, and Site C uses
  TR/TE = 2250/3.1ms. Voxel sizes are 1×1×1mm at Sites A and C, but 1×1×1.2mm at Site
  B.


  The team wants to perform longitudinal analysis with baseline and 18-month follow-up
  scans, and they are concerned about scanner-related variability confounding their
  hippocampal volume measurements.


  Please provide:

  1. A recommended preprocessing pipeline for harmonizing the T1 images across sites,
  specifying which steps should occur before vs. after harmonization

  2. An explanation of whether ComBat harmonization should be applied to raw voxel
  data, extracted volumetric features, or segmentation maps, and why

  3. A recommendation on whether to perform hippocampal segmentation in MNI space
  or native subject space for this volumetric biomarker, with justification

  4. Two specific quality control metrics the team should compute at each site before
  pooling data

  5. A brief description of how the longitudinal design affects the ComBat model specification
  (specifically regarding the repeated-measures structure)'
