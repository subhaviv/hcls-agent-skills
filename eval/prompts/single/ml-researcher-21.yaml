id: ml-researcher-21
prompt: 'You are building a mortality prediction model using EHR data from a single
  academic medical center. Your dataset contains 12,400 adult ICU admissions (1,847
  deaths, ~15% mortality rate) collected between January 2018 and December 2022. Features
  include 42 laboratory values (e.g., lactate, creatinine, troponin), 8 vital sign
  time series, 15 comorbidity flags (ICD-10 coded), and patient demographics (age,
  sex, race/ethnicity). You plan to deploy the model prospectively starting in 2024.


  A colleague suggests randomly splitting the data 70/15/15 into train/validation/test
  sets before training a gradient boosting classifier (XGBoost). They argue that since
  the class imbalance is "not that bad at 15%," no special handling is needed, and
  that AUROC alone is sufficient for reporting model performance.


  Please provide the following:


  1. **Critique the proposed random split** — explain specifically why it is inappropriate
  for this deployment scenario and what splitting strategy you would recommend instead,
  with justification.


  2. **Address the class imbalance claim** — is 15% imbalance truly negligible for
  this clinical task? Discuss at least two concrete techniques for handling it and
  when each is preferable.


  3. **Expand the evaluation framework** — beyond AUROC, identify three additional
  metrics or analyses that are essential for this ICU mortality model, explaining
  the clinical rationale for each.


  4. **Provide a short Python code snippet** (using scikit-learn or similar) demonstrating
  your recommended train/validation/test splitting approach on a toy dataset with
  timestamps.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: easy
