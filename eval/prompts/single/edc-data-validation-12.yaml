id: edc-data-validation-12
prompt: 'Here is test question #12 of 30:


  ---


  You are working as a clinical data manager on a Phase II oncology trial with 85
  enrolled patients. Your team has just received a Medidata Rave EDC export containing
  vital signs data (VS domain) in CSV format. The export includes the following fields:
  `USUBJID`, `VSTEST`, `VSORRES`, `VSORRESU`, `VSDTC`, and `VSBLFL`.


  You need to implement range checks for the following vital sign parameters using
  standard clinical alert thresholds:

  - **Systolic Blood Pressure (SYSBP):** 70–200 mmHg (normal); flag as critical outside
  60–220 mmHg

  - **Heart Rate (PULSE):** 40–120 bpm (normal); flag as critical outside 30–150 bpm

  - **Body Temperature (TEMP):** 35.0–38.5 °C (normal); flag as critical outside 34.0–41.0
  °C

  - **Oxygen Saturation (OXYSAT):** 94–100 % (normal); flag as critical outside 88–100
  %


  Please provide the following deliverables:


  1. **Python code** that reads the CSV export, applies both "warning" and "critical"
  range checks for each parameter, and outputs a prioritized query report (critical
  flags first) as a formatted DataFrame.

  2. **Unit conversion handling** — the export may contain temperature values in Fahrenheit
  (°F); include logic to detect the unit from `VSORRESU` and convert to Celsius before
  applying checks.

  3. **A summary function** that prints the total number of warnings and critical
  flags per `VSTEST`, along with the percentage of subjects affected out of 85 enrolled.

  4. **Brief explanation** (3–5 sentences) of how this validation logic would integrate
  into a broader SDTM-compliant data cleaning pipeline.'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: easy
