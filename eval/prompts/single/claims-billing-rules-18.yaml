id: claims-billing-rules-18
prompt: 'A Medicare Part B claims audit has flagged a high-volume orthopedic surgery
  group practice for potential FWA. The audit covers 6 months of claims data (January–June
  2024) involving 847 unique patients. The following patterns were identified:


  **Pattern A:** Modifier 59 was appended to CPT 29881 (knee arthroscopy with meniscectomy)
  in 312 claims where CPT 29880 was billed on the same date of service by the same
  surgeon. NCCI edits list 29880/29881 as a Column 1/Column 2 pair with a modifier
  indicator of "0."


  **Pattern B:** Modifier 25 was used on 189 claims pairing an E&M service (99214)
  with a same-day minor surgical procedure (CPT 20610 – joint aspiration), but documentation
  review shows the E&M notes are nearly identical across patients with minimal individualized
  medical decision-making.


  **Pattern C:** 43 claims show post-operative E&M visits billed during the 90-day
  global surgery period for CPT 27447 (total knee arthroplasty) without modifier 24,
  and without documentation of unrelated diagnoses.


  **Pattern D:** A single surgeon billed 31 hours of procedures on a single calendar
  date (March 15, 2024), across 14 patients.


  For each pattern, provide: (1) the specific CMS/NCCI rule or policy being violated,
  (2) whether this likely represents a coding error versus intentional fraud and your
  reasoning, (3) the financial recovery methodology CMS would apply, and (4) one concrete
  corrective action recommendation for the practice''s compliance program. Additionally,
  rank the four patterns by fraud risk severity and justify your ranking.'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: hard
