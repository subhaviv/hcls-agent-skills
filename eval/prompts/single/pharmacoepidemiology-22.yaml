id: pharmacoepidemiology-22
prompt: 'A health system researcher wants to study whether metformin reduces the risk
  of colorectal cancer compared to sulfonylureas among patients with newly diagnosed
  type 2 diabetes using electronic health records from 2010–2020 (n = 45,000 eligible
  patients).


  The researcher has identified the following cohort characteristics:

  - Metformin initiators: 31,200 patients

  - Sulfonylurea initiators: 13,800 patients

  - Mean follow-up: 4.2 years

  - Colorectal cancer events: 287 (metformin) and 198 (sulfonylurea)

  - Key covariates: age, BMI, HbA1c at baseline, smoking status, prior colonoscopy,
  diabetes duration, comorbidity index


  The researcher is considering three propensity score approaches: 1:1 nearest-neighbor
  matching, inverse probability of treatment weighting (IPTW) with stabilized weights,
  and propensity score stratification into quintiles.


  Please provide:

  1. A justification for why this qualifies as an active comparator new-user design
  and what biases this addresses compared to using non-diabetic controls

  2. A recommendation for which propensity score method is most appropriate given
  the sample size imbalance (31,200 vs 13,800) and why the other two methods are less
  suitable

  3. How to implement stabilized IPTW in R, including weight calculation, trimming
  at the 1st/99th percentile, and a weighted Cox proportional hazards model

  4. Two diagnostics the researcher should report to assess propensity score balance,
  with specific thresholds for acceptable balance

  5. One major residual confounding concern specific to this metformin-cancer question
  and how an E-value would help quantify it'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: easy
