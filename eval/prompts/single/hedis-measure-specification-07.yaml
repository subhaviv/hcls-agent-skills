id: hedis-measure-specification-07
prompt: 'A regional health plan is preparing for HEDIS MY2024 data submission and
  needs help analyzing their Controlling High Blood Pressure (CBP) measure performance.
  Their current data shows:


  - Total attributed members aged 18-85: 12,400

  - Members with hypertension diagnosis: 3,850

  - Members meeting continuous enrollment (11 of 12 months): 3,210

  - Members with adequate blood pressure control (<140/90): 1,926

  - Members excluded due to ESRD: 87

  - Members excluded due to pregnancy: 23

  - Members with hospice enrollment: 41

  - Members with frailty + advanced illness: 156


  The plan''s current reported rate is 62.3%, but their quality director suspects
  the denominator calculation may be incorrect because the analytics team included
  members with only outpatient hypertension diagnoses from a single claim, rather
  than applying the full NCQA-required value set logic.


  Please provide:

  1. A step-by-step walkthrough of the correct CBP denominator construction logic
  per NCQA specifications, including required diagnosis code criteria (number of visits/claims
  needed) and the correct exclusion application sequence

  2. A recalculated denominator and performance rate using the corrected figures provided
  above, showing your work

  3. An explanation of how CBP is weighted in CMS Star Ratings versus NCQA accreditation,
  and what a 3-percentage-point improvement in this measure would mean for the plan''s
  overall Star Rating

  4. Two targeted care gap closure interventions appropriate for members with uncontrolled
  hypertension, considering that 34% of the uncontrolled population has documented
  SDOH barriers related to medication affordability'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: intermediate
