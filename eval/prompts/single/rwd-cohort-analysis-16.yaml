id: rwd-cohort-analysis-16
prompt: 'You are conducting a retrospective cohort study using commercial claims data
  (2018–2022) to compare 90-day all-cause readmission rates between patients initiated
  on Drug A (NDC prefix: 00071) versus Drug B (NDC prefix: 00078) following hospitalization
  for heart failure (primary discharge diagnosis ICD-10: I50.x). Your dataset contains
  12,400 patients on Drug A and 8,750 patients on Drug B after applying initial inclusion
  criteria (age 18–89, continuous enrollment 6 months pre-index through 90 days post-discharge,
  no ESRD diagnosis Z99.2 or N18.6 in lookback period).


  Covariates for propensity score estimation include: age, sex, Charlson Comorbidity
  Index, prior HF hospitalization in the 12-month lookback, baseline use of ACE inhibitors/ARBs
  (identified by NDC), atrial fibrillation (I48.x), diabetes (E11.x), and geographic
  region.


  Please provide the following deliverables:


  1. **Python code** to estimate propensity scores using logistic regression, perform
  1:1 nearest-neighbor matching with a caliper of 0.2 SD of the logit PS, and produce
  a Love plot showing standardized mean differences (SMDs) before and after matching
  (flag any post-match SMD > 0.10).


  2. **Python code** to fit Kaplan-Meier curves for time-to-first-readmission within
  90 days for both matched cohorts, including log-rank test p-value and a publication-ready
  plot with confidence intervals.


  3. **Python code** for a Cox proportional hazards model on the matched cohort, including
  the Schoenfeld residuals test for the proportional hazards assumption, and interpretation
  guidance if the assumption is violated for the treatment variable.


  4. A brief written explanation of why using the matched cohort rather than the full
  unmatched cohort is preferable for this analysis.'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: intermediate
