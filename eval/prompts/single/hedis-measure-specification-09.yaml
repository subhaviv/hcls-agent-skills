id: hedis-measure-specification-09
prompt: 'A regional health plan is preparing for HEDIS MY2024 data submission and
  has identified a complex patient cohort for the Diabetes Care — Poor Control (HbA1c
  > 9%) measure (CDC). Their analytics team has flagged the following scenario:


  **Patient cohort details:**

  - 847 patients initially identified in the diabetes registry

  - 112 patients have a gap in medical coverage between January 15 – February 3 (19
  days)

  - 89 patients are enrolled in hospice at various points during the measurement year

  - 34 patients have a diagnosis of polycystic ovary syndrome (PCOS) only, with no
  secondary diabetes diagnosis codes

  - 67 patients turn 75 during the measurement year (birth dates ranging from March
  through October)

  - 23 patients have both gestational diabetes (ICD-10: O24.4xx) and a separate Type
  2 diabetes diagnosis confirmed prior to pregnancy


  **Current denominator count:** 847 patients (unvalidated)


  Please provide the following:


  1. **Denominator validation analysis**: Walk through each of the six flagged subgroups
  and determine whether each patient group should be included or excluded from the
  CDC denominator, citing specific NCQA continuous enrollment rules and exclusion
  criteria.


  2. **Final denominator count**: Calculate the corrected denominator size after applying
  all appropriate inclusions/exclusions.


  3. **Exclusion hierarchy logic**: If a patient qualifies for multiple exclusion
  criteria simultaneously (e.g., hospice + age boundary), explain which exclusion
  takes precedence and why this matters for audit documentation.


  4. **NCQA audit risk assessment**: Identify which of these six subgroups poses the
  highest audit risk if miscategorized, and recommend specific documentation practices
  to mitigate that risk.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: hard
