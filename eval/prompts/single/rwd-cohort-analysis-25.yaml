id: rwd-cohort-analysis-25
prompt: 'You are analyzing a real-world evidence study comparing two diabetes medications
  — semaglutide (NDC prefix: 00169-4130) versus sitagliptin (NDC prefix: 00006-0221)
  — on time-to-first major adverse cardiovascular event (MACE) in a commercial claims
  database containing 847,293 type 2 diabetes patients (ICD-10: E11.x) enrolled between
  January 2018 and December 2022.


  Your cohort identification yielded 12,847 semaglutide initiators and 31,204 sitagliptin
  initiators after applying a 180-day washout period and 12-month continuous enrollment
  requirement. MACE is defined as hospitalization for MI (ICD-10: I21.x), stroke (I63.x),
  or cardiovascular death (I46.x, I50.x).


  After 1:2 propensity score matching on 24 covariates (age, sex, HbA1c proxy, comorbidities,
  prior medications), your SMD diagnostics show 3 variables with SMD > 0.10: baseline
  insulin use (SMD=0.14), prior hospitalization count (SMD=0.18), and eGFR category
  (SMD=0.12).


  Please provide the following deliverables:

  1. Python code to re-estimate the propensity score model incorporating interaction
  terms to improve balance on the three imbalanced covariates, followed by re-matching
  and SMD recalculation

  2. Python code to generate Kaplan-Meier curves with 95% confidence bands and log-rank
  test for the matched cohort

  3. Python code to fit a Cox proportional hazards model and formally test the proportional
  hazards assumption using Schoenfeld residuals, including a plot of scaled residuals
  over time

  4. Interpretation guidance: if the PH assumption is violated for one covariate,
  describe two analytical strategies to address it and provide skeleton code for one'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: intermediate
