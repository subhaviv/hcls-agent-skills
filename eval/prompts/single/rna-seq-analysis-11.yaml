id: rna-seq-analysis-11
prompt: "You are analyzing bulk RNA-seq data from a mouse neuroinflammation study\
  \ comparing 3 wildtype (WT) and 3 knockout (KO) mice. You have already run Salmon\
  \ quantification using a decoy-aware index and obtained per-sample `quant.sf` files.\
  \ The experiment used 75bp paired-end reads with an average library size of ~45\
  \ million read pairs per sample.\n\nYour colleague suggests skipping `tximport`\
  \ and instead just loading the raw NumReads column from the Salmon output directly\
  \ into DESeq2 as integer counts. Meanwhile, you want to use the proper `tximport`\
  \ workflow with `type=\"salmon\"` to import estimated counts scaled to library size.\n\
  \n**Please provide the following:**\n\n1. **Explain** why importing Salmon output\
  \ via `tximport` (with `type=\"salmon\"`) is statistically preferable to naively\
  \ rounding the NumReads column, specifically addressing how `tximport` handles multi-mapping\
  \ reads and length bias correction.\n\n2. **Write complete R code** that:\n   -\
  \ Defines a sample metadata table for the 6 samples (WT_1 through WT_3, KO_1 through\
  \ KO_3)\n   - Imports the Salmon quantifications using `tximport` with appropriate\
  \ settings for a gene-level analysis using a tx2gene mapping object called `tx2gene`\n\
  \   - Creates a `DESeqDataSet` object with `~condition` as the design formula\n\
  \   - Runs the DESeq2 pipeline and extracts results comparing KO vs WT with `lfcShrink`\
  \ using the `apeglm` method\n\n3. **List two quality-control checks** you would\
  \ perform on the `tximport` output before proceeding to DESeq2."
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: easy
