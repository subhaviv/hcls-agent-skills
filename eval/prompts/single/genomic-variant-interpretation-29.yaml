id: genomic-variant-interpretation-29
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory identifies the following variant
  in **BRCA2**: NM_000059.4:c.7976+3A>G (intronic, 3 bp downstream of exon 18 donor
  splice site).


  Available evidence:

  - **gnomAD v3.1** allele frequency: 0.000008 (2 heterozygotes, 251,340 alleles;
  no homozygotes)

  - **SpliceAI scores**: Donor loss = 0.61, Acceptor loss = 0.02, Donor gain = 0.08,
  Acceptor gain = 0.01

  - **ClinVar**: 2 submissions — one "Uncertain Significance" (single submitter, no
  functional data, 2019) and one "Likely Pathogenic" (clinical laboratory, 2022, citing
  RNA studies showing partial exon 18 skipping in ~40% of transcripts)

  - **REVEL score**: N/A (intronic)

  - **In-house RNA functional study**: RT-PCR on patient lymphocytes confirms partial
  exon 18 skipping (~35% aberrant transcript); full exon 18 skipping would cause a
  frameshift (p.Glu2659Glyfs*5)

  - **ACMG/AMP criteria being considered**: PVS1, PS3, PM2, BP4 (conflicting)


  Please provide:

  1. A structured ACMG/AMP criteria assessment for each of the four criteria listed,
  including whether each applies, at what strength, and the specific justification

  2. A final variant classification with overall evidence summary

  3. An explanation of why PVS1 strength modification is necessary here versus a canonical
  splice site variant

  4. Clinical reporting language suitable for a germline cancer predisposition report,
  including recommended next steps for the proband and at-risk family members'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: hard
