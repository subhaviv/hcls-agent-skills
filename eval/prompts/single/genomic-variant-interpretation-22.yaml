id: genomic-variant-interpretation-22
prompt: 'A clinical genetics laboratory has identified the following variant in a
  34-year-old woman with a personal and family history of breast and ovarian cancer:
  **BRCA2 c.5946delT (p.Ser1982ArgfsTer22)**, detected via next-generation sequencing
  with 98× coverage and a variant allele fraction of 52%.


  The laboratory has gathered the following evidence:

  - **gnomAD v3.1.1 allele frequency**: 0.000008 (2 heterozygous alleles in 251,000
  total alleles; no homozygotes)

  - **ClinVar submissions**: 47 submissions — 45 classified as Pathogenic, 2 as Likely
  Pathogenic; no conflicting interpretations

  - **Variant type**: Single-nucleotide deletion causing frameshift and premature
  stop codon within a functionally critical region of BRCA2 (exon 11)

  - **Functional studies**: None available for this specific variant

  - **Inheritance**: Variant confirmed in the proband''s affected mother (breast cancer)
  and maternal aunt (ovarian cancer)


  Please provide the following deliverables:


  1. **Apply ACMG/AMP 2015 criteria** — identify which specific criteria codes apply
  (e.g., PVS1, PS1, PM2, etc.), state whether each is met or not met, and provide
  a brief justification for each

  2. **Final classification** — assign an overall classification (Pathogenic, Likely
  Pathogenic, VUS, Likely Benign, or Benign) based on the combined criteria

  3. **PVS1 applicability analysis** — explain why PVS1 does or does not apply at
  full strength for this variant type and location

  4. **Reporting recommendation** — state whether this variant should be reported
  as a primary finding and what clinical action should be recommended for the patient
  and at-risk family members'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: easy
