id: digital-pathology-23
prompt: "You are working with a cohort of 847 TCGA lung adenocarcinoma whole-slide\
  \ images stored as SVS files. You need to extract tissue patches at 0.5 microns-per-pixel\
  \ (mpp) resolution with a patch size of 256×256 pixels for downstream feature extraction\
  \ using the UNI foundation model. Before extraction, you want to apply Macenko stain\
  \ normalization using a reference slide named `TCGA-05-4244-01Z-00-DX1.svs`.\n\n\
  Please provide:\n\n1. **A complete Python code snippet** using TIAToolbox that:\n\
  \   - Loads a single SVS slide and reads its metadata (dimensions, mpp, number of\
  \ pyramid levels) using `WSIReader`\n   - Generates a tissue mask using `TissueMasker`\
  \ with Otsu thresholding\n   - Extracts all foreground patches at 0.5 mpp using\
  \ `PatchExtractor`, filtering out patches with less than 60% tissue content\n  \
  \ - Applies Macenko stain normalization to each patch before saving\n\n2. **A short\
  \ explanation** (3–5 sentences) of why extracting at a fixed mpp rather than a fixed\
  \ pyramid level is important when working with multi-site TCGA data where scanners\
  \ may differ across institutions.\n\n3. **The exact TIAToolbox class name and key\
  \ parameter** you would use to control the stride between patches to achieve 50%\
  \ overlap between adjacent 256×256 patches at 0.5 mpp, and the numerical stride\
  \ value in pixels."
target_skills:
