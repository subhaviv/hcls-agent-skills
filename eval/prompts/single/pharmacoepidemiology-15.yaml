id: pharmacoepidemiology-15
prompt: 'A regional health system wants to study whether long-term use of metformin
  reduces the incidence of colorectal cancer compared to sulfonylureas among patients
  with type 2 diabetes, using 8 years of electronic health records (n = 124,000 patients
  initiating either drug between 2012–2019).


  You are asked to design a rigorous pharmacoepidemiologic study addressing the following
  challenges:


  1. **Cohort definition**: Specify exact inclusion/exclusion criteria for a new-user,
  active comparator design. The database contains prevalent users (patients already
  on therapy at data start), patients who switch between drugs, and patients with
  gaps in therapy >90 days. Define washout period requirements and how to handle treatment
  gaps.


  2. **Time-varying confounding**: HbA1c levels, BMI, and colonoscopy screening rates
  change over follow-up and are both confounders and potential mediators. Describe
  how marginal structural models with stabilized IPTW weights should be implemented,
  including the numerator and denominator models, weight truncation strategy, and
  how to estimate the weighted cumulative incidence.


  3. **Immortal time bias**: A colleague suggests defining "long-term use" as ≥2 years
  of continuous therapy and only counting cancer events after that 2-year mark. Identify
  the specific bias this introduces and propose a time-varying exposure definition
  that avoids it.


  4. **Unmeasured confounding**: Dietary habits and physical activity are unavailable.
  Calculate an interpretive E-value for a hypothetical hazard ratio of 0.78 (95% CI:
  0.69–0.88) and explain what it means for causal inference. Additionally, propose
  one negative control outcome appropriate for this study.


  Provide concrete analytical recommendations for each component, including relevant
  model specifications.'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
