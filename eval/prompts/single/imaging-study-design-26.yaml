id: imaging-study-design-26
prompt: 'You are coordinating a multi-site diffusion MRI study examining white matter
  microstructure in 340 patients with early-stage Parkinson''s disease (PD) and 280
  healthy controls across 6 sites (Sites A–F). Each site uses a 3T scanner, but three
  different vendors are represented: Siemens Prisma (Sites A, B, C), GE Discovery
  MR750 (Sites D, E), and Philips Ingenia (Site F). The acquisition protocol was harmonized
  prospectively to 64 diffusion directions at b=1000 s/mm², TR/TE=8000/90ms, 2mm isotropic
  voxels — but post-acquisition QC reveals that Site F''s TE was inadvertently set
  to 95ms, and Sites D and E show a systematic 12% lower FA in the corpus callosum
  compared to Sites A–C even after eddy current correction.


  Your primary imaging biomarker of interest is Fractional Anisotropy (FA) in the
  substantia nigra and superior longitudinal fasciculus (SLF), extracted via TBSS.
  A secondary exploratory biomarker is free-water corrected FA (FW-FA).


  Please provide:

  1. A root-cause analysis of the Site D/E FA discrepancy and the Site F TE deviation,
  including whether Site F data should be excluded or harmonized

  2. A recommended scanner harmonization strategy (e.g., ComBat, neuroComBat, or acquisition-level
  correction), specifying which covariates to include and why

  3. A TBSS pipeline outline with preprocessing steps appropriate for multi-site data,
  noting where harmonization should be applied relative to the pipeline

  4. Python pseudocode implementing neuroComBat harmonization on a feature matrix
  of FA values with site, age, sex, and diagnosis as covariates

  5. A power analysis justification for whether the current sample size is adequate
  given expected FA group differences of Cohen''s d=0.35 in the SLF'
target_skills:
- imaging-study-design
domain: imaging
difficulty: intermediate
