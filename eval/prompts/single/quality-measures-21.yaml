id: quality-measures-21
prompt: 'You are a healthcare data analyst at a regional health plan with 45,000 commercial
  members. Your quality team needs to calculate the **Breast Cancer Screening (BCS)
  HEDIS measure** for the current measurement year.


  **Available data context:**

  - Member enrollment table: `member_enrollment` (columns: member_id, enrollment_start,
  enrollment_end, plan_type, age, gender)

  - Claims table: `medical_claims` (columns: member_id, service_date, procedure_code,
  diagnosis_code, place_of_service, claim_status)

  - Measurement year: January 1, 2023 – December 31, 2023

  - Look-back period for mammography: October 1, 2021 – December 31, 2023


  **Known parameters:**

  - Eligible population: Women aged 52–74 as of December 31, 2023

  - Continuous enrollment requirement: Enrolled for 12 months during the measurement
  year with no more than one 45-day gap

  - Numerator: At least one mammography claim (CPT codes: 77067, 77066, 77065) during
  the look-back period

  - Current raw counts: 3,200 eligible women identified; 1,856 have a qualifying mammogram
  on file


  Please provide the following deliverables:

  1. **Step-by-step explanation** of the denominator and numerator logic for BCS

  2. **SQL query** to identify the eligible denominator population applying the continuous
  enrollment check

  3. **SQL query** to identify numerator-compliant members using the mammography CPT
  codes

  4. **Rate calculation** with the current data, expressed as a percentage rounded
  to two decimal places

  5. **One actionable care gap intervention** recommendation for members missing a
  mammogram'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: easy
