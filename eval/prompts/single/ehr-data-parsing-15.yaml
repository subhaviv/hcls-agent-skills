id: ehr-data-parsing-15
prompt: 'You are working with a hospital''s ADT (Admit, Discharge, Transfer) feed
  that delivers HL7v2 ADT^A01 messages for patient admissions. Your team needs to
  extract patient demographics and visit information from these messages and load
  them into a pandas DataFrame for downstream analytics.


  Below is a representative sample message from the feed:


  ```

  MSH|^~\&|EPIC|HOSPITAL_A|ANALYTICS|DW|20240315142233||ADT^A01|MSG00847|P|2.5

  EVN|A01|20240315142233

  PID|1||MRN004782^^^HOSPITAL_A^MR||Washington^Marcus^James||19681122|M|||742 Evergreen
  Terrace^^Springfield^IL^62701^USA||217-555-0193|217-555-0847|EN|S|CHR|ACC-2024-0391

  PV1|1|I|3W^301^A^HOSPITAL_A^^BED^^DEPT|EL|||DR4892^Chen^Patricia^A^^^MD|DR7731^Okafor^Emeka^B^^^MD||SUR||||ADM|||||VIS20240315-0047|BC|||||||||||||||||20240315141500

  ```


  Please provide the following:


  1. A Python function `parse_adt_message(raw_hl7: str) -> dict` that manually parses
  this HL7v2 message (without using hl7apy or python-hl7 libraries) and extracts:
  patient MRN, full name, date of birth, gender, full address, phone numbers, visit
  ID, admission type, assigned bed location, attending physician NPI/ID, and admitting
  physician NPI/ID.


  2. A function `adt_messages_to_dataframe(messages: list[str]) -> pd.DataFrame` that
  processes a list of such raw HL7 strings and returns a normalized DataFrame with
  appropriate column names and data types (DOB as datetime, etc.).


  3. A data quality check function `validate_adt_dataframe(df: pd.DataFrame) -> pd.DataFrame`
  that flags rows missing critical fields (MRN, DOB, visit ID) and identifies duplicate
  MRN+visit combinations, adding a `quality_flags` column with pipe-delimited issue
  codes.'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: intermediate
