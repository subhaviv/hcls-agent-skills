id: drug-repurposing-29
prompt: 'Here is test question #29 of 30:


  ---


  You are evaluating a drug repurposing candidate for **idiopathic pulmonary fibrosis
  (IPF)**, a disease with limited treatment options. Your team has identified **tofacitinib**
  (a JAK1/JAK3 inhibitor approved for rheumatoid arthritis) as a candidate based on
  transcriptomic similarity data from the Connectivity Map (CMap), where it achieved
  a connectivity score of **−0.78** against an IPF gene signature derived from 47
  fibrotic lung biopsy samples vs. 23 controls (top differentially expressed genes:
  ACTA2↑, COL1A1↑, TGFB1↑, MMP7↑, SFTPC↓, CLDN18↓).


  However, there is **conflicting evidence**: (1) JAK-STAT signaling is implicated
  in TGF-β1-driven fibrosis, supporting repurposing; (2) a published mouse bleomycin
  model study showed tofacitinib reduced fibrosis by 40% at 10 mg/kg; (3) but a retrospective
  analysis of 312 RA patients on tofacitinib found 8 cases of interstitial lung disease
  (ILD) as an adverse event (2.6% incidence), raising concern that tofacitinib may
  worsen pulmonary pathology in certain contexts.


  Given this conflicting evidence landscape, provide:

  1. A structured evidence-strength ranking using a repurposing evidence hierarchy
  framework, explicitly addressing how to weight the CMap score, animal data, and
  the adverse event signal

  2. A mechanistic reconciliation explaining why tofacitinib might both cause ILD
  in RA patients and potentially treat IPF — identifying which molecular contexts
  could explain this paradox

  3. Python pseudocode to query DGIdb for tofacitinib''s gene targets and cross-reference
  against the IPF CMap signature genes to identify mechanistic overlap

  4. A go/no-go recommendation with specific criteria that would need to be met before
  advancing to a Phase II trial'
