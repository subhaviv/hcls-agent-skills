id: multi-omics-pipeline-20
prompt: 'You are integrating multi-omics data from a pan-cancer cohort of 847 patients
  across three cancer types (LUAD n=312, BRCA n=287, COAD n=248), with RNA-seq, ATAC-seq,
  and proteomics layers. After running MOFA2 in R, you obtain 8 latent factors; Factor
  3 (R²=0.18) and Factor 6 (R²=0.11) show significant cross-cancer variation. However,
  you suspect residual batch effects because samples were processed across 4 sequencing
  centers, and ComBat-seq was applied only to RNA-seq prior to MOFA2 — ATAC-seq and
  proteomics remain uncorrected.


  **Deliverables:**


  1. **Batch correction strategy**: Explain whether it is methodologically valid to
  apply ComBat to ATAC-seq peak counts and TMT-normalized proteomics abundance matrices
  separately before re-running MOFA2, or whether a joint correction approach is preferable.
  Address the risk of overcorrection removing true biological signal in Factor 3.


  2. **MOFA2 re-analysis code**: Provide R code to re-run MOFA2 with `likelihoods
  = c("gaussian", "gaussian", "gaussian")` across all three corrected omics layers,
  setting `num_factors=10`, `spikeslab_weights=TRUE`, and saving the trained model.
  Include code to extract factor weights and variance explained per factor per omics
  layer.


  3. **Enrichment analysis**: Using `clusterProfiler` in R, write code to perform
  GSEA on the RNA-seq feature weights of Factor 3 (assuming a data frame `rna_weights_f3`
  with columns `gene_symbol` and `weight`), using the MSigDB Hallmark gene set collection
  (loaded via `msigdbr`). Set `pvalueCutoff=0.05`, `eps=0`, and produce a ranked dot
  plot of the top 15 pathways.


  4. **Feature ID harmonization**: Describe the exact steps to map ATAC-seq peak-linked
  gene symbols to Ensembl IDs using `biomaRt`, then cross-reference with UniProt accessions
  for the proteomics layer, handling the case where 340 of 4,200 peak-linked genes
  have ambiguous many-to-many Ensembl mappings.'
