id: rna-seq-analysis-23
prompt: 'You are analyzing bulk RNA-seq data from a mouse liver study comparing wild-type
  (n=4) versus *Ppara* knockout mice (n=4) under fasting conditions. You have already
  run Salmon (v1.9.0) with the `--gcBias` and `--seqBias` correction flags against
  the GRCm39 transcriptome, producing per-sample `quant.sf` files. Your collaborator
  is now asking you to set up a DESeq2 differential expression analysis using these
  Salmon outputs.


  Specifically, you need to:


  1. **Write R code** using `tximport` to load the 8 Salmon `quant.sf` files into
  R, mapping transcripts to genes using a `tx2gene` data frame (assume it is already
  loaded as `tx2gene`). Use the appropriate `type` argument and `countsFromAbundance`
  setting recommended for DESeq2 input.


  2. **Write the DESeq2 setup code** to create a `DESeqDataSet` object from the tximport
  output, define the design formula comparing knockout vs. wild-type, run the DESeq2
  pipeline, and extract results for the KO vs. WT contrast with an adjusted p-value
  threshold of 0.05.


  3. **Apply log fold-change shrinkage** using the `apeglm` method and explain in
  2–3 sentences why shrinkage is recommended before generating a volcano plot or ranking
  genes.


  4. **List two quality-control checks** you would perform on the DESeq2 object (e.g.,
  PCA, size factor inspection) before trusting the differential expression results,
  and briefly state what each check reveals.'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: easy
