id: pa-decision-automation-21
prompt: 'A regional health plan processes approximately 4,200 prior authorization
  requests per month for specialty medications. Their PA operations team has extracted
  a dataset of 18 months of historical decisions (roughly 75,600 records) with the
  following features per request: member age, diagnosis ICD-10 code, requested drug
  NDC, prescribing provider NPI, days supply, quantity requested, step therapy completion
  flag (boolean), prior treatment history count, and the final decision label (approved/denied/pending-more-info).


  Preliminary exploration shows an overall denial rate of 31%, with denials clustering
  heavily around requests missing step therapy documentation (step_therapy_flag =
  False accounts for 68% of denials) and quantity exceeding plan formulary thresholds.


  The team wants to automate initial adjudication decisions using a rules-based engine
  layered with an ML classifier for ambiguous cases, and they want to be able to explain
  individual decisions to providers.


  Please provide the following concrete deliverables:


  1. **Python pseudocode** for a two-tier decision pipeline: a deterministic rules
  engine that handles clear approvals/denials first, then routes ambiguous cases to
  an ML classifier (use scikit-learn''s GradientBoostingClassifier as the ML component).


  2. **Feature engineering recommendations**: identify at least three derived features
  from the raw fields above that would meaningfully improve classifier performance.


  3. **SHAP explainability snippet**: show how to generate and display a SHAP waterfall
  plot for a single ambiguous prediction, labeling which features pushed the decision
  toward denial.


  4. **Denial pattern summary**: given the step therapy clustering described above,
  propose two concrete policy or documentation workflow changes the health plan could
  implement to reduce preventable denials.'
target_skills:
- pa-decision-automation
domain: healthcare-ops
difficulty: easy
