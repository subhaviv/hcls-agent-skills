id: structure-based-drug-design-24
prompt: 'You are running a virtual screening campaign against PRMT7 (protein arginine
  methyltransferase 7), a recently validated oncology target. You have obtained a
  2.1 Å crystal structure (PDB: fictional code 7XKL) showing the SAM cofactor bound
  in the active site. Your compound library contains 850,000 drug-like molecules from
  the Enamine REAL database.


  **Available computational resources:** 500 CPU cores, 72-hour wall-clock limit.


  **Binding site analysis reveals:**

  - Active site volume: 312 Ų

  - Buried surface area: 78%

  - SiteScore: 0.92, DScore: 1.05

  - A cryptic allosteric pocket (180 Ų) identified by MDpocket analysis across a 200
  ns MD trajectory, located 14 Å from the SAM site at the PRMT7/substrate peptide
  interface


  **Preliminary docking of 500 known methyltransferase inhibitors** using Glide SP
  produced an early enrichment (EF1%) of only 3.2, suggesting potential induced-fit
  behavior.


  Given this scenario, provide the following:


  1. A recommended virtual screening cascade (at least 4 stages) with justification
  for each filter/method, including approximate throughput at each stage

  2. An assessment of whether to target the orthosteric SAM site, the allosteric pocket,
  or both simultaneously, with structural reasoning

  3. A specific recommendation on whether to use rigid docking, induced-fit docking
  (IFD), or ensemble docking to address the poor early enrichment — include the tradeoffs

  4. A proposed MM-GBSA rescoring protocol for your final ~500 compounds, specifying
  key parameters (solvation model, sampling method, number of MD snapshots)

  5. Two structural features you would prioritize in post-docking SAR analysis to
  distinguish true binders from docking artifacts'
target_skills:
- structure-based-drug-design
domain: protein-structure
difficulty: intermediate
