id: claims-billing-rules-16
prompt: 'A regional Medicare contractor is conducting a targeted audit of a high-volume
  orthopedic surgery practice after identifying statistical outliers in their billing
  patterns. The practice performed 847 procedures over a 6-month period, and the following
  anomalies were flagged:


  - **Modifier 59** was appended to CPT 29881 (knee arthroscopy with meniscectomy)
  in 73% of claims where CPT 29880 was also billed on the same date for the same knee

  - **Modifier 25** was used on 91% of E&M visits (99213–99215) performed on the same
  day as minor surgical procedures, compared to a specialty benchmark of 34%

  - Three providers each billed more than **24 units of distinct procedure codes on
  a single calendar day** on at least 5 separate occasions

  - Post-operative E&M visits for patients still within the **90-day global surgery
  period** for major procedures (90-day global) were billed without Modifier 24 on
  112 claims


  **Deliverables requested:**


  1. For each of the four flagged patterns, explain the specific CMS billing rule
  or NCCI edit logic being violated and whether the pattern more likely represents
  a coding error, systematic abuse, or potential fraud — with reasoning.

  2. Identify which pattern poses the highest compliance risk and why.

  3. Recommend a structured audit methodology (including sampling approach and documentation
  review criteria) to investigate the modifier 59 and modifier 25 patterns further.

  4. Draft a brief corrective action plan the practice could implement to remediate
  the global surgery period billing issue.'
target_skills:
