id: biomarker-discovery-25
prompt: 'A research team has profiled 847 treatment-naive non-small cell lung cancer
  (NSCLC) patients using RNA-seq (18,432 genes after QC) and a 92-protein plasma proteomics
  panel (Olink). The goal is to build a **predictive biomarker** (not prognostic)
  for response to pembrolizumab monotherapy, defined as RECIST 1.1 complete or partial
  response at 12 weeks (n=203 responders, n=644 non-responders). The team plans to
  use elastic net logistic regression combining both omics layers, with 10-fold cross-validation
  to select the final feature set.


  A junior analyst has already run a preliminary analysis and reports an impressive
  AUC of 0.91 on the "test set." Upon inspection, you discover that: (1) variance-based
  pre-filtering of the 18,432 RNA-seq genes was performed on the entire dataset before
  splitting, (2) protein features were imputed using k-NN imputation (k=5) on the
  full dataset, and (3) the elastic net hyperparameters (α=0.3, λ=0.08) were chosen
  by visual inspection of the full-data regularization path.


  **Please provide:**

  1. Identify and explain each data leakage source in the analyst''s pipeline, quantifying
  the likely optimism inflation where possible

  2. Design a corrected nested cross-validation pipeline (pseudocode acceptable) that
  properly handles pre-filtering, imputation, and hyperparameter tuning

  3. Recommend appropriate evaluation metrics for this specific predictive (not prognostic)
  context, including at least one metric that accounts for clinical decision thresholds

  4. Given the class imbalance (approximately 1:3 ratio), specify two concrete adjustments
  to the elastic net training procedure and justify each choice

  5. Outline minimum requirements for an external validation cohort that would support
  regulatory submission'
target_skills:
- biomarker-discovery
domain: single-cell
difficulty: intermediate
