id: cell-type-annotation-25
prompt: 'You have processed a 10x Genomics scRNA-seq dataset from 8 pediatric ALL
  (acute lymphoblastic leukemia) bone marrow samples (4 diagnosis, 4 relapse) containing
  approximately 45,000 cells after QC. Leiden clustering at resolution 0.6 produced
  22 clusters. You want to perform hierarchical cell type annotation: first distinguish
  broad lineages (T cell, B cell, myeloid, erythroid, stromal), then sub-annotate
  immune populations using CellTypist with majority voting.


  Your AnnData object is stored as `adata` with raw counts in `adata.layers["counts"]`
  and scVI-normalized log1p values in `adata.X`. The UMAP and neighbors graph are
  already computed.


  **Deliverables:**


  1. Write Python code to run CellTypist using the `Immune_All_Low.pkl` model with
  `majority_voting=True` at the cluster level (using `leiden` as the partition key).
  Store results back into `adata.obs`.


  2. After automated annotation, some clusters show ambiguous labels. Write code to
  generate a dotplot showing expression of these canonical marker genes across all
  22 clusters: `CD3E`, `CD19`, `MS4A1`, `CD14`, `LYZ`, `GYPA`, `CD34`, `MPO`, `PAX5`,
  `DNTT` — use `scanpy.pl.dotplot` with `var_group_positions` to visually group markers
  by lineage.


  3. Write a function `resolve_ambiguous_clusters(adata, ambiguous_cluster_ids, manual_labels_dict)`
  that overrides CellTypist labels for specific clusters with manually curated labels,
  updates `adata.obs["final_annotation"]`, and prints a summary table showing old
  vs. new labels with cell counts.


  4. Briefly explain when majority voting can fail in tumor/normal mixed samples and
  what alternative strategy you would use.'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: intermediate
