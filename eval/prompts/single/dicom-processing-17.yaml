id: dicom-processing-17
prompt: 'You are a neuroimaging researcher processing a dataset of 847 T1-weighted
  MPRAGE scans collected across three sites (Boston General, Seattle Medical Center,
  and Austin University Hospital) for a multi-site depression study. The scans were
  acquired on different scanner models: Siemens Prisma (3T), GE Discovery MR750 (3T),
  and Philips Ingenia (3T). Your task is to convert all DICOM series to NIfTI format
  using dcm2niix and organize the output according to BIDS specification.


  During a pilot conversion of 20 subjects, you notice the following issues:

  - The Philips scanner produces multi-echo DICOMs where dcm2niix generates unexpected
  split volumes

  - Several GE scans have inconsistent `SeriesDescription` tags, causing naming conflicts
  in the output

  - The Siemens scans contain a non-standard private tag (0019,109C) that stores the
  slice timing information needed for preprocessing


  Your deliverables should include:


  1. A complete bash script using dcm2niix with appropriate flags to handle multi-site
  conversion, including the `-m`, `-b`, and `-z` options with justification for your
  chosen parameters

  2. A Python script using pydicom to pre-inspect DICOM headers and standardize the
  `SeriesDescription` tag across GE scans before conversion

  3. An explanation of how to extract the Siemens slice timing from private tag (0019,109C)
  using pydicom and inject it into the resulting NIfTI sidecar JSON

  4. A description of the BIDS directory structure expected after conversion, including
  how to handle the multi-site data using the `ses-` entity


  Assume Python 3.9, dcm2niix v1.0.20230411, and that all DICOM files are organized
  per-subject in directories named `sub-XXX/`.'
target_skills:
- dicom-processing
domain: imaging
difficulty: intermediate
