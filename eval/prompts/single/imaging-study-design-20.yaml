id: imaging-study-design-20
prompt: 'You are coordinating a 12-site longitudinal diffusion MRI study tracking
  white matter microstructure changes in 340 patients with early-stage Huntington''s
  disease (CAG repeat 40–50) over 36 months, with scans at baseline, 12, 24, and 36
  months. Sites use a mix of Siemens Prisma (7 sites), GE Discovery MR750 (3 sites),
  and Philips Ingenia (2 sites) scanners. The acquisition protocol specifies b=1000
  s/mm² with 64 directions, but post-hoc audit reveals that 2 GE sites inadvertently
  used 32 directions at baseline only, and one Philips site has a systematic 12% higher
  noise floor due to a misconfigured receiver coil. Your primary biomarker candidates
  are fractional anisotropy (FA) and mean diffusivity (MD) in the caudate and putamen,
  extracted via FSL''s TBSS pipeline registered to MNI space.


  Please provide: (1) a decision framework for whether to retain or exclude the two
  GE sites'' baseline data, including what sensitivity analyses you would run; (2)
  a scanner harmonization strategy specifying whether to apply ComBat in cross-sectional
  or longitudinal form, with justification given the unbalanced missing-timepoint
  structure; (3) a concrete preprocessing decision about the Philips coil artifact—whether
  to apply retrospective denoising (specify algorithm and parameters) or exclude—with
  your reasoning; (4) a critique of using TBSS in MNI space for this subcortical target
  versus a native-space ROI approach, and your final recommendation; and (5) a Python
  code snippet implementing longitudinal ComBat (neuroCombat) for FA values with the
  site, scanner vendor, and CAG repeat length as covariates.'
