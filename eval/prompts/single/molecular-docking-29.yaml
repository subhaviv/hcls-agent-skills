id: molecular-docking-29
prompt: 'You are setting up a structure-based virtual screening campaign against the
  allosteric pocket of a fictional kinase **CLK7** (PDB: 7XMP, resolution 1.9 Å).
  During validation, you performed redocking of the co-crystallized inhibitor **CMP-441**
  and obtained an RMSD of 3.8 Å — well above the 2.0 Å acceptance threshold. Inspection
  reveals the crystal structure contains a disulfide bond between Cys147 and Cys203,
  and CMP-441 has a chiral center at C4 that was not explicitly defined in the downloaded
  SDF file. Your grid box was centered at coordinates (x=12.5, y=-8.3, z=44.1) with
  dimensions 20×20×20 Å based on the co-crystallized ligand''s centroid.


  Additionally, your colleague used `obabel` with default settings to prepare both
  the receptor PDBQT and the ligand PDBQT, and Vina exhaustiveness was set to 4.


  Given this scenario, provide the following deliverables:


  1. **Root cause analysis**: Identify all likely contributors to the poor redocking
  RMSD (at least 4 distinct issues), ranking them by probable impact.


  2. **Corrected preparation workflow**: Write explicit shell commands using ADFR
  Suite (`prepare_receptor`) and Meeko (`mk_prepare_ligand.py`) to correctly prepare
  both receptor and ligand, explicitly handling the disulfide bond and chirality issues.


  3. **Grid box validation**: Explain whether the 20×20×20 Å box is appropriate for
  CMP-441 (MW = 487 Da, longest axis ~18 Å) and provide a corrected `config.txt` for
  Vina if needed.


  4. **Re-validation protocol**: Define pass/fail criteria and a minimal 5-compound
  test set strategy to confirm the corrected setup before launching full screening.'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: hard
