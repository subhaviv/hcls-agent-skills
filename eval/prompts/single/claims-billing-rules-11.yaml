id: claims-billing-rules-11
prompt: 'A regional health plan is conducting a routine claims audit and has flagged
  a high-volume primary care physician (Dr. Marcus Webb, NPI: 1234567890) for potential
  E&M upcoding. Over a 90-day audit period, the plan extracted the following billing
  pattern from 450 patient encounters:


  - CPT 99213 (Level 3 E&M): 12% of visits (54 claims)

  - CPT 99214 (Level 4 E&M): 71% of visits (320 claims)

  - CPT 99215 (Level 5 E&M): 17% of visits (76 claims)


  For comparison, the regional peer benchmark for a primary care physician shows:
  99213 at 35%, 99214 at 48%, 99215 at 8%.


  Additionally, the auditor noticed that 89 of the 99214 claims were billed on the
  same date of service with CPT 99213 for the same patient, and 43 claims included
  Modifier 25 appended to a 99214 alongside a minor procedure (CPT 11200 – removal
  of skin tags).


  Please provide the following deliverables:


  1. **Upcoding Analysis**: Explain what the billing distribution deviation from peer
  benchmarks suggests and how CMS defines upcoding in this context.

  2. **Duplicate Billing Review**: Assess the 89 same-day 99213 + 99214 claims and
  identify the applicable NCCI edit rule that would govern this scenario.

  3. **Modifier 25 Evaluation**: Evaluate whether the 43 Modifier 25 uses alongside
  CPT 11200 are likely appropriate or potentially abusive, citing relevant CMS guidelines.

  4. **Fraud vs. Coding Error Distinction**: Based on the overall pattern, outline
  the criteria an investigator would use to distinguish systematic fraud from documentation-based
  coding errors.'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: easy
