id: scrna-seq-pipeline-24
prompt: 'You are analyzing a single-cell RNA-seq dataset from a colorectal cancer
  study involving 8 patients (4 tumor, 4 adjacent normal tissue). After running CellRanger,
  you have 8 separate `filtered_feature_bc_matrix` directories. Initial quality checks
  reveal significant batch effects between patients, with tumor samples showing higher
  mitochondrial gene content (average 15%) compared to normal samples (average 8%).


  Your analysis goals are:


  1. **Data loading and QC**: Write Python/Scanpy code to load all 8 samples, add
  sample metadata (patient_id, condition: tumor/normal), and concatenate into a single
  AnnData object. Apply adaptive QC thresholds: filter cells with <200 or >6000 genes,
  >20% mitochondrial reads for tumor samples but >15% for normal samples, and remove
  doublets using Scrublet with a threshold of 0.25.


  2. **Normalization and feature selection**: After QC, normalize to 10,000 counts
  per cell, log1p transform, and identify the top 3,000 highly variable genes using
  the `seurat_v3` flavor while accounting for the batch variable (patient_id).


  3. **Batch correction**: Implement Harmony integration on the PCA embeddings (using
  50 PCs) to correct for patient-level batch effects. Explain why you would choose
  Harmony over scVI for this dataset size and structure.


  4. **Clustering and visualization**: Build a neighborhood graph (n_neighbors=15,
  n_pcs=30) on the Harmony-corrected embeddings, run Leiden clustering at resolution
  0.5, and generate a UMAP colored by cluster, condition, and patient_id.


  Provide complete, runnable code for all steps and include expected cell counts after
  each filtering step assuming you start with approximately 45,000 total cells.'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: intermediate
