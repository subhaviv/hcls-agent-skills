id: imaging-study-design-19
prompt: 'You are coordinating a 6-site longitudinal diffusion MRI study tracking white
  matter microstructure changes in 340 patients with early-stage multiple sclerosis
  (MS) over 24 months (baseline, 6, 12, 24 months). Each site uses a different scanner:
  three Siemens Prisma (3T), two GE Discovery MR750 (3T), and one Philips Ingenia
  (3T). The acquisition protocol was harmonized to b=1000 s/mm² with 64 directions
  and 2mm isotropic voxels, but retrospective audit reveals that Site 4 (GE) used
  a GRAPPA factor of 3 while all others used factor 2, and Site 6 (Philips) applied
  an in-scanner smoothing kernel (FWHM ~1.2mm) that cannot be disabled.


  Your primary biomarkers are fractional anisotropy (FA) and mean diffusivity (MD)
  in the corticospinal tract (CST) and corpus callosum genu, extracted via TBSS. You
  have 18 healthy controls per site for harmonization reference.


  Provide the following:


  1. A detailed preprocessing pipeline (FSL-based) including eddy current correction,
  susceptibility distortion correction (you have reverse phase-encode b0s at all sites),
  and quality control checkpoints with specific rejection criteria (e.g., motion thresholds,
  SNR cutoffs).


  2. A statistical harmonization strategy addressing the GRAPPA and smoothing confounds
  specifically — evaluate whether ComBat, longitudinal ComBat (longComBat), or a mixed-effects
  covariate approach is most appropriate given the site-specific acquisition differences,
  and justify your choice.


  3. A registration strategy specifying whether to use MNI space or a study-specific
  template, and how to handle the TBSS skeleton threshold given the smoothing artifact
  at Site 6.


  4. Pseudocode for a quality control flag that detects excessive within-subject FA
  variability across timepoints that likely reflects registration failure rather than
  true biological change.'
