id: molecular-docking-23
prompt: 'You are setting up a molecular docking campaign to identify inhibitors of
  the fictional kinase **DYRK5B** (PDB ID: 7XPQ, resolution 1.9 Å). The crystal structure
  contains a co-crystallized ligand **STX-441** bound in the ATP-binding pocket. Before
  launching a virtual screen of 8,500 compounds, your team lead requires a validated
  docking protocol confirmed by redocking STX-441 with an acceptable RMSD threshold.


  You have the following information:

  - The co-crystallized ligand STX-441 centroid coordinates: x = 14.3, y = -8.7, z
  = 22.1

  - The binding pocket spans approximately 18 Å × 16 Å × 20 Å

  - You plan to use **AutoDock Vina 1.2** with exhaustiveness = 16

  - Receptor preparation will use **ADFR Suite (prepare_receptor)**

  - Ligand preparation will use **Meeko**


  Please provide the following deliverables:


  1. **A step-by-step redocking validation protocol** — describe how to extract STX-441
  from the PDB file, prepare it with Meeko, and run the redocking experiment

  2. **The Vina configuration file** (`vina_config.txt`) with correct grid box parameters
  derived from the provided coordinates and dimensions

  3. **A brief interpretation guide** — what RMSD cutoff is considered acceptable
  for redocking validation, and what Vina score range would you expect for a well-docked
  ATP-competitive kinase inhibitor?

  4. **A Python snippet** using `subprocess` to automate the Vina redocking run using
  the config file'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: easy
