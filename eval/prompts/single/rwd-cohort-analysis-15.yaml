id: rwd-cohort-analysis-15
prompt: 'Here is test question #15 of 30:


  ---


  You are analyzing a claims database of 847,000 commercially insured patients to
  study cardiovascular outcomes in patients initiating SGLT2 inhibitors versus DPP-4
  inhibitors for type 2 diabetes. Your cohort identification uses ICD-10 code E11.x
  for T2DM, NDC codes for empagliflozin/dapagliflozin/canagliflozin (SGLT2i group,
  n=12,340) and sitagliptin/saxagliptin/alogliptin (DPP4i group, n=18,920), with a
  180-day washout period and 12-month baseline lookback. The primary outcome is a
  3-point MACE event (MI: I21.x, stroke: I63.x, CV death: I46.x). Follow-up ranges
  from 6 to 36 months.


  Please provide:


  1. **Python code** to estimate propensity scores using logistic regression on 15
  baseline covariates (age, sex, HbA1c proxy via lab codes, hypertension I10, CKD
  N18.x, prior MI, statin use, insulin use, BMI proxy, Charlson comorbidity index,
  prior hospitalization count, ACE/ARB use, beta-blocker use, region, insurance type),
  then assess balance using standardized mean differences (SMD), flagging any covariate
  with SMD > 0.10 after 1:1 nearest-neighbor matching with caliper = 0.02.


  2. **Python code** for Kaplan-Meier curves comparing time-to-first-MACE between
  matched cohorts, including log-rank test p-value and median survival time with 95%
  CIs.


  3. **Python code** for a Cox proportional hazards model on the matched cohort, then
  test the proportional hazards assumption using Schoenfeld residuals, and if violated
  for any covariate, implement a time-interaction term solution.


  4. **Interpretation guidance** on how to handle informative censoring due to insurance
  disenrollment in this commercial claims context.'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: intermediate
