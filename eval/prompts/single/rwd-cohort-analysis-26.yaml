id: rwd-cohort-analysis-26
prompt: 'You are analyzing a retrospective cohort study using commercial claims data
  (2018–2022) to compare cardiovascular outcomes between patients initiating SGLT2
  inhibitors versus GLP-1 receptor agonists for type 2 diabetes management. Your dataset
  contains 847,293 patients after initial extraction.


  **Cohort criteria:**

  - Index date: first pharmacy claim for either drug class (NDC codes provided)

  - Washout period: 12 months with no prior claims for either drug class

  - Inclusion: T2DM diagnosis (ICD-10: E11.xx) within 6 months pre-index, age 40–80

  - Exclusion: ESRD (N18.6), prior MACE (ICD-10: I21.xx, I63.xx) within 12 months

  - After applying criteria: SGLT2i cohort n=41,847; GLP-1 cohort n=38,293


  **Primary outcome:** 3-point MACE (MI, stroke, cardiovascular death) identified
  via ICD-10 codes

  **Follow-up:** Variable, censored at disenrollment or December 31, 2022


  **Covariates for propensity score:** age, sex, baseline HbA1c (proxy via CPT 83036),
  Charlson Comorbidity Index, prior metformin use, hypertension (I10), hyperlipidemia
  (E78.xx), prior hospitalization count


  Please provide:

  1. Python code implementing propensity score estimation using logistic regression
  with SMD diagnostics before/after matching (target SMD < 0.1)

  2. Kaplan-Meier curves with log-rank test for the matched cohort

  3. Cox proportional hazards model with Schoenfeld residuals test for the PH assumption

  4. Interpretation of results if the Schoenfeld test yields p=0.03 for the treatment
  variable, and recommended remediation strategies'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: intermediate
