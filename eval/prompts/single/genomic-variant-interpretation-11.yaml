id: genomic-variant-interpretation-11
prompt: 'A clinical genetics laboratory is evaluating a heterozygous variant in the
  **BRCA2** gene identified in a 42-year-old woman with a personal history of breast
  cancer and a family history of ovarian cancer in her mother.


  **Variant details:**

  - Genomic position: chr13:32,338,763 C>T (GRCh38)

  - HGVS notation: NM_000059.4:c.5946delT (frameshift) — *Note: treat this as a truncating
  variant for classification purposes*

  - gnomAD v3.1 allele frequency: 0.000008 (2 heterozygous alleles observed, 0 homozygous)

  - ClinVar submissions: 3 submissions — 2 classified as "Pathogenic," 1 classified
  as "Uncertain Significance" (no assertion criteria provided)

  - Functional studies: None available for this specific variant

  - Segregation data: Not yet collected


  **Please provide the following:**

  1. Apply the ACMG/AMP 2015 five-tier classification framework to this variant, explicitly
  naming each criterion that applies (e.g., PVS1, PS1, PM2, etc.) and stating whether
  it is met or not met with a brief justification.

  2. Determine the final variant classification based on the combined criteria.

  3. Explain how the conflicting ClinVar submission (the one VUS with no assertion
  criteria) should be weighted in your analysis.

  4. Identify what additional evidence, if collected, would most strengthen or change
  the current classification.'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: easy
