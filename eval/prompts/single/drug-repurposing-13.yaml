id: drug-repurposing-13
prompt: 'A small biotech company is evaluating metformin (a type 2 diabetes drug)
  for potential repurposing in non-alcoholic steatohepatitis (NASH). Their medicinal
  chemistry team has identified that metformin''s primary mechanism involves AMPK
  activation and downstream mTORC1 inhibition. Preliminary internal data shows that
  in a cohort of 847 T2D patients who were also diagnosed with NASH, those on metformin
  (n=412) showed a 23% reduction in ALT levels and a 0.4-point improvement in NAFLD
  Activity Score compared to controls (n=435) over 18 months.


  Please provide the following:


  1. **Evidence ranking**: Using a standard repurposing evidence hierarchy, classify
  the strength of this retrospective cohort finding and explain what level of evidence
  would be needed to advance to IND filing.


  2. **Mechanism-of-action overlap analysis**: Identify at least three molecular pathways
  through which AMPK activation could plausibly address NASH pathophysiology, citing
  relevant target genes (e.g., FASN, SREBP1, CPT1A).


  3. **Database query strategy**: Describe a step-by-step approach to query DGIdb
  and OpenTargets to validate metformin-NASH target interactions, including which
  specific search terms, filters, and evidence score thresholds (e.g., OpenTargets
  association score ≥ 0.3) you would apply.


  4. **Translatability assessment**: List three key translational risks specific to
  this metformin-NASH repurposing scenario and suggest one mitigation strategy for
  each.'
target_skills:
- drug-repurposing
domain: drug-discovery
difficulty: easy
