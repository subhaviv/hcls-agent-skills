id: genomic-variant-interpretation-15
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory reports a variant in BRCA2: c.7007G>A
  (p.Arg2336His). The following evidence is available:


  - gnomAD v3.1 allele frequency: 0.000082 (12 heterozygotes, 0 homozygotes)

  - ClinVar submissions: 2× VUS (both from clinical labs, no functional data cited),
  0× pathogenic/benign

  - REVEL score: 0.61

  - CADD Phred score: 24.3

  - The amino acid position Arg2336 is NOT within a known functional domain (OB fold,
  DNA-binding domain) per UniProt annotations

  - Co-segregation data: variant present in 2 affected maternal relatives (mother
  with breast cancer age 42, aunt with ovarian cancer age 55) and absent in 1 unaffected
  maternal relative age 68

  - No functional studies exist for this specific variant

  - BRCA2 has a well-established gene-disease relationship with hereditary breast/ovarian
  cancer (ClinGen: Definitive)


  Please provide the following:

  1. Apply each relevant ACMG/AMP 2015 criteria (PS, PM, PP, BS, BP codes) systematically,
  specifying whether each criterion is met, not met, or uncertain, with justification

  2. Assign a final five-tier classification with confidence level

  3. Identify the single piece of additional evidence that would most efficiently
  resolve the current classification uncertainty

  4. Explain how the co-segregation data should be quantitatively weighted using LOD
  score approximation, and whether it reaches the threshold for PS3 or PP1 level support'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: intermediate
