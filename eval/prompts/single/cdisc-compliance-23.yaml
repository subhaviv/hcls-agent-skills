id: cdisc-compliance-23
prompt: 'You are preparing SDTM datasets for an FDA submission of a Phase III oncology
  trial (Study ONC-2847) enrolling 312 patients. During data review, you discover
  that the laboratory domain (LB) contains several non-standard test codes that were
  collected using a sponsor-defined panel, including three biomarker assays: VEGFR2_EXP
  (VEGFR2 expression by IHC), BRCA_MUT (BRCA1/2 mutation status by NGS), and TMB_SCORE
  (tumor mutational burden). These values do not map to any existing CDISC Controlled
  Terminology codes in the LB domain test code list (LBTESTCD).


  Additionally, the study team wants to store the laboratory reference range source
  (either "Central Lab" or "Local Lab") and the assay kit lot number for each result
  — neither of which has a standard SDTM variable in the LB domain.


  Please provide the following:


  1. **LBTESTCD mapping guidance**: Explain how to handle the three non-standard biomarker
  test codes within SDTM LB, including whether sponsor-defined extensible terminology
  is permitted and what naming conventions apply (character limits, formatting rules).


  2. **SUPPQUAL decision**: Determine whether the reference range source and assay
  kit lot number should be stored in SUPPLB, and provide the correct SUPPQUAL variable
  names (QNAM values) following CDISC conventions, with brief justification.


  3. **Define.xml requirements**: Describe what additional metadata entries are required
  in define.xml to document both the non-standard LBTESTCD values and the SUPPLB QNAM
  variables, specifically referencing value-level metadata and controlled terminology
  annotations.


  4. **Pinnacle 21 impact**: Identify which Pinnacle 21 validation rules are most
  likely to trigger for these non-standard codes and supplemental variables, and classify
  each finding as an Error, Warning, or Notice.'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: easy
