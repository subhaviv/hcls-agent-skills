id: imaging-study-design-16
prompt: 'A multicenter glioblastoma trial (n=180 patients across 6 sites) is collecting
  dynamic susceptibility contrast (DSC) perfusion MRI at baseline and 8 weeks post-treatment
  to evaluate rCBV as an imaging biomarker of treatment response. Sites use a mix
  of 1.5T and 3T scanners from three vendors (GE, Siemens, Philips), with varying
  flip angles (35° vs 60°) and echo times (30ms vs 40ms). The study coordinator has
  flagged two problems: (1) preliminary rCBV maps show a systematic 15-20% offset
  between 1.5T and 3T acquisitions even after standard leakage correction, and (2)
  three sites burned patient initials and scan dates directly into the DICOM pixel
  data of the perfusion source images.


  Please provide:


  1. A concrete scanner harmonization strategy for the rCBV maps, specifying whether
  ComBat or an acquisition-parameter-based normalization approach is more appropriate
  here, and why — include the key covariates to include in any statistical harmonization
  model.


  2. A preprocessing pipeline outline (ordered steps) for the DSC data that addresses
  the flip-angle and TE variability before rCBV computation, referencing specific
  correction methods.


  3. A technical approach for detecting and remediating the burned-in PHI in the DICOM
  pixel data across ~12,000 image files, including at least one open-source tool recommendation
  and a quality-control step to verify remediation completeness.


  4. A brief power analysis consideration: given the 15-20% inter-site rCBV offset,
  estimate how this unharmonized variance would inflate the required sample size for
  detecting a 25% rCBV reduction as a treatment response marker (assume 80% power,
  α=0.05, and a within-site SD of 18%).'
