id: biomarker-discovery-28
prompt: 'Here is test question #28:


  ---


  You are developing a **predictive biomarker** to identify which early-stage non-small
  cell lung cancer (NSCLC) patients will respond to adjuvant immunotherapy (pembrolizumab)
  versus those who will not, using a retrospective cohort of 310 patients (142 responders,
  168 non-responders). Your dataset includes: (1) bulk RNA-seq with 18,400 genes,
  (2) 47 clinical/pathological variables, and (3) a pre-computed 18-gene "immune activation
  score" (IAS-18) previously published in a different cancer type. A colleague suggests
  simply combining LASSO-selected RNA-seq features with the IAS-18 score and the clinical
  variables into a single logistic regression, then using 5-fold cross-validation
  to report AUC. You suspect this approach has multiple critical flaws.


  **Deliverables required:**


  1. Identify **at least four distinct methodological errors** in the proposed approach,
  explaining why each constitutes a problem specific to predictive (not prognostic)
  biomarker development.


  2. Design a **corrected analysis pipeline** that addresses each flaw, specifying
  the exact cross-validation architecture, feature selection strategy, and how to
  handle the pre-computed IAS-18 score without introducing leakage.


  3. Provide **Python pseudocode** (using scikit-learn or similar) implementing nested
  cross-validation with an appropriate leakage-safe pipeline for this mixed data type
  (RNA-seq + clinical).


  4. Recommend **two complementary evaluation metrics** beyond standard AUC that are
  specifically appropriate for assessing a predictive (treatment-selection) biomarker,
  and explain why each is more informative than AUC alone in this context.


  5. Specify the **minimum external validation requirements** this biomarker would
  need to meet before being considered clinically actionable.'
