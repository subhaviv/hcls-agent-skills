id: scrna-seq-pipeline-30
prompt: 'You are analyzing a large-scale scRNA-seq dataset from a longitudinal study
  of 12 multiple sclerosis patients (6 treatment-naive, 6 post-interferon-beta treatment)
  across 3 time points (baseline, 6 months, 12 months), totaling 36 samples processed
  across 4 different 10X Genomics library preparation batches. After CellRanger alignment,
  you have 36 `filtered_feature_bc_matrix` directories ready for loading. Initial
  Scrublet analysis flagged unusually high doublet rates (18-25%) in batch 3 samples
  specifically, and QC metrics show batch 4 has systematically lower median genes
  per cell (1,200 genes) compared to batches 1-2 (2,800 genes), despite similar cell
  counts (~4,500 cells/sample).


  You need to:


  1. Write a complete Scanpy pipeline that loads all 36 samples, adds metadata (patient_id,
  timepoint, treatment_group, batch), and applies **sample-aware** QC thresholds rather
  than global cutoffs — specifically using MAD-based filtering (3 MADs from median)
  per sample for `n_genes_by_counts`, `total_counts`, and `pct_counts_mt`.


  2. Given the conflicting evidence (batch 3 doublet issues vs. batch 4 quality issues),
  recommend and implement a strategy to decide whether to exclude entire batches or
  salvage them, including diagnostic plots (violin plots per batch, doublet score
  distributions, knee plots for library complexity).


  3. After QC, implement both Harmony and scVI integration, then provide code to quantitatively
  compare their integration quality using **three specific metrics**: LISI score,
  kBET, and silhouette score against batch labels — and explain which method you would
  trust more given the biological complexity of this dataset and why.'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: hard
