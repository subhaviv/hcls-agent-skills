id: multi-omics-pipeline-18
prompt: 'You are integrating multi-omics data from a pancreatic ductal adenocarcinoma
  (PDAC) cohort of 87 patients with matched RNA-seq, proteomics (TMT-labeled, 10-plex),
  and phosphoproteomics layers. Your RNA-seq data uses Ensembl gene IDs (GRCh38.p13),
  proteomics uses UniProt accessions, and phosphoproteomics uses a custom "GENE_S123"
  phosphosite notation. Before running MOFA2, you discover that batch correction is
  incomplete: RNA-seq has 3 batches (sequencing runs), while proteomics has 2 batches
  (TMT experiments), and the batches are **not** balanced — batch 3 of RNA-seq contains
  only 11 tumor samples with no matched normals, violating ComBat''s assumption of
  balanced design.


  Additionally, after running MOFA2 with 6 factors, Factor 2 (explaining 8.3% variance)
  loads heavily on 47 phosphosites involving kinases EGFR, KRAS, and CDK1, but these
  phosphosite IDs fail to map to any Ensembl or UniProt identifier using standard
  biomaRt queries due to non-canonical site annotations.


  Please provide:

  1. R code using `sva::ComBat` that handles the unbalanced batch design for RNA-seq,
  including appropriate model matrix construction with a preservation covariate for
  tumor/normal status

  2. A Python pipeline using `mofapy2` that harmonizes all three omics layers into
  a single feature namespace before model training, including a regex-based parser
  for the phosphosite notation

  3. A strategy and code for resolving the 47 unmapped phosphosites using PhosphoSitePlus
  flat files and manual UniProt ID mapping, then re-running `clusterProfiler::gseKEGG`
  on the Factor 2 gene weights

  4. Recommendations for whether Factor 2 represents a biologically meaningful signal
  or a technical artifact, given the mapping failures'
target_skills:
- multi-omics-pipeline
domain: multi-omics
difficulty: hard
