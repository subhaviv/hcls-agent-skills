id: imaging-study-design-21
prompt: 'A research team at Westbrook Medical Center is planning a multi-site diffusion
  MRI study to investigate white matter microstructure changes in early Alzheimer''s
  disease. They have enrolled 85 patients with mild cognitive impairment (MCI) and
  90 healthy controls across three imaging sites: Site A uses a Siemens Prisma 3T
  scanner, Site B uses a GE Discovery MR750 3T scanner, and Site C uses a Philips
  Ingenia 3T scanner. All sites will acquire DTI data with b=1000 s/mm² using 32 diffusion
  directions, but the TE/TR values differ slightly across sites (Site A: TE/TR = 80/8000
  ms, Site B: TE/TR = 85/8200 ms, Site C: TE/TR = 78/7800 ms).


  The team wants to use fractional anisotropy (FA) and mean diffusivity (MD) as primary
  imaging biomarkers extracted from the TBSS (Tract-Based Spatial Statistics) pipeline.
  They are concerned about scanner-related variability confounding their group comparisons.


  Please provide:

  1. A brief explanation of why scanner harmonization is necessary for this specific
  study design and which biomarker (FA or MD) is likely more susceptible to cross-scanner
  variability

  2. A concrete recommendation for whether to apply ComBat harmonization before or
  after TBSS skeleton projection, with justification

  3. A short Python code snippet (using the neuroCombat library) demonstrating how
  to apply ComBat to a feature matrix of shape (175 subjects × 48 ROI FA values),
  including site as the batch variable and age/diagnosis as covariates to preserve

  4. One quality control metric the team should compute per subject before harmonization
  to identify outlier scans'
target_skills:
- imaging-study-design
domain: imaging
difficulty: easy
