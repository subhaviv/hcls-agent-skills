id: claims-analytics-20
prompt: 'Here is test question #20 of 30:


  ---


  A regional Medicare Advantage plan has flagged a group of 12 providers (specialties:
  internal medicine, family practice, and geriatrics) for potential E&M upcoding over
  a 24-month period (Jan 2022–Dec 2023). You have access to a claims dataset with
  the following columns: `claim_id`, `provider_npi`, `service_date`, `place_of_service`,
  `cpt_code`, `icd10_primary`, `icd10_secondary`, `billed_charges`, `allowed_amount`,
  `units`, `patient_age`, `patient_id`. The flagged providers collectively billed
  CPT 99215 at a rate of 68% of all office visit E&M codes (99211–99215), compared
  to a specialty peer benchmark of 22%. Three providers also show CPT 99215 billed
  alongside 99214 for the same patient on the same date.


  Deliver the following:


  1. **Python code** using pandas to compute each provider''s E&M code distribution
  (99211–99215) and calculate a chi-square statistic comparing each provider''s distribution
  against the peer benchmark distribution (22%/18%/28%/20%/12% for 99211–99215 respectively).


  2. **SQL query** to detect same-day duplicate E&M billing (same `patient_id`, `provider_npi`,
  `service_date`, and overlapping E&M code families) including cases where both 99214
  and 99215 appear together.


  3. **Anomaly scoring logic** in Python that combines the chi-square p-value, the
  99215 upcoding ratio, and a "impossible units" flag (units > 1 for E&M codes) into
  a composite fraud risk score (0–100) with configurable weights.


  4. A brief explanation of which NCCI Medically Unlikely Edits (MUEs) apply to CPT
  99215 and how to programmatically enforce them against the units column.'
