id: dicom-processing-20
prompt: 'You are processing a multi-echo fMRI DICOM series from a Siemens Prisma scanner
  (software version VE11C) that was acquired with the following parameters: TR=2000ms,
  5 echo times (12ms, 28ms, 44ms, 60ms, 76ms), 72 slices, multiband acceleration factor=4,
  and 300 volumes. The DICOM files are stored in a flat directory (no subdirectories)
  containing 108,000 files total, mixing all echoes together. Each DICOM file has
  the EchoTime tag (0018,0081) populated correctly, but the ImageComments tag (0020,4000)
  contains burned-in PHI in the format "PT:[LastName]_[MRN]_Echo[N]".


  Your task is to:


  1. Write a Python preprocessing script using pydicom that scans the flat directory,
  reads the EchoTime and SeriesInstanceUID tags, and organizes files into echo-specific
  subdirectories (echo-1 through echo-5) while simultaneously anonymizing the ImageComments
  tag and replacing the PatientName (0010,0010), PatientID (0010,0020), and PatientBirthDate
  (0010,0030) tags with BIDS-compliant placeholder values (sub-07, sub-07, and an
  empty string respectively).


  2. Provide the exact dcm2niix command(s) needed to convert each echo subdirectory
  into separate NIfTI files with BIDS-compatible naming conventions, ensuring the
  echo index is correctly embedded in the output filename.


  3. Explain why running dcm2niix directly on the original flat directory would likely
  fail or produce incorrect output for this multi-echo dataset, referencing at least
  two specific dcm2niix behaviors related to mixed-echo DICOM series.


  4. Describe how you would validate that all 300 volumes per echo were correctly
  captured in each output NIfTI file using nibabel, including a code snippet checking
  the 4D array dimensions.'
target_skills:
- dicom-processing
domain: imaging
difficulty: hard
