id: pharmacoepidemiology-17
prompt: 'A pharmacoepidemiology team is using a large US commercial claims database
  (n = 2.1 million patients with type 2 diabetes, 2015–2022) to study whether GLP-1
  receptor agonists (GLP-1 RAs) reduce the risk of major adverse cardiovascular events
  (MACE) compared to DPP-4 inhibitors. The study team has proposed the following design:
  they identify all patients who filled at least one prescription for either drug
  class during the study period, define cohort entry as the first prescription date,
  and follow patients until MACE, disenrollment, or end of study. Patients frequently
  switch between drug classes and add other antidiabetic agents over follow-up. The
  team is concerned about three methodological issues: (1) time-varying confounding
  by HbA1c levels and concomitant medication use, which are affected by prior treatment
  and also predict future treatment changes and MACE; (2) potential immortal time
  bias if a 180-day baseline covariate assessment window is used; and (3) confounding
  by indication, since GLP-1 RAs are preferentially prescribed to patients with established
  cardiovascular disease.


  Please provide:

  1. A specific explanation of how immortal time bias would arise in this design and
  how to correct it using a new-user cohort definition with a clean washout period
  (specify washout duration and rationale).

  2. A description of why marginal structural models with stabilized IPTW are preferred
  over standard Cox regression for handling time-varying confounding in this setting,
  including the assumptions required.

  3. Skeleton R code using the `WeightIt` and `survival` packages to implement a time-varying
  IPTW-weighted Cox model.

  4. An approach to quantify residual confounding by indication using E-values, given
  an observed hazard ratio of 0.78 (95% CI: 0.71–0.86).'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: intermediate
