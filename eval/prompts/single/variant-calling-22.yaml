id: variant-calling-22
prompt: 'You are setting up a germline variant calling pipeline for a small research
  cohort of 18 whole-exome sequencing (WES) samples from patients with a rare connective
  tissue disorder. Your samples have already been aligned to GRCh38 using BWA-MEM2,
  and you have per-sample BAM files that have been sorted, duplicate-marked, and base
  quality score recalibrated (BQSR). You want to call variants using GATK HaplotypeCaller
  in GVCF mode followed by joint genotyping.


  After joint genotyping, you need to decide on a variant filtering strategy. A colleague
  suggests using VQSR, while another recommends hard filters given the cohort size.


  Please provide the following deliverables:


  1. **Filtering recommendation**: Explain which filtering approach (VQSR vs. hard
  filters) is more appropriate for this 18-sample WES cohort and why, referencing
  GATK''s own guidelines on minimum variant counts.


  2. **Hard filter thresholds**: If hard filters are the appropriate choice, provide
  the specific recommended GATK hard filter expressions for both SNVs and indels (e.g.,
  QD, FS, MQ, MQRankSum, ReadPosRankSum, SOR), including the exact threshold values.


  3. **GATK command**: Write a complete `gatk VariantFiltration` command for SNVs
  that applies the recommended hard filters to a file called `cohort_genotyped.vcf.gz`,
  outputs to `cohort_snvs_filtered.vcf.gz`, and includes the `--filter-name` labels
  following GATK naming conventions.


  4. **Brief rationale**: In 2-3 sentences, explain why VQSR would be problematic
  for this specific dataset even if the user wanted to use it.'
target_skills:
- variant-calling
domain: genomics
difficulty: easy
