id: pharmacoepidemiology-13
prompt: 'A health system researcher wants to study whether metformin reduces the risk
  of colorectal cancer compared to sulfonylureas among newly diagnosed type 2 diabetes
  patients using electronic health records from a large integrated health system (n
  = 45,000 patients diagnosed between 2010–2020).


  The researcher has extracted a cohort but made several design choices that you suspect
  introduce bias:


  1. **Cohort entry**: Patients were included at their diabetes diagnosis date, but
  drug exposure was defined as having "ever filled a prescription" in the first 12
  months after diagnosis

  2. **Comparator**: The comparison group consists of all non-metformin users (including
  insulin users, DPP-4 inhibitors, and untreated patients)

  3. **Follow-up**: Follow-up begins at cohort entry (diagnosis date) and the outcome
  (colorectal cancer diagnosis) is measured any time in the subsequent 5 years


  Please provide the following:


  **A)** Identify and explain at least **three specific methodological problems**
  with the current design, naming the specific bias each introduces


  **B)** Redesign this study using proper **active comparator new-user design** principles,
  specifying the exact cohort entry criterion, washout period length, comparator selection
  rationale, and follow-up start date


  **C)** Describe how you would implement **propensity score matching** for this redesigned
  study, including which covariates to prioritize (given that HbA1c and diabetes severity
  are available), the matching ratio, and how to assess balance


  **D)** Propose one **negative control outcome** appropriate for this drug-outcome
  pair and explain what a non-null association would indicate'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: easy
