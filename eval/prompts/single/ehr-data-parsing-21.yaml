id: ehr-data-parsing-21
prompt: 'Here is test question #21 of 30:


  ---


  You have received a batch of HL7v2 ORU^R01 messages from a laboratory information
  system containing complete blood count (CBC) results for 150 patients. Each message
  follows standard HL7v2.5 formatting. Below is a representative sample message you
  need to process:


  ```

  MSH|^~\&|LAB_SYS|CITY_HOSP|EHR_APP|MAIN|20240315142233||ORU^R01|MSG00847|P|2.5

  PID|1||PT-10042^^^CITY_HOSP^MR||Ramirez^Carlos^M||19781205|M|||456 Oak Ave^^Springfield^IL^62704

  OBR|1|ORD-5521|LAB-8847|58410-2^CBC panel^LN|||20240315140100

  OBX|1|NM|6690-2^WBC^LN||7.4|10*3/uL|4.5-11.0|N|||F

  OBX|2|NM|789-8^RBC^LN||4.85|10*6/uL|4.50-5.90|N|||F

  OBX|3|NM|718-7^HGB^LN||14.2|g/dL|13.5-17.5|N|||F

  OBX|4|NM|4544-3^HCT^LN||42.1|%|41.0-53.0|N|||F

  OBX|5|NM|787-2^MCV^LN||86.8|fL|80.0-100.0|N|||F

  ```


  Your task is to:

  1. Write a Python function `parse_oru_message(hl7_text)` that extracts patient ID
  (MRN), full name, date of birth, gender, and all OBX lab results (LOINC code, test
  name, value, units, reference range, and abnormal flag) into a structured dictionary.

  2. Write a second function `batch_to_dataframe(messages_list)` that processes a
  list of such HL7 strings and returns a flat pandas DataFrame with one row per OBX
  result.

  3. Add a basic quality check that flags rows where the numeric result falls outside
  the provided reference range but the abnormal flag in OBX field 8 is marked as `N`
  (normal), printing a warning with the patient MRN and test name.'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: easy
