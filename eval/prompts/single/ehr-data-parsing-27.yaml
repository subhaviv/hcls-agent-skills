id: ehr-data-parsing-27
prompt: 'You are working with a hospital''s clinical data pipeline that receives HL7v2
  ORU^R01 messages containing laboratory results. You need to parse a batch of these
  messages and perform quality checks before loading into a data warehouse.


  Given the following sample HL7v2 ORU^R01 message:


  ```

  MSH|^~\&|LAB_SYS|MERCY_HOSP|EHR|MERCY_HOSP|20231115143022||ORU^R01|MSG00847|P|2.5

  PID|1||MRN004821^^^MERCY^MR||Kowalski^Elena^M||19880304|F|||742 Birchwood Ave^^Portland^OR^97201||503-555-0192

  PV1|1|I|3W^301^A|||ATT004^Brennan^Patrick

  OBR|1|ORD98231|LAB98231|85025^CBC WITH DIFFERENTIAL^CPT|||20231115140000

  OBX|1|NM|718-7^Hemoglobin^LN||7.2|g/dL|12.0-16.0|L|||F

  OBX|2|NM|789-8^RBC^LN||3.1|10*6/uL|3.8-5.1|L|||F

  OBX|3|NM|4544-3^Hematocrit^LN||22.5|%|36.0-46.0|L|||F

  OBX|4|NM|6690-2^WBC^LN||11.8|10*3/uL|4.5-11.0|H|||F

  OBX|5|NM|777-3^Platelets^LN||89|10*3/uL|150-400|L|||F

  ```


  Please provide: (1) A Python function using the `hl7` library to parse this message
  and extract all OBX segments into a pandas DataFrame with columns: `loinc_code`,
  `test_name`, `value`, `unit`, `reference_range`, `abnormal_flag`, `result_status`;
  (2) A quality check function that flags results where the numeric value falls outside
  the reference range but the abnormal flag is missing or inconsistent; (3) A data
  enrichment step that adds a `severity` column classifying each abnormal result as
  `mild`, `moderate`, or `severe` based on how many standard deviations the value
  deviates from the midpoint of the reference range.'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: intermediate
