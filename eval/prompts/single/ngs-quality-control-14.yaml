id: ngs-quality-control-14
prompt: 'You have completed initial sequencing of a whole-exome sequencing (WES) cohort
  of 45 pediatric leukemia patients. Before proceeding to variant calling, your team
  needs a comprehensive QC assessment. You have the following resources available:


  - Paired FASTQs: `sample_R1.fastq.gz` / `sample_R2.fastq.gz` (per sample)

  - Coordinate-sorted BAM: `sample.bam` with index

  - Reference: `ref.fasta`

  - Target intervals (BED format): `exome_targets.bed` and Picard-format `exome_targets.interval_list`

  - Environment variables: `THREADS=8`, `OUT=qc_out`


  Your FastQC reports show that 12 of 45 samples have a "per-base sequence quality"
  warning in the last 10 bases of R2 reads, and 8 samples show overrepresented sequences
  flagged as "TruSeq Adapter, Index 6." Additionally, your coverage analysis must
  confirm that at least 90% of target bases achieve ≥20× depth for each sample to
  meet study inclusion criteria.


  Please provide:


  1. A **fastp** command to perform adapter trimming and quality filtering on the
  paired FASTQs, specifically addressing the 3′-end quality drop and adapter contamination
  issues observed, with JSON/HTML output saved to `OUT`.

  2. A **mosdepth** command to calculate per-base and per-region coverage over the
  exome targets, outputting results to `OUT`.

  3. A short **bash script** that parses mosdepth''s `regions.bed.gz` output to calculate
  the percentage of target bases with ≥20× coverage and prints a PASS/FAIL verdict
  per sample.

  4. A **MultiQC** command to aggregate fastp and mosdepth outputs into a single report
  in `OUT`.

  5. Two key Picard `CollectHsMetrics` parameters you would set for WES QC and why
  they matter for this analysis.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: intermediate
