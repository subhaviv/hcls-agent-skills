id: protein-structure-analysis-15
prompt: 'You are analyzing a homodimeric kinase structure (PDB ID: 7KX3) that has
  been solved at 2.1 Å resolution. After downloading the structure, you notice it
  contains two chains (A and B), 847 residues per chain, several missing loops (residues
  234-241 and 456-463 in both chains), and 12 crystallographic water molecules per
  chain. You need to prepare this structure for virtual screening of a 50,000-compound
  library targeting the ATP-binding pocket.


  **Your tasks:**


  1. **Structure Quality Assessment**: Write Python code using Biopython to parse
  the mmCIF file, identify all residues with B-factors above 40 Å², and flag any residues
  falling in disallowed Ramachandran regions (phi/psi outside ±30° of allowed zones).
  Report how you would handle the missing loop regions for docking preparation.


  2. **Pocket Detection**: Describe the fpocket command-line workflow to identify
  druggable pockets, and explain which fpocket output metrics (druggability score,
  volume, hydrophobicity) you would use to confirm the ATP-binding site versus other
  surface cavities. What threshold values would you apply?


  3. **PDBQT Conversion**: Provide a complete Python/shell workflow using OpenBabel
  or AutoDockTools to convert chain A only (excluding waters, retaining only residues
  1-233, 242-455, 464-847) to PDBQT format suitable for AutoDock Vina. Include the
  specific flags needed to add polar hydrogens and assign Gasteiger charges.


  4. **Validation Check**: After conversion, how would you verify the PDBQT file integrity
  — specifically checking for missing atoms, incorrect atom types for zinc coordination
  (if a Zn²⁺ ion is present at the active site), and proper handling of the disulfide
  bond between Cys187 and Cys203?'
target_skills:
- protein-structure-analysis
domain: protein-structure
difficulty: intermediate
