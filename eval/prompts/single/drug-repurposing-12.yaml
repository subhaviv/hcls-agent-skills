id: drug-repurposing-12
prompt: 'A small biotech company is evaluating metformin as a repurposing candidate
  for non-alcoholic steatohepatitis (NASH). Their research team has compiled the following
  preliminary data:


  - Internal RNA-seq from 45 NASH patient liver biopsies shows upregulation of AMPK
  signaling pathway genes (PRKAA1, PRKAA2) and downregulation of FASN and SREBP1C
  compared to 20 healthy controls

  - Metformin''s known primary mechanism involves AMPK activation via inhibition of
  mitochondrial complex I

  - A PubMed search returned 12 clinical trials for metformin in NASH/NAFLD, with
  mixed efficacy results (6 showing modest benefit, 6 showing no significant improvement)

  - The team wants to query DGIdb to confirm drug-gene interactions before proceeding


  Please provide the following:


  1. A step-by-step explanation of how to query DGIdb programmatically (using Python
  or the REST API) to retrieve all known interactions between metformin and the genes
  PRKAA1, PRKAA2, FASN, and SREBP1C, including sample code


  2. Based on the mechanism-of-action overlap between metformin''s known targets and
  the NASH gene expression signature described above, assess whether this represents
  a target-based or phenotype-based repurposing approach and explain why


  3. Using the repurposing evidence hierarchy, rank the strength of evidence currently
  available for metformin in NASH and identify the single most critical gap that must
  be addressed before advancing to a Phase II trial'
target_skills:
- drug-repurposing
domain: drug-discovery
difficulty: easy
