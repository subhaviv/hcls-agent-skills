id: biomarker-discovery-18
prompt: 'Here is test question #18 of 30:


  ---


  You are developing a **predictive biomarker** to identify which early-stage non-small
  cell lung cancer (NSCLC) patients will respond to adjuvant immunotherapy (pembrolizumab)
  versus those who will not, using a retrospective discovery cohort of **312 patients**
  (148 responders, 164 non-responders) with 5-year follow-up. Your data includes:


  - **Bulk RNA-seq** (18,427 genes after QC)

  - **Somatic mutation burden** (TMB, continuous)

  - **PD-L1 IHC score** (continuous, 0–100%)

  - **4 clinical covariates**: age, stage (IB/IIA/IIB), smoking pack-years, ECOG PS


  A colleague proposes the following pipeline: (1) rank all 18,427 genes by univariate
  t-test p-value, (2) select top 50 genes, (3) combine with clinical covariates, (4)
  train a Random Forest with 10-fold cross-validation to estimate AUC, and (5) report
  the cross-validated AUC of 0.84 as the model''s expected performance in a future
  trial.


  **Deliverables:**


  1. Identify **all data leakage and methodological errors** in the proposed pipeline,
  explaining why each inflates performance estimates.

  2. Propose a **corrected pipeline** using nested cross-validation with appropriate
  feature selection, specifying the outer/inner fold structure and how gene filtering
  should be handled.

  3. Given the class imbalance and clinical context (predictive, not prognostic),
  recommend the **most appropriate evaluation metrics** and justify why AUC alone
  is insufficient here.

  4. The team has access to an independent Korean validation cohort of **89 patients**
  (31 responders). Describe the **minimum requirements** this cohort must meet for
  valid external validation, and flag two specific threats to generalizability given
  the discovery cohort''s composition.

  5. Write **pseudocode** for the corrected nested CV pipeline that avoids leakage.'
