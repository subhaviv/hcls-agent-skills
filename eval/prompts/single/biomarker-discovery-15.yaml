id: biomarker-discovery-15
prompt: 'A clinical research team has collected multi-omics data from 312 patients
  with early-stage pancreatic ductal adenocarcinoma (PDAC) enrolled in a prospective
  cohort. The dataset includes: (1) RNA-seq expression profiles for 18,450 genes,
  (2) a 47-feature clinical panel (CA19-9, CEA, bilirubin, imaging features, etc.),
  and (3) a 5-year overall survival outcome with 89 observed death events. The team
  wants to build a prognostic signature combining both omics and clinical features.


  Their current plan is to: run univariate Cox regression on all 18,497 features,
  retain those with p < 0.05, then fit a multivariate Cox model on the selected features
  using 10-fold cross-validation, reporting the final C-index on the same dataset
  used for model training.


  **Please provide the following:**


  1. **Identify at least three specific methodological flaws** in their current plan,
  explaining why each introduces bias or overfitting.


  2. **Propose a corrected analysis pipeline** that addresses each flaw, specifying
  appropriate feature selection methods (justify LASSO vs. elastic net given the multi-omics
  correlation structure), cross-validation architecture, and how to combine the RNA-seq
  and clinical features without leakage.


  3. **Define the sample size adequacy** for this dataset using the Events Per Variable
  (EPV) rule and recommend a maximum model complexity.


  4. **Specify two complementary evaluation metrics** beyond the C-index that are
  appropriate for 5-year survival prediction, and explain when each should be preferred.


  5. **Outline a minimal external validation design** — what cohort characteristics,
  minimum sample size, and reporting standards (e.g., TRIPOD) would be required before
  this biomarker could be considered clinically actionable?'
target_skills:
- biomarker-discovery
