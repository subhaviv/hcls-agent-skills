id: trajectory-analysis-30
prompt: 'You are analyzing a single-cell RNA-seq dataset of 18,400 human hematopoietic
  stem and progenitor cells (HSPCs) from 6 healthy donors, processed with velocyto
  to generate spliced/unspliced count matrices. After running scVelo in dynamical
  mode, you observe a paradoxical situation: RNA velocity arrows for a cluster of
  340 cells annotated as "GMP-like progenitors" (based on high ELANE, MPO, and CEBPA
  expression) consistently point *away* from the expected myeloid differentiation
  trajectory and instead toward the erythroid branch, contradicting established biology
  and your PAGA graph which shows clear GMP→Neutrophil connectivity.


  Your suspicion is that this discrepancy stems from a combination of (1) poor splicing
  kinetics fit for ELANE and MPO (both have unusually short introns <200bp), (2) potential
  ambient RNA contamination creating artifactual unspliced reads, and (3) a small
  subpopulation of genuinely bipotent progenitors within the GMP cluster.


  Please provide:

  1. A diagnostic workflow with specific scVelo QC metrics (velocity confidence, likelihood
  scores, r² thresholds) to identify which cells/genes are driving the aberrant velocity
  signal

  2. Python code using scVelo and CellRank to exclude low-confidence velocity genes
  and recompute terminal state probabilities with the `GPCCA` estimator

  3. A strategy to distinguish artifactual velocity signals from genuine bipotency
  using co-expression analysis of KLF1/GATA1 (erythroid TFs) alongside CEBPA/SPI1
  in the suspect cells

  4. Recommendations for whether to trust PAGA connectivity or RNA velocity when they
  conflict, with specific criteria for this dataset'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: hard
