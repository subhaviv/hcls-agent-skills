id: multi-omics-integration-17
prompt: 'You are analyzing a cohort of 156 pediatric acute lymphoblastic leukemia
  (ALL) patients with three omics layers: RNA-seq transcriptomics (all 156 patients),
  RPPA proteomics (98 patients), and ATAC-seq chromatin accessibility (71 patients).
  The sample overlap follows a nested structure where all ATAC-seq samples have proteomics
  data, and all proteomics samples have transcriptomics data. You suspect that batch
  effects exist within the proteomics layer (samples processed across 3 batches) and
  within ATAC-seq (2 sequencing runs). Key genes of interest include IKZF1, CDKN2A,
  PAX5, and ETV6, which are known ALL drivers you want to track across omics layers.


  Your goal is to identify multi-omic subtypes and characterize regulatory-to-expression
  relationships. Please provide:


  1. A recommendation for whether to use MOFA+, SNF, or iCluster for this partial-overlap
  scenario, with justification based on the nested sample structure and the relative
  sample sizes per layer.


  2. A step-by-step batch correction strategy that handles the proteomics and ATAC-seq
  batches before integration, specifying which tools (e.g., ComBat, limma removeBatchEffect,
  Harmony) are appropriate for each data type and why.


  3. Python or R pseudocode (≥20 lines) implementing the MOFA+ setup for this partial-overlap
  dataset, including how to encode missing samples as NA, set the number of factors
  (justify your choice), and configure per-layer likelihoods.


  4. A description of how you would interpret the resulting MOFA+ factors to determine
  whether IKZF1 or PAX5 transcriptional activity is coupled with chromatin accessibility
  changes, including which factor weight thresholds and enrichment approaches you
  would apply.'
target_skills:
- multi-omics-integration
domain: multi-omics
difficulty: intermediate
