id: trajectory-analysis-25
prompt: 'I''m analyzing single-cell RNA-seq data from a human hematopoietic stem cell
  (HSC) differentiation study with 14,200 cells spanning the myeloid lineage (HSCs
  → CMPs → GMPs → monocytes and granulocytes). After running Scanpy preprocessing
  and UMAP, I''ve identified 8 distinct clusters. I want to perform a comprehensive
  trajectory analysis using both PAGA and RNA velocity approaches to understand the
  branching differentiation dynamics.


  My specific setup: I have spliced/unspliced count matrices generated by velocyto,
  with marker genes including *CD34* and *HOXA9* (HSC/progenitor), *MPO* and *ELANE*
  (GMP/granulocyte), and *CD14* and *LYZ* (monocyte). The data shows approximately
  3,200 HSCs, 2,800 CMPs, 3,100 GMPs, 2,400 monocytes, and 2,700 granulocyte-committed
  cells.


  Please provide:

  1. A complete Python workflow using scVelo (dynamical model) integrated with CellRank
  to compute fate probabilities toward both monocyte and granulocyte terminal states
  — include the key parameter choices (e.g., `n_neighbors`, `n_jobs`, velocity graph
  settings)

  2. How to set the root cell population programmatically using the HSC marker genes
  rather than manual selection, and why this matters for downstream DPT calculation

  3. A strategy to validate whether the PAGA connectivity graph agrees with the RNA
  velocity-inferred transition probabilities — specifically what correlation threshold
  would indicate concordance

  4. How to identify genes that are "velocity drivers" specifically at the GMP branching
  point, distinguishing granulocyte-fate from monocyte-fate committed cells'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: intermediate
