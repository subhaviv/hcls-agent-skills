id: variant-calling-21
prompt: 'Here is test question #21 of 30:


  ---


  You are setting up a germline variant calling pipeline for a small research cohort
  of 18 whole-exome sequencing (WES) samples from patients with a rare pediatric kidney
  disorder. The samples were sequenced on an Illumina NovaSeq 6000 with 150 bp paired-end
  reads at approximately 80× mean target coverage. Alignment has already been completed
  using BWA-MEM2 against GRCh38, and BAM files have been sorted, duplicate-marked
  with Picard, and base quality score recalibrated (BQSR) using GATK best practices.


  Your team wants to identify germline SNVs and indels in a set of 47 candidate genes
  including *NPHS1*, *NPHS2*, *WT1*, *LAMB2*, and *COL4A3*. You need to decide on
  the most appropriate variant calling and filtering strategy given the cohort size.


  Please provide the following:


  1. **Calling strategy recommendation**: Should you use single-sample HaplotypeCaller
  in GVCF mode followed by joint genotyping, or an alternative approach? Justify your
  choice for this cohort size and WES context.


  2. **Filtering recommendation**: Explain whether VQSR or hard filters are more appropriate
  here, and provide specific hard filter thresholds (with GATK filter expressions)
  for SNVs and indels if hard filtering is recommended.


  3. **GATK command**: Write a complete `gatk GenotypeGVCFs` command for joint genotyping
  across the 18 samples, assuming all individual GVCFs are listed in a file called
  `cohort_gvcfs.list` and the target intervals are in `kidney_panel_47genes.interval_list`.


  4. **One key limitation** of the chosen filtering approach for a rare-disease study
  of this size.'
target_skills:
- variant-calling
domain: genomics
difficulty: easy
