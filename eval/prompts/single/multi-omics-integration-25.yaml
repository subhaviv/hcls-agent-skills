id: multi-omics-integration-25
prompt: 'You are analyzing a cohort of 156 pediatric ALL (acute lymphoblastic leukemia)
  patients with three omics layers: RNA-seq (all 156 samples), ATAC-seq chromatin
  accessibility (89 samples), and targeted metabolomics measuring 187 metabolites
  (112 samples). Only 67 patients have all three layers simultaneously. You want to
  identify multi-omic subtypes that may predict minimal residual disease (MRD) response
  at day 29 of induction therapy.


  Given this partial sample overlap structure, please provide:


  1. **Integration strategy recommendation**: Compare Similarity Network Fusion (SNF)
  versus MOFA+ for this specific partial-overlap scenario. Which is more appropriate
  and why? Address how each method handles missing omics layers for the 89 patients
  lacking complete data.


  2. **MOFA+ configuration**: If proceeding with MOFA+, specify the exact model parameters
  — number of factors to initialize (justify your choice), which likelihood models
  to assign each data type (Gaussian, Bernoulli, or Poisson), and how to encode the
  partial overlap using MOFA+''s group/view structure.


  3. **Pre-processing pipeline**: Outline batch correction steps for each omics layer
  before integration. The RNA-seq was collected across 3 sequencing runs, ATAC-seq
  across 2 instrument batches, and metabolomics was processed in 4 analytical batches.
  Specify which tools (e.g., ComBat-seq, limma removeBatchEffect, WaveICA2.0) apply
  to each layer and in what order relative to integration.


  4. **Factor interpretation**: After running MOFA+, describe a downstream analysis
  workflow to link the top 3 factors to MRD response, including which enrichment approach
  (GSEA, chromatin motif enrichment, or metabolite set enrichment) is appropriate
  for each omics-specific factor loading.'
target_skills:
- multi-omics-integration
domain: multi-omics
difficulty: intermediate
