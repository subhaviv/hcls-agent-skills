id: radiology-preprocessing-21
prompt: 'You are setting up a standard T1-weighted MRI preprocessing pipeline for
  a neuroimaging study involving 45 healthy adult volunteers (ages 25-55, equal sex
  distribution). Raw DICOM files have been converted to NIfTI format using dcm2niix.
  Initial quality checks reveal that approximately 30% of the scans have inconsistent
  image orientations (some acquired in oblique planes), and all images show typical
  B1 field inhomogeneity artifacts common to your 3T Siemens Prisma scanner.


  Your preprocessing goals are:

  1. Correct image orientation to standard RAS convention

  2. Remove B1 field inhomogeneity using N4 bias field correction

  3. Strip the skull to isolate brain tissue

  4. Register all brain images to MNI152 standard space (1mm isotropic)


  Please provide:

  - A complete bash script implementing this four-step pipeline using FSL (fslreorient2std,
  BET) and ANTs (N4BiasFieldCorrection, antsRegistrationSyN.sh), processing all 45
  subjects in a loop

  - Recommended parameter settings for BET (fractional intensity threshold) and N4BiasFieldCorrection
  (number of iterations, convergence threshold) appropriate for healthy adult T1w
  data

  - A brief explanation of why bias field correction should be performed before skull
  stripping rather than after

  - A simple quality control check (using fslstats or similar) to verify that skull
  stripping produced reasonable results, flagging any subjects where brain mask coverage
  falls outside an expected volume range of 900,000–1,600,000 mm³'
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: easy
