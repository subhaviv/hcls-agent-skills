id: quantitative-proteomics-21
prompt: 'A researcher has completed a label-free quantification (LFQ) proteomics experiment
  comparing healthy controls (n=12) vs. early-stage Alzheimer''s disease patients
  (n=12) using MaxQuant. The output `proteinGroups.txt` file contains 4,823 protein
  groups. After filtering for contaminants and reverse hits, 3,941 proteins remain.
  The researcher loads the LFQ intensity columns into R and observes the following:


  - Approximately 28% of values are missing across the dataset

  - A visual inspection of missing values shows that proteins like APOE, CLU, and
  VGF are missing predominantly in the control group but consistently quantified in
  the disease group

  - Other proteins such as GAPDH, ACTB, and common housekeeping proteins show random
  scattered missingness (~5–8% missing)


  The researcher wants to perform differential expression analysis using `limma` after
  appropriate preprocessing.


  **Please provide:**


  1. A classification of the two missingness patterns observed (MNAR vs. MCAR/MAR)
  and which proteins exemplify each pattern

  2. A recommended imputation strategy for each missingness type, with biological
  justification

  3. R code (using the `DEP` or `imputeLCMD` package) implementing the appropriate
  imputation method(s) for each protein subset

  4. A normalization method appropriate for this LFQ dataset before differential expression
  testing, with a one-sentence rationale

  5. The correct `limma` model matrix setup for a two-group comparison with this design,
  including the `makeContrasts` call to extract the disease vs. control comparison


  Assume LFQ intensities have already been log2-transformed and the data is stored
  in a `SummarizedExperiment` object named `se_filtered`.'
target_skills:
- quantitative-proteomics
domain: proteomics
difficulty: easy
