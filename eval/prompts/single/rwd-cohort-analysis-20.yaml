id: rwd-cohort-analysis-20
prompt: 'You are analyzing a real-world evidence study comparing two SGLT2 inhibitors
  — empagliflozin (NDC prefix 00597) and dapagliflozin (NDC prefix 00310) — for heart
  failure hospitalization outcomes in a Medicare claims database containing 847,293
  beneficiaries with Type 2 diabetes (ICD-10: E11.x). Your cohort identification reveals
  12,847 empagliflozin initiators and 9,234 dapagliflozin initiators after applying
  a 180-day washout period and new-user design. After 1:1 propensity score matching
  on 47 covariates, you have 8,901 matched pairs.


  However, your Schoenfeld residuals test returns p=0.003 for the treatment variable
  in the Cox model, and visual inspection of log-log survival curves shows the hazard
  ratio crossing at approximately month 14 of follow-up (max follow-up: 36 months).
  Additionally, your PDC calculation reveals 34% of empagliflozin patients and 41%
  of dapagliflozin patients have PDC < 0.80 at 12 months, suggesting differential
  non-adherence that may confound your results.


  Please provide: (1) Python code implementing a time-varying coefficient Cox model
  using `lifelines` to address the non-proportional hazards, including a Heaviside
  step function split at month 14; (2) a landmark analysis at month 14 with Kaplan-Meier
  curves and log-rank test for each sub-period; (3) an adherence-adjusted analysis
  approach using PDC as a time-varying covariate or inverse probability of treatment
  weighting for censoring (IPCW), with complete code; and (4) a clinical interpretation
  framework explaining how differential adherence and time-varying treatment effects
  should be reported in a regulatory submission context.'
target_skills:
- rwd-cohort-analysis
