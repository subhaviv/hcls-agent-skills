id: genomic-variant-interpretation-21
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory reports the following variant:
  **BRCA2 c.7976+3A>G**.


  The variant has the following annotations:

  - **gnomAD v3.1.2 allele frequency**: 0.000032 (8 heterozygous carriers, 0 homozygous)

  - **SpliceAI scores**: Donor loss = 0.31, Acceptor loss = 0.02, Donor gain = 0.04,
  Acceptor gain = 0.01

  - **CADD Phred score**: 14.2

  - **ClinVar submissions**: 2 submissions — one "Uncertain Significance" (no evidence
  provided), one "Likely Pathogenic" (functional study cited, 3-star review)

  - **Functional data**: A published RNA splicing assay demonstrates partial aberrant
  splicing (~40% reduction in normal transcript) but not complete abolishment

  - **Family history**: Two first-degree relatives with ovarian cancer, one with breast
  cancer at age 38


  Using the ACMG/AMP 2015 classification framework, please provide:

  1. An evaluation of which specific ACMG/AMP criteria apply (both supporting pathogenicity
  and against pathogenicity), with justification for each criterion invoked or rejected

  2. A final variant classification with confidence reasoning

  3. An explanation of why the SpliceAI score of 0.31 for donor loss is or is not
  sufficient to invoke PVS1 or PS3

  4. A brief clinical recommendation for how this classification should influence
  patient management'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: easy
