id: aws-genai-ml-architect-20
prompt: 'A regional health system (MedCore Health) is deploying a **real-time clinical
  decision support system** for sepsis prediction in their 12-hospital ICU network.
  The system must process streaming vital signs (heart rate, MAP, SpO2, lactate, WBC)
  from 847 concurrent ICU beds via HL7 FHIR R4 messages, run inference on a custom-trained
  XGBoost model (updated weekly via retraining on new EHR data), and return predictions
  within 500ms P99 latency. The model ingests 72-hour rolling windows of 23 features
  per patient.


  **Complicating factors:**

  - The model contains **indirect PHI** (patient encounter IDs embedded in feature
  vectors for audit traceability)

  - Clinicians require **explainability outputs** (SHAP values per prediction) alongside
  binary risk scores

  - The retraining pipeline must satisfy FDA SaMD Class II requirements with full
  audit trails

  - Peak load occurs during shift changes (6AM/6PM) with 4x normal inference volume

  - MedCore''s compliance team requires all PHI to remain in **us-east-1** with no
  cross-region replication


  **Deliverables requested:**

  1. Recommend a SageMaker endpoint configuration (instance type, scaling policy,
  deployment strategy) that meets the latency SLA under peak load

  2. Design the MLOps retraining pipeline with audit trail components satisfying FDA
  SaMD traceability requirements

  3. Provide a Python code snippet showing how to invoke the SageMaker endpoint with
  SHAP value generation included in the inference response

  4. Identify the top 3 HIPAA/PHI architectural risks in this design and propose mitigations
  for each'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: hard
