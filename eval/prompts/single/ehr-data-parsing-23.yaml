id: ehr-data-parsing-23
prompt: 'Here is test question #23 of 30:


  ---


  You have received a batch of HL7v2 ORU^R01 messages from a laboratory information
  system containing CBC (Complete Blood Count) results for patients. Each message
  follows standard HL7v2.5 format. Below is a representative example message from
  the batch:


  ```

  MSH|^~\&|LAB_SYS|CITY_HOSP|EHR|MAIN|20240315142233||ORU^R01|MSG00847|P|2.5

  PID|1||PT-10042^^^CITY_HOSP^MR||Ramirez^Carlos^A||19781204|M|||456 Oak Ave^^Springfield^IL^62704

  OBR|1|ORD-5521|LAB-8834|58410-2^CBC panel^LN|||20240315140000

  OBX|1|NM|718-7^Hemoglobin^LN||13.2|g/dL|13.5-17.5|L|||F

  OBX|2|NM|789-8^Erythrocytes^LN||4.51|10*6/uL|4.5-5.9|N|||F

  OBX|3|NM|6690-2^WBC^LN||11.8|10*3/uL|4.5-11.0|H|||F

  OBX|4|NM|777-3^Platelets^LN||142|10*3/uL|150-400|L|||F

  ```


  Using Python and the `hl7` library (or manual string parsing), please provide:


  1. A Python function `parse_cbc_oruru` that accepts a raw HL7v2 message string and
  returns a dictionary containing: patient MRN, full name, date of birth, sex, and
  a list of lab results where each result includes LOINC code, test name, value, units,
  reference range, and abnormal flag.

  2. A second function `batch_to_dataframe` that processes a Python list of such raw
  HL7 message strings and returns a flat pandas DataFrame with one row per OBX segment.

  3. A brief data quality check that flags any OBX rows where the numeric value falls
  outside the provided reference range but the abnormal flag is marked `N` (inconsistency
  detection).'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: easy
