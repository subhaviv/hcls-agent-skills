id: hedis-measure-specification-26
prompt: 'A regional health plan is preparing for its annual HEDIS data submission
  and needs to evaluate care gap closure opportunities for the **Controlling High
  Blood Pressure (CBP)** measure across a population of 4,200 eligible members.


  Current performance data shows:

  - 4,200 members in the denominator (ages 18–85, hypertension diagnosis)

  - 2,310 members with a compliant blood pressure reading on file (numerator met)

  - 1,890 members with open care gaps

  - Of the open gaps: 420 members have had recent ED visits, 380 have documented transportation
  barriers, 290 have no PCP visits in the past 18 months, and 800 have had outreach
  attempts with no response


  The plan''s Stars team is also concerned because CBP is a **triple-weighted** measure
  in Medicare Star Ratings and they are currently sitting at 3.2 stars overall, targeting
  4.0.


  Your task is to provide the following deliverables:


  1. **Measure Logic Summary**: Explain the HEDIS CBP denominator criteria, numerator
  requirements (including the specific BP thresholds that count as controlled), and
  any administrative or medical exclusions that could remove members from the denominator.


  2. **Gap Segmentation Strategy**: Given the four subgroups of open-gap members described
  above, recommend a prioritized outreach sequence with rationale based on likelihood
  of closure and Stars impact timeline.


  3. **Exclusion Audit**: Identify which member subgroups should be reviewed for potential
  exclusion eligibility and what documentation would be needed.


  4. **SQL Query**: Write a SQL query to identify members who have had ≥2 outpatient
  visits in the measurement year but still have an open CBP care gap, suggesting a
  missed documentation opportunity.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: intermediate
