id: biomarker-discovery-30
prompt: 'A Phase II oncology trial enrolled 180 patients with metastatic renal cell
  carcinoma receiving sunitinib. You have pre-treatment tumor biopsies with RNA-seq
  data (18,432 genes after QC), baseline clinical variables (IMDC score, LDH, hemoglobin,
  sites of metastasis), and the primary endpoint of progression-free survival (PFS).
  You observe 94 PFS events. Your goal is to build a prognostic/predictive signature
  distinguishing patients who benefit from sunitinib (PFS > 12 months) versus those
  who progress early (PFS ≤ 6 months), excluding the 31 patients in the 6-12 month
  intermediate zone.


  **Specific concerns and deliverables requested:**


  1. With 149 evaluable patients and 94 events, calculate the maximum defensible number
  of candidate features you can include in a final Cox model, and explain why naive
  use of all 18,432 genes violates this constraint.


  2. Design a nested cross-validation scheme (specify inner/outer fold structure,
  what happens in each loop, and how you prevent leakage when performing variance-filtering
  and normalization steps).


  3. Three candidate integration strategies are proposed: (a) LASSO-Cox on RNA-seq
  alone, (b) elastic net combining RNA-seq + clinical variables with a single penalty,
  and (c) a two-stage approach where clinical variables enter forced and RNA-seq features
  are penalized. Compare their statistical and clinical tradeoffs, and recommend one
  with justification.


  4. The trial statistician proposes reporting Harrell''s C-index on the training
  set as primary performance evidence. Identify at least three methodological flaws
  in this proposal and specify which metrics and correction methods should replace
  it.


  5. Outline a minimum viable external validation plan given that only one external
  cohort (n=67, 41 events, different sequencing platform) is available.'
