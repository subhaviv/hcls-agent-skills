id: dicom-processing-25
prompt: 'You are working as a neuroimaging data engineer at a research hospital. Your
  team has collected resting-state fMRI data from 47 participants as part of a depression
  study. The raw DICOM files are organized in a flat directory structure where all
  series from all subjects are mixed together in a single folder (`/raw_dicoms/`),
  with filenames following the pattern `IM-XXXX-YYYY.dcm` (where XXXX is a 4-digit
  series number and YYYY is an instance number).


  You need to convert this data to NIfTI format and organize it according to BIDS
  specification. Each participant has the following series:

  - T1-weighted anatomical (SeriesDescription: "T1_MPRAGE_1mm")

  - Resting-state fMRI (SeriesDescription: "rfMRI_REST_AP")

  - Field map magnitude (SeriesDescription: "FieldMap_Magnitude")

  - Field map phase difference (SeriesDescription: "FieldMap_PhaseDiff")


  Your constraints are:

  - dcm2niix version 1.0.20230411

  - Python 3.10 with pydicom available

  - Subject IDs must be extracted from the DICOM tag `PatientID` (0010,0020)

  - Some DICOM files have inconsistent `SliceTiming` metadata that may cause dcm2niix
  warnings

  - The output must pass BIDS Validator without errors


  Please provide: (1) a Python script using pydicom to pre-sort the flat DICOM directory
  into per-subject, per-series subdirectories before conversion, (2) the exact dcm2niix
  command with appropriate flags to generate BIDS-compatible output including JSON
  sidecars, (3) the expected BIDS directory structure for one subject, and (4) how
  to handle the SliceTiming inconsistency warning in the resulting JSON sidecar files.'
target_skills:
- dicom-processing
domain: imaging
difficulty: intermediate
