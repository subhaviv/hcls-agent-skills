id: risk-adjustment-strategy-15
prompt: 'A Medicare Advantage plan with 42,000 members is navigating the CMS-HCC V24-to-V28
  blended transition period. Their analytics team has pulled the following summary
  data for the current plan year:


  - 38% of members have at least one HCC mapped under V24 that does not have a direct
  equivalent mapping under V28

  - Diabetes with chronic kidney disease (CKD) Stage 3 is coded for 1,847 members
  under V24 (HCC 18 + HCC 136 interaction), but the V28 model restructures these categories

  - 612 members have documented Major Depressive Disorder (MDD) in the chart but are
  only carrying an HCC for "depressive disorder NEC" — a lower-weighted category

  - The plan''s current blended RAF calculation uses the CMS-mandated 33% V28 / 67%
  V24 weighting for the transition year


  Given this scenario, please provide the following:


  1. Explain how the V24-to-V28 blended RAF score is mathematically constructed for
  a single member, using a concrete numerical example with hypothetical RAF weights
  for the diabetes/CKD comorbidity

  2. Describe the ICD-10 coding strategy a plan should use to maximize audit-defensible
  capture of the MDD population under V28 mapping rules

  3. Identify which disease hierarchy rules in V28 are most likely to suppress HCCs
  that were additive under V24, and explain the revenue risk this creates

  4. Recommend a prioritization framework for chart review outreach across these three
  member cohorts, considering both RAF impact and audit defensibility'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: intermediate
