id: aws-genai-ml-architect-12
prompt: 'A regional hospital network with 45,000 annual patient encounters wants to
  deploy a clinical Named Entity Recognition (NER) system to extract diagnoses, medications,
  and procedures from unstructured clinical notes stored in their EHR system. The
  notes contain PHI and must remain HIPAA-compliant throughout processing. The team
  has 12,000 annotated clinical notes for fine-tuning and wants to use a pre-trained
  biomedical language model (Bio-ClinicalBERT) as the base.


  The architecture must meet these constraints:

  - All PHI data must never leave the AWS environment

  - Model training and inference must occur within a private VPC with no internet
  access

  - Inference latency must be under 200ms for real-time note processing

  - The system must support 50 concurrent requests during peak hours

  - Total monthly budget is capped at $8,000


  Please provide:

  1. A recommended AWS architecture diagram description explaining which services
  to use (SageMaker Training, SageMaker Endpoints, HealthLake, etc.) and why each
  was chosen over alternatives

  2. The specific SageMaker endpoint configuration (instance type, auto-scaling policy)
  to meet the latency and concurrency requirements

  3. A brief Python code snippet showing how to invoke the SageMaker endpoint securely
  from within the VPC using boto3 with proper IAM role assumptions

  4. An explanation of the three most critical HIPAA technical safeguards to implement
  in this architecture, mapped to specific AWS service configurations'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: easy
