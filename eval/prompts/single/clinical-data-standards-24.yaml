id: clinical-data-standards-24
prompt: 'A pharmaceutical company is preparing the adverse event frequency tables
  for a Phase III oncology trial submission. The safety database contains 847 coded
  adverse events across 312 patients in the treatment arm. During MedDRA coding review,
  the team identifies the following clustering of Preferred Terms under the Gastrointestinal
  Disorders SOC:


  - Nausea: 89 occurrences

  - Vomiting: 67 occurrences

  - Nausea and vomiting: 23 occurrences

  - Nausea and vomiting of pregnancy: 4 occurrences (all in non-pregnant patients,
  likely miscoded)

  - Retching: 12 occurrences


  The regulatory team is debating whether to present the AE frequency table at the
  PT level or aggregate to the HLT level ("Nausea and vomiting symptoms") for the
  primary safety summary. Additionally, the clinical team wants to map these MedDRA
  PTs to ICD-10 codes for a companion real-world evidence study using EHR data.


  Please provide:

  1. A recommendation on PT vs. HLT presentation level for the regulatory submission,
  with justification based on ICH E3 guidance principles and the specific frequency
  distribution shown

  2. A corrected coding approach for the 4 "Nausea and vomiting of pregnancy" events,
  identifying the appropriate MedDRA PT and explaining why the original coding is
  problematic

  3. A crosswalk table mapping each of the five MedDRA PTs to their most appropriate
  ICD-10-CM codes, noting any one-to-many or many-to-one mapping challenges

  4. A brief explanation of how the "Nausea and vomiting" PT (combination term) should
  be handled differently from single-symptom PTs in both the MedDRA hierarchy and
  the ICD-10 mapping'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: intermediate
