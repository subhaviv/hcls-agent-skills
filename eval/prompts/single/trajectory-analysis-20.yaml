id: trajectory-analysis-20
prompt: 'Here is test question #20 of 30:


  ---


  You are analyzing a single-cell RNA-seq dataset of 8,400 hematopoietic stem and
  progenitor cells (HSPCs) from bone marrow, spanning differentiation toward erythroid,
  myeloid, and lymphoid lineages. You have run scVelo in dynamical mode and obtained
  RNA velocity vectors, but you notice a troubling inconsistency: the velocity arrows
  in UMAP space point **against** the known biological differentiation direction for
  the myeloid branch (arrows point from GMP clusters back toward HSCs rather than
  forward), while erythroid and lymphoid branches appear correctly oriented. PAGA
  connectivity analysis shows strong edges between HSCs→CMPs→GMPs (correct), but CellRank''s
  transition probability matrix assigns terminal state absorption probabilities of
  ~0.7 to the HSC cluster rather than the GMP/mature myeloid clusters.


  Your dataset has the following characteristics:

  - Spliced/unspliced ratio for myeloid marker genes (MPO, ELANE, CST7) is unusually
  high (>0.95) compared to erythroid genes (HBB, GYPA ~0.6)

  - The myeloid cells were captured at a later timepoint (day 14) vs. other lineages
  (day 7) in an in vitro differentiation experiment

  - You used velocyto for BAM file processing with default parameters


  Given these specifics:

  1. Diagnose the likely technical and biological causes of the reversed velocity
  in the myeloid branch

  2. Provide a corrected scVelo/CellRank workflow with specific parameter adjustments
  and code snippets to fix the issue

  3. Explain how to incorporate the known collection timepoints as soft constraints
  in CellRank using the `TimepointKernel`

  4. Describe validation strategies to confirm the corrected trajectory is biologically
  meaningful'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: hard
