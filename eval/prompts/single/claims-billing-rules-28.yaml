id: claims-billing-rules-28
prompt: 'A Medicare Part B audit has flagged a high-volume orthopedic surgery group
  (Pinnacle Orthopedics, NPI: 1234567890) for potential FWA based on the following
  claims pattern over 6 months (847 total claims):


  - CPT 27447 (total knee arthroplasty, 90-day global period) billed 203 times

  - Modifier 25 appended to E&M codes (99213, 99214) on the same date of service as
  27447 in 178 instances

  - Modifier 79 (unrelated procedure during global period) used 94 times for CPT 20610
  (joint aspiration) within 30 days post-TKA

  - Modifier 59 applied to CPT 97110 (therapeutic exercises) billed alongside 97530
  (therapeutic activities) in 312 instances

  - 14 dates where a single provider billed 28+ units of therapy services in one day


  **Deliverables required:**


  1. Identify which billing patterns represent likely coding errors versus potential
  intentional fraud, with specific regulatory citations (CMS IOM, NCCI policy manual
  chapters) supporting each determination.


  2. Analyze the modifier 25 usage on TKA dates — under what narrow circumstances
  is this compliant, and what documentation elements would distinguish legitimate
  from fraudulent claims?


  3. Evaluate the modifier 79 pattern for post-TKA joint aspirations — is this modifier
  even appropriate here, and what is the correct billing pathway?


  4. Calculate the "impossible day" threshold violation for the 14 flagged dates and
  explain how CMS defines this concept for therapy services under the 8-minute rule.


  5. Recommend a prioritized investigation sequence and specify which claims subset
  should be referred for potential OIG referral versus internal corrective action.'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: hard
