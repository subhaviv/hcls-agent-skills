id: ml-researcher-22
prompt: 'A hospital system has collected a retrospective dataset of 8,400 adult ICU
  admissions over 5 years (2018–2022) to predict 30-day hospital readmission. The
  dataset includes structured EHR features: 47 lab values (e.g., creatinine, troponin,
  WBC), 12 vital sign summaries, 8 comorbidity flags (Charlson index components),
  insurance type, and primary diagnosis ICD-10 codes. The overall readmission rate
  is 18%, creating moderate class imbalance. The team plans to train a gradient boosting
  model (XGBoost) and deploy it prospectively starting in 2023.


  Please provide:


  1. **Data splitting strategy**: Recommend how to split this dataset given the temporal
  nature of the data, explaining why a random 80/20 split would be problematic here
  and what leakage risks exist.


  2. **Class imbalance handling**: Describe two concrete techniques appropriate for
  this 18% positive rate, including whether SMOTE is advisable for tabular EHR data
  and why.


  3. **Evaluation metrics**: Specify which metrics to report beyond AUROC, justify
  the inclusion of AUPRC and calibration assessment (with a specific calibration plot
  recommendation), and explain when decision curve analysis would add value.


  4. **Fairness audit**: The dataset includes insurance type as a proxy for socioeconomic
  status. Identify two subgroup fairness metrics to compute across insurance categories
  (Medicare, Medicaid, commercial, uninsured) and describe how to detect and report
  disparities.


  5. **Temporal generalization check**: Propose a simple test to assess whether model
  performance degrades from the 2018–2020 training window to the 2021–2022 validation
  window, naming one statistical test appropriate for comparing AUROC estimates across
  time periods.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: easy
