id: variant-calling-19
prompt: 'You are running a tumor-only Mutect2 somatic calling pipeline on 47 FFPE-derived
  tumor samples from a retrospective study of pancreatic ductal adenocarcinoma. Each
  sample was sequenced on a NovaSeq 6000 at ~150× mean coverage using a 523-gene cancer
  panel (WES-like targeted sequencing). You do not have matched normals for any sample,
  but you have access to a panel of normals (PoN) built from 42 blood samples from
  an unrelated colorectal cancer study sequenced on the same platform.


  During initial QC, you notice that 12 of the 47 FFPE samples show elevated OxoG
  artifact rates (Phred-scaled mean = 38.2) and C→T transition enrichment at GpCpX
  trinucleotide contexts. Additionally, cross-sample contamination estimates from
  CalculateContamination range from 0.8% to 4.3% across all samples, with 9 samples
  exceeding 3%.


  Your GATK FilterMutectCalls command is currently run with default parameters, and
  you are seeing an unusually high false positive rate (~62% estimated) in the final
  callset when validated against orthogonal ddPCR data for 15 known KRAS G12 hotspot
  mutations.


  Provide the following:

  1. A detailed explanation of which specific Mutect2/GATK filtering parameters you
  would modify to address the OxoG artifacts and contamination issues, with justification
  for each change

  2. A revised bash script incorporating these parameter adjustments for both the
  Mutect2 calling step and FilterMutectCalls step

  3. An assessment of whether the cross-study PoN is appropriate here and what risks
  it introduces

  4. Recommendations for any additional post-filtering steps specific to FFPE data
  that could further reduce the false positive rate'
target_skills:
- variant-calling
domain: genomics
difficulty: hard
