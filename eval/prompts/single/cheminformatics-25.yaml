id: cheminformatics-25
prompt: 'You are building a virtual screening pipeline for a kinase inhibitor program.
  You have a library of 50,000 compounds represented as SMILES strings stored in a
  CSV file (`library.csv` with columns: `compound_id`, `smiles`). You also have 3
  known active compounds (reference molecules) with the following SMILES:


  - **Ref1**: `Cc1ccc(NC(=O)c2ccc(CN3CCN(C)CC3)cc2)cc1Nc1nccc(-c2cccnc2)n1`

  - **Ref2**: `CS(=O)(=O)CCNCc1ccc(-c2ccc3ncnc(Nc4ccc(OCc5cccc(F)c5)c(Cl)c4)c3c2)o1`

  - **Ref3**: `O=C(Nc1cccc(C(F)(F)F)c1)c1cnc2ccc(N3CCOCC3)cc2c1`


  Your task is to:


  1. **Write complete RDKit Python code** to compute Morgan fingerprints (radius=2,
  nBits=2048) for all library compounds and calculate the maximum Tanimoto similarity
  of each compound against the 3 reference molecules. Filter to retain only compounds
  with max Tanimoto ≥ 0.35.


  2. **Apply Lipinski Ro5 AND Veber rules** simultaneously to the similarity-filtered
  subset, printing how many compounds pass each filter stage.


  3. **Run a PAINS filter** on the compounds passing both druglikeness filters using
  RDKit''s `FilterCatalog`, and report how many are flagged.


  4. **Explain** why using maximum Tanimoto (vs. average) across multiple references
  is the appropriate similarity aggregation strategy for this use case, and what Tanimoto
  threshold of 0.35 implies about structural diversity in this context.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: intermediate
