id: trajectory-analysis-26
prompt: 'I''m analyzing single-cell RNA-seq data from a human hematopoietic stem cell
  (HSC) differentiation experiment tracking 8,400 cells across four timepoints (day
  0, day 3, day 7, day 14). After preprocessing and clustering, I''ve identified 9
  cell populations: HSCs, multipotent progenitors (MPPs), common myeloid progenitors
  (CMPs), granulocyte-monocyte progenitors (GMPs), megakaryocyte-erythrocyte progenitors
  (MEPs), monocytes, granulocytes, erythrocytes, and megakaryocytes.


  I want to perform a comprehensive trajectory analysis using PAGA followed by RNA
  velocity with scVelo, and finally fate probability estimation with CellRank. Specifically:


  1. **PAGA connectivity**: Describe how to build and interpret the PAGA graph, including
  appropriate connectivity threshold (I''m seeing values between 0.05 and 0.35 across
  edges) and how to use it to initialize a force-directed layout.


  2. **scVelo workflow**: My data has spliced/unspliced counts from velocyto. Walk
  me through running `scv.pp.filter_and_normalize`, `scv.tl.moments` with `n_pcs=30,
  n_neighbors=30`, and choosing between stochastic vs. dynamical mode — given that
  key driver genes like *GATA1*, *SPI1*, *CEBPA*, and *KLF1* show high likelihood
  scores in dynamical mode.


  3. **CellRank fate probabilities**: Using `GPCCA` estimator with the velocity kernel
  combined with a connectivity kernel (80/20 weight split), explain how to identify
  terminal macrostates and compute absorption probabilities toward erythroid vs. myeloid
  fates.


  4. Provide annotated Python code snippets for each step and explain how to validate
  that *SPI1*-high cells preferentially commit to the myeloid lineage.'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: intermediate
