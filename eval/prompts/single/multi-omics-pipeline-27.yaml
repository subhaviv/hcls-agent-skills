id: multi-omics-pipeline-27
prompt: 'You are integrating transcriptomic (RNA-seq) and proteomic (TMT mass spectrometry)
  data from 85 colorectal cancer patients (45 microsatellite-stable [MSS], 40 microsatellite-instable
  [MSI]) collected across three clinical sites. The RNA-seq data uses Ensembl gene
  IDs (GRCh38), while the proteomic data uses UniProt accession numbers. After initial
  QC, you have 18,432 genes and 4,217 proteins with measurable overlap.


  Your analysis goals are:


  1. **ID harmonization**: Write an R script using `biomaRt` to map Ensembl IDs to
  HGNC symbols and UniProt accessions simultaneously, then filter to retain only the
  1:1 mappings (no ambiguous multi-mapping). Report how you would handle genes like
  *MAPT* or *APP* that have multiple UniProt isoforms.


  2. **Batch correction**: The three sites contribute unequal sample sizes (Site A:
  30, Site B: 28, Site C: 27). RNA-seq raw counts need ComBat-seq correction while
  preserving the MSS/MSI biological signal as a covariate. Write the `sva` package
  R code including the design matrix specification.


  3. **MOFA2 integration**: Configure a MOFA2 model in R with the batch-corrected
  RNA-seq (log-normalized, top 5,000 variable genes) and TMT protein data (VSN-normalized)
  as two views. Specify the number of factors to request (justify your choice), convergence
  tolerance, and how to handle the ~3,200 features present in proteomics but absent
  from transcriptomics (missing-not-at-random vs. missing-at-random assumption).


  4. **Downstream enrichment**: After extracting the top factor (Factor 1) weights,
  describe how to run `fgsea` on the RNA weights using Hallmark gene sets, including
  the `nperm`, `minSize`, and `scoreType` parameters you would choose and why.'
target_skills:
