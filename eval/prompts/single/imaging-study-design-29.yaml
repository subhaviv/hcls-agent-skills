id: imaging-study-design-29
prompt: 'Here is test question #29 of 30:


  ---


  You are designing a multi-site diffusion MRI study investigating white matter microstructural
  changes in early Parkinson''s disease (PD) across three scanner platforms: a Siemens
  Prisma 3T (Site A, n=87 PD, n=82 controls), a GE Discovery MR750 3T (Site B, n=64
  PD, n=71 controls), and a Philips Ingenia 3T (Site C, n=53 PD, n=58 controls). All
  sites acquired 64-direction DTI with b=1000 s/mm², but Site A used 2mm isotropic
  voxels, Site B used 1.8mm isotropic, and Site C used 2.2mm isotropic. A preliminary
  analysis of fractional anisotropy (FA) in the substantia nigra shows a significant
  Site × Diagnosis interaction (F=8.3, p=0.003) that you suspect is driven by scanner
  differences rather than biology. You plan to extract TBSS-based FA, MD, RD, and
  AD maps, plus free-water corrected metrics (FW-FA, FW), as imaging biomarkers.


  Please provide:

  1. A stepwise preprocessing pipeline (with specific tool recommendations and parameter
  choices) that minimizes inter-site variability before harmonization

  2. A quantitative harmonization strategy comparing ComBat, longitudinal ComBat,
  and CovBat for this dataset, including which covariates to include and why

  3. A power analysis framework for detecting a 3% FA difference in the substantia
  nigra after harmonization, accounting for the residual inter-site ICC of 0.12

  4. Python pseudocode implementing ComBat harmonization on the extracted ROI metrics
  with appropriate covariate protection

  5. Criteria for determining whether the Site × Diagnosis interaction is artifactual
  versus biologically meaningful, with a decision flowchart'
target_skills:
- imaging-study-design
