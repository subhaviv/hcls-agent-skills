id: multi-omics-pipeline-22
prompt: 'Here is test question #22 of 30:


  ---


  You are analyzing a multi-omics dataset from a colorectal cancer study with 85 tumor
  samples and 40 healthy controls. You have three data layers: RNA-seq read counts
  (18,500 genes), reverse-phase protein array (RPPA) measurements for 220 proteins,
  and DNA methylation beta values for 12,000 CpG sites. The RNA-seq data comes from
  two sequencing batches (Batch A: 60 samples, Batch B: 65 samples), and a PCA plot
  shows clear batch separation.


  Your tasks are:


  1. **Batch correction**: Write R code using `ComBat-seq` (from the `sva` package)
  to correct the RNA-seq count data for batch effects, preserving the tumor/control
  biological group variable. Show how to properly pass the `group` parameter to protect
  biological variance.


  2. **ID harmonization**: The RPPA protein identifiers use gene symbols (e.g., `EGFR`,
  `TP53`, `MYC`), but you need UniProt accession IDs for downstream integration. Write
  R code using `biomaRt` to map a vector of 5 example gene symbols (`EGFR`, `TP53`,
  `MYC`, `KRAS`, `PTEN`) to their human UniProt Swiss-Prot accession IDs, filtering
  for reviewed entries only.


  3. **Integration setup**: After batch correction and ID harmonization, describe
  the key preprocessing steps (normalization, scaling, missing value handling) needed
  before running MOFA2 on all three omics layers, and explain why each step is necessary
  for factor analysis convergence.


  Provide complete, runnable code for tasks 1 and 2, and a structured written explanation
  for task 3.'
