id: digital-pathology-11
prompt: 'Here is test question #11 of 30:


  ---


  You are working with a cohort of 847 colorectal cancer whole-slide images in SVS
  format from the TCGA-CRC dataset. Each slide has been scanned at 40× magnification
  (0.25 µm/px). You need to extract tissue patches for downstream feature extraction
  using the H-optimus-0 foundation model.


  Your pipeline must:

  1. Use TIAToolbox''s `WSIReader` to read a single slide (`TCGA-AA-3697-01Z-00-DX1.svs`)
  and print its metadata including dimensions, vendor, and available magnification
  levels.

  2. Generate a tissue mask using TIAToolbox''s `TissueMasker` with Otsu thresholding
  at a resolution of 1.25× (mpp ≈ 8.0), then visualize the mask overlaid on a thumbnail.

  3. Extract non-overlapping 256×256 patches at 20× magnification (0.50 µm/px) from
  tissue regions only (minimum 75% tissue coverage per patch), saving patch coordinates
  to a CSV file with columns `[slide_id, x, y, width, height, mpp]`.

  4. Load the H-optimus-0 model from Hugging Face (`bioptimus/H-optimus-0`) using
  the `timm` library, apply the recommended preprocessing transforms, and extract
  1536-dimensional embeddings for a batch of 32 patches using `torch.no_grad()`.


  Provide complete, runnable Python code for all four steps. Use `tiatoolbox>=1.5.0`
  and `torch>=2.0`. Include any necessary imports and briefly comment each major code
  block. Assume the SVS file is located at `/data/slides/TCGA-AA-3697-01Z-00-DX1.svs`.'
