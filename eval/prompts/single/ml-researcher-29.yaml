id: ml-researcher-29
prompt: 'You are conducting a multi-site federated learning study to predict 90-day
  readmission after cardiac surgery across 7 hospital systems (sites A–G). Site characteristics:
  A and B are academic quaternary centers (n=4,200 and n=3,800 patients respectively),
  C–E are community hospitals (n=800–1,200 each), and F–G are rural critical access
  hospitals (n=180 and n=210). The outcome prevalence varies substantially: 22% at
  A/B, 14–16% at C–E, and 31–34% at F/G. Features include 47 EHR-derived variables
  (vitals, labs, procedure codes, comorbidities), but sites F and G are missing creatinine
  clearance and BNP for >60% of patients due to local lab infrastructure gaps.


  You plan to use a federated averaging (FedAvg) approach with a gradient-boosted
  tree model (XGBoost) over 20 communication rounds, then evaluate a fine-tuned global
  model versus locally-adapted models at each site.


  Please provide:

  1. A rigorous data partitioning and evaluation strategy that prevents site-level
  leakage while honestly assessing generalization to underrepresented rural sites

  2. Specific recommendations for handling the differential missingness at sites F/G,
  including whether to impute centrally vs. locally and the tradeoffs

  3. A calibration assessment plan given the heterogeneous outcome prevalence across
  sites — which metrics, at what granularity, and how to detect miscalibration that
  is site-specific vs. global

  4. A fairness audit design identifying the most critical subgroup analyses given
  the rural/urban site imbalance and small site sample sizes

  5. A TRIPOD+AI-aligned reporting checklist excerpt (5–7 items) most likely to be
  deficient in federated multi-site cardiac surgery studies'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: hard
