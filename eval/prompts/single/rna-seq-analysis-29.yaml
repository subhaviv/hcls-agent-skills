id: rna-seq-analysis-29
prompt: 'You are analyzing a bulk RNA-seq dataset from 12 tumor samples (6 treatment,
  6 control) where you ran **both** STAR+featureCounts and Salmon quantification pipelines
  on the same raw FASTQ files. After running DESeq2 independently on each count source,
  you observe a striking discrepancy: Salmon-based analysis identifies 847 differentially
  expressed genes (padj < 0.05, |log2FC| > 1), while STAR+featureCounts yields only
  203 DEGs under identical thresholds. Key details:


  - STAR was run with `--outSAMstrandField intronMotif` and `--outFilterMismatchNmax
  10`

  - featureCounts used `-s 0` (unstranded) with Ensembl GRCh38 GTF

  - Salmon used `--libType A` with a decoy-aware index

  - The RNA-seq library was prepared with the **TruSeq Stranded mRNA** kit

  - MultiQC shows average 78% uniquely mapped reads in STAR, with ~15% of reads mapping
  to multiple loci

  - tximport was used with `type="salmon"` and `ignoreTxVersion=TRUE`


  Provide: (1) a diagnosis of the most likely technical causes for this count discrepancy,
  ranked by probability; (2) the specific parameter corrections needed for both pipelines;
  (3) corrected R/bash code snippets for featureCounts and the DESeq2 setup from tximport;
  (4) an explanation of whether the Salmon or featureCounts results are more trustworthy
  given these specific issues, and why.'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: hard
