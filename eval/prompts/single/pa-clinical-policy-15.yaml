id: pa-clinical-policy-15
prompt: 'A 58-year-old Medicare Advantage patient with moderate-to-severe plaque psoriasis
  (BSA 22%, PASI score 18) has been prescribed secukinumab (Cosentyx) 300mg by their
  dermatologist. The payer''s clinical policy requires step therapy through two conventional
  systemic agents (methotrexate AND cyclosporine) before approving a biologic. Chart
  documentation shows the patient completed 6 months of methotrexate (15mg/week, adequate
  trial) with inadequate response, but cyclosporine was contraindicated due to uncontrolled
  hypertension (BP averaging 158/96) and stage 3a CKD (eGFR 48 mL/min/1.73m²).


  The PA request was denied citing "incomplete step therapy." The prescriber wants
  to pursue a peer-to-peer review and formal appeal simultaneously.


  Please provide:


  1. **Clinical necessity argument**: Identify which specific contraindication criteria
  (citing standard clinical guidelines such as AAD or ACR) support bypassing cyclosporine
  in this patient''s case, and explain how hypertension and CKD interact as compounding
  contraindications.


  2. **Appeal documentation strategy**: Outline the key components of a Level 1 appeal
  letter, including what clinical evidence (lab values, BP readings, specialist notes)
  must be included and how to frame the step therapy exception request under CMS Medicare
  Advantage step therapy rules (42 CFR §422.568).


  3. **Peer-to-peer talking points**: Draft 4-5 concise clinical talking points the
  prescriber should use during the peer-to-peer call to address the medical reviewer''s
  likely objections.


  4. **FHIR Da Vinci PAS mapping**: Identify which FHIR resource elements in a PAS
  ClaimResponse should capture the step therapy exception documentation to support
  downstream appeals tracking.'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: intermediate
