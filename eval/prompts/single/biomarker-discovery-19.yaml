id: biomarker-discovery-19
prompt: 'Here is test question #19:


  ---


  You are developing a **predictive biomarker** for response to a novel PARP inhibitor
  (veliratinib) in high-grade serous ovarian cancer. You have RNA-seq data (18,442
  genes) from 94 pre-treatment tumor biopsies: 31 responders (complete/partial response
  by RECIST) and 63 non-responders. A collaborator has already run a standard LASSO
  logistic regression using 5-fold cross-validation and identified a 7-gene signature
  (BRCA1, RAD51, FANCD2, PALB2, CDK12, CCNE1, RB1) achieving AUC = 0.84. They claim
  this signature is "validated" and ready for prospective clinical use.


  **Your tasks:**


  1. **Critique the validation claim** — identify at least four specific methodological
  problems with this analysis that could cause the reported AUC to be optimistically
  biased, referencing concepts like events-per-variable ratio, nested cross-validation,
  and leakage sources.


  2. **Redesign the analysis pipeline** — provide pseudocode or R/Python code for
  a rigorous nested cross-validation approach with proper feature selection inside
  the inner loop, including appropriate handling of the class imbalance (2:1 non-responder:responder
  ratio).


  3. **Distinguish biomarker intent** — given that veliratinib targets HRD tumors,
  explain whether this signature should be classified as predictive, prognostic, or
  both, and describe the statistical design (including an appropriate interaction
  test) needed to formally establish predictive utility versus prognostic value.


  4. **Plan external replication** — specify minimum requirements for an external
  validation cohort, the preferred performance metric (justify C-index vs. AUC vs.
  time-dependent AUC for this binary endpoint), and one decision curve analysis interpretation
  that would support clinical deployment.'
