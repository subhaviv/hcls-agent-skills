id: variant-calling-14
prompt: 'You are setting up a somatic variant calling pipeline for a pan-cancer study
  at the Meridian Cancer Institute. You have 45 tumor samples (mix of LUAD, BRCA,
  and CRC) with matched normal tissue for 28 of them; the remaining 17 are tumor-only
  cases. All samples were sequenced on an Illumina NovaSeq 6000 with 100x mean tumor
  coverage and 50x mean normal coverage using 150bp paired-end reads. Your reference
  genome is GRCh38 with a panel of normals (PoN) built from 85 healthy blood samples
  sequenced at the same institution.


  Your team wants to call SNVs and indels using GATK Mutect2, but you are uncertain
  how to handle the mixed tumor-only and tumor-normal cohort within a single unified
  workflow, and how to properly apply filtering afterward.


  Please provide the following:


  1. A recommended Mutect2 invocation strategy that handles both tumor-normal and
  tumor-only modes within the same Snakemake or shell-based workflow, clearly distinguishing
  parameter differences between the two modes (include relevant flags such as `--germline-resource`,
  `--panel-of-normals`, and `--af-of-alleles-not-in-resource`).


  2. An explanation of why the `--af-of-alleles-not-in-resource` parameter value should
  differ between tumor-normal and tumor-only modes, and what values you would use
  given a gnomAD germline resource.


  3. A FilterMutectCalls command with appropriate contamination estimation steps using
  GetPileupSummaries and CalculateContamination, noting which samples require special
  handling.


  4. A brief quality control checklist (5–7 items) to validate your final filtered
  VCF before downstream mutational signature analysis.'
target_skills:
- variant-calling
domain: genomics
difficulty: intermediate
