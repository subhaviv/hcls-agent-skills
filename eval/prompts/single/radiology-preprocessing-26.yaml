id: radiology-preprocessing-26
prompt: 'A research team is processing a dataset of 847 T1w MRI scans from a multi-site
  study (sites: Boston, Chicago, Denver) acquired on different scanner vendors (Siemens
  Prisma 3T, GE Discovery 750 3T, Philips Ingenia 3T). They have completed skull stripping
  using HD-BET and now need to register all images to MNI152 space using ANTs SyN
  registration. During QC, they notice that approximately 12% of the Boston site scans
  (acquired on the Philips scanner) show registration failures where the cerebellum
  is misaligned by >5mm after registration to the MNI152NLin2009cAsym template.


  The team suspects the issue stems from the interaction between HD-BET output masks,
  residual bias field artifacts specific to the Philips scanner''s gradient non-linearity,
  and their current ANTs registration parameters (rigid: 1000x500x250x100, affine:
  1000x500x250x100, SyN: 100x70x50x20 with gradient step 0.1, smoothing sigmas 3x2x1x0,
  shrink factors 8x4x2x1).


  Please provide:

  1. A diagnostic framework to confirm whether bias field or mask quality is the primary
  failure cause, including specific FSL/ANTs commands to assess mask quality metrics

  2. A revised ANTs registration command with modified parameters specifically tuned
  to handle the cerebellar misalignment issue, with justification for each changed
  parameter

  3. A Python script using ANTsPy that implements an automated QC check flagging registrations
  with cerebellar Dice score below 0.85 using the MNI cerebellar atlas mask

  4. Recommendations for whether N4 bias correction should be applied before or after
  HD-BET for this specific scanner configuration, with reasoning'
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: intermediate
