id: structure-based-drug-design-18
prompt: 'You are optimizing a series of macrocyclic inhibitors targeting the PPI (protein-protein
  interaction) interface of the KRASG12C·SOS1 complex. Crystallographic data (PDB:
  7XYZ, fictional) reveals a shallow, elongated binding groove (~850 Ų BSA) with three
  sub-pockets: a deep hydrophobic anchor (sub-pocket α), a solvent-exposed polar region
  (sub-pocket β), and a cryptic allosteric cavity (sub-pocket γ) that only appears
  in 2 of 5 crystal forms. Your lead compound **MAC-47** shows IC₅₀ = 340 nM in TR-FRET
  but only 12% cellular target engagement at 10 µM (NanoBRET assay). MM-GBSA rescoring
  of the top 50 docked poses gives ΔG_bind = −28.4 kcal/mol, yet the compound has
  poor selectivity against the KRASG12C·RAF1 interface (3-fold window).


  Provide the following:


  1. **Diagnose** the likely reason(s) for the disconnect between biochemical potency
  and poor cellular engagement, citing at least three structure-based and physicochemical
  factors specific to macrocyclic PPI inhibitors.


  2. **Propose a revised docking strategy** for the next design cycle that accounts
  for the cryptic sub-pocket γ, including which sampling method (IFD, ensemble docking,
  metadynamics-seeded docking) you would use and why.


  3. **Design a 5-step virtual screening cascade** (with specific filters, tools,
  and cutoffs) to prioritize 200 analogs from a 50,000-compound macrocycle library,
  targeting improved cellular permeability while retaining PPI potency.


  4. **Identify two FEP-amenable structural modifications** to MAC-47 that could improve
  the selectivity window against KRASG12C·RAF1, justifying your choices based on the
  binding site geometry.'
