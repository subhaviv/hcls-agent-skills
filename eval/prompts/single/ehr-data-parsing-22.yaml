id: ehr-data-parsing-22
prompt: 'Here is test question #22 of 30:


  ---


  You have received a batch of HL7v2 ORU^R01 messages from a hospital laboratory system
  containing CBC (Complete Blood Count) results for 50 patients. Each message follows
  standard HL7v2.5 format with MSH, PID, OBR, and multiple OBX segments. Below is
  a representative sample message:


  ```

  MSH|^~\&|LAB|HOSP|EHR|HOSP|20240315143022||ORU^R01|MSG00123|P|2.5

  PID|1||PT98765^^^HOSP^MR||Johnson^Robert^A||19780422|M|||123 Elm St^^Boston^MA^02101

  OBR|1||ORD88421|58410-2^CBC panel^LN|||20240315140000

  OBX|1|NM|718-7^Hemoglobin^LN||13.2|g/dL|13.5-17.5|L|||F

  OBX|2|NM|789-8^RBC^LN||4.1|10*6/uL|4.5-5.9|L|||F

  OBX|3|NM|4544-3^Hematocrit^LN||39.5|%|41.0-53.0|L|||F

  OBX|4|NM|6690-2^WBC^LN||7.2|10*3/uL|4.5-11.0|N|||F

  OBX|5|NM|777-3^Platelets^LN||185|10*3/uL|150-400|N|||F

  ```


  Please provide the following:


  1. A Python function using the `hl7` library to parse this ORU^R01 message and extract
  patient demographics (MRN, name, DOB, sex) from the PID segment and all OBX lab
  values (LOINC code, test name, value, units, reference range, abnormal flag, result
  status).


  2. A function that processes a list of such parsed messages and converts them into
  a flat pandas DataFrame with one row per OBX observation.


  3. A data quality check function that flags records where the numeric result value
  falls outside the provided reference range but the abnormal flag shows "N" (normal),
  indicating a potential data inconsistency.'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: easy
