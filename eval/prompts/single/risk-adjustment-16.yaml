id: risk-adjustment-16
prompt: 'Here is test question #16 of 30:


  ---


  You are building a CMS-HCC risk adjustment pipeline for a Medicare Advantage plan
  with 12,000 members. Your data team has identified that a subset of 847 members
  have active Rx claims for insulin (NDC codes mapping to insulin glargine, insulin
  aspart, and insulin lispro) but **no corresponding ICD-10 diagnosis codes** for
  diabetes (E10.xx or E11.xx) documented in the current measurement year (2024). Additionally,
  312 members have HbA1c lab results ≥ 7.5% in the past 180 days with no diabetes
  diagnosis codes on file.


  Using CMS-HCC Model V28, diabetes maps to HCC 37 (Diabetes with Chronic Complications)
  or HCC 38 (Diabetes without Complication), depending on specificity. The demographic
  segment for your population is community, non-dual, aged.


  **Deliverables requested:**


  1. **Python code** that ingests a member DataFrame (columns: `member_id`, `has_insulin_rx`,
  `has_hba1c_flag`, `hba1c_value`, `existing_hccs`) and outputs a prioritized coding
  gap list with estimated RAF impact per member, assuming E11.65 (Type 2 diabetes
  with hyperglycemia) maps to HCC 37.


  2. **Hierarchy resolution logic** — explain how to handle cases where a member already
  has HCC 19 (Diabetes without Complication, Model V24 legacy code) in their profile
  and how V28 hierarchy rules should suppress or retain it.


  3. **A brief methodology note** (5–8 sentences) describing how you would validate
  these Rx/lab proxy gaps against encounter data before submitting to CMS to avoid
  improper risk score inflation.


  Assume the coefficient for HCC 37 in the community non-dual aged segment is **0.302**.


  ---'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: intermediate
