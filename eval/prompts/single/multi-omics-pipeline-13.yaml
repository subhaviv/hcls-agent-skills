id: multi-omics-pipeline-13
prompt: 'Here is test question #13 of 30:


  ---


  You are analyzing a multi-omics dataset from a colorectal cancer study with 85 tumor
  samples and 40 healthy controls. You have three data layers: RNA-seq gene expression
  (18,500 genes), DNA methylation (850K array, beta values), and proteomics (4,200
  proteins identified by mass spectrometry). The feature identifiers across these
  layers are inconsistent — RNA-seq uses Ensembl gene IDs (e.g., ENSG00000141510),
  methylation probes are annotated with HGNC symbols (e.g., TP53, KRAS), and proteomics
  uses UniProt accession numbers (e.g., P04637).


  Your goal is to harmonize all three layers to a common HGNC symbol space before
  downstream integration. Please provide:


  1. **R code using the `biomaRt` package** to map Ensembl IDs from the RNA-seq layer
  to HGNC symbols, including how to handle one-to-many mappings (keep the first match)
  and missing mappings (drop those features).


  2. **R code** to map UniProt accession numbers from the proteomics layer to HGNC
  symbols using `biomaRt`, specifying the correct attribute names (`uniprotswissprot`
  filter and `hgnc_symbol` attribute).


  3. A brief strategy (3–4 sentences) for what to do with features that fail to map
  in any layer — specifically whether to impute, drop, or flag them — and how to document
  these decisions in a reproducible pipeline log.


  Assume you are using Ensembl release 109 (GRCh38) and that the `biomaRt` mart is
  already connected as `mart <- useMart("ensembl", dataset = "hsapiens_gene_ensembl")`.'
target_skills:
- multi-omics-pipeline
domain: multi-omics
difficulty: easy
