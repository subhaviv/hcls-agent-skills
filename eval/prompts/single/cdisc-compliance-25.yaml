id: cdisc-compliance-25
prompt: 'A mid-size CRO is preparing SDTM datasets for a Phase III oncology trial
  (N=412 patients) for FDA submission. The trial collected tumor assessments using
  RECIST 1.1 criteria, and the programmers have mapped all tumor response data into
  the TU (Tumor/Lesion Identification) and TR (Tumor/Lesion Results) domains. However,
  the medical monitor has flagged several data points that don''t fit cleanly into
  standard SDTM variables.


  Specifically, the following non-standard data was collected:

  1. A sponsor-defined "Lesion Burden Score" (composite numeric value calculated from
  up to 5 target lesions) recorded at each visit

  2. A free-text "Radiologist Commentary" field (up to 500 characters) captured per
  assessment

  3. A binary flag indicating whether a lesion was "New vs. Pre-existing" that doesn''t
  map to any standard TUORRES controlled terminology value

  4. An "Imaging Modality Change" flag (CT→MRI switch mid-study for 23 patients) recorded
  at the assessment level


  The team is debating whether to use SUPPTU, SUPPTR, or create a new custom domain
  for items 1–4. Pinnacle 21 Enterprise is flagging 47 errors related to these variables,
  and the define.xml currently has no value-level metadata for the TR domain.


  Please provide:

  - A mapping recommendation for each of the 4 non-standard data elements, with SDTM
  domain/variable placement rationale

  - A decision framework for when SUPPQUAL is appropriate versus a new custom domain

  - The required define.xml value-level metadata structure for TRORRES in the TR domain
  (covering at least 3 distinct result types)

  - Prioritization of which Pinnacle 21 error categories to resolve first given FDA
  submission timelines'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: intermediate
