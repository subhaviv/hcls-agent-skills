id: multi-omics-pipeline-17
prompt: 'You are integrating transcriptomic (RNA-seq) and proteomic (TMT mass spectrometry)
  data from 85 colorectal cancer patients (45 microsatellite stable [MSS], 40 microsatellite
  instable [MSI-H]) collected across three clinical sites (Boston, n=30; Houston,
  n=28; Seattle, n=27). Raw RNA-seq counts are annotated with Ensembl gene IDs (GRCh38),
  while the proteomics data uses UniProt accession numbers. You suspect strong site-level
  batch effects in both layers.


  Your analysis goals are:


  1. **ID Harmonization**: Write R code using `biomaRt` to map Ensembl gene IDs to
  HGNC symbols and UniProt accession numbers, retaining only 1:1 mappings and filtering
  to the 8,500 genes/proteins present in both layers.


  2. **Batch Correction**: Apply `ComBat-seq` to the RNA-seq count matrix (using site
  as batch, MSS/MSI-H as biological covariate) and standard `ComBat` to the log2-transformed
  TMT protein intensities. Provide complete R code for both steps including any required
  preprocessing.


  3. **MOFA2 Integration**: Configure and train a MOFA2 model in R on the batch-corrected
  data using 15 latent factors, with `ard_weights=TRUE` and `spikeslab_factors=FALSE`.
  Show how to extract factor loadings and variance explained per omics layer.


  4. **Enrichment Analysis**: For the top factor explaining the most variance in the
  transcriptomic layer, extract the top 200 gene drivers and run `clusterProfiler`
  GSEA against the MSigDB Hallmark gene set collection. Include code to visualize
  results as a dot plot.


  Provide complete, runnable R code for all four steps with brief explanations of
  key parameter choices.'
target_skills:
- multi-omics-pipeline
