id: cheminformatics-23
prompt: 'You have a small library of 6 compounds (SMILES provided below) that you
  want to evaluate for oral druglikeness before advancing to in vitro testing. Apply
  both Lipinski''s Rule of Five and Veber''s rules to filter this library, then compute
  Morgan fingerprints (radius=2, 2048 bits) and calculate pairwise Tanimoto similarity
  to identify any redundant compounds (similarity > 0.85).


  **Compound Library:**

  - Cpd_01: `CC(C)Cc1ccc(cc1)C(C)C(=O)O` (ibuprofen-like)

  - Cpd_02: `CC(=O)Nc1ccc(O)cc1` (paracetamol-like)

  - Cpd_03: `c1ccc2c(c1)cc1ccc3cccc4ccc2c1c34` (pyrene, PAH)

  - Cpd_04: `CC(C)Cc1ccc(cc1)C(C)C(=O)OCC` (ibuprofen ethyl ester)

  - Cpd_05: `CC(=O)Oc1ccccc1C(=O)O` (aspirin-like)

  - Cpd_06: `CCCCCCCCCCCCCCCCC(=O)O` (stearic acid)


  **Deliverables:**

  1. A Python/RDKit code block that computes MW, LogP, HBD, HBA, rotatable bonds,
  and TPSA for all six compounds, flags Lipinski and Veber pass/fail, and prints a
  summary table.

  2. Code to compute all pairwise Tanimoto similarities using Morgan fingerprints
  and flag pairs exceeding 0.85.

  3. A brief written interpretation (3–5 sentences) identifying which compounds pass
  all filters, which fail and why, and whether any redundant pairs exist.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: easy
