id: aws-genai-ml-architect-15
prompt: 'A regional health system operating 12 hospitals has built a clinical decision
  support tool that uses a fine-tuned SageMaker model to predict 30-day readmission
  risk for heart failure patients. The model was trained on 340,000 de-identified
  patient records and achieves 0.81 AUC. The system currently runs on a single ml.g4dn.2xlarge
  real-time endpoint processing ~2,400 predictions/day with average latency of 340ms.
  The health system''s ML team wants to evolve this into a production-grade MLOps
  system that satisfies FDA Software as a Medical Device (SaMD) requirements and maintains
  HIPAA compliance.


  Current pain points include: no automated model drift detection, manual retraining
  triggered ad-hoc, no audit trail for individual predictions used in clinical decisions,
  model versions not tracked against specific patient cohorts, and the endpoint costs
  $1,847/month even during low-utilization overnight hours.


  Design a complete MLOps architecture on AWS that addresses all of these gaps. Your
  response must include:


  1. A component-by-component architecture diagram description covering model registry,
  CI/CD pipeline, drift monitoring, and audit logging with specific AWS services for
  each layer

  2. A recommended SageMaker Model Monitor configuration for detecting data drift
  and concept drift on this readmission model, including which baseline statistics
  to capture and alert thresholds

  3. A Python code snippet using boto3 that logs each prediction to DynamoDB with
  all fields required for FDA SaMD audit trail compliance (prediction ID, model version,
  input features hash, output score, clinician ID, timestamp, patient encounter ID)

  4. A cost optimization strategy that reduces the current $1,847/month endpoint cost
  by at least 40% without degrading latency SLA below 500ms'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: intermediate
