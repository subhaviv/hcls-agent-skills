id: ml-researcher-16
prompt: 'Here is the test question:


  ---


  You are developing a deep learning model to predict 30-day hospital readmission
  from discharge summaries in a multi-site EHR system. Your dataset contains 47,832
  discharge notes from Hospital A (2015–2021) and 12,104 notes from Hospital B (2019–2022),
  with readmission rates of 14.2% and 19.7% respectively. You plan to fine-tune a
  clinical BERT variant (Bio_ClinicalBERT) for binary classification.


  **Provide the following:**


  1. **Data splitting strategy**: Design a splitting approach that avoids temporal
  leakage and properly accounts for site differences. Specify how you would allocate
  data across train/validation/test sets and justify your choices given the class
  imbalance and multi-site structure.


  2. **Evaluation metrics**: Recommend a primary and two secondary metrics. Explain
  why AUROC alone is insufficient here and whether AUPRC or calibration metrics (e.g.,
  ECE, Brier score) are more appropriate given the clinical use case of triaging high-risk
  patients.


  3. **Subgroup fairness audit**: Identify at least three patient subgroups you would
  audit, explain which fairness criterion (equalized odds, demographic parity, calibration
  within groups) is most clinically appropriate, and describe how you would flag a
  model as failing the audit.


  4. **Site generalization test**: Describe a statistical test or evaluation protocol
  to determine whether the model trained on Hospital A generalizes to Hospital B,
  accounting for the different time ranges and base rates.


  5. **TRIPOD+AI checklist items**: List four specific TRIPOD+AI reporting items that
  are most likely to be inadequately addressed in a paper describing this system,
  and explain why each is a common gap.


  ---'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: intermediate
