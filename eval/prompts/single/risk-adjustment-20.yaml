id: risk-adjustment-20
prompt: 'A regional Medicare Advantage plan has provided the following member snapshot
  for risk adjustment validation. Member ID M-4471 is a 72-year-old female with the
  following active ICD-10 codes submitted in the current measurement year: E11.40
  (Type 2 DM with diabetic neuropathy, unspecified), E11.65 (Type 2 DM with hyperglycemia),
  E11.9 (Type 2 DM without complications), I50.32 (Chronic diastolic heart failure),
  I50.9 (Heart failure, unspecified), N18.4 (CKD Stage 4), and N18.9 (CKD, unspecified).


  The plan is using CMS-HCC Model V28. The member''s demographic RAF component is
  0.379 (community, non-Medicaid, aged female 70-74).


  Your task is to produce four concrete deliverables:


  1. **Hierarchy Resolution**: Apply V28 disease hierarchies programmatically. List
  which HCC codes survive after hierarchy suppression, explicitly identifying which
  codes are trumped and by which higher-severity HCC.


  2. **RAF Score Calculation**: Compute the final member-level RAF score using the
  surviving HCCs. Use these V28 HCC coefficients: HCC37 (Diabetes with Chronic Complications)
  = 0.302, HCC135 (Acute/Chronic Diastolic Heart Failure) = 0.323, HCC329 (CKD Stage
  4) = 0.289. Show your arithmetic step by step.


  3. **Python Code**: Write a self-contained Python function `resolve_and_score(icd_list,
  demographic_raf)` that accepts a list of ICD-10 codes and a demographic RAF float,
  applies V28 hierarchy rules for these specific disease families, and returns the
  final RAF score and list of qualifying HCCs.


  4. **Coding Gap Flag**: Given that the member fills metformin and furosemide regularly
  (Rx proxy signals), identify any additional HCC coding opportunities that should
  be investigated and explain the clinical rationale.'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: hard
