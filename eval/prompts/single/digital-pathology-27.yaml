id: digital-pathology-27
prompt: 'You are building a weakly-supervised multiple instance learning (MIL) pipeline
  for predicting microsatellite instability (MSI) status from H&E-stained colorectal
  cancer whole-slide images. Your dataset consists of 847 slides (512 MSI-High, 335
  MSS) from the TCGA-COAD cohort stored as SVS files. You plan to use the UNI foundation
  model for patch-level feature extraction followed by an ABMIL (Attention-Based MIL)
  aggregator for slide-level classification.


  Your specific requirements are:

  - Extract non-overlapping 256×256 patches at 0.5 mpp from tissue regions (tissue
  mask threshold: 0.8)

  - Use UNI to generate 1024-dimensional embeddings for each patch

  - Implement a two-layer ABMIL aggregator with attention dimension 256 and gated
  attention

  - Handle class imbalance using weighted random sampling during training (do not
  use oversampling)

  - Train with AdamW optimizer, learning rate 1e-4, weight decay 1e-5, for 30 epochs
  with early stopping (patience=7) on validation AUROC

  - Split data 70/15/15 train/val/test stratified by MSI status


  Please provide:

  1. Complete TIAToolbox code to extract patches and generate UNI embeddings, saving
  per-slide `.pt` feature files

  2. A PyTorch implementation of the gated ABMIL aggregator module

  3. Training loop code with weighted random sampling and early stopping logic

  4. Expected AUROC range on the test set based on published literature for this task'
target_skills:
- digital-pathology
domain: imaging
difficulty: intermediate
