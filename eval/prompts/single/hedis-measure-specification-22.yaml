id: hedis-measure-specification-22
prompt: 'A regional health plan is preparing for HEDIS measurement year 2024 and needs
  to evaluate their performance on the **Controlling High Blood Pressure (CBP)** measure.
  Their data analyst has pulled the following population snapshot:


  - Total attributed members aged 18–85: 42,000

  - Members with a diagnosis of hypertension: 8,400

  - Members who meet continuous enrollment criteria (enrolled for the full measurement
  year with no more than one allowable gap): 6,200

  - Members excluded due to ESRD: 310

  - Members excluded due to pregnancy: 85

  - Members excluded due to hospice/palliative care: 140

  - Members with a documented blood pressure reading < 140/90 at the most recent qualifying
  visit: 3,100


  Using this data, please provide the following:


  1. **Calculate the CBP measure denominator** by applying HEDIS exclusion logic in
  the correct order, showing your step-by-step arithmetic.

  2. **Calculate the CBP numerator** and the resulting **measure rate as a percentage**,
  rounded to one decimal place.

  3. **Identify two common documentation pitfalls** that cause members to fall out
  of the numerator for CBP, based on NCQA measure specifications.

  4. **Recommend three actionable care gap closure strategies** specifically for CBP,
  noting which patient subpopulations (e.g., by age band or comorbidity) should be
  prioritized first given typical Star Rating weighting for this measure.


  Assume standard NCQA HEDIS 2024 specifications apply. Show all calculations clearly.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: easy
