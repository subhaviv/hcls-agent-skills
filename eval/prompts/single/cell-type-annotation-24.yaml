id: cell-type-annotation-24
prompt: 'You have processed a 10x Chromium single-cell RNA-seq dataset from 8 pediatric
  ALL (acute lymphoblastic leukemia) patients, resulting in 42,000 cells clustered
  into 28 Leiden clusters (resolution=1.2). Your AnnData object (`adata`) contains
  raw counts in `adata.X`, UMAP coordinates, and batch-corrected embeddings via Harmony
  in `adata.obsm[''X_pca_harmony'']`. You want to perform hierarchical cell type annotation:
  first distinguishing broad lineages (T cell, B cell, myeloid, stromal), then sub-annotating
  immune populations at finer resolution.


  **Your tasks:**


  1. **CellTypist annotation**: Run CellTypist using the `Immune_All_High.pkl` model
  with majority voting enabled. Write code to store predictions in `adata.obs` and
  visualize both `majority_voting` and `predicted_labels` on UMAP side-by-side.


  2. **Marker-based validation**: For clusters suspected to be B-cell precursors (leukemic
  blasts), generate a dotplot showing expression of: `CD19`, `CD10` (MME), `PAX5`,
  `TDT` (DNTT), `CD34`, `CD20` (MS4A1), `CD45` (PTPRC), and `CD38`. Include cluster-average
  dot size scaling and color by mean expression z-score.


  3. **Conflict resolution**: Write a function `resolve_annotation_conflicts(adata,
  celltypist_col, marker_threshold=0.5)` that identifies clusters where CellTypist
  majority voting confidence score falls below 0.5, flags them as "low_confidence",
  and returns a DataFrame summarizing: cluster ID, top-2 predicted labels, their confidence
  scores, and mean expression of the 3 highest-variance genes in that cluster.


  4. Briefly explain when majority voting might **fail** specifically in leukemia
  datasets and what alternative strategy you would recommend.'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: intermediate
