id: radiology-preprocessing-14
prompt: 'You are setting up an automated T1w preprocessing pipeline for a multi-site
  neuroimaging study involving 847 participants across 3 scanner sites (Siemens Prisma
  3T, GE Discovery MR750 3T, and Philips Ingenia 1.5T). Initial quality checks reveal
  significant inter-site intensity inhomogeneity, with the Philips 1.5T data showing
  particularly severe bias fields in frontal and temporal regions. Additionally, approximately
  12% of scans have poor skull stripping results when using the default FSL BET with
  fractional intensity threshold f=0.5, predominantly affecting subjects with large
  ventricles or atypical head shapes.


  Your goal is to register all preprocessed T1w images to MNI152 standard space (2mm
  isotropic) for downstream voxel-based morphometry analysis.


  Please provide:

  1. A recommended preprocessing order for these steps (bias correction, skull stripping,
  registration) with justification for the sequencing decisions

  2. Python/bash code implementing the full pipeline using ANTs (N4BiasFieldCorrection,
  antsBrainExtraction, antsRegistrationSyNQuick) with appropriate parameters for handling
  the multi-site variability

  3. Specific parameter adjustments to improve skull stripping accuracy for the problematic
  12% of cases, including a strategy to automatically detect and reprocess failed
  extractions

  4. A quality control metric (computable from the outputs) to flag scans with poor
  MNI registration quality, with a threshold recommendation based on typical VBM study
  standards'
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: intermediate
