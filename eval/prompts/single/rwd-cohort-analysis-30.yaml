id: rwd-cohort-analysis-30
prompt: 'You are analyzing a Medicare claims dataset (n=42,800 patients) comparing
  two SGLT2 inhibitors — empagliflozin (n=21,400) vs. dapagliflozin (n=21,400) — for
  time-to-first hospitalized heart failure (HHF) event over a 36-month follow-up.
  After 1:1 propensity score matching on 47 covariates (age, sex, CCI, prior HF diagnosis
  via ICD-10 I50.x, baseline diuretic use via NDC codes, eGFR categories, etc.), your
  SMD diagnostics reveal that 3 covariates remain imbalanced (SMD > 0.10): baseline
  loop diuretic intensity (SMD=0.14), prior HF hospitalization count (SMD=0.12), and
  NT-proBNP lab availability as a proxy for disease severity (SMD=0.11). Additionally,
  when you fit the Cox proportional hazards model, the global Schoenfeld residuals
  test yields p=0.03, and visual inspection of log-log survival curves shows the treatment
  hazard curves crossing at approximately month 18.


  Provide the following deliverables:


  1. **Residual confounding strategy**: Recommend and justify two approaches to address
  the three imbalanced covariates post-matching (e.g., IPTW trimming, additional adjustment,
  fine stratification), with explicit tradeoffs.


  2. **Non-proportional hazards handling**: Given the crossing hazards at month 18,
  propose two statistically rigorous alternatives to the standard Cox model (e.g.,
  restricted mean survival time, time-varying coefficients), with Python code implementing
  one of them using `lifelines`.


  3. **Sensitivity analysis**: Design a quantitative bias analysis (E-value calculation)
  to assess unmeasured confounding robustness, and provide the Python formula/code
  to compute the E-value from the observed HR=0.82 (95% CI: 0.71–0.94).


  4. **Reporting recommendation**: Specify which estimand (ATT vs. ATE) is most appropriate
  given the study design and why.'
target_skills:
