id: cdisc-compliance-26
prompt: 'A Phase III oncology trial (STUDY-ONC-447) is preparing SDTM datasets for
  FDA submission. The study collected tumor assessment data including target lesion
  measurements, non-target lesion responses, and overall tumor response per RECIST
  1.1. The data management team has mapped this data to the Tumor Results (TR), Tumor
  Identification (TU), and Response Evaluation (RS) domains.


  During Pinnacle 21 validation, the following issues were flagged:

  - **P21-001 (Warning):** TRORRES values "CR", "PR", "SD", "PD" in TR domain not
  matching CDISC CT for TRORRES codelist (NCICODE: C96613)

  - **P21-002 (Error):** RSSTRESC missing value-level metadata in define.xml for RSDTC-derived
  records

  - **P21-003 (Warning):** TUORRES contains free-text anatomical descriptions exceeding
  200 characters; SUPPTU not implemented

  - **P21-004 (Error):** RELREC relationships between TU, TR, and RS domains not established


  Given this scenario, provide the following deliverables:


  1. **Controlled Terminology Analysis:** Explain why P21-001 is flagged and identify
  the correct CDISC CT codelist and permissible values for TRORRES in the TR domain
  vs. RSSTRESC in the RS domain.


  2. **define.xml Fix:** Write the value-level metadata XML snippet for RSSTRESC that
  resolves P21-002, covering at minimum two distinct RSDTC-derived record types.


  3. **SUPPTU Decision:** Recommend whether to implement SUPPTU for the long anatomical
  descriptions or use an alternative approach, with justification referencing SDTM
  IG 3.3 guidance.


  4. **RELREC Design:** Provide the RELREC dataset structure (column layout and at
  least 3 sample rows) linking TU, TR, and RS records for a single subject (USUBJID:
  "ONC447-001-0023").'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: intermediate
