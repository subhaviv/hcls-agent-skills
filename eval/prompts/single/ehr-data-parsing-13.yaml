id: ehr-data-parsing-13
prompt: 'Here is test question #13 of 30:


  ---


  You have received a batch of HL7v2 ORU^R01 messages from a laboratory information
  system containing complete blood count (CBC) results for 50 patients. Each message
  follows this simplified structure:


  ```

  MSH|^~\&|LAB|HOSPITAL|EHR|MAIN|20240315120000||ORU^R01|MSG001|P|2.5

  PID|1||PT12345^^^MRN||Smith^John^A||19850322|M|||123 Main St^^Boston^MA^02101

  OBR|1||ORD98765|85025^CBC WITH DIFFERENTIAL^CPT

  OBX|1|NM|718-7^Hemoglobin^LN||13.2|g/dL|13.5-17.5|L|||F

  OBX|2|NM|789-8^RBC Count^LN||4.1|10*6/uL|4.5-5.9|L|||F

  OBX|3|NM|6690-2^WBC Count^LN||7.8|10*3/uL|4.5-11.0|N|||F

  OBX|4|NM|777-3^Platelet Count^LN||185|10*3/uL|150-400|N|||F

  ```


  Please provide:


  1. A Python function `parse_oru_message(hl7_text)` that extracts patient MRN, full
  name, date of birth, sex, and all OBX observations (LOINC code, test name, value,
  units, reference range, abnormal flag, and result status) into a structured dictionary.


  2. A function `batch_to_dataframe(message_list)` that processes a list of such HL7
  strings and returns a flat pandas DataFrame where each row represents one OBX observation
  linked to its patient identifiers.


  3. A data quality check function `flag_critical_values(df)` that adds a boolean
  column `is_critical` based on these thresholds: Hemoglobin < 7.0 g/dL, WBC Count
  > 30.0 10*3/uL, and Platelet Count < 50 10*3/uL, matched by LOINC code.'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: easy
