id: ngs-quality-control-30
prompt: 'You are processing a whole-exome sequencing cohort of 48 tumor-normal pairs
  from a pan-cancer study. After running fastp with default parameters, MultiQC aggregates
  show that 12 samples have >15% adapter content in R2 reads, 6 samples have mean
  Q-scores dropping below Q20 after cycle 85, and 3 samples exhibit a GC content bimodal
  distribution peaking at 38% and 67%. Additionally, mosdepth reports that 8 samples
  have mean on-target coverage <50x despite adequate total read counts, and Picard
  CollectHsMetrics shows these same 8 samples have FOLD_ENRICHMENT values between
  8–12 (vs. 45–60 for passing samples).


  Using the standard file structure described (THREADS=8, OUT=qc_out, paired FASTQs,
  coordinate-sorted BAM, ref.fasta, and target intervals file `targets.bed`), provide:


  1. A fastp command with specific flags to address the adapter content and Q-score
  tail issues, explaining why each parameter was chosen over defaults

  2. A bash script that runs mosdepth with the `--quantize` flag using clinically
  meaningful coverage thresholds for WES tumor samples, then flags samples failing
  <100x mean on-target coverage

  3. An interpretation of what the low FOLD_ENRICHMENT values (8–12) combined with
  adequate total reads most likely indicate about library preparation or capture,
  and what additional QC metric from Picard you would examine to confirm your hypothesis

  4. A recommended remediation strategy for the 3 samples with bimodal GC distribution
  — specifically whether to re-sequence, re-analyze, or exclude, with QC evidence
  thresholds that would support each decision'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: hard
