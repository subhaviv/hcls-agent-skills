id: pa-clinical-policy-29
prompt: 'A 58-year-old Medicare Advantage patient with treatment-resistant depression
  (TRD) has failed adequate trials of sertraline (150mg/day × 8 weeks) and escitalopram
  (20mg/day × 10 weeks), both documented in the EHR. The treating psychiatrist is
  requesting prior authorization for esketamine nasal spray (Spravato) under a regional
  Medicare Advantage plan (fictional: BlueStar Advantage, Plan ID BSA-2024-TX).


  The plan''s formulary places Spravato on Tier 5 (specialty) with a clinical PA policy
  requiring: (1) two prior SSRI/SNRI failures with adequate dose/duration, (2) concurrent
  oral antidepressant use, (3) administration only in certified healthcare settings,
  and (4) documented PHQ-9 score ≥15 within 30 days. The patient''s most recent PHQ-9
  was scored at 13 (documented 35 days ago), and the current oral antidepressant (bupropion
  300mg) was started only 18 days ago.


  Please provide:

  1. A gap analysis identifying which clinical criteria are met, borderline, or unmet,
  with specific reasoning for each criterion

  2. A recommended documentation strategy to strengthen the PA submission, including
  what additional clinical evidence the prescriber should gather

  3. A peer-to-peer review talking points outline the psychiatrist could use if the
  PA is initially denied

  4. A FHIR Da Vinci PAS-compliant JSON snippet (R4) illustrating how to represent
  the step therapy failures as prior therapy elements in a ClaimResponse or ServiceRequest
  resource

  5. An assessment of whether a Medicare Coverage Determination appeal pathway (redetermination
  → reconsideration → ALJ) would be viable if all PA attempts fail, citing relevant
  CMS coverage rules for esketamine'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: hard
