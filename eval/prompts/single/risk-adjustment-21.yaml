id: risk-adjustment-21
prompt: 'Here is test question #21 of 30:


  ---


  You are building a basic CMS-HCC risk adjustment pipeline for a small Medicare Advantage
  plan with 500 members. You have been given the following simplified member data
  for three patients and need to walk through the core calculation steps:


  **Member Data:**

  - Member A (Age 72, Female, Community Non-Dual): ICD-10 codes E11.40 (Type 2 DM
  with diabetic neuropathy, unspecified), E11.65 (Type 2 DM with hyperglycemia)

  - Member B (Age 68, Male, Community Non-Dual): ICD-10 codes I50.20 (Unspecified
  systolic heart failure), I50.22 (Chronic systolic heart failure), J44.1 (COPD with
  acute exacerbation)

  - Member C (Age 79, Female, Community Non-Dual): ICD-10 codes I21.3 (ST elevation
  MI), I25.10 (Atherosclerotic heart disease of native coronary artery)


  Using CMS-HCC Model V28 coefficients, please provide the following deliverables:


  1. **ICD-10 to HCC Crosswalk**: Map each ICD-10 code to its corresponding HCC category
  for all three members.

  2. **Hierarchy Resolution**: Apply CMS disease hierarchy rules to remove any dominated
  HCC codes for each member, explaining which codes are dropped and why.

  3. **RAF Score Calculation**: Using the demographic coefficients (Age/Sex) and the
  retained HCC coefficients, calculate a final RAF score for each member. Assume the
  community non-dual segment coefficients and use plausible V28 coefficient values.

  4. **Python Code**: Write a concise Python function `calculate_raf(member_dict,
  crosswalk_df, hierarchy_rules, coefficients_df)` that automates steps 1–3 for any
  member input.'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: easy
