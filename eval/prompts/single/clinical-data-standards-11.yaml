id: clinical-data-standards-11
prompt: 'A clinical trial safety team is preparing an adverse event frequency table
  for a regulatory submission. They have collected the following raw AE terms reported
  by investigators across 847 patients:


  - "stomach ache" (n=23)

  - "abdominal pain upper" (n=41)

  - "epigastric discomfort" (n=18)

  - "nausea" (n=67)

  - "feeling sick" (n=29)

  - "vomiting" (n=44)

  - "headache" (n=55)

  - "head pain" (n=12)

  - "migraine" (n=8)


  The team needs to present this data in a standard MedDRA-coded AE table for their
  Clinical Study Report.


  Please provide the following:


  1. Map each verbatim investigator term to its correct MedDRA Lowest Level Term (LLT)
  and corresponding Preferred Term (PT), noting any cases where the verbatim term
  IS itself a valid LLT.


  2. For each PT, identify the correct High Level Term (HLT), High Level Group Term
  (HLGT), and System Organ Class (SOC).


  3. Explain how "feeling sick" should be handled — specifically whether it maps to
  the nausea PT or requires a separate PT, and what the coding rationale is.


  4. In the final AE frequency table, "nausea" and "feeling sick" would be counted
  separately at PT level. Calculate the combined PT-level count for nausea (assuming
  "feeling sick" maps to nausea PT) and explain why this aggregation is appropriate
  at the PT level but would look different at the HLT level.


  5. Identify which two SOCs are represented in this AE dataset.'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: easy
