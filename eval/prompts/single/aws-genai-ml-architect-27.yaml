id: aws-genai-ml-architect-27
prompt: 'A mid-sized regional health system (8 hospitals, ~2.3 million patient records)
  is building a **clinical decision support system** that uses RAG over a corpus of
  450,000 de-identified clinical notes, 12,000 peer-reviewed cardiology research papers,
  and proprietary treatment protocols. The system must serve 340 cardiologists who
  will query it in real time during patient consultations (average query latency SLA:
  <3 seconds, peak concurrent users: 85).


  The architecture team is debating between two approaches:

  - **Option A**: Amazon Bedrock Knowledge Bases with Claude 3 Sonnet, using default
  chunking and OpenSearch Serverless as the vector store

  - **Option B**: Self-managed RAG on SageMaker using a fine-tuned Mistral-7B-Instruct
  model, FAISS index on EC2, and a custom retrieval pipeline


  **Constraints:**

  - All data is covered under an existing AWS BAA; PHI may appear in retrieved context

  - The cardiology team wants to filter retrieved chunks by document type (clinical
  note vs. research paper vs. protocol) and by date range (last 5 years only)

  - Budget cap: $18,000/month for inference + retrieval infrastructure

  - The system must produce citation trails for regulatory audit purposes


  **Deliverables requested:**

  1. A comparative analysis of Option A vs. Option B across latency, compliance, metadata
  filtering capability, and total cost

  2. A recommended architecture with justification, including which AWS services to
  use for each component

  3. A concrete metadata filtering strategy for the OpenSearch Serverless or FAISS
  index to support document-type and date-range filtering

  4. Specific Bedrock Guardrails or SageMaker guardrail configurations needed to prevent
  PHI leakage in generated responses

  5. A citation-trail design that satisfies regulatory audit requirements'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: intermediate
