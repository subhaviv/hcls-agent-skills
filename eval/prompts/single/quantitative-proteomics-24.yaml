id: quantitative-proteomics-24
prompt: 'You are analyzing a TMT-16plex proteomics dataset from a clinical study comparing
  treatment-naive colorectal cancer patients (n=32) versus healthy controls (n=32),
  run across 4 TMT batches (8 patients + 8 controls per batch). After processing with
  MSFragger/FragPipe, your proteinGroups output contains 6,847 proteins. You observe
  the following data characteristics:


  - ~18% missing values overall, but missingness is concentrated in ~340 proteins
  that are missing in >70% of samples within at least one condition

  - Principal component analysis shows a strong batch effect (PC1 explains 31% of
  variance and separates batches)

  - Boxplots of log2 TMT intensities show median shifts of up to 0.8 log2 units between
  batches

  - A known housekeeping protein (GAPDH) shows 2.3-fold apparent difference between
  batches despite expected stability

  - Ratio compression is suspected due to co-isolation interference


  Please provide: (1) A recommended normalization strategy that addresses both within-batch
  and between-batch effects, including the order of operations; (2) An imputation
  approach for the ~340 proteins with high missingness, with justification based on
  likely missing-not-at-random (MNAR) versus missing-at-random (MAR) mechanisms; (3)
  R code implementing median centering plus ComBat batch correction using the sva
  package, applied to a matrix called `tmt_log2` with a batch vector called `batch`
  and condition vector called `condition`; (4) An explanation of how ratio compression
  affects differential expression results and one experimental quality control metric
  you would calculate from the data to quantify its severity.'
target_skills:
- quantitative-proteomics
domain: proteomics
difficulty: intermediate
