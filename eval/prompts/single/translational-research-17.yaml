id: translational-research-17
prompt: 'A biotech company has completed a 24-month natural history study in 847 patients
  with early-stage frontotemporal dementia (FTD) carrying a pathogenic variant in
  *CHMP2B* (a rare autosomal dominant form). They want to advance a novel antisense
  oligonucleotide (ASO) targeting *CHMP2B* mRNA into a Phase 2 proof-of-concept trial.
  Available data include:


  - CSF neurofilament light chain (NfL) shows 23% annual increase vs. 4% in age-matched
  controls (p<0.001), with high inter-individual variability (CV=41%)

  - Brain volumetric MRI shows frontal lobe atrophy rate of 1.8% per year vs. 0.3%
  controls

  - A companion PET ligand targeting CHMP2B protein aggregates shows 68% sensitivity
  / 74% specificity for disease staging but has only been validated in 38 patients

  - Preclinical mouse data (CHMP2B knock-in model) showed 60% mRNA knockdown and 40%
  reduction in NfL at 6 months with intrathecal dosing

  - Patient registry has ~210 confirmed *CHMP2B* variant carriers available for enrollment
  across 8 sites in Europe


  Please provide: (1) a critical assessment of whether this program is ready to advance
  to Phase 2 with a go/no-go recommendation and rationale; (2) a recommended primary
  endpoint and two secondary endpoints with justification; (3) a trial design specification
  including enrollment strategy, duration, and sample size rationale; and (4) identification
  of the two highest-risk translational gaps and a mitigation strategy for each.'
