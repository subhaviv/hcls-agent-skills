id: pharmacoepidemiology-30
prompt: 'You are conducting a pharmacoepidemiologic study using a large US claims
  database (n = 2.8 million commercially insured adults, 2015–2022) to evaluate whether
  GLP-1 receptor agonists (GLP-1 RAs) reduce the risk of major adverse cardiovascular
  events (MACE) compared to DPP-4 inhibitors among patients with type 2 diabetes.
  Your new-user, active comparator cohort has 41,200 GLP-1 RA initiators and 38,700
  DPP-4 inhibitor initiators after applying a 180-day washout period and baseline
  covariate assessment window.


  A critical methodological challenge has emerged: roughly 23% of patients switch
  or discontinue their index therapy within the first 90 days, and HbA1c values (a
  key confounder) are only available for 34% of patients via linked lab data. Additionally,
  a colleague suggests using a 30-day "grace period" when defining treatment episodes,
  but you suspect this may introduce immortal time bias.


  Provide the following:


  1. A formal assessment of whether the proposed 30-day grace period creates immortal
  time bias, with a specific numerical example using hypothetical person-time calculations
  showing how the bias manifests.


  2. A marginal structural model (MSM) strategy using stabilized inverse probability
  of treatment weights (IPTW) to handle time-varying treatment switching, including
  the weight stabilization formula and how to incorporate the partially observed HbA1c
  using multiple imputation within the MSM framework.


  3. An E-value calculation for the primary MACE result, assuming a hazard ratio of
  0.78 (95% CI: 0.71–0.86), and interpret what magnitude of unmeasured confounding
  (on the risk ratio scale) would be needed to explain away the association.


  4. A negative control outcome analysis plan selecting three plausible negative controls
  from claims data and explaining the causal logic for each selection.'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: hard
