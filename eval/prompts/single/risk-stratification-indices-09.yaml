id: risk-stratification-indices-09
prompt: 'A regional health system is preparing to stratify 47,000 attributed lives
  for a value-based care contract beginning Q1 2026. The analytics team has pulled
  24 months of claims and EHR data and must choose between three candidate indices
  for prospective risk stratification: (1) Charlson Comorbidity Index, (2) Elixhauser
  Comorbidity Index, and (3) a hybrid LACE+ model augmented with Area Deprivation
  Index (ADI) quintiles and SDOH Z-codes (Z59.x, Z60.x, Z63.x categories).


  Internal validation shows the following C-statistics for 30-day readmission prediction
  in this population: Charlson = 0.61, Elixhauser = 0.68, LACE+ with ADI/SDOH = 0.74.
  However, the Elixhauser model flags 31% of the population as "high risk," while
  LACE+ with SDOH flags only 19%. The payer contract caps intensive care management
  enrollment at 22% of attributed lives due to staffing constraints.


  Additionally, 8,200 patients (17.4%) have incomplete SDOH Z-code documentation,
  creating potential systematic bias—these patients are disproportionately from ADI
  quintiles 4 and 5 (highest deprivation).


  Please provide:

  1. A comparative analysis of the three indices'' suitability for this specific use
  case, addressing the C-statistic tradeoffs and the operational 22% cap constraint

  2. A recommended stratification strategy that accounts for the missing Z-code documentation
  bias without excluding high-deprivation patients

  3. A Python code snippet implementing a tiered risk assignment logic that incorporates
  both the Elixhauser score and ADI quintile, with a fallback imputation rule for
  patients missing Z-codes

  4. Specific thresholds you would set for "high," "medium," and "low" risk tiers
  given the 22% enrollment cap'
target_skills:
