id: scrna-seq-pipeline-21
prompt: 'Here is test question #21 of 30:


  ---


  You have completed a CellRanger run on a 10X Genomics single-cell RNA-seq experiment
  from 4,500 peripheral blood mononuclear cells (PBMCs) derived from a single healthy
  donor. The output is stored in a directory called `filtered_feature_bc_matrix/`.
  Before proceeding with downstream analysis, you need to perform quality control
  to remove low-quality cells and potential empty droplets.


  Your QC thresholds should be based on the following criteria:

  - Minimum genes per cell: 200

  - Maximum genes per cell: 2,500

  - Maximum mitochondrial gene percentage: 5%


  Please provide the following deliverables:


  1. **Complete Python code** using Scanpy to: (a) load the 10X data from the `filtered_feature_bc_matrix/`
  directory into an AnnData object, (b) calculate QC metrics including the percentage
  of mitochondrial reads (genes starting with "MT-"), (c) apply the filtering thresholds
  listed above, and (d) print the number of cells and genes before and after filtering.


  2. **A brief explanation** of why each of the three QC thresholds is biologically
  meaningful — what types of low-quality cells or artifacts does each threshold help
  remove?


  3. **A violin plot code snippet** using `sc.pl.violin()` to visualize the three
  QC metrics (`n_genes_by_counts`, `total_counts`, and `pct_counts_mt`) before filtering,
  so the researcher can visually inspect the distributions.


  Assume the working environment has Scanpy, AnnData, and standard Python data science
  libraries already installed.'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: easy
