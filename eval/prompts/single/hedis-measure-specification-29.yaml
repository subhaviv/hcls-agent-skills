id: hedis-measure-specification-29
prompt: 'A regional health plan is preparing for HEDIS MY2024 data submission and
  has identified a complex patient population requiring careful measure assignment.
  The plan has 847 members who meet the following criteria: adults aged 18-75 with
  a diagnosis of Type 2 diabetes (ICD-10 E11.x) who were continuously enrolled for
  11 months with a 45-day gap in coverage occurring between March 15 and April 29.
  Additionally, 203 of these members have a documented kidney transplant (CPT 50360)
  performed in 2019, and 112 members have ESRD status documented via claim with diagnosis
  code N18.6.


  For the Comprehensive Diabetes Care (CDC) measure set, your task is to:


  1. **Determine enrollment eligibility**: Analyze whether the 45-day gap violates
  HEDIS continuous enrollment requirements for CDC measures and calculate exactly
  how many of the 847 members qualify for the denominator after applying the allowable
  gap rule.


  2. **Apply exclusions**: Walk through the specific NCQA exclusion logic for kidney
  transplant and ESRD members, identifying which sub-measures (HbA1c Testing, Eye
  Exam, Kidney Health Evaluation, BP Control) each exclusion applies to and the net
  denominator for each sub-measure.


  3. **Prioritize care gaps**: Given that HbA1c Poor Control (>9%) carries a 3x Star
  Rating weight in CMS Star Ratings versus the 1x weight for Eye Exam, create a prioritization
  framework with specific outreach thresholds assuming current measure rates of 58%
  for HbA1c control and 41% for Eye Exam compliance.


  4. **Write a SQL query** to flag members who are excluded from specific CDC sub-measures
  but remain eligible for others, using the table schema: `members(member_id, dob,
  enrollment_start, enrollment_end)` and `claims(claim_id, member_id, service_date,
  icd10, cpt)`.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: hard
