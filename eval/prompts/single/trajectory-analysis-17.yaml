id: trajectory-analysis-17
prompt: 'I''m analyzing single-cell RNA-seq data from a human hematopoietic stem cell
  differentiation experiment with 8,432 cells spanning the myeloid lineage (HSCs →
  CMPs → GMPs → monocytes/granulocytes). I''ve already completed preprocessing, dimensionality
  reduction (UMAP with 30 neighbors, 50 PCs), and cluster annotation. The dataset
  contains spliced and unspliced count matrices generated by velocyto, with approximately
  18,000 genes before filtering.


  I want to perform a comprehensive RNA velocity and trajectory analysis using scVelo
  and CellRank. Specifically:


  1. **scVelo workflow**: Write Python code to run the full scVelo pipeline using
  the dynamical model (not the stochastic model). Include filtering parameters (min_shared_counts=20,
  n_top_genes=2000), and generate a velocity UMAP embedding. Also compute latent time
  using the HSC cluster as the root.


  2. **CellRank fate mapping**: Using the VelocityKernel combined with a ConnectivityKernel
  (weight ratio 0.8/0.2), compute terminal state probabilities toward monocyte and
  granulocyte fates. Show how to identify the top 5 driver genes for each lineage
  using the `lineage_drivers` method.


  3. **Interpretation challenge**: The velocity arrows in my UMAP show a contradictory
  pattern — arrows in the GMP cluster point both toward monocytes AND back toward
  CMPs for approximately 30% of cells. Propose three biological or technical explanations
  for this ambiguity and suggest specific diagnostic steps (with code) to distinguish
  between them.


  Please provide complete, runnable code using scVelo 0.2.4 and CellRank 1.5.0 APIs,
  and explain the parameter choices.'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: intermediate
