id: quality-measures-16
prompt: 'A regional health plan with 45,000 commercial members wants to calculate
  their **Diabetes Care – HbA1c Poor Control (CDC) HEDIS measure** for the current
  measurement year (January 1 – December 31, 2024).


  The following data is available in your claims warehouse:

  - **medical_claims** table: claim_id, member_id, service_date, diagnosis_codes (ICD-10,
  pipe-delimited), procedure_codes, place_of_service

  - **pharmacy_claims** table: claim_id, member_id, fill_date, ndc_code, days_supply

  - **enrollment** table: member_id, enrollment_start, enrollment_end, product_line

  - **lab_results** table: member_id, result_date, loinc_code, result_value, result_unit


  Key parameters:

  - Denominator: Members aged 18–75 with Type 1 or Type 2 diabetes, continuously enrolled
  with ≤1 gap in coverage (no single gap >45 days, total gap ≤45 days)

  - Numerator: Most recent HbA1c result during the measurement year is **>9%** (LOINC:
  4548-4, 17856-6, 59261-8)

  - Exclude members with ESRD (ICD-10 N18.6) or who are in hospice


  Please provide:

  1. **SQL code** to identify the eligible denominator population including continuous
  enrollment logic

  2. **SQL code** to identify numerator members (most recent HbA1c >9%)

  3. **SQL code** to apply exclusions (ESRD and hospice)

  4. A final **measure rate calculation query** combining all components

  5. A brief explanation of the **care gap logic** — which members should be flagged
  for outreach and why'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: intermediate
