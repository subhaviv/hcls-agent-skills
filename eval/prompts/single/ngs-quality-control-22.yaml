id: ngs-quality-control-22
prompt: 'You have completed adapter trimming with fastp on your paired-end WGS sample
  and now need to assess the quality of both the raw and trimmed reads, then generate
  a consolidated QC report. Your raw reads (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`)
  and trimmed outputs (`sample_R1_trimmed.fastq.gz` / `sample_R2_trimmed.fastq.gz`)
  are ready for evaluation.


  **Your tasks:**


  1. **Run FastQC** on all four FASTQ files (both raw and trimmed pairs) using 8 threads,
  saving results to `qc_out/fastqc_raw/` and `qc_out/fastqc_trimmed/` respectively.
  Provide the exact shell commands.


  2. **Interpret key FastQC modules**: List the three most important FastQC modules
  to compare between raw and trimmed results when evaluating adapter trimming effectiveness,
  and briefly explain what improvement you expect to see in each module after trimming.


  3. **Generate a MultiQC report** that aggregates FastQC results from both raw and
  trimmed directories into a single HTML report at `qc_out/multiqc_report.html`, with
  the report titled "WGS Sample QC — Pre and Post Trimming". Provide the exact command.


  4. **Flag a concern**: In the MultiQC report, the "Per Base Sequence Content" module
  still shows imbalanced A/T and G/C ratios in the first 10 bases of the trimmed reads.
  Explain one likely biological or technical cause for this pattern and state whether
  it warrants re-trimming or additional filtering steps.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: easy
