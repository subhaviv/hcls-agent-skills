id: radiology-preprocessing-16
prompt: 'You are processing a retrospective dataset of 847 T1-weighted MPRAGE scans
  (1mm isotropic, TR=2300ms, TE=2.98ms, TI=900ms, flip angle=9°) collected across
  three different 3T scanners (Siemens Prisma, GE Discovery MR750, Philips Ingenia)
  as part of a multicenter aging study. Approximately 15% of subjects (ages 72-89)
  have significant white matter hyperintensities and cortical atrophy, which you anticipate
  will challenge standard preprocessing approaches.


  Your pipeline currently uses FSL''s BET for skull stripping followed by ANTs N4BiasFieldCorrection
  and FLIRT/FNIRT registration to MNI152 space. During quality control, you notice
  that BET is failing on roughly 23% of the elderly subjects, producing either over-stripped
  results (removing legitimate brain tissue near the cortex) or under-stripped results
  (leaving substantial non-brain tissue). Additionally, you suspect scanner-induced
  intensity differences between sites are not being fully corrected.


  Please provide:


  1. A concrete strategy for replacing or augmenting BET with HD-BET for the failing
  cases, including how to integrate it into the existing ANTs-based pipeline with
  appropriate conditional logic

  2. Python/bash code implementing an automated QC metric (using Dice overlap or similar)
  that flags cases requiring manual review after skull stripping

  3. Recommendations for handling the multi-site intensity normalization challenge,
  specifically whether to apply N4 before or after skull stripping and how to address
  residual scanner effects using histogram matching or z-score normalization

  4. A suggested order of operations for the complete pipeline (skull strip → bias
  correct → register → normalize) with justification for each step''s placement, given
  the atrophy and multi-site challenges in this dataset'
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: intermediate
