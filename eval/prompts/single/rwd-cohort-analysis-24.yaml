id: rwd-cohort-analysis-24
prompt: 'You are analyzing a real-world claims database containing 847,293 commercially
  insured patients diagnosed with atrial fibrillation (AF) between January 2018 and
  December 2022. You need to compare time-to-major-adverse-cardiovascular-events (MACE)
  between patients initiating apixaban (NDC prefix 59148) versus rivaroxaban (NDC
  prefix 50458) within 30 days of their index AF diagnosis (ICD-10: I48.0, I48.11,
  I48.19, I48.20, I48.21).


  Your cohort after 1:1 propensity score matching yields 34,218 pairs. Key covariates
  include age, sex, CHA₂DS₂-VASc score components, prior bleeding history (ICD-10:
  K92.1, I60-I62), renal impairment (N18.3–N18.5), and baseline statin use. Post-matching
  SMD values range from 0.001 to 0.031 except for renal impairment (SMD = 0.087) and
  prior bleeding (SMD = 0.094).


  Please provide the following deliverables:


  1. **Python code** to fit a Cox proportional hazards model using `lifelines`, including
  the two covariates with elevated SMD as adjusters even after matching, with robust
  sandwich variance estimation

  2. **Kaplan-Meier curves** with 95% confidence bands and a log-rank test, stratified
  by treatment arm, censoring at 24 months or disenrollment

  3. **Schoenfeld residuals test** implementation to assess the proportional hazards
  assumption for the treatment variable and both residual confounders, with interpretation
  guidance if the assumption is violated for renal impairment

  4. A brief **analytical recommendation** on whether the residual imbalance in renal
  impairment and prior bleeding is acceptable for a regulatory-grade RWE submission,
  citing standard SMD thresholds'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: intermediate
