id: cdisc-compliance-13
prompt: 'A clinical trial sponsor is preparing SDTM datasets for an FDA submission
  of a Phase III cardiovascular study (Study CV-2847) with 1,240 randomized subjects.
  The study collected 12-lead ECG data at Screening, Day 1 (pre-dose), Day 1 (2-hour
  post-dose), Week 4, Week 12, and End of Study visits.


  The ECG data includes the following findings: RR interval, PR interval, QRS duration,
  QT interval, QTcF (Fridericia-corrected), QTcB (Bazett-corrected), heart rate, and
  a free-text interpretation field ("Normal," "Abnormal – Not Clinically Significant,"
  "Abnormal – Clinically Significant"). The sponsor''s data manager has placed all
  ECG results in the EG domain but is uncertain how to handle QTcF and QTcB, which
  are derived values not explicitly listed in the standard CDISC Controlled Terminology
  for EGTESTCD. Additionally, the free-text interpretation field has been mapped to
  EGSTRESC, but reviewers flagged this as potentially incorrect.


  Please provide the following:


  1. **Domain mapping guidance**: Confirm whether EG is the correct domain and explain
  how to properly map QTcF and QTcB using CDISC CT extensible terminology, including
  what EGTESTCD and EGTEST values should be used.


  2. **EGSTRESC handling**: Explain the correct SDTM variable(s) for the free-text
  ECG interpretation and whether SUPPQUAL is needed.


  3. **RELREC usage**: Describe whether a RELREC dataset is needed to link the derived
  QTcF/QTcB records to their parent QT and RR records, with a brief rationale.


  4. **Define.xml requirement**: List the value-level metadata entries that would
  be required in define.xml for the EG domain given these non-standard test codes.'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: easy
