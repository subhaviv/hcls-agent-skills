id: protein-structure-analysis-30
prompt: 'A crystallographic dataset contains two structures of the kinase domain of
  MELK (Maternal Embryonic Leucine Zipper Kinase): an apo form (PDB-like file "MELK_apo.pdb",
  resolution 2.1 Å) and a inhibitor-bound form ("MELK_inhib.pdb", resolution 1.8 Å).
  The inhibitor-bound structure contains a non-standard residue "INH" in chain A.
  During DSSP assignment, 14 residues in the activation loop (residues 150–163, chain
  A) show no secondary structure assignment in the apo form but form a short helix
  (residues 153–159) in the inhibitor-bound form. Additionally, B-factors for residues
  148–165 average 62.3 Ų in the apo form versus 28.7 Ų in the inhibitor-bound form.


  Your tasks are:


  1. Write Python code using Biopython to superpose the two structures (Cα atoms only,
  excluding the activation loop residues 148–165 and the INH ligand), compute the
  global RMSD and per-residue RMSD, and flag any residues with per-residue RMSD >
  2.0 Å.


  2. Write code to run fpocket on the apo structure and parse the output to identify
  the top-ranked pocket by druggability score, reporting its volume, score, and constituent
  residues.


  3. Explain how the conflicting signals — high B-factors and missing DSSP assignment
  in the apo activation loop versus ordered helix formation upon inhibitor binding
  — should be interpreted when deciding whether to use the apo or inhibitor-bound
  structure for ensemble docking, and what preprocessing steps (including PDBQT conversion)
  are required for each.


  4. Provide a Ramachandran analysis snippet that specifically checks whether the
  newly formed helical residues (153–159) in the inhibitor-bound form fall within
  favored regions, outputting φ/ψ angles and a pass/fail flag per residue.'
