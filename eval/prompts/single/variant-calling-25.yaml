id: variant-calling-25
prompt: 'Here is test question #25 of 30:


  ---


  You are setting up a somatic variant calling pipeline for a retrospective study
  of 45 formalin-fixed paraffin-embedded (FFPE) tumor samples from colorectal cancer
  patients. Each sample has matched normal blood DNA. Sequencing was performed on
  an Illumina NovaSeq 6000 with a custom 523-gene panel at approximately 500x mean
  tumor coverage and 150x normal coverage. The samples were processed in three batches
  over 18 months at different sequencing centers.


  Your bioinformatics lead has flagged several concerns: (1) FFPE artifacts causing
  elevated C>T transitions, (2) batch effects from the multi-center design, and (3)
  a subset of 8 samples with tumor purity estimates below 20% (range: 12–19%) from
  ESTIMATE.


  Please provide the following:


  1. A recommended Mutect2 command for tumor-normal calling that addresses the FFPE
  artifact issue and low-purity samples, including specific flags and their rationale
  (e.g., `--f1r2-tar-gz`, `--min-allele-fraction`, orientation bias filtering).


  2. A FilterMutectCalls strategy that accounts for the multi-batch design, specifying
  which contamination and artifact models to apply and in what order.


  3. For the 8 low-purity samples (tumor purity ~12–19%), explain whether the standard
  5% minimum allele fraction threshold is appropriate or whether you would adjust
  it, and provide the modified parameter value with justification.


  4. A brief QC checklist (5–7 items) specific to FFPE panel sequencing that should
  be evaluated before variant calling begins, including at least one metric related
  to oxidative damage artifacts.'
target_skills:
- variant-calling
domain: genomics
difficulty: intermediate
