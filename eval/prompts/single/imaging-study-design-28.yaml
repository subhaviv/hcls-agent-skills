id: imaging-study-design-28
prompt: 'Here is test question #28 of 30:


  ---


  You are designing a multi-site diffusion MRI study to characterize white matter
  microstructure in 240 patients with early-stage amyotrophic lateral sclerosis (ALS)
  across 6 clinical sites (40 patients each), with 120 age/sex-matched healthy controls.
  Each site uses a different scanner: three Siemens Prisma 3T units (sites 1–3), two
  GE Discovery MR750 3T units (sites 4–5), and one Philips Ingenia 3T unit (site 6).
  All sites acquired 64-direction DTI with b=1000 s/mm² and b=0, but voxel sizes differ:
  Siemens acquired at 2.0×2.0×2.0 mm isotropic, GE at 2.0×2.0×2.5 mm, and Philips
  at 1.8×1.8×1.8 mm. A test-retest reliability sub-study was run only at site 1 (n=15
  controls, scanned twice within 2 weeks).


  Your primary imaging biomarker candidates are fractional anisotropy (FA) and mean
  diffusivity (MD) in the corticospinal tract (CST), extracted via probabilistic tractography.


  **Deliverables requested:**


  1. Describe a complete preprocessing pipeline from raw DICOM to tract-specific FA/MD
  values, specifying tools and parameter choices at each step.

  2. Identify the three most critical sources of inter-site variability in this setup
  and explain how each would bias FA/MD estimates in the CST.

  3. Design a ComBat harmonization strategy for this dataset, explicitly addressing
  whether to use standard ComBat or neuroComBat with covariates, and justify your
  choice given the imbalanced site-patient distribution.

  4. Using the test-retest data from site 1, describe the statistical approach to
  estimate measurement reliability and specify the minimum acceptable threshold for
  proceeding with harmonization.

  5. Propose a registration strategy (native vs. MNI space) for CST tractography,
  justifying your choice given the known CST asymmetry in ALS.'
