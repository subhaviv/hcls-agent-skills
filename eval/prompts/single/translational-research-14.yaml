id: translational-research-14
prompt: 'A biotech company has completed a 24-month natural history study in 312 patients
  with frontotemporal dementia (FTD) carrying a pathogenic variant in *CHMP2B* (a
  gene encoding a component of the ESCRT-III complex involved in autophagy). Preclinical
  data show that a small-molecule autophagy enhancer (compound VX-4471) reduces p62-positive
  inclusions by 68% in iPSC-derived neurons and extends survival by 31% in a *Chmp2b*-overexpression
  mouse model. The natural history cohort generated the following longitudinal data:
  CSF neurofilament light chain (NfL) rises ~42% over 12 months (SD ±18%), brain volumetric
  MRI shows ~3.2% annual frontal lobe atrophy (SD ±1.1%), and CDR-SB worsens by ~2.1
  points/year (SD ±1.4). The compound has completed Phase 1 with acceptable safety;
  PK modeling suggests CNS exposure achieves ~60% of the EC50 seen in the iPSC assay.


  Please provide:

  1. A structured target/hypothesis readiness assessment using the T0–T2 translational
  framework, identifying the two most critical gaps before advancing to Phase 2

  2. A proposed Phase 2 trial design (sample size rationale, duration, primary and
  key secondary endpoints, and biomarker strategy) that incorporates a "fail-fast"
  interim analysis

  3. A biomarker qualification plan for CSF NfL as a pharmacodynamic endpoint in this
  specific indication, including the context of use statement

  4. An assessment of whether the 60% EC50 CNS exposure is sufficient to proceed,
  and what additional PK/PD bridging data would de-risk this decision'
