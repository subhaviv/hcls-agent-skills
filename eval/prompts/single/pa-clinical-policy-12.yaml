id: pa-clinical-policy-12
prompt: 'A 58-year-old patient with moderate-to-severe rheumatoid arthritis (RA) has
  been prescribed Abatacept (Orencia) 125mg subcutaneous weekly by their rheumatologist.
  The patient''s insurer, BlueShield Premier PPO, has denied the prior authorization
  request, citing failure to meet step therapy requirements. The denial letter states
  the patient must first try and fail two conventional DMARDs (methotrexate and leflunomide)
  before a biologic DMARD will be authorized.


  The patient''s medical record shows the following history:

  - Methotrexate 20mg weekly × 6 months: discontinued due to hepatotoxicity (ALT elevated
  4× ULN)

  - Sulfasalazine 2g daily × 4 months: discontinued due to inadequate response (DAS28
  score remained at 5.8)

  - Current DAS28 score: 6.1 (high disease activity)

  - Positive anti-CCP antibodies (>250 U/mL), RF positive

  - No prior biologic DMARD exposure


  The insurer''s clinical policy requires "trial and failure of methotrexate AND one
  additional conventional DMARD" but does not specify leflunomide by name in the written
  policy document.


  Please provide:

  1. An analysis of whether the step therapy requirements have been met based on the
  documented treatment history

  2. A structured appeal letter template addressing the clinical criteria gaps identified
  in the denial

  3. Identification of any state step therapy protection laws or CMS guidelines that
  may support overriding this denial

  4. Recommended documentation checklist the rheumatologist should compile for a peer-to-peer
  review request

  5. A brief explanation of how the Da Vinci PAS FHIR standard could have potentially
  flagged this documentation gap during the initial PA submission'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: easy
