id: biomarker-discovery-21
prompt: 'A research team has collected baseline blood samples from 180 patients enrolled
  in a randomized controlled trial comparing a novel VEGFR2 inhibitor (drug A) versus
  placebo in advanced renal cell carcinoma. They measured 12 candidate serum proteins
  (including IL-6, VEGF-A, sVEGFR2, angiopoietin-2, MMP-9, TIMP-1, PlGF, HGF, FGF-2,
  TGF-β1, CXCL5, and CD44) at baseline before treatment assignment. The primary endpoint
  is progression-free survival (PFS).


  The team wants to determine whether any of these proteins serve as **predictive
  biomarkers** (identifying who benefits from drug A versus placebo) rather than simply
  **prognostic biomarkers** (predicting outcome regardless of treatment).


  Patient distribution: 90 per arm. Events observed: 62 in placebo arm, 58 in drug
  A arm. One statistician suggests fitting a Cox model with all 12 proteins plus treatment
  arm plus 12 protein-by-treatment interaction terms.


  Please provide:


  1. A clear explanation of the conceptual difference between prognostic and predictive
  biomarkers in this specific RCT context, with one concrete example using VEGF-A

  2. A critique of the statistician''s proposed approach, specifically addressing
  the events-per-variable (EPV) concern and what problems this creates

  3. A recommended analysis strategy that respects EPV constraints while still testing
  for predictive utility, including which statistical tests or models are appropriate

  4. The single most appropriate evaluation metric for this PFS-based predictive biomarker
  analysis, with a one-sentence justification

  5. A brief outline (no code needed) of how you would design an external validation
  step for the top candidate predictive biomarker identified'
target_skills:
- biomarker-discovery
domain: single-cell
difficulty: easy
