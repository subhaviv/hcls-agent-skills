id: hedis-measure-specification-08
prompt: 'A regional health plan is preparing for HEDIS MY2024 data submission and
  has identified a challenging cohort for the **Controlling High Blood Pressure (CBP)**
  measure. Their analytics team has flagged the following scenario:


  **Population Data:**

  - 4,200 members initially identified in the CBP denominator

  - 312 members have a hospice claim (CPT II 0591F) appearing only in the supplemental
  data file, not claims

  - 187 members have evidence of ESRD via a single ICD-10 code (N18.6) on a professional
  claim with no supporting dialysis procedure codes

  - 94 members turned 85 during the measurement year (birthday: various dates between
  Jan–Dec)

  - 156 members have a 45-day gap in enrollment during the measurement year but were
  continuously enrolled otherwise

  - Blood pressure readings for 203 members exist only in the EHR-derived HEDIS Hybrid
  file, with readings dated within the last 60 days of the measurement year


  **Questions:**

  1. For each of the five flagged cohorts above, provide the HEDIS MY2024 CBP exclusion
  or inclusion determination with specific rule citations (e.g., allowable gap policy,
  age boundary logic, evidence source hierarchy).

  2. Identify which of the 203 late-year BP readings are at risk of being excluded
  from numerator compliance and explain the HEDIS hybrid record-pull date range rules.

  3. Calculate the adjusted denominator and estimated numerator impact assuming 68%
  of the remaining eligible members have controlled BP.

  4. Recommend a prioritization strategy for outreach to close care gaps before the
  hybrid medical record pull deadline, incorporating Star Rating weight for CBP and
  any SDOH considerations.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: hard
