id: multi-omics-integration-28
prompt: 'You are analyzing a rare pediatric brain tumor cohort (n=47 patients) with
  four omics layers: whole-genome methylation arrays (850K CpG sites), RNA-seq (18,432
  genes after filtering), reverse-phase protein arrays (RPPA, 217 proteins), and targeted
  metabolomics (312 metabolites via LC-MS). The challenge is severe partial overlap:
  all 47 patients have methylation and RNA-seq data, but only 31 have RPPA measurements
  and only 22 have metabolomics data. Critically, only 14 patients have all four layers
  simultaneously. You suspect two to three molecular subtypes exist based on prior
  histology, and you have overall survival data for 39 of the 47 patients.


  Given this partial overlap structure, please provide:


  1. A ranked comparison of at least three integration strategies (e.g., MOFA+ with
  missing data imputation, SNF on pairwise subsets, iCluster+ with incomplete blocks)
  specifically addressing how each handles the 14-patient complete-overlap bottleneck
  and statistical power implications.


  2. A concrete MOFA+ configuration in R specifying the number of factors, convergence
  criteria, `likelihoods` argument per view, how to encode missing samples, and minimum
  recommended variance explained threshold for retaining factors in a cohort this
  small.


  3. A batch correction decision framework addressing whether to correct methylation
  M-values and log2-RPPA intensities jointly or separately before integration, given
  that RPPA was run in two batches (21 vs. 10 samples) with a known plate confound.


  4. A survival association strategy for multi-omic factors that accounts for the
  39/47 incomplete survival annotation, specifying which statistical test, multiple
  testing correction, and minimum factor-survival sample size you would require before
  reporting results.'
target_skills:
- multi-omics-integration
