id: rna-seq-analysis-25
prompt: 'You are analyzing a bulk RNA-seq dataset comparing tumor vs. normal tissue
  across 12 paired samples (6 tumor, 6 normal) from colorectal cancer patients. You
  ran Salmon (v1.9.0) with the `--gcBias` and `--seqBias` flags using a decoy-aware
  index, producing `quant.sf` files. You also ran STAR alignment followed by featureCounts
  on the same samples. When you import the Salmon data using `tximport` with `type="salmon"`
  and `countsFromAbundance="scaledTPM"` and run DESeq2, you get 847 differentially
  expressed genes at FDR < 0.05. However, when you run DESeq2 directly on the featureCounts
  matrix for the same samples, you only get 312 DE genes at the same threshold.


  Given this discrepancy, provide the following:


  1. **Diagnosis**: List at least three biological or technical reasons that could
  explain why Salmon+tximport yields ~2.7× more DE genes than featureCounts in this
  specific scenario, referencing the flags used and the `countsFromAbundance` setting.


  2. **Validation approach**: Describe a concrete strategy to determine which quantification
  method is producing more reliable results for this dataset, including at least one
  specific QC metric to compute.


  3. **Code**: Write R code using DESeq2 that imports the Salmon data with `tximport`
  using `countsFromAbundance="no"` (i.e., using estimated counts with offset) instead
  of `"scaledTPM"`, runs the differential expression analysis with `lfcShrink` using
  the `ashr` method, and outputs a results table filtered to padj < 0.05 and |log2FC|
  > 1.


  4. **Recommendation**: State which quantification approach you would trust more
  for this colorectal cancer dataset and why.'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: intermediate
