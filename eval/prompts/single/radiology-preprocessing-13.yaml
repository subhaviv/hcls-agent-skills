id: radiology-preprocessing-13
prompt: 'You are setting up a standard T1-weighted MRI preprocessing pipeline for
  a neuroimaging study involving 45 healthy adult volunteers (ages 22-65). The raw
  DICOM images have been converted to NIfTI format using dcm2niix. Before running
  the full pipeline, you notice that fslreorient2std has not been applied to any of
  the images, and the acquisition orientation varies across subjects (some axial,
  some sagittal).


  Your preprocessing pipeline needs to include the following steps in the correct
  order:

  1. Reorientation to standard space

  2. Bias field correction using N4BiasFieldCorrection (ANTs)

  3. Brain extraction using HD-BET

  4. Affine registration to MNI152 1mm template using FLIRT


  For the FLIRT registration step, you plan to use the following parameters: 6 DOF,
  cost function = corratio, interpolation = trilinear, and the MNI152_T1_1mm_brain.nii.gz
  reference.


  Please provide:

  1. A brief explanation of why reorientation must occur before bias field correction
  and brain extraction

  2. A complete bash script that processes all 45 subjects (assume input files are
  named sub-01_T1w.nii.gz through sub-45_T1w.nii.gz in a directory called /data/raw/)

  3. The specific FLIRT command with all required flags for the final registration
  step

  4. One common quality control check you would perform after brain extraction to
  verify HD-BET performed correctly before proceeding to registration'
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: easy
