id: claims-billing-rules-12
prompt: 'A small rural clinic (Provider ID: RUR-4471) has submitted claims over a
  6-month period and your audit team has flagged the following billing pattern for
  review:


  - 847 office visit claims submitted, of which 612 (72%) are billed at CPT 99215
  (Level 5 E&M)

  - 389 of those 99215 claims are billed on the same date of service as a minor surgical
  procedure (CPT 11720 – debridement of nails)

  - All 389 same-day claims include Modifier 25 appended to the 99215

  - The clinic serves approximately 340 active patients, predominantly elderly Medicare
  beneficiaries with diabetes and peripheral neuropathy

  - Average E&M level for similar rural clinics in the region is 99213, with Level
  5 representing roughly 18% of visits


  Given this scenario, please provide the following:


  1. **Billing Rule Analysis**: Explain the correct use of Modifier 25 in the context
  of same-day E&M and minor procedure billing, including what documentation requirements
  must be met to justify its use.


  2. **Red Flag Assessment**: Identify at least three specific billing red flags present
  in this data and explain why each raises concern under CMS fraud, waste, and abuse
  (FWA) guidelines.


  3. **Coding Error vs. Fraud Distinction**: Based on the patterns described, outline
  the criteria your audit team should use to distinguish between systematic coding
  errors and intentional fraud.


  4. **Recommended Audit Steps**: List four concrete next steps an investigator should
  take to evaluate this provider''s claims, including what records to request and
  what statistical benchmarks to apply.'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: easy
