id: translational-research-26
prompt: 'A biotech company has completed a 24-month natural history study in 312 patients
  with spinocerebellar ataxia type 6 (SCA6), collecting quarterly assessments. Their
  lead compound, VAX-441, is a selective P/Q-type calcium channel modulator targeting
  CACNA1A gain-of-function variants. Key findings from the natural history study:


  - Scale for Assessment and Rating of Ataxia (SARA) score worsens ~1.8 points/year
  (SD=2.4) in this population

  - Cerebellar volume loss averages 0.9% per year on MRI (SD=1.1%)

  - A plasma neurofilament light chain (NfL) increase of ~18% annually correlates
  moderately with SARA progression (r=0.52, p<0.001)

  - A novel cerebellar fMRI connectivity metric ("CbFCI") shows 12% annual decline
  and correlates strongly with SARA (r=0.71, p<0.0001)

  - VAX-441 showed 40% reduction in SARA progression in a 6-month, 45-patient Phase
  2a open-label study, but no placebo arm existed


  The team is now designing a Phase 2b randomized controlled trial and must make critical
  decisions. Please provide:


  1. A primary endpoint recommendation with statistical justification — choose between
  SARA, cerebellar volume, NfL, or CbFCI, including a power calculation framework
  for each option

  2. An assessment of whether NfL qualifies as a "reasonably likely surrogate" for
  regulatory purposes under the FDA''s accelerated approval pathway, given the correlation
  data provided

  3. A trial design recommendation (duration, sample size, arms) accounting for the
  open-label Phase 2a limitations

  4. A biomarker strategy specifying which measures should serve as primary, secondary,
  and exploratory endpoints, and why CbFCI may or may not be ready for a co-primary
  role'
target_skills:
- translational-research
domain: cross-domain
difficulty: intermediate
