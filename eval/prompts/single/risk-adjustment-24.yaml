id: risk-adjustment-24
prompt: 'Here is test question #24 of 30:


  ---


  You are building a CMS-HCC risk adjustment pipeline for a Medicare Advantage plan
  with 12,000 members. Your data team has flagged that a subset of 340 members have
  active prescriptions for insulin analogs (NDC codes mapped to ATC class A10AB/A10AC)
  but lack any corresponding ICD-10 diagnosis codes for diabetes (E10.x, E11.x, E13.x)
  in the current measurement year''s claims. A separate cohort of 215 members have
  HbA1c lab results ≥ 7.5% (LOINC 4548-4) with no diabetes diagnosis codes submitted.


  Using the CMS-HCC Model V28 coefficient table, diabetes maps primarily to HCC 37
  (Diabetes with Chronic Complications) and HCC 38 (Diabetes without Complication),
  with HCC 37 superseding HCC 38 under hierarchy rules.


  Please provide the following deliverables:


  1. **Python code** that ingests a member DataFrame with columns `[member_id, has_insulin_rx,
  has_hba1c_flag, existing_hcc_list, demographic_raf]` and identifies coding gap candidates,
  applying hierarchy resolution to avoid double-counting HCC 37 and HCC 38.


  2. **RAF impact analysis**: Assuming 60% of the 340 Rx-proxy members would validate
  to HCC 38 (coefficient 0.179) and 25% would validate to HCC 37 (coefficient 0.318)
  after chart review, calculate the projected total RAF score lift across the population.


  3. **SQL query** that joins a `claims` table, `pharmacy_claims` table, and `lab_results`
  table to surface members meeting either proxy criterion with no existing diabetes
  HCC in the current plan year.


  4. A brief prioritization recommendation (3–5 sentences) for which proxy cohort
  to pursue first for outreach, given chart review cost constraints.'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: intermediate
