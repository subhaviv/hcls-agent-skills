id: ml-researcher-24
prompt: 'Here is test question #24 of 30:


  ---


  You are designing an ML pipeline to predict 30-day hospital readmission in a cohort
  of 18,400 adult patients with heart failure, drawn from three hospital sites (Site
  A: n=9,200; Site B: n=5,800; Site C: n=3,400). The outcome prevalence is 22% overall
  but varies by site (Site A: 19%, Site B: 24%, Site C: 28%). Features include 47
  structured EHR variables (labs, vitals, medications, comorbidities), 6 months of
  longitudinal visit history, and unstructured discharge summaries. You plan to use
  a gradient boosting model (XGBoost) as your primary model.


  A colleague suggests a simple random 80/20 train-test split across all sites combined,
  with 5-fold cross-validation for hyperparameter tuning, and reports AUROC = 0.81
  as the headline metric. You suspect several methodological problems.


  Please provide:


  1. **A critique** of the proposed splitting and CV strategy, specifically identifying
  at least three distinct methodological risks (e.g., leakage types, generalization
  issues) given the multi-site structure and temporal nature of EHR data.


  2. **A revised experimental design** specifying how to split data across sites and
  time, how to structure nested CV, and how to handle the site-level prevalence imbalance.


  3. **A metric selection rationale** explaining whether AUROC, AUPRC, calibration
  curves, or decision curve analysis (net benefit) is most appropriate as the primary
  reporting metric for a clinical readmission tool, and why AUROC alone is insufficient
  here.


  4. **A subgroup fairness audit plan** covering at minimum age group (≤65 vs. >65),
  sex, and insurance type (Medicare, Medicaid, commercial), including which fairness
  metrics to compute and how to report disparities.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: intermediate
