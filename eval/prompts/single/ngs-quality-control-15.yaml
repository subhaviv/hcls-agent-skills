id: ngs-quality-control-15
prompt: 'You have completed initial sequencing of a whole-exome sequencing (WES) cohort
  of 48 cancer patients. Before proceeding to variant calling, your bioinformatics
  lead wants a comprehensive QC checkpoint. You have the following files available:
  paired FASTQs (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`), a coordinate-sorted
  BAM (`sample.bam` with index), reference genome (`ref.fasta`), and a BED file of
  capture targets (`targets.bed`) covering approximately 38 Mb of the exome. Your
  team uses `THREADS=8` and output directory `OUT=qc_out`.


  Your QC thresholds for sample pass/fail are: mean on-target coverage ≥ 80×, percentage
  of target bases covered at ≥ 20× must exceed 90%, duplicate rate ≤ 25%, and insert
  size mean between 150–300 bp.


  **Deliverables:**


  1. Write a complete bash pipeline that runs **fastp** for adapter trimming and QC
  on the raw FASTQs (with appropriate WES-specific parameters), **mosdepth** for on-target
  coverage analysis using the provided BED file, and **Picard CollectHsMetrics** for
  hybrid-selection metrics — all writing outputs to `OUT=qc_out`.


  2. After running the pipeline, you discover that 6 samples show mean on-target coverage
  of 95× but have only 78% of target bases at ≥ 20×. Explain what biological or technical
  factors could cause this coverage distribution pattern (high mean but poor breadth),
  and suggest two specific remediation strategies.


  3. Write a Python snippet that parses the mosdepth `*.regions.bed.gz` output to
  flag any individual target regions with coverage below 20× and outputs a summary
  TSV with columns: `chrom`, `start`, `end`, `mean_coverage`, `pass_fail`.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: intermediate
