id: claims-billing-rules-24
prompt: 'A regional health plan''s Special Investigations Unit is reviewing claims
  from a podiatry group practice (Footcare Associates, NPI 1234567890) flagged by
  their anomaly detection system. The practice submitted claims for 847 patients over
  a 6-month period with the following patterns:


  - 73% of E&M visits (CPT 99213, 99214) were billed same-day as minor surgical procedures
  (CPT 11055, 11056, 11057 – callus/corn removal)

  - Modifier 25 was appended to 100% of same-day E&M codes

  - Average of 3.2 lesion removal codes billed per visit

  - 12 instances where CPT 11056 and 11057 were billed together on the same date for
  the same patient

  - Remittance data shows zero claim denials over the entire period, suggesting no
  payer edits were triggered


  Using this scenario, please provide:


  1. An analysis of whether the Modifier 25 usage pattern constitutes a legitimate
  billing practice or a potential FWA red flag, citing the specific CMS criteria that
  must be met for Modifier 25 to be valid

  2. An explanation of the NCCI edit relationships between CPT 11055, 11056, and 11057,
  including whether any are column 1/column 2 pairs or mutually exclusive codes, and
  what modifier indicators apply

  3. A determination of whether billing 11056 and 11057 together represents unbundling,
  a coding error, or potentially fraudulent behavior — and what evidence would distinguish
  between these

  4. A prioritized list of five additional data elements the SIU should request to
  build or refute a fraud case, with rationale for each'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: intermediate
