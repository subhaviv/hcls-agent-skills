id: cdisc-compliance-16
prompt: 'A clinical trial (Study XYZ-2021) is preparing an FDA eCTD submission for
  a Phase III oncology study with 847 randomized patients. The data management team
  has completed SDTM mapping but the Pinnacle 21 validator is returning several findings
  that need triage before submission.


  The following findings have been flagged:


  1. **P21 Rule SD0083**: SUPPAE records exist for 23 patients where QNAM="AECONTRT"
  (concomitant treatment for AE) but the parent AE domain records cannot be found
  for 4 of those patients (USUBJID: XYZ-001-0042, XYZ-001-0078, XYZ-002-0015, XYZ-003-0091).

  2. **P21 Rule SD0006**: CMROUTE values "INTRAVENOUS DRIP" and "ORAL TABLET" are
  not found in CDISC CT (Route of Administration, C66729) for 156 CM records.

  3. **P21 Rule AD0018**: ADAE variable AETOXGR has value-level metadata defined in
  define.xml referencing codelist "NCI CTCAE Grade" but the codelist is not declared
  in the define.xml ItemGroupDef.

  4. **P21 Rule SD0071**: RELREC dataset links DS and AE domains for 12 patients with
  fatal outcomes, but RDOMAIN/IDVAR/IDVARVAL combinations are inconsistent for 3 records.


  Please provide: (a) a clinical impact prioritization ranking of these four findings
  with justification, (b) the correct CDISC CT terms to replace the non-standard CMROUTE
  values, (c) a corrected define.xml XML snippet resolving the ADAE value-level metadata
  issue, and (d) the specific SUPPQUAL structural rule being violated in finding #1
  and how to remediate it.'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: intermediate
