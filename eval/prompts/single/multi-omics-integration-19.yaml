id: multi-omics-integration-19
prompt: 'You are conducting a multi-omics study on 847 treatment-naive colorectal
  cancer patients with matched RNA-seq (transcriptomics), ATAC-seq (chromatin accessibility),
  and plasma proteomics (Olink proximity extension assay, 1,472 proteins). However,
  due to sample attrition, only 612 patients have all three data types, 180 have transcriptomics
  + proteomics only, and 55 have transcriptomics + ATAC-seq only. Additionally, samples
  were collected across three clinical sites (Boston, n=310; Houston, n=287; Amsterdam,
  n=250), and preliminary PCA reveals that the Amsterdam proteomics batch clusters
  separately from the other two sites, suggesting a technical confound.


  You want to identify multi-omic factors that stratify patients into clinically meaningful
  subtypes associated with 3-year recurrence-free survival, while maximizing use of
  all available samples despite the partial overlap.


  Please provide:


  1. A justified recommendation for whether to use MOFA+ with missing data imputation,
  SNF on the complete-case subset, or a two-stage integration approach, given the
  partial overlap structure and batch confound

  2. A concrete batch correction strategy for the Amsterdam proteomics outlier before
  integration, specifying whether to apply ComBat, limma::removeBatchEffect, or a
  reference-based approach, and why

  3. Python or R code implementing your recommended MOFA+ or SNF workflow, including
  how to encode the missing sample groups as NA matrices in MOFA+ or handle exclusion
  in SNF

  4. A downstream analysis plan for associating the top 3 multi-omic factors with
  recurrence-free survival using Cox proportional hazards models, including how to
  handle factor sign ambiguity

  5. Guidance on interpreting which chromatin accessibility peaks co-loading with
  transcriptomic features (e.g., ASCL2, CDX2, ZEB1) suggest epithelial-to-mesenchymal
  transition activity in the derived factors'
target_skills:
- multi-omics-integration
domain: multi-omics
difficulty: hard
