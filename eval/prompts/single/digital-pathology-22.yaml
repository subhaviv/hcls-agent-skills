id: digital-pathology-22
prompt: 'Here is test question #22 of 30:


  ---


  You are working with a cohort of 312 colorectal cancer whole-slide images in SVS
  format, stored locally at `/data/crc_cohort/slides/`. You need to extract tissue
  patches at 0.5 microns-per-pixel (mpp) resolution using TIAToolbox''s `get_wsireader`
  and `PatchExtractor` utilities. Each patch should be 256×256 pixels, with a stride
  of 128 pixels (50% overlap), and only patches containing at least 85% tissue (non-background)
  should be retained.


  Your tissue segmentation mask should use TIAToolbox''s built-in `TissueMasker` with
  the `morphological` method, applied at 4.0 mpp for efficiency before upsampling
  to guide patch selection at the target resolution.


  Please provide:


  1. A complete Python script that iterates over all SVS files in the directory, generates
  tissue masks at 4.0 mpp, extracts overlapping 256×256 patches at 0.5 mpp, filters
  patches by the 85% tissue threshold, and saves valid patch coordinates to a per-slide
  CSV file (columns: `slide_id`, `x`, `y`, `tissue_fraction`) in `/data/crc_cohort/patch_coords/`.


  2. A brief explanation (3–5 sentences) of why tissue masking is performed at a lower
  resolution (4.0 mpp) than patch extraction (0.5 mpp), and how the coordinate mapping
  between these two resolution levels is handled correctly in TIAToolbox.


  3. An estimate of roughly how many patches you would expect per slide, given a typical
  colorectal cancer WSI with approximately 800 mm² of tissue area.'
target_skills:
- digital-pathology
domain: imaging
difficulty: easy
