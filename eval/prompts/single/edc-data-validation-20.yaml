id: edc-data-validation-20
prompt: 'You are building an automated SDTM validation pipeline for a Phase III oncology
  trial (STUDY-ONC-2847) with 340 subjects across 12 sites. The trial includes AE,
  CM, LB, VS, EX, and DM domains. During a recent Pinnacle 21 validation run, you
  received 1,247 errors and warnings, but the team suspects many are false positives
  due to custom sponsor extensions and partial dates.


  Specific issues identified:

  - LB domain has 892 records where LBSTRESU contains sponsor-defined units ("COPIES/ML",
  "LOG10 IU/ML") not in CDISC CT but clinically valid for HIV viral load assays

  - AE domain has 67 records with partial onset dates (e.g., "2023-UN-15", "2023-04-UN")
  requiring ISO 8601 imputation per CDISC rules, with AESTDTC and AEENDTC consistency
  checks against RFSTDTC in DM

  - VS domain contains 23 records where SYSBP values (180-195 mmHg) trigger range
  errors but correspond to documented hypertensive crisis events with valid medical
  justification in the CRF comments


  Deliverables required:

  1. Python code implementing a three-tier validation framework: (a) hard errors blocking
  submission, (b) warnings requiring justification, (c) informational flags for review

  2. Logic for partial date imputation following CDISC ADaM/SDTM conventions with
  worst-case and best-case scenarios

  3. A suppQual (SUPPAE) generation function to attach CRF justification text to flagged
  VS and AE records

  4. A prioritized exception report template in pandas DataFrame format with columns
  mapping to define.xml annotation requirements'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: hard
