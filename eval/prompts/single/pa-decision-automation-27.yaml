id: pa-decision-automation-27
prompt: 'Here is test question #27 of 30:


  ---


  Your health plan processes approximately 4,200 prior authorization requests per
  month for specialty biologics (adalimumab, ustekinumab, secukinumab) used in dermatology
  and rheumatology. Your PA operations team has noticed that denial rates for these
  drugs have climbed from 14% to 23% over the past 8 months, but the root cause is
  unclear. You have access to a historical dataset of 18,500 PA decisions (columns:
  `request_id`, `drug_name`, `diagnosis_icd10`, `prescriber_specialty`, `step_therapy_documented`,
  `lab_values_present`, `prior_treatment_history`, `clinical_notes_length`, `submission_channel`
  [portal/fax/phone], `decision` [approved/denied], `denial_reason_code`, `days_to_decision`).


  Please provide the following deliverables:


  1. **Denial pattern analysis plan**: Describe a systematic approach to mine this
  dataset for denial patterns, including which feature combinations to cross-tabulate
  and what statistical tests to apply to identify significant drivers of the denial
  rate increase.


  2. **Python code**: Write a script using pandas and scikit-learn that trains a gradient
  boosting classifier to predict denial probability, outputs feature importances,
  and generates SHAP summary plots with `shap` library. Include train/test split,
  class imbalance handling via `scale_pos_weight`, and a threshold-tuning step optimizing
  for F2 score to minimize false negatives.


  3. **Actionable recommendations**: Based on hypothetical SHAP output showing `step_therapy_documented=False`
  and `submission_channel=fax` as top denial drivers, propose two specific workflow
  interventions with expected impact metrics.'
target_skills:
- pa-decision-automation
domain: healthcare-ops
difficulty: intermediate
