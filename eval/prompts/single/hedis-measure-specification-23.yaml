id: hedis-measure-specification-23
prompt: 'A regional health plan is preparing for HEDIS MY2024 data submission and
  needs help analyzing their Controlling High Blood Pressure (CBP) measure performance.
  Their current data shows:


  - Total attributed members aged 18–85: 12,400

  - Members with hypertension diagnosis: 3,200

  - Members meeting continuous enrollment (11 of 12 months): 2,850

  - Members with adequate blood pressure control (<140/90): 1,710

  - Members excluded due to ESRD: 45

  - Members excluded due to pregnancy: 12

  - Members excluded due to advanced illness: 38


  The plan''s current Star Rating for CBP is 3 stars, and they want to understand
  what it would take to reach 4 stars. Their care coordinators have identified 180
  members with uncontrolled BP who have had no outreach in the past 6 months, and
  60 of those members have documented transportation barriers in their records.


  Please provide:

  1. A step-by-step calculation of the current CBP numerator rate using the data above,
  clearly identifying which members belong in the denominator vs. excluded populations

  2. An explanation of the continuous enrollment rule for CBP, including what "allowable
  gap" means and how it applies here

  3. The approximate performance threshold needed to move from 3 stars to 4 stars
  for CBP under CMS Star Ratings, and how many additional numerator hits would be
  required

  4. A prioritized outreach strategy for the 180 uncontrolled members, with specific
  consideration for the 60 members with transportation barriers and what HEDIS-compliant
  interventions could close those gaps'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: easy
