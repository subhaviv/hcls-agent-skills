id: risk-adjustment-14
prompt: 'Here is test question #14 of 30:


  ---


  You are building a CMS-HCC risk adjustment pipeline for a Medicare Advantage plan
  with 12,000 members. Your data team has extracted the following lab and pharmacy
  proxy signals for members who have **no documented HCC codes** in the current measurement
  year:


  - **Rx proxies**: 847 members filling metformin or insulin (no HCC 19 "Diabetes
  without Complication" or HCC 18 "Diabetes with Chronic Complications" on file)

  - **Lab proxies**: 312 members with HbA1c > 8.5% in the last 6 months (subset may
  overlap with Rx group)

  - **Rx proxies**: 203 members filling loop diuretics + ACE inhibitors concurrently
  (no HCC 85 "Congestive Heart Failure" coded)

  - **Lab proxies**: 178 members with BNP > 400 pg/mL (potential overlap with CHF
  Rx group)


  Using CMS-HCC Model V28 coefficients (assume community, non-dual, non-ESRD segment),
  where HCC 19 RAF coefficient = 0.302, HCC 18 = 0.321, and HCC 85 = 0.323:


  **Deliverables requested:**

  1. Write Python code to deduplicate the overlapping proxy groups, assign the appropriate
  HCC candidate, and apply hierarchy resolution (HCC 18 trumps HCC 19 per V28 hierarchy
  rules)

  2. Calculate the projected RAF score uplift if **60% of identified gaps are confirmed
  and coded**, showing member-count-weighted calculations

  3. Provide a SQL query that flags members meeting either proxy condition and outputs
  a gap report with priority ranking by RAF impact

  4. Recommend a chase prioritization strategy explaining which proxy signal (Rx vs.
  lab) should be pursued first and why'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: intermediate
