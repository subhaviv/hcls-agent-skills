id: trajectory-analysis-14
prompt: 'I''m analyzing single-cell RNA-seq data from a human hematopoietic stem cell
  differentiation study (n=8,500 cells, 10x Genomics, 3,200 highly variable genes).
  I''ve already computed a PAGA graph using Scanpy that shows three major lineage
  branches: erythroid, myeloid, and lymphoid. However, when I run scVelo in "stochastic"
  mode to compute RNA velocity, the velocity arrows on the UMAP seem inconsistent
  with the PAGA topology — specifically, a cluster of 340 cells annotated as "common
  myeloid progenitors" (CMPs) shows velocity arrows pointing back toward the HSC cluster
  rather than forward toward the monocyte/granulocyte clusters.


  Please help me:


  1. Diagnose the most likely causes of this velocity-PAGA discrepancy, particularly
  focusing on the spliced/unspliced ratio quality for the CMP cluster (I have a median
  unspliced/spliced ratio of 0.08 in CMPs versus 0.31 across all other clusters).


  2. Provide Python code using scVelo and CellRank to: (a) switch to "dynamical" mode
  and fit gene-specific kinetic rates, (b) compute terminal states and fate probabilities
  with CellRank using the `CFLARE` estimator, and (c) visualize absorption probabilities
  toward the three terminal lineages as a stacked bar chart per cluster.


  3. Recommend filtering criteria for minimum spliced counts and unspliced counts
  per gene specifically to improve velocity estimates in progenitor populations with
  low unspliced ratios like the CMPs.


  4. Explain how to interpret conflicting PAGA edge weights versus CellRank transition
  probabilities when they disagree about lineage commitment.'
