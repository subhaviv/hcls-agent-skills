id: biomarker-discovery-23
prompt: 'A clinical research team has collected gene expression data (Affymetrix microarray,
  ~22,000 probes) from 180 early-stage breast cancer patients, with 5-year recurrence-free
  survival as the outcome. Of the 180 patients, 42 experienced recurrence (events).
  The team wants to build a prognostic gene signature and has asked for your guidance
  on the analysis pipeline.


  Specifically, they plan to:

  - Use univariate Cox regression to pre-filter probes with p < 0.05, then apply LASSO
  on the surviving probes

  - Evaluate model performance using standard 10-fold cross-validation on the full
  dataset

  - Report the C-index from the final model fit on all 180 patients as the primary
  performance metric


  Please provide the following deliverables:


  1. **Identify all methodological flaws** in their proposed pipeline, explaining
  why each flaw is problematic in the context of biomarker discovery.


  2. **Propose a corrected analysis pipeline** that addresses each flaw, including
  the appropriate cross-validation strategy, feature selection approach, and performance
  metrics suited for survival outcomes.


  3. **Calculate or estimate the events-per-variable (EPV) constraint** given the
  42 events, and explain what this implies for the maximum number of features that
  should enter the final model.


  4. **Provide a short R code snippet** (using `glmnet` and `survival` packages) demonstrating
  how to correctly implement nested cross-validation with LASSO-Cox to avoid data
  leakage, including probe pre-filtering only within inner folds.'
target_skills:
- biomarker-discovery
