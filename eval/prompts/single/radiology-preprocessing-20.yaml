id: radiology-preprocessing-20
prompt: 'You are processing a multi-site neuroimaging dataset of 847 T1w MPRAGE scans
  collected across 6 scanner sites (3T Siemens Prisma, 3T GE Discovery, 1.5T Siemens
  Avanto) as part of a longitudinal aging study. During quality control, you discover
  that HD-BET skull stripping is producing systematically poor results (Dice < 0.85
  vs. manual masks) specifically for the 1.5T Avanto scans (n=203) due to severe B1
  inhomogeneity artifacts, while performing well (Dice > 0.93) on the 3T data. Additionally,
  when registering all scans to MNI152 2mm space using ANTs SyN, you observe that
  38 scans from elderly participants (age 80+) with significant cortical atrophy are
  showing registration failures (normalized cross-correlation < 0.6 post-registration).


  Please provide:

  1. A diagnostic analysis explaining the mechanistic reasons why each failure mode
  occurs, including the specific interaction between B1 inhomogeneity and skull stripping
  algorithms, and why cortical atrophy challenges SyN registration

  2. A revised preprocessing pipeline in Python/bash pseudocode that addresses both
  failure modes, incorporating N4 bias field correction with site-specific parameters,
  a fallback skull stripping strategy, and modified ANTs registration parameters for
  atrophied brains

  3. Specific ANTs SyN parameter modifications (convergence, shrink factors, smoothing
  sigmas, transformation model) that would improve registration for the atrophied
  brain cases

  4. A quality control scoring scheme with thresholds that would automatically flag
  and route problematic scans to the appropriate remediation pathway'
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: hard
