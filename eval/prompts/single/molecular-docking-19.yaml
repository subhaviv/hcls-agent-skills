id: molecular-docking-19
prompt: 'You are setting up a structure-based virtual screening campaign targeting
  the allosteric pocket of a fictional kinase **CLK7** (PDB: 7XKP, resolution 1.9
  Å). During validation redocking of the co-crystallized ligand **LIG-447** (a 38-heavy-atom
  macrocyclic compound with 4 rotatable bonds, MW = 612 Da), you obtain an RMSD of
  3.8 Å against the crystal pose — well above the 2.0 Å acceptance threshold.


  Investigating further, you find:

  - The crystal structure contains two sulfate ions near the binding site

  - LIG-447 has a methylsulfonamide group and a tertiary amine (predicted pKa = 8.2)

  - Preparation used `obabel -ipdb -opdbqt --partialcharge gasteiger` directly on
  the raw PDB file without removing HETATM records first

  - Grid box was defined as 20×20×20 Å centered on the ligand centroid (coordinates:
  x=14.3, y=−22.7, z=8.9)

  - Vina exhaustiveness was set to 8


  Given this scenario, provide:

  1. A ranked list of the likely causes for the high redocking RMSD, with mechanistic
  explanations for each

  2. A corrected step-by-step preparation protocol using both ADFR Suite (prepare_receptor4.py)
  and Meeko for the ligand, including specific command-line calls handling the protonation
  state issue

  3. Recommendations for grid box refinement, including whether 20 Å is appropriate
  for a macrocycle of this size and how to verify box adequacy

  4. A revised exhaustiveness setting with justification based on LIG-447''s rotatable
  bond count and molecular complexity

  5. A Python snippet using the `vina` Python API to run the corrected docking and
  parse the top-3 poses with their scores'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: hard
