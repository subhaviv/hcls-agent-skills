id: risk-adjustment-strategy-21
prompt: 'A Medicare Advantage plan with 12,000 members is preparing for the 2024 payment
  year, during which CMS applies a blended transition methodology combining V24 and
  V28 model weights (50%/50% for payment year 2024).


  The plan''s analytics team has pulled the following aggregate data from their member
  population:


  - 3,200 members have HCC 18 (Diabetes with Chronic Complications) mapped under V24

  - HCC 18 under V24 has a coefficient of 0.318; the equivalent condition maps to
  HCC 37 under V28 with a coefficient of 0.280

  - 1,100 members currently have only HCC 111 (Chronic Obstructive Pulmonary Disease)
  coded under V24 (coefficient 0.335), which maps to HCC 280 under V28 (coefficient
  0.258)

  - 800 members have a documented history of both COPD and asthma in their charts,
  but asthma is not currently coded; under V28, a COPD + Asthma disease interaction
  exists with an additional coefficient of 0.154


  The plan wants to understand the financial and strategic implications of the blended
  transition before submitting their final risk adjustment data.


  Please provide:

  1. A step-by-step explanation of how blended RAF scores are calculated under the
  50/50 transition methodology

  2. The estimated per-member RAF impact for the diabetes cohort under the blended
  model vs. a pure V24 model

  3. An identification of the coding gap opportunity in the COPD/asthma cohort, including
  the estimated aggregate RAF uplift if the gap is closed for all 800 members

  4. Two audit-defensible documentation recommendations a provider should follow when
  coding the asthma diagnosis for these COPD patients'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: easy
