id: multi-omics-pipeline-24
prompt: 'You are analyzing a multi-omics dataset from a colorectal cancer study with
  85 tumor samples and 40 matched normal controls. The data includes:

  - **RNA-seq counts** (18,432 genes, raw counts, processed across 3 sequencing batches)

  - **Proteomics** (4,217 proteins, TMT-labeled, log2-transformed intensities with
  ~15% missing values)

  - **DNA methylation** (850K array, beta values for 750,000 CpG sites)


  Your goal is to perform multi-omics factor analysis using **mofapy2** in Python
  to identify latent factors driving tumor heterogeneity. Before running MOFA2, you
  need to harmonize feature identifiers: the RNA-seq data uses Ensembl gene IDs (e.g.,
  ENSG00000141510), proteomics uses UniProt accessions (e.g., P04637), and methylation
  uses CpG identifiers linked to gene promoters via HGNC symbols.


  Please provide:


  1. **Python code** to map Ensembl IDs → HGNC symbols and UniProt accessions → HGNC
  symbols using the `biomart` Python package or MyGene.info API, retaining only the
  2,800 genes with complete identifier mappings across all three omics layers.


  2. **Preprocessing code** for the RNA-seq data using `pydeseq2` variance-stabilizing
  transformation and ComBat batch correction (`combat-seq` equivalent in Python) across
  the 3 batches, preserving the tumor/normal covariate.


  3. **mofapy2 configuration** to train a MOFA2 model with 15 factors, ARD priors
  per view, and spike-and-slab sparsity, using GPU acceleration if available.


  4. A brief explanation (4–6 sentences) of how to interpret the resulting factor
  weight matrix to prioritize which latent factors are biologically relevant for downstream
  GSEA using `gseapy`.'
target_skills:
- multi-omics-pipeline
domain: multi-omics
difficulty: intermediate
