id: risk-adjustment-19
prompt: 'Here is test question #19 of 30:


  ---


  A Medicare Advantage plan has a member, patient ID M-88421, with the following clinical
  profile for the 2024 payment year (using CMS-HCC Model V28):


  **Active diagnoses on file:** E11.65 (Type 2 DM with hyperglycemia), I50.32 (Chronic
  diastolic heart failure), N18.4 (CKD Stage 4), I13.10 (Hypertensive heart and CKD
  without heart failure)


  **Rx proxy signals:** Member fills sacubitril/valsartan (Entresto) and dapagliflozin
  (Farxiga) monthly. No insulin fills detected.


  **Lab proxy signals:** Most recent eGFR = 22 mL/min (drawn 6 weeks ago); HbA1c =
  9.8% (drawn 3 months ago)


  **Demographic factors:** Age 72, Male, Medicare Part A+B entitlement (no Medicaid,
  non-LTI, non-ESRD)


  **Constraints:** Use V28 coefficient table. Assume the plan''s normalization factor
  is 1.015 and the coding intensity adjustment (CIA) is 0.059.


  Please provide the following deliverables:


  1. Perform the full ICD-10-to-HCC crosswalk for all four diagnoses, identify which
  HCCs are triggered, and resolve all applicable V28 disease hierarchies, clearly
  showing which HCCs are suppressed and which survive.

  2. Calculate the final RAF score for this member, showing each additive component
  (demographic + HCC coefficients) before and after applying the normalization factor
  and CIA.

  3. Based on the Rx and lab proxy signals, identify any coding gaps — diagnoses that
  are clinically implied but not yet coded — and specify the ICD-10 codes that should
  be validated with the treating physician.

  4. Write Python pseudocode (with comments) implementing hierarchy resolution for
  V28 that could generalize to any member''s HCC set.'
target_skills:
- risk-adjustment
