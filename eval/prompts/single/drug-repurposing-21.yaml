id: drug-repurposing-21
prompt: 'A small biotech company is evaluating **metformin** (an approved type 2 diabetes
  drug) as a potential repurposing candidate for **pancreatic ductal adenocarcinoma
  (PDAC)**. Their research team has compiled the following preliminary data:


  - In vitro studies show metformin inhibits complex I of the mitochondrial electron
  transport chain, reducing ATP production in PANC-1 cells (IC50 = 8.2 mM)

  - AMPK activation observed at 2 mM concentration in MiaPaCa-2 cell line

  - A retrospective cohort study (n=847 diabetic patients) showed PDAC incidence reduced
  by 32% in metformin users vs. non-users (HR=0.68, 95% CI: 0.51–0.91)

  - OpenTargets association score for metformin-PDAC: 0.41 (moderate evidence)

  - Key PDAC driver mutations in their patient cohort: KRAS G12D (78%), TP53 R175H
  (45%), SMAD4 loss (32%)


  The team wants to advance this candidate but needs a structured evaluation before
  committing resources.


  **Please provide:**

  1. An assessment of whether this represents target-based or phenotype-based repurposing
  evidence, and why

  2. A ranking of the provided evidence by strength using a standard repurposing evidence
  hierarchy

  3. Three specific mechanistic concerns related to the KRAS G12D mutation context
  that could undermine translatability

  4. Two additional databases or computational tools (beyond OpenTargets) the team
  should query, with specific search parameters they should use

  5. A go/no-go recommendation with one key experiment needed to strengthen the weakest
  evidence point'
target_skills:
- drug-repurposing
domain: drug-discovery
difficulty: easy
