id: clinical-data-standards-20
prompt: 'A global Phase III oncology trial is preparing its safety database lock.
  The AE coding team has flagged a complex mapping conflict involving 847 AE reports
  of "chemotherapy-induced peripheral neuropathy" that were coded inconsistently across
  three regional sites using MedDRA v25.1. Site A coded all events to PT "Peripheral
  neuropathy" (10034580) under SOC Nervous System Disorders. Site B split events between
  PT "Neuropathy peripheral" (10029331) and PT "Peripheral sensory neuropathy" (10034589).
  Site C coded severe cases to PT "Peripheral motor neuropathy" (10034580) and mild
  cases to LLT "Chemotherapy-induced peripheral neuropathy" (10082001).


  Additional complexity: the medical monitor wants to also cross-map these events
  to SNOMED CT for a real-world evidence sub-study, and the biostatistics team needs
  a final SOC/HLGT/HLT/PT breakdown for the integrated summary of safety (ISS).


  Provide the following deliverables:


  1. Analyze whether PT "Peripheral neuropathy" and PT "Neuropathy peripheral" are
  true synonyms or distinct concepts in MedDRA v25.1, and explain the correct LLT-to-PT
  roll-up logic for "Chemotherapy-induced peripheral neuropathy" (LLT 10082001).


  2. Recommend a single harmonized coding strategy for all 847 events, specifying
  which PT(s) to retain and justifying any splitting or collapsing decisions based
  on MedDRA hierarchy rules.


  3. Provide the complete MedDRA hierarchy path (LLT→PT→HLT→HLGT→SOC) for your recommended
  PT(s).


  4. Identify the most appropriate SNOMED CT concept(s) for cross-mapping, including
  the concept ID and fully specified name, and flag any semantic gaps between MedDRA
  and SNOMED CT representations of this condition.'
target_skills:
- clinical-data-standards
