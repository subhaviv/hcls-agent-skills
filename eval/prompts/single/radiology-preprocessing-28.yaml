id: radiology-preprocessing-28
prompt: 'You are processing a retrospective cohort of 847 T1w MPRAGE scans (1mm isotropic,
  256×256×176 FOV) collected across 3 scanner sites (Siemens Prisma 3T, GE Discovery
  MR750 3T, Philips Achieva 1.5T) for a longitudinal Alzheimer''s study. During QC
  review, you discover the following issues:


  1. **HD-BET skull stripping** is producing over-aggressive masks in 23% of scans
  from the Philips 1.5T site, removing portions of the cerebellum and temporal poles

  2. **N4BiasFieldCorrection** (ANTs, 4 iterations, 50×50×50×50 convergence) is leaving
  residual intensity inhomogeneity visible in 31 GE scanner images that show severe
  B1+ field artifacts

  3. **ANTs SyN registration** to MNI152 1mm space is failing for 12 severely atrophic
  subjects (Fazekas scale 3, mean hippocampal volume < 1.2 cm³), producing visually
  distorted warps with negative Jacobian determinants in frontal regions


  For each of the three issues, provide:

  - A root cause analysis explaining the technical mechanism behind the failure

  - Specific parameter modifications or alternative pipeline steps to resolve the
  issue (include exact command-line arguments or code snippets using ANTs, FSL, or
  Python)

  - A quantitative QC metric you would implement to automatically flag similar failures
  in future runs, with threshold values

  - Any preprocessing order dependencies or interactions between these three corrections
  that could introduce compounding errors if addressed in the wrong sequence'
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: hard
