id: cheminformatics-29
prompt: 'You are building a selectivity-focused compound library for a kinase drug
  discovery program. You have identified a series of 5 compounds (SMILES provided
  below) that show activity against your target kinase but may have selectivity issues
  due to structural features that trigger promiscuous binding.


  **Compound SMILES:**

  - Cpd-A: `c1ccc2c(c1)cc(=O)n2CC(=O)Nc1cccc(Cl)c1`

  - Cpd-B: `c1ccc2c(c1)cc(=O)n2CC(=O)Nc1ccc([N+](=O)[O-])cc1`

  - Cpd-C: `O=C(Nc1ccc(F)cc1)CN1C(=O)c2ccccc21`

  - Cpd-D: `c1ccc2c(c1)cc(=O)n2CC(=O)Nc1ccc(S(N)(=O)=O)cc1`

  - Cpd-E: `O=C(CN1C(=O)c2ccccc21)Nc1ccc(O)c(O)c1`


  **Tasks:**


  1. Write complete RDKit Python code to screen all 5 compounds against the **full
  RDKit PAINS filter** (using `FilterCatalog` with `PAINS_A`, `PAINS_B`, and `PAINS_C`
  subsets combined), reporting which PAINS pattern name triggered for each hit.


  2. For compounds passing PAINS, calculate Morgan fingerprints (radius=2, nBits=2048)
  and compute a full **Tanimoto similarity matrix** (all pairwise combinations), then
  identify which compound pair is most similar and which is most dissimilar.


  3. Perform a **matched molecular pair analysis** concept: identify the common scaffold
  shared among Cpd-A, Cpd-B, Cpd-C, and Cpd-D, enumerate what the R-group substitutions
  are at the variable position, and explain how you would use `mmpdb` to predict whether
  replacing the Cpd-B nitro group with a sulfonamide (as in Cpd-D) would improve predicted
  solubility.


  4. Recommend which 2 compounds to prioritize for synthesis based on PAINS status,
  structural diversity, and druglikeness (Lipinski + Veber rules using calculated
  descriptors).'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: hard
