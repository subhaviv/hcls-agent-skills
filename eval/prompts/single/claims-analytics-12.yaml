id: claims-analytics-12
prompt: 'Here is test question #12 of 30:


  ---


  You are a healthcare data analyst at a regional health plan. Your team has received
  a batch of X12 837P professional claim files from 45 different providers over the
  last quarter. Before loading these into your data warehouse, you need to build a
  lightweight Python-based ETL pipeline to parse and structure the data.


  A sample 837P transaction set segment sequence looks like this (simplified):


  ```

  ISA*00*          *00*          *ZZ*SENDER123      *ZZ*RECEIVER456    *230615*1200*^*00501*000000905*0*P*:~

  GS*HC*SENDER123*RECEIVER456*20230615*1200*1*X*005010X222A1~

  ST*837*0001*005010X222A1~

  BPR*CLM*1500.00*...~

  NM1*85*2*SMITH MEDICAL GROUP*****XX*1234567890~

  CLM*CLM-2023-00441*1500.00***11:B:1*Y*A*Y*I~

  DTP*472*D8*20230610~

  HI*ABK:Z8700*ABF:J0690~

  SV1*HC:99214*185.00*UN*1***1~

  SV1*HC:99070*45.00*UN*1***1~

  SE*12*0001~

  ```


  **Please provide the following:**


  1. A Python function using the `pandas` library (and any standard parsing logic
  — no proprietary EDI libraries) that parses this segment structure and outputs a
  structured DataFrame with columns: `claim_id`, `provider_npi`, `service_date`, `icd10_primary`,
  `cpt_code`, `charge_amount`, and `units`.


  2. SQL query logic (written for PostgreSQL) that, once the data is loaded into a
  table called `claims_staging`, identifies any **duplicate claims** defined as same
  `provider_npi`, `service_date`, `cpt_code`, and `charge_amount` submitted more than
  once within a 7-day rolling window.


  3. A brief explanation (3–5 sentences) of what data quality checks you would apply
  to the `icd10_primary` and `cpt_code` fields before promoting records to a production
  claims table.'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: easy
