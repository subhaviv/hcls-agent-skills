id: pa-clinical-policy-26
prompt: 'A 58-year-old patient with moderate-to-severe plaque psoriasis (BSA 22%,
  PASI score 18.4) has been prescribed secukinumab 300mg by their dermatologist. The
  patient is covered under a commercial plan that follows standard step therapy protocols.
  Chart notes indicate the patient completed 12 weeks of methotrexate (15mg/week,
  escalated to 20mg/week at week 6) with inadequate response (PASI improvement <25%),
  and experienced GI intolerance with apremilast after 8 weeks of therapy. The prescribing
  dermatologist documented phototherapy as contraindicated due to the patient''s history
  of melanoma (excised Stage I, 4 years ago).


  The payer''s clinical policy requires: (1) trial and failure of at least one conventional
  systemic agent, (2) trial and failure of at least one non-biologic targeted therapy,
  and (3) phototherapy trial unless contraindicated. The PA request was denied citing
  "incomplete step therapy — phototherapy requirement not met."


  Please provide:

  1. A clinical policy analysis evaluating whether the documented evidence satisfies
  or reasonably exempts each step therapy criterion, citing standard medical necessity
  principles

  2. A peer-to-peer review talking points document the dermatologist could use in
  the appeal call, organized by payer objection

  3. A sample appeal letter (300–400 words) incorporating the clinical contraindication
  argument for phototherapy exemption

  4. An assessment of whether this denial pattern could constitute an improper step
  therapy override under typical state step therapy laws (reference at least 3 common
  statutory exemption categories)

  5. Recommended additional documentation the provider should gather before the peer-to-peer
  review'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: intermediate
