id: quality-measures-18
prompt: 'Here is test question #18 of 30:


  ---


  Your health plan has 42,000 commercial members and needs to report HEDIS Controlling
  High Blood Pressure (CBP) measure rates for the current measurement year. You have
  identified the following preliminary data from your claims warehouse:


  - **Denominator candidates**: 8,340 members aged 18–85 with at least one hypertension
  diagnosis (ICD-10: I10, I11.x, I12.x, I13.x) during the measurement or prior year

  - **Enrollment complexity**: 1,200 members had gaps in coverage (ranging from 15–45
  days) during the measurement year; 340 members were enrolled in hospice for part
  of the year; 180 members turned 85 during the measurement year

  - **Numerator data**: 5,100 members have at least one blood pressure reading in
  the EHR, but 890 of those readings were taken during an acute inpatient stay or
  ER visit

  - **BP values available**: Of the 5,100 readings, 3,760 show systolic <140 AND diastolic
  <90; the remaining 1,340 show at least one value out of range

  - **Telehealth readings**: 420 BP readings were captured via telehealth encounters
  coded with POS 02


  Please provide: (1) a step-by-step denominator construction with explicit handling
  of the enrollment gap rules, hospice exclusions, and age-boundary members; (2) numerator
  logic clarifying which BP readings are valid or excluded per HEDIS technical specifications;
  (3) a SQL query implementing the full CBP measure logic against a standard claims
  schema with tables `members`, `claims`, `diagnoses`, and `bp_readings`; and (4)
  the calculated preliminary measure rate with a brief explanation of how the telehealth
  readings should be treated under current HEDIS guidance.'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: hard
