id: genomic-variant-interpretation-26
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory reports a variant in **BRCA2**:
  c.7976+3A>G (NM_000059.4). The following evidence is available:


  - **SpliceAI scores**: Donor loss: 0.61, Acceptor loss: 0.02, Donor gain: 0.08,
  Acceptor gain: 0.03

  - **ClinVar**: 2 submissions — one "Uncertain Significance" (no evidence provided),
  one "Likely Pathogenic" (functional splicing assay showing partial exon skipping
  in ~40% of transcripts)

  - **gnomAD v3.1 (non-cancer)**: 3 heterozygous carriers out of 113,460 alleles (no
  homozygotes)

  - **REVEL score**: N/A (intronic variant)

  - **Family history**: Proband''s mother and maternal aunt both diagnosed with ovarian
  cancer before age 50; one maternal cousin with breast cancer at age 38

  - **RNA studies from proband''s blood**: Not yet performed


  **Deliverables requested:**


  1. Systematically apply the ACMG/AMP 2015 criteria, explicitly naming each criterion
  (e.g., PS3, PM2, PP4) that applies or does not apply, with justification for each
  decision.


  2. Determine the final variant classification and explain how conflicting ClinVar
  submissions were resolved.


  3. Evaluate whether PVS1 is applicable here and, if so, at what strength level,
  referencing the ClinGen SVI PVS1 decision tree logic for splice-site variants.


  4. Recommend whether RNA splicing studies should be ordered before finalizing the
  classification, and explain how a result showing >90% aberrant splicing versus <10%
  aberrant splicing would each change the classification.'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: intermediate
