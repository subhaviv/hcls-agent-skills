id: cdisc-compliance-30
prompt: 'A Phase III oncology trial (N=847 patients) is preparing an FDA NDA submission
  using SDTM 3.3 and ADaM 1.1. The biomarker team collected circulating tumor DNA
  (ctDNA) measurements at Baseline, Cycle 2, Cycle 4, and End of Treatment using a
  next-generation sequencing panel. The panel reports: (1) variant allele frequency
  (VAF) for 12 pre-specified mutations including KRAS G12C and TP53 R175H, (2) a composite
  ctDNA clearance flag (YES/NO), and (3) a quantitative tumor mutational burden (TMB)
  score in mut/Mb.


  Currently, the team proposes mapping all three data types into the PC domain, using
  PCTESTCD values like "KRASVAF", "CTDNACLR", and "TMB". Pinnacle 21 Enterprise is
  flagging 47 errors and 23 warnings across these records, including: PCTESTCD values
  exceeding 8 characters, missing PCORRESU for the clearance flag, and RELREC relationships
  not established between PC and the companion MB domain records.


  Given this scenario, provide the following deliverables:


  1. **Domain mapping recommendation**: Evaluate whether PC alone is appropriate,
  or whether MB, SUPPPC, and/or a custom SUPPQUAL structure better accommodates these
  three data types under SDTM 3.3 rules. Justify each decision.


  2. **PCTESTCD/MBTESTCD controlled terminology resolution**: Propose compliant test
  codes and names for all three data types, referencing CDISC CT constraints.


  3. **RELREC structure**: Provide a concrete example RELREC record set (minimum 4
  rows) linking the PC VAF records to their corresponding MB mutation identification
  records for a single subject (USUBJID = "ONCO-0042").


  4. **Pinnacle 21 triage**: Classify the 3 flagged issue types by regulatory submission
  risk (Critical/Major/Minor) and recommend remediation priority order.'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: hard
