id: quantitative-proteomics-11
prompt: 'A graduate student is analyzing a label-free quantification (LFQ) proteomics
  dataset from MaxQuant, comparing tumor vs. adjacent normal tissue from 8 patients
  (n=4 per group). After loading the `proteinGroups.txt` file into R and filtering
  contaminants and reverse hits, the intensity matrix contains 3,847 protein groups.
  Inspection of the data reveals the following:


  - Approximately 28% of values are missing across the entire matrix

  - Missing values are **not randomly distributed**: proteins with low abundance tend
  to be missing specifically in one condition (tumor samples show near-complete absence
  for ~180 proteins that are consistently quantified in normal tissue)

  - A smaller subset (~5%) of missing values appear scattered randomly across both
  conditions


  The student plans to use `limma` for differential expression analysis and wants
  to apply a single imputation strategy to the entire dataset before running the linear
  model.


  **Please provide the following:**


  1. Explain why applying a single imputation method (e.g., kNN) uniformly across
  the entire dataset would be problematic given this missingness pattern.


  2. Recommend a hybrid imputation strategy that appropriately handles both the structured
  (condition-specific) missingness and the random missingness separately. Name the
  specific methods you would use for each type (e.g., MinProb, QRILC, kNN, or others)
  and justify your choices.


  3. Write a concise R code snippet (using packages such as `imputeLCMD`, `impute`,
  or `MSnbase`) that implements your recommended hybrid strategy — first classifying
  missing values by type, then applying the appropriate method to each subset.


  4. After imputation, which normalization method would you recommend before running
  `limma`, and why?'
target_skills:
- quantitative-proteomics
