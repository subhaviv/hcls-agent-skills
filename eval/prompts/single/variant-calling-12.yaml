id: variant-calling-12
prompt: 'Here is test question #12 of 30:


  ---


  You are setting up a germline variant calling pipeline for a small research cohort
  of 18 whole-exome sequencing (WES) samples from patients with a rare pediatric kidney
  disorder. The samples were sequenced on an Illumina NovaSeq 6000 (2×150 bp reads),
  aligned with BWA-MEM2 to GRCh38, and are now available as coordinate-sorted, duplicate-marked
  BAM files. Your target regions BED file covers approximately 65 Mb of exonic sequence.


  Your PI wants to identify high-confidence SNVs and indels in known disease genes
  including *NPHS1*, *NPHS2*, *WT1*, and *COL4A3*. She asks whether you should use
  VQSR or hard filters for variant refinement, and wants the pipeline to be reproducible
  on a Linux HPC cluster.


  Please provide the following:


  1. **Filtering recommendation**: Explain whether VQSR or hard filtering is more
  appropriate for this cohort size and data type, and justify your choice with specific
  thresholds or criteria.


  2. **GATK HaplotypeCaller command**: Write a complete `gatk HaplotypeCaller` command
  for a single sample in GVCF mode, including appropriate flags for WES data (e.g.,
  interval padding, `-ERC`, and any recommended WES-specific parameters).


  3. **Joint genotyping step**: Provide the `gatk GenomicsDBImport` and `gatk GenotypeGVCFs`
  commands needed to combine all 18 GVCFs and produce a joint-called VCF.


  4. **Hard filter commands**: Write the `gatk VariantFiltration` commands (separate
  for SNVs and indels) with GATK-recommended hard filter expressions for WES data.'
target_skills:
- variant-calling
domain: genomics
difficulty: easy
