id: multi-omics-pipeline-29
prompt: 'You are integrating multi-omics data from a pancreatic ductal adenocarcinoma
  (PDAC) cohort: 847 tumor samples with RNA-seq (STAR-aligned, GRCh38), ATAC-seq chromatin
  accessibility, and reverse-phase protein array (RPPA) data. The RNA-seq features
  are Ensembl gene IDs (ENSG format), ATAC-seq peaks are annotated to nearest gene
  symbols (HGNC), and RPPA uses antibody names that partially map to UniProt accessions.
  You need to harmonize all three layers before running MOFA2.


  **Specific challenges:**


  1. ~3,200 Ensembl IDs are version-tagged (e.g., ENSG00000141510.14) and ~180 are
  retired/merged in GRCh38.p14

  2. RPPA antibody names like "EGFR_pY1068" and "4EBP1_pT37T46" need mapping to canonical
  UniProt entries

  3. After harmonization, samples split across 4 sequencing batches (batch sizes:
  312, 198, 221, 116) with known confounding by tumor purity (continuous covariate,
  range 0.23–0.94)


  **Deliverables:**


  - Python code using `mygene` and `bioservices` to strip Ensembl version tags, resolve
  retired IDs via current aliases, and map RPPA phosphoprotein names to UniProt canonical
  IDs

  - R code using `sva::ComBat` to regress out batch effects while preserving tumor
  purity as a biological covariate across the RNA-seq matrix (genes × 847 samples)

  - A complete `mofapy2` Python workflow integrating all three corrected omics layers
  with appropriate variance explained thresholds and handling of the ~34% RPPA missingness

  - Recommendations for which MOFA2 factors to prioritize if KRAS signaling is the
  primary biological hypothesis'
target_skills:
- multi-omics-pipeline
domain: multi-omics
