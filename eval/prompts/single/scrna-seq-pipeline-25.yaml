id: scrna-seq-pipeline-25
prompt: 'You are analyzing a single-cell RNA-seq dataset from a colorectal cancer
  study involving 8 patients (4 tumor, 4 adjacent normal tissue). After running CellRanger,
  you have 8 separate `filtered_feature_bc_matrix` directories. Initial inspection
  shows highly variable cell counts per sample (ranging from 1,200 to 6,800 cells)
  and you suspect significant batch effects between patients.


  Your analysis goals are:


  1. **Data loading & merging**: Write Python/Scanpy code to load all 8 samples using
  `sc.read_10x_mtx()`, add sample metadata (patient ID, tissue type), and concatenate
  into a single AnnData object with `batch_key="sample"`.


  2. **QC filtering**: Implement QC filtering using these thresholds: minimum 200
  genes/cell, maximum 6,000 genes/cell, maximum 25% mitochondrial reads, and minimum
  3 cells expressing each gene. Include code to calculate and visualize QC metrics
  using `sc.pl.violin()`.


  3. **Batch correction comparison**: After standard preprocessing (normalization
  to 10,000 counts, log1p, HVG selection of top 2,000 genes, PCA with 50 components),
  apply **both** Harmony and scVI for batch correction. Explain the conceptual difference
  between these two approaches and when you would prefer one over the other.


  4. **Clustering & marker genes**: Using the Harmony-corrected embedding, compute
  a neighborhood graph (`n_neighbors=15`, `n_pcs=30`), run Leiden clustering at resolution
  0.5, and identify the top 5 marker genes per cluster using `sc.tl.rank_genes_groups()`
  with the Wilcoxon method.


  Provide complete, runnable code for steps 1, 2, and 4, and a conceptual explanation
  for step 3.'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: intermediate
