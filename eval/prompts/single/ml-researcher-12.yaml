id: ml-researcher-12
prompt: 'You are developing a machine learning model to predict 30-day hospital readmission
  in a dataset of 18,400 adult patients with heart failure, collected across three
  hospital sites (Site A: 9,200 patients, Site B: 5,800 patients, Site C: 3,400 patients)
  between 2018 and 2023. The overall readmission rate is 22%, but Site C has a notably
  higher rate of 34%. Features include 47 structured EHR variables (vitals, labs,
  medications, comorbidities) and the admission date.


  Your team is considering a gradient boosting model (LightGBM) and has proposed a
  random 80/20 train-test split stratified by outcome label only.


  Please provide the following:


  1. **Splitting strategy critique**: Identify at least two specific methodological
  problems with the proposed random split given this dataset''s structure, and explain
  the clinical consequences of each problem.


  2. **Recommended splitting approach**: Propose a rigorous alternative splitting
  strategy that accounts for the dataset''s temporal and multi-site structure, with
  concrete implementation details (e.g., which years go to which partition).


  3. **Evaluation metric selection**: Given the class imbalance and the clinical context
  of readmission prediction, recommend a primary and secondary evaluation metric,
  explaining why AUROC alone is insufficient here and when AUPRC is preferable.


  4. **Site generalization check**: Describe a practical validation procedure to assess
  whether the model generalizes across the three hospital sites, including how to
  handle the distributional difference at Site C.


  5. **Fairness audit outline**: List three clinically relevant patient subgroups
  to evaluate for performance disparities, and specify which metric you would use
  for each subgroup comparison.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: easy
