id: radiology-preprocessing-30
prompt: 'A research team is preprocessing 847 T1w MRI scans from a multi-site pediatric
  neuroimaging study (ages 6-18, sites: Boston, Chicago, Denver). After running their
  pipeline, they''ve identified several problematic cases and need expert guidance.


  **Current pipeline:** fslreorient2std → N4BiasFieldCorrection (default parameters)
  → HD-BET skull stripping → ANTs SyN registration to MNI152NLin2009cAsym


  **Observed issues:**

  1. **47 scans** from Denver site show residual intensity bias artifacts post-N4,
  particularly in frontal regions. These scans used a 32-channel head coil versus
  12-channel at other sites.

  2. **23 pediatric scans** (ages 6-9) have failed HD-BET skull stripping, leaving
  substantial dural/meningeal tissue, likely due to the larger relative CSF spaces
  in younger brains.

  3. **Registration failures** in 31 scans showing SyN convergence warnings — these
  subjects had incidental findings (enlarged ventricles, asymmetric sulcal patterns).


  **Specific deliverables requested:**


  1. Explain why the 32-channel coil produces worse N4 performance and provide modified
  N4BiasFieldCorrection parameters (spline distance, number of fitting levels, convergence
  threshold) to address this.


  2. Provide a Python/bash hybrid script using HD-BET with modified parameters OR
  an alternative FSL-based fallback (BET with specific flags) for the young pediatric
  cases, including a QC metric to automatically flag remaining failures.


  3. For the SyN registration failures, propose a multi-stage ANTs registration strategy
  with specific metric choices, gradient step sizes, and convergence criteria that
  would handle pathological brain morphology better than default SyN settings.


  4. Describe how you would statistically harmonize the final preprocessed images
  across the three sites using ComBat, specifying which features to extract pre-harmonization
  and what covariates to preserve.'
target_skills:
- radiology-preprocessing
