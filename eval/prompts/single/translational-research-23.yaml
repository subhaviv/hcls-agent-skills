id: translational-research-23
prompt: 'A preclinical team has identified KCNQ3 as a potential target for treatment-resistant
  focal epilepsy. They have the following data package:


  - In vitro: KCNQ3 gain-of-function variants reduce neuronal excitability by 40%
  in iPSC-derived cortical neurons (n=3 independent lines, p=0.02)

  - Mouse model: Kcnq3 knockout mice show spontaneous seizures; a small-molecule potentiator
  (KP-441) reduced seizure frequency by 55% in the Kcnq3+/- model (n=12 mice, p=0.04)

  - Human genetics: A GWAS in 2,800 treatment-resistant epilepsy patients identified
  a suggestive association at the KCNQ3 locus (rs7291043, p=1.2×10⁻⁶, below genome-wide
  significance threshold)

  - Biomarker: Theta-band EEG power (4–8 Hz) is reduced in KP-441-treated mice and
  correlates with seizure reduction (r=0.61)


  The team wants to know if this target-biomarker package is ready to support a first-in-human
  (FIH) study with KP-441.


  Please provide:

  1. A structured target validation scorecard rating the strength of evidence across
  genetic, in vitro, and in vivo dimensions (use a simple Low/Medium/High rating with
  justification for each)

  2. An assessment of theta-band EEG power as a pharmacodynamic biomarker, including
  its proposed context of use and two key gaps that must be addressed before FIH

  3. A go/no-go recommendation with the single most critical experiment needed to
  advance, and why'
target_skills:
- translational-research
domain: cross-domain
difficulty: easy
