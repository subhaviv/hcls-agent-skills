id: structure-based-drug-design-29
prompt: 'You are running a virtual screening campaign against KRAS G12C using a covalent
  docking approach in Schrödinger Glide. Your covalent warhead library contains 4,200
  acrylamide-bearing fragments (MW 150–300 Da), and you plan to screen them against
  the switch II pocket (S-IIP) with Cys12 as the reactive residue. Preliminary crystallography
  (PDB: 7LYJ-analog, resolution 2.1 Å) shows the S-IIP adopts two distinct conformations
  in your crystal: an "open" state (helix α3 displaced by ~4 Å) and a "closed" state.
  Your MD simulations (3 × 500 ns replicas) reveal the open state is populated only
  18% of the time in apo KRAS but increases to 67% upon GDP binding.


  Deliverables requested:


  1. **Receptor ensemble strategy**: Given the conformational data, specify exactly
  how many receptor structures to include, which states to prioritize, and how to
  weight docking scores across the ensemble. Justify your choices quantitatively.


  2. **Covalent docking protocol**: Define the two-step covalent docking workflow
  (non-covalent pre-docking + covalent refinement), including which Glide precision
  mode to use at each step, appropriate docking box dimensions centered on Cys12,
  and the RMSD clustering threshold for post-docking filtering.


  3. **Scoring and rescoring**: After initial docking, you plan MM-GBSA rescoring
  on the top 200 hits. Specify the solvation model, the number of minimization steps,
  whether to include receptor flexibility, and the cutoff ΔG value (kcal/mol) you
  would use to advance compounds to biochemical assay, given typical covalent fragment
  hit rates of 0.5–2%.


  4. **False positive mitigation**: Identify three specific failure modes unique to
  covalent docking of acrylamide fragments against Cys12 and propose a computational
  filter for each.'
