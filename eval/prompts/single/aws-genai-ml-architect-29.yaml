id: aws-genai-ml-architect-29
prompt: 'A regional health system (MedBridge Health) is building a **real-time clinical
  decision support system** for sepsis early warning in their 12-hospital network.
  The system must process HL7 FHIR R4 messages from Epic EHR (approximately 847 concurrent
  ICU patients, ~2,400 FHIR events/minute at peak) and generate sepsis risk scores
  within **500ms end-to-end latency**.


  Their ML team has trained a custom XGBoost model on 3.2M historical patient encounters
  using 67 clinical features (vitals, labs, medications, comorbidities). The model
  achieves 0.91 AUC but requires frequent retraining as patient population demographics
  shift seasonally. They also want to add **LLM-generated clinical summaries** explaining
  each alert to clinicians, using Bedrock with Claude, but the PHI in FHIR messages
  cannot leave their AWS VPC.


  **Constraints:**

  - HIPAA BAA in place with AWS; SOC 2 Type II required

  - Model must be auditable for FDA SaMD Class II pathway

  - Budget ceiling: $85,000/month for inference infrastructure

  - Current on-prem latency baseline: 1,200ms (must improve by 58%)

  - MLOps team of 4 engineers; no dedicated DataOps staff


  **Deliverables requested:**

  1. End-to-end AWS architecture diagram description (services, data flow, network
  topology)

  2. SageMaker endpoint configuration (instance type, scaling policy, serialization
  format) to meet the 500ms SLA

  3. Solution for running Bedrock Claude inference on PHI data without VPC egress
  — explain whether this is architecturally achievable and what the tradeoffs are

  4. MLOps pipeline design for continuous retraining with drift detection, including
  specific SageMaker Model Monitor thresholds for a clinical model

  5. Cost breakdown estimating whether the $85K/month budget is achievable'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
