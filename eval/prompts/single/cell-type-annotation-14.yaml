id: cell-type-annotation-14
prompt: 'You have processed a 10x Genomics scRNA-seq dataset from 8 pediatric ALL
  (acute lymphoblastic leukemia) patients containing 42,000 cells after QC. Leiden
  clustering at resolution 0.5 produced 18 clusters. You want to annotate these clusters
  using a hierarchical approach: first broadly classify cells (immune vs. non-immune
  vs. malignant), then apply fine-grained annotation within each broad category.


  Your AnnData object is stored as `adata` with raw counts in `adata.X` and UMAP coordinates
  already computed. You have access to CellTypist with the `Immune_All_High.pkl` and
  `Immune_All_Low.pkl` models, and a reference PBMC atlas (`ref_adata`) with cell
  type labels in `ref_adata.obs[''cell_type'']`.


  Specific requirements:

  1. Write Python code implementing the two-tier annotation strategy: use CellTypist
  majority voting with `Immune_All_High.pkl` for broad classification, then apply
  `Immune_All_Low.pkl` only to clusters classified as immune

  2. For clusters flagged as potentially malignant (B-cell precursor markers: CD19,
  CD10/MME, CD34, TdT/DNTT, PAX5), write code to create a dotplot showing expression
  of these 5 canonical markers across all 18 clusters

  3. Implement a confidence filter: any cluster where CellTypist majority voting confidence
  < 0.6 should be flagged for manual review and labeled "Unresolved"

  4. Add code to store all annotation results back into `adata.obs` with appropriate
  column names

  5. Print a summary table showing cluster ID, broad label, fine-grained label, confidence
  score, and manual review flag'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: intermediate
