id: ml-researcher-15
prompt: 'Here is test question #15 of 30:


  ---


  You are a computational pathology researcher developing a model to predict microsatellite
  instability (MSI) status from H&E-stained whole slide images (WSIs) of colorectal
  cancer specimens. Your dataset consists of 1,847 WSIs collected across three hospital
  sites: Site A (n=923, academic medical center), Site B (n=612, community hospital),
  and Site C (n=312, international partner in Germany). MSI-high prevalence is 18%
  overall but varies by site: 22% at Site A, 15% at Site B, and 14% at Site C. Each
  WSI has been tiled into 256×256 patches at 20× magnification, yielding approximately
  800–2,400 patches per slide. You plan to use a pretrained vision transformer (ViT-L/16
  trained on natural images) as a patch-level feature extractor, followed by an attention-based
  multiple instance learning (MIL) aggregator for slide-level prediction.


  Please provide:

  1. A rigorous data splitting strategy that addresses site generalization and prevents
  data leakage, specifying exactly how you would allocate slides across train/validation/test
  sets given the site imbalance.

  2. A recommendation on whether to fine-tune the ViT backbone versus freeze it, with
  justification based on dataset size and domain shift considerations.

  3. The complete set of evaluation metrics you would report, explaining why AUROC
  alone is insufficient here and what additional metrics are essential.

  4. A fairness audit plan that examines whether model performance is equitable across
  the three sites, including which statistical tests you would use to detect significant
  performance gaps.

  5. A brief checklist of the TRIPOD+AI reporting items most critical for this specific
  computational pathology setting.'
target_skills:
