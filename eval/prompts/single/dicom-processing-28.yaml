id: dicom-processing-28
prompt: 'You are processing a multi-echo fMRI DICOM series from a Siemens Prisma 3T
  scanner for a resting-state study (n=47 participants). The DICOMs were acquired
  with the following parameters: TR=2000ms, TE1/TE2/TE3=12.4/27.8/43.2ms, flip angle=70°,
  matrix=64×64, 36 slices, and were exported with the "Mosaic" format flag enabled.
  When you run dcm2niix (v1.0.20230411) with default settings, you encounter the following
  issues:


  1. The output produces separate NIfTI files per echo rather than a combined 4D file,
  and the echo dimension is encoded in the filename suffix (`_e1`, `_e2`, `_e3`) but
  the JSON sidecar shows `EchoTime` as a single value (only the first echo) rather
  than an array.

  2. For 3 participants, the Mosaic DICOM slices are interleaved with a non-standard
  ordering (confirmed via `ImageOrientationPatient` and `SliceLocation` tags), causing
  dcm2niix to produce volumes with incorrect slice timing metadata in the BIDS sidecar.

  3. One participant''s session contains mixed series where a localizer scan shares
  the same `SeriesInstanceUID` as the functional run due to a scanner configuration
  error.


  Please provide: (a) the specific dcm2niix flags and pre-processing steps to correctly
  handle Mosaic multi-echo reconstruction and produce BIDS-compliant outputs, (b)
  a Python script using pydicom to detect and fix the `SeriesInstanceUID` collision
  before conversion, (c) a method to programmatically validate and correct the `SliceTiming`
  array in the JSON sidecars for the 3 affected participants, and (d) explain how
  `SliceTiming` should be derived from DICOM tags `(0019,1029)` and `(0020,0013)`
  for Siemens sequences.'
target_skills:
- dicom-processing
domain: imaging
difficulty: hard
