id: clinical-data-standards-18
prompt: 'A pharmaceutical sponsor is preparing an integrated summary of safety (ISS)
  for a new anti-inflammatory compound. The clinical program includes three Phase
  III trials with a combined 2,847 treated patients. The safety team has encountered
  a coding challenge involving 23 adverse events that were verbatim-coded to MedDRA
  v26.0 terms spanning two closely related SOCs: "Musculoskeletal and connective tissue
  disorders" (SOC 10028395) and "General disorders and administration site conditions"
  (SOC 10018065).


  The specific problem terms include:

  - 47 cases coded to "Arthralgia" (PT 10003239, SOC: Musculoskeletal)

  - 31 cases coded to "Pain in extremity" (PT 10033425, SOC: Musculoskeletal)

  - 19 cases coded to "Musculoskeletal pain" (PT 10028411, SOC: Musculoskeletal)

  - 28 cases coded to "Musculoskeletal discomfort" (PT 10028405, SOC: Musculoskeletal)

  - 22 cases coded to "Malaise" (PT 10025482, SOC: General disorders)


  A regulatory reviewer has questioned whether "Musculoskeletal discomfort" cases
  should be recoded to "Musculoskeletal pain" for consistency, and whether "Malaise"
  events with concurrent arthralgia documentation should be dual-coded.


  Please provide: (1) an analysis of the HLT groupings for all five PTs and whether
  collapsing at HLT level is appropriate for the ISS frequency table; (2) a recommendation
  on the recoding question with MedDRA hierarchy justification; (3) guidance on MedDRA''s
  dual-coding policy for the "Malaise" cases; and (4) a proposed AE frequency table
  structure showing counts at both PT and HLT levels, including how to handle the
  22 "Malaise" cases if dual-coding is applied.'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: hard
