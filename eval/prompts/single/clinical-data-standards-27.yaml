id: clinical-data-standards-27
prompt: 'A pharmacovigilance team is preparing the adverse event summary tables for
  a Phase III oncology trial (N=412 patients). During MedDRA coding (version 26.0),
  the safety data manager identifies the following submitted verbatim terms that require
  coding decisions:


  1. "mild hand trembling" (n=18 patients)

  2. "shaking of hands" (n=7 patients)

  3. "essential tremor exacerbation" (n=3 patients)

  4. "intention tremor" (n=5 patients)

  5. "resting tremor" (n=9 patients)


  The team must decide whether to present these events aggregated at the HLT level
  or maintain PT-level granularity in the primary safety table. Additionally, the
  medical monitor wants to cross-map the most clinically significant PT to both ICD-10-CM
  and SNOMED CT for signal detection integration with an external pharmacovigilance
  database.


  Please provide:

  (a) The correct MedDRA PT assignment for each verbatim term, including the full
  hierarchy path (LLT→PT→HLT→HLGT→SOC) for at least two of the five terms

  (b) A recommendation with justification on whether to aggregate at HLT or PT level
  for the primary AE frequency table, considering the total combined incidence (42/412
  patients, ~10.2%)

  (c) The ICD-10-CM code and SNOMED CT concept ID (with concept name) that best maps
  to the PT "Tremor" for cross-terminology integration

  (d) One scenario where maintaining PT-level distinction between these tremor terms
  would be clinically critical versus one scenario where HLT aggregation would be
  more appropriate'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: intermediate
