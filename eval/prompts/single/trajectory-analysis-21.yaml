id: trajectory-analysis-21
prompt: 'I have single-cell RNA-seq data from a mouse hematopoiesis study containing
  8,500 cells spanning hematopoietic stem cells (HSCs) through committed progenitors.
  After standard preprocessing with Scanpy, I have a UMAP embedding and Leiden clusters
  identifying the following populations: HSCs (cluster 0), multipotent progenitors
  (cluster 1), common myeloid progenitors (cluster 2), granulocyte-monocyte progenitors
  (cluster 3), and megakaryocyte-erythrocyte progenitors (cluster 4). I want to establish
  a developmental trajectory using diffusion pseudotime (DPT) to order these cells
  along their differentiation path.


  Please provide the following:


  1. **Step-by-step Python code** using Scanpy to compute diffusion maps and then
  run DPT, setting the root cell in cluster 0 (HSCs) using the cell with the highest
  expression of *Procr* (also known as *Epcr*) as the root cell index.


  2. **Visualization code** to generate two plots: (a) cells colored by diffusion
  pseudotime on the existing UMAP, and (b) a heatmap showing the top 15 genes that
  correlate most strongly with pseudotime (Spearman correlation), ordered by their
  peak expression along the pseudotime axis.


  3. **Parameter recommendations** for `n_comps` in the diffusion map calculation
  and `n_neighbors` in the neighbor graph that are appropriate for this dataset size
  and biological question, with brief justification for each choice.'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: easy
