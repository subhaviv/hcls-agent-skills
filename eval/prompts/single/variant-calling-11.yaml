id: variant-calling-11
prompt: 'Here is test question #11 of 30:


  ---


  You are setting up a germline variant calling pipeline for a small research cohort
  of 18 whole-exome sequencing (WES) samples from patients with a rare connective
  tissue disorder. The samples were sequenced on an Illumina NovaSeq 6000 with 150
  bp paired-end reads, achieving an average coverage of 85x. You have already completed
  alignment with BWA-MEM2 and duplicate marking with Picard, producing coordinate-sorted
  BAM files that have passed QC.


  Your team wants to call germline SNVs and indels using GATK HaplotypeCaller in GVCF
  mode, followed by joint genotyping. A colleague suggests applying VQSR for variant
  filtration, but another team member argues that with only 18 samples, hard filters
  would be more appropriate.


  Please provide the following:


  1. A clear recommendation on whether to use VQSR or hard filtering for this cohort,
  with justification based on cohort size and variant count expectations for WES data.


  2. The specific GATK hard filter expressions you would apply separately for SNVs
  and indels (include at least 3 filter thresholds per variant type with the exact
  JEXL filter strings).


  3. A brief GATK command-line example showing how to run `GenotypeGVCFs` on a combined
  GenomicsDB workspace, followed by the `VariantFiltration` step applying your recommended
  SNV hard filters.


  4. One additional consideration specific to WES data (as opposed to WGS) that could
  affect variant calling quality in this pipeline, and how you would address it.'
target_skills:
- variant-calling
domain: genomics
difficulty: easy
