id: risk-stratification-indices-07
prompt: 'A regional health system is preparing to stratify its 12,400-patient Medicare
  Advantage population for a care management program. The analytics team has extracted
  the following aggregate data from the past 12 months:


  - 3,200 patients have a Charlson Comorbidity Index (CCI) score ≥ 3

  - 1,850 patients have had at least one inpatient admission with a LACE score ≥ 10
  at discharge

  - 2,100 patients have one or more SDOH Z-codes documented (Z59.x, Z60.x, Z63.x)

  - 890 patients reside in Area Deprivation Index (ADI) national percentile ≥ 85

  - Overlap between high LACE and high CCI cohorts is approximately 620 patients


  The program can only actively manage 1,500 patients in the first wave due to staffing
  constraints. Leadership wants to prioritize patients at highest risk for 30-day
  readmission AND adverse social determinants, but is uncertain whether to use CCI,
  LACE, or a composite approach.


  Please provide:

  1. A comparative analysis of CCI vs. LACE for 30-day readmission prediction in this
  Medicare Advantage context, including key limitations of each

  2. A recommended composite stratification methodology that integrates LACE, CCI,
  and at least one SDOH dimension (Z-codes or ADI), with explicit scoring logic or
  weighting rationale

  3. A Python code snippet that takes a patient-level dataframe with columns `lace_score`,
  `cci_score`, `has_sdoh_zcode` (boolean), and `adi_percentile`, and outputs a ranked
  priority tier (Tier 1/2/3) based on your recommended methodology

  4. Identification of at least two potential equity concerns with this stratification
  approach and mitigation strategies'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: intermediate
