id: quality-measures-29
prompt: 'A regional health plan with 85,000 commercial members needs to calculate
  the HEDIS Controlling High Blood Pressure (CBP) measure for the current measurement
  year. Your data team has identified several complex edge cases that require resolution
  before finalizing the measure rate.


  **Member Population Details:**

  - 12,340 members aged 18–85 with a hypertension diagnosis

  - 847 members have a hypertension diagnosis but also have end-stage renal disease
  (ESRD) claims (ICD-10: N18.6)

  - 1,203 members have only one hypertension diagnosis code appearing on a claim with
  a "rule-out" modifier

  - 634 members turned 18 during the measurement year (birthday falls between January
  15 and October 30)

  - 2,891 members had a gap in enrollment of exactly 45 days during the measurement
  year

  - Blood pressure readings are available in both structured EHR data and unstructured
  clinical notes; 3,156 members have readings only in unstructured notes


  **Deliverables Required:**


  1. Write the denominator exclusion logic in SQL (assume tables: `members`, `claims`,
  `diagnoses`, `enrollment_spans`) that correctly handles the ESRD exclusions, the
  rule-out diagnosis edge case, and the 45-day enrollment gap per HEDIS technical
  specifications.


  2. Explain how to handle the 634 members who turned 18 during the measurement year
  — specifically whether their birthday date affects the continuous enrollment lookback
  period.


  3. Describe the numerator criteria for CBP, including how to adjudicate conflicting
  blood pressure readings (e.g., one reading shows controlled BP, another shows uncontrolled
  within the same measurement year).


  4. Provide a recommended approach for incorporating BP readings from unstructured
  clinical notes into the numerator, including any HEDIS hybrid method considerations.'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: hard
