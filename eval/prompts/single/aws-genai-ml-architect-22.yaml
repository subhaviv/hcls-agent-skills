id: aws-genai-ml-architect-22
prompt: 'A regional telehealth company, MedConnect, is building a clinical documentation
  assistant to help physicians generate structured SOAP notes from recorded patient
  consultations. They have approximately 45,000 patient encounters per month, each
  producing a 15-30 minute audio recording. The company holds a BAA with AWS and needs
  to remain HIPAA compliant throughout the pipeline.


  Their current thinking is to use Amazon Transcribe Medical to convert audio to text,
  then pass transcripts to an LLM for SOAP note generation. They are debating whether
  to use Amazon Bedrock with Claude or deploy a fine-tuned model on SageMaker.


  Please provide the following:


  1. **Architecture recommendation**: Should MedConnect use Bedrock with Claude or
  SageMaker with a fine-tuned model for SOAP note generation? Justify your choice
  given their scale (45,000 encounters/month) and compliance requirements.


  2. **High-level AWS architecture diagram** (described in text): Outline the key
  services and data flow from audio ingestion through final SOAP note delivery to
  the EHR system, including where PHI is handled and how it is protected at each stage.


  3. **HIPAA compliance checklist**: List at least five specific AWS configuration
  steps or service settings MedConnect must enable to ensure PHI is handled appropriately
  across Transcribe Medical, the chosen LLM service, and storage layers.


  4. **Cost optimization tip**: Given the volume of 45,000 encounters/month, suggest
  one concrete strategy to reduce inference costs without sacrificing note quality.'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: easy
