id: hedis-measure-specification-28
prompt: 'A regional health plan is preparing for its HEDIS 2024 measurement year audit
  and has identified a complex edge case population for the **Colorectal Cancer Screening
  (COL-E)** measure. Their data team has extracted the following cohort characteristics:


  - **4,847 members** aged 45–75 who meet the initial population criteria

  - **312 members** have a colonoscopy claim dated **11 months before** the measurement
  year start date (January 15, 2023)

  - **189 members** have a diagnosis code of **Z12.11** (encounter for screening for
  malignant neoplasm of colon) with no accompanying procedure code in the measurement
  year

  - **94 members** were enrolled in the plan for **9 continuous months** during the
  measurement year, with a **45-day gap** in coverage during March–April

  - **67 members** have a documented **colorectal cancer diagnosis (C18.x)** from
  3 years prior with no evidence of recurrence

  - **41 members** have a **total colectomy** procedure code from 6 years ago


  The plan''s quality director needs your expert analysis across four deliverables:


  1. **Denominator eligibility determination** for each of the five subgroups, citing
  specific NCQA specification logic

  2. **Exclusion evaluation** identifying which members qualify for valid exclusions
  and the required documentation standards

  3. **Numerator compliance assessment** for the Z12.11 subgroup, including whether
  a standalone diagnosis code satisfies evidence requirements

  4. **SQL pseudocode** to flag members in each subgroup with their correct measure
  disposition (denominator-only, numerator-compliant, excluded, or non-compliant)'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: hard
