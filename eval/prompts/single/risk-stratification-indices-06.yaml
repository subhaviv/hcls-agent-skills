id: risk-stratification-indices-06
prompt: 'A regional health system is preparing to launch a 30-day readmission reduction
  program targeting Medicare patients discharged from three med-surg units. The care
  management team has access to the following data elements for 2,847 recently discharged
  patients: ICD-10 diagnosis codes, length of stay, admission acuity (emergent vs.
  elective), ED visit history (prior 6 months), Charlson Comorbidity Index (CCI) scores,
  and SDOH Z-codes (Z59.0–Z59.9, Z60.x, Z63.x).


  The team is debating whether to use the LACE Index alone, CCI alone, or a hybrid
  approach combining LACE with SDOH Z-code flags to identify the highest-risk patients
  for intensive post-discharge follow-up. Their current capacity allows outreach to
  approximately 400 patients per month.


  Preliminary internal data shows: 312 patients have a LACE score ≥10, 489 patients
  have a CCI ≥5, and 278 patients have both a LACE ≥10 and at least two SDOH Z-codes
  documented. Readmission rates from the prior quarter were 18.4% overall, 31.2% for
  LACE ≥10 patients, and 38.7% for patients with LACE ≥10 plus two or more SDOH Z-codes.


  Please provide:

  1. A comparative analysis of using LACE alone vs. the hybrid LACE + SDOH Z-code
  approach given the capacity constraint of 400 patients/month

  2. A recommendation on which stratification strategy maximizes preventable readmissions
  averted

  3. A Python code snippet that flags patients meeting the hybrid high-risk criteria
  (LACE ≥10 AND ≥2 SDOH Z-codes) from a pandas DataFrame with columns: `patient_id`,
  `lace_score`, `sdoh_z_codes` (list of strings)

  4. One limitation of relying on Z-codes for SDOH stratification in this context'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: intermediate
