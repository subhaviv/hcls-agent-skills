id: ml-researcher-14
prompt: 'Here is your test question #14 of 30:


  ---


  You are a data scientist at a regional health system with 14 hospitals. Your team
  has built a gradient boosting model (XGBoost) to predict 30-day readmission after
  cardiac catheterization using structured EHR data: 47 features including demographics,
  labs (troponin, BNP, creatinine), procedure details, comorbidity indices, and prior
  utilization. Training set: 28,400 encounters from 2018–2021; internal test set:
  6,100 encounters from 2022. The model achieves AUROC = 0.74 on the internal test
  set.


  A clinical champion wants to deploy this model at all 14 sites, but your informatics
  lead raises concerns about site-level heterogeneity — three of the hospitals are
  academic centers, four are community hospitals with high Medicaid populations, and
  seven are rural critical-access hospitals. You have site identifiers in your data
  but did not account for them during model development.


  Please provide:

  1. A retrospective audit plan to quantify site-level performance variation, specifying
  which metrics to stratify (beyond AUROC) and why those metrics matter clinically
  for this use case.

  2. A recommendation on whether to use a single global model, site-stratified models,
  or a mixed-effects/hierarchical approach — with justification based on expected
  sample sizes per site (assume roughly equal distribution across 14 sites).

  3. A revised cross-validation strategy that properly accounts for site clustering
  to give unbiased generalization estimates.

  4. Two fairness checks focused on the high-Medicaid community hospitals, including
  which demographic subgroups to examine and what disparity threshold you would flag
  as clinically unacceptable.

  5. A brief note on whether TRIPOD+AI or PROBAST guidance applies here and what one
  reporting gap this pipeline likely has.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: intermediate
