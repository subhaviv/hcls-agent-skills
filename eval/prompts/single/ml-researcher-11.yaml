id: ml-researcher-11
prompt: 'You are building a 30-day hospital readmission prediction model using EHR
  data from a single academic medical center. Your dataset contains 45,000 adult inpatient
  encounters from 2018–2022, with a readmission rate of 12%. Features include 87 structured
  variables: demographics (age, sex, race/ethnicity), vitals at discharge, lab values
  (creatinine, BNP, hemoglobin), diagnosis codes (ICD-10), length of stay, and prior
  utilization. You plan to deploy the model prospectively starting in 2023 to flag
  high-risk patients for a care coordination intervention.


  You are considering three candidate models: L2-regularized logistic regression,
  XGBoost, and a TabNet architecture. You have no external validation cohort available.


  Please provide the following concrete deliverables:


  1. **Data splitting strategy**: Recommend how to split the 2018–2022 data for training,
  validation, and testing, explaining why a simple random split would be problematic
  for this deployment scenario.


  2. **Evaluation metrics**: Identify the three most important metrics for this use
  case and explain why AUROC alone is insufficient given the class imbalance and intended
  clinical use.


  3. **Calibration plan**: Describe how you would assess and correct for miscalibration,
  including which calibration method to prefer and why.


  4. **Fairness audit**: Specify which subgroups to evaluate, which fairness metric
  to prioritize (e.g., equalized odds, calibration within groups), and one concrete
  remediation strategy if disparities are found.


  5. **Model selection guidance**: Given no external cohort, explain how you would
  choose among the three candidate models in a way that is defensible for a prospective
  clinical deployment.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: easy
