id: drug-repurposing-28
prompt: 'Here is test question #28 of 30:


  ---


  You are evaluating **bardoxolone methyl** (an Nrf2 activator originally developed
  for CKD) as a repurposing candidate for **pulmonary arterial hypertension (PAH)**
  in a rare pediatric population (ages 6–17, n=47 enrolled in your registry). Your
  preliminary transcriptomic data from patient PBMCs shows significant downregulation
  of **NQO1** (log2FC = -1.8, FDR = 0.003), **HMOX1** (log2FC = -2.1, FDR = 0.001),
  and **SQSTM1** (log2FC = -1.4, FDR = 0.02), all canonical Nrf2 targets. However,
  two complicating factors exist: (1) bardoxolone methyl was previously halted in
  the BEACON trial due to excess cardiovascular mortality in adult CKD patients, and
  (2) a recent preprint reports that NF-κB pathway activation — a known off-target
  effect of bardoxolone — may paradoxically worsen pulmonary vascular remodeling in
  a rodent PAH model.


  **Deliverables requested:**

  1. Write a structured DGIdb + OpenTargets query strategy (with specific API endpoint
  logic or pseudocode) to retrieve all known bardoxolone methyl interactions and assess
  mechanistic overlap with PAH disease biology

  2. Construct a repurposing evidence scorecard (using a defined hierarchy) that incorporates
  the BEACON safety signal, the conflicting NF-κB preprint data, and your PBMC transcriptomic
  findings

  3. Propose a go/no-go framework with explicit thresholds for proceeding to an IND-enabling
  study, including how you would weight the pediatric context and the unmet medical
  need against the cardiovascular risk signal

  4. Recommend two mechanistically similar backup compounds (with rationale) that
  avoid the NF-κB liability'
