id: structure-based-drug-design-19
prompt: 'You are optimizing a series of covalent inhibitors targeting KRASG12C using
  structure-based methods. Your lead compound **KRX-447** contains a acrylamide warhead
  and shows IC50 = 340 nM in a GDP-loaded biochemical assay, but only 18% cellular
  target engagement at 1 µM (measured by competitive ABPP). Crystal structure analysis
  (PDB-like data below) reveals the covalent adduct with C12 is confirmed, but the
  non-covalent recognition elements show the naphthalene core making only one hydrogen
  bond with H95 (2.9 Å) while leaving the His95/Tyr96 subpocket largely unoccupied.
  A close analog **KRX-448** (fluorine substitution at C4 of naphthalene) shows improved
  biochemical IC50 = 89 nM but paradoxically worse cellular engagement at 11%.


  Given this context:


  1. **Explain the likely mechanistic disconnect** between biochemical potency and
  cellular target engagement for KRX-448 specifically, proposing at least three distinct
  hypotheses with testable predictions for each.


  2. **Design a revised docking/FEP workflow** to prioritize compounds with improved
  cellular engagement rather than just biochemical potency. Specify which energy terms
  to weight differently, how to account for the GDP→GTP state transition in KRAS,
  and whether induced-fit docking is appropriate here.


  3. **Propose three specific structural modifications** to KRX-447''s naphthalene
  core (not the warhead) that would improve His95/Tyr96 subpocket occupancy, providing
  the chemical rationale and predicted ΔΔG range for each based on the unoccupied
  subpocket volume (~85 Ų).


  4. **Write a Python pseudocode outline** for an automated virtual screening cascade
  that flags compounds with predicted poor membrane permeability or high glutathione
  reactivity before docking.'
