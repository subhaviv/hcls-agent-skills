id: trajectory-analysis-13
prompt: 'Here is test question #13 of 30:


  ---


  I have a single-cell RNA-seq dataset of 8,400 hematopoietic stem and progenitor
  cells (HSPCs) from human bone marrow, spanning differentiation toward erythroid,
  myeloid, and lymphoid lineages. I''ve already completed preprocessing (normalization,
  HVG selection of 2,000 genes, PCA with 40 components) and have cell type annotations
  stored in `adata.obs[''cell_type'']` with labels: HSC, MPP, CMP, MEP, GMP, Erythroblast,
  Monocyte, and ProB. I want to compute diffusion pseudotime (DPT) using Scanpy to
  order these cells along their developmental trajectories.


  Please provide the following:


  1. **Step-by-step Python code** using Scanpy to compute a diffusion map, set the
  root cell as an HSC (I''ll use the cell with the highest `HSPA1A` expression as
  root), and calculate DPT scores stored in `adata.obs[''dpt_pseudotime'']`.


  2. **A UMAP visualization** colored by DPT pseudotime values, with a second panel
  showing cell type annotations side by side for comparison.


  3. **Parameter recommendations**: specifically what values to use for `n_comps`
  in `sc.tl.diffmap()` and `n_neighbors` in the neighbor graph, and why these choices
  matter for a dataset of this size and complexity with three branching lineages.


  4. **A brief explanation** of how DPT handles branching trajectories differently
  from linear pseudotime methods, and what limitations I should be aware of when interpreting
  the pseudotime values across the three distinct lineage branches.'
target_skills:
- trajectory-analysis
