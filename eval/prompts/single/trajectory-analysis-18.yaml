id: trajectory-analysis-18
prompt: 'Here is test question #18 of 30:


  ---


  You are analyzing a single-cell RNA-seq dataset of 14,200 human hematopoietic stem
  and progenitor cells (HSPCs) from bone marrow, spanning differentiation toward erythroid,
  myeloid, and lymphoid lineages. After running scVelo in dynamical mode, you observe
  a troubling inconsistency: RNA velocity arrows near the common myeloid progenitor
  (CMP) cluster point confidently toward granulocyte-monocyte progenitors (GMPs),
  but CellRank fate probabilities computed using the VelocityKernel assign 67% terminal
  absorption probability toward erythroid fate for the same CMP cells. Meanwhile,
  PAGA connectivity analysis shows strong graph edges from CMP to both GMP (connectivity
  score 0.41) and megakaryocyte-erythroid progenitor (MEP, connectivity score 0.38)
  clusters, with a weaker edge to common lymphoid progenitors (CLP, connectivity score
  0.19).


  Key genes driving velocity in CMPs include GATA1, KLF1, and MPO, with high splicing
  kinetics uncertainty (γ fit R² < 0.3) for SPI1 and CEBPA. The dataset has batch
  effects across three donors (n=4,800, 5,100, 4,300 cells respectively).


  Please provide: (1) a mechanistic explanation for why velocity arrows and CellRank
  fate probabilities conflict in this region; (2) a strategy to resolve this discrepancy
  using a combined kernel approach in CellRank, with specific kernel weights and justification;
  (3) working Python code implementing a `ConnectivityKernel + VelocityKernel` combination
  with appropriate preprocessing to handle batch effects; and (4) criteria for determining
  which fate probability estimate should be trusted more given the poor γ fit for
  lineage-determining transcription factors.'
