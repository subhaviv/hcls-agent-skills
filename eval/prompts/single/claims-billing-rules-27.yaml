id: claims-billing-rules-27
prompt: 'A regional Medicare Advantage plan is conducting a targeted audit of a multi-specialty
  group practice after an algorithm flagged unusual billing patterns. The audit team
  has pulled 6 months of claims data revealing the following: Dr. Chen (orthopedic
  surgeon) billed modifier 25 on 94% of E&M visits that occurred on the same day as
  a procedure, compared to a peer average of 31%. Dr. Patel (general surgeon) performed
  47 cholecystectomies (CPT 47600) and billed CPT 43239 (upper GI endoscopy with biopsy)
  on the same day for 38 of those cases, each with modifier 59 appended. Dr. Williams
  billed CPT 99215 (level 5 office visit) for 78% of all patient encounters, with
  an average visit documentation of 8 minutes per chart audit. The practice also shows
  12 instances where a single provider billed more than 24 hours worth of time-based
  services in a single calendar day across their patient panel.


  Please provide:

  1. An assessment of which billing patterns represent likely coding errors versus
  potential fraud indicators, with specific reasoning for each provider

  2. An explanation of the applicable NCCI edit logic and modifier rules being violated
  or potentially abused in each scenario

  3. A prioritized investigation framework indicating which cases warrant immediate
  referral to a Special Investigations Unit (SIU) versus provider education

  4. Three specific documentation elements the audit team should request to either
  validate or refute the modifier 25 and modifier 59 usage

  5. A brief explanation of how the "impossible day" findings should be quantified
  and what threshold triggers a formal fraud referral under CMS guidelines'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: intermediate
