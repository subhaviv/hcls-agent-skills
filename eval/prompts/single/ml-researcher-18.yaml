id: ml-researcher-18
prompt: 'Here is test question #18 of 30:


  ---


  You are designing an ML pipeline to predict 90-day readmission risk in a multicenter
  ICU dataset (MIMIC-IV + two private hospital systems: St. Aurelius Medical Center
  with n=14,200 admissions and Hargrove Regional Health with n=8,750 admissions).
  The outcome is highly imbalanced: 12% positive rate overall, but 18% at St. Aurelius
  and 7% at Hargrove. Features include 47 lab values, 12 vital sign time-series (sampled
  irregularly at 1–6 hour intervals), free-text nursing notes (avg 340 tokens/note,
  3–8 notes per stay), and ICD-10 diagnosis codes. You plan to deploy the model at
  Hargrove first, then St. Aurelius six months later.


  Your team is debating three modeling approaches: (1) a gradient-boosted tree on
  aggregated features, (2) a GRU-based model on the time-series vitals with a separate
  TF-IDF text branch, and (3) a frozen clinical foundation model (ClinicalBERT variant)
  fine-tuned on notes only, late-fused with tabular XGBoost.


  Please provide:


  1. A concrete data-splitting strategy that prevents temporal leakage and supports
  site-generalization evaluation, specifying how to allocate all three sites across
  train/validation/test sets.

  2. A recommendation on which modeling approach (or hybrid) is most appropriate given
  deployment constraints, with justification referencing model complexity, data size,
  and interpretability needs.

  3. A calibration and threshold-selection protocol appropriate for the class imbalance
  and site-specific prevalence differences, including which metrics to report.

  4. A fairness audit plan covering at minimum two protected attributes likely present
  in ICU data, specifying the statistical tests and acceptable disparity thresholds.

  5. A brief TRIPOD+AI checklist gap analysis identifying the three most likely reporting
  deficiencies for this study design.'
