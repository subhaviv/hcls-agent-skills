id: pa-clinical-policy-25
prompt: 'A 58-year-old patient with moderate-to-severe plaque psoriasis (BSA 22%,
  PASI 18.4) has been prescribed secukinumab (Cosentyx) 300mg by their dermatologist.
  The commercial payer''s formulary places secukinumab on Tier 4 (specialty), requiring
  prior authorization with step therapy. The payer''s clinical policy requires:


  1. Documented failure of at least two conventional systemics (methotrexate, cyclosporine,
  or acitretin) at adequate doses for ≥12 weeks each

  2. Failure of one formulary-preferred IL-17 or IL-23 inhibitor (ixekizumab is Tier
  3 preferred)

  3. Contraindication documentation if step therapy is being bypassed


  The patient''s chart shows: methotrexate trial for 14 weeks discontinued due to
  hepatotoxicity (ALT 3x ULN), cyclosporine contraindicated due to uncontrolled hypertension
  (BP 158/96 on three antihypertensives), and the prescribing dermatologist believes
  ixekizumab step therapy should be bypassed because both drugs share the IL-17A mechanism
  and the patient has Crohn''s disease comorbidity (IL-17 inhibitors are generally
  avoided in IBD).


  Please provide:

  1. A clinical necessity analysis assessing whether this case meets, partially meets,
  or fails the payer''s step therapy criteria, citing each requirement

  2. A recommended PA submission strategy identifying which clinical exceptions or
  contraindication pathways apply

  3. A draft peer-to-peer review talking points document the physician can use if
  the initial PA is denied

  4. A sample FHIR Da Vinci PAS ClaimInquiry JSON snippet that captures the step therapy
  exception reason codes and supporting clinical evidence references for this case'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: intermediate
