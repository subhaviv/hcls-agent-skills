id: edc-data-validation-30
prompt: 'You are building an automated SDTM validation pipeline for a Phase III oncology
  trial (STUDY-ONC-2847) with 412 patients across 18 sites. The trial includes SDTM
  domains: DM, AE, CM, LB, VS, EX, and TU (tumor assessment). Your pipeline must handle
  several complex edge cases simultaneously.


  **Specific challenges to address:**


  1. **Partial date imputation**: The AE domain contains 47 records where AESTDTC
  has partial dates (e.g., "2023-05", "2023", or "--05-15"). Define and implement
  the ISO 8601 imputation rules for SDTM submission, including how to populate AESTDTC
  vs. derived timing variables.


  2. **Cross-domain consistency**: AESER="Y" records must have corresponding SAE narratives
  in SUPPAE (QNAM="AENARR"), and any AE with AESDTH="Y" must have a matching record
  in DM where DTHFL="Y" and DTHDTC is not null. Write Python validation code that
  checks both rules and outputs discrepancies with USUBJID and domain context.


  3. **Controlled terminology conflict**: Your LB domain uses local lab units (e.g.,
  "mg/dL", "10^9/L", "U/L") that partially overlap with CDISC CT (LBORRESU vs. LBSTRESU).
  Some values use non-standard synonyms. Write a fuzzy-matching function using CDISC
  LB controlled terminology (CT version 2023-09-29) to flag non-conformant unit values
  with confidence scores.


  4. **TU domain structure**: The tumor assessment domain has TUORRES stored as free
  text (e.g., "Stable Disease", "PR", "Complete Response") requiring mapping to RECIST
  1.1 controlled terminology. Generate the SDTM define.xml `<ValueList>` and `<CodeList>`
  XML fragments for TUORRES with proper annotations.


  Provide complete, executable Python code for items 2 and 3, XML for item 4, and
  written specifications for item 1.'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: hard
