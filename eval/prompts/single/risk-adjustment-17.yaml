id: risk-adjustment-17
prompt: 'Here is test question #17 of 30:


  ---


  You are building a CMS-HCC risk adjustment pipeline for a Medicare Advantage plan
  with 12,000 members. Your claims data shows the following ICD-10 codes appearing
  frequently but with suspected undercoding based on pharmacy and lab proxies:


  **Rx Proxy Signals (members on medication but lacking diagnosis codes):**

  - 847 members on insulin or GLP-1 agonists with no E11.x (Type 2 Diabetes) coded
  in the measurement year

  - 312 members on sacubitril/valsartan (Entresto) with no I50.x (Heart Failure) coded

  - 203 members on rivaroxaban with no I48.x (Atrial Fibrillation) coded


  **Lab Proxy Signals:**

  - 519 members with HbA1c ≥ 8.0% but no diabetes complication HCC (HCC 18, 19) coded
  — only base HCC 19 or nothing at all


  For the CMS-HCC Model V28 (2024), please provide:


  1. **Python code** that takes a member DataFrame with columns `[member_id, rx_list,
  lab_results, icd10_codes]` and flags each member for potential coding gaps using
  the proxy rules above, outputting a prioritized gap list with estimated RAF impact
  per member.


  2. **Hierarchy resolution logic** showing how HCC 17 (Diabetes with Acute Complications),
  HCC 18 (Diabetes with Chronic Complications), and HCC 19 (Diabetes without Complication)
  interact under V28 hierarchy rules, and how your code should suppress lower-specificity
  HCCs when higher ones are present.


  3. **A prioritization formula** ranking gap closure opportunities by expected RAF
  lift × member count × closure probability (assume 60% closure rate for Rx gaps,
  45% for lab gaps).


  ---'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: intermediate
