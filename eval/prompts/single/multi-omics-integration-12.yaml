id: multi-omics-integration-12
prompt: 'You are analyzing a cohort of 85 pediatric leukemia patients with three omics
  layers: bulk RNA-seq (all 85 patients), reverse-phase protein array (RPPA) data
  (all 85 patients), and DNA methylation 450K array data (only 52 of the 85 patients).
  You want to discover latent factors that capture coordinated variation across these
  omics layers to identify patient subgroups and understand the biological drivers
  of heterogeneity.


  A colleague suggests simply concatenating all three data matrices (after imputing
  the missing 33 methylation samples using k-NN) and running PCA. You are considering
  instead using MOFA+ to handle the partial sample overlap natively.


  Please provide the following deliverables:


  1. **Conceptual comparison**: Explain why MOFA+ is preferable to PCA on concatenated/imputed
  data in this scenario, specifically addressing how each approach handles the partial
  methylation overlap and the different scales/noise structures of the three omics
  layers.


  2. **MOFA+ setup in R**: Provide a complete code snippet using the `MOFA2` R package
  to create the MOFA+ object from the three data matrices (name them `rna_mat`, `rppa_mat`,
  `meth_mat`), specifying appropriate data options for Gaussian versus non-Gaussian
  likelihoods and correctly handling the partial sample overlap.


  3. **Factor interpretation**: After training with 15 factors, describe the downstream
  steps you would take to determine which factors are driven primarily by methylation
  versus transcriptomics, and how you would test whether any factor associates with
  patient survival outcome using a Cox proportional hazards model.


  4. **Parameter recommendation**: Recommend a specific value for the minimum number
  of active factors and justify your choice given the cohort size and number of omics
  layers.'
