id: trajectory-analysis-11
prompt: 'Here is test question #11 of 30:


  ---


  I have a single-cell RNA-seq dataset of 8,400 hematopoietic stem and progenitor
  cells (HSPCs) from mouse bone marrow, spanning differentiation from Lin⁻Sca1⁺cKit⁺
  (LSK) stem cells toward the erythroid lineage. After standard preprocessing (highly
  variable genes selected, PCA with 40 components, UMAP embedding), I want to compute
  **diffusion pseudotime (DPT)** using Scanpy to order cells along the erythropoiesis
  trajectory.


  My dataset (`adata`) has cell type annotations in `adata.obs[''cell_type'']` with
  clusters: `[''LSK'', ''CMP'', ''MEP'', ''ProE'', ''BasoE'', ''PolyE'']`. I''ve already
  computed neighbors with `sc.pp.neighbors(adata, n_neighbors=15, n_pcs=40)`.


  Please provide:


  1. **Step-by-step Python code** using Scanpy to: (a) compute the diffusion map,
  (b) set the root cell as the LSK cluster using `iroot`, and (c) run DPT to generate
  pseudotime values stored in `adata.obs[''dpt_pseudotime'']`


  2. **A UMAP visualization** showing cells colored by DPT pseudotime values, with
  a second panel showing cell type annotations side-by-side for comparison


  3. **Brief explanation** of how `iroot` should be selected programmatically from
  the LSK cluster (e.g., using the cell with the highest expression of *Procr* gene
  as the root), and why this biological choice makes sense for erythropoiesis


  4. **One potential pitfall** when the diffusion map has poor separation between
  MEP and CMP clusters, and how to address it by adjusting `n_dcs` parameter'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: easy
