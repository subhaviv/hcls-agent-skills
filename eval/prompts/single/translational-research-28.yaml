id: translational-research-28
prompt: 'Here is test question #28 of 30:


  ---


  You are advising a team developing a small-molecule inhibitor of **KINESIN-7L**
  (a fictional kinase enriched in striatal medium spiny neurons) for Huntington''s
  disease. The preclinical package includes: (1) robust target engagement in R6/2
  mice at 10 mg/kg BID (90% inhibition by PET tracer), (2) 22% improvement in rotarod
  performance vs. vehicle (p=0.003, n=18/group), (3) a 15% reduction in striatal volume
  loss on MRI, and (4) a GWAS hit (rs7741293, OR=1.31, p=4.2×10⁻⁹) in a 6,800-case
  HD modifier study where the risk allele is an eQTL reducing KINESIN-7L expression
  in caudate. However, two complicating factors exist: (a) the eQTL effect *reduces*
  expression yet your drug also *inhibits* the kinase—suggesting the therapeutic hypothesis
  requires loss-of-function to be protective, but the R6/2 model uses transgenic overexpression
  of mutant HTT which may create an artificial dependency on KINESIN-7L upregulation;
  and (b) a published proteomics dataset (n=42 HD caudate post-mortem) shows KINESIN-7L
  protein is actually *downregulated* 40% vs. controls, contradicting the eQTL direction.


  **Deliverables:**

  1. Critically evaluate whether the genetic and proteomic data support or undermine
  the therapeutic hypothesis, applying Mendelian Randomization logic.

  2. Propose a decision framework (go/no-go criteria) for advancing to a Phase 1b
  proof-of-mechanism study, specifying which additional experiments must be completed
  first.

  3. Design the Phase 1b trial (population, dose selection rationale, primary/secondary
  endpoints, biomarker strategy) assuming you decide to advance.

  4. Identify the single most critical experiment to resolve the contradictory evidence
  before IND filing.'
