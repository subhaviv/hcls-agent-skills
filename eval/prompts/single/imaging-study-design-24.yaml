id: imaging-study-design-24
prompt: 'You are coordinating a multi-site diffusion MRI study investigating white
  matter microstructure in early Parkinson''s disease (PD) across four imaging centers
  (Sites A–D). The study enrolled 180 participants (90 PD patients, 90 age-matched
  controls; mean age 67 ± 8 years). Each site used a different 3T scanner: Site A
  (Siemens Prisma, 64-direction DTI, b=1000 s/mm²), Site B (GE Discovery MR750, 32-direction
  DTI, b=1000 s/mm²), Site C (Philips Ingenia, 64-direction DTI, b=2000 s/mm²), and
  Site D (Siemens Skyra, 32-direction DTI, b=1000 s/mm²). Participants were scanned
  at baseline and 18-month follow-up. The primary biomarker is fractional anisotropy
  (FA) in the substantia nigra pars reticulata (SNpr), extracted using a study-specific
  ROI atlas registered to MNI152 space.


  Several issues have emerged: (1) Site C used a different b-value, creating potential
  incompatibility; (2) preliminary FA maps show a systematic site-dependent offset
  of ~0.04 FA units; (3) 23 DICOM files from Site B contain burned-in PHI overlays
  in the corner of diffusion-weighted images; (4) the SNpr ROI is only 180 mm³ in
  MNI space, raising concerns about registration accuracy.


  Please provide:

  1. A recommended preprocessing pipeline addressing the b-value mismatch between
  sites, with specific steps for Site C data harmonization

  2. A ComBat harmonization strategy specifying which covariates to protect and how
  to handle the longitudinal structure

  3. A protocol for identifying and remediating the burned-in PHI in the Site B DICOM
  files, including a pixel-based detection approach

  4. An assessment of whether native-space or MNI-space analysis is preferable for
  the SNpr ROI given its small volume, with justification'
