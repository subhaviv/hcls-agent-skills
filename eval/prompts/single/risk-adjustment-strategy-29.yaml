id: risk-adjustment-strategy-29
prompt: 'A Medicare Advantage plan with 42,000 members is navigating the 2025 payment
  year transition, where CMS applies a blended rate of 33% V28 and 67% V24. Your analytics
  team has identified a cohort of 1,847 members with documented Type 2 diabetes with
  diabetic chronic kidney disease (ICD-10: E11.22), and a separate cohort of 623 members
  with documented heart failure with reduced ejection fraction (ICD-10: I50.20) who
  also carry a diagnosis of hypertensive heart and chronic kidney disease (ICD-10:
  I13.10).


  The challenge: Under V28, CMS restructured several HCC categories, eliminating some
  disease interactions that existed in V24 and introducing new hierarchy rules. Your
  medical director suspects the blended transition is creating unexpected RAF score
  compression for members with multiple cardiorenal comorbidities.


  Please provide the following deliverables:


  1. **HCC Mapping Analysis**: For each ICD-10 code cluster above, identify the specific
  HCC assignments under V24 versus V28, including which disease interaction pairs
  or hierarchy suppressions apply in each model version.


  2. **RAF Impact Quantification**: Using the cohort sizes provided, estimate the
  aggregate RAF score differential between pure V24, pure V28, and the 2025 blended
  calculation. Assume an average member RAF of 1.42 under V24 for these cohorts as
  a baseline.


  3. **Recapture Strategy**: Design a prioritized coding gap intervention workflow
  for these two cohorts, specifying which cohort should receive priority outreach
  and why, including the documentation requirements needed to be audit-defensible
  under CMS guidelines.


  4. **Python Code**: Write a function that accepts a member''s ICD-10 diagnosis list
  and returns their blended 2025 RAF contribution, applying the 33/67 blend logic
  with proper hierarchy resolution.'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: hard
