id: structure-based-drug-design-25
prompt: 'You are optimizing a series of macrocyclic inhibitors targeting the PRMT7
  arginine methyltransferase, which has a relatively shallow and elongated SAM-binding
  groove (pocket volume ~680 Ų, measured by SiteMap with SiteScore 0.82, Dscore 0.78).
  Crystallography has resolved 14 co-crystal structures with fragments and early leads.
  Your best compound (MAC-047) shows IC₅₀ = 340 nM in a biochemical assay but only
  12% cellular target engagement at 10 µM in a NanoBRET assay, suggesting poor cell
  permeability despite cLogP = 2.1 and MW = 687 Da.


  Your team is debating three optimization strategies:

  1. Reduce macrocycle ring size from 18-membered to 14-membered to improve permeability

  2. Introduce an allosteric approach targeting a cryptic pocket observed transiently
  in 3 of the 14 crystal structures (pocket volume ~310 Ų)

  3. Fragment-link two sub-micromolar fragments (Frag-A: 180 Da, LE = 0.42; Frag-B:
  195 Da, LE = 0.38) that bind adjacent sub-pockets with a 4.2 Å gap between their
  exit vectors


  Please provide:

  - A druggability reassessment of both the orthosteric and cryptic allosteric sites
  with specific scoring thresholds

  - A recommended computational workflow (docking + MD + FEP) to evaluate all three
  strategies with justified parameter choices

  - Specific MM-GBSA post-processing protocol for ranking the macrocycle ring-size
  variants

  - A decision framework with go/no-go criteria for selecting which strategy to advance
  to lead optimization, incorporating the NanoBRET data'
target_skills:
- structure-based-drug-design
domain: protein-structure
difficulty: intermediate
