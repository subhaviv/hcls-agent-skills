id: structure-based-drug-design-21
prompt: 'You are designing a virtual screening campaign against a newly resolved crystal
  structure of KRAS G12C (PDB-like entry: 4XYZ, resolution 2.1 Å). The binding pocket
  of interest is the Switch II Pocket (S-IIP), which has been measured with the following
  properties: volume = 580 Ų, hydrophobicity score = 0.72 (scale 0–1), druggability
  score (DoGSiteScorer) = 0.78, and contains a catalytic cysteine residue (Cys12)
  that can form covalent bonds.


  Your compound library contains 2.4 million drug-like molecules from the Enamine
  REAL database, pre-filtered to Lipinski''s Rule of Five. You have access to Glide
  SP, Glide XP, AutoDock Vina, and MM-GBSA rescoring. Computational resources allow
  roughly 500,000 docking runs per day.


  Given this scenario, please provide:


  1. A recommended step-by-step virtual screening cascade (at least 4 stages) that
  efficiently narrows 2.4 million compounds to approximately 200 candidates for experimental
  testing, specifying which docking tool to use at each stage and why.


  2. An assessment of whether standard non-covalent docking is appropriate here or
  whether covalent docking should be incorporated, with a brief justification referencing
  the pocket properties.


  3. The most appropriate scoring function strategy for final hit selection (e.g.,
  Glide XP vs. MM-GBSA), including a rationale based on the pocket''s druggability
  score and volume.


  4. Two key structural filters (beyond Lipinski RO5) you would apply early in the
  cascade to enrich for genuine S-IIP binders, with chemical reasoning for each filter.'
