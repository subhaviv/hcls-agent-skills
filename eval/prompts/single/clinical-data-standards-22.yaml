id: clinical-data-standards-22
prompt: 'A pharmaceutical company is preparing an adverse event frequency table for
  a Phase III clinical trial submission. The safety database contains the following
  coded adverse events (already coded to MedDRA v26.0 Preferred Terms) observed in
  the treatment arm (n=450 patients):


  - Nausea: 87 patients

  - Vomiting: 64 patients

  - Diarrhoea: 41 patients

  - Headache: 53 patients

  - Dizziness: 38 patients

  - Fatigue: 72 patients

  - Asthenia: 29 patients

  - Upper respiratory tract infection: 45 patients

  - Nasopharyngitis: 33 patients

  - Alanine aminotransferase increased: 22 patients

  - Aspartate aminotransferase increased: 18 patients


  The regulatory team needs to present this data in a standard SOC-level summary table
  for the Clinical Study Report.


  Please provide the following:

  1. Assign each Preferred Term to its correct MedDRA System Organ Class (SOC), identifying
  the primary SOC for any PT that could theoretically appear under multiple SOCs.

  2. Calculate the number of patients with at least one AE per SOC (note that patients
  may have multiple PTs within the same SOC, so explain how to handle patient-level
  deduplication).

  3. Identify which two PTs in this list belong to the same High Level Term (HLT),
  and name that HLT.

  4. Explain why "Fatigue" and "Asthenia" should NOT simply be added together when
  reporting SOC-level patient counts.'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: easy
