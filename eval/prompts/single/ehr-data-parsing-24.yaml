id: ehr-data-parsing-24
prompt: 'You are building a clinical data pipeline that receives HL7v2 ORU^R01 messages
  from a laboratory information system and needs to extract lab results for downstream
  analytics. The following sample message represents a lipid panel result:


  ```

  MSH|^~\&|LAB_SYS|CITY_HOSP|EHR_APP|CITY_HOSP|20231105143022||ORU^R01|MSG004521|P|2.5

  PID|1||PT-88821^^^CITY_HOSP^MR||Kowalski^Dmitri^A||19780314|M|||742 Oak Lane^^Springfield^IL^62704

  OBR|1|ORD-5521|LAB-9921|80061^Lipid Panel^CPT|||20231105130000

  OBX|1|NM|2093-3^Cholesterol^LN||215|mg/dL|<200|H|||F

  OBX|2|NM|2085-9^HDL Cholesterol^LN||38|mg/dL|>40|L|||F

  OBX|3|NM|13457-7^LDL Cholesterol^LN||148|mg/dL|<100|H|||F

  OBX|4|NM|2571-8^Triglycerides^LN||182|mg/dL|<150|H|||F

  ```


  Please provide the following deliverables:


  1. A Python function `parse_oru_message(raw_hl7: str) -> dict` that extracts patient
  demographics from the PID segment and all OBX lab results into a structured dictionary,
  including the test name, value, units, reference range, and abnormal flag.


  2. A function `oru_to_dataframe(raw_hl7: str) -> pd.DataFrame` that returns a flattened
  pandas DataFrame where each row represents one OBX observation, with columns for
  patient ID, patient name, date of birth, test LOINC code, test name, numeric value,
  units, reference range, abnormal flag, and result status.


  3. A data quality check function `validate_oru_extract(df: pd.DataFrame) -> dict`
  that verifies no null values exist in critical fields, numeric values are within
  physiologically plausible ranges (cholesterol 50–500, HDL 10–150, LDL 10–300, triglycerides
  20–1000, all in mg/dL), and returns a summary report with pass/fail status per check.'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: intermediate
