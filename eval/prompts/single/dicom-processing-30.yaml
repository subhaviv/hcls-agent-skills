id: dicom-processing-30
prompt: 'A research team at Meridian Medical Center is processing a large neuroimaging
  dataset of 847 subjects for a longitudinal study. They''re using dcm2niix (v1.0.20230411)
  to convert DICOM series to NIfTI format, but are encountering several edge cases
  that are breaking their automated pipeline.


  **Specific problems observed:**


  1. **Interleaved slice ordering**: 23 subjects have fMRI series where dcm2niix produces
  NIfTI files with incorrect slice timing metadata in the `.json` sidecar. The DICOM
  tag `(0020,1041)` (Slice Location) shows non-monotonic ordering, and the `SliceTiming`
  field in the output JSON is either missing or contains uniform values.


  2. **Multi-echo sequences**: 15 subjects have multi-echo MPRAGE acquisitions where
  dcm2niix splits outputs into unexpected numbers of files (sometimes 3, sometimes
  5 files per series) instead of the expected 4 echo files. The `EchoNumber` DICOM
  tag `(0018,0086)` appears correctly set.


  3. **Burned-in PHI in pixel data**: A subset of 31 scout/localizer DICOMs contain
  burned-in patient name and DOB overlaid on the image pixels, which standard pydicom
  header scrubbing won''t catch.


  **Deliverables requested:**


  - Write a Python script using pydicom and subprocess to validate slice timing extraction
  from DICOM headers before conversion, correcting the `.json` sidecar post-hoc if
  needed

  - Explain the likely cause of the multi-echo file splitting inconsistency and provide
  dcm2niix flags or a pydicom-based pre-processing step to resolve it

  - Describe a practical detection and mitigation strategy for burned-in PHI using
  pixel-level analysis (provide pseudocode or actual code using a library of your
  choice)

  - Ensure all outputs remain BIDS-compliant'
target_skills:
- dicom-processing
domain: imaging
difficulty: hard
