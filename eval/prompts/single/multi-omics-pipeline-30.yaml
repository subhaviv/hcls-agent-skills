id: multi-omics-pipeline-30
prompt: 'You are integrating multi-omics data from a pan-cancer study involving 847
  tumor samples across three cohorts (TCGA-BRCA n=312, TCGA-LUAD n=289, TCGA-COAD
  n=246). You have RNA-seq raw counts, DNA methylation M-values (450K array), and
  reverse-phase protein array (RPPA) normalized intensities for all samples. Initial
  MOFA2 analysis revealed 8 latent factors, but Factor 3 (explaining 12.4% variance)
  shows suspicious correlation (r=0.81) with sequencing batch rather than biology,
  while Factor 6 correlates strongly with tumor purity estimates (r=0.74).


  Your RPPA data contains 258 proteins mapped to gene symbols, but 34 of these symbols
  are outdated HGNC aliases (e.g., "CDC2" instead of "CDK1", "FRAP1" instead of "MTOR")
  that fail to harmonize with the Ensembl-based RNA-seq features. Additionally, the
  methylation data has CpG probes that need mapping to gene promoter regions (±2kb
  from TSS) using Ensembl gene coordinates.


  Provide: (1) R code using biomaRt to resolve the 34 outdated HGNC aliases to current
  approved symbols and cross-reference with Ensembl IDs, handling cases where aliases
  map to multiple current symbols; (2) a ComBat-seq strategy for the RNA-seq counts
  that accounts for cohort as batch while preserving tumor-type as a biological covariate,
  including how to handle the 23 samples flagged as cross-cohort batch outliers; (3)
  MOFA2 retraining code that excludes or regresses out the purity-correlated factor
  before downstream pathway analysis; and (4) fgsea R code to run pathway enrichment
  on the top weighted genes from the corrected Factor 3, using MSigDB Hallmark gene
  sets, with appropriate handling of the multi-omics weight matrix.'
