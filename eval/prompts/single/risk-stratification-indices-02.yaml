id: risk-stratification-indices-02
prompt: 'A community hospital''s care management team is reviewing 30-day readmission
  risk for a cohort of 847 recently discharged patients. The team has complete data
  available for calculating LACE scores (Length of stay, Acuity of admission, Charlson
  Comorbidity Index, and Emergency department visits in the past 6 months).


  The cohort breakdown is as follows:

  - 312 patients with LACE scores 0–4 (low risk)

  - 389 patients with LACE scores 5–9 (moderate risk)

  - 146 patients with LACE scores 10+ (high risk)


  The care management team has capacity to actively follow up with only 200 patients
  post-discharge due to staffing constraints.


  Please provide the following deliverables:


  1. **Score interpretation**: Briefly explain what each LACE score tier (low, moderate,
  high) represents clinically in terms of 30-day readmission probability.


  2. **Prioritization recommendation**: Given the staffing constraint of 200 follow-up
  slots, recommend how the team should allocate those slots across the three risk
  tiers, with clear rationale.


  3. **Charlson component clarification**: The team is unsure whether to use the original
  Charlson Comorbidity Index or the updated Charlson Comorbidity Index (Quan adaptation)
  when calculating the "C" component of LACE. Explain the key differences and which
  version is preferred for this use case.


  4. **Threshold logic (pseudocode)**: Write simple pseudocode that takes a patient''s
  LACE score as input and outputs a recommended care management action (e.g., "routine
  discharge," "phone follow-up within 72 hours," "home visit within 48 hours").'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: easy
