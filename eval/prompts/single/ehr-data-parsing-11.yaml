id: ehr-data-parsing-11
prompt: 'Here is test question #11 of 30:


  ---


  You have received a batch of HL7v2 ORU^R01 messages from a laboratory information
  system containing CBC (Complete Blood Count) results for patients. Below is a representative
  sample message:


  ```

  MSH|^~\&|LAB|HOSP|EHR|HOSP|20240315143022||ORU^R01|MSG00042|P|2.5

  PID|1||PT-88421^^^HOSP^MR||Nguyen^Linh^T||19850704|F|||123 Maple St^^Chicago^IL^60601

  OBR|1|ORD-5521|LAB-9931|58410-2^CBC panel^LN|||20240315140500

  OBX|1|NM|6690-2^WBC^LN||7.2|10*3/uL|4.5-11.0|N|||F

  OBX|2|NM|789-8^RBC^LN||4.85|10*6/uL|4.20-5.40|N|||F

  OBX|3|NM|718-7^Hemoglobin^LN||13.1|g/dL|12.0-16.0|N|||F

  OBX|4|NM|4544-3^Hematocrit^LN||39.5|%|37.0-47.0|N|||F

  OBX|5|NM|777-3^Platelets^LN||142|10*3/uL|150-400|L|||F

  ```


  Your task is to:

  1. Write a Python function `parse_oru_to_dataframe(hl7_text: str) -> pd.DataFrame`
  that parses one or more such ORU^R01 messages and returns a flat pandas DataFrame
  with columns: `patient_id`, `patient_name`, `dob`, `gender`, `test_code`, `test_name`,
  `value`, `units`, `reference_range`, and `abnormal_flag`.

  2. Add a data quality check function `flag_quality_issues(df: pd.DataFrame) -> pd.DataFrame`
  that appends a `quality_issues` column identifying rows where the value is non-numeric,
  units are missing, or the abnormal flag is `L` or `H`.

  3. Demonstrate both functions using the sample message above and print the resulting
  DataFrame.


  Do not use the `hl7` third-party library — parse using only Python standard library
  string operations.'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: easy
