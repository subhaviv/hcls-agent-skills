id: edc-data-validation-13
prompt: 'You are working as a clinical data manager on a Phase II oncology trial (Study
  XYZ-202) with 85 enrolled patients. Your EDC system (Medidata Rave) has exported
  a CSV file containing vital signs data with the following columns: `USUBJID`, `VISIT`,
  `VSTEST` (test name), `VSORRES` (original result), `VSORRESU` (original unit), `VSDTC`
  (date/time of collection).


  The vital signs collected include Systolic Blood Pressure (mmHg), Diastolic Blood
  Pressure (mmHg), Heart Rate (bpm), Temperature (°C), and Weight (kg).


  You need to implement automated range checks using the following clinically acceptable
  ranges:

  - Systolic BP: 70–200 mmHg

  - Diastolic BP: 40–120 mmHg

  - Heart Rate: 40–150 bpm

  - Temperature: 35.0–41.0 °C

  - Weight: 30–250 kg


  Additionally, you must enforce a cross-form consistency rule: Diastolic BP must
  always be strictly less than Systolic BP for the same subject at the same visit.


  Please provide the following deliverables:


  1. **Python code** that reads the CSV export, performs all five range checks, and
  flags the cross-form consistency rule violation between Systolic and Diastolic BP.

  2. **A prioritized validation report** (as a pandas DataFrame output) that categorizes
  each finding as "Critical" (cross-form inconsistency) or "Warning" (out-of-range
  value), including columns for `USUBJID`, `VISIT`, `VSTEST`, `VSORRES`, `Issue_Type`,
  and `Description`.

  3. **Brief explanation** (3–5 sentences) of how you would handle partial or missing
  `VSDTC` dates in the validation pipeline without discarding the entire record.'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: easy
