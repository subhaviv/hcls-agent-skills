id: multi-omics-integration-29
prompt: 'You are analyzing a rare pediatric brain tumor cohort (n=47 patients) with
  four omics layers: whole-genome methylation arrays (850K CpG sites), RNA-seq (18,432
  genes after filtering), reverse-phase protein arrays (RPPA, 217 proteins), and targeted
  metabolomics (312 metabolites via LC-MS). The study has severe partial overlap:
  all 47 patients have methylation and RNA-seq data, only 31 have RPPA data, and only
  22 have metabolomics — with only 14 patients having all four layers simultaneously.
  Clinical outcome is overall survival (continuous) with 19 events observed.


  You want to identify multi-omic factors associated with survival, but face several
  challenges: (1) the methylation layer has 850K features requiring aggressive dimensionality
  reduction before any integration; (2) RPPA data shows a strong batch effect across
  two collection sites (site A: n=18, site B: n=13 for RPPA-profiled patients); (3)
  the metabolomics data is right-skewed with many near-zero values (>40% of features
  below detection threshold in >50% of samples).


  Please provide:

  1. A complete integration strategy justifying your choice of early, intermediate,
  or late fusion given the partial overlap pattern, and whether MOFA+ or an alternative
  method is more appropriate here

  2. A step-by-step preprocessing pipeline for each omics layer, including specific
  dimensionality reduction for methylation, batch correction approach for RPPA, and
  transformation strategy for metabolomics

  3. Python pseudocode (using mofapy2 or your recommended framework) implementing
  the integration with missing data handling

  4. A statistical framework for associating derived multi-omic factors with survival
  given the small event count (n=19), including correction for multiple testing

  5. Key failure modes specific to this dataset and how you would detect them'
target_skills:
- multi-omics-integration
domain: multi-omics
difficulty: hard
