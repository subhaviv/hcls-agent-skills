id: structure-based-drug-design-27
prompt: 'You are optimizing a series of covalent inhibitors targeting KRASG12C for
  a lung adenocarcinoma program. Your lead compound **KRX-447** binds covalently to
  Cys12 in the Switch II pocket (S-IIP) and shows promising biochemical IC50 of 12
  nM, but cellular potency (NCI-H358 viability EC50) is only 890 nM — a 74-fold disconnect.
  Co-crystal structure (PDB internal code 7ZXQ) reveals the warhead (acrylamide) is
  positioned 3.8 Å from Cys12 sulfur, the naphthyl core makes hydrophobic contacts
  with His95/Tyr96, and a morpholine solubilizing group projects into bulk solvent.
  MD simulations (100 ns, AMBER ff19SB) show the Switch I loop (residues 25–40) samples
  two conformations: open (62% occupancy) and closed (38% occupancy), with the closed
  state sterically clashing with the morpholine group.


  **Deliverables requested:**


  1. Explain the likely structural basis for the biochemical-to-cellular potency disconnect,
  considering both covalent warhead geometry and conformational dynamics.


  2. Propose three distinct chemical modifications to KRX-447 (with structural rationale
  for each) that could improve cellular potency without sacrificing covalent efficiency.


  3. Design an FEP or MM-GBSA calculation workflow to prioritize these three analogs
  before synthesis, specifying which conformational state(s) of Switch I to use as
  input, how to handle the covalent bond in the simulation, and appropriate controls.


  4. Identify one potential resistance mechanism at the structural level and suggest
  a follow-up experiment to detect it.'
