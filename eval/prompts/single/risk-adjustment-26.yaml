id: risk-adjustment-26
prompt: 'You are building a CMS-HCC Model V28 risk adjustment pipeline for a Medicare
  Advantage plan with 12,000 members. Your data team has extracted the following member
  snapshot for a 68-year-old female member (Member ID: MA-004471):


  **Active Medications (Rx proxy signals):**

  - Insulin glargine (long-acting insulin)

  - Metformin 1000mg BID

  - Lisinopril 10mg daily

  - Furosemide 40mg daily

  - Carvedilol 6.25mg BID

  - Warfarin 5mg daily


  **Recent Lab Results:**

  - HbA1c: 9.2% (last 90 days)

  - eGFR: 38 mL/min/1.73m² (last 60 days)

  - BNP: 820 pg/mL (last 30 days)

  - INR therapeutic range maintained


  **Confirmed ICD-10 codes on file (current plan year):**

  - E11.9 (Type 2 diabetes without complications)

  - I10 (Essential hypertension)


  Given this scenario, please provide the following deliverables:


  1. **Gap Analysis**: Identify all likely HCC coding gaps suggested by the Rx and
  lab proxies, mapping each gap to its corresponding HCC category under CMS-HCC V28.


  2. **Hierarchy Resolution**: For any HCCs identified, apply V28 disease hierarchy
  rules and determine which HCCs would be suppressed versus counted in the final RAF
  calculation.


  3. **RAF Score Projection**: Calculate the projected RAF score delta (before vs.
  after gap closure) using V28 community non-dual aged coefficients, showing your
  coefficient arithmetic step by step.


  4. **Python Code**: Write a reusable Python function `resolve_hcc_hierarchy(hcc_list:
  list[int]) -> list[int]` that accepts a raw list of HCC codes and returns the hierarchy-resolved
  list per V28 rules, including at minimum the hierarchies relevant to this member''s
  conditions.'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: intermediate
