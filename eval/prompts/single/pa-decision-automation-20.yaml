id: pa-decision-automation-20
prompt: 'Here is test question #20 of 30:


  ---


  Your health plan processes approximately 4,200 prior authorization requests per
  month for specialty biologics (adalimumab, ustekinumab, secukinumab) treating psoriatic
  conditions. Your ML-based PA classifier achieves 87% overall accuracy, but SHAP
  analysis reveals that the feature `step_therapy_documented` contributes a SHAP value
  of +2.31 (strongly pushing toward approval) even when the underlying documentation
  is a templated phrase like "patient tried and failed methotrexate" with no dates,
  dosages, or clinical notes attached. Meanwhile, legitimate step therapy documentation
  with lab values and titration records produces nearly identical SHAP values (+2.28).
  Your denial rate for this drug class is 34%, but on appeal, 61% of those denials
  are overturned — suggesting the model is miscalibrated on documentation quality
  signals.


  Your clinical informatics team has extracted the following features from FHIR PAS
  bundles: `step_therapy_documented` (boolean), `icd10_code`, `bmi`, `prior_auth_history_count`,
  `prescriber_specialty`, `lab_crp_value`, `dermatology_consult_present`, and `days_since_diagnosis`.


  Please provide: (1) a Python function that parses the `step_therapy_documented`
  field from a FHIR PAS Bundle and replaces the boolean with a quality-scored ordinal
  (0–3) based on presence of dates, dosages, clinical outcome language, and lab references;
  (2) a retraining strategy that incorporates this new ordinal feature while avoiding
  label leakage from appeal outcomes; (3) a SHAP interaction analysis design to detect
  whether `step_therapy_documented` quality is confounded with `prescriber_specialty`;
  and (4) a business rule guardrail that prevents auto-approval when documentation
  quality score is below 2, regardless of model confidence.'
