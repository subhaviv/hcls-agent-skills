id: rwd-cohort-analysis-12
prompt: 'Here is test question #12 of 30:


  ---


  You are analyzing a claims database of 45,000 patients newly diagnosed with atrial
  fibrillation (ICD-10: I48.0, I48.1, I48.2, I48.11, I48.19) between January 2018
  and December 2020. You want to compare time-to-first-stroke (ICD-10: I63.x) between
  patients initiated on apixaban (NDC prefix: 59148-) versus warfarin (NDC prefix:
  00056-) within 30 days of AF diagnosis.


  **Your tasks:**


  1. **Cohort identification**: Write Python/pandas pseudocode to identify the treatment
  cohorts, applying the following inclusion/exclusion criteria: age 18–85, no prior
  stroke in the 12-month baseline period, no prior anticoagulant use in the 6-month
  baseline period, and continuous enrollment for at least 6 months pre-index and 3
  months post-index.


  2. **Propensity score matching**: Estimate a propensity score logistic regression
  using age, sex, CCI score, hypertension (I10), diabetes (E11.x), and heart failure
  (I50.x) as covariates. Match 1:1 using nearest-neighbor matching with caliper =
  0.02. Report the pre- and post-match standardized mean differences (SMD) for each
  covariate, flagging any SMD > 0.1 as imbalanced.


  3. **Survival analysis**: Using the matched cohort of approximately 8,200 pairs,
  generate a Kaplan-Meier survival curve comparing stroke-free survival between the
  two groups. Then fit a Cox proportional hazards model and report the hazard ratio
  with 95% CI. Test the proportional hazards assumption using Schoenfeld residuals
  and describe what to do if the assumption is violated.


  Provide working Python code using `lifelines` and `sklearn` libraries throughout.'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: easy
