id: risk-stratification-indices-21
prompt: 'A community hospital''s care management team is reviewing their 30-day readmission
  reduction program. They have pulled data on 500 recently discharged patients and
  want to use the LACE Index to prioritize outreach. The team has the following aggregate
  data available:


  - 120 patients had a length of stay (L) of 1–2 days

  - 210 patients had a length of stay of 3–6 days

  - 170 patients had a length of stay of 7+ days

  - 340 patients were admitted acutely (A = 3 points); 160 were non-acute

  - Comorbidity (C) scores via Charlson Comorbidity Index ranged: 180 patients scored
  0, 195 scored 1–2, 125 scored 3+

  - Emergency department visits in prior 6 months (E): 250 patients had 0 visits,
  150 had 1 visit, 100 had 2+ visits


  The team wants to establish a high-risk cutoff threshold and create tiered intervention
  groups.


  Please provide the following:

  1. A brief explanation of how each LACE component is scored (L, A, C, E) with point
  values

  2. An example LACE score calculation for a patient with a 5-day acute admission,
  Charlson score of 2, and 1 prior ED visit

  3. The standard high-risk threshold for LACE and what it means clinically

  4. A recommended three-tier stratification scheme (low/medium/high risk) with suggested
  interventions for each tier

  5. One key limitation of using LACE alone for this population and a suggestion for
  how to supplement it'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: easy
