id: quantitative-proteomics-22
prompt: 'You are analyzing a label-free quantification (LFQ) proteomics dataset from
  MaxQuant, comparing tumor versus adjacent normal tissue in 8 colorectal cancer patients
  (8 tumor + 8 normal, 16 samples total). After loading the `proteinGroups.txt` file
  into R, you observe the following characteristics:


  - Total protein groups detected: 4,312

  - Proteins with complete data across all 16 samples: 2,847 (66%)

  - Proteins missing in ≥50% of samples in one condition but present in the other:
  387 proteins

  - Proteins with random scattered missingness (<30% missing, no condition pattern):
  1,078 proteins

  - LFQ intensity values have already been log2-transformed


  You need to perform differential expression analysis using `limma` after appropriate
  imputation and normalization.


  **Please provide:**


  1. A brief explanation of why the 387 proteins with condition-dependent missingness
  require a different imputation strategy than the 1,078 randomly missing proteins,
  naming the specific missingness mechanisms (MNAR vs. MCAR) involved.


  2. Recommended imputation methods for each missingness category, with justification
  (choose from: MinProb, QRILC, kNN, or mean imputation).


  3. R code that: (a) separates the two missingness categories, (b) applies the appropriate
  imputation method to each group using the `imputeLCMD` or `impute` package, and
  (c) recombines them into a single matrix.


  4. A one-paragraph recommendation on whether to apply median centering or quantile
  normalization to this dataset after imputation, given that you expect true biological
  differences between tumor and normal tissue to affect a substantial fraction of
  the proteome.'
target_skills:
- quantitative-proteomics
domain: proteomics
difficulty: easy
