id: hedis-measure-specification-01
prompt: 'A regional health plan is preparing for its annual HEDIS measurement year
  and needs to evaluate member eligibility for the **Breast Cancer Screening (BCS)**
  measure. The plan has pulled the following member data snapshot:


  - **Total female members aged 50–74:** 4,200

  - **Members enrolled continuously for the measurement year (Jan 1–Dec 31):** 3,650

  - **Members with a 45-day enrollment gap in March–April:** 310

  - **Members who had a bilateral mastectomy on record:** 85

  - **Members who enrolled via Medicare:** 140

  - **Members with evidence of a mammogram in the past 27 months:** 1,890


  Using NCQA''s official HEDIS BCS measure specification, please provide the following
  deliverables:


  1. **Denominator calculation:** Walk through the step-by-step logic to determine
  which members qualify for the denominator, applying the continuous enrollment rule
  and allowable gap criteria correctly.


  2. **Exclusion evaluation:** Identify which member segments above are eligible for
  exclusion from the denominator and explain the NCQA specification rationale for
  each exclusion type.


  3. **Numerator identification:** Based on the data provided, calculate the numerator
  count and the resulting BCS rate.


  4. **Care gap count:** Determine how many members remain in the care gap (denominator
  minus numerator).


  5. **One prioritization recommendation:** Given that BCS is a Star Rating measure,
  briefly recommend one evidence-based outreach strategy to close care gaps for this
  population.


  Show all arithmetic clearly and cite the specific HEDIS BCS measure rules you are
  applying.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: easy
