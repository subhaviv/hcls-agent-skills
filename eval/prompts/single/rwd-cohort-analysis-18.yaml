id: rwd-cohort-analysis-18
prompt: 'You are conducting a retrospective cohort study using commercial claims data
  (2018–2022) to compare cardiovascular outcomes between patients initiating SGLT2
  inhibitors (n=14,847) versus DPP-4 inhibitors (n=22,391) for type 2 diabetes management.
  The primary endpoint is 3-point MACE (MI, stroke, or cardiovascular death), identified
  via ICD-10 codes I21.x, I63.x, and I46.x respectively.


  After running 1:1 propensity score matching on 42 covariates (demographics, comorbidities,
  prior medications, healthcare utilization), you achieve a matched cohort of 11,203
  pairs. However, your SMD diagnostics reveal that 6 variables remain imbalanced (SMD
  > 0.10) post-matching: HbA1c proxy (SMD=0.14), prior hospitalization count (SMD=0.18),
  insulin use (SMD=0.13), eGFR category (SMD=0.12), baseline statin use (SMD=0.11),
  and atrial fibrillation (SMD=0.15).


  Additionally, your Schoenfeld residuals test returns a statistically significant
  p-value of 0.003 for the treatment variable, suggesting violation of the proportional
  hazards assumption. Visual inspection of log-log survival curves shows crossing
  around month 18.


  Please provide: (1) Python code implementing an augmented inverse probability weighting
  (AIPW) estimator as an alternative to PS matching to address residual confounding,
  including doubly-robust confidence intervals; (2) a strategy to handle the non-proportional
  hazards violation using time-split Cox models with the appropriate cutpoint at month
  18, including the R or Python implementation; (3) a sensitivity analysis plan using
  E-values to quantify unmeasured confounding thresholds; and (4) clinical interpretation
  guidance for reporting these methodological complications in a regulatory-grade
  real-world evidence submission.'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: hard
