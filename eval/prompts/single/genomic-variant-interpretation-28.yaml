id: genomic-variant-interpretation-28
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory identifies the following variant
  in **BRCA2**: NM_000059.4:c.8754+3A>G (intronic, 3 bp from the canonical splice
  donor of exon 21).


  Available evidence:

  - **SpliceAI scores**: Donor loss = 0.61, Acceptor loss = 0.02, Donor gain = 0.08,
  Acceptor gain = 0.03

  - **CADD score**: 24.1

  - **gnomAD v3.1 allele frequency**: 0.000031 (7 heterozygotes, 0 homozygotes; popmax
  0.000089 in non-Finnish European)

  - **ClinVar**: 2 submissions — one "Uncertain Significance" (single submitter, no
  evidence provided) and one "Likely Pathogenic" (clinical lab, cited RNA studies
  showing ~40% reduction in full-length transcript with partial exon 21 skipping)

  - **RNA functional study** (published, peer-reviewed): demonstrates partial exon
  skipping producing an in-frame deletion removing 14 amino acids from the DNA-binding
  domain; residual wild-type transcript present at ~60%

  - **Family segregation**: variant present in 2 affected relatives (mother with ovarian
  cancer, maternal aunt with breast cancer), absent in 1 unaffected sibling (LOD score
  contribution insufficient alone)


  **Deliverables:**

  1. Apply ACMG/AMP 2015 criteria systematically, specifying which criteria are met
  (with strength levels), which are explicitly NOT met, and why

  2. Evaluate whether PVS1 applies given the partial/hypomorphic nature of the splice
  effect and the in-frame outcome

  3. Resolve the conflicting ClinVar submissions using the available evidence hierarchy

  4. Provide a final classification with clinical reporting recommendation

  5. Identify one additional piece of evidence that would most efficiently upgrade
  or downgrade this classification'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: hard
