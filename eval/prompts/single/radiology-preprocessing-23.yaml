id: radiology-preprocessing-23
prompt: 'You are setting up a standard T1-weighted MRI preprocessing pipeline for
  a neuroimaging study involving 45 healthy adult volunteers (ages 25-55, 23 female).
  All scans were acquired on a 3T Siemens Prisma scanner with the following parameters:
  TR=2300ms, TE=2.98ms, TI=900ms, flip angle=9°, voxel size=1mm isotropic, FOV=256×256×176mm.


  Your preprocessing pipeline needs to accomplish the following steps in the correct
  order: (1) reorientation to standard space, (2) bias field correction, (3) skull
  stripping, and (4) registration to MNI152 standard space (1mm template).


  **Please provide:**


  1. **Ordered pipeline steps** with a brief justification for why each step must
  occur in this specific sequence (e.g., why bias correction should precede skull
  stripping).


  2. **FSL-based bash script** implementing the full pipeline for a single subject,
  using `fslreorient2std`, `N4BiasFieldCorrection` (ANTs), `bet` with appropriate
  parameters for T1w data (provide specific `-f` and `-g` flags you would recommend),
  and `flirt` followed by `fnirt` for nonlinear MNI registration. Include proper file
  naming conventions.


  3. **Quality control checkpoints** — identify two specific stages where visual QC
  is most critical and describe what failure modes to look for at each stage.


  4. **Parameter recommendation**: The BET skull stripping is producing over-aggressive
  stripping on 8 out of 45 subjects (losing temporal lobe tissue). Suggest a concrete
  parameter adjustment and an alternative tool/approach if BET continues to fail.'
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: easy
