id: pa-decision-automation-12
prompt: 'A regional health plan processes approximately 8,400 prior authorization
  requests per month across musculoskeletal, oncology, and behavioral health service
  lines. Their PA operations team has extracted a CSV dataset of 50,000 historical
  PA decisions (spanning 24 months) with the following columns: `request_id`, `service_line`,
  `procedure_code`, `diagnosis_codes` (pipe-delimited), `requesting_provider_npi`,
  `member_age`, `member_gender`, `clinical_notes_length`, `prior_treatment_documented`
  (boolean), `specialist_referral_present` (boolean), `decision` (approved/denied/pended),
  and `decision_turnaround_hours`.


  The team wants to build a simple rules-based PA decision engine as a first step
  before moving to ML. Their clinical policy team has identified three initial criteria
  for musculoskeletal PA approvals: (1) procedure codes in range 27096–27299, (2)
  at least one ICD-10 diagnosis code beginning with "M" present, and (3) `prior_treatment_documented`
  equals True.


  Please provide the following deliverables:


  1. **Python code** implementing a rules-based decision engine function that accepts
  a single PA request as a dictionary and returns "approved", "denied", or "pended"
  based on the three musculoskeletal criteria above, including a fallback to "pended"
  for any request not matching the service line or missing required fields.


  2. **Pandas code** to apply this function across the full 50,000-record DataFrame
  and compute approval, denial, and pend rates broken down by service line.


  3. **A brief explanation** (3–5 sentences) of how this rules engine output could
  serve as a baseline benchmark when later training an ML classifier on the same historical
  dataset, including one specific metric to compare the two approaches.'
target_skills:
- pa-decision-automation
domain: healthcare-ops
difficulty: easy
