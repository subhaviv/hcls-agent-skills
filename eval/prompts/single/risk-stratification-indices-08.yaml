id: risk-stratification-indices-08
prompt: 'A regional health system is evaluating 30-day readmission risk for 4,200
  Medicare Advantage patients discharged from three hospitals over a 6-month period.
  Your analytics team has computed both LACE scores and Charlson Comorbidity Index
  (CCI) scores for each patient. Preliminary analysis shows a surprising divergence:
  847 patients score "high risk" (LACE ≥ 10) but "low comorbidity burden" (CCI ≤ 2),
  while 612 patients show the inverse pattern (LACE < 7, CCI ≥ 5). Actual 30-day readmission
  rates in these discordant groups are 18.3% and 22.7%, respectively.


  Additionally, the system has Area Deprivation Index (ADI) decile scores for all
  patients, and 31% of the cohort has at least one SDOH Z-code documented (Z59.x,
  Z60.x, Z62.x). Internal stakeholders are debating whether to adopt a composite stratification
  approach or simply default to whichever single index performs better on AUC.


  Please provide:

  1. A clinical and methodological explanation for why these two patient subgroups
  show score divergence despite similar or higher-than-expected readmission rates

  2. A recommendation on whether to use LACE, CCI, a composite, or an alternative
  index (e.g., Elixhauser) as the primary stratification tool for this population,
  with explicit justification referencing the limitations of each

  3. A proposed weighting schema that incorporates ADI decile scores and SDOH Z-code
  burden into a composite risk score, including how you would handle patients missing
  ADI data (approximately 9% of the cohort)

  4. Pseudocode for a risk-tiering algorithm that outputs Low/Medium/High/Very High
  categories using the composite score, with suggested intervention thresholds for
  each tier'
target_skills:
