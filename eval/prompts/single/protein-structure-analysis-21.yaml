id: protein-structure-analysis-21
prompt: 'You have downloaded the crystal structure of a fictional kinase "KIN7" from
  the PDB (accession: 7KIN), which contains a single chain (Chain A, 287 residues)
  with resolution 2.1 Å. After initial inspection, you notice the structure has 14
  residues in the "disallowed" region of the Ramachandran plot according to the PDB
  validation report, concentrated between residues 120–145 (the activation loop).
  You also have a homology model of a mutant form (G134V/S141F double mutant) generated
  by MODELLER, saved as `kin7_mutant.pdb`.


  Your tasks are:


  1. **Write Python code using Biopython** to parse both structures, extract phi/psi
  dihedral angles for all residues in Chain A, and identify which residues fall outside
  the "core allowed" regions (phi/psi combinations where |phi| > 60° AND psi < -120°
  OR psi > 120° simultaneously counts as suspect — use this simplified criterion).


  2. **Compute the Cα RMSD** between the wild-type (7KIN Chain A) and the mutant model
  after structural superposition, reporting both the global RMSD and the local RMSD
  restricted to residues 120–145 of the activation loop.


  3. **Interpret the results**: If the local activation loop RMSD exceeds 2.5 Å, what
  does this suggest about the structural impact of the G134V/S141F mutations, and
  how might this affect downstream docking studies targeting the ATP-binding pocket
  (residues 55–80)?


  Provide complete, runnable code for tasks 1 and 2, and a 3–4 sentence interpretation
  for task 3.'
