id: quantitative-proteomics-26
prompt: 'You are analyzing a TMT-16plex proteomics dataset from a clinical study comparing
  treatment-naive colorectal cancer patients (n=32) versus healthy controls (n=32),
  run across 4 TMT batches (8 samples + 1 pooled reference channel per batch). After
  MaxQuant processing, you have a `proteinGroups.txt` file with ~6,800 protein groups.
  Initial QC reveals the following issues:


  1. **Ratio compression**: Reporter ion intensities show a mean fold-change attenuation
  of ~40% compared to expected spike-in values (you spiked in a 4-fold dilution series
  of 8 UPS2 proteins).

  2. **Batch effects**: PCA shows samples clustering strongly by batch (PC1 = 31%
  variance) rather than by disease status (PC2 = 18% variance).

  3. **Missing values**: 22% of protein-by-sample matrix entries are missing, and
  missingness is strongly correlated with low abundance (Pearson r = -0.71 between
  mean intensity and missingness rate).


  Your task is to:

  - **Explain** the mechanistic cause of ratio compression in TMT experiments and
  propose two experimental or computational strategies to mitigate it in future experiments
  or current analysis

  - **Recommend and justify** a normalization strategy that handles both within-batch
  and between-batch variation, given that the pooled reference channel is available

  - **Select an imputation method** appropriate for the observed missingness pattern
  and explain why alternatives (kNN, MinProb, QRILC) are or are not suitable here

  - **Provide R code** using `limma` to fit a differential expression model that accounts
  for batch as a covariate, and extract proteins with FDR < 0.05 and |log2FC| > 0.5'
target_skills:
- quantitative-proteomics
domain: proteomics
difficulty: intermediate
