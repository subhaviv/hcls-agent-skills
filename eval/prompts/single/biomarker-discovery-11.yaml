id: biomarker-discovery-11
prompt: 'A clinical research team has collected baseline blood samples from 180 patients
  with newly diagnosed colorectal cancer enrolled in a prospective observational study.
  They have measured expression levels of 847 genes using a NanoString panel, along
  with 12 standard clinical variables (age, stage, CEA level, microsatellite instability
  status, etc.). The primary endpoint is 3-year disease-free survival (DFS), with
  62 events (recurrences or deaths) observed over follow-up.


  The team wants to build a prognostic gene signature to predict DFS and plans to
  use LASSO-penalized Cox regression for feature selection. A junior analyst has proposed
  the following pipeline: (1) normalize all 847 gene expression values, (2) run LASSO
  Cox across the full dataset to select genes, (3) combine selected genes with the
  12 clinical variables, (4) fit a final multivariable Cox model, and (5) report the
  C-index from this same dataset as the model''s performance estimate.


  Please provide:


  1. **Identify at least three specific methodological problems** in the proposed
  pipeline that would lead to overly optimistic or invalid results, explaining why
  each is problematic.


  2. **Propose a corrected analysis pipeline** that addresses these issues, specifying
  the exact cross-validation strategy you would use given the sample size and event
  count, and justifying your choice.


  3. **Explain the "events per variable" (EPV) rule** and calculate whether this dataset
  satisfies a reasonable EPV threshold for the final model, given the 62 events.


  4. **Recommend two performance metrics** beyond the C-index that are appropriate
  for time-to-event biomarker models, with a brief rationale for each.'
target_skills:
- biomarker-discovery
domain: single-cell
difficulty: easy
