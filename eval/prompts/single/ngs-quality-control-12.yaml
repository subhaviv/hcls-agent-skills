id: ngs-quality-control-12
prompt: 'You have just received paired-end FASTQ files (`sample_R1.fastq.gz` and `sample_R2.fastq.gz`)
  from a whole-genome sequencing run on an Illumina NovaSeq 6000 platform (2×150 bp
  reads). Before proceeding with variant calling, your team lead has asked you to
  perform a comprehensive pre-alignment quality control assessment. You have 8 CPU
  threads available and want all outputs written to the `qc_out` directory.


  **Please provide the following deliverables:**


  1. **FastQC command**: Write the exact bash command to run FastQC on both FASTQ
  files simultaneously, using all available threads and directing output to the correct
  directory.


  2. **fastp trimming command**: Write a fastp command that performs adapter auto-detection,
  quality trimming (minimum Phred score of 20), removes reads shorter than 50 bp after
  trimming, enables per-base quality output, and uses all available threads. Name
  the trimmed outputs `sample_R1_trimmed.fastq.gz` and `sample_R2_trimmed.fastq.gz`,
  and save the HTML and JSON reports to `qc_out/fastp_report.html` and `qc_out/fastp_report.json`
  respectively.


  3. **Key metrics to inspect**: List four specific quality metrics you would examine
  in the FastQC and/or fastp reports to decide whether the raw data is acceptable
  for downstream WGS analysis, and briefly explain (1–2 sentences each) why each metric
  matters.


  4. **MultiQC aggregation**: Write the MultiQC command to aggregate all QC reports
  in `qc_out` into a single summary report saved in `qc_out/multiqc_report`.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: easy
