id: risk-adjustment-strategy-19
prompt: 'A Medicare Advantage plan with 42,000 members is navigating the CMS-HCC V24-to-V28
  blended transition period (75% V28 / 25% V24 weighting for payment year 2025). Their
  analytics team has identified a cohort of 1,847 members with documented Type 2 diabetes
  in the medical record, but the coding patterns across these members are inconsistent
  and potentially suboptimal for RAF score maximization under the new blended methodology.


  Specifically, the cohort breaks down as follows:

  - 612 members coded only with E11.9 (T2DM without complications) — maps to HCC 19
  in V24 but drops out of V28 entirely

  - 489 members coded with E11.40 (T2DM with diabetic neuropathy, unspecified) — maps
  to HCC 18 in V24 and HCC 37 in V28

  - 391 members coded with E11.65 + E11.40 (T2DM with hyperglycemia + neuropathy)
  — potential interaction flags

  - 355 members with chart evidence suggesting diabetic chronic kidney disease (CKD
  Stage 3) but coded only as E11.9 + N18.3 without the combination code E11.22


  Given this scenario, please provide:

  1. A detailed analysis of how each sub-cohort''s current coding translates to RAF
  impact under the 2025 blended model versus pure V28, including which HCC hierarchies
  apply

  2. A prioritized recapture strategy identifying which cohort segment yields the
  highest incremental RAF value per chart review hour

  3. Audit-defensible documentation criteria that providers must satisfy to support
  upgrading E11.9 to combination codes

  4. A pseudocode algorithm that ingests ICD-10 codes and outputs recommended V28
  HCC assignments with hierarchy resolution for these diabetes subcategories'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: hard
