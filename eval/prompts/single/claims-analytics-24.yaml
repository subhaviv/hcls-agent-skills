id: claims-analytics-24
prompt: 'A regional health plan has provided you with a batch of X12 837P professional
  claims files covering 6 months (January–June 2024) from 847 unique providers across
  12 specialties. Your fraud analytics team suspects a subset of internal medicine
  providers may be systematically upcoding Evaluation & Management (E&M) office visit
  codes.


  The raw claim data, once parsed, shows the following E&M distribution for internal
  medicine providers (NPI group "IM_COHORT", n=143 providers, 284,000 claims):

  - 99211: 2.1%

  - 99212: 8.4%

  - 99213: 19.7%

  - 99214: 51.3%

  - 99215: 18.5%


  National benchmark distributions for internal medicine (CMS 2023 data) show: 99211:
  3.2%, 99212: 14.1%, 99213: 35.8%, 99214: 38.6%, 99215: 8.3%.


  Additionally, your team wants to flag providers billing more than 12 distinct patients
  per hour (assuming 8-hour workdays) and identify any claims where CPT 99215 is billed
  with modifier -25 alongside a procedure code on the same date of service for the
  same patient more than 4 times in a rolling 30-day window.


  Please provide:

  1. Python code to parse the X12 837P segments (CLM, SV1, NM1, DTP loops) into a
  structured pandas DataFrame

  2. A chi-square statistical test comparing the IM_COHORT E&M distribution against
  the CMS benchmark, with interpretation

  3. SQL query logic to identify "impossible hours" providers exceeding the 12-patients-per-hour
  threshold

  4. A provider-level risk scoring function (0–100) that combines upcoding deviation,
  impossible hours flags, and the modifier-25 pattern into a single composite score
  with weighted components'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: intermediate
