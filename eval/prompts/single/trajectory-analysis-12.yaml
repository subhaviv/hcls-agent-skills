id: trajectory-analysis-12
prompt: 'Here is test question #12 of 30:


  ---


  I have a scRNA-seq dataset of 4,800 hematopoietic stem and progenitor cells (HSPCs)
  from human bone marrow, spanning differentiation from HSCs toward erythroid, myeloid,
  and lymphoid lineages. I''ve already completed preprocessing (normalization, HVG
  selection of 2,000 genes, PCA with 40 components) and have a UMAP embedding stored
  in `adata.obsm[''X_umap'']`. Cell type annotations are stored in `adata.obs[''cell_type'']`
  with labels: HSC, CMP, MEP, GMP, Erythroblast, Monocyte, and ProB.


  I want to compute diffusion pseudotime (DPT) using Scanpy to order these cells along
  their developmental trajectories. Please provide:


  1. **Step-by-step Python code** using `scanpy` to compute the diffusion map, set
  the HSC population as the root cell (using the cell with the highest expression
  of *CD34* as the root), and calculate DPT scores stored in `adata.obs[''dpt_pseudotime'']`.


  2. **A PAGA graph analysis** on the same data to visualize connectivity between
  cell type clusters, including the code to generate the PAGA plot with edge weights
  thresholded at 0.15.


  3. **Visualization code** to produce two plots: (a) UMAP colored by DPT pseudotime
  and (b) the PAGA connectivity graph overlaid on the UMAP.


  4. **Brief interpretation guidance** explaining how to read the resulting pseudotime
  ordering and PAGA graph to identify the primary differentiation branches from HSC
  toward the three terminal lineages.'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: easy
