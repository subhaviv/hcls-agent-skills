id: rna-seq-analysis-12
prompt: 'You have completed a bulk RNA-seq experiment comparing treated (n=6) vs.
  control (n=6) human cell line samples. You chose an alignment-free quantification
  approach using Salmon (v1.10) with a human transcriptome index (GRCh38, Ensembl
  109). Your Salmon output directories are named `sample_001` through `sample_012`,
  and you have a metadata CSV (`coldata.csv`) with columns `sample`, `condition` (treated/control),
  and `batch` (batch1/batch2, 3 samples per condition per batch).


  You now need to load these Salmon quantification results into R and run a differential
  expression analysis using DESeq2, accounting for the batch effect in your design.


  Please provide the following:


  1. **Complete R code** using `tximport` to load the Salmon quant.sf files into a
  format suitable for DESeq2, including how to correctly link transcript-level estimates
  to gene-level counts using a transcript-to-gene mapping (tx2gene). Assume the tx2gene
  data frame is already loaded as `tx2gene` with columns `tx_id` and `gene_id`.


  2. **DESeq2 setup code** that creates a `DESeqDataSet` object incorporating both
  `condition` and `batch` in the design formula, runs the DESeq2 pipeline, and extracts
  results for the treated vs. control comparison using `lfcShrink` with the `apeglm`
  shrinkage estimator.


  3. **A brief explanation** (3–5 sentences) of why `lfcShrink` is recommended over
  raw log2 fold changes for downstream interpretation and visualization, particularly
  when generating a volcano plot.'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: easy
