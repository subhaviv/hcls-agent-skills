id: cell-type-annotation-18
prompt: 'You are analyzing a single-cell RNA-seq dataset of 85,000 cells from 12 pediatric
  patients with inflammatory bowel disease (IBD). Initial Leiden clustering at resolution
  1.2 produced 34 clusters. You ran CellTypist with the `Immune_All_High.pkl` model
  using `majority_voting=True`, but several clusters show conflicting results: clusters
  7, 15, and 22 each contain cells with roughly equal proportions of two distinct
  cell type predictions (e.g., cluster 7 is 48% "CD8+ T cells" and 45% "NK cells"),
  suggesting these may be over-clustered or contain genuine doublets/transitional
  states.


  Additionally, cluster 29 received the label "ILC3" from CellTypist but has high
  expression of *EPCAM*, *CDH1*, and *KRT18* — canonical epithelial markers — suggesting
  a misclassification.


  Your tasks:

  1. Write Python code to visualize the per-cluster CellTypist prediction probability
  distributions (not just majority labels) using a heatmap showing all clusters vs.
  top-8 predicted cell types, with cluster sizes annotated on the y-axis.

  2. Write code to implement a confidence-threshold filter (minimum 0.6 majority probability)
  that flags low-confidence clusters and assigns them "Uncertain" labels.

  3. For cluster 29, write code to cross-validate the CellTypist label against a marker-gene
  dotplot using at least 5 canonical epithelial markers and 5 canonical ILC3 markers
  (provide the specific gene lists).

  4. Propose a resolution strategy for the mixed clusters (7, 15, 22): should you
  sub-cluster, merge, or apply a different annotation model? Provide code implementing
  your recommended approach using `sc.tl.leiden` with targeted sub-clustering on these
  three clusters only.'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: hard
