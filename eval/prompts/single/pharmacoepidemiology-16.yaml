id: pharmacoepidemiology-16
prompt: 'A health system researcher wants to study whether initiation of GLP-1 receptor
  agonists (specifically semaglutide) reduces the risk of major adverse cardiovascular
  events (MACE) compared to DPP-4 inhibitors (specifically sitagliptin) in type 2
  diabetes patients using electronic health records from 2018–2023. The database contains
  47,000 new users of semaglutide and 61,000 new users of sitagliptin. The researcher
  plans to follow patients from first prescription date until MACE, death, disenrollment,
  or 3 years — whichever comes first.


  A colleague raises concerns about several methodological issues: (1) some patients
  in the semaglutide group had their index date set to when they received prior authorization
  approval (up to 90 days before the first dispensing), (2) HbA1c and BMI are measured
  irregularly and change over time, (3) patients with prior cardiovascular disease
  are more likely to receive semaglutide due to recent guideline updates, and (4)
  the database lacks smoking status for 35% of patients.


  Please provide:

  1. Identify which specific bias each of the four concerns represents and explain
  the mechanism by which each would distort the effect estimate (direction of bias
  where possible)

  2. Propose a study design that addresses concerns #1 and #3 simultaneously, specifying
  cohort entry rules and comparator selection rationale

  3. Describe how marginal structural models with time-varying covariates would address
  concern #2, including the weighting approach and a stabilized weight formula

  4. For concern #4, calculate the E-value for a hypothetical observed HR of 0.78
  (95% CI lower bound: 0.71) and interpret whether unmeasured confounding from smoking
  could explain away the finding'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: intermediate
