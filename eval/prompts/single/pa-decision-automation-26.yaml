id: pa-decision-automation-26
prompt: 'A regional health plan processes approximately 4,200 prior authorization
  requests monthly for specialty medications. Their data science team has extracted
  the following features from historical PA decisions (18 months, 50,400 records):
  `diagnosis_code` (ICD-10), `requested_drug_ndc`, `prescriber_specialty`, `days_supply`,
  `quantity_requested`, `step_therapy_completed` (boolean), `lab_value_present` (boolean),
  `clinical_notes_length` (word count), and `prior_denial_count`. The overall approval
  rate is 71%, but denial rates vary significantly: oncology requests are denied at
  8%, while musculoskeletal requests are denied at 44%.


  The team wants to build a gradient boosting classifier (XGBoost) to automate initial
  PA decisions, targeting ≥90% accuracy with a false-negative rate (incorrectly denying
  approvable requests) below 5%. They are also concerned about regulatory compliance
  and want SHAP-based explanations for every automated decision.


  Please provide the following deliverables:


  1. **Python code** implementing an XGBoost training pipeline with appropriate class
  imbalance handling given the 71/29 approval/denial split, including cross-validation
  strategy and threshold tuning to meet the false-negative rate constraint.


  2. **SHAP explanation code** that generates both global feature importance plots
  and individual decision explanations suitable for inclusion in member-facing denial
  letters.


  3. **Denial pattern analysis**: Given the musculoskeletal 44% denial rate, describe
  a systematic approach to identify whether denials cluster around specific NDC codes,
  prescriber types, or missing documentation fields, and provide pandas-based code
  to surface the top three denial drivers.


  4. **Guardrail recommendations** for which PA request types should be flagged for
  mandatory human review rather than automated decision, with specific threshold criteria.'
target_skills:
- pa-decision-automation
domain: healthcare-ops
difficulty: intermediate
