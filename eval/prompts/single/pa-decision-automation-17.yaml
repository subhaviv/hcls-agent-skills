id: pa-decision-automation-17
prompt: 'A regional health plan processes approximately 4,200 prior authorization
  requests per month for specialty medications. Your data science team has extracted
  the following features from 18 months of historical PA decisions (n=75,600 records):
  `diagnosis_code` (ICD-10), `requested_drug_ndc`, `prescriber_specialty`, `step_therapy_completed`
  (boolean), `lab_value_present` (boolean), `days_supply_requested`, `member_age`,
  `prior_denial_count`, and `plan_benefit_tier`. The overall approval rate is 71%,
  but denial rates vary significantly: oncology requests are denied at 9%, while musculoskeletal
  requests are denied at 38% and behavioral health at 44%.


  Your team wants to build a gradient boosting classifier (XGBoost) to predict PA
  approval/denial and integrate SHAP explainability for clinical reviewers.


  Please provide:


  1. **Feature engineering recommendations** — identify which raw features likely
  need transformation (encoding, binning, interaction terms) before model training,
  with specific rationale for at least three features


  2. **Class imbalance strategy** — given the 71/29 approval/denial split, recommend
  a handling approach (e.g., SMOTE, scale_pos_weight, threshold tuning) and justify
  your choice for this clinical context


  3. **Python code skeleton** — a reproducible XGBoost training pipeline with SHAP
  waterfall plot generation for individual PA decisions, using placeholder DataFrames
  but realistic column names


  4. **Denial pattern analysis design** — describe how you would segment the musculoskeletal
  38% denial cohort to identify whether denials cluster around missing `lab_value_present`,
  incomplete `step_therapy_completed`, or specific `prescriber_specialty` combinations,
  including the statistical test you would use'
target_skills:
- pa-decision-automation
domain: healthcare-ops
difficulty: intermediate
