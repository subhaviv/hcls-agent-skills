id: risk-adjustment-23
prompt: 'Here is test question #23 of 30:


  ---


  You are building a basic CMS-HCC risk adjustment pipeline for a small Medicare Advantage
  plan with 500 members. Your data team has extracted the following simplified member
  diagnosis data for the 2024 payment year (using CMS-HCC Model V28):


  | Member ID | Age | Sex | ICD-10 Codes Documented |

  |-----------|-----|-----|------------------------|

  | M001 | 72 | F | E11.9, E11.40, I50.9 |

  | M002 | 68 | M | J44.1, J45.51 |

  | M003 | 81 | F | I10, N18.3, N18.4 |

  | M004 | 75 | M | E11.9, I25.10, I50.32 |


  Assume all members are community-dwelling (non-institutional), and use a simplified
  demographic RAF base coefficient of 0.35 for all members regardless of age/sex for
  this exercise.


  Please provide the following deliverables:


  1. **ICD-10 to HCC Mapping**: For each member, identify which ICD-10 codes map to
  HCC categories under CMS-HCC Model V28. List the HCC number and label for each qualifying
  code.


  2. **Hierarchy Resolution**: Apply CMS-HCC disease hierarchies to remove any dominated
  HCC codes for each member. Explain which HCCs are dropped and why for any affected
  members.


  3. **RAF Score Calculation**: Calculate a simplified RAF score for each member by
  summing the demographic base (0.35) plus HCC coefficients. Use these approximate
  V28 coefficients: HCC35=0.323, HCC85=0.323, HCC86=0.289, HCC110=0.350, HCC111=0.294,
  HCC112=0.245, HCC161=0.191, HCC217=0.302, HCC309=0.179.


  4. **Python Code**: Write a Python function `calculate_raf(member_dict, hcc_coefficients,
  base_score)` that automates steps 1–3 for any input member.'
