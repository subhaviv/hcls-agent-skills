id: pa-clinical-policy-14
prompt: 'A regional Medicare Advantage plan (MedFirst Health, 85,000 members) is implementing
  automated prior authorization for spinal cord stimulation (SCS) devices under their
  utilization management program. Their medical director needs to align the PA criteria
  with CMS LCD L33795 (Electrical Stimulation for the Treatment of Pain and Muscle
  Rehabilitation) while incorporating step therapy requirements.


  The plan''s current data shows: 847 SCS PA requests in the past 12 months, 34% denial
  rate, with 61% of denials overturned on peer-to-peer review. The average time from
  PA submission to decision is 9.2 days. The plan wants to reduce inappropriate denials
  while maintaining clinical rigor.


  **Please provide the following deliverables:**


  1. **Clinical Criteria Analysis**: Identify the key medical necessity elements from
  LCD L33795 that must be satisfied for SCS approval, including the required conservative
  treatment failures (specify duration and modalities) and contraindications that
  would support denial.


  2. **Step Therapy Protocol**: Design a 3-stage step therapy ladder for chronic intractable
  pain patients seeking SCS, with specific documentation requirements at each stage
  (include minimum trial durations and acceptable medication classes).


  3. **Denial Rate Root Cause Assessment**: Given the 61% peer-to-peer overturn rate,
  identify the 3 most likely documentation gaps causing inappropriate initial denials
  and recommend specific fields to add to the PA intake form.


  4. **FHIR Da Vinci PAS Mapping**: Provide a simplified JSON structure showing how
  the SCS prior authorization request should be structured using the Da Vinci PAS
  framework, including the relevant CRD hooks and required clinical data elements
  (diagnosis codes, procedure codes, supporting documentation references).'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: intermediate
