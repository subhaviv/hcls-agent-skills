id: scrna-seq-pipeline-27
prompt: 'You are analyzing a single-cell RNA-seq dataset from a lung cancer study
  involving 8 patients (4 tumor, 4 adjacent normal tissue). After running CellRanger,
  you have 8 separate `filtered_feature_bc_matrix` directories. Initial quality checks
  reveal significant batch effects between patients, with tumor samples showing higher
  mitochondrial gene percentages (15-25%) compared to normal samples (5-12%).


  Your dataset contains approximately 45,000 cells total before filtering, with a
  median of 1,800 genes per cell and median UMI count of 3,500. You''ve identified
  that patient P03_tumor is a potential outlier with unusually low gene counts (median
  650 genes/cell).


  **Please provide:**


  1. **Complete Python code** using Scanpy to load all 8 samples, concatenate them
  with proper sample labels, and perform QC filtering. Use adaptive thresholds based
  on median absolute deviation (MAD) rather than fixed cutoffs, applying 3 MAD for
  both gene count and mitochondrial percentage filters.


  2. **Normalization and HVG selection code** that accounts for the tumor vs. normal
  batch structure — specifically, select highly variable genes (target: 3,000 HVGs)
  using `batch_key="sample_id"` to avoid capturing batch-driven variation.


  3. **Batch correction strategy**: implement Harmony integration using `harmonypy`
  with `sample_id` as the batch variable, then build the neighborhood graph and run
  Leiden clustering at resolution 0.5. Explain why you chose Harmony over scVI for
  this dataset size and structure.


  4. **A brief recommendation** on how to handle patient P03_tumor given its outlier
  status — should it be excluded entirely, filtered more aggressively, or analyzed
  separately? Justify your answer with specific quality control reasoning.'
