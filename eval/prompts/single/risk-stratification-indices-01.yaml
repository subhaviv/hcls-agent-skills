id: risk-stratification-indices-01
prompt: 'A community hospital''s care management team is reviewing 30-day readmission
  risk for a cohort of 847 recently discharged adult inpatients. They want to implement
  a standardized risk stratification tool to identify high-risk patients for post-discharge
  follow-up calls and home health referrals.


  The team has access to the following data elements in their EHR: admission diagnosis,
  length of stay (in days), discharge disposition (home, SNF, home health, AMA), ED
  visit history in the past 6 months, age, and primary insurance type. They do not
  currently have structured comorbidity data coded in a way that maps cleanly to ICD-10
  groupings.


  Given this context, please provide the following deliverables:


  1. **Tool recommendation**: Identify which validated risk stratification index (LACE,
  Charlson, Elixhauser, or another) is most appropriate for this team''s available
  data and use case, and explain why.


  2. **Score interpretation**: For the recommended tool, describe how scores are typically
  categorized into risk tiers (e.g., low/medium/high) and what thresholds are commonly
  used in clinical practice.


  3. **LACE score example**: Calculate the LACE score for a fictional patient with
  the following profile: length of stay = 4 days, admission type = emergent, 1 ED
  visit in the prior 6 months, and 3 active comorbidities. Show your work component
  by component.


  4. **Limitation acknowledgment**: Identify one key limitation of the recommended
  tool for this specific hospital''s population and suggest one data enhancement (e.g.,
  an SDOH variable) that could improve predictive accuracy.'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: easy
