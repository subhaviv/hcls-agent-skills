id: ehr-data-parsing-30
prompt: 'You are building a clinical data pipeline that receives HL7v2 ORU^R01 messages
  from a laboratory system, but the messages contain several known data quality issues
  that must be handled before loading into a FHIR R4 Observation resource. Below is
  a representative (simplified) HL7v2 message segment set you must process:


  ```

  MSH|^~\&|LAB_SYS|HOSP_A|EHR|HOSP_A|20231115083045||ORU^R01|MSG00423|P|2.5

  PID|1||PT-98234^^^HOSP_A^MR||DOE^JANE^M||19850312|F|||123 ELM ST^^BOSTON^MA^02101

  OBR|1||ORD-5521|85025^CBC WITH DIFF^CPT|||20231115080000

  OBX|1|NM|718-7^Hemoglobin^LN||9.2|g/dL|12.0-16.0|L|||F

  OBX|2|NM|4544-3^Hematocrit^LN||""||37.0-47.0||||R

  OBX|3|NM|787-2^MCV^LN||UNKNOWN|fL|80-100||||F

  OBX|4|NM|6690-2^WBC^LN||11.8|10*3/uL|4.5-11.0|H|||F

  OBX|5|TX|10000-1^COMMENT^LN||Patient fasting status unconfirmed||||||F

  ```


  Your task:

  1. Write a Python function `parse_oru_to_fhir_observations(hl7_message: str) ->
  list[dict]` that parses each OBX segment and maps it to a FHIR R4 Observation resource
  (as a Python dict), correctly populating `status`, `code`, `valueQuantity`, `referenceRange`,
  `interpretation`, and `subject` fields.

  2. Handle the three data quality issues present: missing numeric value (OBX|2),
  non-numeric value string (OBX|3), and non-quantitative observation type (OBX|5).
  For each, apply an appropriate FHIR-compliant fallback strategy and explain your
  reasoning.

  3. Provide a `validate_observations(observations: list[dict]) -> pd.DataFrame` function
  that returns a quality report DataFrame with columns: `obs_index`, `loinc_code`,
  `issue_type`, `severity`, and `recommended_action`.'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: hard
