id: variant-calling-28
prompt: 'You are running a tumor-only Mutect2 somatic variant calling pipeline for
  a cohort of 847 formalin-fixed paraffin-embedded (FFPE) tumor samples from a pan-cancer
  study. Your sequencing was performed on Illumina NovaSeq 6000 with 150bp paired-end
  reads targeting a 523-gene panel (average coverage ~800x). You are using hg38 as
  the reference genome with GATK 4.3.0.


  Several challenges have emerged: (1) approximately 30% of samples show estimated
  contamination >5% from GetPileupSummaries/CalculateContamination, (2) FFPE-induced
  C>T/G>A artifacts are inflating your false positive rate, and (3) you suspect orientation
  bias artifacts from oxidative damage (OxoG). Your current FilterMutectCalls is rejecting
  ~68% of variants as "artifact" in high-contamination samples, which seems excessive.


  Please provide:

  1. A step-by-step GATK command workflow (with specific flags and parameters) to
  address FFPE artifacts and orientation bias, including how to generate and apply
  an appropriate Panel of Normals (PoN) given you have 94 matched normal samples available

  2. An analysis of whether the 68% rejection rate is expected given your contamination
  levels, and what contamination thresholds you would recommend for downstream filtering
  versus sample exclusion

  3. A strategy for distinguishing true low-allele-frequency somatic variants (VAF
  1-5%) from FFPE artifacts in genes like TP53 and KRAS where hotspot mutations are
  expected

  4. Specific FilterMutectCalls parameter adjustments (e.g., `--max-events-in-region`,
  `--min-allele-fraction`, orientation bias priors) to improve sensitivity while controlling
  specificity in this FFPE context'
target_skills:
- variant-calling
domain: genomics
difficulty: hard
