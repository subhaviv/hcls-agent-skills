id: rwd-cohort-analysis-23
prompt: 'Here is test question #23 of 30:


  ---


  You are analyzing a claims database of 28,400 patients with type 2 diabetes who
  initiated either metformin monotherapy (n = 16,200) or sulfonylurea monotherapy
  (n = 12,200) between January 2018 and December 2020. The primary outcome is first
  hospitalization for major adverse cardiovascular events (MACE), defined using ICD-10
  codes I21.x (acute MI), I63.x (ischemic stroke), and I46.x (cardiac arrest). Patients
  must have 12 months of continuous enrollment prior to index date (washout period)
  and at least 6 months of follow-up. Censoring occurs at disenrollment, death, or
  end of study (December 2022).


  Before running the outcome model, you need to verify that the proportional hazards
  assumption holds for the treatment variable and two key covariates: baseline HbA1c
  category (≥9% vs. <9%) and Charlson Comorbidity Index (continuous, range 0–8).


  Please provide the following deliverables:


  1. **Python code** using `lifelines` to fit a Cox proportional hazards model with
  the treatment indicator, HbA1c category, CCI score, age, and sex as covariates.

  2. **Code to perform Schoenfeld residual testing** for each covariate and interpret
  what a p-value < 0.05 would mean for the treatment variable specifically.

  3. **A log-log survival plot** comparing the two treatment groups to visually assess
  the proportional hazards assumption.

  4. **Recommended remediation strategies** (with brief code sketches) if the proportional
  hazards assumption is violated for the treatment variable — include at least two
  distinct approaches such as time-varying coefficients or stratification.


  Use simulated data with the described sample sizes and realistic event rates (~8%
  MACE over follow-up).'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: easy
