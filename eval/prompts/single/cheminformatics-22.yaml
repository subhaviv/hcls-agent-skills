id: cheminformatics-22
prompt: 'Here is test question #22 of 30:


  ---


  You are working with a small focused library of 5 compounds that you want to evaluate
  for druglikeness before progressing to biological screening. The compounds are represented
  by the following SMILES strings:


  - **Cpd-01**: `CC(C)Cc1ccc(cc1)C(C)C(=O)O` (ibuprofen analog)

  - **Cpd-02**: `COc1ccc2cc(ccc2c1)C(C)N` (mexiletine analog)

  - **Cpd-03**: `CC1=C(C(=O)Nc2ccccc2)C(c2ccc(Cl)cc2)NC(=O)c2ccccc2N1` (complex amide)

  - **Cpd-04**: `CCCCCCCCCCCC(=O)Nc1ccc(O)cc1` (long-chain fatty acid amide)

  - **Cpd-05**: `c1ccc2c(c1)cc1ccc3cccc4ccc2c1c34` (pyrene, polycyclic aromatic)


  Using RDKit, please provide the following:


  1. **Python code** that calculates the four Lipinski Rule of Five properties (MW,
  LogP, HBD, HBA) for each compound and flags any violations.

  2. **A summary table** showing the computed property values and pass/fail status
  for each compound.

  3. **An assessment** of which compounds should be deprioritized and why, referencing
  specific property violations or structural concerns (e.g., PAINS-like features,
  poor solubility flags).

  4. **Brief recommendations** for structural modifications to Cpd-04 to improve its
  Lipinski compliance while retaining its amide pharmacophore.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: easy
