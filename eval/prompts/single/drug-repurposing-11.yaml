id: drug-repurposing-11
prompt: 'A small biotech company is evaluating **metformin** (an approved type 2 diabetes
  drug) as a candidate for repurposing in **pancreatic ductal adenocarcinoma (PDAC)**.
  Their internal genomics team has profiled 45 PDAC tumor samples and identified the
  following frequently altered genes: *KRAS* (89% mutation rate), *TP53* (72%), *SMAD4*
  (38%), *CDKN2A* (31%), and *STK11* (18%).


  The team knows metformin''s primary mechanism involves AMPK activation via inhibition
  of mitochondrial complex I, and they want to understand how this overlaps with PDAC
  biology.


  Please provide the following deliverables:


  1. **Mechanism-of-action overlap analysis**: Explain how metformin''s AMPK/mTOR
  pathway modulation intersects with at least two of the altered genes identified
  in the tumor profile above.


  2. **Evidence hierarchy ranking**: Using a standard drug repurposing evidence framework
  (preclinical → clinical → epidemiological), briefly summarize what tier of evidence
  currently exists for metformin in PDAC and what is still missing.


  3. **DGIdb query strategy**: Write a specific Python code snippet (using the DGIdb
  REST API at `https://dgidb.org/api/v2/interactions.json`) to retrieve all known
  drug-gene interactions for metformin against the five genes listed above, filtering
  results to only return interactions with an interaction score ≥ 2.0.


  4. **Translatability assessment**: Identify two key clinical translatability challenges
  specific to the metformin-PDAC combination (e.g., pharmacokinetic, biomarker, or
  trial design issues) and propose one mitigation strategy for each.'
target_skills:
- drug-repurposing
domain: drug-discovery
difficulty: easy
