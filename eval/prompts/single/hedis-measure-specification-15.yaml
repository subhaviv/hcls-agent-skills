id: hedis-measure-specification-15
prompt: 'A regional health plan is preparing for HEDIS MY2024 data submission and
  needs help analyzing their Controlling High Blood Pressure (CBP) measure performance.
  Their current data shows:


  - Total attributed members aged 18-85: 12,400

  - Members with hypertension diagnosis: 3,850

  - Members with adequate blood pressure control (<140/90): 1,890

  - Members excluded due to ESRD: 145

  - Members excluded due to pregnancy: 38

  - Members with only one outpatient visit in the measurement year: 412

  - Members who disenrolled mid-year with a 45-day gap: 287

  - Members with advanced illness + frailty indicators: 203


  The plan''s current CBP rate is approximately 49.1%, placing them in the 25th percentile
  nationally. Their Star Rating weight for CBP is 3x.


  Please provide the following:


  1. **Denominator validation**: Walk through which of the listed populations should
  be included or excluded from the CBP denominator, citing the specific NCQA enrollment
  and exclusion criteria that apply to each group.


  2. **Rate recalculation**: Using the corrected denominator and numerator, recalculate
  the CBP rate and estimate the Star Rating percentile impact if the rate improves
  to 58% versus 63%.


  3. **Care gap prioritization**: Among the remaining non-compliant members, recommend
  a prioritized outreach strategy using at least three distinct member segments with
  different intervention approaches.


  4. **Continuous enrollment logic**: Explain how the 45-day gap members (n=287) should
  be evaluated under HEDIS continuous enrollment rules, including whether an allowable
  gap applies to CBP.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: intermediate
