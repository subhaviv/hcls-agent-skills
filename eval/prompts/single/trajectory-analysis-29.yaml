id: trajectory-analysis-29
prompt: 'Here is test question #29 of 30:


  ---


  You are analyzing a scRNA-seq dataset of 14,200 human hematopoietic stem and progenitor
  cells (HSPCs) from bone marrow, spanning differentiation toward erythroid, myeloid,
  and lymphoid lineages. After running scVelo in dynamical mode, you observe a paradox:
  a cluster of cells annotated as "committed erythroid progenitors" (CEPs, n=1,847
  cells) shows high expression of both spliced and unspliced *GATA1* (spliced: mean=4.2,
  unspliced: mean=3.9), yet scVelo assigns these cells **negative velocity** along
  the erythroid trajectory — suggesting dedifferentiation back toward HSCs. CellRank''s
  absorption probabilities assign these CEPs only 23% fate probability toward the
  erythroid terminal state, with 61% probability toward the myeloid terminal state.
  PAGA connectivity between CEPs and the myeloid cluster is unexpectedly high (edge
  weight=0.38).


  Given this conflicting evidence:


  1. List at least four biological or technical explanations for why scVelo might
  assign spurious negative velocity to committed progenitors despite high spliced/unspliced
  ratios, and describe how you would diagnose each cause using specific QC metrics
  or visualizations.


  2. Provide Python code using scVelo and CellRank to (a) re-examine the velocity
  confidence and consistency scores for the CEP cluster, (b) recompute PAGA using
  velocity-directed edges only, and (c) re-run CellRank terminal state identification
  after filtering cells with velocity confidence < 0.4.


  3. Recommend a decision framework for when CellRank fate probabilities should override
  PAGA connectivity evidence, and when PAGA should be trusted over RNA velocity signals,
  with specific thresholds and biological validation strategies.'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: hard
