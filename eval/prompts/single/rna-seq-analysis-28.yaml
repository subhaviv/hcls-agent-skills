id: rna-seq-analysis-28
prompt: 'You are analyzing a bulk RNA-seq dataset comparing tumor vs. normal tissue
  across 12 samples (6 tumor, 6 normal) from a pancreatic cancer study. You ran Salmon
  (v1.9) with default parameters using a decoy-aware index against GRCh38, then imported
  counts via tximport using `countsFromAbundance = "lengthScaledTPM"`. Your DESeq2
  analysis (size factor estimation via `estimateSizeFactors`) identifies 847 differentially
  expressed genes at padj < 0.05, but your collaborator ran the same samples through
  STAR (2-pass mode) + featureCounts (default parameters, unstranded) and finds only
  312 overlapping DE genes. Notably, a set of 89 genes appear significant only in
  the Salmon pipeline, including several known pancreatic cancer markers like *KRAS*,
  *MUC5AC*, and *REG3A*, while 203 genes appear significant only in the STAR/featureCounts
  pipeline.


  Investigate this discordance and provide:

  1. At least four specific biological or technical reasons why Salmon and STAR+featureCounts
  could produce such divergent DE gene lists for these particular genes

  2. A diagnostic R code workflow using tximport and DESeq2 that checks for potential
  issues with the Salmon import (including the `countsFromAbundance` choice and its
  interaction with DESeq2''s normalization)

  3. A recommendation on which pipeline result to trust for *KRAS* specifically, given
  that *KRAS* has known complex splicing isoforms and a short 3′UTR, with justification

  4. One concrete parameter change in each pipeline that would likely improve concordance,
  with expected effect on the count matrix'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: hard
