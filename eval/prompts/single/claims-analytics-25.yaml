id: claims-analytics-25
prompt: 'Here is test question #25 of 30:


  ---


  A regional health plan has provided you with 6 months of X12 837P professional claims
  data (approximately 180,000 claim lines) covering 847 providers across 12 specialties.
  The compliance team suspects systematic E&M upcoding among a subset of internal
  medicine providers. Specifically, they want to focus on CPT codes 99213, 99214,
  and 99215 for established office visits.


  Your task is to build a provider profiling pipeline to detect E&M upcoding outliers.
  The dataset has been pre-parsed into a pandas DataFrame with columns: `provider_npi`,
  `provider_specialty`, `service_date`, `cpt_code`, `billed_amount`, `place_of_service`,
  `patient_id`, and `diagnosis_primary` (ICD-10).


  Please deliver the following:


  1. **Python code** that computes, for each internal medicine provider, the distribution
  of 99213/99214/99215 as a percentage of their total E&M visits, then flags providers
  whose 99215 utilization rate exceeds 2 standard deviations above the specialty peer
  mean.


  2. **SQL equivalent** of the same peer comparison logic, assuming the DataFrame
  is loaded into a table called `claims`.


  3. **A statistical rationale** explaining why standard deviation thresholding may
  produce false positives for low-volume providers (fewer than 50 E&M claims) and
  recommend an alternative approach (e.g., credible interval shrinkage or minimum
  volume thresholds).


  4. **A brief interpretation** of what a provider billing 99215 at 68% of their E&M
  visits (specialty mean: 22%, SD: 11%) likely indicates from a fraud and abuse perspective,
  and what secondary signals in the data should be investigated next.'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: intermediate
