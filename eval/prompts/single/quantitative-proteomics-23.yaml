id: quantitative-proteomics-23
prompt: 'You are analyzing a label-free quantification (LFQ) proteomics dataset from
  MaxQuant, comparing tumor vs. adjacent normal tissue samples from 12 colorectal
  cancer patients (6 tumor, 6 normal). After loading the `proteinGroups.txt` file
  into R and filtering for contaminants and reverse hits, you have 3,847 protein groups.
  Intensity values have been log2-transformed.


  Upon inspecting the data, you notice the following missingness pattern: approximately
  8% of values are missing overall, but a subset of ~200 proteins have values present
  in all 6 tumor samples and completely absent in all 6 normal samples (or vice versa).
  The remaining missing values appear randomly scattered across samples.


  **Please provide:**


  1. **Missingness classification**: Categorize the two distinct types of missing
  data present in this dataset (use proper terminology: MCAR, MAR, MNAR) and explain
  the biological/technical reasoning for each pattern.


  2. **Imputation strategy**: Recommend a specific imputation approach for each missing
  data type. For the proteins absent in one condition entirely, recommend whether
  to impute or handle them differently, and why.


  3. **R code**: Write a concise R code snippet (using the `DEP` or `imputeLCMD` package)
  that implements your recommended imputation — applying `MinProb` imputation to the
  MNAR values while preserving the condition-specific absent proteins as a separate
  analytical group.


  4. **Downstream analysis note**: Briefly explain how the condition-specific absent
  proteins should be reported in a final differential expression analysis, and what
  statistical framework (if any) is appropriate for them.'
target_skills:
- quantitative-proteomics
domain: proteomics
difficulty: easy
