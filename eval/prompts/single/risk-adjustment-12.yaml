id: risk-adjustment-12
prompt: 'Here is test question #12 of 30:


  ---


  A regional Medicare Advantage plan has provided you with the following simplified
  member data for RAF score calculation using the CMS-HCC Model V28. You have three
  members:


  - **Member A** (Age 72, Female, Community Full Benefit Dual): ICD-10 codes E11.65,
  E11.40, N18.3

  - **Member B** (Age 68, Male, Non-Dual): ICD-10 codes I50.32, I50.9, I48.11, E11.9

  - **Member C** (Age 79, Female, Community Non-Dual): ICD-10 codes E08.65, E11.65,
  I21.9, I25.10


  Use the standard V28 ICD-10-to-HCC crosswalk and demographic coefficients. Assume
  the base normalization factor is 1.015 and no interaction factors apply beyond standard
  disease interactions included in V28.


  Please provide the following deliverables:


  1. **HCC Mapping Table**: Map each ICD-10 code to its corresponding HCC category
  for all three members, noting any codes that do not map.

  2. **Hierarchy Resolution**: Apply V28 disease hierarchies to remove dominated HCC
  codes for each member, showing before/after HCC lists.

  3. **RAF Score Calculation**: Compute the final RAF score for each member, showing
  demographic + disease coefficient components step by step.

  4. **Python Code**: Write a reusable Python function `calculate_raf(member_dict,
  crosswalk_df, coefficients_df, normalization_factor)` that automates steps 1–3 for
  any member input, including hierarchy resolution logic.'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: easy
