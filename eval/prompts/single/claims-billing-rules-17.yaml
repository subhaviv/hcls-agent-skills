id: claims-billing-rules-17
prompt: 'A regional health plan''s Special Investigations Unit is auditing claims
  from a solo orthopedic surgeon (NPI: 1234567890) over a 12-month period. The data
  extract reveals the following patterns:


  - Modifier 59 was appended to CPT 27447 (total knee arthroplasty) on 34 claims where
  CPT 27370 (injection of contrast for knee arthroplography) was billed same-day

  - Modifier 25 was used on 89% of E&M visits (predominantly 99214 and 99215) billed
  on the same day as minor surgical procedures

  - CPT 97110 (therapeutic exercises) appears on 156 claims billed by the surgeon
  directly, despite the practice employing two licensed physical therapists

  - The surgeon''s 90-day global surgery period claims show 23 instances where separate
  E&M codes were billed during the global period without modifier 24 or 57


  The SIU analyst needs to determine whether these patterns represent systematic fraud,
  waste, or coding errors, and must prioritize which findings warrant escalation to
  CMS versus internal education.


  Please provide:

  1. An NCCI edit analysis for each of the four billing patterns, identifying whether
  a valid modifier indicator exists that permits unbundling

  2. A fraud-versus-coding-error classification for each pattern using standard FWA
  investigation criteria

  3. A risk-scoring matrix (High/Medium/Low) with rationale for each finding

  4. Recommended next steps, distinguishing between patterns requiring CMS/OIG referral
  versus provider education and corrective action plans'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: intermediate
