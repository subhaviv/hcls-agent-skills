id: quality-measures-27
prompt: 'A regional health plan with 85,000 commercial members needs to calculate
  the **Breast Cancer Screening (BCS) HEDIS measure** for the current measurement
  year. Your data team has access to three tables: `members` (member_id, dob, gender,
  enrollment_start, enrollment_end), `claims` (claim_id, member_id, service_date,
  procedure_code, diagnosis_code, claim_type), and `pharmacy` (rx_id, member_id, fill_date,
  ndc_code).


  **Specific parameters:**

  - Measurement year: January 1 – December 31, 2023

  - Eligible population: Women aged 52–74 as of December 31, 2023

  - Continuous enrollment requirement: Enrolled for 11 of 12 months during the measurement
  year, with no more than one gap in coverage

  - Denominator exclusions: Bilateral mastectomy (CPT: 19303, 19304; ICD-10: Z90.13)
  or two unilateral mastectomies

  - Numerator criteria: One or more mammograms (CPT: 77067, 77066, 77065) on or between
  October 1, 2021 and December 31, 2023 (27-month lookback)


  **Deliverables requested:**

  1. Write complete SQL queries to build the eligible denominator, apply exclusions,
  and identify numerator-qualifying members

  2. Calculate the BCS measure rate given these fictional counts: 12,400 eligible
  women identified, 1,850 excluded for mastectomy history, 7,920 with a qualifying
  mammogram

  3. Identify potential care gaps — members in the denominator without a qualifying
  mammogram — and write a SQL snippet to flag them with a `care_gap` indicator

  4. Briefly explain how continuous enrollment logic with the "one allowable gap"
  rule should be implemented in SQL, including how to handle mid-year enrollees'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: intermediate
