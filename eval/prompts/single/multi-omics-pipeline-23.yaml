id: multi-omics-pipeline-23
prompt: 'Here is test question #23 of 30:


  ---


  You are analyzing a multi-omics dataset from a colorectal cancer study involving
  85 tumor samples with matched RNA-seq (gene expression) and proteomics (TMT-labeled
  mass spectrometry) data. The RNA-seq data uses Ensembl gene IDs (e.g., ENSG00000141510
  for TP53) while the proteomics data uses UniProt accession numbers (e.g., P04637
  for TP53). Before integrating these layers, you need to harmonize feature identifiers
  so that both datasets share a common HGNC gene symbol namespace.


  Using the `biomaRt` R package, please provide:


  1. **Complete R code** to connect to the Ensembl BioMart database (GRCh38, Ensembl
  release 109) and retrieve a mapping table that converts Ensembl gene IDs to HGNC
  gene symbols, including only protein-coding genes. The query should retrieve the
  attributes: `ensembl_gene_id`, `hgnc_symbol`, and `gene_biotype`.


  2. **A second code block** that uses the `UniProt.ws` R package (or alternatively
  `biomaRt` with the UniProt dataset) to map the 15 example UniProt accessions — P04637,
  P38398, Q9Y6K9, P00533, P15056, O14763, Q13485, P42336, P45985, Q9NZQ7, O15111,
  P51587, Q9BXW4, P31749, P60484 — to their corresponding HGNC gene symbols.


  3. **Brief written guidance** (4–6 sentences) on how to handle one-to-many mappings
  (e.g., when a single UniProt accession maps to multiple HGNC symbols or vice versa)
  and what filtering strategy you recommend to produce a clean, unambiguous identifier
  mapping table suitable for downstream MOFA2 integration.'
target_skills:
- multi-omics-pipeline
domain: multi-omics
difficulty: easy
