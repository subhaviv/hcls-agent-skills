id: dicom-processing-23
prompt: 'You are a research coordinator at a neuroimaging center that has just acquired
  MRI data for a new study. A radiologist has provided you with a folder containing
  DICOM files for a single T1-weighted anatomical scan from one participant (subject
  ID: sub-001). The DICOM series is stored in the directory `/data/raw/sub-001/T1w/`
  and contains 176 axial slices acquired on a Siemens Prisma 3T scanner.


  You need to convert this DICOM series to NIfTI format using `dcm2niix` so it can
  be integrated into a BIDS-compliant dataset. The output should be placed in `/data/bids/sub-001/anat/`
  and the resulting files must follow BIDS naming conventions (e.g., `sub-001_T1w.nii.gz`
  and its accompanying JSON sidecar).


  Please provide the following:


  1. **The exact `dcm2niix` command** you would run, including appropriate flags to:
  compress the output to `.nii.gz`, name the output file correctly for BIDS (`sub-001_T1w`),
  and ensure a JSON sidecar file is generated alongside the NIfTI file.


  2. **A brief explanation** of what each flag in your command does.


  3. **A short Python code snippet** using `nibabel` that loads the resulting `sub-001_T1w.nii.gz`
  file and prints the image shape, voxel dimensions (zooms), and the affine matrix
  to verify the conversion was successful.


  4. **Two things you should visually or programmatically check** in the output to
  confirm the conversion is correct before proceeding with preprocessing.'
target_skills:
- dicom-processing
domain: imaging
difficulty: easy
