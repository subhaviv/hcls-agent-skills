id: imaging-study-design-14
prompt: 'A multicenter glioblastoma trial (GLIO-RADX) is collecting dynamic susceptibility
  contrast (DSC) MRI at three sites using different 3T scanners: Siemens Prisma (Site
  A, n=47), GE Premier (Site B, n=39), and Philips Ingenia (Site C, n=31). The protocol
  specifies a single-dose Gd injection, TR/TE = 1500/30ms, flip angle 60°, with rCBV
  as the primary imaging biomarker for treatment response at 8 weeks post-chemoradiation.


  Several issues have emerged: (1) Sites B and C did not apply preload contrast doses,
  while Site A did, creating systematic leakage correction differences; (2) A test-retest
  substudy at Site A (n=12) shows rCBV ICC = 0.61, which the sponsor considers insufficient;
  (3) Post-processing was performed with three different software packages (NordicICE,
  DSCoMAN, and a custom MATLAB script), and (4) Raw DICOM files from Site C contain
  burned-in patient initials in the upper-right corner of perfusion scout images.


  Please provide the following deliverables:


  1. A concrete harmonization strategy for the leakage correction discrepancy across
  sites, specifying which correction algorithm (e.g., Boxerman-Schmainda-Weisskoff,
  Bjørnerud) and normalization approach you recommend

  2. Three specific protocol or post-processing modifications to improve the test-retest
  ICC above 0.75

  3. A DICOM de-identification approach for the burned-in PHI at Site C, including
  a Python code snippet using pydicom that detects and redacts a defined pixel region

  4. A recommendation on whether to apply ComBat harmonization to rCBV maps before
  or after normalization to contralateral white matter, with justification'
target_skills:
- imaging-study-design
domain: imaging
difficulty: intermediate
