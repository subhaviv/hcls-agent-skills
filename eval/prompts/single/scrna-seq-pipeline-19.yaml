id: scrna-seq-pipeline-19
prompt: 'You are analyzing a single-cell RNA-seq dataset from a longitudinal study
  of 8 multiple sclerosis patients (4 treatment-naive, 4 post-interferon-beta treatment)
  across 3 time points, resulting in 24 samples with approximately 180,000 total cells
  after CellRanger processing. Initial Scrublet analysis flagged ~12% of cells as
  putative doublets, but you suspect this rate is inflated due to the high cell density
  in some samples.


  After loading all samples into a single AnnData object, you observe the following
  QC distributions: median genes per cell = 1,847, but with a bimodal distribution
  suggesting two distinct cell populations; mitochondrial gene percentage ranging
  from 2-45% with a long tail; and total counts ranging from 500-85,000 with several
  outlier libraries.


  Your specific challenges are:

  1. The bimodal gene distribution makes standard fixed-threshold filtering inappropriate

  2. Batch effects are severe (PC1 explains 34% of variance and separates by patient
  rather than treatment group)

  3. Three samples from time point 2 have unusually low median counts (~800) compared
  to others (~2,400)


  Provide: (1) Python code using Scanpy to implement adaptive per-sample QC filtering
  using MAD-based thresholds rather than fixed cutoffs, including how to handle the
  three low-quality samples; (2) a batch correction strategy comparing Harmony vs.
  scVI given this experimental design, with specific parameter recommendations for
  scVI including n_latent, n_layers, and whether to use continuous covariates; (3)
  code for identifying marker genes for each Leiden cluster while controlling for
  both patient identity and treatment status as covariates; and (4) an explanation
  of why standard Wilcoxon-based differential expression would be inappropriate here
  and what pseudobulk approach to use instead.'
target_skills:
