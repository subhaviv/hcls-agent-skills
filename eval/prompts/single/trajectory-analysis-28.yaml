id: trajectory-analysis-28
prompt: 'I''m analyzing a dataset of 14,200 human hematopoietic stem and progenitor
  cells (HSPCs) spanning erythroid, myeloid, and lymphoid lineages. After running
  scVelo in dynamical mode, I''m observing contradictory signals: RNA velocity arrows
  point confidently toward erythroid fates for ~340 cells annotated as "common myeloid
  progenitors" (CMPs), yet PAGA connectivity analysis shows strong graph edges (weight
  > 0.35) connecting these same CMPs to granulocyte-monocyte progenitors (GMPs). Additionally,
  diffusion pseudotime (DPT) rooted at HSCs places these CMPs at an intermediate pseudotime
  of 0.42, but CellRank''s GPCCA analysis assigns them 67% terminal state absorption
  probability toward erythroid fate despite the cells expressing high GATA1, KLF1,
  AND SPI1 simultaneously—a known conflicted transcriptional state.


  Please provide:

  1. A diagnostic framework to determine whether this contradiction reflects genuine
  biological plasticity, technical artifacts in splicing rate estimation, or annotation
  errors—including specific QC metrics to examine (minimum 4 metrics)

  2. Python code using scVelo and CellRank to compute per-cell velocity confidence
  scores and cross-validate them against the PAGA transition probabilities, flagging
  cells where these two signals disagree by more than 2 standard deviations

  3. A strategy for handling these "conflicted" cells in downstream fate mapping—specifically
  whether to exclude them, assign soft labels, or model them as a separate transient
  state using CellRank''s metacell framework

  4. Recommended parameter adjustments for the dynamical model (n_top_genes, min_shared_counts,
  fit_connected_states) that might resolve the splicing estimation issues for this
  co-expressing population'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: hard
