id: aws-genai-ml-architect-23
prompt: 'A regional health system with 45,000 annual patient encounters wants to deploy
  a clinical NLP pipeline on AWS to automatically extract ICD-10 diagnosis codes from
  unstructured physician progress notes stored in their EHR system. The notes contain
  PHI and must remain compliant with HIPAA throughout processing. The health system
  has an existing AWS account with a signed BAA, and their data science team has basic
  familiarity with Python but limited ML infrastructure experience.


  The pipeline needs to process approximately 500 new notes per day in near-real-time
  (within 2 hours of note creation), with extracted codes reviewed by a medical coder
  before final submission. They are considering two approaches: (1) using Amazon Comprehend
  Medical directly, or (2) fine-tuning a custom model on SageMaker using their 18
  months of historically coded notes (approximately 22,000 labeled examples).


  Please provide:


  1. A recommendation on whether to use Amazon Comprehend Medical vs. a custom SageMaker
  model, with justification based on their scale, team expertise, and compliance requirements

  2. A high-level AWS architecture diagram description showing all services involved
  (ingestion, processing, storage, review workflow, and audit logging)

  3. A simple Python code snippet demonstrating how to call Amazon Comprehend Medical''s
  `detect_entities_v2` API on a sample progress note and extract ICD-10 linked entities

  4. An explanation of which specific AWS services require a BAA and how PHI data
  should be handled at rest and in transit within this architecture'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: easy
