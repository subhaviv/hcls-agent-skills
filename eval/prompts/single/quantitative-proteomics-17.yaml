id: quantitative-proteomics-17
prompt: 'You are analyzing a TMT-16plex proteomics dataset from a clinical study comparing
  treatment-naive colorectal cancer patients (n=24) versus healthy controls (n=24),
  run across 3 separate TMT batches (16 samples per batch, with 2 bridge channels
  per batch using pooled reference). After processing in Proteome Discoverer, you
  have quantified 6,847 proteins, but notice the following issues in your proteinGroups
  output:


  1. **Ratio compression**: Your positive control proteins (spiked-in E. coli proteins
  at known 2:1 ratios) are showing observed ratios of only 1.4:1

  2. **Missing values**: 23% of protein entries have at least one missing TMT reporter
  ion value, with missingness concentrated in the cancer group for 340 proteins (suggesting
  MNAR pattern)

  3. **Batch effects**: PCA shows clear separation by batch rather than by disease
  status


  Given these challenges, provide:


  - A concrete normalization strategy to correct for both ratio compression and batch
  effects, specifying the order of operations (e.g., whether to apply IRS normalization
  before or after median centering)

  - A justified imputation approach that handles the mixed MAR/MNAR missingness, specifying
  different treatments for the 340 MNAR proteins versus the remaining MAR-pattern
  proteins

  - R code implementing the Internal Reference Scaling (IRS) normalization across
  the 3 batches using the bridge channel data, assuming your data is in a matrix called
  `tmt_matrix` with sample columns labeled by batch (B1_, B2_, B3_) and bridge channels
  labeled as B1_bridge1, B1_bridge2, etc.

  - An explanation of why ratio compression occurs in TMT experiments and how your
  normalization strategy partially mitigates it'
target_skills:
- quantitative-proteomics
domain: proteomics
difficulty: intermediate
