id: ehr-data-parsing-29
prompt: "You are building a clinical data pipeline that receives HL7v2 ORU^R01 messages\
  \ containing laboratory results, but your source system has several known data quality\
  \ issues. Below is a representative (anonymized) message with intentional problems:\n\
  \n```\nMSH|^~\\&|LAB_SYS|HOSP_A|EHR|HOSP_A|20231115143022||ORU^R01|MSG004521|P|2.5\n\
  PID|1||PT-98234^^^HOSP_A^MR||DOE^JANE^M||19850304|F|||123 ELM ST^^BOSTON^MA^02101\n\
  OBR|1||ORD-7721|85025^CBC WITH DIFF^CPT|||20231115140000\nOBX|1|NM|718-7^Hemoglobin^LN||14.2|g/dL|12.0-16.0|N|||F\n\
  OBX|2|NM|4544-3^Hematocrit^LN||UNKNOWN|%|36.0-46.0|N|||F\nOBX|3|NM|6690-2^WBC^LN||3.1|10*3/uL|4.5-11.0|L|||F\
  \  \nOBX|4|NM|777-3^Platelets^LN||-5|10*3/uL|150-400|N|||F\nOBX|5|TX|2093-3^Cholesterol^LN||185||<200|N|||F\n\
  ```\n\nYour task is to:\n1. Write a Python parser (using `hl7` library or raw string\
  \ parsing) that extracts all OBX segments into a pandas DataFrame with columns:\
  \ `patient_id`, `loinc_code`, `test_name`, `value`, `unit`, `reference_range`, `abnormal_flag`,\
  \ `result_status`\n2. Implement a data quality validation function that detects\
  \ and flags: non-numeric values in numeric (NM) fields, physiologically impossible\
  \ values (negative lab results), missing units on numeric observations, and type\
  \ mismatches between OBX-2 and actual value content\n3. Produce a quality report\
  \ dictionary summarizing counts of each error type found in this message\n4. Recommend\
  \ a corrective action strategy for each identified issue (imputation, rejection,\
  \ or flagging) with justification based on clinical data standards"
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: hard
