id: cdisc-compliance-22
prompt: 'In an SDTM dataset for a Phase III oncology trial (Study XYZ-2024), your
  programming team has collected laboratory results across 312 subjects. The lab data
  includes standard hematology and chemistry panels, but also three non-standard test
  codes that do not map to any CDISC Controlled Terminology value in the LBTESTCD
  codelist: "CTROPNI" (cardiac troponin I), "PROCALC" (procalcitonin), and "FIBDEG"
  (fibrin degradation products). The sponsor wants to include these results in the
  LB domain.


  Your task is to address the following:


  1. **Controlled Terminology handling**: Explain the correct CDISC SDTM approach
  for populating LBTESTCD, LBTEST, and LBCAT when a test code is not present in the
  CDISC CT codelist. What sponsor-defined terminology rules apply, and how should
  these be documented?


  2. **define.xml requirements**: Describe what entries are needed in the define.xml
  to properly declare these non-standard codelist values, including whether a Sponsor-Defined
  codelist or extensible codelist notation should be used.


  3. **Pinnacle 21 validation**: Identify which specific Pinnacle 21 validation rules
  are most likely to trigger for these three variables, and classify each finding
  by severity (Error, Warning, or Notice). Explain how to resolve or justify each
  finding for FDA submission.


  4. **SUPPQUAL consideration**: Determine whether any of the additional lab metadata
  (e.g., assay methodology = "ELISA" for CTROPNI) should be stored in SUPPLB rather
  than LB, and provide the correct SUPPQUAL variable mapping for one example record.


  Use SDTM Implementation Guide v3.3 as your reference standard.'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: easy
