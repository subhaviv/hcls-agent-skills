id: ngs-quality-control-17
prompt: 'You have completed initial sequencing of a whole-exome sequencing (WES) cohort
  of 45 pediatric leukemia samples. Before proceeding to variant calling, you need
  to run a comprehensive QC pipeline. Each sample has paired FASTQs (`sample_R1.fastq.gz`
  / `sample_R2.fastq.gz`) and a coordinate-sorted BAM (`sample.bam` with index). Your
  target intervals file is `targets.bed` (converted to `targets.interval_list` for
  Picard), and your reference is `ref.fasta`. Assume `THREADS=8` and `OUT=qc_out`.


  Your sequencing core reports that 8 of the 45 samples were sequenced on a different
  flow cell (samples labeled `FC2_*`) and may show batch effects. Additionally, preliminary
  inspection suggests some samples may have adapter contamination due to short insert
  sizes.


  **Deliverables:**


  1. Write a complete bash pipeline that runs **fastp** for adapter trimming and QC
  (with JSON/HTML output), followed by **mosdepth** for coverage analysis using the
  target intervals, and **Picard CollectHsMetrics** for hybrid-selection metrics —
  all for a single sample.


  2. Provide the **MultiQC command** that aggregates all three tools'' outputs from
  the `qc_out/` directory into a single report, ensuring the FC2 batch samples are
  visually distinguishable using a MultiQC sample grouping config file (`multiqc_config.yaml`).
  Show the relevant YAML content.


  3. Define **three specific QC thresholds** appropriate for WES data that you would
  use to flag samples as failing, citing which metric from which tool you''d use (e.g.,
  mean target coverage, duplication rate, adapter content).


  4. Explain how you would identify whether the FC2 batch samples cluster separately
  in the MultiQC report and what follow-up action you would take if they do.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: intermediate
