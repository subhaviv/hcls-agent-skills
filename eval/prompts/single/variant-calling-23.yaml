id: variant-calling-23
prompt: 'You are setting up a tumor-only somatic variant calling pipeline using GATK
  Mutect2 for a cohort of 45 formalin-fixed paraffin-embedded (FFPE) tumor samples
  from colorectal cancer patients. Your reference genome is GRCh38, and sequencing
  was performed on an Illumina NovaSeq 6000 with 150bp paired-end reads targeting
  ~150x mean coverage over a 500-gene panel (WES-like capture). You do not have matched
  normal samples available.


  Your team has preprocessed the BAMs through BWA-MEM2 alignment and GATK best-practices
  base quality score recalibration (BQSR). You plan to use a Panel of Normals (PoN)
  built from 45 unrelated normal blood samples sequenced on the same panel.


  Please provide the following:


  1. A complete GATK Mutect2 command for tumor-only calling on a single sample (sample
  ID: CRC_T021), incorporating the PoN, a germline resource (gnomAD AF-only VCF),
  and appropriate flags to handle FFPE-related artifacts.


  2. The subsequent FilterMutectCalls command with recommended parameters, including
  the `--max-events-in-region` and orientation bias artifact filtering steps using
  LearnReadOrientationModel.


  3. A brief explanation (3–5 sentences) of why the `--f1r2-tar-gz` output is critical
  for FFPE samples and how it feeds into the artifact filtering workflow.


  4. One additional GATK tool or flag you would apply specifically because matched
  normals are unavailable, and why it helps reduce germline contamination false positives
  in this tumor-only context.'
target_skills:
- variant-calling
domain: genomics
difficulty: easy
