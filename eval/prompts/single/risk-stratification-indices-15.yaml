id: risk-stratification-indices-15
prompt: 'A regional health system is preparing to launch a 30-day readmission reduction
  program targeting Medicare patients discharged from their 3 medical-surgical units.
  The care management team has access to the following data elements in their EHR:
  ICD-10 diagnosis codes, length of stay, admission acuity (emergent vs. elective),
  ED visit history (prior 6 months), discharge disposition, ZIP code of residence,
  and insurance type.


  The team is debating between using the LACE Index versus the Charlson Comorbidity
  Index (CCI) as their primary stratification tool. Their current patient population
  breakdown is: 1,840 discharges over the last quarter, with 23% having a prior ED
  visit, mean LOS of 4.2 days, and a 30-day readmission rate of 14.8%. Approximately
  31% of patients reside in ZIP codes mapping to Area Deprivation Index (ADI) deciles
  8–10.


  Please provide the following:


  1. A comparative analysis of LACE vs. CCI for 30-day readmission prediction in this
  specific context, including the conceptual strengths and limitations of each for
  this population

  2. A recommendation for which index (or combination) to use, with justification
  based on available data elements

  3. An explanation of how ADI decile data should be incorporated into the stratification
  workflow — whether as a standalone score modifier, a separate risk tier flag, or
  embedded within a composite score

  4. A sample Python function that takes patient-level inputs (LOS, acuity, ED visits,
  CCI score, ADI decile) and returns a composite risk category (Low / Medium / High
  / Very High) with suggested care management intervention level for each tier'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: intermediate
