id: imaging-study-design-25
prompt: 'You are coordinating a multi-site diffusion MRI study investigating white
  matter microstructure as a biomarker for treatment response in early Parkinson''s
  disease. The study enrolls 180 patients across 4 sites (Sites A–D), each with a
  different 3T scanner (Siemens Prisma, GE Discovery MR750, Philips Ingenia, Siemens
  Skyra). All sites acquire DTI with b=1000 s/mm², 64 directions, 2mm isotropic voxels,
  but gradient tables differ across vendors. Your primary biomarker is fractional
  anisotropy (FA) in the substantia nigra pars reticulata (SNpr), measured at baseline
  and 12 months post-treatment with levodopa. A pilot test-retest scan (n=12, same
  session, repositioned) at Site A yielded an intraclass correlation coefficient (ICC)
  of 0.71 for SNpr FA — below your pre-specified threshold of 0.80.


  Provide the following:


  1. **Root cause analysis**: List at least four plausible technical reasons why SNpr
  FA ICC falls below 0.80, ranked by likelihood given the acquisition parameters described.


  2. **Acquisition fixes**: Recommend specific protocol modifications that could improve
  test-retest reliability before full enrollment begins, with quantitative targets
  where applicable.


  3. **Harmonization strategy**: Describe a ComBat-based harmonization pipeline for
  FA maps across the four scanner vendors, specifying which covariates to preserve,
  what sample size per site is needed, and how to validate harmonization success.


  4. **Biomarker reconsideration**: Given the SNpr''s small size (~80 mm³) and the
  ICC concern, propose two alternative diffusion MRI biomarkers that may offer better
  reliability for this region, with justification referencing IBSI or TBSS methodology
  where appropriate.'
