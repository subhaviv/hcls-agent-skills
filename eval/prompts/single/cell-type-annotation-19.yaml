id: cell-type-annotation-19
prompt: 'You are analyzing a single-cell RNA-seq dataset from 45,000 PBMCs collected
  from 12 lupus patients and 10 healthy controls. After preprocessing and clustering
  (resolution=0.8, resulting in 22 Leiden clusters), you need to perform hierarchical
  cell type annotation. Initial marker gene analysis reveals that clusters 7 and 14
  both express CD3E and CD8A, but cluster 7 additionally shows high FOXP3 co-expression
  in ~30% of cells while the remaining 70% appear to be conventional CD8+ T cells.
  Cluster 14 shows uniform CD8A expression with GZMB and PRF1 markers. Furthermore,
  clusters 3 and 19 both score positive for plasmacytoid dendritic cell markers (LILRA4,
  CLEC4C) but cluster 19 also shows elevated IRF4 and CD38, suggesting possible plasmablast
  contamination.


  Your tasks:

  1. Write Python code using CellTypist with majority voting enabled on a pre-trained
  immune model, followed by a secondary marker-based reconciliation step to resolve
  the ambiguous clusters (7 and the mixed cluster 19)

  2. Implement a confidence scoring system that flags cells with CellTypist probability
  <0.5 as "uncertain" and routes them to SingleR for secondary annotation using the
  HumanPrimaryCellAtlasData reference

  3. Create a dotplot visualization showing canonical marker genes (CD3E, CD8A, FOXP3,
  GZMB, LILRA4, CLEC4C, IRF4, CD38) across all 22 clusters with cluster-level annotation
  labels overlaid

  4. Provide a decision logic (as commented code) explaining how to handle cells where
  CellTypist and SingleR annotations conflict for the ambiguous populations'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: hard
