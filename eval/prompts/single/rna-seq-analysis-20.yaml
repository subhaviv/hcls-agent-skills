id: rna-seq-analysis-20
prompt: 'You are analyzing a bulk RNA-seq dataset from 12 pediatric ALL (acute lymphoblastic
  leukemia) samples: 6 pre-treatment and 6 post-treatment with dexamethasone. Your
  Salmon quantification (using a decoy-aware index against GRCh38, with `--validateMappings`
  and `--gcBias` flags) shows average mapping rates of 91%, but when you import counts
  via `tximport` with `type="salmon"` and run DESeq2, you obtain only 47 differentially
  expressed genes at padj < 0.05. Your collaborator ran the same samples through STAR
  (2-pass mode, ENCODE parameters) + featureCounts (using Gencode v44 GTF, `-s 2`
  for reverse-stranded, paired-end) and found 312 DE genes under identical DESeq2
  settings. Both pipelines used the same `apeglm` shrinkage and the same design formula
  `~ patient_id + treatment`.


  Upon investigation you notice: (1) the Salmon index was built against Gencode v44
  transcriptome FASTA but without including the full genome as decoy; (2) featureCounts
  used `-p --countReadPairs` while the library is unstranded according to RSeQC''s
  `infer_experiment.py` (≈50%/50% split); (3) the tximport step used `ignoreTxVersion=FALSE`
  despite transcript IDs having version suffixes.


  Please provide:

  1. A ranked diagnosis of which of the three issues most likely explains the count
  discrepancy and why

  2. Corrected code snippets for both the Salmon index construction and the tximport
  call

  3. An explanation of how using `type="salmon"` vs `type="counts"` in tximport affects
  DESeq2''s variance modeling

  4. Recommendations for resolving the strandedness mismatch in featureCounts and
  how it would inflate or deflate counts'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: hard
