id: cell-type-annotation-30
prompt: 'You are analyzing a single-cell RNA-seq dataset from 47 pediatric ALL (acute
  lymphoblastic leukemia) patients containing 284,000 cells clustered into 38 Leiden
  clusters (resolution=1.2). You have run CellTypist with the `Immune_All_Low.pkl`
  model using `majority_voting=True`, but the results are problematic: 11 clusters
  are labeled as "Unassigned", 6 clusters show conflicting labels between majority
  voting and the raw per-cell predictions (>40% minority votes), and 3 clusters that
  should be B-cell precursors based on known marker genes (CD19, CD79A, VPREB1, DNTT)
  are being annotated as "Pro-B cells" by CellTypist but as "HSC/progenitors" by SingleR
  using the HumanPrimaryCellAtlasData reference.


  Your task is to resolve these annotation conflicts systematically:


  1. Write Python code to visualize the annotation uncertainty for all 38 clusters
  simultaneously — create a heatmap showing CellTypist probability scores across all
  predicted cell types (not just the winning label), and overlay this with a dotplot
  of the 4 B-cell precursor markers mentioned above.


  2. Write code to implement a hierarchical reconciliation strategy: first classify
  clusters into broad lineages (B-cell, T-cell, myeloid, stromal) using marker-based
  scoring with `sc.tl.score_genes()`, then apply CellTypist fine-grained labels only
  within each lineage subset, and finally handle the "Unassigned" clusters using a
  nearest-centroid approach in PCA space.


  3. Provide specific decision criteria (with probability thresholds) for when to
  trust CellTypist vs. SingleR vs. marker-based annotation, and explain why the B-cell
  precursor discrepancy is likely occurring given the leukemic context.'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: hard
