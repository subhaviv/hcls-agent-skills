id: cheminformatics-24
prompt: 'You are building a virtual screening pipeline for a kinase inhibitor program.
  You have a library of 50,000 compounds represented as SMILES strings stored in a
  CSV file (`library.csv` with columns: `compound_id`, `smiles`). You also have 3
  known active compounds (reference molecules) with the following SMILES:


  - **Ref1**: `Cc1ccc(NC(=O)c2ccc(CN3CCN(C)CC3)cc2)cc1Nc1nccc(-c2cccnc2)n1`

  - **Ref2**: `CS(=O)(=O)CCNCc1ccc(-c2ccc3ncnc(Nc4ccc(OCc5cccc(F)c5)c(Cl)c4)c3c2)o1`

  - **Ref3**: `O=C(Nc1cc2c(Nc3ccccc3F)ncnc2cc1OCC1CCCO1)c1ccc(F)cc1`


  Your task is to:


  1. **Write a complete Python script using RDKit** that computes Morgan fingerprints
  (radius=2, nBits=2048) for all library compounds and calculates the maximum Tanimoto
  similarity of each compound against the 3 reference molecules.

  2. **Filter the results** to retain only compounds with max Tanimoto ≥ 0.35 AND
  that pass Lipinski''s Rule of Five (allow max 1 violation).

  3. **Add PAINS filtering** using RDKit''s `FilterCatalog` to remove pan-assay interference
  compounds from the filtered set.

  4. **Report** what output columns the final DataFrame should contain and explain
  why the 0.35 Tanimoto threshold combined with Lipinski filtering is a reasonable
  strategy for this stage of virtual screening.


  Assume the library CSV is well-formed with valid SMILES. Include error handling
  for molecules that fail to parse.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: intermediate
