id: pa-clinical-policy-11
prompt: 'A 58-year-old patient with moderate-to-severe rheumatoid arthritis (RA) has
  been prescribed Abatacept (Orencia) 125mg subcutaneous weekly by their rheumatologist.
  The patient''s insurer, BlueCrest Health Plan, has issued a prior authorization
  denial citing failure to meet step therapy requirements. The plan''s RA biologics
  policy requires documented trial and failure of two conventional DMARDs (methotrexate
  and one additional agent such as hydroxychloroquine or sulfasalazine) before approving
  any biologic. Chart notes show the patient completed 6 months of methotrexate (15mg/week)
  but discontinued due to hepatotoxicity (ALT 3x upper limit of normal), and previously
  tried leflunomide for 4 months with inadequate response (DAS28 score remained at
  5.2).


  The treating physician believes this meets the step therapy criteria and wants to
  appeal the denial. You have access to the following documentation: rheumatology
  progress notes, lab results showing elevated liver enzymes, DAS28 scoring records,
  and a letter of medical necessity from the prescribing physician.


  Please provide:

  1. An analysis of whether this patient''s documented history satisfies BlueCrest''s
  step therapy requirements, identifying any gaps or strengths in the clinical record

  2. A recommended appeal strategy including the hierarchy of appeal steps (first-level,
  second-level, peer-to-peer review) with estimated timelines

  3. A draft peer-to-peer talking points document the physician can use when speaking
  with the plan''s medical director

  4. An explanation of how the "contraindication or intolerance" exception clause
  typically applies in commercial plan step therapy policies for this type of adverse
  drug reaction scenario'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: easy
