id: cdisc-compliance-28
prompt: 'A Phase III oncology trial (STUDY-4821) is preparing an FDA eCTD submission
  with SDTM 3.3 and ADaM 1.1 standards. The trial collected tumor response assessments
  per RECIST 1.1 criteria, including target lesion measurements, non-target lesion
  responses, and overall response determinations. The clinical team used a custom
  electronic system that captured 14 non-standard variables for tumor assessments,
  including TRLESION (lesion identifier), TRLOC (anatomical location free text), TRMETHOD
  (imaging modality), and TRCONFDT (confirmation date for CR/PR responses).


  The SDTM mapping team is debating whether to place tumor response data in the TR
  domain versus TU domain, and how to handle the 14 custom variables — specifically
  whether SUPPTU/SUPPTR is appropriate for all of them or whether some should be promoted
  to the parent domain or handled via RELREC relationships.


  Additionally, the ADaM oncology response dataset (ADRS) needs to reference both
  the TR and TU source domains, and the define.xml must include value-level metadata
  for the TRORRES variable, which contains heterogeneous values ("CR", "PR", "SD",
  "PD", "NE" for overall response but millimeter measurements for target lesions).


  Please provide:

  1. A domain allocation decision (TR vs TU vs both) with regulatory justification
  citing CDISC Oncology User Guide recommendations

  2. A classification framework for the 14 custom variables — which belong in SUPPQUAL
  vs. promoted to parent domain vs. RELREC, with specific criteria applied to TRLESION,
  TRLOC, TRMETHOD, and TRCONFDT

  3. The ADRS dataset structure showing required BDS variables and linkage back to
  TR/TU via IDVAR/IDVARVAL

  4. Value-level metadata design for TRORRES in define.xml, including separate CodeList
  references for the two distinct value types'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: hard
