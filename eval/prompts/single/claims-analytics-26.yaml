id: claims-analytics-26
prompt: 'A regional health plan has provided you with a batch of X12 837P professional
  claim files covering 45,000 claims submitted over Q3 2024 by 312 providers across
  8 specialties. Your fraud analytics team suspects a subset of internal medicine
  providers may be engaged in **E&M upcoding** — specifically over-utilizing CPT codes
  99214 and 99215 compared to specialty peers.


  You have parsed the raw X12 segments into a pandas DataFrame with columns: `claim_id`,
  `provider_npi`, `specialty_code`, `service_date`, `cpt_code`, `units`, `billed_amount`,
  `place_of_service`, `patient_dob`, and `diagnosis_codes` (list of ICD-10s).


  **Deliverables required:**


  1. **Python code** to compute each internal medicine provider''s E&M distribution
  (CPT 99211–99215) as a percentage breakdown, then flag providers whose 99214+99215
  combined rate exceeds 2 standard deviations above the specialty mean.


  2. **SQL query** (assume the DataFrame is loaded into a table called `claims`) that
  identifies providers billing 99215 on more than 85% of their E&M visits AND have
  at least 50 E&M claims in the quarter — a classic high-complexity upcoding signal.


  3. **Benford''s Law analysis** in Python applied to the `billed_amount` column for
  the flagged providers only, testing whether first-digit distributions deviate significantly
  from expected Benford proportions using a chi-square test (α = 0.05).


  4. A brief **interpretation guide** explaining how to combine the E&M outlier flags
  and Benford''s Law results to prioritize which providers warrant a full audit referral
  versus routine monitoring.'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: intermediate
