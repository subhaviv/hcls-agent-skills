id: cell-type-annotation-13
prompt: 'You have processed a 10x Genomics scRNA-seq dataset from human peripheral
  blood mononuclear cells (PBMCs) containing 8,500 cells across 14 Leiden clusters
  (resolution 0.5). You want to annotate these clusters using canonical marker genes
  rather than an automated tool.


  Your marker gene panel includes:

  - **T cells**: CD3D, CD3E, CD3G

  - **CD4+ T cells**: CD4, IL7R, CCR7

  - **CD8+ T cells**: CD8A, CD8B, GZMB

  - **B cells**: CD19, MS4A1, CD79A

  - **NK cells**: GNLY, NKG7, NCAM1

  - **Monocytes**: CD14, LYZ, FCGR3A

  - **Dendritic cells**: FCER1A, CST3, CLEC4C

  - **Platelets**: PPBP, PF4


  Please provide the following deliverables:


  1. **Python code** using Scanpy to generate a dot plot (`sc.pl.dotplot`) showing
  expression of all listed marker genes across the 14 clusters, with genes grouped
  by cell type and clusters on the y-axis. Save the figure as `pbmc_markers_dotplot.pdf`.


  2. **Python code** to compute a ranked marker gene table per cluster using `sc.tl.rank_genes_groups`
  (Wilcoxon method) and export the top 10 genes per cluster to a CSV file named `cluster_markers_top10.csv`.


  3. A **brief annotation logic** (as Python dictionary) mapping each of the 14 cluster
  IDs (0–13) to a provisional cell type label based on hypothetical but realistic
  PBMC marker expression patterns, including at least one cluster labeled as "Unknown"
  and one split between two CD8+ T cell subtypes (effector vs. naive).'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: easy
