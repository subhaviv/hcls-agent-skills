id: protein-structure-analysis-18
prompt: 'A crystallographer has solved two structures of the same kinase domain (UniProt:
  KIN7_HUMAN) in different states: an apo form (PDB-like file: `kin7_apo.pdb`, resolution
  1.8 Å) and a ligand-bound form (`kin7_holo.pdb`, resolution 2.1 Å). Both structures
  contain chain A only, but the holo structure has 12 additional residues resolved
  in the activation loop (residues 156–167) that are disordered in the apo structure.
  The holo structure also contains a small molecule ligand with residue name `LIG`
  in chain A.


  Upon initial superposition using all Cα atoms, the reported RMSD is unexpectedly
  high at 4.7 Å. You suspect this is driven by the activation loop conformational
  change rather than global structural differences.


  **Please provide:**


  1. **Python code** using Biopython that performs superposition using only the structurally
  conserved regions (excluding residues 145–175 of the activation loop), computes
  the Cα RMSD for these core regions, and reports per-residue RMSD values identifying
  the top 10 most divergent residues outside the activation loop.


  2. **DSSP-based analysis** code that assigns secondary structure to both structures
  and identifies any secondary structure elements that appear, disappear, or shift
  by more than 3 residues between the two states.


  3. **Binding pocket detection logic** that uses the holo structure''s LIG coordinates
  as a reference to define the pocket (within 6 Å), then checks whether this pocket
  is present (using geometric criteria, not fpocket) in the apo structure after superposition.


  4. A brief interpretation of what a high per-residue B-factor (>60 Ų) in residues
  156–167 of the holo structure would indicate about the ligand''s effect on activation
  loop dynamics.'
