id: pharmacoepidemiology-25
prompt: 'You are conducting a pharmacoepidemiologic study using a large US commercial
  claims database (n = 847,000 insured adults) to evaluate whether GLP-1 receptor
  agonists (GLP-1 RAs) reduce the risk of major adverse cardiovascular events (MACE)
  compared to DPP-4 inhibitors in patients with type 2 diabetes. You plan to use a
  new-user active comparator design with IPTW.


  **Specific context:**

  - Index date = first prescription fill for either drug class

  - Minimum 180-day pre-index enrollment required for covariate assessment

  - Follow-up ends at disenrollment, outcome, or 36 months

  - 23,400 new users of GLP-1 RAs; 41,200 new users of DPP-4 inhibitors

  - Key covariates: HbA1c (available in only 31% of patients via linked lab data),
  BMI (available in 58%), prior cardiovascular disease, diabetes duration, baseline
  metformin use

  - MACE incidence: ~2.1 per 100 person-years in DPP-4 group


  **Deliverables requested:**


  1. Explain how you would construct stabilized IPTW weights and specify the propensity
  score model covariates, explicitly addressing the missing HbA1c and BMI data.


  2. Describe two diagnostics you would run to assess weight quality and what thresholds
  would concern you.


  3. A study-eligible patient fills their first GLP-1 RA prescription on Day 0 but
  doesn''t experience MACE until Day 47. However, an analyst accidentally assigns
  follow-up start to the insurance enrollment date (Day −210). Identify the bias introduced
  and quantify its approximate direction and magnitude on the hazard ratio.


  4. Given the residual confounding concern from missing HbA1c, calculate the E-value
  for a hazard ratio of 0.78 (95% CI lower bound: 0.71) and interpret what it means
  for study validity.'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: intermediate
