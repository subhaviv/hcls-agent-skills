id: scrna-seq-pipeline-28
prompt: 'You are analyzing a large-scale scRNA-seq dataset from a longitudinal study
  of 18 multiple sclerosis patients (9 treated with interferon-beta, 9 untreated controls)
  across 3 time points (baseline, 6 months, 12 months), resulting in 54 samples totaling
  approximately 380,000 cells after initial CellRanger processing. The data is stored
  as separate 10X filtered_feature_bc_matrix directories per sample.


  During QC, you discover the following complications: (1) treated samples at 12 months
  show bimodal mitochondrial content distributions (peaks at 8% and 22%), suggesting
  a biological rather than technical origin for high-mito cells in this condition;
  (2) Scrublet doublet scores are unusually elevated across all interferon-beta treated
  samples (mean predicted doublet rate of 18% vs 6% in controls), likely due to interferon-induced
  transcriptional similarity between cell types; (3) the dataset spans two sequencing
  platforms (10X Chromium v2 for baseline, v3 for later timepoints), introducing strong
  technical batch effects confounded with the biological time variable.


  Please provide:

  1. A complete Scanpy pipeline (Python code) that loads all 54 samples with appropriate
  metadata, implements adaptive per-sample QC thresholds using MAD-based outlier detection
  rather than fixed cutoffs, and handles the bimodal mitochondrial issue with a justified
  approach

  2. A strategy for adjusting Scrublet thresholds specifically for the interferon-treated
  samples without over-removing real cells, including modified code

  3. A batch correction approach using Harmony that accounts for the confounded platform/timepoint
  variable, with specific `harmony_integrate` parameters and an explanation of why
  scVI might be preferred here

  4. Code to perform differential expression between treatment groups within each
  Leiden cluster while controlling for patient identity as a random effect'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: hard
