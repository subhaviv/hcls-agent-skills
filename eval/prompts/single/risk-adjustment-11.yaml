id: risk-adjustment-11
prompt: "Here is test question #11 of 30:\n\n---\n\nYou are building a CMS-HCC risk\
  \ adjustment pipeline for a Medicare Advantage plan with 8,500 members. Your data\
  \ team has extracted the following ICD-10 codes from claims for a single member\
  \ (Member ID: MA-004721, Age: 72, Sex: Male, Medicaid-eligible: No, originally disabled:\
  \ No):\n\n- E11.65 (Type 2 diabetes with hyperglycemia)\n- E11.40 (Type 2 diabetes\
  \ with diabetic neuropathy, unspecified)\n- I50.32 (Chronic diastolic heart failure)\n\
  - I50.22 (Chronic systolic heart failure)\n- N18.4 (Chronic kidney disease, stage\
  \ 4)\n- E11.65 (duplicate — ignore)\n\nUsing the **CMS-HCC Model V28** coefficient\
  \ table and hierarchy rules, please provide the following deliverables:\n\n1. **ICD-10-to-HCC\
  \ Crosswalk**: Map each unique ICD-10 code to its corresponding HCC category number\
  \ and label.\n\n2. **Hierarchy Resolution**: Apply CMS hierarchy rules to remove\
  \ any dominated HCC categories. Show which HCCs are retained vs. suppressed and\
  \ explain why.\n\n3. **RAF Score Calculation**: Using the V28 community non-dual\
  \ aged segment coefficients below, compute the total RAF score for this member:\n\
  \   - Demographics (Age 70–74, Male): 0.379\n   - HCC 37 (Diabetes with Chronic\
  \ Complications): 0.302\n   - HCC 211 (Chronic Kidney Disease, Stage 4): 0.289\n\
  \   - HCC 135 (Heart Failure): 0.323\n   - Interaction term HCC37 + HCC135: 0.115\n\
  \n4. **Python Code**: Write a concise Python function `calculate_raf(member_dict)`\
  \ that accepts a dictionary of member demographics and a list of HCC codes, applies\
  \ the coefficients above, and returns the total RAF score.\n\n---"
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: easy
