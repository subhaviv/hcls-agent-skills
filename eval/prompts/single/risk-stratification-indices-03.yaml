id: risk-stratification-indices-03
prompt: 'A community health system is implementing a readmission reduction program
  and needs to select an appropriate comorbidity index for risk-stratifying their
  12,500 Medicare Advantage patient population. The care management team has collected
  the following summary data from the past 12 months:


  - Average patient age: 71.3 years

  - Top diagnoses: Type 2 diabetes (38%), CHF (24%), COPD (19%), CKD stage 3-4 (15%),
  dementia (8%)

  - 30-day all-cause readmission rate: 14.2%

  - Available data sources: ICD-10-CM coded discharge records, pharmacy claims, but
  NO procedure codes or lab values


  The medical director is debating between using the **Charlson Comorbidity Index
  (CCI)** and the **Elixhauser Comorbidity Index** for this initiative. She wants
  to understand which index is more appropriate for this specific use case and patient
  population.


  Please provide the following deliverables:


  1. **A brief comparison** of CCI versus Elixhauser Index, highlighting the structural
  differences (number of conditions, weighting methodology, and original derivation
  purpose)


  2. **A recommendation** for which index to use given this population and the readmission
  reduction goal, with at least two evidence-based justifications


  3. **A simple scoring example** showing how a single fictional patient (67-year-old
  male with CHF, CKD stage 3, and Type 2 diabetes with complications) would be scored
  differently under each index using standard ICD-10 mappings


  4. **One limitation** of your recommended index that the care team should monitor
  during implementation'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: easy
