id: multi-omics-pipeline-11
prompt: 'Here is test question #11 of 30:


  ---


  You are analyzing a multi-omics dataset from a colorectal cancer study involving
  85 tumor samples with matched RNA-seq (gene expression) and proteomics (mass spectrometry)
  data. The RNA-seq data uses Ensembl gene IDs (e.g., ENSG00000141510 for TP53), while
  the proteomics data uses UniProt accession numbers (e.g., P04637 for TP53). Before
  integrating these two layers in a downstream MOFA2 analysis, you need to harmonize
  the feature identifiers so both datasets share a common HGNC gene symbol namespace.


  Using the **biomaRt** R package, please provide:


  1. **Complete R code** that queries Ensembl BioMart to map a vector of 5 example
  Ensembl IDs — `c("ENSG00000141510", "ENSG00000012048", "ENSG00000139618", "ENSG00000157764",
  "ENSG00000171862")` — to their corresponding HGNC gene symbols and UniProt Swiss-Prot
  accession numbers in a single query.


  2. **A second code block** that maps the UniProt accessions `c("P04637", "P38398",
  "P51587", "P15056", "P60484")` back to HGNC symbols using biomaRt, so you can verify
  the cross-mapping is consistent.


  3. **A brief explanation** (3–5 sentences) of how you would handle cases where a
  single Ensembl ID maps to multiple UniProt accessions or where no mapping is found
  (NA values), specifically in the context of preparing a clean feature matrix for
  MOFA2 input.


  Assume you are using Ensembl release 109 and the `hsapiens_gene_ensembl` dataset.'
target_skills:
- multi-omics-pipeline
domain: multi-omics
difficulty: easy
