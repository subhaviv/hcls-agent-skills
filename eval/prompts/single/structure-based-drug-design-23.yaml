id: structure-based-drug-design-23
prompt: 'You are designing a virtual screening campaign against a newly solved crystal
  structure of KRAS G12C (PDB-like entry: 4XYZ, resolution 2.1 Å). The structure reveals
  a well-defined covalent binding pocket (Switch II Pocket, S-IIP) with the mutant
  cysteine C12 clearly positioned. Your compound library contains 500,000 molecules
  from an in-house collection, and you have computational resources allowing approximately
  72 hours of wall-clock time on a 64-core cluster.


  Given this scenario, please provide the following:


  1. **Screening cascade design**: Outline a step-by-step virtual screening funnel
  that reduces the 500,000 compounds to a manageable set of ~200 candidates for experimental
  testing. Specify which computational methods to apply at each stage and the approximate
  compound count after each filter.


  2. **Covalent docking considerations**: Explain how your docking strategy must differ
  from a standard non-covalent docking workflow for this covalent target, including
  which software tools are appropriate and what warhead functional groups you would
  prioritize in your library filter.


  3. **Scoring function selection**: Recommend a primary and a backup scoring function
  for ranking covalent docked poses, and justify your choices based on the known limitations
  of empirical vs. physics-based scoring in covalent systems.


  4. **Binding site definition**: Describe the key residues and physicochemical properties
  you would use to define the S-IIP pharmacophore model, including at least three
  specific interaction features based on known KRAS inhibitor binding data.


  Keep your response practical and grounded in current computational drug discovery
  methodology.'
