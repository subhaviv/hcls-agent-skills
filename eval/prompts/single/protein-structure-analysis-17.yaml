id: protein-structure-analysis-17
prompt: 'You are analyzing two crystal structures of the kinase domain of a fictional
  protein **DYRK7** — one in its apo form (PDB-like file: `dyrk7_apo.pdb`) and one
  bound to an inhibitor compound **CMP-4471** (`dyrk7_bound.pdb`). Both structures
  contain a single chain (Chain A), residues 12–318, with occasional missing residues
  at loops. The apo structure has mean B-factor of 42 Å² while the bound structure
  shows mean B-factor of 28 Å².


  Your goal is to characterize conformational changes upon inhibitor binding and assess
  the binding pocket. Specifically:


  1. **Write Python code using Biopython** to superpose the two structures (Cα atoms
  only, residues 12–318 excluding any residue gaps), compute the global Cα RMSD, and
  identify per-residue Cα RMSD values exceeding 2.0 Å — output these as a sorted list.


  2. **Write Python code** to run DSSP on both structures and compare secondary structure
  assignments residue-by-residue, reporting any residues that change between helix/sheet/coil
  classifications upon binding.


  3. **Describe the fpocket command-line workflow** you would use on `dyrk7_bound.pdb`
  to detect binding pockets, and explain which fpocket output metrics (druggability
  score, volume, hydrophobicity) you would use to rank the top pocket as the likely
  CMP-4471 binding site.


  4. **Given the higher B-factors in the apo structure**, explain what this implies
  about DYRK7 flexibility, and recommend specific residue ranges (based on typical
  kinase activation loop positions around residues 185–210) that should be examined
  for disorder in the Ramachandran plot.'
