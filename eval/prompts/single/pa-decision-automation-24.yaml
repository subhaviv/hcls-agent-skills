id: pa-decision-automation-24
prompt: 'A regional health plan processes approximately 4,200 prior authorization
  requests monthly across musculoskeletal, oncology, and behavioral health service
  lines. Your team has trained a gradient boosting PA decision classifier on 18 months
  of historical adjudication data (roughly 75,600 decisions), achieving 84% overall
  accuracy. However, stakeholders have raised concerns after noticing that denials
  for behavioral health requests appear disproportionately concentrated among members
  in ZIP codes with median household income below $45,000.


  The feature set includes: diagnosis code (ICD-10), requested procedure (CPT), requesting
  provider NPI, member age, member ZIP code median income (census-linked), days since
  last authorization, prior denial count, and clinical notes embedding (128-dim BERT
  vector).


  Your task is to investigate and address potential proxy discrimination in this classifier:


  1. **Bias audit**: Describe the specific fairness metrics you would compute (e.g.,
  equalized odds, demographic parity difference) to quantify disparity across income-based
  subgroups, and provide pseudocode implementing these calculations using the predicted
  probabilities and ground-truth labels.


  2. **SHAP analysis**: Explain how you would use SHAP values to determine whether
  ZIP code median income is acting as a proxy feature driving behavioral health denials,
  including how to aggregate SHAP contributions across the behavioral health subset
  specifically.


  3. **Remediation strategy**: Propose two concrete model or pipeline modifications
  to reduce proxy discrimination without simply removing the income feature entirely—justify
  each approach with expected trade-offs on accuracy versus fairness.


  4. **Regulatory framing**: Briefly identify which CMS or HHS regulatory provisions
  (e.g., Section 1557, CMS interoperability rules) are most relevant to algorithmic
  fairness in PA automation, and what documentation your team should maintain for
  audit readiness.'
target_skills:
- pa-decision-automation
domain: healthcare-ops
difficulty: intermediate
