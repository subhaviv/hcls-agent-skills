id: pa-clinical-policy-17
prompt: 'A 58-year-old patient with moderate-to-severe plaque psoriasis (BSA 22%,
  PASI score 18.4) has been prescribed secukinumab (Cosentyx) 300mg by their dermatologist.
  The commercial payer''s prior authorization policy requires documented failure of
  two conventional systemic therapies (methotrexate AND either cyclosporine or acitretin)
  before approving any biologic. The patient''s chart shows: (1) methotrexate 15mg/week
  for 9 weeks discontinued due to elevated LFTs (ALT 3x ULN), (2) a contraindication
  to cyclosporine due to uncontrolled hypertension (BP averaging 158/96), and (3)
  acitretin never tried. The dermatologist argues that the step therapy requirements
  cannot be safely completed given the contraindications.


  Please provide the following deliverables:


  1. **Clinical Policy Analysis**: Evaluate whether this patient''s documented contraindications
  constitute sufficient grounds for a step therapy exception under standard utilization
  management criteria, citing relevant medical necessity principles.


  2. **Appeal Letter Framework**: Draft the key clinical arguments and supporting
  documentation checklist that should accompany a formal PA appeal or peer-to-peer
  review request, specifically addressing how to frame the contraindication evidence.


  3. **FHIR Da Vinci PAS Representation**: Provide a abbreviated FHIR JSON snippet
  showing how to encode the step therapy exception request, including the relevant
  `Claim` or `ClaimResponse` resource elements and the prior authorization supporting
  documentation references for the contraindication data.


  4. **Risk Assessment**: Identify two scenarios where this appeal could be denied
  despite the contraindications, and recommend preemptive documentation strategies
  to counter each denial rationale.'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: intermediate
