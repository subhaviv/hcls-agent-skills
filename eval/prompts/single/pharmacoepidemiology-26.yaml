id: pharmacoepidemiology-26
prompt: 'A healthcare system wants to study whether initiating metformin versus sulfonylureas
  reduces the risk of incident dementia among adults with type 2 diabetes using a
  10-year claims database (n = 847,000 patients). The research team has identified
  several methodological challenges they need to address simultaneously.


  **Context:** The database captures prescription fills, diagnoses, procedures, and
  lab values (HbA1c, eGFR). Patients enter the database at varying times, and many
  have been on diabetes medications for years before the observation window opens.
  The outcome (dementia diagnosis) typically requires 2–3 years of follow-up to accumulate
  sufficient events. The team is concerned about: (1) confounding by indication since
  metformin is contraindicated in severe renal impairment, (2) time-varying HbA1c
  values that are both confounders and mediators, and (3) treatment switching during
  follow-up.


  **Please provide:**

  1. A complete new-user active comparator cohort definition, including washout period
  length, index date specification, and inclusion/exclusion criteria with clinical
  justification

  2. Explain why a marginal structural model (MSM) with IPTW is preferred over standard
  Cox regression here, specifically addressing the time-varying confounding problem

  3. Provide R pseudocode implementing stabilized IPTW weights using a time-varying
  treatment model, including the weight stabilization formula and a check for extreme
  weights (truncation at 1st/99th percentile)

  4. Describe two negative control outcomes appropriate for this study and explain
  what a null result on these controls would imply about residual confounding

  5. Calculate an E-value for a hypothetical observed hazard ratio of 0.78 (95% CI
  lower bound: 0.71) and interpret what it means for unmeasured confounding in this
  specific clinical context'
target_skills:
- pharmacoepidemiology
domain: pharmacoepidemiology
difficulty: intermediate
