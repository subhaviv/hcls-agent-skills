id: claims-billing-rules-26
prompt: 'A regional Medicare contractor is conducting a targeted audit of a high-volume
  orthopedic surgery group after their claims data flagged several anomalies. The
  practice has 4 surgeons and submitted the following claims patterns over a 6-month
  period:


  - **Modifier 59** appended to CPT 29881 (knee arthroscopy with meniscectomy) alongside
  CPT 29876 (synovectomy) on the same date in 847 instances — a 94% co-billing rate

  - **Modifier 25** used on 91% of E&M visits (99213–99215) performed on the same
  day as minor surgical procedures

  - CPT 27447 (total knee arthroplasty) billed with CPT 27310 (arthrotomy for infection)
  for the same knee on the same date in 23 cases

  - Post-operative E&M visits billed during the 90-day global surgery period for 27447
  without modifier 24 in 156 instances


  Using your knowledge of NCCI edit logic, global surgery period rules, and FWA detection
  methodology, provide the following:


  1. For each of the four billing patterns above, classify it as a likely **coding
  error**, **systematic billing abuse**, or **potential fraud** — with specific reasoning
  for each classification

  2. Explain which NCCI modifier indicators apply to the 29881/29876 pair and whether
  modifier 59 can legitimately override the edit

  3. Describe the **documentation requirements** that would need to be present to
  support the modifier 25 usage rate

  4. Calculate the **estimated overpayment exposure** assuming average allowed amounts
  of $1,200 for arthroscopy pairs, $180 for E&M visits, and $8,500 for TKA-related
  pairs, and recommend a **corrective action plan**'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: intermediate
