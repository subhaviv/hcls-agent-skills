id: quantitative-proteomics-13
prompt: "A graduate student is analyzing a label-free quantification (LFQ) proteomics\
  \ dataset from MaxQuant, comparing tumor vs. normal tissue samples (n=8 per group).\
  \ After loading the `proteinGroups.txt` file into R and filtering for contaminants\
  \ and reverse hits, they have a matrix of 3,847 protein groups with LFQ intensity\
  \ values. Upon inspection, approximately 28% of values are missing (zeros in MaxQuant\
  \ output).\n\nThe student runs a quick visualization and notices that missing values\
  \ are **not randomly distributed** — proteins like APOC3, SERPINA1, and MUC16 are\
  \ entirely absent in one condition but consistently detected in the other, while\
  \ other proteins like ACTB and GAPDH show sporadic missingness scattered across\
  \ both groups.\n\nThe student wants to perform differential expression analysis\
  \ using `limma` but is unsure how to handle the mixed missingness pattern before\
  \ normalization and modeling.\n\nPlease provide:\n\n1. **Explain** the difference\
  \ between MCAR/MAR and MNAR missingness, and classify the two types of missing value\
  \ patterns observed in this dataset.\n\n2. **Recommend** a hybrid imputation strategy\
  \ appropriate for this mixed missingness scenario, naming specific R functions or\
  \ packages (e.g., from `DEP`, `imputeLCMD`, or `mice`).\n\n3. **Write R code** (using\
  \ `DEP` or base R/tidyverse) that:\n   - Log2-transforms the LFQ intensities\n \
  \  - Applies median centering normalization\n   - Implements MinProb imputation\
  \ for MNAR values and kNN imputation for MAR values\n\n4. **Briefly justify** why\
  \ applying kNN imputation globally to this dataset (without distinguishing missingness\
  \ type) would be inappropriate."
target_skills:
- quantitative-proteomics
domain: proteomics
difficulty: easy
