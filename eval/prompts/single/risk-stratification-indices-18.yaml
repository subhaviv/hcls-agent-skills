id: risk-stratification-indices-18
prompt: 'A regional health system is evaluating 30-day readmission risk for 4,200
  patients discharged from their cardiac service line over the past 12 months. The
  analytics team has preliminary LACE scores computed for all patients (mean = 9.2,
  SD = 2.8), but the CMO is questioning whether LACE alone is sufficient given that
  38% of their patient population resides in ADI national percentile ranks ≥ 85 (high
  deprivation) and 22% have documented Z-codes for food insecurity (Z59.4) or housing
  instability (Z59.0/Z59.1).


  Internal validation shows LACE achieved a C-statistic of 0.61 in this population,
  compared to the published benchmark of 0.68–0.72. The team is also considering switching
  to the Elixhauser Comorbidity Index or a hybrid model, but a recent internal study
  found that Elixhauser over-flags patients with multiple chronic conditions who are
  clinically stable and well-managed (resulting in ~31% false-positive rate at their
  chosen intervention threshold).


  Given this scenario, provide the following deliverables:


  1. A structured critique of why LACE is underperforming in this specific population
  and what the C-statistic gap implies clinically

  2. A comparison of Elixhauser vs. Charlson for this cardiac cohort, addressing the
  false-positive concern

  3. A recommended hybrid stratification framework that integrates ADI deciles and
  Z-code burden alongside a clinical index, including how to weight SDOH factors relative
  to clinical comorbidity scores

  4. Pseudocode for a composite risk score algorithm that combines LACE, ADI percentile
  rank, and a Z-code count variable, with a suggested intervention threshold and rationale'
target_skills:
