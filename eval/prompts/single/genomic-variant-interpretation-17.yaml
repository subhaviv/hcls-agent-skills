id: genomic-variant-interpretation-17
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory reports a variant in **BRCA2**:
  c.7976+3A>G (NM_000059.4). The following evidence is available:


  - **SpliceAI scores**: Donor loss = 0.61, Acceptor gain = 0.04, Donor gain = 0.02,
  Acceptor loss = 0.01

  - **gnomAD v3.1 (non-cancer)**: 4 heterozygous alleles observed out of 152,310 total
  alleles (no homozygotes)

  - **ClinVar**: 2 submissions — one "Uncertain significance" (clinical lab, 2019)
  and one "Likely pathogenic" (research lab, 2022, no assertion criteria provided)

  - **REVEL score**: 0.31 (intronic position, score may not be applicable)

  - **Functional data**: No published RNA splicing assays for this specific variant;
  a nearby variant c.7976+4A>T has published evidence of partial exon skipping (~40%
  aberrant transcript)

  - **Family history**: Two first-degree relatives with breast cancer (ages 38 and
  42 at diagnosis), one second-degree relative with ovarian cancer


  **Deliverables requested:**


  1. Evaluate whether **PVS1** applies to this splice-region variant and at what strength
  (full, moderate, supporting), citing the Tayoun et al. 2018 PVS1 decision framework.

  2. Apply all applicable **ACMG/AMP 2015 criteria** (both pathogenic and benign),
  explicitly stating which criteria are met, at what strength, and why.

  3. Provide a **final classification** (Pathogenic/Likely Pathogenic/VUS/Likely Benign/Benign)
  with justification.

  4. Describe what **one additional piece of evidence** would most efficiently resolve
  the classification if it remains a VUS.'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: intermediate
