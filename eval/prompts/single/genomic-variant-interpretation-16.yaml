id: genomic-variant-interpretation-16
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory reports a variant in **BRCA2**:
  c.7976+3A>G (NM_000059.4). The following evidence is available:


  - **SpliceAI scores**: Donor loss: 0.61, Acceptor loss: 0.02, Donor gain: 0.08,
  Acceptor gain: 0.03

  - **ClinVar**: 2 submissions — one "Uncertain Significance" (2019, no evidence provided)
  and one "Likely Pathogenic" (2021, clinical laboratory, 3-star)

  - **gnomAD v3.1**: allele frequency = 0.000031 (4 heterozygous carriers, 0 homozygous)

  - **REVEL score**: Not applicable (splice variant)

  - **Family history**: Two first-degree relatives with breast cancer (ages 38 and
  42), one second-degree relative with ovarian cancer

  - **Functional data**: No published RNA studies for this specific variant; a nearby
  variant c.7976+5G>C has published evidence of 60% aberrant splicing


  **Deliverables requested:**


  1. Apply relevant ACMG/AMP 2015 criteria systematically, explicitly stating which
  criteria are met (with strength levels) and which are not applicable or absent.

  2. Determine the final variant classification and justify the evidence combination
  using the Tavtigian et al. point-based scoring framework.

  3. Explain how the SpliceAI score of 0.61 should be weighted — does it reach the
  threshold for PP3 or stronger evidence, and why?

  4. Discuss whether the nearby c.7976+5G>C functional data can be used as supporting
  evidence for this variant, and under what ClinGen guidance this would be permissible.

  5. Provide a clinical reporting recommendation, including whether this classification
  should prompt cascade testing in family members.'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: intermediate
