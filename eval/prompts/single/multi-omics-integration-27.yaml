id: multi-omics-integration-27
prompt: 'You are conducting a multi-omics study on 847 treatment-naive colorectal
  cancer patients from three clinical sites (Site A: n=312, Site B: n=289, Site C:
  n=246). You have collected four omics layers, but with varying sample coverage:
  whole-genome methylation arrays (847/847 patients), RNA-seq transcriptomics (847/847),
  reverse-phase protein arrays measuring 258 proteins (601/847), and untargeted serum
  metabolomics via LC-MS (423/847). All patients have clinical outcome data (5-year
  survival, microsatellite instability status, KRAS/BRAF mutation calls).


  You want to identify robust multi-omic subtypes using MOFA+ and subsequently validate
  them with iCluster+, but the partial sample overlap and multi-site batch effects
  are major concerns before any factor decomposition.


  Please provide:


  1. A step-by-step batch correction strategy that accounts for both site effects
  and the partial sample overlap across omics layers — specify which tools (e.g.,
  ComBat-seq, limma removeBatchEffect, Harmony) to apply to which data types and in
  what order, justifying each choice.


  2. A concrete decision framework for handling the 246 patients missing proteomics
  and the 424 missing metabolomics when running MOFA+ — compare group-aware MOFA+
  versus imputation-then-concatenation versus complete-case analysis, with explicit
  trade-offs.


  3. Python or R pseudocode (minimum 25 lines) implementing the MOFA+ model setup
  with the partial-overlap design, including how to structure the data views, set
  the number of factors (justify your choice between K=10 and K=20), and extract the
  top-loading features per factor.


  4. A downstream enrichment strategy for the top 50 genes loading on Factor 1, specifying
  which databases and statistical corrections to use given the multi-omic context.'
