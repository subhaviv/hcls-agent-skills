id: drug-repurposing-18
prompt: 'Here is test question #18:


  ---


  You are evaluating metformin as a repurposing candidate for idiopathic pulmonary
  fibrosis (IPF). You have assembled the following evidence from multiple sources:


  **OpenTargets data:** AMPK (PRKAA1/PRKAA2) shows an association score of 0.41 with
  IPF; mTORC1 pathway genes show scores of 0.28–0.35. Metformin''s primary target
  PRKAA1 has a DGIdb interaction score of 7.2 (activator).


  **Transcriptomic data (L1000/CMap):** Metformin''s gene expression signature shows
  a connectivity score of +0.31 against an IPF fibroblast disease signature (positive
  score = same direction, worsening). However, a separate CMap query using the AMPK-activation
  signature shows a connectivity score of −0.62 against IPF (beneficial direction).


  **Clinical data:** A retrospective cohort of 847 IPF patients with T2DM showed 23%
  reduction in FVC decline over 18 months in metformin users vs. non-users (HR=0.71,
  95% CI 0.58–0.87), but the cohort has significant confounding (metformin users had
  lower BMI, fewer smokers).


  **Mechanistic concern:** Two recent in vitro studies show metformin activates autophagy
  in IPF fibroblasts (potentially beneficial), but one study shows it paradoxically
  upregulates TGF-β1 signaling at concentrations >2mM.


  Please provide: (1) a structured evidence-strength ranking using a repurposing evidence
  hierarchy framework, explicitly resolving the conflicting CMap scores; (2) a mechanistic
  reconciliation of the TGF-β1 paradox with respect to dose-dependent effects and
  clinical translatability; (3) a target-based vs. phenotype-based repurposing strategy
  comparison for this specific case; and (4) a prioritized list of three next experimental
  steps with scientific justification.'
