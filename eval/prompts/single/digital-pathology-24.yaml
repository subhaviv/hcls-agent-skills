id: digital-pathology-24
prompt: 'You are building a slide-level binary classifier (tumor vs. normal) for the
  CAMELYON16 dataset using a multiple instance learning (MIL) approach with TIAToolbox
  for preprocessing and H-optimus-0 as the patch-level feature extractor. Your pipeline
  must handle 270 training slides and 130 test slides stored as SVS files on a local
  NFS mount at `/data/camelyon16/`.


  **Specific requirements and constraints:**


  - Extract non-overlapping 256×256 patches at **0.5 mpp** (20× equivalent) from tissue
  regions only (minimum tissue coverage ≥ 60%)

  - Use TIAToolbox''s `SlideMaskReader` or equivalent for tissue masking with Otsu
  thresholding at 4× magnification

  - Embed patches with H-optimus-0 (ViT-g/14 backbone), batching 64 patches per forward
  pass on a single A100 GPU

  - Aggregate patch embeddings using **ABMIL (Attention-Based MIL)** with a two-layer
  attention network (hidden dim=256, single attention head)

  - Apply **Macenko stain normalization** before embedding, using a reference slide
  `CAMELYON16_train_001.svs`


  **Deliverables:**

  1. Complete Python code for the patch extraction and tissue masking step using TIAToolbox

  2. Complete code for H-optimus-0 feature extraction with Macenko normalization integrated

  3. PyTorch implementation of the ABMIL aggregator with the specified architecture

  4. A training loop snippet using AdamW (lr=1e-4, weight decay=1e-2) with AUC-ROC
  as the primary metric

  5. Expected approximate feature dimensionality output from H-optimus-0 and any preprocessing
  gotchas specific to this model'
target_skills:
- digital-pathology
domain: imaging
difficulty: intermediate
