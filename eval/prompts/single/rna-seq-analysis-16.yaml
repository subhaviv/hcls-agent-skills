id: rna-seq-analysis-16
prompt: 'You are analyzing a bulk RNA-seq dataset comparing tumor vs. adjacent normal
  tissue from 8 colorectal cancer patients (4 tumor, 4 normal; paired design). You
  ran STAR alignment with default parameters against hg38, then quantified using both
  featureCounts (with `-s 2` for reverse-stranded libraries) and Salmon (with `--libType
  ISR`). When you load both count sources into DESeq2, you notice a dramatic discrepancy:
  featureCounts yields ~22,000 genes with median count ~850, while Salmon-derived
  counts via tximport show ~18,500 genes with median count ~1,200. Your DESeq2 analysis
  using featureCounts identifies 847 differentially expressed genes (padj < 0.05,
  |log2FC| > 1), but the Salmon-based analysis identifies only 312 DE genes, with
  almost no overlap in the bottom-ranked genes.


  Given this scenario, provide the following:


  1. **Diagnosis**: List at least three specific technical reasons that could explain
  why featureCounts reports more genes but the Salmon-based analysis finds fewer DE
  genes despite higher median counts.


  2. **Validation code**: Write R code using tximport to correctly import Salmon quant.sf
  files with the `countsFromAbundance = "lengthScaledTPM"` option, then initialize
  a DESeqDataSet with the paired patient design formula `~ patient + condition`.


  3. **Recommended QC check**: Describe one specific diagnostic plot (with ggplot2
  code) using the DESeq2 size factors from both pipelines to determine which quantification
  source is better calibrated for this paired tumor/normal experiment.


  4. **Decision criterion**: State a concrete rule for choosing between the two quantification
  approaches based on the QC results.'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: intermediate
