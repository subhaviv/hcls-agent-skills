id: risk-stratification-indices-14
prompt: 'A regional health system is preparing to launch a 30-day readmission reduction
  program targeting their highest-risk Medicare patients. Their care management team
  has pulled a cohort of 847 recently discharged patients and collected the following
  aggregate data:


  - Mean LACE score: 9.2 (range 3–18)

  - Mean Charlson Comorbidity Index (CCI): 4.1

  - Mean Elixhauser Comorbidity count: 7.3

  - 34% of patients have documented SDOH Z-codes (primarily Z59.x housing instability,
  Z60.x social isolation)

  - Area Deprivation Index (ADI) national percentile: mean 74th percentile (range
  22nd–99th)

  - Actual 30-day readmission rate in this cohort last year: 22.4%


  The care management team has bandwidth to actively follow only 180 patients (approximately
  21% of the cohort). They are debating whether to use LACE alone, CCI alone, or a
  composite approach that incorporates SDOH factors for patient prioritization.


  Please provide:

  1. A comparative analysis of LACE vs. CCI vs. Elixhauser for this specific use case
  (30-day readmission prioritization in Medicare patients), including known limitations
  of each

  2. A recommended stratification methodology that incorporates both clinical comorbidity
  burden and SDOH factors, with a rationale for weighting decisions

  3. A simple Python function that accepts patient-level inputs (LACE score, CCI score,
  ADI percentile, number of Z-codes) and outputs a composite risk tier (High/Medium/Low)
  using your recommended weighting scheme

  4. Suggested threshold cutpoints for "High" tier that would capture approximately
  180 patients if applied to this cohort''s distribution'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: intermediate
