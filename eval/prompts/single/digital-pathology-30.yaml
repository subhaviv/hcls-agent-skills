id: digital-pathology-30
prompt: 'You are building a multi-resolution MIL pipeline for predicting BRCA1/BRCA2
  germline mutation status from H&E WSIs in the TCGA-BRCA cohort (487 slides: 203
  BRCA1-mut, 156 BRCA2-mut, 128 wild-type). Your foundation model is H-optimus-0,
  and you need to extract features at both 20× (0.5 mpp) and 5× (2.0 mpp) simultaneously
  to capture both cellular morphology and tissue architecture.


  The challenge: several slides have inconsistent pyramid levels where the "native"
  20× level is actually stored at 0.48 mpp or 0.52 mpp rather than exactly 0.5 mpp,
  causing TIAToolbox''s `get_tile` to silently resample versus reading native pixels
  — a distinction critical for feature consistency. Additionally, 34 slides are NDPI
  format with a proprietary macro-image layer that TIAToolbox sometimes misidentifies
  as the highest-resolution level.


  Provide the following deliverables:


  1. A Python function `safe_mpp_reader()` that detects actual mpp from slide metadata,
  warns when deviation exceeds ±5% from target, and selects the correct pyramid level
  for NDPI files by excluding macro layers based on dimension heuristics.


  2. Code to extract 256×256 patches at both resolutions using TIAToolbox''s `PatchExtractor`,
  feeding them through H-optimus-0 to produce a dual-scale feature tensor of shape
  `[N, 2, 1536]` per slide.


  3. A `DualScaleABMIL` PyTorch module that accepts `[N, 2, 1536]` input, applies
  separate attention branches per scale, concatenates attended features, and outputs
  a 3-class logit vector (BRCA1-mut, BRCA2-mut, WT).


  4. Explain why naive concatenation of 20× and 5× patch features before attention
  is statistically problematic for this 3-class imbalanced setting.'
target_skills:
- digital-pathology
domain: imaging
difficulty: hard
