id: claims-billing-rules-29
prompt: 'A Medicare Part B claims audit has flagged a high-volume orthopedic surgery
  group practice for potential FWA. The audit identified the following patterns across
  847 claims over 6 months:


  - Modifier 59 appended to CPT 27447 (total knee arthroplasty) paired with CPT 27370
  (injection of contrast for knee arthroplasty) in 312 claims, bypassing NCCI edits

  - Modifier 25 used on 89% of E&M visits (99213-99215) same-day as minor surgical
  procedures, compared to a 34% national benchmark

  - 23 instances where CPT 29881 (knee arthroscopy with meniscectomy) was billed within
  the 90-day global surgery period following CPT 27447 for the same patient, without
  modifier 58, 78, or 79

  - Surgeon Dr. Harmon (NPI: 1234567890) billed 14-hour surgical days on 6 occasions,
  with overlapping procedure times documented in the OR schedule


  For each of the four flagged patterns: (1) identify whether each pattern more likely
  represents a coding error, systemic billing abuse, or potential fraud, and explain
  the distinguishing criteria you applied; (2) specify the exact CMS or NCCI rule
  violated; (3) recommend the appropriate investigative next step (e.g., ADR, TPE,
  referral to OIG); and (4) describe what additional documentation or data would be
  required to escalate each finding to a formal fraud referral. Finally, explain how
  the concurrent presence of all four patterns affects the overall fraud risk assessment
  for this practice.'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: hard
