id: drug-repurposing-14
prompt: 'Here is test question #14 of 30:


  ---


  Your team is investigating drug repurposing opportunities for **idiopathic pulmonary
  fibrosis (IPF)**, a progressive fibrotic lung disease with limited treatment options.
  Transcriptomic profiling of 47 IPF patient lung biopsies versus 23 healthy controls
  (GSE-FICTIONAL-2024) identified the following significantly upregulated genes: **TGFB1,
  CTGF, LOX, ACTA2, COL1A1, PDGFRB, and ROCK1**. You have access to DGIdb and OpenTargets
  for querying drug-gene interactions.


  **Deliverables requested:**


  1. **Target prioritization**: Rank the 7 upregulated genes by their druggability
  and repurposing potential, citing known approved drugs that interact with each target
  from DGIdb/OpenTargets.


  2. **Top candidate selection**: Identify the single strongest repurposing candidate
  drug (approved for any other indication) based on mechanism-of-action overlap with
  IPF pathobiology. Justify your choice using the repurposing evidence hierarchy (preclinical
  → clinical → approved).


  3. **Translatability assessment**: For your top candidate, evaluate at least three
  translatability factors (e.g., route of administration, known lung distribution,
  safety profile in relevant populations, existing clinical trial data).


  4. **Study design**: Propose a Phase II repurposing trial design for your top candidate
  in IPF, specifying primary endpoint, patient population (inclusion/exclusion criteria),
  sample size rationale (assume 80% power, α=0.05, expected 15% improvement in FVC%
  predicted over 52 weeks), and key biomarkers.


  5. **Python snippet**: Write code to query DGIdb''s public API for all approved
  drug interactions across the 7 target genes and output a ranked table by interaction
  score.


  ---'
