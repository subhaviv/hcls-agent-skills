id: rwd-cohort-analysis-22
prompt: 'You are analyzing a claims database containing 45,000 patients diagnosed
  with Type 2 diabetes (ICD-10: E11.x) between January 2019 and December 2021. You
  want to compare 90-day all-cause hospitalization rates between patients initiated
  on SGLT2 inhibitors (NDC codes for empagliflozin, dapagliflozin, canagliflozin)
  versus GLP-1 receptor agonists (NDC codes for semaglutide, liraglutide, dulaglutide).
  Index date is defined as the first fill date for either drug class, with a 180-day
  pre-index baseline period required for covariate capture.


  **Deliverables requested:**


  1. **Cohort identification logic**: Write Python/pandas pseudocode to extract the
  two treatment cohorts, applying inclusion criteria (≥18 years old, continuous enrollment
  180 days pre-index, no prior use of either drug class in baseline) and exclusion
  criteria (ESRD diagnosis ICD-10: N18.6, dialysis CPT: 90935/90937).


  2. **PDC calculation**: Provide Python code to calculate the Proportion of Days
  Covered over 12 months post-index for each patient, handling overlapping fills by
  capping and gaps correctly.


  3. **Propensity score model**: Specify which baseline covariates to include (at
  minimum: age, sex, HbA1c proxies, comorbidities, prior hospitalizations), write
  sklearn logistic regression code to estimate PS, and produce SMD diagnostics before
  and after 1:1 nearest-neighbor matching with a caliper of 0.2 SD.


  4. **Survival analysis**: Using the matched cohort of approximately 8,200 pairs,
  write Python code using `lifelines` to plot Kaplan-Meier curves for time-to-first-hospitalization
  and fit a Cox proportional hazards model, including how to test the proportional
  hazards assumption using Schoenfeld residuals.'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: easy
