id: ngs-quality-control-26
prompt: 'You are processing a whole-exome sequencing (WES) cohort of 48 tumor-normal
  pairs for a somatic variant calling pipeline. After running FastQC on the raw FASTQs,
  you observe the following patterns across multiple samples:


  - Per-base sequence quality drops below Q20 after cycle 130 on R2 reads

  - Adapter content flags appear in ~30% of samples starting around position 120

  - Duplicate rates from Picard MarkDuplicates range from 18% to 47% across samples
  (median ~28%)

  - A subset of 8 samples shows GC content curves that deviate significantly from
  the expected WES profile, with a secondary peak around 75% GC


  Target intervals are provided in `targets.bed` (covering ~48 Mb, ~200,000 regions).
  Your BAM files are coordinate-sorted with indices. You need to assess per-sample
  coverage adequacy for somatic calling, where your pipeline requires ≥100× mean on-target
  coverage.


  **Deliverables:**


  1. Write a complete `fastp` command for adapter trimming that addresses the R2 quality
  drop and adapter contamination, using `THREADS=8` and writing output to `OUT=qc_out`.


  2. Write a `mosdepth` command to compute per-target coverage using the provided
  `targets.bed`, and then provide a one-liner bash command to flag any sample failing
  the ≥100× threshold from mosdepth''s summary output.


  3. Explain what the high-GC secondary peak in 8 samples likely indicates biologically
  or technically, and describe one additional QC metric you would compute to confirm
  your hypothesis.


  4. Given the wide range in duplicate rates (18–47%), at what threshold would you
  consider excluding samples from somatic calling, and what biological or technical
  factors might explain the high end of this range in tumor samples specifically?'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: intermediate
