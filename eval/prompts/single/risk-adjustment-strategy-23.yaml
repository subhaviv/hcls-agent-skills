id: risk-adjustment-strategy-23
prompt: 'A Medicare Advantage plan with 12,000 members is preparing for the CY2025
  payment year, during which CMS applies a blended transition methodology combining
  V24 and V28 model weights (50%/50% for payment year 2025).


  Your analytics team has pulled a sample cohort of 500 members who were coded with
  HCC 85 (Congestive Heart Failure) under V24 in the prior year. Under the V28 model
  restructuring, HCC 85 was split into more granular categories, and some legacy codes
  no longer map to the same HCC assignments.


  Given this transition scenario, provide the following deliverables:


  1. **Blended RAF Calculation Example**: Walk through a simplified RAF score calculation
  for a single member with the following attributes: age 72, male, Medicare status
  = "CNA" (Community, Non-Dual, Aged), with HCC 85 (V24 coefficient = 0.368) and HCC
  96 (V24 coefficient = 0.299), assuming the equivalent V28 mappings yield coefficients
  of 0.191 and 0.227 respectively, and a disease interaction add-on of 0.150 under
  V28 only. Show the blended score arithmetic.


  2. **Coding Gap Priority Framework**: Describe a 3-tier prioritization framework
  for identifying which members in the 500-person CHF cohort should be targeted first
  for prospective chart review and recapture outreach.


  3. **Audit-Defensible Documentation Checklist**: List 5 specific clinical documentation
  elements that a provider must include in the medical record to support a CHF HCC
  assignment that would withstand a RADV audit.'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: easy
