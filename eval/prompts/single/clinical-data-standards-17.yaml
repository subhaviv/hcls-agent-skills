id: clinical-data-standards-17
prompt: 'You are conducting a safety analysis for a Phase III oncology trial (KEYNOTE-XXX)
  evaluating a PD-1 inhibitor. Your MedDRA coding team has flagged an inconsistency
  in how immune-related adverse events (irAEs) are being coded across three clinical
  sites. The following AEs have been reported and coded differently across sites:


  **Site A coding:**

  - "Autoimmune hepatitis" → PT: Autoimmune hepatitis, SOC: Hepatobiliary disorders

  - "Immune-mediated colitis" → PT: Colitis, SOC: Gastrointestinal disorders

  - "Thyroid inflammation" → PT: Thyroiditis, SOC: Endocrine disorders


  **Site B coding:**

  - "Autoimmune hepatitis" → PT: Hepatitis autoimmune, SOC: Hepatobiliary disorders

  - "Immune-mediated colitis" → PT: Autoimmune colitis, SOC: Gastrointestinal disorders

  - "Thyroid inflammation" → PT: Thyroid disorder, SOC: Endocrine disorders


  **Site C coding:**

  - All three events coded under SOC: Immune system disorders using broader PTs


  The trial has 847 enrolled patients, and the Data Safety Monitoring Board (DSMB)
  requires a consolidated irAE frequency table at next week''s interim analysis.


  Please provide: (1) An evaluation of which site''s coding approach is most MedDRA-compliant,
  identifying specific errors in the other approaches; (2) A recommended standardized
  MedDRA coding for each of the three AEs including correct PT and primary SOC assignment;
  (3) An explanation of how MedDRA''s multi-axial coding could be leveraged here and
  whether secondary SOC assignments are appropriate; (4) A recommended aggregation
  strategy (SOC vs HLT vs PT level) for the DSMB irAE frequency table, with justification.'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: intermediate
