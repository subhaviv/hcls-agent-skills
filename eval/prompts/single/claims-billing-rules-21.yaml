id: claims-billing-rules-21
prompt: 'A small rural clinic has submitted claims for 847 patients over a 6-month
  period. During a routine audit, the following patterns were identified in their
  billing data:


  - 94% of all Evaluation & Management visits were billed at CPT 99215 (Level 5, highest
  complexity)

  - 78% of those 99215 claims were submitted on the same date as a minor surgical
  procedure (e.g., CPT 11200 – removal of skin tags)

  - Modifier 25 was appended to every single 99215 claim accompanying a procedure,
  with no variation

  - The clinic''s 99215 utilization rate is 6.2 standard deviations above the regional
  peer average

  - No supporting documentation audit has been performed yet


  Using this scenario, please provide the following:


  1. **Explain** what Modifier 25 is, when it is appropriately used, and what CMS
  requires to justify its use alongside a same-day procedure.


  2. **Identify** which of the billing patterns above represent potential red flags
  for fraud, waste, or abuse (FWA), and explain why each is concerning.


  3. **Distinguish** between what might constitute a coding error versus intentional
  fraud in this context, and describe what evidence would help differentiate the two.


  4. **Outline** a step-by-step claims audit methodology an investigator should follow
  to evaluate this clinic''s billing practices, including what records to request
  and what thresholds to apply.'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: easy
