id: hedis-measure-specification-06
prompt: 'A regional health plan is preparing for its annual HEDIS audit and needs
  help analyzing its Controlling High Blood Pressure (CBP) measure performance. The
  plan has identified the following patient cohort data for measurement year 2024:


  - Total attributed members aged 18–85 with hypertension diagnosis: 12,400

  - Members with a qualifying diagnosis only in an inpatient setting: 890

  - Members with evidence of pregnancy during the measurement year: 340

  - Members with ESRD diagnosis: 215

  - Members who disenrolled and re-enrolled with a gap of 47 days: 178

  - Members who disenrolled and re-enrolled with a gap of 22 days: 203

  - Members with a recorded blood pressure reading of 139/88 mmHg: 4,100

  - Members with a recorded blood pressure reading of 142/91 mmHg: 1,950

  - Members with no blood pressure reading on file: 2,800


  The plan uses a 12-month continuous enrollment requirement with one allowable gap
  of up to 45 days.


  Please provide the following deliverables:


  1. **Denominator construction**: Walk through the step-by-step logic to determine
  which members qualify for the CBP denominator, applying all relevant exclusions
  and enrollment rules to the numbers above.


  2. **Numerator identification**: Based on HEDIS CBP specifications, identify which
  blood pressure reading groups count toward the numerator and calculate the preliminary
  numerator count.


  3. **Enrollment gap analysis**: Clearly distinguish how the two re-enrollment gap
  subgroups (47-day vs. 22-day) are handled under NCQA''s continuous enrollment rules.


  4. **Care gap prioritization**: Recommend a prioritization strategy for outreach
  targeting the 2,800 members with no BP reading on file, incorporating at least two
  SDOH-related barriers and their corresponding interventions.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: intermediate
