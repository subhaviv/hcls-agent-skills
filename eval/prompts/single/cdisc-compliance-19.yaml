id: cdisc-compliance-19
prompt: 'A Phase III oncology trial (N=847) is being prepared for FDA eCTD submission.
  The clinical data team has collected tumor assessment data including both RECIST
  1.1 measurements and investigator-assessed overall response, stored in a single
  flat file with the following variables: USUBJID, VISIT, VISITNUM, TUMLOCCD (tumor
  location code), TUMLOC (tumor location description), TUMDIAMM (tumor diameter in
  mm), OVRLRESP (overall response), OVRLRESPN (numeric response code), METHEVAL (method
  of evaluation: CT/MRI/PET), RSCONFDT (confirmation date for CR/PR), and ADTM (assessment
  datetime).


  The Pinnacle 21 validator is flagging multiple errors: (1) "Non-standard variable
  TUMLOCCD not permitted in RS domain," (2) "RSORRES missing for 23% of records where
  RSSTRESC is populated," (3) "SUPPRS QNAM value METHEVAL exceeds 8-character limit,"
  and (4) "RELREC relationship between RS and TU domains not established."


  Your task:

  1. Provide the correct SDTM domain mapping strategy for this tumor assessment data,
  specifying which variables belong in RS vs. TU domains and justifying the split

  2. Explain how to resolve each of the four Pinnacle 21 findings, including the correct
  SUPPQUAL structure for finding #3

  3. Design the RELREC dataset entries needed to link RS and TU records for the same
  tumor assessment visit, providing the exact variable values for at least two example
  records

  4. Identify what ADaM dataset(s) would derive from this SDTM data for a typical
  oncology submission and describe the key traceability requirements between ADRS
  or ADTR and the source SDTM domains'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: hard
