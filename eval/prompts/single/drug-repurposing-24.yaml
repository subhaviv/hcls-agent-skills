id: drug-repurposing-24
prompt: 'A rare pediatric epilepsy syndrome called "KCNQ3-associated developmental
  epileptic encephalopathy" (KDEE) affects approximately 340 patients in your hospital
  network''s registry. Whole-exome sequencing confirms gain-of-function variants in
  KCNQ3 (encoding Kv7.3, a voltage-gated potassium channel subunit). Current standard-of-care
  with valproate achieves seizure freedom in only 18% of patients (n=61/340).


  You have access to DGIdb v5.0 and OpenTargets Platform and want to systematically
  identify repurposing candidates. Preliminary transcriptomic analysis of patient
  iPSC-derived neurons (n=12 patients vs. n=8 controls) shows upregulation of KCNQ3,
  SCN1A, and CAMK2A, and downregulation of KCNAB2, HCN1, and GABRA1 (all FDR < 0.05,
  |log2FC| > 1.2).


  Please provide the following:


  1. **DGIdb query strategy**: Write a Python code snippet using the DGIdb REST API
  to retrieve all drug-gene interactions for KCNQ3, SCN1A, and HCN1, filtering for
  interactions with evidence score ≥ 3 and interaction type "inhibitor" or "channel
  blocker."


  2. **Candidate prioritization framework**: Design a scoring rubric (weighted criteria,
  0–10 scale) that ranks repurposing candidates by mechanism-of-action overlap with
  KDEE pathophysiology, existing pediatric safety data, blood-brain barrier penetrance,
  and clinical evidence strength.


  3. **Top candidate analysis**: Using the transcriptomic signature and known pharmacology,
  identify the two most promising repurposing candidates from approved drugs, justify
  their MoA overlap, and flag any pediatric-specific safety concerns.


  4. **Translatability assessment**: Describe the key translational gaps that must
  be addressed before moving the top candidate into a Phase II pediatric trial.'
