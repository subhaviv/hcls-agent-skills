id: rwd-cohort-analysis-17
prompt: 'You are conducting a real-world evidence study using a commercial claims
  database (Marketscan, 2018–2022) to compare time to first major adverse cardiovascular
  event (MACE) between patients initiating SGLT2 inhibitors versus GLP-1 receptor
  agonists for type 2 diabetes. Your cohort has been identified using NDC codes for
  index prescriptions, with T2D confirmed by ICD-10 code E11.x on ≥2 separate claims
  within 12 months prior to index date. After 1:1 propensity score matching, you have
  14,280 patients per arm.


  Your covariate balance diagnostics reveal the following post-match SMDs: age (0.04),
  HbA1c proxy (0.08), baseline insulin use (0.03), CKD stage (0.12), and prior hospitalization
  (0.07). MACE is a composite endpoint defined by ICD-10 codes I21.x (MI), I63.x (ischemic
  stroke), and CPT 33533 (CABG).


  Median follow-up is 18 months, with administrative censoring at 36 months. You have
  already fit a Cox proportional hazards model, but the global Schoenfeld residuals
  test returns p = 0.031, suggesting a potential violation of the proportional hazards
  assumption.


  Please provide:

  1. A determination of whether your covariate balance is acceptable and what threshold
  you are applying

  2. Python code to generate Kaplan-Meier curves with 95% confidence bands and a log-rank
  test for this cohort structure

  3. A strategy for addressing the proportional hazards violation, including at least
  two alternative modeling approaches with their trade-offs

  4. Python code implementing a time-varying coefficient Cox model as one solution
  to the PH violation

  5. Interpretation guidance for the clinical team on how to communicate the PH violation''s
  impact on the hazard ratio estimates'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: intermediate
