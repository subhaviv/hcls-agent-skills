id: multi-omics-integration-16
prompt: 'You are analyzing a cohort of 156 pediatric acute lymphoblastic leukemia
  (ALL) patients with three omics layers: RNA-seq transcriptomics (all 156 patients),
  RPPA-based proteomics (89 patients), and ATAC-seq chromatin accessibility (67 patients).
  Only 54 patients have all three layers measured. Key genes of interest include *IKZF1*,
  *CDKN2A*, *PAX5*, and *ETV6-RUNX1* fusion status. Your goal is to identify multi-omic
  subtypes associated with treatment response (complete remission vs. minimal residual
  disease positivity at day 29).


  Given this partial sample overlap and heterogeneous data types, please provide:


  1. **Integration strategy recommendation**: Compare early (concatenation), intermediate
  (MOFA+ or SNF), and late integration approaches for this specific scenario, explaining
  which is most appropriate and why, considering the 54/89/67/156 sample availability.


  2. **MOFA+ implementation plan**: Outline the key hyperparameters to set (number
  of factors, minimum explained variance threshold, view-specific vs. shared factors),
  handling of missing views for the 102 patients lacking complete data, and how to
  configure the `mofa2` R package for this dataset.


  3. **Batch correction strategy**: The proteomics data was collected in two batches
  (batch A: n=45, batch B: n=44). Describe how to apply ComBat or limma''s `removeBatchEffect`
  within the MOFA+ framework without data leakage.


  4. **Factor interpretation**: After running MOFA+, describe a downstream analysis
  pipeline to link top factors (top 50 feature weights per view) to treatment response,
  including appropriate statistical tests and multi-omic enrichment methods.'
target_skills:
- multi-omics-integration
domain: multi-omics
difficulty: intermediate
