id: scrna-seq-pipeline-18
prompt: 'You are analyzing a single-cell RNA-seq dataset from a longitudinal study
  of 8 multiple sclerosis patients (4 treatment-naive, 4 post-interferon-beta treatment)
  across 3 time points (baseline, 6 months, 12 months), resulting in 24 samples totaling
  ~180,000 cells after CellRanger processing. Initial Scrublet analysis flagged 12%
  of cells as putative doublets, but your collaborator suspects this threshold is
  too aggressive given the high cell density in some samples.


  After standard QC filtering (min_genes=200, max_genes=6000, mt_fraction<0.15), you
  performed Harmony batch correction using both patient_id and timepoint as covariates
  simultaneously. However, your UMAP shows that T cells are splitting into two spatially
  separated clusters that express identical marker genes (CD3D, CD3E, CD247), and
  Leiden clustering at resolution=0.5 produces 18 clusters where 3 pairs appear to
  be over-fragmented duplicates based on differential expression analysis showing
  no significant DEGs between paired clusters (adjusted p-value > 0.05 for all genes).


  Please provide:

  1. A diagnostic framework to determine whether the T cell splitting reflects true
  biological heterogeneity or technical artifacts from Harmony''s multi-covariate
  correction

  2. Python/Scanpy code to re-evaluate doublet thresholds per-sample using Scrublet''s
  score distribution rather than a fixed cutoff

  3. A strategy for merging over-fragmented clusters while preserving biologically
  meaningful subclusters, including the specific Scanpy/Python implementation

  4. An explanation of whether running Harmony with patient_id and timepoint as simultaneous
  covariates is statistically appropriate for this longitudinal design, and the recommended
  alternative approach'
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: hard
