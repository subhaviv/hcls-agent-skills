id: multi-omics-integration-15
prompt: 'You are analyzing a cohort of 180 pediatric acute lymphoblastic leukemia
  (ALL) patients with three omics layers: RNA-seq transcriptomics (all 180 patients),
  reverse-phase protein array (RPPA) proteomics (142 patients), and ATAC-seq chromatin
  accessibility (97 patients). The partial sample overlap is non-random — ATAC-seq
  data is only available for patients enrolled after a protocol amendment at month
  18, creating a potential temporal batch confound. Clinical outcome data (event-free
  survival, EFS) is available for all 180 patients.


  Your goal is to identify multi-omic factors associated with poor EFS (events in
  61 patients) while accounting for the structured missingness and temporal batch
  effect.


  Please provide:


  1. **Integration strategy recommendation**: Justify whether MOFA+ or an alternative
  framework (SNF, iCluster+) is most appropriate given the partial overlap structure,
  and specify how you would handle the 38 patients missing RPPA and the 83 patients
  missing ATAC-seq within that framework.


  2. **Batch correction plan**: Describe how you would diagnose and correct the temporal
  batch effect in ATAC-seq data before integration, naming specific tools (e.g., Harmony,
  ComBat-seq, LSI-based correction) and the order of operations relative to the MOFA+
  model fitting.


  3. **MOFA+ configuration code**: Write a Python code snippet using the `mofapy2`
  library that initializes the model with appropriate numbers of factors (justify
  your choice between 10–25), sets per-view likelihoods correctly for RNA-seq counts,
  RPPA continuous values, and ATAC-seq binary accessibility peaks, and enables covariates
  for enrollment time.


  4. **Factor interpretation strategy**: After model fitting, outline how you would
  identify which MOFA+ factors are prognostically relevant for EFS and how you would
  run enrichment analysis on the top weighted genes/peaks in those factors.'
target_skills:
