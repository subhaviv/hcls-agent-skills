id: ml-researcher-17
prompt: 'A hospital system has collected a retrospective cohort of 8,400 patients
  with suspected sepsis across three ICUs (Site A: n=4,200, Site B: n=2,800, Site
  C: n=1,400) over 2018–2023. The outcome is 28-day in-hospital mortality (12% prevalence).
  Features include 47 lab values (lactate, procalcitonin, creatinine, etc.), 6 vital
  sign time series (sampled every 4 hours), SOFA scores, and free-text nursing notes.
  The team plans to train an XGBoost model on Sites A+B and test on Site C, then deploy
  at all three sites. They are concerned about temporal leakage because some patients
  had repeat admissions, and they want to submit the model as an FDA Software as a
  Medical Device (SaMD) for clinical decision support.


  Please provide:

  1. A specific data splitting strategy that prevents both temporal leakage and patient-level
  data leakage across train/validation/test sets, with justification for why a simple
  random split would fail here.

  2. A recommended evaluation metric suite (at least 4 metrics) with rationale for
  each, specifically addressing why AUROC alone is insufficient given the class imbalance
  and clinical context.

  3. A calibration assessment plan including which calibration method to apply post-hoc
  and how to evaluate it across the three sites separately.

  4. A subgroup fairness audit plan identifying at least 3 clinically meaningful subgroups
  to evaluate, with the specific disparity metrics to compute.

  5. A brief mapping of how this evaluation plan aligns with FDA''s PCCP (Predetermined
  Change Control Plan) requirements for a model that will be periodically retrained
  as new data arrives.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: intermediate
