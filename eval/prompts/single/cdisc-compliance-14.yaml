id: cdisc-compliance-14
prompt: 'A clinical trial (Study XYZ-2201) is preparing an FDA submission package
  for a Phase II oncology study with 187 subjects. The study collected adverse events
  data, and the programming team has mapped the dataset to the AE SDTM domain. During
  Pinnacle 21 validation, the following issues were flagged:


  1. **P21 Error**: AEOUT (Outcome of Adverse Event) contains the non-standard value
  "RECOVERING" — the controlled terminology only permits values such as "RECOVERING/RESOLVING",
  "RECOVERED/RESOLVED", etc.

  2. **P21 Warning**: AESCAN (Involves Cancer) is populated for only 23 of 187 subjects,
  and the validator suggests moving sparse variables to SUPPAE.

  3. **P21 Error**: AEDECOD is missing for 12 records where the verbatim term (AETERM)
  was not yet coded by the MedDRA dictionary at data lock.

  4. **P21 Warning**: RELREC is present in the submission package but the validator
  cannot confirm the linkage between AE and CM domains is correctly implemented.


  Given this scenario, please provide:


  - **A prioritized triage list** of these four issues ranked by regulatory risk,
  with justification for each ranking

  - **Specific remediation steps** for each issue, including whether SUPPQUAL should
  be used for the AESCAN variable and under what CDISC conditions sparse variables
  warrant SUPPQUAL migration

  - **A concrete RELREC implementation example** (showing STUDYID, RDOMAIN, USUBJID,
  IDVAR, IDVARVAL, RELTYPE, RELID columns) linking AE records to concomitant medications
  in CM

  - **Guidance on handling uncoded AEDECOD records** in a way that satisfies both
  CDISC SDTM 3.3 requirements and FDA reviewer expectations'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: intermediate
