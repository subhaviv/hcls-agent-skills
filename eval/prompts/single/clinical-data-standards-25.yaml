id: clinical-data-standards-25
prompt: 'A pharmacovigilance team is preparing an integrated summary of safety (ISS)
  for a new oral anticoagulant, consolidating data from three Phase III trials (APEX-1:
  n=1,840; APEX-2: n=2,210; APEX-3: n=1,650). The MedDRA coding dictionary version
  26.0 was used throughout. The team has identified the following adverse event counts
  at the Preferred Term level that they need to organize into a SOC-level summary
  table:


  - Haematuria: 87 cases

  - Epistaxis: 64 cases

  - Rectal haemorrhage: 43 cases

  - Gingival bleeding: 38 cases

  - Wound haemorrhage: 29 cases

  - Intracranial haemorrhage: 22 cases

  - Haemoptysis: 19 cases

  - Conjunctival haemorrhage: 15 cases


  A complication arises: several of these PTs map to **multiple SOCs** through MedDRA''s
  multi-axial structure. For example, "Haematuria" appears under both "Renal and urinary
  disorders" and "Vascular disorders," and "Intracranial haemorrhage" appears under
  both "Nervous system disorders" and "Vascular disorders."


  Please provide:

  1. The correct primary SOC assignment for each PT listed, following MedDRA''s convention
  for primary SOC designation in multi-axial situations

  2. An explanation of how MedDRA handles multi-axial coding and the "primary SOC"
  rule

  3. A recommendation on whether to present bleeding events aggregated at the HLT
  or HLGT level for this anticoagulant''s safety profile, with clinical justification

  4. The specific HLGT and HLT terms that would group the majority of these bleeding
  PTs together under the Vascular disorders SOC'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: intermediate
