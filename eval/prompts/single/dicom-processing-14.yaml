id: dicom-processing-14
prompt: 'Here is test question #14 of 30:


  ---


  You are working with a clinical research dataset containing DICOM series from 47
  patients who underwent 3T MRI brain scans at two different sites (Site A: Siemens
  Prisma, Site B: GE Discovery MR750). Each patient folder contains multiple DICOM
  series including T1-weighted MPRAGE, T2-FLAIR, and DWI sequences. Your task is to
  build a robust dcm2niix conversion pipeline that handles cross-vendor inconsistencies.


  During initial testing, you discover the following issues:

  1. Site B DWI series are split across multiple DICOM folders with inconsistent `SeriesInstanceUID`
  values due to a PACS export bug

  2. Several T1 scans from Site A have a non-standard `ImageOrientationPatient` tag
  causing dcm2niix to generate unexpected oblique orientations

  3. Some series contain localizer scout images mixed in with the diagnostic sequences,
  identifiable by `SeriesDescription` containing "Scout" or "AAHead_Scout"


  **Deliverables requested:**


  1. Write a Python preprocessing script using `pydicom` that: (a) groups DICOM files
  by `SeriesDescription` and `ProtocolName` tags rather than `SeriesInstanceUID`,
  (b) filters out scout/localizer series, and (c) organizes files into per-series
  subdirectories before conversion.


  2. Provide the exact `dcm2niix` command-line invocation with appropriate flags to
  handle the oblique orientation issue and generate BIDS-compatible sidecar JSON files.


  3. Explain how to validate the output NIfTI files using `nibabel` to confirm correct
  orientation matrices (qform/sform codes) and flag any files where the affine determinant
  suggests an unexpected flip.'
