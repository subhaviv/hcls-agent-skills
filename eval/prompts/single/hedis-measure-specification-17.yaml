id: hedis-measure-specification-17
prompt: 'A regional health plan serving 85,000 Medicare Advantage members is preparing
  for the 2024 HEDIS measurement year and needs to optimize performance on the Controlling
  High Blood Pressure (CBP) measure. The plan''s analytics team has pulled the following
  preliminary data:


  - Total members aged 18–85 with a diagnosis of hypertension: 12,400

  - Members with a valid blood pressure reading on file: 8,900

  - Members with BP <140/90 (controlled): 5,200

  - Members identified as having ESRD: 340

  - Members with advanced illness (hospice/palliative care claims): 215

  - Members with only one outpatient visit in the measurement year: 1,890

  - Members flagged with a frailty indicator AND advanced illness: 178


  The plan''s compliance officer is uncertain whether the "frailty + advanced illness"
  population should be excluded from the denominator, and whether members with only
  a single outpatient visit qualify for denominator inclusion under continuous enrollment
  rules.


  Please provide:

  1. A step-by-step denominator construction analysis applying HEDIS CBP exclusion
  logic, clearly showing which populations are removed and why

  2. A corrected numerator rate calculation based on the adjusted denominator

  3. An explanation of the continuous enrollment requirement for CBP and whether the
  single-visit members (n=1,890) affect denominator eligibility

  4. A prioritization recommendation identifying which excluded or borderline populations
  represent the highest opportunity for care gap closure to improve Star Ratings'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: intermediate
