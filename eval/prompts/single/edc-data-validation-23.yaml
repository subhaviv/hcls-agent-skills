id: edc-data-validation-23
prompt: 'You are working as a clinical data manager on a Phase II oncology trial (STUDY-ONC-2024)
  with 85 enrolled patients. Your EDC system (Veeva Vault CDMS) exports vital signs
  data in CSV format with the following columns: `USUBJID`, `VSDAT`, `VSTESTCD`, `VSORRES`,
  `VSORRESU`, `VSPOS`.


  The exported vital signs data contains the following test codes: `SYSBP`, `DIABP`,
  `PULSE`, `TEMP`, and `WEIGHT`. You need to implement basic range checks to flag
  potentially erroneous values before SDTM mapping.


  Use these protocol-defined plausible ranges:

  - Systolic BP: 60–250 mmHg

  - Diastolic BP: 40–150 mmHg

  - Pulse: 30–200 bpm

  - Temperature: 34.0–42.0 °C

  - Weight: 30–250 kg


  Additionally, you''ve noticed that some records have diastolic BP values **greater
  than** systolic BP values for the same patient visit, which is physiologically impossible.


  Please provide:


  1. A Python function `run_vs_range_checks(df)` that accepts a pandas DataFrame of
  the exported vital signs data and returns a DataFrame of flagged records with columns:
  `USUBJID`, `VSDAT`, `VSTESTCD`, `VSORRES`, `VSORRESU`, `FLAG_REASON`.


  2. A second Python function `check_bp_consistency(df)` that identifies records where
  diastolic BP exceeds systolic BP for the same `USUBJID` and `VSDAT`, returning a
  similar flagged DataFrame.


  3. A brief explanation (3–5 sentences) of how you would prioritize resolving these
  flags in a real clinical data cleaning workflow.'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: easy
