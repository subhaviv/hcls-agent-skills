id: biomarker-discovery-24
prompt: 'A clinical research team has profiled 847 early-stage non-small cell lung
  cancer (NSCLC) patients using a 1,200-gene NanoString panel. The primary goal is
  to develop a **predictive biomarker** identifying patients who benefit from adjuvant
  pembrolizumab versus observation alone. The dataset includes: treatment arm (pembrolizumab
  n=423, observation n=424), 5-year recurrence-free survival (RFS) with 312 events
  total, TMB score, PD-L1 TPS, and the 1,200 gene expression features. A junior analyst
  has already run LASSO on the full dataset and identified a 14-gene signature with
  a C-index of 0.81, which the team is excited about.


  **Your tasks:**


  1. **Identify at least three methodological problems** with the analyst''s current
  approach, specifically in the context of building a *predictive* (interaction-based)
  rather than *prognostic* biomarker.


  2. **Propose a corrected analytical pipeline** — from feature selection through
  final performance estimation — that properly handles the predictive intent, including
  how to model the treatment interaction, appropriate cross-validation strategy, and
  leakage prevention.


  3. **Specify the correct primary performance metric** for this predictive biomarker
  use case and explain why C-index alone is insufficient here.


  4. **Design an external validation study**: specify the minimum cohort characteristics,
  required sample size justification using an events-per-variable (EPV) heuristic,
  and what additional data sources (e.g., existing trial datasets) might serve as
  replication cohorts.


  5. Provide **pseudocode** (Python-style) for a nested cross-validation loop that
  correctly incorporates treatment interaction terms and avoids target leakage.'
target_skills:
- biomarker-discovery
domain: single-cell
difficulty: intermediate
