id: genomic-variant-interpretation-25
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory reports the following variant:
  **BRCA2 c.7976+3A>G**.


  Available evidence:

  - **gnomAD v3.1** allele frequency: 0.000032 (8 heterozygous carriers, 0 homozygous)

  - **SpliceAI scores**: Donor loss = 0.61, Acceptor loss = 0.04, Donor gain = 0.12,
  Acceptor gain = 0.03

  - **ClinVar**: 2 submissions — one "Uncertain Significance" (2019, no evidence provided),
  one "Likely Pathogenic" (2021, RNA study cited but full data unavailable)

  - **RNA functional study** referenced in literature: shows ~40% reduction in canonical
  transcript with creation of a partial intron retention product; the study included
  6 affected carriers and 4 unaffected carriers

  - **LOVD**: 3 additional families with co-segregation data (2 informative meioses
  total)

  - The variant is located 3 nucleotides into intron 17, outside the canonical ±1/2
  splice positions


  Please provide:

  1. A systematic ACMG/AMP 2015 criteria evaluation, specifying which evidence codes
  apply (and at what strength), which do not apply, and why — particularly addressing
  PVS1 applicability for this non-canonical splice position

  2. A final classification with confidence reasoning

  3. An explanation of how the RNA study quality (n=10, mixed affected/unaffected)
  affects evidence weighting under PS3/BS3

  4. What additional data would most efficiently resolve this VUS if it remains unclassified'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: intermediate
