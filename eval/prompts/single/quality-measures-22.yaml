id: quality-measures-22
prompt: 'Here is test question #22 of 30:


  ---


  You are a healthcare data analyst at a mid-sized health plan with 45,000 commercial
  members. Your quality team needs to implement the **Diabetes Care — Poor Hemoglobin
  A1c Control (HbA1c > 9%)** HEDIS measure (CDC measure) for the current measurement
  year (January 1 – December 31, 2024).


  Your claims data warehouse contains the following tables:

  - `members` (member_id, dob, gender, enrollment_start, enrollment_end, product_line)

  - `medical_claims` (claim_id, member_id, service_date, diagnosis_codes, procedure_codes,
  pos_code, provider_npi)

  - `lab_results` (result_id, member_id, loinc_code, result_value, result_date, ordering_npi)

  - `pharmacy_claims` (rx_id, member_id, ndc_code, fill_date, days_supply, quantity)


  Key parameters:

  - Age range: 18–75 years as of December 31, 2024

  - Continuous enrollment requirement: 12 months with no more than one 45-day gap

  - Diabetes identification: at least one pharmacy claim for a diabetes medication
  (insulin or non-insulin) OR at least two outpatient/telehealth claims with a diabetes
  diagnosis (ICD-10 E11.x) on different dates of service

  - HbA1c LOINC codes to use: 4548-4, 17856-6, 59261-8


  Please provide:

  1. A step-by-step explanation of the denominator logic (eligible population) and
  numerator logic (poor control)

  2. Complete SQL queries to build the denominator and numerator populations

  3. A SQL query to calculate the final measure rate

  4. A brief explanation of what a **higher rate** means for this measure (good or
  bad performance) and why'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: easy
