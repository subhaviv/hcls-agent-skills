id: cdisc-compliance-21
prompt: 'A clinical trial sponsor is preparing SDTM datasets for an FDA submission
  of a Phase III oncology study (Study ONC-2024-007, N=342 patients). The programming
  team has collected adverse event data and needs to map it correctly to the AE domain.


  The source data includes the following fields that need SDTM mapping decisions:


  - **AETERM**: Verbatim adverse event term (e.g., "stomach pain")

  - **AEDECOD**: MedDRA preferred term (e.g., "Abdominal pain")

  - **AEBODSYS**: MedDRA system organ class

  - **AESTDTC**: Start date/time in ISO 8601 format

  - **AEENDTC**: End date/time (some missing for ongoing events)

  - **AESER**: Seriousness flag (Y/N)

  - **AEREL**: Investigator-assessed relationship to study drug (5-point scale: "Definitely
  Related", "Probably Related", "Possibly Related", "Unlikely Related", "Not Related")

  - **AEACN**: Action taken with study drug

  - **CAUSALITY_SPONSOR**: Sponsor''s independent causality assessment (not in standard
  SDTM AE domain variables)


  The team is unsure how to handle **CAUSALITY_SPONSOR** and whether it belongs in
  the main AE dataset or requires a SUPPQUAL dataset. They also need to understand
  the required vs. expected vs. permissible variable classifications.


  Please provide: (1) a mapping recommendation for CAUSALITY_SPONSOR including whether
  SUPPQUAL is needed and the exact SUPPQUAL variable naming conventions, (2) a brief
  explanation of required/expected/permissible variable classifications with examples
  from the AE domain, and (3) sample SAS code to create the SUPPAE dataset for CAUSALITY_SPONSOR
  following CDISC standards.'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: easy
