id: edc-data-validation-27
prompt: 'You are building an automated SDTM validation pipeline for a Phase II oncology
  trial (Study ONC-2024-007) with 145 enrolled patients. The trial includes domains:
  DM, VS, LB, AE, CM, and EX. Your EDC export from Veeva Vault CDMS has produced SAS
  datasets, and you need to validate them before database lock.


  Specific issues discovered during initial review:

  - The LB domain contains LBTESTCD values including "NEUABS" (absolute neutrophils),
  "HGBVAL" (hemoglobin), and "PLT_CNT" (platelet count) that may not conform to CDISC
  CT

  - Several AE records show AESTDTC with partial dates (format "2024-03") that need
  ISO 8601 handling

  - The EX domain has 12 records where EXENDTC precedes EXSTDTC

  - VSORRESU contains a mix of "mmHg", "mm Hg", and "mmhg" for blood pressure units


  **Deliverables requested:**

  1. A Python function to validate LBTESTCD values against the CDISC CT lab test codes
  (NCI Thesaurus C65047) and flag non-conforming entries with suggested corrections

  2. A pandas-based cross-domain consistency check that verifies AE start dates fall
  within the patient''s study participation window (using DM''s RFSTDTC and RFENDTC)

  3. A function to standardize VSORRESU unit strings using a normalization dictionary
  and flag remaining non-standard values

  4. A summary report generator that outputs a prioritized CSV of all validation findings
  with columns: DOMAIN, USUBJID, VARIABLE, FINDING, SEVERITY (Critical/Major/Minor),
  SUGGESTED_ACTION'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: intermediate
