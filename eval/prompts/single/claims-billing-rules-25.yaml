id: claims-billing-rules-25
prompt: 'A regional health plan is conducting a retrospective claims audit on a high-volume
  orthopedic surgery group (Ortho Partners LLC) covering January–December 2023. The
  audit team has flagged the following billing patterns across 847 claims:


  - **Pattern A:** Modifier 59 appended to CPT 29881 (knee arthroscopy with meniscectomy)
  when billed same-day as CPT 29879 (chondroplasty), occurring in 312 claims

  - **Pattern B:** E&M code 99215 billed with Modifier 25 on the same day as minor
  surgical procedures (CPT codes 20610, 20605) in 289 claims — the 99215 utilization
  rate is 78% vs. a peer benchmark of 31%

  - **Pattern C:** CPT 27447 (total knee arthroplasty) billed with post-operative
  visits (99213, 99214) within the 90-day global surgery period without Modifier 24
  or 79, across 246 claims


  **Your deliverables:**


  1. For each pattern (A, B, C), explain the specific CMS/NCCI billing rule being
  violated or potentially violated, including relevant modifier indicators and global
  period logic.


  2. Classify each pattern on a spectrum from likely coding error to potential fraud,
  with justification based on FWA investigation methodology principles.


  3. Describe the additional data elements the audit team should pull to distinguish
  innocent miscoding from intentional upcoding or unbundling for each pattern.


  4. Recommend a structured audit action plan with prioritization, including thresholds
  for referral to a Special Investigations Unit (SIU) versus provider education.'
target_skills:
- claims-billing-rules
