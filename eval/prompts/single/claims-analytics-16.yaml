id: claims-analytics-16
prompt: 'You are a healthcare data analyst at a regional Medicare Advantage plan with
  85,000 members. Your data team has extracted 18 months of professional claims (January
  2023 – June 2024) from your data warehouse into a pandas DataFrame called `claims_df`
  with the following columns: `claim_id`, `provider_npi`, `provider_specialty`, `service_date`,
  `cpt_code`, `icd10_primary`, `billed_amount`, `allowed_amount`, `units`, `place_of_service`,
  `member_id`.


  You''ve been asked to investigate potential E&M upcoding among internal medicine
  providers (specialty code `207R00000X`). Your medical director suspects that a subset
  of providers are disproportionately billing 99215 (high-complexity office visits)
  compared to specialty peers.


  **Deliverables required:**


  1. Write Python code using pandas to compute each internal medicine provider''s
  E&M code distribution across codes 99211–99215, then calculate the percentage of
  visits billed at 99215 for each provider.


  2. Identify statistical outliers using the IQR method on the 99215 percentage distribution,
  flagging any provider whose rate exceeds Q3 + 1.5×IQR.


  3. For flagged providers, calculate their average billed amount per 99215 claim
  versus the specialty peer average, and count how many distinct member IDs they billed
  on any single calendar date (to surface potential "impossible day" scenarios where
  a provider bills more than 18 unique patients in one day).


  4. Produce a summary DataFrame called `outlier_summary` containing: `provider_npi`,
  `pct_99215`, `avg_billed_99215`, `peer_avg_billed_99215`, `max_patients_single_day`,
  and an `outlier_flag` boolean column.


  5. Briefly explain what additional claim attributes or external data sources you
  would incorporate to strengthen or refute an upcoding finding before escalating
  to a Special Investigations Unit.'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: intermediate
