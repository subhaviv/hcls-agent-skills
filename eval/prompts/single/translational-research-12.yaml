id: translational-research-12
prompt: 'A preclinical team has been studying KRAB47, a novel kinase expressed in
  dopaminergic neurons, as a potential target for Parkinson''s disease. Their data
  package includes: (1) GWAS hit at chromosome 6q22 with lead SNP rs7741203 (p = 3.2
  × 10⁻⁸, OR = 1.18) co-localizing with a brain eQTL showing increased KRAB47 expression
  in substantia nigra; (2) a selective small-molecule inhibitor (KI-882) that reduces
  α-synuclein aggregation by 65% in primary neuron cultures at 100 nM; (3) KI-882
  administered to 6-OHDA hemilesioned rats (n=12 per group) showed 40% improvement
  in rotarod performance vs. vehicle at 4 weeks; and (4) KRAB47 protein levels are
  elevated 2.3-fold in postmortem substantia nigra from 15 PD patients vs. 15 controls.


  The team wants to advance KI-882 into a Phase 1b proof-of-mechanism study in early
  PD patients (Hoehn & Yahr 1–2, within 2 years of diagnosis).


  Please provide:

  1. A structured target validation scorecard assessing the strength of each evidence
  pillar (genetic, cellular, in vivo, human tissue) using a traffic-light rating with
  justification

  2. Identification of the two most critical translational gaps that must be addressed
  before first-in-human dosing

  3. A recommended biomarker strategy for the Phase 1b study, specifying at least
  one target engagement biomarker, one pharmacodynamic biomarker, and the proposed
  context of use for each

  4. A brief go/no-go decision framework with specific thresholds the Phase 1b study
  must meet to justify advancement to Phase 2'
target_skills:
- translational-research
domain: cross-domain
difficulty: easy
