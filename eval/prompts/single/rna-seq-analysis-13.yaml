id: rna-seq-analysis-13
prompt: 'You are analyzing bulk RNA-seq data from a mouse neuroinflammation study
  comparing 3 control mice versus 3 LPS-treated mice. You used Salmon (version 1.9.0)
  with default parameters to quantify expression against the GRCm39 mouse transcriptome,
  generating `quant.sf` files for all 6 samples. You now want to perform differential
  expression analysis using DESeq2 in R.


  Your sample metadata is straightforward:


  | sample_id | condition |

  |-----------|-----------|

  | ctrl_1 | control |

  | ctrl_2 | control |

  | ctrl_3 | control |

  | lps_1 | treated |

  | lps_2 | treated |

  | lps_3 | treated |


  Please provide the following:


  1. **Complete R code** to import the Salmon quantification files using `tximport`,
  linking transcripts to genes using a tx2gene mapping derived from a TxDb or biomaRt
  approach (specify which and show the code). Use the `"lengthScaledTPM"` method for
  tximport.


  2. **Complete DESeq2 setup code** starting from the tximport output, including creation
  of the `DESeqDataSet`, setting the appropriate design formula, running the DESeq
  pipeline, and extracting results comparing treated vs. control.


  3. **Explanation** of why `tximport` with `lengthScaledTPM` is preferred over simply
  passing raw transcript counts directly to DESeq2 when working with Salmon output.


  4. **One specific DESeq2 parameter or function** you would add to improve effect
  size estimates for downstream visualization (e.g., a volcano plot), and why.'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: easy
