id: translational-research-19
prompt: 'Here is test question #19 of 30:


  ---


  You are advising a neurology biotech that has identified **KCTD9** as a candidate
  therapeutic target in frontotemporal dementia (FTD). Their evidence package includes:
  (1) a GWAS hit at chr12q24.1 (lead SNP rs7294519, p=3.2×10⁻⁸, n=4,200 FTD cases
  / 18,500 controls); (2) colocalization with a brain eQTL in dorsolateral prefrontal
  cortex (PP4=0.81, GTEx v8); (3) Mendelian randomization using 14 cis-eQTL instruments
  showing OR=1.34 per SD increase in KCTD9 expression (95% CI 1.18–1.53, p=4.1×10⁻⁶);
  (4) KCTD9 knockout in iPSC-derived cortical neurons showing 40% reduction in TDP-43
  nuclear localization; and (5) no published KCTD9 biology in neurodegeneration. A
  competing hypothesis exists: the GWAS signal may be driven by a nearby gene **SLC39A5**
  (r²=0.62 with rs7294519), which has known metal transporter function relevant to
  neurodegeneration.


  **Deliverables requested:**


  1. Critically evaluate the strength of the current KCTD9 target validation package
  using a structured framework (genetic, functional, disease-relevance tiers), explicitly
  addressing the SLC39A5 confound and what additional experiments would resolve it.

  2. Design a 12-month target validation roadmap with prioritized experiments, specifying
  model systems, key readouts, and go/no-go decision criteria at 6 and 12 months.

  3. If the team advances to a first-in-human study, propose a proof-of-mechanism
  biomarker strategy — specify biomarker type, context of use, matrix, assay technology,
  and the minimum detectable change required to declare target engagement.

  4. Identify the single highest-risk assumption in this entire program and describe
  how you would stress-test it within 90 days.'
