id: cheminformatics-17
prompt: 'You are building a virtual screening pipeline for a kinase inhibitor project.
  Your compound library contains 50,000 molecules in SMILES format, and you want to
  identify drug-like candidates while removing problematic compounds before running
  expensive docking calculations.


  Your filtering criteria are:

  - **Lipinski Rule of Five**: MW ≤ 500, LogP ≤ 5, HBD ≤ 5, HBA ≤ 10

  - **Veber rules**: rotatable bonds ≤ 10, TPSA ≤ 140 Å²

  - **PAINS removal**: eliminate pan-assay interference compounds

  - **Similarity enrichment**: retain only compounds with Tanimoto similarity ≥ 0.35
  to the reference kinase inhibitor staurosporine (SMILES: `CN1CCN2C(=O)c3[nH]c4ccccc4c3C2=C1`)


  Using RDKit, please provide:


  1. **Complete Python code** implementing the full sequential filtering pipeline
  (Lipinski → Veber → PAINS → similarity filter) that reads from a file `compounds.smi`,
  applies each filter in order, and writes passing compounds to `filtered_candidates.smi`


  2. **A logging function** that prints how many compounds pass/fail at each stage
  (e.g., "After Lipinski: 32,450 pass, 17,550 fail")


  3. **Explanation** of why PAINS filtering should occur before or after the similarity
  search step, and how this ordering affects the final compound count and quality


  4. **Code to generate Morgan fingerprints** (radius=2, nBits=2048) for the similarity
  calculation, including the reference compound'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: intermediate
