id: scrna-seq-pipeline-23
prompt: "You have completed a 10X Chromium scRNA-seq experiment on peripheral blood\
  \ mononuclear cells (PBMCs) from 3 healthy donors. CellRanger output is stored in\
  \ separate directories: `donor1/filtered_feature_bc_matrix/`, `donor2/filtered_feature_bc_matrix/`,\
  \ and `donor3/filtered_feature_bc_matrix/`. Each sample contains approximately 5,000\
  \ cells. You want to perform a complete preprocessing and quality control pipeline\
  \ before any downstream analysis.\n\n**Your tasks:**\n\n1. Write Python code using\
  \ Scanpy to load all three samples using `sc.read_10x_mtx()`, add a `batch` column\
  \ to each AnnData object identifying the donor, and concatenate them into a single\
  \ AnnData object.\n\n2. Generate QC metrics for each cell including number of genes\
  \ detected (`n_genes_by_counts`), total UMI counts (`total_counts`), and mitochondrial\
  \ gene percentage (`pct_counts_mt`). Assume mitochondrial genes start with the prefix\
  \ `\"MT-\"`.\n\n3. Apply the following filtering thresholds and explain why each\
  \ threshold is biologically justified:\n   - Remove cells with fewer than 200 or\
  \ more than 2,500 genes detected\n   - Remove cells with total UMI counts below\
  \ 500\n   - Remove cells with mitochondrial percentage above 20%\n   - Remove genes\
  \ detected in fewer than 3 cells\n\n4. After filtering, normalize the data to 10,000\
  \ counts per cell using `sc.pp.normalize_total()`, apply log1p transformation, and\
  \ identify the top 2,000 highly variable genes using `sc.pp.highly_variable_genes()`\
  \ with `flavor=\"seurat\"`.\n\nProvide complete, runnable code with inline comments\
  \ and print statements showing cell counts before and after each filtering step."
target_skills:
- scrna-seq-pipeline
domain: single-cell
difficulty: easy
