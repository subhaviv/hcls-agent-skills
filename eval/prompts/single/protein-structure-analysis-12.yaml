id: protein-structure-analysis-12
prompt: 'You have obtained a crystal structure of the fictional enzyme **TrpX synthase**
  (PDB-like file: `trpx_apo.pdb`, single chain A, 312 residues) and want to perform
  a basic quality assessment before proceeding to virtual screening. Initial inspection
  suggests the structure was solved at 2.1 Å resolution, but a colleague warns that
  several residues in the loop region (residues 145–162) may have poor backbone geometry.


  **Please provide the following deliverables:**


  1. **Python code using Biopython** to parse `trpx_apo.pdb`, extract all backbone
  φ (phi) and ψ (psi) dihedral angles for chain A, and identify any residues whose
  (φ, ψ) angles fall outside the favored Ramachandran regions (define "favored" as:
  α-helix region −80° ± 40° for φ and −45° ± 40° for ψ; β-sheet region −120° ± 40°
  for φ and +130° ± 40° for ψ). Print a table of outlier residues with their residue
  number, residue name, φ, and ψ values.


  2. **Python code** to calculate and plot the per-residue B-factor profile for all
  Cα atoms in chain A, highlighting residues 145–162 in red on the plot using matplotlib.


  3. **Brief interpretation** (3–5 sentences): Given that residues 145–162 show both
  Ramachandran outliers and elevated B-factors (assume your analysis confirms this),
  explain what this means structurally and whether this region should be a concern
  when defining a binding pocket near residues 150–158 for docking purposes.


  Use standard Biopython `Bio.PDB` modules and assume the PDB file is well-formatted
  with ATOM records only.'
