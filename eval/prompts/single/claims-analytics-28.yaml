id: claims-analytics-28
prompt: 'Here is test question #28 of 30:


  ---


  You are a healthcare fraud analyst investigating a suspicious orthopedic surgery
  group, **OrthoEdge Partners (NPI: 1234567890)**, operating across 12 providers in
  three states. Your claims database contains 18 months of X12 837P professional claims
  (approximately 94,000 claim lines) for this group. Initial review flags the following
  anomalies:


  - **Provider NPI 1234567891** billed CPT 27447 (total knee arthroplasty) on **312
  distinct dates**, with 8 dates showing **3+ procedures billed for different patients
  within the same 2-hour OR block**

  - **CPT pair 29881 + 29882** (knee arthroscopy procedures) appear together on **2,847
  claims** — a known NCCI bundling conflict

  - Charges for CPT 99214 follow a suspiciously tight distribution: $287, $288, $289,
  $290 appearing in a ratio inconsistent with Benford''s Law expectations for the
  leading digit "2"

  - Modifier **-59** (distinct procedural service) is appended to the second procedure
  in 94% of the NCCI-conflicting pairs


  **Deliverables required:**


  1. Write Python code using `pandas` to detect "impossible surgical day" violations
  — where a single surgeon bills more OR minutes than physically possible in a calendar
  day (assume max 600 OR minutes/day), using CPT-to-typical-duration mapping for the
  top 10 orthopedic CPT codes

  2. Write a SQL query to flag all NCCI-conflicting CPT pairs where modifier -59 was
  inappropriately applied, cross-referencing a `ncci_edits` table with columns `(cpt1,
  cpt2, edit_type, modifier_allowed)`

  3. Perform a Benford''s Law chi-square analysis in Python on the leading digits
  of all charge amounts, and interpret whether the CPT 99214 charge clustering constitutes
  a statistically significant deviation (α = 0.05)

  4. Provide a prioritized fraud risk scoring rubric combining all three signals into
  a composite provider risk score'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: hard
