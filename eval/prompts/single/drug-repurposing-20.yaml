id: drug-repurposing-20
prompt: 'Here is test question #20 of 30:


  ---


  You are evaluating a drug repurposing opportunity for **idiopathic pulmonary fibrosis
  (IPF)** using a multi-evidence integration approach. Your team has generated the
  following data:


  **Connectivity Map (CMap/L1000) results** for an IPF gene-expression signature (n=847
  IPF patients vs. 203 controls, DEGs: 412 upregulated, 389 downregulated): Top connectivity
  scores include **vorinostat** (tau = −0.87), **trichostatin A** (tau = −0.91), and
  **belinostat** (tau = −0.83) — all HDAC inhibitors. However, a recent Phase II trial
  of vorinostat in IPF (NCT_FICTIONAL_2847) showed no improvement in FVC decline (primary
  endpoint missed, p=0.43) despite strong preclinical data in TGF-β1–induced fibrosis
  models.


  **OpenTargets query** reveals that the gene **HDAC6** has an association score of
  0.71 with IPF, while **HDAC2** scores only 0.31. Vorinostat is a pan-HDAC inhibitor;
  **tubastatin A** is a selective HDAC6 inhibitor (currently investigational, not
  approved).


  **DGIdb query** identifies **romidepsin** (approved for CTCL) as having HDAC1/2
  inhibitory activity with limited HDAC6 activity.


  Given this conflicting evidence landscape, provide:

  1. A mechanistic interpretation of why pan-HDAC inhibition may have failed in the
  Phase II trial despite CMap signal

  2. A ranked repurposing candidate list (approved drugs only) with justification
  using the evidence hierarchy

  3. Python pseudocode to integrate CMap tau scores, OpenTargets association scores,
  and DGIdb interaction confidence into a composite repurposing rank score

  4. A clinical translatability assessment for your top candidate, including biomarker
  strategy and patient stratification recommendations'
target_skills:
