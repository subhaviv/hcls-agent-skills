id: ngs-quality-control-27
prompt: 'You have completed initial sequencing of a whole-exome sequencing (WES) cohort
  of 48 tumor-normal pairs. Before proceeding to variant calling, your team needs
  a comprehensive QC assessment. The sequencing facility reports that a subset of
  samples may have been affected by a library preparation batch issue that introduced
  index-hopping artifacts, and you suspect some samples may have insufficient on-target
  coverage.


  Your target intervals file is `targets_hg38.bed` (converted to Picard interval format
  as `targets_hg38.interval_list`), and you have the standard setup: `THREADS=8`,
  `OUT=qc_out`, paired FASTQs `sample_R1.fastq.gz`/`sample_R2.fastq.gz`, coordinate-sorted
  `sample.bam` with index, and `ref.fasta`.


  **Deliverables:**


  1. Write a `fastp` command that performs adapter trimming with aggressive quality
  filtering (Q20 base quality, minimum read length 50 bp, polyX tail trimming) and
  generates JSON/HTML reports suitable for MultiQC aggregation.


  2. Write a `mosdepth` command to calculate per-base and per-target coverage for
  the WES experiment, outputting quantized coverage bins at thresholds 0×, 10×, 20×,
  50×, 100× for identifying low-coverage regions.


  3. Write the Picard `CollectHsMetrics` command to capture hybrid-selection metrics,
  specifying a minimum base quality of 20 and minimum mapping quality of 20, with
  per-target coverage output enabled.


  4. Given that your QC thresholds require ≥80% of target bases covered at ≥50× and
  mean target coverage ≥120×, write a Python snippet that parses the Picard `.hs_metrics`
  file to flag samples failing either criterion and outputs a TSV summary.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: intermediate
