id: hedis-measure-specification-10
prompt: 'A regional health plan is preparing for HEDIS MY2024 measurement and has
  identified a complex patient cohort for the **Statin Therapy for Patients with Cardiovascular
  Disease (SPC)** measure. The plan''s analytics team has pulled the following data
  for a member named Patricia Holloway (DOB: 03/14/1958):


  - Continuous enrollment: January 1, 2023 – December 31, 2023 (no gaps)

  - ASCVD diagnosis (ICD-10: I25.10) confirmed via claim dated February 8, 2022

  - Statin prescription (atorvastatin 40mg) dispensed on January 15, 2023 (30-day
  supply)

  - Second statin fill (rosuvastatin 20mg) dispensed on March 20, 2023 (90-day supply)

  - No statin fills after June 17, 2023

  - Hospice enrollment: November 1, 2023 – December 31, 2023

  - Rhabdomyolysis diagnosis (ICD-10: M62.82) documented on September 5, 2023


  Given this scenario, provide the following deliverables:


  1. **Denominator eligibility determination**: Confirm whether Patricia meets denominator
  criteria for SPC, citing specific HEDIS MY2024 enrollment and clinical event requirements.


  2. **Exclusion analysis**: Evaluate all potential exclusions (hospice, statin intolerance/adverse
  event) and determine whether any apply, with specific reference to NCQA''s exclusion
  hierarchy and timing rules.


  3. **Numerator compliance assessment**: For whichever compliance year strata apply
  (Received Statin Therapy vs. Statin Adherence PDC ≥80%), calculate whether Patricia
  meets each numerator component using the dispensing data provided.


  4. **Care gap status and Star Rating impact**: Classify Patricia''s final measure
  status and explain how this outcome affects the plan''s Star Rating under CMS Part
  C weightings for this measure category.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: hard
