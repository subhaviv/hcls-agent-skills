id: pa-clinical-policy-21
prompt: 'A 58-year-old patient with moderate-to-severe rheumatoid arthritis (RA) has
  been prescribed Abatacept (Orencia) 125mg subcutaneous weekly by their rheumatologist.
  The commercial payer (BlueShield Horizon) has issued a prior authorization denial
  citing failure to meet step therapy requirements. The payer''s clinical policy (Policy
  #UM-RHEUM-2024-07) requires documented inadequate response or intolerance to at
  least two conventional DMARDs (methotrexate AND one additional csDMARD such as hydroxychloroquine,
  leflunomide, or sulfasalazine) before approving any biologic DMARD.


  The patient''s medical record shows:

  - 14-month trial of methotrexate 20mg weekly (discontinued due to hepatotoxicity,
  ALT elevated 3x ULN)

  - 6-month trial of hydroxychloroquine 400mg daily (discontinued due to inadequate
  disease control, DAS28 score remained 5.8)

  - Current DAS28 score: 6.2 (high disease activity)

  - Negative TB screening, up-to-date vaccinations

  - No prior biologic exposure


  Please provide the following:

  1. An analysis of whether this patient''s documented history satisfies the payer''s
  step therapy requirements as stated, identifying any potential gaps or ambiguities

  2. A structured appeal letter framework addressing the clinical criteria point-by-point,
  including relevant ACR guideline citations that support biologic initiation

  3. A recommended peer-to-peer review talking points outline the prescribing physician
  could use if the first-level appeal is unsuccessful

  4. Identification of any state step therapy override law protections that would
  commonly apply in this scenario, and how to invoke them'
target_skills:
- pa-clinical-policy
domain: healthcare-ops
difficulty: easy
