id: claims-analytics-21
prompt: 'A regional health plan has provided you with a sample of X12 837P professional
  claims data exported as a flat text file. The segment data for three claims is as
  follows:


  **Claim 1:** NPI 1234567890, DOS 20240315, CPT 99213, Charge $185, DX ICD-10 J06.9

  **Claim 2:** NPI 1234567890, DOS 20240315, CPT 99214, Charge $265, DX ICD-10 J06.9

  **Claim 3:** NPI 9876543210, DOS 20240301, CPT 99215, Charge $340, DX ICD-10 M54.5


  The plan wants to begin building a lightweight claims parsing pipeline in Python.
  Using pandas and standard libraries (no proprietary EDI parsers), please provide
  the following deliverables:


  1. **A Python function** that accepts a list of claim dictionaries (structured like
  the sample data above) and loads them into a pandas DataFrame with properly typed
  columns (NPI as string, DOS as datetime, charge as float).


  2. **A second function** that flags any claims where the same NPI submitted more
  than one E&M code (99201–99215) on the same date of service — a basic same-day duplicate
  E&M check — returning a filtered DataFrame of flagged records.


  3. **A brief explanation** (3–5 sentences) of why same-day duplicate E&M billing
  is considered a potential fraud indicator, and what legitimate clinical scenarios,
  if any, might produce this pattern and how an analyst should handle those exceptions.


  Keep code concise, well-commented, and executable in a standard Python 3.9+ environment.'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: easy
