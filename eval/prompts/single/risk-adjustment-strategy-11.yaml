id: risk-adjustment-strategy-11
prompt: 'A Medicare Advantage plan with 45,000 members is preparing for the 2024 payment
  year, during which CMS applies a blended transition methodology combining V24 and
  V28 model outputs. The plan''s analytics team has pulled the following summary data
  for a cohort of 1,200 members flagged for potential coding gaps:


  - 380 members have documented Type 2 diabetes with chronic kidney disease stage
  3 in their medical records but only diabetes without complications coded in the
  current RAF calculation

  - 215 members have COPD documented in physician notes but no respiratory HCC captured

  - 180 members have major depressive disorder documented but no mental health HCC
  submitted


  The plan''s current blended RAF score for this cohort averages 1.42. The medical
  director wants to understand the impact of closing these coding gaps under both
  V24 and V28 individually, as well as under the 2024 blended transition (which weights
  V24 at 67% and V28 at 33%).


  Please provide the following:


  1. A plain-language explanation of how the V24-to-V28 blended transition methodology
  works and why it matters for this cohort

  2. For the diabetes + CKD stage 3 gap specifically, identify the relevant HCC categories
  under both V24 and V28, including any disease hierarchy rules that apply

  3. A prioritization framework for which coding gap category (diabetes/CKD, COPD,
  or MDD) should be addressed first, based on expected RAF impact and audit-defensibility
  considerations

  4. Three specific documentation elements that providers must include in the medical
  record to make HCC recapture audit-defensible for the diabetes + CKD combination'
target_skills:
- risk-adjustment-strategy
domain: healthcare-ops
difficulty: easy
