id: pa-decision-automation-13
prompt: 'A regional health plan processes approximately 4,200 prior authorization
  requests per month for specialty medications. Their PA operations team has extracted
  a historical dataset of 18,000 completed PA decisions (spanning 24 months) with
  the following features per request: member age, diagnosis ICD-10 code, requested
  drug NDC, prescriber NPI specialty, step therapy completion flag (boolean), quantity
  requested vs. formulary limit ratio, days since last PA approval for same drug class,
  and lab value indicator (binary: required lab submitted yes/no). The outcome label
  is binary: Approved (1) or Denied (0), with a 34% denial rate in the dataset.


  Your task is to build a foundational PA decision automation pipeline. Please provide:


  1. **Feature engineering recommendations**: Identify which of the 8 features are
  likely highest-signal for predicting denials and explain why, referencing common
  PA denial drivers in commercial health plans.


  2. **Model selection rationale**: Compare two candidate classifiers (gradient boosting
  vs. logistic regression) for this use case, considering interpretability requirements
  under CMS transparency rules.


  3. **Python code skeleton**: Write a scikit-learn pipeline (roughly 40–60 lines)
  that ingests a pandas DataFrame with these 8 columns, applies appropriate preprocessing
  (encoding, scaling), trains a gradient boosting classifier with class-weight balancing
  for the 34% denial rate imbalance, and outputs both a predicted label and a probability
  score.


  4. **SHAP explainability snippet**: Add a short code block (10–15 lines) that generates
  SHAP summary values for the trained model and identifies the top 3 features driving
  denials.


  Use realistic but fictional variable names consistent with a PA intake schema.'
target_skills:
- pa-decision-automation
domain: healthcare-ops
difficulty: easy
