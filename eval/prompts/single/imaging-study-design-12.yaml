id: imaging-study-design-12
prompt: 'A neuroimaging researcher at a single academic center is planning a cross-sectional
  study examining cortical thickness differences between 45 patients with early-stage
  Parkinson''s disease (Hoehn & Yahr stage 1-2, mean age 64 ± 8 years) and 45 age-matched
  healthy controls. All participants will be scanned on a 3T Siemens Prisma scanner
  using a T1-weighted MPRAGE sequence (TR=2300ms, TE=2.98ms, TI=900ms, flip angle=9°,
  1mm isotropic voxels). The researcher plans to use FreeSurfer 7.3 for cortical parcellation
  and ultimately wants to report thickness values in a standard space for group comparison.


  The researcher is uncertain about two key decisions:

  1. Whether to perform the FreeSurfer recon-all pipeline in native space or register
  outputs to MNI152 space before statistical analysis

  2. Which covariates to include in the general linear model (GLM) beyond age and
  sex


  **Please provide:**

  - A clear recommendation on native space vs. MNI space for this cortical thickness
  analysis, with justification specific to FreeSurfer workflows

  - A list of at least four additional covariates the researcher should consider including
  in the GLM, with a one-sentence rationale for each

  - A brief quality control (QC) checklist (minimum 5 items) the researcher should
  apply to the FreeSurfer outputs before proceeding to group analysis

  - A suggested multiple comparisons correction strategy appropriate for a vertex-wise
  cortical thickness analysis in this sample size'
target_skills:
- imaging-study-design
domain: imaging
difficulty: easy
