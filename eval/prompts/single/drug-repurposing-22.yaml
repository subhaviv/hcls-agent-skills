id: drug-repurposing-22
prompt: 'A small biotech company is evaluating **metformin** (an approved type 2 diabetes
  drug) as a candidate for repurposing in **pancreatic ductal adenocarcinoma (PDAC)**.
  Their research team has compiled the following preliminary data:


  - Metformin''s primary known targets: **AMPK activation** (indirect, via LKB1/STK11),
  **Complex I inhibition** (mitochondrial), and **HMGB1 suppression**

  - PDAC driver genes of interest: *KRAS*, *TP53*, *SMAD4*, *CDKN2A*, *STK11*

  - Internal cell viability data shows 34% reduction in PANC-1 cell proliferation
  at 10mM metformin (in vitro)

  - A retrospective cohort of 312 diabetic PDAC patients shows a modest survival benefit
  (HR=0.81, 95% CI: 0.63–1.04) in metformin users vs. non-users

  - No prior Phase II/III trials specifically in PDAC have been completed


  Please provide the following:


  1. **Mechanism-of-action overlap analysis**: Which metformin targets mechanistically
  intersect with PDAC oncogenic pathways, and how strong is that biological rationale?

  2. **Evidence hierarchy ranking**: Using standard repurposing evidence tiers (preclinical,
  epidemiological, clinical), classify and critique the existing evidence for this
  indication

  3. **DGIdb/OpenTargets query strategy**: Describe a specific step-by-step query
  workflow a researcher would use to identify additional drug-gene interactions supporting
  this repurposing hypothesis

  4. **Translatability assessment**: Identify at least two critical translational
  gaps in the current data and propose how each could be addressed

  5. **Go/No-Go recommendation**: Based on the totality of evidence, provide a justified
  recommendation on whether to advance metformin into a PDAC-specific Phase II trial'
target_skills:
- drug-repurposing
domain: drug-discovery
difficulty: easy
