id: ml-researcher-13
prompt: 'You are developing a 30-day hospital readmission prediction model using EHR
  data from a single academic medical center. Your dataset contains 45,200 adult inpatient
  encounters from January 2018 to December 2022, with a readmission rate of 12.3%.
  Features include demographics (age, sex, race/ethnicity), 847 ICD-10 diagnosis codes,
  312 procedure codes, 94 lab values at discharge, length of stay, and discharge disposition.
  You plan to deploy the model starting January 2023.


  You are considering three candidate models: L2-regularized logistic regression,
  XGBoost, and a feedforward neural network with two hidden layers (256 and 128 units).


  Please provide the following:


  1. **Data splitting strategy**: Recommend a specific train/validation/test split
  approach that avoids temporal leakage, given the five-year date range and planned
  deployment date. Justify your choice over random splitting.


  2. **Class imbalance handling**: Describe two concrete techniques appropriate for
  this imbalance ratio (roughly 1:7), specifying any hyperparameters (e.g., scale_pos_weight
  values, SMOTE k-neighbors).


  3. **Metric selection**: Explain whether AUROC or AUPRC is more appropriate as the
  primary metric for model selection, and name one additional clinical utility metric
  you would report.


  4. **Fairness audit**: Identify two specific subgroups from the available features
  where you would evaluate performance disparities, and name the fairness metric you
  would apply.


  5. **Calibration**: Describe how you would assess and correct for miscalibration
  in the chosen model before clinical deployment, including at least one plot and
  one statistical test.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: easy
