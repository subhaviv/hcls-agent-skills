id: rna-seq-analysis-27
prompt: 'You are analyzing a bulk RNA-seq dataset from a mouse liver study comparing
  wild-type (n=4) vs. knockout (n=4) animals. You used STAR (v2.7.10) to align reads
  to mm10, achieving 85-92% alignment rates, then ran featureCounts with default parameters
  to generate a count matrix. However, when you import the counts into DESeq2, you
  notice that only ~8,500 genes have non-zero counts across all samples, and the median
  library size is just 4.2 million assigned reads per sample (despite ~35 million
  total reads per sample). Your collaborator suggests switching to Salmon for quantification
  instead.


  **Please provide:**


  1. **Diagnosis**: Identify at least three likely causes for the low assigned read
  fraction (~12% assignment rate) in featureCounts, given the STAR alignment rate
  was high (85-92%). Specify which featureCounts parameters you would inspect or modify.


  2. **Corrected featureCounts command**: Write a revised `featureCounts` command
  in bash that addresses the most common causes of low assignment, using appropriate
  flags for a paired-end, strand-specific (reverse-stranded) library with multi-mapping
  and chimeric read handling.


  3. **Salmon alternative**: Write the complete Salmon quantification command (quant
  mode) for one sample with reads `sample1_R1.fastq.gz` and `sample1_R2.fastq.gz`,
  using a pre-built mm10 index, appropriate for a reverse-stranded library. Include
  the `--validateMappings` flag and set a realistic `--numBootstraps` value.


  4. **DESeq2 import**: Provide R code to import Salmon results for all 8 samples
  using `tximport`, then construct a DESeqDataSet with the contrast WT vs. KO, and
  explain in one sentence why `tximport` with `type="salmon"` is preferred over raw
  count rounding.'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: intermediate
