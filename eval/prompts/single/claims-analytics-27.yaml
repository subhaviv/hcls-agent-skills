id: claims-analytics-27
prompt: 'Here is test question #27 of 30:


  ---


  You are a healthcare data analyst at a regional payer processing claims from 847
  unique providers across 12 specialties. Your compliance team suspects a subset of
  orthopedic surgeons may be engaging in **E&M upcoding** — systematically billing
  higher-complexity office visit codes than clinically warranted. You have access
  to a PostgreSQL database with a `claims` table containing columns: `claim_id`, `provider_npi`,
  `specialty_code`, `service_date`, `cpt_code`, `icd10_primary`, `billed_amount`,
  `units`, `place_of_service`.


  Your orthopedic peer group contains 63 providers. National benchmark data indicates
  the expected E&M distribution for orthopedic office visits (CPT 99211–99215) should
  approximate: 2%, 18%, 35%, 30%, 15% respectively. Your internal data shows provider
  NPI `1467823905` has billed the following distribution over 1,200 claims in the
  past 12 months: 0%, 3%, 12%, 41%, 44%.


  Please deliver the following:


  1. **SQL query** to calculate the E&M code distribution (as percentages) for every
  orthopedic provider, filtered to office visit place of service (POS code 11), for
  the trailing 12 months.

  2. **Python code** using SciPy to run a chi-square goodness-of-fit test comparing
  each provider''s observed E&M distribution against the national benchmark, flagging
  providers where p < 0.05.

  3. **Interpretation** of NPI `1467823905`''s specific distribution — what upcoding
  pattern does it suggest, and what secondary indicators (diagnosis mix, new vs. established
  patient ratio) would you recommend investigating next?

  4. A **risk-scoring formula** (can be pseudocode) that combines chi-square p-value,
  percentage of 99215 claims, and total claim volume into a single composite fraud
  risk score.'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: intermediate
