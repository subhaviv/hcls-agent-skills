id: ngs-quality-control-13
prompt: 'You have just received paired-end FASTQ files (`sample_R1.fastq.gz` and `sample_R2.fastq.gz`)
  from a whole-genome sequencing run and need to perform initial quality assessment
  before proceeding with alignment. Your sequencing facility has flagged potential
  adapter contamination and high duplication rates as common issues with this library
  preparation protocol (NEBNext Ultra II).


  Using the standard environment variables (`THREADS=8`, `OUT=qc_out`), please provide
  the following:


  1. **FastQC command**: Write the exact bash command to run FastQC on both FASTQ
  files simultaneously, directing all output to the `qc_out` directory.


  2. **fastp trimming command**: Write a complete fastp command that performs adapter
  auto-detection, quality trimming (minimum Phred score of 20), removes reads shorter
  than 50 bp after trimming, and generates both JSON and HTML reports. Save the trimmed
  output as `sample_R1_trimmed.fastq.gz` and `sample_R2_trimmed.fastq.gz`.


  3. **Post-trimming QC**: Write the FastQC command to assess the trimmed FASTQ files.


  4. **MultiQC aggregation**: Write the MultiQC command to aggregate all FastQC and
  fastp reports from the `qc_out` directory into a single summary report, also saved
  in `qc_out`.


  5. **Key metrics interpretation**: List three specific metrics you would examine
  in the MultiQC report to confirm that adapter trimming was successful and that the
  data is suitable for downstream alignment. Briefly explain what acceptable values
  look like for each metric.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: easy
