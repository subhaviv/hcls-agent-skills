id: ml-researcher-23
prompt: 'A hospital system has collected a retrospective EHR dataset of 18,400 adult
  patients admitted for community-acquired pneumonia between 2018–2023 across three
  hospital sites (Site A: n=9,200, Site B: n=5,100, Site C: n=4,100). The prediction
  task is 30-day all-cause mortality. Available features include 47 structured variables
  (vitals, labs, comorbidities, medications) and free-text admission notes. The outcome
  prevalence is 8.3% overall but varies by site: Site A 7.1%, Site B 9.8%, Site C
  10.4%.


  Your team plans to train an XGBoost model on Sites A and B combined, then validate
  on Site C as a held-out external test set. A junior researcher proposes using standard
  5-fold cross-validation on the combined A+B data for model selection, reporting
  AUROC as the primary metric, and applying SMOTE to the full dataset before splitting.


  Please provide:


  1. **A critique** of the junior researcher''s proposed pipeline, identifying at
  least four specific methodological flaws with explanations of why each is problematic
  in this clinical context.


  2. **A revised experimental design** that corrects these flaws, including the proper
  splitting strategy, cross-validation approach, and handling of class imbalance.


  3. **A revised metrics suite** (minimum four metrics) appropriate for this imbalanced
  binary outcome, with a brief justification for each metric''s clinical relevance.


  4. **A calibration assessment plan** describing which calibration plots and statistical
  tests to run, and how to interpret them for deployment readiness.


  5. **A short checklist** (5–7 items) of site-generalization checks to perform before
  declaring the Site C validation results trustworthy.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: easy
