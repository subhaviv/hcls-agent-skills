id: provider-denial-workup-04
prompt: 'Denial from BCBS of Illinois on CPT 99215 (level 5 office visit) with CARC
  CO-4 — the service is inconsistent with the modifier. DOS 2026-05-20, denial date
  2026-06-01, claim CLM-2026-663291, member ID BCB-9981033.

  The visit was a complex 75-minute evaluation of a new patient with multiple comorbidities
  (CHF, CKD stage 3, T2DM, afib). The physician billed 99215-25 because a separately
  identifiable E&M was performed the same day as a procedure (a thoracentesis, CPT
  32555). BCBS is saying modifier 25 is not appropriate here.

  Provider: Dr. Linda Chen MD, Internal Medicine, NPI 4455667788, Chicago Medical
  Group, 1200 N Lake Shore Dr, Chicago IL 60610, (312) 555-0144.

  Can you work up this denial and draft an appeal arguing the modifier 25 was correctly
  applied?'

target_skills:
- provider-denial-workup
