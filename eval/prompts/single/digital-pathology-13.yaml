id: digital-pathology-13
prompt: 'Here is test question #13 of 30:


  ---


  You are working with a cohort of 120 H&E-stained whole-slide images from the TCGA-LUAD
  dataset, stored as SVS files. You want to extract 256×256 pixel patches at 0.5 microns-per-pixel
  (mpp) resolution for downstream feature extraction using the H-optimus-0 foundation
  model. Before patch extraction, you need to apply tissue segmentation to exclude
  background, pen marks, and fatty tissue regions.


  Using TIAToolbox, please provide:


  1. **A complete Python code snippet** that loads a single SVS slide, runs TIAToolbox''s
  built-in tissue masking (`TissueMasker`) with morphological post-processing (erosion
  kernel size 5, minimum region area 10,000 pixels), and extracts non-overlapping
  256×256 patches at exactly 0.5 mpp, saving patch coordinates to a CSV file with
  columns `[slide_id, x, y, patch_width, patch_height, mpp]`.


  2. **A second code snippet** that loads the saved patch coordinates, reads each
  patch from the slide using TIAToolbox''s `WSIReader`, batches them into groups of
  32, runs them through H-optimus-0 (assume the model is already loaded as `model`
  on a CUDA device), and stores the resulting 1536-dimensional embeddings in an HDF5
  file keyed by `slide_id`.


  3. **A brief explanation** (3–5 sentences) of why extracting patches at a fixed
  mpp rather than a fixed magnification level is preferred for multi-scanner cohort
  studies, and what TIAToolbox utility handles this resolution normalization automatically.'
