id: quality-measures-13
prompt: 'Here is test question #13 of 30:


  ---


  You are a healthcare data analyst working with a regional health plan that covers
  45,000 commercial members. Your medical director wants to evaluate performance on
  the **Breast Cancer Screening (BCS) HEDIS measure** for the current measurement
  year (January 1 – December 31, 2024).


  Your claims database contains the following tables:

  - `members` (member_id, date_of_birth, gender, enrollment_start_date, enrollment_end_date,
  plan_type)

  - `claims` (claim_id, member_id, service_date, procedure_code, diagnosis_code, place_of_service)

  - `lab_results` (member_id, test_date, test_name, result_value)


  **Known parameters for BCS:**

  - Eligible population: Women aged 52–74 as of December 31, 2024

  - Required continuous enrollment: 12 months in measurement year with no more than
  one 45-day gap

  - Numerator event: Mammogram (CPT codes 77067, 77066, 77065) in the measurement
  year OR the year prior (2023)

  - Exclude members with a bilateral mastectomy history (ICD-10: Z90.13) or two unilateral
  mastectomies


  Please provide the following deliverables:


  1. **SQL query** to identify the eligible denominator population, correctly applying
  the age criteria and continuous enrollment logic including the allowable gap rule

  2. **SQL query** to identify numerator-qualifying members using the specified CPT
  codes across both look-back years

  3. **SQL query** to apply the bilateral mastectomy exclusion logic

  4. **Rate calculation query** that produces the final BCS measure rate as a percentage

  5. **Brief explanation** (3–5 sentences) of how the 45-day gap rule affects enrollment
  validation and a common implementation mistake to avoid'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: easy
