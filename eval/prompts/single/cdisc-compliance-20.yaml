id: cdisc-compliance-20
prompt: 'A Phase III oncology trial (STUDY-4821) is preparing an FDA eCTD submission
  with SDTM 3.3 and ADaM 1.1. The trial collected tumor assessment data using RECIST
  1.1 criteria, including target lesion measurements, non-target lesion responses,
  and overall tumor response. The programmers have mapped all tumor data into the
  RS (Disease Response) domain, but a Pinnacle 21 validation report flags 247 errors
  and 89 warnings, including: (1) RSSTRESC values "NON-CR/NON-PD" being rejected against
  CDISC CT for RS.RSSTRESC, (2) individual target lesion diameter measurements placed
  in RS rather than TR domain, (3) VISITNUM missing for 34 post-baseline records where
  assessments occurred between scheduled visits, and (4) SUPPRS containing a custom
  variable RSPRIORN (prior response flag) that lacks value-level metadata in define.xml.


  The submission timeline is 6 weeks away. Given these specific issues:


  1. Provide a corrected domain mapping strategy explaining which records belong in
  TR vs. TU vs. RS domains per SDTM IG Oncology Implementation Guide, and justify
  why the current RS-only approach is non-compliant.


  2. Resolve the "NON-CR/NON-PD" terminology conflict — identify the correct CDISC
  CT codelist and submission value, and explain how to handle legacy data already
  coded differently.


  3. Design the VISITNUM/VISIT assignment logic for unscheduled between-visit assessments,
  providing a concrete algorithm with example values for 3 representative records.


  4. Write the define.xml value-level metadata XML snippet required for SUPPRS.RSPRIORN,
  including all mandatory attributes per Define-XML 2.1 specification.


  5. Prioritize these four issues by regulatory risk and justify your ranking.'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: hard
