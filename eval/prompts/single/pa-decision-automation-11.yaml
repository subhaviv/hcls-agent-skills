id: pa-decision-automation-11
prompt: 'A regional health plan processes approximately 2,400 prior authorization
  requests per month for specialty medications. Their PA operations team has exported
  18 months of historical PA decisions into a CSV file with the following columns:
  `request_id`, `submission_date`, `decision_date`, `procedure_code`, `diagnosis_code_primary`,
  `drug_name`, `prescriber_npi`, `member_age`, `member_gender`, `clinical_notes_length_chars`,
  `num_supporting_docs`, `decision` (approved/denied), and `denial_reason_code`.


  Initial exploration reveals that 34% of requests are denied, with denial reason
  codes clustering around `AUTH-007` (insufficient clinical documentation), `AUTH-012`
  (step therapy not completed), and `AUTH-019` (diagnosis-indication mismatch). Turnaround
  time averages 4.2 days but spikes to 9+ days for certain drug classes including
  TNF inhibitors and PCSK9 inhibitors.


  Using this dataset context, please provide the following deliverables:


  1. **Python code** to load this CSV, engineer at least five meaningful features
  suitable for a binary PA decision classifier (approved vs. denied), and train a
  `RandomForestClassifier` with appropriate train/test splitting and class imbalance
  handling.


  2. **SHAP explanation code** that generates both a summary plot and a waterfall
  plot for a single prediction, identifying which features most strongly drive denial
  decisions.


  3. **A denial pattern analysis** — describe a systematic approach to mine the three
  denial reason codes mentioned above, including which feature combinations correlate
  most strongly with each code.


  4. **Two concrete operational recommendations** the health plan could implement
  to reduce denials without relaxing clinical criteria, based on patterns the model
  might uncover.'
target_skills:
- pa-decision-automation
domain: healthcare-ops
difficulty: easy
