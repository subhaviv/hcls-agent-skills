id: cell-type-annotation-17
prompt: 'You have processed a 10x Genomics scRNA-seq dataset from 8 pediatric ALL
  (acute lymphoblastic leukemia) bone marrow samples (4 diagnosis, 4 relapse) containing
  approximately 45,000 cells after QC. Leiden clustering at resolution 0.6 produced
  22 clusters. You need to annotate these clusters to distinguish malignant B-cell
  precursors from normal hematopoietic populations (HSCs, myeloid progenitors, T cells,
  NK cells, normal B cells, erythroid precursors).


  Your plan is to use a **hierarchical two-pass CellTypist annotation**: first a broad
  immune annotation using the `Immune_All_Low.pkl` model to establish major lineages,
  then a second pass on B-lineage clusters using the `Human_Hematopoietic_Precursors.pkl`
  model to resolve precursor subtypes. You also have a reference PBMC dataset (3,000
  cells) with curated labels for SingleR validation.


  Please provide:


  1. Complete Python code implementing the two-pass CellTypist strategy with `majority_voting=True`,
  including how to subset B-lineage clusters for the second annotation pass and merge
  results back into the full AnnData object


  2. Code to run SingleR (via `celltypist` or `rpy2` bridge) on the same data using
  the PBMC reference, storing results in `adata.obs[''singler_labels'']`


  3. A concordance check that computes a crosstab between CellTypist and SingleR labels,
  flagging any cluster where the two methods disagree for >40% of cells


  4. A strategy for identifying likely malignant B-cell precursor clusters specifically
  — what additional marker genes (at least 5 specific to leukemic blasts vs. normal
  precursors) would you examine, and how would you integrate this evidence with the
  automated annotations?'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: intermediate
