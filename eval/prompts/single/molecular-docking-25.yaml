id: molecular-docking-25
prompt: 'You are setting up a structure-based virtual screening campaign against the
  fictional kinase target **DYRK3B** (PDB: 7XQ2, resolution 1.9 Å, co-crystallized
  with inhibitor STX-441 in the ATP-binding pocket). Your ligand library contains
  12,400 compounds in SDF format downloaded from ChemDiv, and you plan to use AutoDock
  Vina 1.2.5 on a Linux HPC cluster.


  Before launching the full campaign, your team lead requires a validated docking
  setup using redocking of the native ligand STX-441. The co-crystal structure shows
  the ligand centroid at coordinates (x=14.3, y=-8.7, z=22.1) with the binding pocket
  spanning roughly 18×16×20 Å.


  Your preliminary redocking attempt using Open Babel (obabel) for both receptor and
  ligand preparation yielded a best pose RMSD of 3.8 Å against the crystallographic
  pose — which exceeds the acceptable threshold of 2.0 Å.


  **Provide the following:**


  1. **Diagnosis**: Identify at least three likely causes for the poor redocking RMSD
  (3.8 Å) when using obabel-based preparation

  2. **Revised preparation protocol**: Write a complete shell script using ADFR Suite
  (`prepare_receptor`) and Meeko (`mk_prepare_ligand.py`) to properly prepare both
  receptor (removing STX-441 and waters) and the native ligand STX-441 for redocking
  validation

  3. **Grid box configuration**: Provide the exact Vina config file (`config.txt`)
  using the coordinates above, justifying any adjustments to box dimensions for the
  validation run versus the production screening run

  4. **Go/No-Go criterion**: Define a quantitative decision rule for proceeding to
  full library screening based on redocking results, including what to do if RMSD
  remains above threshold after preparation fixes'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: intermediate
