id: ehr-data-parsing-18
prompt: 'You are building a clinical data pipeline that ingests HL7v2 ORU^R01 messages
  containing laboratory results for a cardiology department. The messages follow an
  unusual pattern where a single ORU^R01 message can contain **multiple PATIENT_RESULT
  groups**, each with nested OBR/OBX segments. Some OBX segments use the `NM` (Numeric)
  type while others use `TX` (Text) for free-text interpretations, and occasionally
  the same LOINC code (e.g., `2093-3` for Total Cholesterol) appears **twice** within
  the same OBR group — once as a preliminary result and once as a corrected result,
  distinguished only by OBX-11 (Observation Result Status: `P` vs `C`).


  Your pipeline must handle the following edge cases:

  1. Missing or malformed PID-7 (date of birth) fields with non-standard formats like
  `19821305` (invalid month 13)

  2. OBX-6 (units) being absent for numeric results

  3. OBX-5 values containing embedded tilde (`~`) characters that hl7apy incorrectly
  splits as repetitions


  Using Python with the `hl7apy` library, provide:

  - A complete parsing function that extracts all OBX results into a pandas DataFrame
  with columns: `patient_id`, `order_id`, `loinc_code`, `value`, `units`, `result_status`,
  `observation_datetime`

  - Logic to deduplicate LOINC codes within the same OBR group, keeping only the corrected
  (`C`) result when both `P` and `C` exist

  - A robust DOB parser that flags invalid dates without crashing

  - A unit test using `pytest` with at least two fixture messages demonstrating the
  duplicate LOINC and malformed DOB edge cases'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: hard
