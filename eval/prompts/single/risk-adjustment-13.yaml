id: risk-adjustment-13
prompt: 'Here is test question #13 of 30:


  ---


  You are building a basic CMS-HCC risk adjustment pipeline for a small Medicare Advantage
  plan with 500 members. You have been provided the following simplified member data
  for three patients:


  - **Member A** (Age 72, Female, Community Non-Dual): ICD-10 codes E11.9, I10, N18.3

  - **Member B** (Age 68, Male, Community Non-Dual): ICD-10 codes E11.65, I50.9, I25.10

  - **Member C** (Age 80, Female, Community Non-Dual): ICD-10 codes E08.22, N18.5,
  I13.10


  Use the CMS-HCC Model V28 crosswalk and assume the following simplified RAF coefficients:
  HCC18=0.302, HCC19=0.118, HCC85=0.323, HCC86=0.289, HCC137=0.289, HCC138=0.191,
  HCC329=0.418, community non-dual age/sex demographic coefficient for females 70–74=0.487,
  females 65–69=0.421, females 80–84=0.514, males 65–69=0.453.


  Please provide the following deliverables:


  1. A complete ICD-10-to-HCC mapping table for all three members, including which
  HCCs each ICD-10 code maps to.

  2. Apply CMS disease hierarchy rules to resolve any hierarchical conflicts within
  each member''s HCC set, clearly explaining which HCCs are dropped and why.

  3. Calculate the final RAF score for each member using the provided coefficients.

  4. Write a Python function `calculate_raf(member_dict, crosswalk, hierarchies, coefficients)`
  that automates this process for any member input.'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: easy
