id: radiology-preprocessing-15
prompt: 'You are processing a dataset of 847 T1-weighted MRI scans from a multi-site
  neuroimaging study (3 sites: Site A with 1.5T Siemens, Site B with 3T GE, Site C
  with 3T Philips). Your preprocessing pipeline must handle significant inter-site
  intensity variability before group-level analysis.


  Your current pipeline order is: (1) fslreorient2std, (2) HD-BET skull stripping,
  (3) N4BiasFieldCorrection, (4) ANTs SyN registration to MNI152 1mm template.


  A colleague suggests that N4 bias field correction should be performed BEFORE skull
  stripping rather than after, arguing it improves brain extraction accuracy. However,
  your preliminary results on 20 test subjects show HD-BET performs comparably either
  way (Dice coefficient: 0.94 pre-N4 vs 0.95 post-N4).


  Additionally, you notice that 23 scans from Site A have unusually low SNR (mean
  SNR = 8.2 compared to 12.4 and 13.1 for Sites B and C), and 15 scans have failed
  registration with mean Dice overlap of 0.71 against MNI template.


  Please provide:

  1. A justified recommendation on optimal N4/skull-stripping ordering with specific
  reasoning for multi-site data

  2. An ANTs command-line script for SyN registration with parameters optimized for
  cross-site variability (include specific transform parameters, metric weights, and
  convergence criteria)

  3. A quality control strategy to identify and handle the 15 failed registrations,
  including threshold criteria

  4. Recommendations for intensity normalization approach after registration to minimize
  the 3-site batch effects, specifying whether to use histogram matching, z-score
  normalization, or WhiteStripe, with justification'
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: intermediate
