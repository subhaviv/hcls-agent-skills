id: multi-omics-integration-22
prompt: 'You are analyzing a cohort of 85 pediatric leukemia patients with three omics
  layers: bulk RNA-seq (all 85 patients), reverse-phase protein array (RPPA) data
  (all 85 patients), and DNA methylation 450K array data (only 52 of the 85 patients).
  Your goal is to identify multi-omic patient subtypes and interpret the biological
  drivers of each subtype.


  Given this partial sample overlap scenario, please provide the following:


  1. **Integration strategy recommendation**: Should you use early (concatenation),
  intermediate (e.g., MOFA+), or late integration (e.g., SNF)? Justify your choice
  specifically in the context of the missing methylation data for 33 patients. Explain
  how each approach handles missing views and why one is preferable here.


  2. **MOFA+ setup guidance**: Assuming you proceed with MOFA+, describe how to configure
  the model to handle the partial overlap — specifically, how to specify the groups
  and views in the `mofa()` function in R, and how MOFA+ internally treats missing
  values during training.


  3. **Post-factor interpretation**: After training MOFA+ and identifying 5 latent
  factors, describe a step-by-step enrichment strategy to biologically annotate Factor
  3, which shows high variance explained in RNA-seq (18%) but near-zero contribution
  from methylation. What does this pattern suggest biologically, and which enrichment
  tools would you apply to the top RNA-seq weights of Factor 3?


  4. **Minimal R code snippet**: Provide a minimal working example using the `MOFA2`
  R package that loads three matrices (RNA, RPPA, Methylation) with the appropriate
  `NA` structure for missing samples and creates a MOFA object ready for training.'
target_skills:
- multi-omics-integration
domain: multi-omics
