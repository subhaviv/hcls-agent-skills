id: variant-calling-30
prompt: 'You are analyzing a cohort of 47 whole-exome sequenced (WES) tumor-normal
  pairs from a rare pediatric brain tumor study. Sequencing was performed on Illumina
  NovaSeq 6000 with 150bp paired-end reads, achieving median 180x tumor coverage and
  90x normal coverage. You are running Mutect2 in tumor-normal mode using GATK 4.3.0,
  but you are observing an unusually high false positive rate (~35%) in your somatic
  SNV callset after FilterMutectCalls, particularly at sites with allele fractions
  between 0.05 and 0.12. Downstream analysis reveals that many of these apparent false
  positives cluster near simple tandem repeats (STRs) and homopolymer runs of length
  ≥6bp.


  Additional complications:

  - The panel of normals (PoN) was constructed from only 8 unmatched normal samples
  sequenced on a different Illumina HiSeq 2500 instrument

  - Tumor samples show evidence of moderate FFPE artifact (OxoG contamination estimated
  at 0.003 by GetPileupSummaries/CalculateContamination)

  - Three tumor samples have estimated tumor purity below 25% as determined by PURPLE


  Please provide:

  1. A root-cause analysis identifying which specific Mutect2/FilterMutectCalls parameters
  and pipeline steps are most likely contributing to the elevated false positive rate

  2. Concrete parameter adjustments and additional GATK tools (with exact command-line
  flags) to address each identified cause

  3. A revised filtering strategy that accounts for the low-purity samples separately
  from the rest of the cohort

  4. Recommendations for rebuilding the PoN given the instrument mismatch constraint,
  including minimum sample requirements'
target_skills:
- variant-calling
domain: genomics
difficulty: hard
