id: biomarker-discovery-22
prompt: 'A clinical research team has collected RNA-seq data from 120 treatment-naive
  breast cancer patients (80 ER-positive, 40 triple-negative) with 5-year distant
  recurrence outcomes (38 events total). After variance-stabilizing normalization,
  they have expression values for 15,000 genes. They want to build a prognostic gene
  signature to predict distant recurrence-free survival.


  A junior analyst proposes the following pipeline:

  1. Run a univariate Cox regression across all 15,000 genes and keep the top 50 genes
  (p < 0.05)

  2. Train a LASSO Cox model on those 50 genes using 10-fold cross-validation to select
  the final signature

  3. Report the C-index from the final model on the same 120 patients as the model''s
  performance estimate


  Please provide the following:


  **A)** Identify all data leakage or methodological errors in the proposed pipeline,
  explaining why each is problematic.


  **B)** Propose a corrected pipeline that properly handles feature selection, model
  training, and performance estimation — specify the exact cross-validation structure
  needed.


  **C)** Given 38 events in 120 patients, comment on whether the events-per-variable
  (EPV) ratio is adequate for the number of predictors being considered, and what
  constraints this places on the final signature size.


  **D)** Write a short R code snippet (using the `glmnet` and `survival` packages)
  implementing the corrected nested cross-validation structure for this dataset, where
  the outer loop estimates performance and the inner loop selects the LASSO penalty
  parameter lambda.'
target_skills:
- biomarker-discovery
