id: quality-measures-25
prompt: 'Here is test question #25 of 30:


  ---


  You are analyzing HEDIS Controlling High Blood Pressure (CBP) measure performance
  for a regional health plan with 45,000 commercial members aged 18–85. Your claims
  data shows 8,200 members with a hypertension diagnosis (ICD-10: I10, I11.x, I12.x,
  I13.x, I15.x) during the measurement year. After applying continuous enrollment
  criteria (11 of 12 months enrolled, allowing one gap), your eligible denominator
  is 6,750 members. Your EHR-integrated data shows blood pressure readings for 4,100
  members, of which 2,890 have a most recent BP reading of <140/90 mmHg (numerator
  compliant). The remaining 2,650 denominator members have no BP reading on file.


  Your plan''s current CBP rate is approximately 42.8%, significantly below the HEDIS
  75th percentile benchmark of 67.3%.


  Please provide the following deliverables:


  1. **SQL query** to identify care gap members (denominator-eligible but not numerator-compliant),
  joining a `member_enrollment` table, a `claims` table (with diagnosis codes), and
  a `bp_readings` table (with `reading_date`, `systolic`, `diastolic` columns), using
  proper continuous enrollment logic.


  2. **Care gap prioritization logic** — describe a risk-stratification approach to
  rank the 2,650 members with missing BP readings for outreach, incorporating age
  bands (18–44, 45–64, 65–85), comorbidity flags (diabetes: E11.x, CKD: N18.x), and
  pharmacy claims for antihypertensive medications (GPI class 36).


  3. **Rate improvement projection** — calculate the minimum number of additional
  numerator-compliant members needed to reach the 67.3% benchmark, and estimate the
  realistic achievable rate if 40% of members with antihypertensive pharmacy claims
  (assume 1,800 such members among the gaps) are successfully closed.'
