id: risk-stratification-indices-30
prompt: 'A regional health system is building a 30-day readmission risk model for
  their Medicare Advantage population (n=14,200 discharges/year) and must choose between
  LACE+ and Elixhauser Readmission Score (van Walraven) as their primary stratification
  tool. Their data team has extracted the following summary statistics from a 6-month
  pilot cohort (n=6,847 discharges): actual 30-day readmission rate = 14.3%; LACE+
  AUC = 0.68 (95% CI: 0.65–0.71); van Walraven AUC = 0.71 (95% CI: 0.68–0.74); Hosmer-Lemeshow
  p-value for LACE+ = 0.04; Hosmer-Lemeshow p-value for van Walraven = 0.18. Additionally,
  31% of this population has an ADI (Area Deprivation Index) national rank ≥85, and
  SDOH Z-codes are documented in 22% of records. The care management team can only
  intervene with 800 patients per month due to staffing constraints, and they want
  to minimize missed high-risk patients (prioritize sensitivity over specificity).


  Please provide:

  1. A structured comparison of LACE+ vs. van Walraven for this specific use case,
  citing the calibration and discrimination findings

  2. A recommendation for which index to use, with explicit justification based on
  the operational constraints

  3. A proposed hybrid scoring approach that incorporates ADI national rank and SDOH
  Z-code burden into the base index, including suggested weight adjustments or additive
  point values

  4. A sensitivity analysis framework (including which threshold cutpoints to test)
  that accounts for the 800-patient/month intervention capacity constraint

  5. SQL pseudocode for flagging high-risk patients using your recommended composite
  score'
target_skills:
- risk-stratification-indices
