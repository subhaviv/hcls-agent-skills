id: dicom-processing-11
prompt: 'You are a neuroimaging researcher who has just received a USB drive containing
  raw MRI data from a 3T Siemens Prisma scanner. The data is organized in a single
  flat directory called `/data/raw_dicoms/` containing 847 DICOM files (`.dcm` extension)
  from a single subject''s T1-weighted MPRAGE acquisition. The files follow the naming
  pattern `IM-0001-0001.dcm` through `IM-0001-0847.dcm`.


  You need to convert this DICOM series to NIfTI format for use in a standard neuroimaging
  pipeline (FSL/FreeSurfer). Your institution requires that the output be stored in
  `/data/nifti_output/` and that the conversion preserve the original DICOM header
  metadata in a sidecar JSON file (BIDS format).


  Please provide the following:


  1. **The exact dcm2niix command** you would run to convert the DICOM series to NIfTI,
  including flags for: outputting a BIDS-compatible JSON sidecar, setting the output
  filename to `sub-001_T1w`, specifying the output directory, and ensuring the highest-precision
  floating-point format for the NIfTI file.


  2. **A brief explanation** (2-3 sentences) of what each flag in your command does.


  3. **A short Python snippet using pydicom** that reads the first DICOM file (`IM-0001-0001.dcm`)
  and prints the values of three key DICOM tags: Patient Name (0010,0010), Series
  Description (0008,103E), and Repetition Time (0018,0080).


  4. **The expected output files** (list all filenames) that dcm2niix should generate
  in `/data/nifti_output/` after a successful conversion.'
target_skills:
- dicom-processing
domain: imaging
difficulty: easy
