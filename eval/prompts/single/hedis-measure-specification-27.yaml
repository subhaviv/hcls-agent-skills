id: hedis-measure-specification-27
prompt: 'A regional health plan serving 85,000 Medicare Advantage members is preparing
  for the 2024 HEDIS measurement year and needs to optimize performance on the Controlling
  High Blood Pressure (CBP) measure. The plan''s data analytics team has pulled the
  following preliminary figures:


  - Total members aged 18–85 with a diagnosis of hypertension: 12,400

  - Members with continuous enrollment (no gap): 9,800

  - Members with a single gap of 45 days: 1,100

  - Members with a single gap of 52 days: 620

  - Members with two separate gaps totaling 58 days: 480

  - Members with ESRD claims: 340

  - Members with pregnancy-related diagnoses during the measurement year: 215

  - Members with adequate blood pressure readings already on file (most recent <140/90):
  5,200 out of the eligible population


  The plan''s Star Ratings coordinator wants to understand exactly who falls into
  the CBP denominator after applying continuous enrollment rules and exclusions, and
  which members represent the highest-priority care gap opportunities.


  Please provide:

  1. A step-by-step calculation of the final CBP denominator, applying HEDIS 2024
  continuous enrollment rules (allowable gap logic) and all applicable exclusions

  2. An estimated current CBP numerator rate based on the data provided

  3. A prioritization framework for outreach, ranking the remaining care gap members
  by likelihood of closure and Star Rating impact

  4. A brief explanation of how CBP performance affects the Medicare Advantage Star
  Rating system, including its weight relative to other measures'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: intermediate
