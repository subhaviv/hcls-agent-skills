id: dicom-processing-15
prompt: 'You are working as a neuroimaging data engineer at a research hospital. Your
  team has collected resting-state fMRI data from 47 participants as part of a depression
  study. The raw DICOM files are stored in a flat directory structure (all series
  mixed together) under `/raw_data/dicoms/`, with filenames following the pattern
  `IM-XXXX-YYYY.dcm`. Each participant has approximately 8 series: T1-weighted anatomical,
  resting-state fMRI (300 volumes, TR=2s), fieldmap magnitude, fieldmap phase difference,
  and several localizer scans you want to exclude.


  You need to convert this dataset to NIfTI format organized according to BIDS specification
  using `dcm2niix`. The challenge is that the flat directory structure means dcm2niix
  must sort series automatically, and you want to exclude localizer scans (SeriesDescription
  containing "localizer" or "scout") from the output. Additionally, the output filenames
  must include the participant ID (extracted from PatientID DICOM tag, formatted as
  `sub-XXXX`) and session label.


  Your deliverables:


  1. Write a Python script using `pydicom` that first scans the flat DICOM directory,
  groups files by `SeriesInstanceUID`, filters out unwanted series based on `SeriesDescription`,
  and organizes them into per-series subdirectories suitable for dcm2niix input.


  2. Provide the exact `dcm2niix` command with appropriate flags to produce BIDS-compatible
  output including JSON sidecar files, with compressed NIfTI output (`.nii.gz`).


  3. Explain what the `-f` filename format string in dcm2niix should contain to embed
  participant ID and series description, and show an example output filename for the
  resting-state series.


  4. Identify two potential failure modes specific to the flat directory input scenario
  and how your preprocessing script mitigates them.'
target_skills:
- dicom-processing
domain: imaging
difficulty: intermediate
