id: genomic-variant-interpretation-14
prompt: 'A 34-year-old woman with a strong family history of breast and ovarian cancer
  undergoes germline panel testing. The laboratory reports the following variant:
  **BRCA2 c.7976+3A>G** (NM_000059.4).


  Available evidence:

  - **SpliceAI scores**: Donor loss = 0.61, Acceptor loss = 0.02, Donor gain = 0.08,
  Acceptor gain = 0.01

  - **gnomAD v3.1.2**: 2 heterozygous alleles observed out of 251,342 total alleles
  (no homozygotes)

  - **ClinVar**: 1 submission classified as VUS (single submitter, no functional data
  cited); 0 pathogenic/benign submissions for this exact variant

  - **In silico splicing tools**: MaxEntScan predicts 34% reduction in canonical donor
  splice site strength

  - **RNA studies**: Not performed

  - **Family history**: Mother and maternal aunt with breast cancer (diagnosed <50),
  maternal grandmother with ovarian cancer

  - **BRCA2 gene context**: Established high-penetrance gene for hereditary breast/ovarian
  cancer syndrome


  Please provide:

  1. A systematic ACMG/AMP 2015 criteria evaluation, explicitly stating which criteria
  apply (with strength levels) and which do not, with justification for each decision

  2. A final variant classification with confidence assessment

  3. An explanation of whether PVS1 applies to this intronic variant and what additional
  evidence would upgrade or downgrade the classification

  4. Clinical management recommendations for this patient given the current classification

  5. A description of what RNA splicing assay results would constitute sufficient
  functional evidence to reclassify this variant as Likely Pathogenic or Pathogenic'
target_skills:
- genomic-variant-interpretation
domain: genomics
difficulty: intermediate
