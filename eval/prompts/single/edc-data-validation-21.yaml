id: edc-data-validation-21
prompt: "You are working as a clinical data manager on a Phase II oncology trial (Study\
  \ ONC-2024-07) with 85 enrolled patients. Your EDC system (Veeva Vault CDMS) exports\
  \ data in CSV format, and you need to validate the vital signs data before SDTM\
  \ mapping.\n\nThe exported VS dataset contains the following fields: SUBJID, VISITNUM,\
  \ VSDAT, VSTIM, VSTEST, VSORRES, VSORRESU, VSBLFL. You have identified that the\
  \ dataset uses mixed units (some blood pressure readings are in mmHg, some incorrectly\
  \ labeled as \"mm[Hg]\"), and temperature readings appear in both Celsius and Fahrenheit\
  \ without consistent unit flags.\n\nThe protocol-defined acceptable ranges are:\n\
  - Systolic BP: 80–180 mmHg\n- Diastolic BP: 50–110 mmHg  \n- Heart Rate: 45–120\
  \ bpm\n- Temperature: 36.0–38.5°C (or 96.8–101.3°F)\n- Respiratory Rate: 10–30 breaths/min\n\
  - Oxygen Saturation: 88–100%\n\nA sample of 10 records shows temperatures ranging\
  \ from 36.2 to 99.1 (mixed units not flagged), and blood pressure units inconsistently\
  \ coded.\n\nPlease provide:\n1. A Python script that loads the VS CSV export, standardizes\
  \ units to CDISC conventions (mmHg and °C), converts Fahrenheit values to Celsius\
  \ where detected, and flags out-of-range values with severity levels (critical vs.\
  \ warning)\n2. A controlled terminology check function that validates VSTEST and\
  \ VSORRESU values against CDISC CT for VS domain\n3. A summary report function that\
  \ outputs a prioritized list of data queries grouped by subject and visit"
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: easy
