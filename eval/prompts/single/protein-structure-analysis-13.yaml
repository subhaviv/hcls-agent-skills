id: protein-structure-analysis-13
prompt: 'You have downloaded the crystal structure of a novel serine protease (PDB
  ID: 7XYZ) in standard PDB format. The structure contains a single chain (Chain A)
  with 312 residues, resolved at 1.8 Å resolution. Before proceeding with virtual
  screening, you need to perform a basic quality assessment and prepare the structure
  for downstream docking.


  Your tasks are:


  1. **Parse and inspect the structure** using Biopython''s `Bio.PDB` module. Write
  Python code to load the PDB file, count the total number of residues, identify any
  HETATM records (ligands/waters), and print the residue names of all non-water HETATM
  entries.


  2. **B-factor analysis**: Extract the B-factor (temperature factor) for every Cα
  atom in Chain A and identify residues with B-factors exceeding 40 Å², which may
  indicate high flexibility. Print these residue IDs and their B-factor values.


  3. **Secondary structure summary**: Using the DSSP interface in Biopython (assume
  DSSP is installed), assign secondary structure to each residue and report the percentage
  of residues in α-helices (H), β-strands (E), and loops/coils (C/other).


  4. **Format conversion for docking**: Describe the steps (and provide a brief shell
  command or Python snippet) to convert the cleaned PDB file to PDBQT format using
  AutoDockTools'' `prepare_receptor4.py` script, ensuring hydrogens are added and
  water molecules are removed.


  Provide complete, runnable Python code for tasks 1–3 and clear instructions for
  task 4. Assume the PDB file is saved locally as `7xyz.pdb`.'
target_skills:
- protein-structure-analysis
domain: protein-structure
difficulty: easy
