id: clinical-data-standards-12
prompt: 'A clinical trial safety team is preparing an adverse event frequency table
  for a regulatory submission. They have collected the following raw adverse events
  reported by investigators across 847 patients:


  - "stomach ache" (n=23)

  - "abdominal pain upper" (n=31)

  - "epigastric discomfort" (n=18)

  - "nausea" (n=67)

  - "feeling sick" (n=12)

  - "vomiting" (n=44)

  - "emesis" (n=9)

  - "headache" (n=89)

  - "head pain" (n=14)


  The team needs to code these terms using MedDRA version 26.0 and produce a summary
  table grouped at the Preferred Term (PT) level, with System Organ Class (SOC) assignments.


  Please provide the following deliverables:


  1. **MedDRA coding**: For each investigator-reported term above, identify the appropriate
  Lowest Level Term (LLT) and its corresponding Preferred Term (PT). Flag any terms
  that map to the same PT (i.e., synonymous LLTs).


  2. **SOC assignment**: Assign each PT to its primary SOC. Note which SOC the gastrointestinal
  terms and the neurological terms belong to.


  3. **Consolidated frequency table**: After collapsing synonymous terms to their
  PTs, provide the consolidated patient counts per PT, assuming no patient reported
  more than one synonym for the same PT.


  4. **Aggregation recommendation**: Briefly explain when it would be appropriate
  to report this data at the HLT level instead of the PT level, and identify which
  HLT would group the abdominal pain-related PTs together.'
target_skills:
- clinical-data-standards
domain: clinical-data
difficulty: easy
