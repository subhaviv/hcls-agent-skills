id: rwd-cohort-analysis-29
prompt: 'You are analyzing a Medicare claims database (2018–2022, n=47,300 patients)
  to compare cardiovascular outcomes between two SGLT2 inhibitor cohorts: empagliflozin
  (n=18,400) and dapagliflozin (n=28,900). Index date is the first prescription fill.
  Patients must have ≥12 months of continuous enrollment pre-index and ≥1 ICD-10 code
  for type 2 diabetes (E11.x) plus ≥1 for established cardiovascular disease (I21.x,
  I25.x, I50.x) within the pre-index window.


  Your primary outcome is 3-point MACE (MI, stroke, CV death) identified via ICD-10
  codes I21.x, I63.x, and a CVD-flagged death record. A complicating factor: empagliflozin
  patients have substantially higher baseline heart failure prevalence (I50.x: 34%
  vs 19%), and preliminary Schoenfeld residuals tests show a significant time-varying
  violation (p=0.003) for the heart failure covariate in your Cox model.


  **Deliverables:**


  1. Describe your propensity score model specification (variables, functional form,
  interaction terms) and the SMD threshold you would use to declare adequate balance,
  with justification for any trimming or weighting strategy given the heart failure
  imbalance.


  2. Provide Python code implementing stabilized inverse probability of treatment
  weights (SIPTW) and producing a Love plot of pre/post-weighting SMDs for at least
  8 covariates.


  3. Explain three distinct strategies to handle the proportional hazards violation
  for heart failure, including a time-splitting approach with specific cut-points
  (justify clinically), and write the corresponding `lifelines` or `statsmodels` code
  for your preferred strategy.


  4. Discuss how competing risks (non-CV death) should be handled in this elderly
  Medicare population and whether a cause-specific or subdistribution hazard approach
  is more appropriate here.'
target_skills:
- rwd-cohort-analysis
domain: pharmacoepidemiology
difficulty: hard
