id: molecular-docking-18
prompt: 'You are setting up a structure-based virtual screening campaign against the
  kinase domain of a fictional target **DYRK4B** (PDB: 7XQ2, resolution 1.85 Å, co-crystallized
  with inhibitor **STK-447**). During validation redocking of STK-447, you obtain
  an RMSD of 3.7 Å against the crystal pose, which exceeds your 2.0 Å acceptance threshold.


  Your preparation pipeline used Open Babel (v3.1.1) to convert the ligand from SDF
  to PDBQT, with default settings and no explicit protonation step. The receptor was
  prepared using AutoDockTools'' `prepare_receptor4.py` with `-A hydrogens` flag.
  The grid box was centered on the co-crystallized ligand centroid (x=14.2, y=−8.6,
  z=31.4) with dimensions 20×20×20 Å and exhaustiveness=8.


  STK-447 contains a sulfonamide group, a fused bicyclic scaffold, and a terminal
  piperazine ring with a secondary amine (predicted pKa = 8.3 at physiological pH).


  **Deliverables required:**


  1. Identify at least **three specific technical reasons** why the redocking RMSD
  failed, referencing the preparation choices and parameters above.


  2. Provide a corrected **step-by-step preparation protocol** using Meeko and ADFR
  Suite instead, including exact command-line calls with appropriate flags for handling
  the piperazine protonation state.


  3. Recommend revised **grid box parameters** (center, dimensions, exhaustiveness)
  with justification based on the ligand''s molecular weight (~487 Da) and binding
  pocket characteristics.


  4. Write a **Python validation script** using the `meeko` library that reads the
  redocked PDBQT pose, extracts the Vina score and RMSD versus a reference mol2 file,
  and flags poses failing the 2.0 Å threshold.'
target_skills:
