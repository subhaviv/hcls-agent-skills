id: ngs-quality-control-18
prompt: 'You are processing a whole-exome sequencing cohort of 45 pediatric leukemia
  samples. After running `fastp` with default parameters, MultiQC reveals the following
  concerning patterns across the cohort:


  1. **Adapter contamination**: 12 samples show >15% adapter content surviving after
  trimming (these used a non-standard dual-index kit with custom adapters: R1 adapter
  `AGATCGGAAGAGCACACGTCTGAAC`, R2 adapter `AGATCGGAAGAGCGTCGTGTAGGGA`)

  2. **Coverage heterogeneity**: mosdepth reports median target coverage of 85× but
  8 samples have <30× coverage on chromosome X, while autosomal coverage is normal
  (80-100×)

  3. **Insert size bimodality**: Picard `CollectInsertSizeMetrics` shows a bimodal
  distribution with peaks at ~150bp and ~380bp for 6 samples, suggesting possible
  library contamination

  4. **GC bias**: FastQC flags extreme GC content deviation (>40% of bases in the
  30-70% GC bin failing) in 5 samples, with AT-dropout visible in high-GC exons


  Given these findings, provide:

  1. A corrected `fastp` command explicitly specifying the custom adapters with appropriate
  stringency parameters for pediatric leukemia WES (minimum quality Q20, minimum length
  50bp)

  2. A shell script using mosdepth to separately assess chrX/chrY coverage ratios
  to distinguish biological sex chromosome dosage from technical dropout, including
  a normalization step against autosomal coverage

  3. An explanation of what the bimodal insert size distribution indicates and a `samtools`/Picard
  command pipeline to flag and optionally remove the contaminating fragment population

  4. Recommended MultiQC configuration (`multiqc_config.yaml`) that sets appropriate
  pass/warn/fail thresholds for this oncology WES context'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: hard
