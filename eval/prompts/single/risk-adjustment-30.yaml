id: risk-adjustment-30
prompt: 'A health plan has 3 members with the following profile for the 2024 payment
  year CMS-HCC Model V28:


  **Member A (Age 67, Male, Community Non-Dual):** ICD-10 codes: E11.65 (Type 2 DM
  with hyperglycemia), E11.40 (DM with diabetic neuropathy, unspecified), I50.33 (Acute-on-chronic
  diastolic HF), I50.9 (Heart failure, unspecified), N18.4 (CKD Stage 4)


  **Member B (Age 72, Female, Community Full Dual):** ICD-10 codes: F20.9 (Schizophrenia),
  F32.1 (Major depressive disorder, moderate), I63.50 (Cerebral infarction), G45.9
  (TIA), Z87.39 (Personal history of stroke)


  **Member C (Age 58, Male, Institutional):** ICD-10 codes: C34.11 (Primary malignant
  neoplasm, upper lobe, right bronchus), C78.01 (Secondary malignant neoplasm, right
  lung), K70.31 (Alcoholic liver cirrhosis with ascites), K70.30 (Alcoholic liver
  cirrhosis without ascites)


  Using V28 HCC mappings and the 2024 model coefficients (assume standard published
  values), provide:


  1. A Python function that applies the ICD-10-to-HCC crosswalk for all three members,
  resolves V28 disease hierarchies (including all applicable Trump relationships),
  and outputs the final valid HCC set per member

  2. The step-by-step hierarchy resolution logic for each member, explicitly identifying
  which HCCs are trumped and removed

  3. Calculated RAF scores for each member using their correct demographic segment,
  showing coefficient summation in tabular form

  4. Identification of any Rx-proxy coding gaps (e.g., Member A is on insulin glargine
  and sacubitril/valsartan; Member B is on clozapine; Member C is on sorafenib) that
  suggest undercoded HCCs'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: hard
