id: trajectory-analysis-15
prompt: 'Here is test question #15 of 30:


  ---


  You are analyzing a single-cell RNA-seq dataset of 8,400 human hematopoietic stem
  and progenitor cells (HSPCs) from bone marrow, spanning differentiation toward erythroid,
  myeloid, and lymphoid lineages. You have already computed a PAGA graph showing three
  major branches emanating from an HSC cluster, and you now want to integrate RNA
  velocity using scVelo to validate and refine the directional flow suggested by PAGA.
  The dataset has spliced/unspliced count matrices generated by velocyto, with approximately
  18,000 genes before filtering. You suspect the erythroid branch (marked by high
  GATA1, KLF1 expression) is well-supported, but the lymphoid branch (marked by IL7R,
  RAG1) shows inconsistent velocity arrows in UMAP space, with some cells appearing
  to flow backward toward the HSC cluster.


  Please provide:

  1. A step-by-step scVelo workflow (using the dynamical model) including key filtering
  parameters, minimum shared counts, and how to handle the low-confidence lymphoid
  velocity arrows

  2. Python code using scVelo and CellRank to compute terminal state probabilities
  and fate probabilities for all three lineages, starting from the HSC root cells

  3. A strategy for cross-validating the PAGA connectivity with CellRank transition
  probability matrices — specifically how to detect and interpret discordance between
  PAGA edges and CellRank absorption probabilities

  4. Recommendations for which scVelo velocity confidence metrics (e.g., `velocity_confidence`,
  `velocity_length`) to use as quality filters, with suggested threshold values for
  this dataset size'
target_skills:
- trajectory-analysis
domain: single-cell
difficulty: intermediate
