id: molecular-docking-20
prompt: 'You are preparing a structure-based virtual screening campaign targeting
  the allosteric site of mutant KRAS G12C (PDB: 7A11) using AutoDock Vina 1.2.3. During
  validation, you perform redocking of the co-crystallized covalent inhibitor AMG-510
  (sotorasib) and obtain an RMSD of 3.8 Å against the reference pose — well above
  the acceptable 2.0 Å threshold.


  Investigating further, you discover the following issues:

  - The co-crystallized ligand contains a covalent bond to Cys12, but you prepared
  it as a non-covalent ligand using Open Babel (obabel -h flag only)

  - Your grid box was centered on the ligand centroid coordinates (x=−2.1, y=3.4,
  z=18.7) with dimensions 15×15×15 Å

  - Meeko was not used during ligand preparation; torsion tree was assigned automatically
  by obabel

  - The receptor was prepared using prepare_receptor from ADFR suite without removing
  the covalent bond artifact (residual bond to Cys12 remains in PDBQT)


  Please provide:

  1. A root-cause analysis explaining why each preparation decision contributed to
  the 3.8 Å RMSD failure, ranked by estimated impact

  2. A corrected preparation protocol using Meeko and ADFR suite, including specific
  command-line steps for both receptor and ligand

  3. A revised grid box strategy for this allosteric pocket, including recommended
  dimensions and how to determine the center coordinates programmatically from the
  cleaned ligand SDF

  4. A Python snippet using the `meeko` library to prepare the ligand with appropriate
  rotatable bond handling, explicitly freezing the warhead carbon that would form
  the covalent bond

  5. Criteria for what constitutes a passing redocking validation for a covalent-adjacent
  (non-covalent pose) docking setup'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: hard
