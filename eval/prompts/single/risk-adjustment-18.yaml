id: risk-adjustment-18
prompt: 'A Medicare Advantage plan has 45,000 members being processed through their
  annual risk adjustment pipeline using CMS-HCC Model V28. During hierarchy resolution,
  your team discovers three problematic edge cases affecting 312 members:


  **Edge Case 1 – Dual HCC Assignment:** 87 members have both ICD-10 code E11.65 (Type
  2 diabetes with hyperglycemia) and E11.40 (Type 2 diabetes with diabetic neuropathy,
  unspecified). Under V28, HCC37 (Diabetes with Chronic Complications) should trump
  HCC38 (Diabetes without Complication), but your pipeline is assigning both.


  **Edge Case 2 – Rx Proxy Gap:** 143 members are on chronic warfarin fills (NDC-identified,
  90-day supply, 3+ fills in 12 months) but have no atrial fibrillation ICD-10 codes
  (I48.x series) submitted. These members currently have zero HCC credit for this
  condition.


  **Edge Case 3 – Partial Year Enrollment:** 82 members enrolled mid-year (July 1)
  with HCC19 (Diabetes without Complication) diagnosed only in Q3. Your pipeline is
  applying the full-year coefficient (0.118) rather than prorating appropriately per
  CMS Part C payment methodology.


  Please provide:

  1. Python code implementing corrected hierarchy resolution logic for Edge Case 1
  using a configurable HCC dominance dictionary

  2. A SQL query that flags Edge Case 2 Rx proxy gaps and joins to a member demographics
  table to prioritize outreach by RAF impact

  3. An explanation of the correct CMS partial-year enrollment RAF calculation for
  Edge Case 3, with a worked numeric example showing the corrected vs. incorrect RAF
  contribution

  4. Estimated aggregate RAF impact across all 312 members assuming average coefficients,
  and recommendations for pipeline guardrails to prevent recurrence'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: hard
