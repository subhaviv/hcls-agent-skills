id: dicom-processing-29
prompt: 'Here is test question #29 of 30:


  ---


  You are processing a large retrospective neuroimaging dataset of 847 subjects collected
  across three scanner sites (Siemens Prisma 3T, GE Discovery MR750, Philips Ingenia
  3T). During dcm2niix conversion, you encounter a problematic subset of 23 subjects
  from the GE site where the output NIfTI files have incorrect slice timing information.
  Specifically, the `.json` sidecar files show `SliceTiming` values that appear to
  be in milliseconds rather than the expected seconds (values range from 0 to 1800
  instead of 0 to 1.8), and the `RepetitionTime` field is correctly reported as 2.0
  seconds. Additionally, for 11 of these subjects, the DICOM header tag `(0019,109c)`
  (GE private tag for slice order) contains the value `2` indicating interleaved acquisition,
  but dcm2niix is generating sequential slice timing arrays.


  Your task is to:

  1. Explain the root cause of both issues (millisecond scaling and incorrect slice
  order detection) and identify which DICOM private tags or standard tags dcm2niix
  relies on for GE slice timing extraction

  2. Provide a Python script using `pydicom` and `nibabel` that reads the original
  DICOM headers, extracts the correct slice timing information, converts to seconds,
  applies the proper interleaved reordering for a 48-slice acquisition with TR=2.0s,
  and patches the existing `.json` sidecar files

  3. Describe how you would validate the fix using FSL''s `slicetimer` or similar
  tools before running the full fMRI preprocessing pipeline

  4. Recommend a dcm2niix command-line flag combination or version-specific workaround
  to prevent this issue in future conversions from this GE scanner model


  ---'
target_skills:
- dicom-processing
domain: imaging
difficulty: hard
