id: risk-stratification-indices-27
prompt: 'A regional health system is preparing to launch a 90-day post-discharge care
  management program targeting high-risk patients across three service lines: cardiology
  (n=1,240), orthopedics (n=890), and general medicine (n=2,100). The care management
  team has pulled baseline data showing the following distribution for their general
  medicine cohort: 38% have LACE scores ≥10, 29% have Charlson Comorbidity Index (CCI)
  scores ≥5, and 22% have both. Additionally, 31% of patients have at least one SDOH
  Z-code documented (primarily Z59.0 homelessness, Z63.4 family disruption, and Z56.0
  unemployment), and 18% reside in ADI national percentile ranks ≥85.


  The program has capacity to enroll only 400 patients from the general medicine cohort
  in the first wave. The team is debating whether to use LACE alone, CCI alone, a
  composite approach, or to layer in SDOH/ADI factors as a tiebreaker.


  Please provide:

  1. A comparative analysis of LACE vs. CCI for 30- and 90-day readmission prediction
  in general medicine populations, including their key methodological differences
  and known limitations

  2. A recommended stratification framework that incorporates both clinical risk scores
  and SDOH factors, with explicit weighting rationale

  3. A step-by-step patient selection algorithm (in pseudocode or decision tree format)
  that could be operationalized in a SQL-based EHR environment to identify the top
  400 enrollees

  4. An explanation of how the overlap population (patients with both LACE ≥10 and
  CCI ≥5) should be handled in the prioritization logic, and what additional clinical
  review, if any, should be triggered for this group'
target_skills:
- risk-stratification-indices
