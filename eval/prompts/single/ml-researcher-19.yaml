id: ml-researcher-19
prompt: 'A pharmaceutical company is developing a deep learning model to predict KRAS
  G12C inhibitor response (binary: responder vs. non-responder at 12 weeks) using
  multi-modal data from a Phase II trial: whole-slide images (WSIs) of pre-treatment
  tumor biopsies (n=847 patients, 20x magnification, stained H&E), RNA-seq gene expression
  (18,432 genes after QC), and structured clinical variables (age, ECOG score, prior
  lines of therapy, STK11 co-mutation status). The dataset has 31% responders, samples
  collected across 6 clinical sites in 3 countries, and a planned prospective validation
  cohort of 200 patients at 2 new sites not in training.


  The team proposes: (1) concatenating mean-pooled WSI patch embeddings from a ImageNet-pretrained
  ResNet-50 with PCA-reduced expression (top 50 PCs) and one-hot clinical variables;
  (2) training a gradient-boosted tree on the concatenated vector; (3) evaluating
  with 5-fold cross-validation stratified by response label only; (4) reporting AUROC
  as the sole metric; (5) using Shapley values on the concatenated vector for interpretability.


  Please provide:

  A. A critique of each component of the proposed pipeline, identifying at least 3
  critical methodological flaws with specific consequences for validity or regulatory
  acceptance.

  B. A redesigned experiment plan addressing all flaws, including data splitting strategy,
  model architecture choices for each modality, fusion approach, and training procedure.

  C. The specific evaluation metric suite you would report and why, including calibration
  assessment and decision curve analysis setup.

  D. A fairness audit plan stratified by site and STK11 co-mutation status, including
  which disparity metrics to compute and thresholds for acceptable performance gaps.

  E. A mapping of this pipeline to TRIPOD+AI and FDA SaMD guidance, identifying which
  checklist items are currently unaddressable given the trial design.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: hard
