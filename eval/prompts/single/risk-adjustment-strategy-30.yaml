id: risk-adjustment-strategy-30
prompt: 'A Medicare Advantage plan with 42,000 members is navigating the CMS-HCC V24-to-V28
  blended transition period (2024: 33% V28 / 67% V24; 2025: 67% V28 / 33% V24; 2026:
  100% V28). Their analytics team has identified a cohort of 1,847 members who currently
  have HCC 85 (Congestive Heart Failure) mapped under V24, but whose underlying ICD-10
  codes map differently under V28''s restructured cardiovascular hierarchy — specifically,
  codes I50.22 (chronic systolic heart failure) and I50.43 (combined systolic/diastolic
  heart failure) which split into V28 HCCs 226, 227, and 228 with distinct RAF weights.


  Additionally, 623 members carry both HCC 85 (V24) and HCC 96 (Ischemic Heart Disease),
  which triggers a disease interaction coefficient under V24 but maps to a different
  interaction pair under V28.


  Given this scenario, provide the following deliverables:


  1. **Blended RAF impact analysis**: Calculate the net RAF score delta per member
  for the CHF cohort across 2024, 2025, and 2026 transition years, using these fictional
  RAF weights — V24 HCC 85: 0.323; V28 HCC 226: 0.289, HCC 227: 0.368, HCC 228: 0.421;
  V24 interaction coefficient (HCC 85+96): 0.195; V28 equivalent interaction: 0.142.


  2. **ICD-10 coding gap strategy**: Identify which specific documentation elements
  must be present to support the more specific V28 HCC assignments and avoid downcoding
  risk during RADV audit.


  3. **Prioritization framework**: Design a tiered outreach model ranking which member
  segments to target for prospective chart reviews in 2024 to maximize blended-year
  RAF defensibility.'
target_skills:
