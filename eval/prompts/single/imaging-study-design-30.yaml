id: imaging-study-design-30
prompt: 'You are designing a multi-site longitudinal diffusion MRI study to track
  white matter degeneration in 180 patients with early-stage ALS across three 3T MRI
  scanners (Siemens Prisma at Site A, GE Discovery MR750 at Site B, and Philips Ingenia
  at Site C). Each site acquired 60 patients at baseline, 6 months, and 12 months
  using nominally identical protocols: 64 diffusion directions, b=1000 s/mm², 2mm
  isotropic voxels, but post-hoc QC reveals Site B has a systematic 12% higher mean
  FA in the corticospinal tract compared to Sites A and C, and Site C shows 8% elevated
  MD values in the forceps major. Additionally, 22 patients (8 from Site A, 7 from
  Site B, 7 from Site C) dropped out between baseline and 12 months, with dropout
  correlated with disease severity (ALSFRS-R < 35 at baseline).


  Your primary biomarker is FA in the corticospinal tract extracted via TBSS, with
  secondary biomarkers including RD, AD, and free-water corrected FA (FW-FA). You
  suspect the inter-site FA differences may be driven by differences in gradient nonlinearity
  correction implementation rather than true biological differences.


  Please provide: (1) a diagnostic workflow to determine whether the FA bias is hardware-related
  (gradient nonlinearity) versus acquisition-protocol drift versus reconstruction
  differences, (2) a ComBat harmonization strategy that appropriately handles the
  longitudinal structure and informative dropout, (3) Python pseudocode for implementing
  longitudinal ComBat with missing timepoints, and (4) a recommendation on whether
  to use FA, FW-FA, or a composite biomarker as the primary endpoint, given the suspected
  hardware confounds and the biological question of axonal degeneration versus neuroinflammation.'
