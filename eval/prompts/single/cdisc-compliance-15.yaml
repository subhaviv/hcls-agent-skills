id: cdisc-compliance-15
prompt: 'A clinical trial (Study XYZ-2047) for a novel antihypertensive agent enrolled
  342 subjects across 3 sites. The data management team has collected laboratory data
  including standard chemistry and hematology panels, but also three non-standard
  analytes: Cystatin C (used for renal function assessment), NT-proBNP (cardiac biomarker),
  and a proprietary inflammation index calculated from a vendor algorithm. The lab
  dataset currently exists as a flat file with the following fields: USUBJID, VISIT,
  LBTEST, LBORRESU, LBORRES, LBSTRESC, LBSTRESN, LBSTRESU, LBDTC, LBBLFL, and a vendor-specific
  field VENDORALG_VERSION tracking the algorithm version used for the inflammation
  index.


  Your SDTM programmer must map this data into a compliant LB domain for an FDA eCTD
  submission targeting SDTM Implementation Guide v3.3. The VENDORALG_VERSION field
  has no standard CDISC controlled terminology mapping.


  Please provide:

  1. A mapping specification identifying which standard LB variables to use, including
  any required variables missing from the current flat file

  2. A specific recommendation on how to handle VENDORALG_VERSION — whether to use
  SUPPQUAL, a separate domain, or another approach — with justification citing SDTM
  IG rules

  3. A define.xml value-level metadata design for the three non-standard analytes,
  including how to reference appropriate controlled terminology or sponsor-defined
  codelists

  4. A Pinnacle 21 compliance check triage plan identifying the top 3 most likely
  errors/warnings this dataset would generate and their clinical impact severity

  5. Sample SAS code (10–20 lines) demonstrating the SUPPQUAL structure for VENDORALG_VERSION
  if that approach is recommended'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: intermediate
