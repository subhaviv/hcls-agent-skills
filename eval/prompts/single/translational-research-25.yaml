id: translational-research-25
prompt: 'A biotech company has completed a 24-month natural history study in 312 prodromal
  Huntington''s disease (HTT CAG repeat 40-50) participants, collecting quarterly
  CSF neurofilament light chain (NfL), plasma NfL, MRI caudate volume, and cognitive
  composite scores (UHDRS-TFC + Symbol Digit Modalities Test). Internal analysis shows:
  CSF NfL rises 18% annually (CV=22%), plasma NfL rises 14% annually (CV=31%), caudate
  volume declines 2.1%/year (CV=18%), and cognitive composite declines 0.8 SD/year
  (CV=45%). Their lead compound (HTT-1247, an antisense oligonucleotide) reduced mutant
  HTT protein by 55% in YAC128 mice and showed 40% reduction in CSF mutant HTT in
  a 12-week Phase 1b study (n=28, CAG 36-55).


  The team wants to advance to a Phase 2 proof-of-concept trial and must make the
  following decisions:


  1. **Primary endpoint selection**: Evaluate which biomarker(s) should serve as primary
  vs. secondary endpoints, with explicit justification using signal-to-noise and sample
  size considerations. Provide a sample size estimate for each candidate endpoint
  assuming 80% power, α=0.05, and a 30% treatment effect.


  2. **Biomarker context of use**: Classify plasma NfL''s fitness-for-purpose for
  this indication using the FDA/NIH Biomarker Working Group framework stages (exploratory
  → validated → qualified).


  3. **Trial design critique**: The CMO proposes a 12-month, parallel-arm, placebo-controlled
  design with 1:1 randomization. Identify at least two design vulnerabilities specific
  to this population and propose modifications.


  4. **Translational confidence assessment**: Rate overall T1→T2 translational confidence
  (Low/Medium/High) with explicit reasoning about the YAC128-to-human gap.'
target_skills:
- translational-research
domain: cross-domain
difficulty: intermediate
