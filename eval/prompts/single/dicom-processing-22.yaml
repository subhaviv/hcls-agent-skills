id: dicom-processing-22
prompt: 'You are a neuroimaging researcher who has just received a USB drive containing
  raw DICOM files from a 3T MRI scanner (Siemens Prisma) for 12 healthy volunteers.
  The data is organized in a flat directory called `/raw_dicoms/` where all files
  from all subjects and sequences are mixed together without any folder structure.
  Each DICOM file has standard header tags including `PatientID` (e.g., "VOL001" through
  "VOL012"), `SeriesDescription` (e.g., "T1_MPRAGE", "rsfMRI_MB4", "DWI_b1000"), and
  `SeriesInstanceUID`.


  Your goal is to convert this messy DICOM collection into a clean NIfTI dataset organized
  according to BIDS format using `dcm2niix`.


  Please provide the following concrete deliverables:


  1. **A bash script** that first sorts the flat DICOM directory into a structured
  per-subject/per-series folder hierarchy (e.g., `/sorted_dicoms/VOL001/T1_MPRAGE/`)
  using Python and `pydicom`, reading the relevant header tags to organize files automatically.


  2. **The `dcm2niix` command** (with all recommended flags) to batch-convert the
  sorted DICOM folders into NIfTI files, outputting a BIDS-compatible filename pattern
  such as `sub-VOL001_T1w.nii.gz`.


  3. **A brief explanation** of what the `-m`, `-z`, and `-f` flags do in `dcm2niix`
  and which specific values you recommend for this dataset.


  4. **A quality-check snippet** in Python using `nibabel` that verifies each output
  `.nii.gz` file has a valid affine matrix (non-singular) and reports the voxel dimensions
  for all 12 subjects.'
target_skills:
- dicom-processing
domain: imaging
difficulty: easy
