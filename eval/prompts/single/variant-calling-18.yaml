id: variant-calling-18
prompt: 'You are running a tumor-only Mutect2 somatic calling pipeline on 47 FFPE-derived
  tumor samples from a retrospective lung adenocarcinoma cohort. Each sample was sequenced
  at ~150x coverage using a 523-gene targeted panel (WES-like capture). You have no
  matched normals available. Your panel of normals (PoN) was constructed from 42 unrelated
  FFPE normal tissue samples sequenced on the same platform and kit.


  During initial QC of your callset, you observe the following concerning patterns:

  - A high rate of C>T transitions (approximately 38% of all SNVs), consistent with
  FFPE deamination artifacts

  - Several "hotspot" variants appearing in >15 of the 47 samples at VAF < 0.05, including
  a suspicious p.Leu858Arg in EGFR appearing in 31/47 samples at VAF 0.02–0.04

  - The `tumor_lod` scores for these suspected artifacts range from 6.2 to 11.8


  Given these observations, please provide:

  1. A detailed explanation of why your PoN may be failing to filter these artifacts
  and what properties of FFPE damage could cause this

  2. Specific GATK Mutect2 command-line arguments and FilterMutectCalls parameters
  you would adjust to better handle FFPE artifacts, with justification for each

  3. A bash code snippet implementing a post-filtering step using `bcftools` to flag
  or remove likely FFPE deamination artifacts based on trinucleotide context and VAF
  thresholds

  4. A recommendation on whether the EGFR p.Leu858Arg calls are likely true somatic
  variants or artifacts, with a statistical reasoning approach to distinguish them'
target_skills:
- variant-calling
domain: genomics
difficulty: hard
