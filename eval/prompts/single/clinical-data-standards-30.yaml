id: clinical-data-standards-30
prompt: 'A pharmaceutical company is conducting a Phase III oncology trial and preparing
  their MedDRA-coded AE frequency tables for regulatory submission. The safety database
  contains the following coded adverse events (all coded to MedDRA v26.0):


  - Neutropenia (PT): 47 subjects

  - Febrile neutropenia (PT): 23 subjects

  - Neutrophil count decreased (PT): 31 subjects

  - Agranulocytosis (PT): 8 subjects

  - White blood cell count decreased (PT): 19 subjects


  The clinical team is debating whether to present the primary AE table at PT level
  or aggregate to HLT level for the regulatory submission, citing concerns about "splitting"
  of related events obscuring the true clinical burden of bone marrow suppression.


  **Deliverables required:**


  1. Identify the correct HLT, HLGT, and SOC for each of the five PTs listed above,
  noting any cases where PTs map to *different* HLTs despite appearing clinically
  related.


  2. Explain the regulatory implications of the PT-splitting phenomenon in this specific
  case — particularly how ICH E3 and FDA guidance address aggregation decisions, and
  whether combining counts across HLTs is permissible in a primary safety table.


  3. A subject with febrile neutropenia was also coded with neutropenia for the same
  clinical episode. Explain how the MedDRA coding convention (specifically the "one
  PT per concept" rule and the distinct concepts principle) should have been applied,
  and whether both codes should appear in the frequency table.


  4. Recommend a specific table structure for the submission that satisfies both scientific
  accuracy and regulatory acceptability, including how to handle the overlapping subject
  counts without double-counting in the denominator.'
