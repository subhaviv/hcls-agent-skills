id: pa-decision-automation-23
prompt: 'A regional health plan processes approximately 4,200 prior authorization
  requests per month across musculoskeletal procedures. Your team has extracted the
  following summary statistics from 6 months of historical PA decisions (25,200 total
  requests):


  - **Approval rate**: 71% overall

  - **Top denied procedure codes**: 27447 (total knee arthroplasty, 34% denial rate),
  22612 (lumbar spinal fusion, 41% denial rate), 29827 (shoulder arthroscopy, 28%
  denial rate)

  - **Common denial reasons**: insufficient conservative therapy documentation (38%),
  missing imaging reports (27%), lack of functional impairment evidence (21%), out-of-network
  provider (14%)

  - **Average PA turnaround time**: 4.2 days; urgent requests average 1.8 days


  Your task is to build a lightweight rules-based PA decision engine for musculoskeletal
  procedures. Provide the following deliverables:


  1. **A Python class** (`MuskPADecisionEngine`) that encodes at least 4 adjudication
  rules for procedure code 27447 (total knee arthroplasty), including checks for conservative
  therapy duration (minimum 6 weeks), BMI threshold (≤40), imaging evidence flag,
  and functional score (e.g., KOOS < 45). The class should return a structured decision
  object with `decision`, `denial_reasons`, and `confidence_score` fields.


  2. **A denial pattern analysis function** that accepts a pandas DataFrame of historical
  decisions and returns the top 3 denial reason combinations (co-occurring denial
  codes) using association rule mining or simple frequency counting.


  3. **Two specific documentation improvement recommendations** for reducing the 38%
  "insufficient conservative therapy" denial rate, based on the pattern data provided.'
target_skills:
- pa-decision-automation
domain: healthcare-ops
difficulty: easy
