id: claims-analytics-18
prompt: 'A regional Medicare Advantage plan has flagged Provider NPI 1234567890 (specialty:
  Internal Medicine) for potential E&M upcoding. You have extracted the following
  CPT distribution from 6 months of X12 837P claims data:


  | CPT Code | Claim Count | Avg Charge |

  |----------|-------------|------------|

  | 99211    | 12          | $45        |

  | 99212    | 28          | $78        |

  | 99213    | 41          | $112       |

  | 99214    | 387         | $198       |

  | 99215    | 312         | $285       |


  The national peer benchmark for Internal Medicine shows 99214+99215 combined frequency
  at 38% of office visits. This provider''s rate is 89.7%. Additionally, claims data
  shows 31 dates of service where this provider billed more than 24 distinct patient
  encounters in a single day, with a maximum of 41 encounters on 2024-03-15.


  Please deliver the following:


  1. **Python code** using pandas to calculate a upcoding severity score that normalizes
  this provider''s E&M distribution against the peer benchmark, incorporating both
  the frequency deviation and the impossible-day encounters as weighted penalty factors
  (define your own defensible weighting schema).


  2. **SQL query** to identify all dates where daily encounter counts exceed a configurable
  threshold (default 24) across a `claims` table with columns: `npi`, `dos`, `claim_id`,
  `cpt_code`, `billed_amount`.


  3. **Statistical interpretation** of whether Benford''s Law applied to the `billed_amount`
  column would be a useful fraud signal for this specific provider, or whether it
  would produce misleading results given the CPT-charge structure observed.


  4. **Recommended next investigative steps** for the SIU team, prioritizing actions
  by expected evidence yield.'
target_skills:
- claims-analytics
domain: healthcare-ops
difficulty: hard
