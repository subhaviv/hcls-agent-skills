id: translational-research-15
prompt: 'Here is test question #15 of 30:


  ---


  Your team has identified **KCNQ3** (a voltage-gated potassium channel) as a potential
  target for treatment-resistant focal epilepsy. You have the following preclinical
  and human genetics data:


  - A GWAS meta-analysis (n=12,400 cases, 24,800 controls) identified a lead SNP rs7841293
  near KCNQ3 (p=3.2×10⁻⁸, OR=1.18)

  - GTEx eQTL analysis shows rs7841293 is a cis-eQTL reducing KCNQ3 expression in
  temporal cortex (β=−0.31, p=1.4×10⁻⁶)

  - Mendelian randomization (two-sample MR, IVW method) using 6 independent SNPs yields
  a causal estimate of OR=1.24 per SD decrease in KCNQ3 expression (p=0.004), but
  MR-Egger intercept p=0.09 suggesting possible pleiotropy

  - In Kcnq3-haploinsufficient mice, seizure threshold is reduced 40% vs. wildtype,
  and a selective KCNQ3 positive allosteric modulator (PAM) "KPM-441" normalizes threshold
  (n=12/group, p=0.01)

  - No human PET ligand exists for KCNQ3; CSF and plasma KCNQ3 protein levels are
  undetectable with current assays


  Given these data, please provide: **(1)** a structured target validation scorecard
  rating genetic, functional, and safety evidence; **(2)** a recommended biomarker
  strategy for a first-in-human Phase 1b proof-of-mechanism study, specifying context
  of use and acceptable surrogate endpoints given the assay limitations; **(3)** a
  critical assessment of whether the MR evidence is sufficient to advance, including
  what additional analyses you would run; and **(4)** a go/no-go decision framework
  with explicit criteria thresholds for advancing KPM-441 to Phase 2.'
