id: claims-billing-rules-23
prompt: 'A rural family practice clinic has submitted claims for 847 office visits
  over a 6-month period. During a routine claims audit, your team identifies the following
  pattern: Dr. Martinez billed 94% of established patient visits at CPT code 99215
  (Level 5 E&M), compared to a national benchmark of approximately 17% for family
  practice physicians. The remaining 6% were billed at 99214. No visits were billed
  at levels 99211–99213.


  Additionally, the audit reveals that 312 of these 99215 claims were submitted on
  the same dates as minor surgical procedures (laceration repairs, I&D of abscesses),
  with Modifier 25 appended to the E&M code on all 312 claims. Chart documentation
  for a sample of 25 randomly selected claims shows that 18 contain templated "copy-forward"
  notes with nearly identical language across different patients, and 7 contain documentation
  that appears to support only a 99213 or 99214 level of service.


  Given this scenario, provide the following:


  1. An analysis of whether this pattern represents a coding error, waste, or potential
  fraud, citing the specific indicators that distinguish each classification

  2. An explanation of the appropriate use of Modifier 25 and whether its application
  in these claims appears compliant with CMS guidelines

  3. A prioritized list of at least four additional data points or investigative steps
  your audit team should pursue to build or refute a fraud case

  4. A recommended corrective action plan differentiating between education-based
  remediation versus referral to a Special Investigations Unit (SIU), with thresholds
  that would trigger escalation'
target_skills:
- claims-billing-rules
domain: healthcare-ops
difficulty: easy
