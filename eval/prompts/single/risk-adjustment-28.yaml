id: risk-adjustment-28
prompt: 'Here is test question #28 of 30:


  ---


  A Medicare Advantage plan has 12,000 members, and your risk adjustment team has
  flagged a critical edge case involving **HCC 18 (Diabetes with Chronic Complications)**
  and **HCC 19 (Diabetes without Complication)** hierarchy resolution. During your
  pipeline audit, you discover that 847 members have *both* E11.65 (Type 2 diabetes
  with hyperglycemia) and E11.40 (Type 2 diabetes with diabetic neuropathy, unspecified)
  submitted in the same payment year from different providers. Additionally, 312 of
  these members have active Rx fills for **pregabalin or duloxetine** (Rx proxies
  for diabetic neuropathy) but *no* ICD-10 code for neuropathy on file, suggesting
  a coding gap.


  Your pipeline currently uses CMS-HCC Model V28 coefficients. The community, non-dual,
  aged demographic segment applies. Assume a base RAF of 0.0 and that the HCC 18 coefficient
  is **0.302** and HCC 19 coefficient is **0.104** under V28.


  **Deliverables required:**


  1. Write Python code implementing the hierarchy resolution logic that correctly
  suppresses HCC 19 when HCC 18 is present for the 847 dual-coded members, and outputs
  a corrected member-level HCC list.

  2. Calculate the aggregate RAF impact (delta) if all 312 Rx-proxy gap members are
  successfully recaptured with a valid HCC 18 diagnosis versus remaining at HCC 19.

  3. Explain any edge cases where a member could legitimately retain *both* HCC 18
  and HCC 19 in the same model year, or why that scenario is impossible under CMS
  hierarchy rules.

  4. Provide a SQL query that identifies members with pregabalin/duloxetine Rx fills
  but no HCC 18-qualifying ICD-10 code in a `claims` table and `pharmacy` table schema
  you define.'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: hard
