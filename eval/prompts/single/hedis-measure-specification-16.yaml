id: hedis-measure-specification-16
prompt: 'A regional health plan is preparing for HEDIS MY2024 data submission and
  needs help analyzing their Controlling High Blood Pressure (CBP) measure performance.
  Their analytics team has pulled the following member data:


  - Total members aged 18–85 with hypertension diagnosis: 12,400

  - Members excluded due to ESRD: 340

  - Members excluded due to pregnancy: 180

  - Members excluded due to hospice: 95

  - Members with at least one outpatient visit during the measurement year: 9,800

  - Members with a compliant blood pressure reading (< 140/90) documented: 5,100

  - Members with blood pressure readings only in an acute inpatient or ED setting:
  620

  - Members enrolled for less than 11 months during the measurement year: 1,450

  - Members with a diagnosis of kidney transplant: 210


  The plan currently sits at 58% on CBP, which falls below the 3-Star threshold of
  63% for this measure. CBP is a triple-weighted measure in Medicare Star Ratings.


  Please provide the following:

  1. A step-by-step walkthrough of the correct denominator construction, identifying
  which populations should be excluded and why, based on HEDIS CBP measure specifications

  2. A recalculated numerator rate using only compliant readings from eligible settings

  3. An explanation of how the continuous enrollment rule applies here and which members
  should be removed

  4. At least three specific care gap closure strategies the plan could implement
  to reach the 3-Star threshold, with estimated member impact based on the data provided'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: intermediate
