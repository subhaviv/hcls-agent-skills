id: cdisc-compliance-29
prompt: 'A Phase III oncology trial (N=847 patients) is being prepared for FDA submission.
  The SDTM dataset for the Tumor Results domain (TR) contains several complexities
  that require resolution before submission.


  **Specific scenario details:**


  The TR domain includes:

  - Standard RECIST 1.1 measurements (TRORRES, TRORRESU) for 12 target lesions per
  patient

  - A sponsor-defined "Lesion Metabolic Score" (LMS) captured via PET scan with no
  CDISC controlled terminology mapping

  - Bidirectional lesion cross-references linking TR records to TU (Tumor Identification)
  domain via RELREC

  - Three derived variables (TRBESTRS, TRPCHG, TRNLINKID) that the sponsor placed
  directly in TR rather than in a supplemental qualifier dataset


  **Compliance issues identified by Pinnacle 21 Enterprise:**

  1. ERROR: TRBESTRS not in TR domain SDTM Implementation Guide variable list

  2. WARNING: Missing value-level metadata for TRORRES (units vary by lesion type)

  3. ERROR: RELREC.IDVAR populated with "TRLNKID" which doesn''t exist as a variable
  in TR

  4. WARNING: LMS values in TRORRES lack --TESTCD controlled terminology mapping


  **Deliverables requested:**

  1. Classify each finding by regulatory risk (Critical/Major/Minor) with justification

  2. Provide the correct SUPPQUAL structure for TRBESTRS and TRPCHG, including all
  required SUPP-- variables with example values for one patient (USUBJID="ONCO-0042")

  3. Explain the correct RELREC implementation to link TR↔TU records, including required
  variable values

  4. Recommend a controlled terminology strategy for the LMS variable given no CDISC
  CT exists

  5. Draft the value-level metadata entry for TRORRES in define.xml format'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: hard
