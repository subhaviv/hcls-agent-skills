id: aws-genai-ml-architect-17
prompt: 'A regional health system with 340,000 active patients is building a **clinical
  decision support system** that surfaces relevant drug-drug interaction (DDI) warnings
  during physician order entry. The system must query a knowledge base containing
  2.3 million indexed drug interaction records from FDA Adverse Event Reporting System
  (FAERS), DrugBank, and proprietary pharmacovigilance data. The ordering workflow
  requires sub-200ms P99 latency at peak load (approximately 1,200 concurrent physician
  sessions during 7–9 AM and 4–6 PM windows).


  **Technical constraints:**

  - PHI elements (patient MRN, current medication list) are included in each query
  context

  - The knowledge base must be refreshed weekly with new FAERS submissions

  - A BAA is already in place with AWS

  - The system must maintain an audit log of every query and response for FDA SaMD
  compliance

  - Budget ceiling: $45,000/month for the entire inference + retrieval stack


  **Your deliverables:**


  1. **Architecture decision**: Evaluate whether to use **Amazon Bedrock Knowledge
  Bases** with a managed RAG approach versus a **custom SageMaker-hosted embedding
  + OpenSearch Serverless** retrieval pipeline. Justify your recommendation given
  the latency and PHI constraints.


  2. **Data flow diagram** (described in text or ASCII): Show how a physician query
  containing PHI flows through the system, including where PHI is masked or tokenized
  before hitting the LLM layer.


  3. **Latency breakdown**: Estimate the millisecond budget allocation across retrieval,
  reranking, and LLM inference components to meet the 200ms P99 target.


  4. **Cost estimate**: Provide a rough monthly cost model for your recommended architecture
  at the stated peak concurrency.


  5. **Compliance controls**: List the specific AWS services and configurations needed
  to satisfy HIPAA audit logging and FDA SaMD traceability requirements.'
target_skills:
