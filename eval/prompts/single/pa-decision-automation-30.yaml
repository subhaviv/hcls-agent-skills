id: pa-decision-automation-30
prompt: 'A regional health plan processes approximately 4,200 prior authorization
  requests monthly for specialty biologics (adalimumab, ustekinumab, secukinumab)
  targeting inflammatory conditions. Their ML-based PA classifier achieves 87% overall
  accuracy, but a recent audit revealed a troubling pattern: the model approves 91%
  of requests from large academic medical centers while denying 43% of identical clinical
  presentations submitted by independent rheumatology practices. The suspected root
  cause is that training data (18 months of historical decisions, ~75,600 records)
  contains embedded reviewer bias favoring institutions with dedicated PA coordinators
  who submit more complete documentation bundles.


  Your task involves multiple deliverables:


  1. **Bias Detection Code**: Write Python code using SHAP values to quantify feature-level
  disparate impact across provider-type subgroups. Include a fairness metric calculation
  (equalized odds or demographic parity) comparing academic vs. independent practice
  approval rates after controlling for clinical severity scores (CDAi/BASDAI extracted
  from FHIR PAS bundles).


  2. **Debiasing Strategy**: Design a preprocessing pipeline that uses reweighting
  or adversarial debiasing to correct for documentation-completeness proxy bias without
  discarding the 23% of training records from independent practices. Specify which
  fairness-aware ML library (Fairlearn, AIF360, or custom) you would use and why.


  3. **Rules Engine Fallback**: For cases where the debiased model confidence falls
  below 0.72, propose a deterministic rules engine using CMS LCD criteria for biologic
  authorization that would serve as a safety net. Include the top 5 clinical decision
  nodes.


  4. **Monitoring Dashboard Spec**: Define 4 KPIs with threshold alerts to detect
  bias re-emergence in production, including recommended retraining triggers based
  on rolling 30-day denial rate divergence exceeding 8% between provider cohorts.'
