id: risk-adjustment-22
prompt: 'Here is test question #22 of 30:


  ---


  A Medicare Advantage plan has a member, **Jane Doe (DOB: 03/15/1948, Female, Non-ESRD,
  Community-dwelling)**, with the following ICD-10 diagnosis codes submitted during
  the 2024 payment year (model year CMS-HCC V28):


  | ICD-10 Code | Description |

  |-------------|-------------|

  | E11.65 | Type 2 diabetes with hyperglycemia |

  | E11.40 | Type 2 diabetes with diabetic neuropathy, unspecified |

  | I50.32 | Chronic diastolic heart failure |

  | I50.22 | Chronic systolic heart failure |

  | N18.4 | Chronic kidney disease, stage 4 |

  | E11.65 | (duplicate submission) |


  Using the **CMS-HCC V28 model**, perform the following:


  1. **ICD-10-to-HCC Crosswalk**: Map each unique ICD-10 code to its corresponding
  HCC(s) under V28. Identify which codes map to valid HCCs and which (if any) do not.


  2. **Hierarchy Resolution**: Apply CMS disease hierarchy rules to resolve any trumping
  relationships among the mapped HCCs. Clearly state which HCCs are retained and which
  are dropped, citing the specific hierarchy rule applied.


  3. **RAF Score Calculation**: Using the 2024 V28 community non-dual aged coefficients,
  calculate Jane''s final RAF score. Assume a demographic score of **0.379** and list
  each additive HCC coefficient used.


  4. **Python Code**: Write a concise Python function `calculate_raf(icd_list, demographic_score)`
  that accepts a list of ICD-10 codes and a demographic score, applies the crosswalk
  and hierarchy resolution, and returns the final RAF score and retained HCC list.'
target_skills:
- risk-adjustment
domain: healthcare-ops
difficulty: easy
