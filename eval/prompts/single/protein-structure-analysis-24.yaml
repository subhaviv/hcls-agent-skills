id: protein-structure-analysis-24
prompt: 'You are analyzing two crystal structures of the kinase domain of **MELK (Maternal
  Embryonic Leucine Zipper Kinase)**: an apo form (PDB-like file: `MELK_apo.pdb`,
  chain A, 280 residues) and a ligand-bound form (`MELK_bound.pdb`, chain A, same
  residues, with a small molecule inhibitor **MX-447** in the binding site). Both
  structures were solved at ~2.1 Å resolution.


  Your task involves the following:


  1. **Structural Superposition**: Write Python code using Biopython''s `Superimposer`
  to align the two structures on Cα atoms of residues 10–270 (excluding flexible loop
  residues 145–158). Report the RMSD. If RMSD > 1.5 Å, identify which 10-residue segments
  contribute most to the deviation by computing per-segment RMSD in a sliding window.


  2. **B-factor Analysis**: Extract and compare B-factors for residues in the activation
  loop (residues 185–210) between apo and bound forms. Generate a line plot overlaying
  both profiles. Residues with B-factor difference > 15 Å² should be flagged as "significantly
  rigidified" upon binding.


  3. **Binding Pocket Detection**: Using the `fpocket` command-line tool (assume it''s
  installed), describe the shell commands to run pocket detection on `MELK_bound.pdb`,
  then write Python code to parse the `_info.txt` output and extract the top-3 pockets
  ranked by **druggability score**. Print residues lining each pocket.


  4. **DSSP Secondary Structure**: Assign secondary structure to both structures using
  Biopython''s DSSP wrapper. Identify any residues in the 185–210 range that switch
  secondary structure class (e.g., helix → coil) upon ligand binding.


  Provide complete, runnable Python code for steps 1, 2, and 4, and shell + Python
  for step 3.'
