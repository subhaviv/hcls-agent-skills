id: biomarker-discovery-16
prompt: 'A research team has profiled 847 newly diagnosed multiple myeloma patients
  across three institutions (Mayo Clinic n=412, MD Anderson n=235, Cleveland Clinic
  n=200). Each patient has: RNA-seq data (18,432 genes after QC), serum protein levels
  for 94 cytokines (Luminex panel), standard clinical variables (ISS stage, LDH, creatinine,
  age, ECOG), and time-to-progression outcomes (median follow-up 38 months, 61% events).
  The goal is to build a **predictive biomarker** signature identifying patients who
  benefit from bortezomib-based versus IMiD-based induction therapy (treatment assignment
  was not randomized — physicians chose based on institutional preference, creating
  confounding).


  The team proposes: (1) concatenating all RNA-seq + cytokine + clinical features
  into one matrix, (2) running LASSO with 5-fold CV on the full dataset to select
  features, (3) reporting the C-index from that same 5-fold CV as their validation
  performance.


  **Deliverables requested:**


  1. Identify all methodological flaws in the proposed approach, specifically naming
  which steps introduce data leakage, selection bias, or conflated prognostic/predictive
  intent.


  2. Redesign the analysis pipeline end-to-end: specify how to handle the non-randomized
  treatment assignment, which feature selection strategy to use, how to structure
  cross-validation to avoid optimism, and how to allocate the three institutions across
  discovery/tuning/validation.


  3. Provide pseudocode (Python-style) implementing nested cross-validation with a
  treatment-interaction term to isolate predictive signal from prognostic confounding.


  4. Specify which evaluation metrics should be reported for a predictive (not prognostic)
  biomarker in this setting, and explain why C-index alone is insufficient.'
target_skills:
- biomarker-discovery
