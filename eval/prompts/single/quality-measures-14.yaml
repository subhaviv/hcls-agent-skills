id: quality-measures-14
prompt: 'You are a healthcare data analyst at a regional health plan with 85,000 covered
  lives. Your quality team needs to evaluate performance on the **Diabetes Care —
  HbA1c Poor Control (CDC)** HEDIS measure for the current measurement year (January
  1 – December 31, 2024).


  Your claims database contains the following tables:

  - `enrollment` (member_id, start_date, end_date, plan_type)

  - `medical_claims` (claim_id, member_id, service_date, diagnosis_codes, procedure_codes,
  provider_npi)

  - `lab_results` (member_id, test_date, loinc_code, result_value, result_unit)

  - `pharmacy_claims` (member_id, fill_date, ndc_code, days_supply, quantity)


  **Preliminary data pull shows:**

  - 4,200 members aged 18–75 with at least one diabetes diagnosis code (E11.x) during
  2024

  - Continuous enrollment requirement: enrolled for 11 of 12 months with no more than
  one 45-day gap

  - HbA1c LOINC codes of interest: 4548-4, 17856-6, 59261-8

  - Poor control threshold: HbA1c > 9.0%


  **Please provide:**

  1. A complete SQL query to identify the eligible denominator population applying
  the continuous enrollment logic

  2. A second SQL query to flag numerator members (those with HbA1c > 9.0% as their
  most recent result, or no HbA1c test during the measurement year)

  3. The formula and a sample calculation for the measure rate given 980 denominator
  members and 287 numerator hits

  4. Two specific care gap intervention recommendations targeting members with no
  HbA1c test on file'
target_skills:
- quality-measures
domain: healthcare-ops
difficulty: intermediate
