id: cell-type-annotation-22
prompt: 'You have processed a 10x Genomics scRNA-seq dataset from human peripheral
  blood mononuclear cells (PBMCs) containing 8,500 cells across 14 Leiden clusters
  (resolution 0.5). You want to annotate these clusters using canonical marker genes
  rather than an automated tool.


  Your marker gene reference includes:

  - **T cells**: CD3D, CD3E, CD3G

  - **CD4+ T cells**: CD4, IL7R, CCR7

  - **CD8+ T cells**: CD8A, CD8B, GZMB

  - **NK cells**: GNLY, NKG7, KLRD1

  - **B cells**: MS4A1, CD79A, CD79B

  - **Monocytes (Classical)**: CD14, LYZ, S100A8

  - **Monocytes (Non-classical)**: FCGR3A, MS4A7

  - **Dendritic cells**: FCER1A, CST3, CLEC10A

  - **Platelets**: PPBP, PF4


  Using Scanpy, please provide:

  1. Code to generate a **dotplot** showing expression of all listed marker genes
  across the 14 clusters, with dot size representing percent expressed and color representing
  mean expression (use `sc.pl.dotplot`)

  2. Code to compute a **cluster-by-marker score matrix** using `sc.tl.score_genes`
  for each cell type, then display it as a heatmap

  3. A function `assign_labels(adata, min_score=0.3)` that automatically assigns the
  highest-scoring cell type label to each cluster, with "Unknown" assigned if no score
  exceeds `min_score`

  4. Code to add the final labels to `adata.obs[''cell_type'']` and visualize on a
  UMAP'
target_skills:
- cell-type-annotation
domain: single-cell
difficulty: easy
