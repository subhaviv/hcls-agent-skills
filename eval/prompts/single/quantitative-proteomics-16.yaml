id: quantitative-proteomics-16
prompt: 'You are analyzing a TMT-16plex proteomics dataset from a clinical study comparing
  treatment-naive colorectal cancer patients (n=48) versus healthy controls (n=48),
  processed across 3 TMT batches (32 samples per batch, with a pooled reference channel
  in each batch). After running the raw data through Proteome Discoverer, you have
  quantified 6,847 proteins. Initial QC reveals the following issues:


  1. Batch 2 shows a systematic ~1.8-fold signal inflation across all channels compared
  to batches 1 and 3

  2. Missing values constitute 18% of the dataset overall, but inspection suggests
  two distinct patterns: ~60% of missing values cluster in low-abundance proteins
  absent across entire sample groups (MNAR), while ~40% appear randomly distributed
  across samples within groups (MCAR)

  3. A co-isolation interference analysis shows average precursor co-isolation of
  23% in batch 1, rising to 31% in batches 2 and 3


  Please provide:

  - A complete normalization strategy addressing both the batch effect and within-batch
  channel variation, including specific R code using the `limma` or `preprocessCore`
  package

  - A hybrid imputation approach that handles the MNAR and MCAR fractions differently,
  with R code implementing both strategies on the same matrix

  - An assessment of how the 23-31% co-isolation interference levels will affect your
  fold-change estimates and what correction or filtering steps you would apply

  - A differential expression analysis workflow using `limma` that accounts for batch
  as a covariate, with the model formula and key code blocks


  Use the protein matrix dimensions of 6847 proteins × 96 samples in your code examples.'
target_skills:
- quantitative-proteomics
domain: proteomics
difficulty: intermediate
