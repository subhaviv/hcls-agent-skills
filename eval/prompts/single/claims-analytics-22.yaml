id: claims-analytics-22
prompt: 'Here is test question #22 of 30:


  ---


  You are a healthcare data analyst working with a regional Medicare Advantage plan.
  Your team has extracted a sample of professional claims from the past 12 months
  for a group of 8 internal medicine providers (NPI group: "MidWest Primary Care Associates").
  The raw data shows the following E&M office visit code distribution across all 8
  providers combined (total 14,400 claims):


  - 99211: 180 claims (1.25%)

  - 99212: 420 claims (2.9%)

  - 99213: 1,980 claims (13.75%)

  - 99214: 8,640 claims (60%)

  - 99215: 3,180 claims (22.1%)


  National Medicare benchmark distributions for internal medicine are approximately:
  99211 (2%), 99212 (8%), 99213 (28%), 99214 (45%), 99215 (17%).


  Please provide the following deliverables:


  1. **Python code** using pandas that ingests a DataFrame with columns `[npi, dos,
  cpt_code, billed_amount]` and calculates each provider''s individual E&M distribution
  as a percentage, then flags any provider whose 99214+99215 combined rate exceeds
  85%.


  2. **A statistical comparison** using chi-square or a similar method to determine
  whether this group''s E&M distribution is significantly different from the national
  benchmark — include the test statistic and interpretation.


  3. **A brief written interpretation** (4–6 sentences) explaining what the distribution
  pattern suggests about potential upcoding risk, and what additional data points
  (e.g., average HCC risk scores, documentation audit flags) you would request before
  escalating to a formal fraud investigation.'
target_skills:
- claims-analytics
