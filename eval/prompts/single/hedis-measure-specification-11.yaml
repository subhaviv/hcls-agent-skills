id: hedis-measure-specification-11
prompt: 'A regional health plan is preparing for HEDIS measurement year 2024 and needs
  to evaluate their Controlling High Blood Pressure (CBP) measure performance. Their
  data team has pulled the following population snapshot:


  - Total attributed members aged 18–85: 42,000

  - Members with a hypertension diagnosis (ICD-10 I10) on two separate visits: 8,400

  - Members with ESRD diagnosis: 312

  - Members with pregnancy during the measurement year: 87

  - Members who disenrolled before completing 11 months of continuous enrollment:
  634

  - Members with a blood pressure reading of <140/90 documented: 4,100

  - Members lacking any BP reading in the measurement year: 1,200


  Your task is to produce the following deliverables:


  1. **Denominator construction**: Walk through the step-by-step logic to build the
  eligible CBP denominator, applying all standard HEDIS exclusions. Show the math
  using the numbers above.


  2. **Numerator calculation**: Identify which members count toward the numerator
  and calculate the preliminary CBP rate.


  3. **Exclusion classification**: For each exclusion category listed (ESRD, pregnancy,
  insufficient enrollment), explain the NCQA rule that governs it and whether it is
  a denominator exclusion or denominator exception.


  4. **Care gap prioritization**: Given that 1,200 members have no BP reading on file,
  recommend two concrete outreach strategies to close this gap before the measurement
  year ends, considering both clinical and administrative approaches.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: easy
