id: quantitative-proteomics-20
prompt: 'You are analyzing a TMT-16plex proteomics dataset from a clinical study comparing
  treatment-naive (n=8) versus drug-resistant (n=8) ovarian cancer patients. The experiment
  was run across two TMT batches (8 patients per batch, balanced by condition), and
  you have received the PSM-level output from Proteome Discoverer. After protein rollup,
  you observe the following characteristics in your data:


  - 6,847 proteins quantified total

  - ~18% missing values overall, but 340 proteins are missing in >50% of samples exclusively
  in the treatment-naive group

  - PCA shows a strong batch effect (PC1 = 34% variance explained, separating batches)

  - The internal reference scaling (IRS) method has not yet been applied (no pooled
  reference channel was included in the design)

  - Notch ratio compression is suspected based on co-isolation interference estimates
  averaging 22% in dense spectral regions


  Please provide:

  1. A detailed strategy for batch correction given the absence of a pooled reference
  channel, including which computational methods are appropriate and their limitations
  in this context

  2. A decision framework for handling the 340 proteins with condition-specific missingness
  — specifically whether to impute, filter, or analyze them separately, with justification
  based on MNAR vs MCAR considerations

  3. R code implementing your recommended normalization pipeline (including batch
  correction and any imputation), using a realistic data structure from Proteome Discoverer
  output

  4. An assessment of how the 22% average co-isolation interference affects downstream
  differential expression and what thresholds or corrections you would apply before
  running limma on this dataset'
target_skills:
- quantitative-proteomics
domain: proteomics
difficulty: hard
