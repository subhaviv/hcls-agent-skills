id: edc-data-validation-26
prompt: 'You are building an automated SDTM validation pipeline for a Phase II oncology
  trial (STUDY-ONC-2024) with 180 subjects across 3 sites. The trial includes SDTM
  domains: DM, AE, CM, LB, VS, and EX. Your team has received a batch export from
  Veeva Vault CDMS and needs to validate it before database lock.


  Specific issues flagged by the clinical data manager include:


  1. **LB domain**: Serum creatinine values (LBTESTCD = "CREAT") appear in both mg/dL
  and µmol/L units across sites, with reference ranges not standardized. Some LBSTRESN
  values seem implausible (e.g., 0.02 mg/dL and 450 mg/dL recorded for adult subjects).

  2. **AE-EX cross-form check**: Adverse events with AESTDTC before the first exposure
  date (EXSTDTC) need to be flagged as potential pre-treatment AEs incorrectly coded
  as treatment-emergent.

  3. **CM domain**: Concomitant medications missing CMSTDTC but having CMENDTC populated
  — these partial date inconsistencies need resolution logic.

  4. **Controlled terminology**: AEDECOD terms need verification against MedDRA v26.1,
  and CMDECOD terms against WHODrug.


  Please provide:

  - Python code implementing all four validation checks above, reading from CSV-formatted
  SDTM datasets

  - Unit conversion logic for creatinine (mg/dL ↔ µmol/L) with plausibility bounds
  (0.4–15.0 mg/dL for adults)

  - A prioritized findings report structure (Critical / Major / Minor) with example
  output

  - A brief explanation of how SDTM IG 3.3 governs the handling of missing start dates
  in CM'
target_skills:
- edc-data-validation
domain: clinical-data-review
difficulty: intermediate
