id: pa-decision-automation-16
prompt: 'A regional health plan processes approximately 4,200 prior authorization
  requests monthly for specialty medications. Your team has extracted a labeled dataset
  of 18,000 historical PA decisions (approved/denied) with the following features:
  diagnosis ICD-10 codes, requested medication NDC, prescribing provider NPI, patient
  age/gender, prior treatment history (step therapy compliance), lab values (e.g.,
  HbA1c, LDL-C), and submission completeness score (0–100). The overall denial rate
  is 31%, but internal audits suggest denials cluster heavily around three drug classes:
  GLP-1 agonists (47% denial rate), biologics for psoriasis (52% denial rate), and
  PCSK9 inhibitors (61% denial rate).


  Your task is to build a PA decision automation pipeline with the following deliverables:


  1. **Feature engineering code** (Python/pandas): Create at least five derived features
  from the raw dataset that capture clinically meaningful signals for adjudication
  (e.g., step therapy gap days, lab value deviation from clinical threshold).


  2. **XGBoost classifier**: Train a binary classifier on the 18,000 records using
  an 80/20 train-test split, handling class imbalance with SMOTE, and report precision,
  recall, F1, and AUC-ROC metrics.


  3. **SHAP analysis**: Generate a SHAP summary plot interpretation (describe what
  the code would produce) for the top 8 features driving denial predictions, specifically
  calling out how step therapy compliance and submission completeness rank relative
  to clinical lab values.


  4. **Denial pattern analysis**: Using the three high-denial drug classes, propose
  a structured denial pattern report template that identifies documentation gaps and
  policy misalignments a medical director could act on within 30 days.'
target_skills:
- pa-decision-automation
