id: biomarker-discovery-13
prompt: 'A clinical research team has collected RNA-seq data from 120 early-stage
  non-small cell lung cancer (NSCLC) patients, with 45 patients experiencing disease
  recurrence within 3 years (events) and 75 remaining recurrence-free. They have measured
  expression levels for 8,500 genes and want to build a prognostic gene signature
  to predict recurrence risk.


  The team plans to use LASSO regression to select features and then evaluate the
  model using simple holdout validation (70/30 train-test split). A colleague suggests
  that with only 45 events, this approach may produce an overly optimistic model.


  Please provide the following:


  1. **Events-per-variable (EPV) analysis**: Calculate the approximate maximum number
  of predictors that should be considered given 45 events, and explain why this matters
  for model stability.


  2. **Validation strategy recommendation**: Explain why the proposed 70/30 holdout
  approach is problematic for this sample size and recommend a more appropriate internal
  validation strategy, naming it specifically.


  3. **Leakage risk identification**: Identify one specific data leakage scenario
  that could occur if feature selection (LASSO) is performed before splitting the
  data, and describe how to prevent it.


  4. **Evaluation metric selection**: The team is currently using accuracy as their
  primary metric. Recommend two more appropriate metrics for this survival/prognostic
  context and briefly justify each choice.


  5. **Minimal code sketch**: Provide a short Python pseudocode outline (10-15 lines)
  showing how to correctly implement nested cross-validation with LASSO for this use
  case using scikit-learn or lifelines.'
target_skills:
- biomarker-discovery
domain: single-cell
difficulty: easy
