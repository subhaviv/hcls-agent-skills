id: ehr-data-parsing-26
prompt: 'You are building a clinical data pipeline that receives HL7v2 ORU^R01 messages
  containing lab results from a hospital laboratory system. The messages follow this
  structure:


  ```

  MSH|^~\&|LAB|HOSPITAL|EHR|MAIN|20240315143022||ORU^R01|MSG00847|P|2.5

  PID|1||PT-10293^^^MRN||Johnson^Robert^A||19681204|M|||123 Oak St^^Chicago^IL^60601

  OBR|1||ORD-5521|85025^CBC WITH DIFFERENTIAL^CPT

  OBX|1|NM|6690-2^WBC^LN||7.2|10*3/uL|4.5-11.0|N|||F

  OBX|2|NM|789-8^RBC^LN||4.85|10*6/uL|4.50-5.90|N|||F

  OBX|3|NM|718-7^HGB^LN||14.2|g/dL|13.5-17.5|N|||F

  OBX|4|NM|4544-3^HCT^LN||42.1|%|41.0-53.0|N|||F

  OBX|5|NM|777-3^PLT^LN||148|10*3/uL|150-400|L|||F

  ```


  Your pipeline must process a batch of 500 such messages daily. Please provide:


  1. A Python function `parse_oru_message(raw_hl7: str) -> dict` that extracts patient
  demographics from PID and all OBX lab values including LOINC code, test name, value,
  units, reference range, and abnormal flag into a structured dictionary.


  2. A function `batch_to_dataframe(messages: list[str]) -> pd.DataFrame` that processes
  a list of raw HL7 strings and returns a flattened pandas DataFrame with one row
  per OBX observation.


  3. A data quality check function `validate_lab_extract(df: pd.DataFrame) -> pd.DataFrame`
  that flags rows where: numeric values fall outside reference range but abnormal
  flag is "N", required fields (MRN, LOINC code, value) are missing, or duplicate
  OBX entries exist for the same patient/test/timestamp.


  Include error handling for malformed segments and explain your parsing approach
  for the pipe-delimited HL7v2 format.'
target_skills:
- ehr-data-parsing
domain: clinical-data
difficulty: intermediate
