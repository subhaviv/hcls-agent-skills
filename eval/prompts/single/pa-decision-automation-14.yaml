id: pa-decision-automation-14
prompt: 'Here is test question #14 of 30:


  ---


  Your health plan processes approximately 4,200 prior authorization requests per
  month for specialty medications. After auditing the last 6 months of decisions (25,200
  total requests), your team has identified the following denial pattern breakdown:
  step therapy not completed (38%), missing clinical documentation (27%), diagnosis
  code mismatch (19%), formulary exclusion (11%), and duplicate request (5%). The
  denial rate varies significantly by provider specialty: oncologists have a 12% denial
  rate while pain management specialists have a 41% denial rate.


  You want to build a rules-based PA decision engine that can auto-approve straightforward
  cases while flagging complex cases for clinical review. Your historical data includes
  fields: `member_id`, `provider_npi`, `drug_ndc`, `primary_diagnosis_icd10`, `secondary_diagnoses`
  (list), `requested_quantity`, `days_supply`, `prior_auth_history` (JSON), `lab_values`
  (JSON), and `clinical_notes_text`.


  **Please provide the following deliverables:**


  1. A Python class implementing a `RulesEngine` that evaluates at least 5 adjudication
  rules covering the top denial categories, returning a decision of `APPROVE`, `DENY`,
  or `PEND_CLINICAL_REVIEW` with a reason code and confidence score.


  2. A feature engineering function that transforms the raw request fields into ML-ready
  features, including handling of the nested JSON fields and extracting at least 3
  features from `clinical_notes_text` using regex or NLP techniques.


  3. A recommended threshold strategy for the auto-approval confidence score, given
  that false approvals (incorrectly approving a case that should be denied) carry
  3x the business risk of false denials (incorrectly denying an approvable case).


  4. A brief analysis of why pain management specialists have disproportionately high
  denial rates and two actionable interventions to reduce preventable denials in that
  specialty.'
target_skills:
- pa-decision-automation
