id: imaging-study-design-15
prompt: 'Here is test question #15 of 30:


  ---


  You are designing a multi-site diffusion MRI study to identify white matter microstructural
  biomarkers of early cognitive decline in 340 older adults (ages 65–80) across four
  imaging centers. Each site uses a different scanner: Site A (Siemens Prisma, 3T,
  64 directions, b=1000/2000 s/mm²), Site B (GE Discovery MR750, 3T, 32 directions,
  b=1000 s/mm²), Site C (Philips Ingenia, 3T, 64 directions, b=1000 s/mm²), and Site
  D (Siemens Skyra, 3T, 48 directions, b=1000/2000 s/mm²). The primary outcome is
  fractional anisotropy (FA) in the cingulum bundle, and secondary outcomes include
  mean diffusivity (MD) and tract-based spatial statistics (TBSS) across the full
  white matter skeleton. Approximately 85 subjects per site will be enrolled, with
  40 test-retest subjects scanned twice at Site A within two weeks.


  Please provide:


  1. A preprocessing pipeline specifying eddy current correction, motion handling,
  and skull stripping steps appropriate for harmonizing data across these four acquisition
  protocols.

  2. A scanner harmonization strategy — specifically whether ComBat, longitudinal
  ComBat, or an alternative method is most appropriate given the unequal gradient
  directions across sites, and justify your choice.

  3. A plan for assessing test-retest reliability of FA in the cingulum bundle using
  the Site A repeat data, including which statistical metrics to report (ICC, CoV,
  MDC) and acceptable thresholds.

  4. A registration strategy specifying whether TBSS analysis should be performed
  in MNI space or native space, and how to handle the b-value mismatch between sites
  when computing a common FA skeleton.'
