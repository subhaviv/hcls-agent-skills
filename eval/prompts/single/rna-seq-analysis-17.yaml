id: rna-seq-analysis-17
prompt: 'You are analyzing a bulk RNA-seq dataset comparing tumor vs. normal tissue
  samples from 8 patients (4 tumor, 4 normal). You ran Salmon (v1.9.0) with `--validateMappings`
  and `--gcBias` flags on reads aligned to the GRCh38 transcriptome, then imported
  results into R using tximport with `type="salmon"`. When you run DESeq2, you notice
  that well-known tumor suppressor genes (TP53, BRCA1, RB1) show suspiciously low
  fold changes (|log2FC| < 0.3, padj > 0.8), while a random set of unannotated loci
  appear as top hits. Your size factors from `estimateSizeFactors()` range from 0.3
  to 4.7 across samples, suggesting substantial composition bias.


  **Please provide the following:**


  1. **Diagnostic code** in R to visualize the size factor problem, including a PCA
  plot colored by size factor magnitude and a boxplot of normalized counts per sample
  using `ggplot2`.


  2. **A step-by-step explanation** of why extreme size factors (range 0.3–4.7) can
  suppress true DE signal for known tumor suppressors while inflating noise from low-count
  loci.


  3. **Two alternative normalization strategies** to address this composition bias
  — specifically comparing DESeq2''s default median-of-ratios against using `type="poscounts"`
  with spike-in controls (assume you have ERCC spike-ins at 1 fmol concentration per
  sample). Include code showing how to incorporate ERCC spike-ins into the DESeq2
  normalization workflow.


  4. **A recommendation** on whether to re-run quantification using STAR+featureCounts
  instead of Salmon given this normalization issue, with justification.'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: intermediate
