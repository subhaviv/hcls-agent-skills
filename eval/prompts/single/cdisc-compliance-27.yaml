id: cdisc-compliance-27
prompt: 'A Phase III oncology trial (STUDY-4821) is preparing an FDA submission with
  SDTM datasets. The trial collected tumor assessment data including target lesion
  measurements, non-target lesion responses, and overall tumor response per RECIST
  1.1 criteria. The programming team has created a Tumor Results (TR) domain and an
  Overall Response (RS) domain, but is uncertain about several implementation decisions.


  Specific issues requiring resolution:


  1. **TR domain**: Tumor measurements include 47 unique lesion locations stored in
  TRLOC. Some lesions were identified post-baseline that were not present at screening.
  The variable TRORRES contains values like "TOO SMALL TO MEASURE" and "ABSENT" alongside
  numeric millimeter values in TRSTRESN.


  2. **RS domain**: The dataset contains both investigator-assessed and independent
  review committee (IRC) responses. The team used RSEVAL to distinguish assessors
  but is unsure whether IRC assessments require a separate SUPPRS or can be handled
  within the main RS domain.


  3. **RELREC**: The relationship between TR measurements and their corresponding
  RS overall response records needs to be documented, but the team is unsure which
  RELTYPE value to use and how to structure the dataset.


  4. **Controlled Terminology**: CDISC CT version 2023-09-29 is being used, but TRLOC
  values include sponsor-defined terms not in the NCI codelist C132262.


  Please provide: (a) guidance on handling mixed character/numeric TRORRES values
  in TR, (b) the correct approach for IRC vs. investigator assessments in RS including
  any SUPP domain decisions, (c) a complete example RELREC structure linking TR to
  RS records, and (d) how to properly document sponsor-defined TRLOC terms in define.xml
  value-level metadata.'
target_skills:
- cdisc-compliance
domain: clinical-data-review
difficulty: intermediate
