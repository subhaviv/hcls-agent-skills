id: variant-calling-27
prompt: 'You are setting up a somatic variant calling pipeline for a pan-cancer study
  at Meridian Oncology Institute. You have 45 tumor samples from colorectal cancer
  patients, each with a matched normal. Sequencing was performed on an Illumina NovaSeq
  6000 with 100x tumor coverage and 50x normal coverage using 150bp paired-end reads.
  Your reference genome is GRCh38 with dbSNP 138 and a custom panel of normals (PoN)
  built from 40 unrelated healthy individuals sequenced on the same platform.


  Your bioinformatics lead has flagged two specific concerns:

  1. Several samples show evidence of FFPE artifact (C>T transitions at non-CpG sites),
  with OxoG contamination scores between 0.02–0.08 as reported by GetPileupSummaries

  2. Three tumor samples have estimated tumor purity below 25% (range: 18–24%) as
  determined by PURPLE


  Provide the following deliverables:

  1. A complete Mutect2 command for a single tumor-normal pair that appropriately
  addresses FFPE artifact and low tumor purity concerns, including all relevant flags
  and filter arguments

  2. The FilterMutectCalls command with parameters tuned for low-purity samples, explaining
  each non-default parameter you set

  3. A brief strategy (3–5 sentences) for how you would handle the three low-purity
  samples differently from the rest of the cohort during variant filtering and interpretation

  4. Identify which GATK tool should be run to specifically mitigate FFPE-associated
  C>T artifacts and provide its command'
target_skills:
- variant-calling
domain: genomics
difficulty: intermediate
