id: hedis-measure-specification-02
prompt: 'A regional health plan has provided the following member data for the **Controlling
  High Blood Pressure (CBP)** HEDIS measure for the current measurement year (January
  1 – December 31, 2024):


  - **Total attributed members aged 18–85 with hypertension diagnosis**: 4,200

  - **Members with a gap in enrollment >45 days**: 310

  - **Members with ESRD diagnosis**: 87

  - **Members with pregnancy during measurement year**: 43

  - **Members who turned 85 during the measurement year**: 29

  - **Members with a recorded BP reading <140/90 at any visit**: 1,890

  - **Members with BP reading only in a telehealth visit**: 215

  - **Members with no BP reading on file**: 820


  Using standard NCQA HEDIS 2024 measure specifications for CBP, please provide the
  following deliverables:


  1. **Calculate the final eligible denominator** after applying all appropriate exclusions,
  showing each step with member counts removed at each stage.


  2. **Calculate the numerator** and the resulting **CBP rate (%)**, noting any assumptions
  made about the telehealth BP readings.


  3. **Identify which exclusion criteria are valid** under HEDIS 2024 CBP specifications
  and flag any categories above that do NOT qualify as valid exclusions.


  4. **Explain the continuous enrollment rule** for CBP, including the allowable gap
  definition and how the 310 members with enrollment gaps should be handled.


  5. **Provide two care gap closure recommendations** specifically targeting the 820
  members with no BP reading on file, considering potential SDOH barriers.'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: easy
