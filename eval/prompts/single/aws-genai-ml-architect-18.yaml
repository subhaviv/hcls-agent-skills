id: aws-genai-ml-architect-18
prompt: 'A regional cancer center is building a **somatic variant interpretation system**
  for their molecular tumor board. They sequence ~150 tumor/normal pairs per month
  using a custom 523-gene panel. The bioinformatics pipeline (running on AWS Batch)
  produces VCF files with called variants, which then need to be interpreted against
  clinical evidence from ClinVar, OncoKB, COSMIC, and internal case notes stored in
  an Amazon HealthLake FHIR R4 instance. The system must support oncologists querying
  in natural language (e.g., "What tier-1 evidence exists for KRAS G12C in pancreatic
  adenocarcinoma with prior FOLFIRINOX?") and return structured AMP/ASCO/CAP variant
  classification tiers with supporting citations.


  **Constraints:**

  - PHI is present in case notes and must never leave the VPC

  - Oncologists need sub-10-second response times for interactive queries

  - The center has a BAA with AWS but not with any third-party LLM providers

  - They want to fine-tune on 3,200 historical tumor board reports (avg 4,200 tokens
  each)

  - FDA SaMD classification is anticipated (Class II), requiring audit trails and
  model versioning

  - Monthly budget cap: $18,000 for the entire inference + storage stack


  **Deliverables requested:**

  1. End-to-end AWS architecture diagram description (components and data flow)

  2. Recommendation on whether to use Bedrock (with which model) vs. SageMaker for
  both fine-tuning and inference, with justification

  3. A RAG indexing strategy for the four evidence databases plus HealthLake, including
  chunking and metadata filtering approach

  4. SageMaker MLOps pipeline design satisfying FDA SaMD audit requirements

  5. Cost breakdown estimating whether $18,000/month is achievable'
target_skills:
- aws-genai-ml-architect
domain: cross-domain
difficulty: hard
