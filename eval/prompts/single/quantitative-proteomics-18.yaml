id: quantitative-proteomics-18
prompt: 'You are analyzing a TMT-16plex experiment comparing tumor vs. adjacent normal
  tissue from 8 colorectal cancer patients (16 samples, one patient per channel).
  After running the raw data through Proteome Discoverer, you obtain a proteinGroups-style
  output with 6,847 proteins. Upon inspection, you notice the following issues:


  1. **Ratio compression**: The tumor/normal log2 fold-changes appear severely compressed
  (most fall between -0.8 and +0.8), even for known oncoproteins like MYC and KRAS
  effectors.

  2. **Missing values**: 23% of protein-channel combinations are missing. When you
  plot the missing value pattern, proteins missing in tumor samples tend to have lower
  mean reporter intensities than those missing in normal samples, suggesting the missingness
  is not random.

  3. **Normalization concern**: Raw reporter ion intensities show a systematic ~2.3-fold
  higher signal in channels 9–16 (normal tissue) compared to channels 1–8 (tumor),
  likely due to differential protein loading.


  Given these three problems, provide:

  - A mechanistic explanation of why ratio compression occurs in TMT experiments and
  two concrete experimental or computational strategies to mitigate it (specify parameters
  where applicable)

  - A recommended imputation strategy for the missing values, justifying your choice
  based on the missingness mechanism described, and include R code using the `imputeLCMD`
  package implementing your chosen method

  - A normalization approach that accounts for the loading bias, with R code using
  either `limma` or `preprocessCore` to implement it on a matrix called `tmt_matrix`
  (rows = proteins, columns = samples)

  - A final differential expression analysis strategy using `limma` with appropriate
  contrasts for the paired patient design'
target_skills:
- quantitative-proteomics
domain: proteomics
difficulty: hard
