id: radiology-preprocessing-22
prompt: 'You are setting up a standard T1-weighted MRI preprocessing pipeline for
  a neuroimaging study involving 45 healthy adult volunteers (ages 25-60, 28 female).
  All scans were acquired on a 3T Siemens Prisma scanner with a 1mm isotropic resolution
  (256×256×176 matrix, TR=2300ms, TE=2.98ms). Several scans show visible intensity
  inhomogeneity artifacts due to RF coil variability, and the dataset includes subjects
  scanned in both HFS (head-first supine) and FFS (feet-first supine) orientations.


  Your goal is to prepare all T1w images for group-level voxel-based morphometry (VBM)
  analysis in MNI152 standard space.


  Please provide the following:


  1. **A complete ordered preprocessing pipeline** listing each step with justification
  for the sequence (e.g., why bias correction precedes skull stripping, or vice versa).


  2. **A bash script** using FSL tools (including `fslreorient2std`, `bet`, and `flirt`/`fnirt`)
  that processes a single subject''s T1w image through orientation correction, bias
  field correction using FSL''s `fast` or ANTs N4BiasFieldCorrection, skull stripping,
  and nonlinear registration to MNI152 1mm space.


  3. **Recommended BET fractional intensity threshold** for this population and acquisition,
  with a brief explanation of how you would validate skull stripping quality across
  all 45 subjects efficiently.


  4. **One common failure mode** specific to this mixed-orientation dataset and how
  your script handles it.'
target_skills:
- radiology-preprocessing
domain: imaging
difficulty: easy
