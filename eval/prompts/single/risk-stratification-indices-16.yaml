id: risk-stratification-indices-16
prompt: 'A regional health system is preparing to launch a 30-day readmission reduction
  program targeting Medicare patients discharged from three hospitals (combined n=4,200
  annual discharges). The care management team has collected the following data elements
  at discharge: length of stay, acuity of admission (emergent vs. elective), Charlson
  Comorbidity Index scores, LACE scores, ICD-10 Z-codes for social determinants of
  health (food insecurity Z59.4, housing instability Z59.0, transportation barriers
  Z59.8), and Area Deprivation Index (ADI) national percentile rankings for each patient''s
  home address.


  Initial analysis shows the LACE score alone achieves a C-statistic of 0.68 for predicting
  30-day readmission in this population. The team wants to improve predictive performance
  and ensure the model doesn''t inadvertently perpetuate health equity disparities
  by under-identifying high-risk patients in socially vulnerable groups.


  Please provide:

  1. A conceptual framework explaining how LACE, Charlson, Z-codes, and ADI interact
  as complementary vs. redundant risk signals, and which combinations are most likely
  to improve discrimination

  2. A recommended composite scoring approach that integrates at least two of these
  indices, with explicit weighting rationale

  3. A sample Python function (pseudocode-level acceptable) that takes patient-level
  inputs for LACE score, Charlson score, Z-code count, and ADI percentile and returns
  a composite risk tier (low/medium/high)

  4. Two specific equity considerations the team should address when validating this
  composite model across racial/ethnic subgroups'
target_skills:
