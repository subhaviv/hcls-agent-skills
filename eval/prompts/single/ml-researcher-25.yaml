id: ml-researcher-25
prompt: 'A pharmaceutical research team has developed a graph neural network (GNN)
  to predict drug-induced liver injury (DILI) risk from molecular structures. Their
  dataset contains 4,847 compounds: 892 DILI-positive (confirmed hepatotoxic), 3,955
  DILI-negative, sourced from the DILIrank database supplemented with 1,200 proprietary
  compounds tested internally. The team used a random 80/10/10 train/validation/test
  split and reports AUROC = 0.89 on the test set, claiming the model is ready for
  use in preclinical candidate triage.


  You suspect there are methodological problems that would make this performance estimate
  overly optimistic. Please provide:


  1. **Data splitting critique**: Explain why random splitting is inappropriate for
  molecular GNNs and describe the scaffold split methodology (Bemis-Murcko framework)
  as the correct alternative. Quantify how much AUROC inflation random vs. scaffold
  splits typically cause in published literature.


  2. **Class imbalance handling**: Given the ~1:4.4 positive-to-negative ratio, recommend
  two concrete strategies (one at the data level, one at the loss function level)
  with specific hyperparameter guidance. Explain why AUROC alone is misleading here
  and specify which additional metric(s) should be reported.


  3. **Leakage audit**: The proprietary 1,200 compounds overlap with the public DILIrank
  entries in 73 cases (same InChIKey). Describe the exact steps to identify and resolve
  this overlap before any splitting occurs.


  4. **Calibration assessment**: Provide Python pseudocode (using scikit-learn or
  similar) to generate a reliability diagram and compute Expected Calibration Error
  (ECE) for this binary classification task, and interpret what poor calibration would
  mean for downstream triage decisions.'
target_skills:
- ml-researcher
domain: cross-domain
difficulty: intermediate
