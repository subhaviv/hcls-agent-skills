id: hedis-measure-specification-24
prompt: 'A regional health plan is preparing for its HEDIS measurement year and needs
  to evaluate its Controlling High Blood Pressure (CBP) measure performance. The plan
  has identified the following patient cohort data:


  - Total attributed members aged 18-85 with a hypertension diagnosis: 12,400

  - Members with a hypertension diagnosis only in an inpatient setting: 890

  - Members with ESRD documented in claims: 340

  - Members with a pregnancy diagnosis during the measurement year: 215

  - Members who had two outpatient visits with a BP reading ≥140/90: 4,200

  - Members with only one outpatient BP reading documented: 2,100

  - Members with a BP reading <140/90 at their most recent visit: 5,800


  Using the HEDIS CBP measure specification (MY2024), please provide:


  1. A step-by-step calculation of the valid denominator, identifying which populations
  must be excluded and why, with final denominator count

  2. An explanation of how the numerator is defined for CBP — specifically addressing
  what qualifies as a "controlled" blood pressure reading and which visit types are
  acceptable for numerator compliance

  3. Identification of any data quality concerns in the figures above that could affect
  NCQA-compliant rate reporting

  4. A prioritization recommendation for care gap outreach among the non-compliant
  members, considering that this measure is a triple-weighted Star Rating measure

  5. Two specific documentation improvement strategies that could help capture numerator-eligible
  readings that may currently be missed in claims or encounter data'
target_skills:
- hedis-measure-specification
domain: unknown
difficulty: intermediate
