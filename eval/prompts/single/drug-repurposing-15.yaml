id: drug-repurposing-15
prompt: 'A rare pediatric neurological disorder called **Synaptopathic Encephalopathy
  Type-3 (SET-3)** affects approximately 1,200 patients in the US annually. Whole-exome
  sequencing of 89 SET-3 patients revealed loss-of-function mutations in **SHANK3**
  (42%), **NRXN1** (31%), and **DLGAP1** (27%), all encoding postsynaptic density
  proteins. Current standard of care is purely symptomatic.


  Your team has pulled the following candidate drugs from DGIdb and OpenTargets queries:


  | Drug | Primary Indication | Known Targets | Evidence Score (OpenTargets) |

  |------|-------------------|---------------|------------------------------|

  | Risperidone | Schizophrenia | DRD2, HTR2A, SHANK3 (indirect) | 0.61 |

  | Lithium Carbonate | Bipolar disorder | GSK3B, INPP1 | 0.44 |

  | D-Cycloserine | Tuberculosis/PTSD | GRIN1, GRIN2B | 0.38 |

  | Tideglusib | Alzheimer''s (failed Ph2) | GSK3B, MAPT | 0.52 |

  | Arbaclofen | Fragile X (failed Ph3) | GABBR1, GABBR2 | 0.47 |


  **Deliverables requested:**


  1. Rank these five candidates by repurposing evidence strength, incorporating both
  target-based MoA overlap with SET-3 pathophysiology and phenotype-based considerations,
  with explicit scoring rationale

  2. Identify which candidate has the strongest translational pathway and explain
  the key regulatory/clinical trial design considerations for pediatric CNS repurposing

  3. Write a Python script using the DGIdb REST API to programmatically retrieve all
  drug-gene interactions for **SHANK3**, **NRXN1**, and **DLGAP1**, filtering for
  FDA-approved drugs only, and output results as a ranked DataFrame

  4. Flag any candidates where prior clinical failure should significantly discount
  the repurposing rationale, with mechanistic explanation'
target_skills:
- drug-repurposing
domain: drug-discovery
difficulty: intermediate
