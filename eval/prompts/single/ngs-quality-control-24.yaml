id: ngs-quality-control-24
prompt: 'You are processing a whole-exome sequencing dataset for a cohort of 48 cancer
  patients. After running FastQC on the raw FASTQs, you observe the following patterns
  across most samples: (1) per-base sequence quality drops below Q20 after position
  130 on R2 reads (150 bp reads), (2) adapter content spikes starting at position
  140, and (3) a GC content distribution with a secondary peak at 72% GC. The samples
  were prepared using the Agilent SureSelect Human All Exon V7 kit.


  Using the standard environment (`THREADS=8`, `OUT=qc_out`, paired FASTQs `sample_R1.fastq.gz`/`sample_R2.fastq.gz`,
  coordinate-sorted `sample.bam`, reference `ref.fasta`, and target BED file `targets.bed`),
  provide the following deliverables:


  1. A `fastp` command that addresses the observed quality tail and adapter issues,
  applying appropriate quality trimming, a minimum read length filter of 50 bp, and
  enabling per-sample JSON/HTML reports.


  2. A `mosdepth` command to compute per-target coverage statistics restricted to
  the exome capture regions, generating quantized output with thresholds at 10×, 20×,
  and 50× depth.


  3. A shell snippet that parses the mosdepth `summary.txt` output to flag any sample
  where mean target coverage falls below 50× or where the fraction of bases covered
  at ≥20× is below 80%, printing a warning line with the sample name and the offending
  metric.


  4. A brief explanation (3–5 sentences) of what the secondary GC peak at 72% likely
  represents in a cancer WES context and whether it warrants additional QC filtering
  steps before variant calling.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: intermediate
