id: risk-stratification-indices-23
prompt: 'A community health organization is conducting a population health management
  program for 8,400 Medicare Advantage members. Their data team has extracted the
  following aggregate statistics from the past 12 months:


  - 1,200 members had at least one inpatient admission

  - Average length of stay across admitted members: 4.2 days

  - 340 members had an ED visit in the 6 months prior to their index admission

  - 890 members have 3 or more chronic conditions documented in claims

  - Comorbidity breakdown: diabetes (31%), CHF (18%), COPD (14%), CKD stage 3-4 (9%),
  dementia (7%)


  The organization wants to implement the **Charlson Comorbidity Index (CCI)** to
  prioritize care management outreach for high-risk members but has limited familiarity
  with how CCI weights are assigned.


  Please provide the following:


  1. **A brief explanation** of how the Charlson Comorbidity Index works, including
  how individual conditions are weighted (use the conditions listed above as examples
  with their correct CCI weights).


  2. **A simple scoring example** for a fictional patient — "Mr. Rivera," a 72-year-old
  with CHF, CKD stage 4, and diabetes — showing his total CCI score and what risk
  tier that places him in.


  3. **A practical recommendation** on what CCI score threshold the organization should
  use to flag members for high-intensity care management, and why.


  4. **One key limitation** of using CCI alone for this Medicare Advantage population
  and a suggestion for one complementary index or data source to address that limitation.'
target_skills:
- risk-stratification-indices
