id: dicom-processing-12
prompt: 'Here is test question #12 of 30:


  ---


  You are a research data engineer at a neuroimaging center. You have just received
  a folder called `/data/raw/subject_001/` containing 176 DICOM files from a 3T MRI
  scanner representing a single T1-weighted MPRAGE acquisition. The files follow the
  naming pattern `IM-0001-0001.dcm` through `IM-0001-0176.dcm`. You need to convert
  this DICOM series to NIfTI format for use in an FSL-based preprocessing pipeline.


  Your conversion requirements are as follows:

  - Output should be a single 3D NIfTI file (not 4D)

  - The output filename should be `sub-001_T1w`

  - Output directory should be `/data/nifti/subject_001/`

  - You want the accompanying JSON sidecar file generated automatically (for BIDS
  compatibility)

  - Crop the neck region using dcm2niix''s built-in option

  - Compress the output as `.nii.gz`


  Please provide:

  1. The exact `dcm2niix` command with all appropriate flags to satisfy the above
  requirements, with a brief explanation of each flag used

  2. A short Python script using `subprocess` to programmatically run this conversion,
  check the return code, and print a success or failure message

  3. A description of what information you would expect to find in the generated JSON
  sidecar file (list at least 5 specific fields and their typical values for a T1w
  MPRAGE scan)

  4. One common issue that can cause dcm2niix to produce multiple output files instead
  of one, and how to diagnose it'
target_skills:
- dicom-processing
domain: imaging
difficulty: easy
