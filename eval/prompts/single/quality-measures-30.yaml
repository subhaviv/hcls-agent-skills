id: quality-measures-30
prompt: 'A regional health plan with 85,000 commercial members needs to calculate
  the HEDIS Controlling High Blood Pressure (CBP) measure for the current measurement
  year. Your data team has identified several edge cases that require resolution before
  finalizing rates.


  **Specific challenges:**


  1. **Continuous enrollment complexity**: 847 members have a single gap in coverage
  between 45-90 days during the measurement year. An additional 312 members switched
  from HMO to PPO product lines mid-year within the same plan. Clarify how each group
  should be handled under NCQA continuous enrollment rules.


  2. **Denominator exclusion conflicts**: 203 members have both an ESRD diagnosis
  (N18.6) and a hypertension diagnosis. Additionally, 156 members have a pregnancy
  diagnosis in Q1 but delivered in Q2 and have subsequent blood pressure readings
  in Q3-Q4. Determine denominator eligibility for each group.


  3. **Numerator logic ambiguity**: 94 members have their most recent BP reading documented
  as 139/91 — one point above the threshold. Another 78 members have readings split
  across telehealth visits (systolic from Visit A) and in-person visits (diastolic
  from Visit B) on different dates. Determine numerator compliance for each scenario.


  4. **Rate calculation**: Given a final denominator of 12,450 members and numerator
  of 7,834 members, calculate the measure rate and determine what the minimum numerator
  addition would be needed to move from the 50th to the 75th NCQA national percentile
  benchmark (50th = 63.2%, 75th = 71.8%).


  **Deliverables requested:**

  - Written eligibility determinations for each edge case with NCQA citations

  - SQL query implementing the full CBP denominator and numerator logic

  - Rate calculation with percentile gap analysis'
target_skills:
- quality-measures
