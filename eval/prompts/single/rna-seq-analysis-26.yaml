id: rna-seq-analysis-26
prompt: 'You are analyzing a bulk RNA-seq dataset comparing tumor vs. normal tissue
  samples from 8 patients (4 tumor, 4 normal). You ran Salmon (v1.9.0) with `--validateMappings`
  and `--gcBias` flags, achieving an average mapping rate of 78% across samples. You
  then used tximport to import the quant.sf files into R, but when you run DESeq2,
  you notice that only 312 genes are called differentially expressed at padj < 0.05
  — far fewer than the ~2,000 genes you expected based on a pilot study with similar
  samples.


  Upon inspection, you find the following suspicious patterns:

  - Two tumor samples (T2 and T4) have median transcript-level TPM values roughly
  3× lower than the other samples

  - The size factors estimated by DESeq2 for T2 and T4 are 0.31 and 0.28, respectively
  (vs. ~0.9–1.1 for others)

  - A PCA plot shows T2 and T4 clustering separately from all other samples along
  PC1 (explaining 44% of variance)


  Please provide:

  1. A ranked list of at least four specific technical causes that could explain the
  anomalous behavior of T2 and T4, with a brief justification for each

  2. R code using tximport and DESeq2 to assess whether removing T2 and T4 changes
  the number of DE genes, using `lfcShrink` with the `apeglm` method and a threshold
  of |log2FC| > 1

  3. A recommendation on whether to exclude these samples or apply an alternative
  correction strategy, with statistical justification

  4. One quality-control metric (with the specific R function to compute it) you would
  check in the original Salmon output files before making a final decision'
target_skills:
- rna-seq-analysis
domain: genomics
difficulty: intermediate
