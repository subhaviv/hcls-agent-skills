id: protein-structure-analysis-22
prompt: 'You have downloaded the crystal structure of a fictional kinase **KIN7B**
  (PDB ID: 7KNB) and need to assess its structural quality before using it in a virtual
  screening campaign. The structure was solved at 2.1 Å resolution and contains a
  single chain (Chain A) with 312 residues. Upon initial inspection, you notice the
  B-factor values range from 8.2 to 94.7 Å², and you suspect some loop regions may
  have poor backbone geometry.


  **Your tasks:**


  1. **Write a Python script using Biopython** that parses the PDB file, extracts
  all phi/psi dihedral angles for Chain A, and prints a table of residues where phi
  falls outside the range [−180°, −40°] AND psi falls outside [−180°, 180°] (i.e.,
  flag potentially problematic residues with unusual backbone conformations).


  2. **Write a second Python snippet** that computes the per-residue mean B-factor
  for all Cα atoms in Chain A and identifies residues with B-factors greater than
  **2 standard deviations above the mean** — these represent highly flexible or disordered
  regions.


  3. **Interpret the results**: If residues 145–158 are flagged by both analyses (poor
  dihedrals AND high B-factors), what does this suggest about the structural reliability
  of this region, and how should this influence your binding pocket detection strategy
  using fpocket or a similar tool?


  4. **Recommend three specific preprocessing steps** you would take before converting
  this structure to PDBQT format for AutoDock Vina, given the concerns identified
  above.


  Provide complete, runnable code for parts 1 and 2, and clear written responses for
  parts 3 and 4.'
target_skills:
- protein-structure-analysis
