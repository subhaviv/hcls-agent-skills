id: molecular-docking-21
prompt: 'You are setting up a molecular docking campaign to identify inhibitors of
  the fictional kinase **DYRK7** (PDB ID: 7XKP, resolution: 2.1 Å). Before running
  virtual screening against a 500-compound library, you want to validate your docking
  protocol using the co-crystallized ligand **compound LRK-042** extracted from the
  crystal structure.


  Your current setup uses **AutoDock Vina 1.2.3** with the following grid box parameters
  centered on the known binding site:

  - Center: x = 14.5, y = −3.2, z = 28.7

  - Box dimensions: 20 × 20 × 20 Å

  - Exhaustiveness: 8


  After running redocking, you obtain a **best-pose RMSD of 3.8 Å** compared to the
  crystallographic pose, which fails the standard validation threshold.


  Please provide the following:


  1. **Diagnosis**: List at least three specific reasons why the redocking RMSD of
  3.8 Å likely exceeds the acceptable threshold of 2.0 Å, given the parameters above.


  2. **Parameter corrections**: Provide revised AutoDock Vina configuration values
  (exhaustiveness, box size, num_modes) that would improve pose reproduction, with
  brief justification for each change.


  3. **Ligand preparation check**: Write a complete `meeko` command-line workflow
  (using `mk_prepare_ligand.py`) to properly prepare LRK-042 from a MOL2 file, including
  any flags relevant for a flexible ligand with 5 rotatable bonds.


  4. **Pass/fail criterion**: State the RMSD threshold you would use to confirm the
  protocol is validated and explain why this value is standard in the field.'
target_skills:
- molecular-docking
domain: protein-structure
difficulty: easy
