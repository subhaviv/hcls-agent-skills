id: risk-stratification-indices-13
prompt: 'A community hospital''s care management team is reviewing 30-day readmission
  risk for a cohort of 847 recently discharged patients. The team has collected the
  following aggregate data for LACE score calculation:


  - **L (Length of stay):** 312 patients stayed 1 day, 289 stayed 2–3 days, 156 stayed
  4–6 days, 90 stayed 7+ days

  - **A (Acuity):** 401 patients admitted via emergency department

  - **C (Comorbidities):** Charlson Comorbidity Index scores available for all patients
  (mean CCI = 3.2, range 0–11)

  - **E (ED visits):** 178 patients had 1 prior ED visit in past 6 months; 94 patients
  had 2+ prior ED visits


  The team wants to identify high-risk patients (LACE ≥ 10) for targeted intervention
  but is unsure how to translate the raw Charlson scores into LACE "C" component points.


  Please provide:

  1. A clear explanation of how Charlson Comorbidity Index scores map to the LACE
  "C" component (comorbidity points), including the specific scoring thresholds

  2. An estimated distribution of LACE scores across this cohort based on the data
  provided, identifying what percentage likely falls into high-risk (≥10), moderate-risk
  (5–9), and low-risk (<5) categories

  3. A brief recommendation on whether LACE alone is sufficient for this population
  or whether supplementing with Elixhauser Index or SDOH factors would improve stratification
  accuracy

  4. A simple Python code snippet that takes a patient''s individual L, A, C (CCI
  score), and E values as inputs and returns their calculated LACE score'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: easy
