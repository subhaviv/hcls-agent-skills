id: cheminformatics-28
prompt: 'You are building a virtual screening pipeline for a kinase inhibitor program.
  Your compound library contains 50,000 molecules in SMILES format, and you need to
  triage them before expensive docking calculations. You have identified a reference
  active compound with SMILES `Cc1ccc(NC(=O)c2ccc(CN3CCN(C)CC3)cc2)cc1Nc1nccc(-c2cnnc(NC3CCOCC3)n2)n1`
  (a fictional imatinib analog, compound A47).


  Your pipeline must address the following edge cases and conflicting constraints:


  1. **Lipinski vs. Veber conflict**: Compound A47 itself violates Lipinski''s rule
  (MW = 538, HBD = 3, HBA = 9, LogP = 3.2) but satisfies Veber rules (RotBonds = 7,
  TPSA = 112 Å²). Provide RDKit code that flags molecules violating **both** rule
  sets simultaneously while retaining borderline cases that fail only one, and explain
  your scientific rationale for this decision.


  2. **PAINS false-positive risk**: The library contains many acylhydrazone-containing
  compounds (known PAINS) that your medicinal chemist believes are genuinely active
  based on orthogonal assay data. Write code to detect PAINS hits but implement a
  secondary filter that exempts acylhydrazones if their Tanimoto similarity (Morgan
  fingerprint, radius=2, nBits=2048) to A47 exceeds 0.35.


  3. **MMP analysis**: Using mmpdb concepts (you may use pseudocode or actual mmpdb
  CLI commands), describe how you would identify matched molecular pairs between A47
  analogs in your filtered set where the variable fragment differs only in the central
  piperazine ring, and what property delta thresholds (ΔlogP, ΔTPSA) you would use
  to prioritize synthesis candidates.


  Provide complete, runnable RDKit Python code for deliverables 1 and 2, and detailed
  methodology for deliverable 3.'
target_skills:
- cheminformatics
domain: drug-discovery
difficulty: hard
