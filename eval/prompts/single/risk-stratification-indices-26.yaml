id: risk-stratification-indices-26
prompt: 'A regional health system is preparing to stratify its 42,000 Medicare Advantage
  members for a high-risk care management program. The analytics team has pulled the
  following aggregate data from the past 12 months:


  - 8,400 members have a Charlson Comorbidity Index (CCI) score ≥ 3

  - 3,200 members had at least one inpatient admission, with average LACE scores calculated
  post-discharge (mean LACE = 9.1, SD = 2.4)

  - 11,600 members have documented SDOH Z-codes (primarily Z59.0–Z59.5 housing instability
  and Z60.2 social isolation)

  - Area Deprivation Index (ADI) data shows 28% of members reside in census blocks
  ranked in the top quartile of deprivation (ADI national percentile ≥ 75)


  The care management program can only actively enroll 2,500 members due to staffing
  constraints. Leadership wants a defensible, evidence-based stratification methodology
  that combines clinical risk (CCI or LACE) with social determinants data.


  Please provide:

  1. A recommended composite stratification framework that weights clinical and SDOH
  factors, with explicit rationale for the weighting approach

  2. A tiered risk segmentation scheme (e.g., Tier 1/2/3) with estimated member counts
  per tier based on the data provided

  3. Sample Python pseudocode implementing the composite scoring logic

  4. An explanation of why using CCI alone (without SDOH factors) would likely introduce
  systematic bias in this population, citing specific demographic or utilization patterns'
target_skills:
- risk-stratification-indices
domain: unknown
difficulty: intermediate
