id: ngs-quality-control-25
prompt: 'You are setting up a WES quality control pipeline for a cancer genomics study
  involving 48 tumor-normal paired samples. After running FastQC on the raw FASTQs,
  you observe the following patterns across multiple samples:


  - Per-base sequence quality drops below Q20 after position 130 (reads are 150bp)

  - Adapter content flags are triggered starting at position 125

  - Several samples show GC content distributions with a secondary peak around 65%
  GC

  - Duplicate rates from an initial Picard MarkDuplicates run range from 28–41%


  Your target intervals file is `targets.bed` (covering ~38Mb, exome kit), and you
  need to ensure ≥50× mean coverage across targets with ≤5% of target bases below
  10×.


  **Deliverables:**


  1. Write a complete `fastp` command for adapter trimming that addresses the quality
  tail drop and adapter contamination, using appropriate parameters for the 150bp
  reads and enabling JSON/HTML reports compatible with MultiQC aggregation.


  2. Write a `mosdepth` command to assess per-target coverage using the trimmed+aligned
  BAM, then provide a one-liner using standard Unix tools to calculate the percentage
  of target bases with coverage below 10×, given that mosdepth outputs a `sample.thresholds.bed.gz`
  file with a column for bases ≥10×.


  3. Given the duplicate rate range (28–41%) and the secondary GC peak, explain two
  distinct biological or technical causes that could explain these findings in a tumor
  WES context, and recommend one additional Picard metric (specify the exact tool
  and key output metric) to distinguish between them.'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: intermediate
