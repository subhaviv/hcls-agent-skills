id: pa-decision-automation-25
prompt: 'A regional health plan processes approximately 4,200 prior authorization
  requests monthly across musculoskeletal procedures (CPT codes 27447, 27130, 22612)
  and has provided you with 18 months of historical PA decision data. The dataset
  includes 75,600 total requests with the following characteristics: 61% auto-approved,
  23% manually reviewed and approved, 16% denied. Denial reasons break down as: insufficient
  conservative therapy documentation (41%), medical necessity criteria not met (33%),
  missing imaging evidence (18%), and out-of-network provider (8%).


  Your team wants to build an ML-based PA decision automation pipeline with SHAP explainability
  for auditing purposes. The historical dataset contains these features per request:
  member age, diagnosis ICD-10 codes, requesting provider NPI, procedure CPT code,
  prior treatment history (binary flags for PT sessions, injections, medications),
  imaging results (ordinal severity score 0–4), comorbidity index, and days since
  symptom onset.


  Please provide the following deliverables:


  1. **Feature engineering recommendations**: Identify which raw features require
  transformation or interaction terms before model training, and explain why (e.g.,
  non-linear relationships, clinical domain reasoning).


  2. **Model selection rationale**: Compare at least two candidate classifiers (e.g.,
  gradient boosting vs. logistic regression) for this use case, considering interpretability
  requirements and class imbalance (16% denial rate).


  3. **Python code skeleton**: Write a scikit-learn pipeline that handles preprocessing,
  class imbalance via SMOTE, model training, and outputs per-prediction SHAP values
  using the `shap` library.


  4. **Denial pattern analysis**: Given the denial breakdown above, propose two rule-based
  pre-screening checks that could reduce denials by flagging incomplete submissions
  before they enter the ML pipeline.'
target_skills:
- pa-decision-automation
domain: healthcare-ops
difficulty: intermediate
