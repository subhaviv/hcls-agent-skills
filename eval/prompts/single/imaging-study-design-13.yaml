id: imaging-study-design-13
prompt: 'A single-site neuroimaging study is collecting resting-state fMRI data from
  45 healthy controls and 38 patients with mild cognitive impairment (MCI). Scans
  are acquired on a Siemens Prisma 3T scanner using the following protocol: TR = 2000
  ms, TE = 30 ms, flip angle = 90°, 3mm isotropic voxels, 200 volumes, multiband acceleration
  factor = 3. The study coordinator has provided raw DICOM files and wants to proceed
  with functional connectivity analysis.


  Before analysis can begin, the team needs a complete preprocessing pipeline. They
  are debating between using FSL FEAT, fMRIPrep, or a custom SPM-based pipeline. Additionally,
  they need to decide whether to perform their connectivity analysis in MNI standard
  space or native subject space, and how to handle common confounds.


  Please provide:


  1. A recommended preprocessing pipeline with justification for the software choice,
  listing each step in order (slice timing correction, motion correction, spatial
  smoothing kernel size, temporal filtering parameters, etc.) with specific parameter
  recommendations for this protocol.


  2. A clear recommendation on whether to use MNI space or native space for the functional
  connectivity analysis, explaining the trade-offs for a case-control study of this
  size.


  3. A confound removal strategy specifying which nuisance regressors to include (e.g.,
  motion parameters, WM/CSF signals, global signal regression — yes or no with rationale),
  with a brief explanation of why global signal regression is particularly controversial
  in MCI research.


  4. A minimum recommended framewise displacement (FD) threshold for scrubbing, and
  an estimate of how many subjects might need to be excluded if the MCI group shows
  elevated head motion.'
