id: ngs-quality-control-28
prompt: 'You are processing a whole-exome sequencing cohort of 45 tumor-normal pairs
  for a somatic variant calling pipeline. After running FastQC on all samples, you
  observe the following patterns across the tumor samples specifically: (1) per-base
  sequence quality drops below Q20 starting at cycle 85 of 150bp reads, (2) a prominent
  overrepresented sequence `AGATCGGAAGAGC` appearing in 12–18% of reads, (3) a bimodal
  insert size distribution with peaks at ~150bp and ~380bp visible in Picard CollectInsertSizeMetrics
  output, and (4) mosdepth reports median target coverage of 87× but with 23% of target
  bases below 20× coverage.


  Using the standard file conventions (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`,
  `sample.bam`, `THREADS=8`, `OUT=qc_out`), provide:


  1. A complete `fastp` command that addresses findings (1) and (2) simultaneously,
  with explicit justification for each parameter chosen, including why you would or
  would not use `--detect_adapter_for_pe` given the identified adapter sequence.


  2. A `mosdepth` command with appropriate thresholds to quantify the fraction of
  target bases at 20×, 50×, and 100× simultaneously, using a BED file `targets.bed`.


  3. An interpretation of the bimodal insert size distribution — list at least three
  distinct biological or technical explanations specific to tumor WES data, and describe
  which downstream somatic callers (e.g., Mutect2, Strelka2) would be most affected
  and why.


  4. A MultiQC configuration snippet (`multiqc_config.yaml`) that flags samples failing
  Q20 < 85% or median coverage < 50× as "warn" and < 70% or < 30× as "fail".'
target_skills:
- ngs-quality-control
domain: genomics
difficulty: hard
