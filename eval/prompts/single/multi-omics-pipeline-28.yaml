id: multi-omics-pipeline-28
prompt: 'You are integrating multi-omics data from a pancreatic ductal adenocarcinoma
  (PDAC) cohort: 847 tumor samples with RNA-seq (STAR-aligned, GENCODE v38 Ensembl
  IDs), RPPA protein abundance (118 antibodies mapped to gene symbols using inconsistent
  HGNC aliases, e.g., "p-AKT-Ser473", "AKT1_pS473", "pAKT"), and whole-exome somatic
  mutation calls (MAF format with HGNC symbols). Batch effects exist across 4 sequencing
  centers (n=210, 198, 224, 215 samples respectively), and the RNA-seq and RPPA batches
  are **not fully concordant** — 87 samples were processed for RNA-seq and RPPA in
  different center combinations.


  Your tasks:


  1. **ID harmonization**: Write R code using `biomaRt` to map all RNA-seq Ensembl
  gene IDs (including versioned IDs like `ENSG00000141510.18`) to HGNC symbols and
  UniProt accessions, handling 1-to-many mappings and deprecated IDs. For the RPPA
  layer, provide a regex-based parsing strategy to normalize the phosphoprotein aliases
  to canonical HGNC symbols.


  2. **Batch correction**: Given the non-concordant batch structure, explain why standard
  ComBat applied independently per omic layer is insufficient. Provide `ComBat_seq`
  R code for the RNA-seq counts with the cross-center design matrix, and describe
  how you would handle the RPPA continuous data using a different approach.


  3. **MOFA2 integration**: After harmonization and correction, write R code to train
  a MOFA2 model across all three omics layers (RNA, protein, mutation) with appropriate
  likelihoods per layer, specifying how to handle the sparse binary mutation matrix
  and setting `num_factors=15`, `convergence_mode="slow"`.


  4. Describe two failure modes specific to this non-concordant batch design that
  could invalidate MOFA2 factor interpretation.'
