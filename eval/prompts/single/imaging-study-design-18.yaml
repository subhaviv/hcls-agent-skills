id: imaging-study-design-18
prompt: 'Here is test question #18 of 30:


  ---


  You are designing a multi-site longitudinal diffusion MRI study to track white matter
  microstructure changes in early Alzheimer''s disease (AD) over 24 months. The study
  enrolls 180 participants (90 amyloid-PET-positive MCI patients, 90 age-matched controls)
  across four sites using three different scanner vendors: Siemens Prisma (sites 1–2),
  GE Discovery MR750 (site 3), and Philips Ingenia (site 4). All scanners are 3T.
  The diffusion protocol uses 64 directions at b=1000 s/mm², plus b=0 volumes, but
  the number of b=0 volumes differs across sites (site 1: 1, sites 2–4: 5). The primary
  biomarker of interest is fractional anisotropy (FA) in the cingulum bundle, extracted
  via TBSS.


  You discover during QC that: (a) sites 3 and 4 show systematically 8–12% lower FA
  in the corpus callosum compared to sites 1–2 even in healthy controls; (b) approximately
  15% of scans have motion artifact (mean framewise displacement >1.5 mm); and (c)
  the DICOM headers from site 2 have burned-in PHI in the diffusion-weighted magnitude
  images.


  Provide the following deliverables:

  1. A root-cause analysis of the FA discrepancy across vendors and a harmonization
  strategy (specify whether ComBat, traveling-phantom calibration, or protocol standardization
  is most appropriate and why).

  2. A motion QC decision rule specifying which scans to exclude vs. attempt to salvage
  with volume-scrubbing, including a threshold rationale.

  3. A concrete DICOM de-identification workflow for the burned-in PHI at site 2,
  naming specific tools and pixel-level anonymization steps.

  4. A recommended registration and analysis space (native vs. MNI, FSL TBSS vs. tract-based
  ROI) for the longitudinal FA analysis, with justification.'
