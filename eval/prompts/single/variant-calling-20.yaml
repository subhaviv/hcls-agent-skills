id: variant-calling-20
prompt: 'You are setting up a somatic variant calling pipeline for a pan-cancer study
  involving 847 tumor samples across 12 cancer types. Due to sample procurement limitations,
  **312 of these tumors lack matched normal tissue** (tumor-only mode), while the
  remaining 535 have matched normals. All samples are WGS at ~60x tumor / ~30x normal
  coverage, sequenced on NovaSeq 6000 with 150bp paired-end reads.


  Your bioinformatics team has flagged three specific concerns:


  1. The tumor-only Mutect2 calls are showing an unusually high false-positive rate
  (~68% after basic filtering), particularly enriched for C>T transitions at CpG sites,
  suggesting germline contamination artifacts.


  2. For 47 samples from a specific cancer type (pediatric medulloblastoma), the tumor
  purity estimates from PURPLE range between 0.18–0.31, raising concerns about sensitivity
  at low allele frequencies.


  3. You have access to a panel of normals (PoN) built from 85 blood normals sequenced
  on HiSeq 2500 — a different instrument than your tumor samples.


  **Please provide:**

  - A detailed Mutect2 command-line configuration for both tumor-only and tumor-normal
  modes addressing the germline contamination issue, including all relevant filtering
  flags and `FilterMutectCalls` parameters

  - A strategy for handling the cross-instrument PoN artifact bias, with specific
  GATK tools and parameters

  - Recommended sensitivity adjustments for the low-purity medulloblastoma samples,
  including any `--tumor-lod-to-emit` and `--min-base-quality-score` modifications

  - A post-filtering QC framework with specific thresholds to distinguish true somatic
  calls from residual artifacts across the heterogeneous cohort'
target_skills:
- variant-calling
domain: genomics
difficulty: hard
