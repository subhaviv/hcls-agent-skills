id: drug-discovery-structural-30
prompt: '## Research Question


  You are a computational drug discovery scientist working on a rare pediatric neurological
  disorder caused by hyperactivation of the kinase **DYRK1B** (a fictional gain-of-function
  variant p.Lys168Arg identified in 47 patients across three clinical sites). There
  is no approved therapy, and the program needs a fast-to-clinic strategy. Your team
  has identified three repurposing candidates from an OpenTargets query: **harmine**
  (a β-carboline alkaloid, SMILES: `C1=CC2=C(C=CN=C2N)C=C1` — note this is simplified),
  **INDY** (a DYRK1 inhibitor tool compound, SMILES: `CC1=CC(=O)NC(=S)N1`), and **leucettine
  L41** (SMILES: `C1CN=C(N1)NC2=NC=CS2`). The crystal structure of DYRK1B (PDB: 3DYL)
  shows a well-defined ATP-binding pocket with a gatekeeper residue Met130, and your
  MD simulations suggest a cryptic allosteric site opens transiently (~18% of frames)
  at the αC-helix interface.


  **Deliverables required:**


  1. **Repurposing evidence ranking**: Using a target-based repurposing framework,
  rank the three candidates by evidence strength, citing what DGIdb/ChEMBL data you
  would expect to find and how the p.Lys168Arg GOF variant affects your confidence
  in each candidate''s translatability. Explicitly address the evidence hierarchy
  tier each candidate occupies.


  2. **Cheminformatics filtering**: For each candidate, compute or estimate key Lipinski/Veber
  parameters (MW, HBD, HBA, rotatable bonds, TPSA), flag any PAINS structural alerts,
  calculate pairwise Tanimoto similarity using Morgan fingerprints (radius=2, 2048
  bits), and recommend which candidate(s) to advance based on druglikeness for a CNS
  indication (include BBB-relevant TPSA threshold of <90 Ų).


  3. **Structure-based design strategy**: Given the Met130 gatekeeper and the transient
  allosteric site (18% occupancy), recommend whether to pursue orthosteric ATP-competitive
  docking or allosteric virtual screening for the top candidate, justify your scoring
  function choice (e.g., Glide SP/XP vs. AutoDock Vina), and propose one FEP perturbation
  to improve potency while maintaining CNS druglikeness.'
target_skills:
- drug-repurposing
- cheminformatics
- structure-based-drug-design
domain: drug-discovery
difficulty: hard
