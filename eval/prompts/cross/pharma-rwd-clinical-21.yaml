id: pharma-rwd-clinical-21
prompt: 'You are a pharmacoepidemiologist at a large health analytics firm working
  with a commercial claims database containing 4.2 million patients with type 2 diabetes.
  Your team has been asked to evaluate the comparative cardiovascular safety of two
  SGLT2 inhibitors — empagliflozin versus dapagliflozin — with a primary outcome of
  hospitalized heart failure (HHF).


  The database contains ICD-10-CM diagnosis codes, NDC drug codes, CPT procedure codes,
  and outpatient lab results with LOINC codes. You plan to emulate a target trial
  using a new-user active comparator design. The index date is the first prescription
  fill for either drug. Patients must have ≥12 months of continuous enrollment before
  index (washout period) and no prior use of either SGLT2 inhibitor. The analysis
  window is 24 months post-index.


  Please provide the following concrete deliverables:


  1. **Target Trial Protocol Elements**: Specify the eligibility criteria, treatment
  strategies, follow-up rules, and outcome definitions needed to formally emulate
  the target trial, including how you would handle treatment switching and censoring
  to avoid immortal time bias.


  2. **Cohort Identification Code Specification**: List the specific ICD-10-CM code
  groups (with at least 3 example codes per category) for: (a) type 2 diabetes inclusion,
  (b) heart failure outcome ascertainment, and (c) at least four cardiovascular comorbidity
  covariates. Also identify the appropriate MedDRA Preferred Terms and System Organ
  Class for coding the HHF outcome in a safety reporting context, and specify the
  LOINC codes for HbA1c and eGFR lab covariates.


  3. **Propensity Score Analysis Plan**: Describe the variables to include in the
  propensity score model, justify your choice between IPTW with stabilized weights
  versus 1:1 propensity score matching for this specific context, specify how you
  would assess covariate balance using SMD thresholds, and explain how you would apply
  a marginal structural model to handle time-varying confounding from medication intensification
  over the 24-month follow-up.


  4. **Unmeasured Confounding Assessment**: Calculate an E-value for a hypothetical
  hazard ratio of 0.78 (95% CI lower bound 0.65) favoring empagliflozin, and interpret
  what minimum unmeasured confounder association strength would be needed to explain
  away this result.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: easy
