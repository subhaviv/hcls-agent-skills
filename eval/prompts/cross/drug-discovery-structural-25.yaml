id: drug-discovery-structural-25
prompt: 'A rare pediatric glioma cohort study (n=847 patients) has identified aberrant
  overexpression of DYRK1B kinase as a key oncogenic driver, with 73% of tumors showing
  >4-fold upregulation by RNA-seq. Your team wants to rapidly identify repurposable
  approved drugs targeting DYRK1B or closely related kinases (DYRK1A, CLK2) before
  investing in de novo medicinal chemistry.


  An OpenTargets query returns three candidate drugs with documented DYRK1A/1B activity:
  **harmine** (a β-carboline alkaloid, SMILES: `C1=CC2=C(NC3=CC=CN=C23)C=C1`... use
  full harmine SMILES: `OC1=CC2=NC3=CC=CC=C3C=C2C=C1` — actually use: `C1=CNC2=C1C=CC3=CC=CN=C23`),
  **INDY** (a synthetic inhibitor, SMILES: `CC1=CC(=O)NC(=O)N1CC2=CC=C(C=C2)Cl`),
  and **leucettine L41** (SMILES: `NC1=NC(=O)C(=CN1)C2=CC=CC=C2`).


  Using the crystal structure of DYRK1B (PDB: 5YU3, ATP-binding pocket centered at
  residues Lys140, Glu232, Asp307), perform the following:


  1. **Cheminformatics analysis**: For all three candidates, compute key Lipinski/Veber
  descriptors (MW, LogP, HBD, HBA, TPSA, rotatable bonds), flag any PAINS substructures,
  and calculate pairwise Morgan fingerprint Tanimoto similarity (radius=2, nBits=2048).
  Rank the three compounds by overall druglikeness for CNS penetration (TPSA <90 Å²,
  LogP 1–3 preferred).


  2. **Structure-based assessment**: For the top-ranked druglike candidate, describe
  a virtual screening cascade strategy using the 5YU3 structure — including binding
  site preparation, choice of docking program and scoring function, and whether induced-fit
  docking is warranted given DYRK1B''s known DFG-loop flexibility. Recommend whether
  MM-GBSA rescoring is justified given the pediatric CNS context requiring high selectivity.


  3. **Repurposing evidence evaluation**: Using a target-based repurposing framework,
  rank all three candidates by repurposing evidence strength, citing mechanism-of-action
  overlap with DYRK1B, existing clinical safety data relevant to pediatric CNS use,
  known BBB penetration data, and any CMap/L1000 transcriptomic evidence that could
  support or contradict their use in glioma. Identify the single strongest repurposing
  candidate with justification.'
target_skills:
- drug-repurposing
- cheminformatics
- structure-based-drug-design
domain: drug-discovery
difficulty: intermediate
