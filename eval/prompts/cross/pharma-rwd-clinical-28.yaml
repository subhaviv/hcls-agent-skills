id: pharma-rwd-clinical-28
prompt: 'You are a pharmacoepidemiologist at a large health system that has linked
  Medicare claims data (2018–2023, n = 847,000 beneficiaries) with EHR data to study
  the comparative cardiovascular safety of two SGLT2 inhibitors: empagliflozin versus
  dapagliflozin. Your team suspects confounding by indication because dapagliflozin
  is more frequently prescribed for heart failure with reduced ejection fraction (HFrEF),
  while empagliflozin is more commonly initiated for glycemic control alone.


  You must design and partially implement a rigorous pharmacoepidemiologic study.
  Provide the following concrete deliverables:


  **1. Study Design Specification:** Describe a target trial emulation using an active
  comparator new-user design. Define the cohort entry criteria including a 365-day
  washout period for prior SGLT2 inhibitor use, specify how to handle immortal time
  bias in the exposure definition window (grace period of 30 days), and explain when
  a marginal structural model with stabilized IPTW weights would be preferred over
  simple propensity score matching given time-varying confounding from loop diuretic
  intensification.


  **2. Cohort Identification Code Logic:** Specify the exact ICD-10-CM code groups
  (including at least one HFrEF grouping using I50.2x codes), NDC code strategy for
  identifying new empagliflozin versus dapagliflozin fills, and CPT codes for relevant
  cardiac procedures that should be used as covariates. Calculate a hypothetical PDC
  over 180 days assuming a patient filled three 30-day supplies with gaps of 12 days
  and 8 days between fills.


  **3. Terminology Mapping:** The primary outcome is hospitalization for major adverse
  cardiovascular events (MACE). Map "acute myocardial infarction" simultaneously to
  its MedDRA Preferred Term and HLGT, the corresponding ICD-10-CM code block, and
  the SNOMED CT concept (use concept ID 57054005). Explain whether you would define
  MACE at the MedDRA HLT or PT level for your outcome adjudication algorithm and justify
  the granularity choice.


  **4. Balance and Sensitivity Analysis:** After propensity score weighting, describe
  which SMD threshold indicates acceptable balance, how you would assess the proportional
  hazards assumption using Schoenfeld residuals, and calculate the E-value for a hypothetical
  hazard ratio of 1.32 with a lower confidence bound of 1.08 to quantify unmeasured
  confounding.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: hard
