id: genomics-variant-pipeline-14
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples (paired-end 150bp Illumina NovaSeq, ~100x target coverage) from patients
  with suspected hereditary colorectal cancer syndrome. The pipeline uses BWA-MEM2
  for alignment to GRCh38, GATK HaplotypeCaller in GVCF mode with joint genotyping,
  and downstream ACMG-based variant interpretation.


  During QC review, sample CRC_021 raises concerns: FastQC reports a mean Q30 of 78%,
  adapter content spikes at read positions 130–150, and mosdepth shows median target
  coverage of 41x with 22% of bases below 20x. A colleague suggests proceeding anyway.


  After variant calling, two variants in MLH1 are flagged for interpretation in CRC_021:


  **Variant A:** NM_000249.4(MLH1): c.1852_1853del (p.Lys618Glnfs*7) — a 2bp frameshift
  deletion. ClinVar shows 3 submissions: 2× Pathogenic (no stars), 1× VUS. gnomAD
  v3.1 allele frequency: 0.000008. REVEL score: N/A (frameshift). SpliceAI delta score:
  0.02.


  **Variant B:** NM_000249.4(MLH1): c.1975G>A (p.Ala659Thr) — a missense variant.
  ClinVar: 1 submission, VUS. gnomAD v3.1 AF: 0.0003. REVEL score: 0.62. CADD Phred:
  24.1. SpliceAI delta score: 0.08. No functional studies available. No co-segregation
  data.


  Please provide the following deliverables:


  1. **QC Assessment:** Evaluate whether CRC_021 meets minimum quality thresholds
  for clinical reporting. Specify which metrics fail, what remediation steps (re-trimming
  with fastp, re-sequencing) are warranted, and whether variant calls from this sample
  should be reported given the coverage concerns. Include the fastp command you would
  run.


  2. **Variant Calling Decision:** With only 45 samples in the cohort, explain whether
  VQSR or hard filtering is more appropriate for germline SNVs and indels, justify
  your choice, and provide the specific GATK hard-filter expressions you would apply
  if VQSR is unsuitable.


  3. **Variant Interpretation:** Apply ACMG/AMP 2015 criteria to classify both Variant
  A and Variant B. For each variant, enumerate every criterion invoked (or explicitly
  ruled out), assign a final classification, and state whether the variant should
  be reported in a clinical hereditary cancer context.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: intermediate
