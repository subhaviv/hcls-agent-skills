id: genomics-variant-pipeline-25
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples from patients with suspected hereditary colorectal cancer syndrome. The
  sequencing was performed on an Illumina NovaSeq 6000 (2×150 bp), and you have paired
  FASTQs (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`), a coordinate-sorted BAM (`sample.bam`),
  reference `hg38.fasta`, and a SureSelect Human All Exon V7 target BED file. One
  index patient (PT-047) has a candidate variant in **MLH1**: `chr3:37,067,251 C>T`
  (NM_000249.4: c.1852C>T, p.Arg618Trp).


  **Deliverable 1 – QC Pipeline:** Write a complete shell pipeline using fastp, mosdepth,
  Picard CollectHsMetrics, and MultiQC to assess sample quality. Flag any thresholds
  that would cause PT-047 to fail QC (e.g., mean target coverage <50×, duplicate rate
  >25%, % bases >Q30 <75%). Use `THREADS=8` and `OUT=qc_out`.


  **Deliverable 2 – Variant Calling:** Describe the GATK HaplotypeCaller GVCF workflow
  for this 45-sample cohort, including joint genotyping with GenomicsDBImport. Given
  the cohort size of 45 samples, justify whether to apply VQSR or hard filters for
  SNVs and indels, specifying exact filter expressions if hard filters are chosen.
  Include the precise Mutect2 command if somatic confirmation is also requested for
  PT-047.


  **Deliverable 3 – Variant Interpretation:** Classify `MLH1 c.1852C>T (p.Arg618Trp)`
  using the ACMG/AMP 2015 framework. The variant has: gnomAD v3.1 allele frequency
  = 0.000031 (8/251,360 alleles), REVEL score = 0.74, CADD Phred = 24.1, SpliceAI
  delta score (max) = 0.03, ClinVar contains 2 conflicting submissions (1× VUS, 1×
  Likely Pathogenic), and functional studies in a 2019 paper demonstrate partial MMR
  activity loss (~40% reduction). Apply all relevant ACMG criteria explicitly (PS3,
  PM2, PP3, BP4, etc.), state your final classification, and explain whether this
  result meets the reporting threshold for a Lynch syndrome hereditary cancer panel
  in a CLIA-certified laboratory.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: intermediate
