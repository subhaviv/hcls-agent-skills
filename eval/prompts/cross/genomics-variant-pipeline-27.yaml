id: genomics-variant-pipeline-27
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples from patients with suspected hereditary colorectal cancer syndrome. The
  sequencing was performed on an Illumina NovaSeq 6000 (2×150 bp), and initial data
  delivery includes paired FASTQs (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`), a
  coordinate-sorted BAM (`sample.bam`), and a target intervals BED file covering 98
  Mb of exonic sequence. Reference genome is GRCh38 (`ref.fasta`). Assume `THREADS=8`
  and `OUT=qc_out`.


  During variant calling with GATK HaplotypeCaller in GVCF mode followed by joint
  genotyping across all 45 samples, the team must decide whether to apply VQSR or
  hard filters for SNVs and indels. After joint genotyping, a candidate variant emerges
  in **MLH1** (NM_000249.4): `chr3:37,067,251 C>T`, resulting in a predicted **p.Arg217Cys**
  missense change. Annotation reveals the following data points:


  - **gnomAD v3.1 allele frequency**: 0.000031 (8 heterozygous carriers, 0 homozygous)

  - **ClinVar**: 2 submissions — one "Uncertain Significance" (2019, no assertion
  criteria), one "Likely Pathogenic" (2021, criteria provided)

  - **REVEL score**: 0.74

  - **CADD Phred**: 26.3

  - **SpliceAI delta scores**: all four scores < 0.05

  - **Functional studies**: one published in vitro MMR activity assay showing ~40%
  reduction in mismatch repair function compared to wild-type

  - **Family history**: proband has a first-degree relative with Lynch syndrome-confirmed
  **MSH2** pathogenic variant (different gene)


  Please provide the following deliverables:


  1. **QC pipeline**: Write a complete bash workflow using `fastp`, `mosdepth`, and
  `MultiQC` to assess adapter contamination, per-base quality, and target coverage
  (minimum 20× threshold) for this WES dataset, using the assumed parameters above.


  2. **Variant calling decision**: Justify whether VQSR or hard filters should be
  applied for this 45-sample WES cohort, specifying recommended tranches or filter
  thresholds for both SNVs and indels.


  3. **ACMG variant classification**: Apply the ACMG/AMP 2015 framework to classify
  MLH1 p.Arg217Cys, explicitly invoking or rejecting each relevant criterion (PS3,
  PM2, PM5, PP3, BP4, BS3, BP2) with justification, and provide a final classification
  with clinical reporting recommendation.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: intermediate
