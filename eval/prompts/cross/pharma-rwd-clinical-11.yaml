id: pharma-rwd-clinical-11
prompt: 'You are a pharmacoepidemiologist at a large health analytics firm tasked
  with designing and executing a real-world evidence study using a commercial claims
  database (Optum Clinformatics, 2018–2023, ~42 million covered lives) to evaluate
  the cardiovascular safety of tirzepatide versus semaglutide in adults with type
  2 diabetes.


  **Study context and constraints:**


  - Exposure: new users of tirzepatide (NDC prefix 00002-1433) vs. new users of semaglutide
  injectable (NDC prefix 00169-4131), defined with a 365-day washout period for either
  agent

  - Primary outcome: major adverse cardiovascular events (MACE), defined as the composite
  of acute myocardial infarction, ischemic stroke, and cardiovascular death

  - Minimum follow-up: 90 days; maximum: 36 months

  - The database contains diagnosis codes (ICD-10-CM), procedure codes (CPT-4), and
  drug dispensing records (NDC)

  - Approximate exposed cohort sizes after preliminary pull: 38,400 tirzepatide new
  users and 91,700 semaglutide new users


  **Deliverables requested:**


  1. **Study design specification**: Describe how you would emulate a target trial
  using an active comparator new-user design, explicitly addressing how to avoid immortal
  time bias in cohort entry and follow-up definitions, and how to handle time-varying
  confounding (e.g., HbA1c changes, concomitant SGLT2 inhibitor initiation) using
  marginal structural models with stabilized IPTW weights.


  2. **Cohort identification and coding**: Provide the specific ICD-10-CM code groups
  (including relevant MedDRA Preferred Terms and System Organ Classes) you would use
  to identify MACE components and key baseline comorbidities (heart failure, CKD,
  atrial fibrillation), and explain any MedDRA-to-ICD-10 mapping decisions and granularity
  trade-offs at the HLT vs. PT level.


  3. **Propensity score analysis and balance diagnostics**: Outline the propensity
  score model covariates, justify the choice of IPTW versus 1:1 matching given the
  sample size asymmetry (38,400 vs. 91,700), specify the SMD threshold for acceptable
  balance, and describe how you would calculate PDC over the follow-up window to define
  a per-protocol censoring rule.


  4. **Survival analysis**: Specify the Kaplan-Meier estimator setup, the Cox proportional
  hazards model structure including interaction terms for baseline cardiovascular
  risk strata, how you would assess the proportional hazards assumption using Schoenfeld
  residuals, and how you would quantify residual unmeasured confounding using E-values.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: easy
