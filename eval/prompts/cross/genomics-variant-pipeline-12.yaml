id: genomics-variant-pipeline-12
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples (paired-end 150bp Illumina NovaSeq 6000) from patients with suspected hereditary
  breast and ovarian cancer syndrome. The raw data consists of paired FASTQs per sample,
  and the pipeline must run on a server with THREADS=8, writing outputs to OUT=qc_out.
  The target intervals file is `BRCA_panel.bed`, the reference is `ref.fasta`, and
  all samples have coordinate-sorted BAMs with indices available.


  During routine analysis, one sample (HBOC_045) flagged multiple QC concerns: FastQC
  reports adapter contamination in ~18% of reads, mean coverage across target regions
  is 42×, but mosdepth reveals that exon 11 of BRCA2 has only 8× coverage. After trimming
  and realignment, GATK HaplotypeCaller identified a candidate variant in BRCA2: NM_000059.4(BRCA2):c.8023G>T
  (p.Glu2675Ter), a nonsense variant at chr13:32,912,299.


  ClinVar shows two submissions: one "Likely Pathogenic" (2019, no evidence provided)
  and one "VUS" (2021, citing limited segregation data). gnomAD v3.1.1 shows the variant
  at an allele frequency of 0.000008 (2 heterozygous carriers, 0 homozygous). REVEL
  score is 0.91, CADD PHRED is 38, and SpliceAI scores are all below 0.1. The variant
  falls outside any known mutational hotspot but introduces a premature stop codon
  in a region where NMD is predicted to occur.


  Given this scenario, provide the following deliverables:


  1. **QC remediation plan**: Write the exact fastp command to perform adapter trimming
  and quality filtering for HBOC_045, then specify the mosdepth command to assess
  per-exon coverage. Identify whether the 8× coverage in BRCA2 exon 11 is sufficient
  for confident variant calling and what threshold you would apply for WES germline
  analysis.


  2. **Variant calling decision**: Given a cohort of 45 samples, justify whether to
  use VQSR or hard filters for genotyping, and write the HaplotypeCaller command appropriate
  for this WES cohort including relevant parameters for the low-coverage exon concern.


  3. **ACMG/AMP variant classification**: Apply all relevant ACMG/AMP 2015 criteria
  to NM_000059.4(BRCA2):c.8023G>T, explicitly evaluating PVS1 applicability, PM2,
  PP3, and the conflicting ClinVar evidence under BP6/PP5 logic, and provide a final
  classification with justification.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: easy
