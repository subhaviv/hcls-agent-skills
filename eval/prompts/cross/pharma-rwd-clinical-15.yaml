id: pharma-rwd-clinical-15
prompt: 'You are a pharmacoepidemiologist at a large integrated health system that
  has linked Medicare claims data (2018–2023, n = 847,000 beneficiaries) with EHR
  data. Your team is designing a new-user active comparator study to evaluate whether
  sodium-glucose cotransporter-2 (SGLT2) inhibitors increase the risk of lower-limb
  amputation compared to dipeptidyl peptidase-4 (DPP-4) inhibitors among patients
  with type 2 diabetes and established cardiovascular disease.


  **Please provide all of the following deliverables:**


  **1. Cohort Definition & Coding Infrastructure**

  Define the new-user cohort with a 365-day washout period. Specify the ICD-10-CM
  diagnosis code groups (including relevant T2DM codes, cardiovascular disease codes,
  and peripheral artery disease exclusion criteria), NDC code families for SGLT2i
  versus DPP-4i identification, and CPT procedure codes for lower-limb amputation
  outcomes. Then map the primary outcome (lower-limb amputation) through the full
  MedDRA hierarchy from LLT to SOC, and explain whether you would capture this outcome
  at the PT or HLT level in your AE frequency table and why.


  **2. Target Trial Emulation & Bias Mitigation**

  Emulate the target trial protocol including eligibility criteria, treatment strategies,
  assignment procedures, follow-up, and estimand. Explicitly address how you will
  avoid immortal time bias in the index date assignment, handle time-varying confounding
  from HbA1c and eGFR (measured longitudinally in EHR), and justify using stabilized
  IPTW with marginal structural models rather than propensity score matching for this
  specific setting.


  **3. Propensity Score Analysis & Survival Modeling**

  Describe the propensity score model covariates, explain how you would assess covariate
  balance using standardized mean differences (SMD threshold < 0.10), and specify
  stabilized weight truncation rules. Then outline the Kaplan-Meier and Cox proportional
  hazards analysis plan, including how you would test the proportional hazards assumption
  using Schoenfeld residuals, and calculate an E-value for an adjusted hazard ratio
  of 1.43 (95% CI lower bound 1.11) to quantify robustness to unmeasured confounding.'
