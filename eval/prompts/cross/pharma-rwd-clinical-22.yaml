id: pharma-rwd-clinical-22
prompt: 'You are a pharmacoepidemiologist at a large integrated health system with
  access to a linked claims-EHR database containing 2.4 million commercially insured
  adults (2018–2023). Your team is designing a real-world evidence study to evaluate
  whether sodium-glucose cotransporter-2 (SGLT2) inhibitors reduce the risk of hospitalized
  heart failure (HHF) compared to dipeptidyl peptidase-4 (DPP-4) inhibitors among
  patients with type 2 diabetes, emulating the design of a target trial.


  **Your database contains:**

  - Medical claims with ICD-10-CM diagnosis codes

  - Pharmacy claims with NDC codes

  - Lab results coded in LOINC

  - Adverse event data coded in MedDRA


  **Specific constraints and parameters:**

  - Index date = first dispensing of either drug class (new-user design); require
  365-day baseline washout

  - Eligible patients: 47,832 SGLT2 initiators and 61,204 DPP-4 initiators identified
  at baseline

  - Follow-up is variable (6–48 months); patients may switch or discontinue therapy

  - Unmeasured confounders suspected: dietary habits, functional status, ejection
  fraction

  - The outcome HHF must be identified from claims using a validated ICD-10-CM code
  set

  - A secondary safety outcome is diabetic ketoacidosis (DKA), which must be coded
  using both ICD-10-CM and MedDRA terminology for a regulatory submission


  **Deliverables requested:**


  1. Describe the full target trial emulation protocol, explicitly addressing how
  to avoid immortal time bias and prevalent user bias in cohort entry.


  2. Specify the ICD-10-CM codes for HHF (primary diagnosis on inpatient claim) and
  map the DKA safety outcome to its correct MedDRA Preferred Term, High Level Term,
  and System Organ Class, noting any ambiguity in granularity.


  3. Detail the propensity score estimation strategy using IPTW with stabilized weights,
  including which covariates to include, how to assess balance using SMD thresholds,
  and how to handle time-varying confounding (medication switching) with a marginal
  structural model.


  4. Calculate the expected effective sample size after IPTW trimming at the 1st/99th
  percentile, and explain how to assess residual unmeasured confounding using E-values
  given a hypothetical adjusted HR of 0.74 (95% CI: 0.65–0.84).


  5. Specify LOINC codes for the three baseline lab covariates most critical to include
  in the propensity model (HbA1c, eGFR, BNP/NT-proBNP) and explain the LOINC panel
  hierarchy considerations for selecting the correct code in a heterogeneous EHR environment.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: easy
