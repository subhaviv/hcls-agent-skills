id: drug-discovery-structural-15
prompt: 'You are a computational drug discovery scientist working on a rare pediatric
  epilepsy caused by gain-of-function mutations in **KCNQ3** (a voltage-gated potassium
  channel). A phenotypic screen of 12,000 approved drugs identified **retigabine (ezogabine)**
  and **carbamazepine** as hits that suppress aberrant neuronal firing in patient-derived
  iPSC neurons (n=847 cells per compound, p<0.001). Retigabine is already a KCNQ activator
  but was withdrawn due to skin/retinal pigmentation side effects; carbamazepine''s
  mechanism in this context is unclear.


  You have the following data available:

  - SMILES for retigabine: `CCOC(=O)Nc1ccc(NCC2=CC=CC=C2)cc1F` (note: fictional variant
  with fluorine substituent at position 4)

  - SMILES for carbamazepine: `C1=CC2=C(C=C1)C(=NCC(=O)N2)c3ccccc3` (fictional tautomer)

  - A DGIdb query returns 14 gene targets for carbamazepine including SCN1A, SCN2A,
  CACNA1A, and KCNQ2

  - OpenTargets association score for carbamazepine–KCNQ3: 0.12 (weak)

  - A cryo-EM structure of KCNQ3 is available at 2.9 Å resolution (PDB: 9ZZZ, fictional)


  Please provide the following deliverables:


  1. **Drug repurposing analysis**: Using the DGIdb and OpenTargets data, evaluate
  carbamazepine as a repurposing candidate for KCNQ3 gain-of-function epilepsy. Rank
  the mechanistic hypotheses (direct KCNQ3 engagement vs. indirect network suppression
  via SCN1A/SCN2A), assess the evidence hierarchy, and recommend whether to advance
  carbamazepine or deprioritize it in favor of identifying novel KCNQ3-selective candidates.
  Discuss translatability considerations given the pediatric population.


  2. **Cheminformatics filtering**: Using RDKit, calculate Lipinski Ro5 and Veber
  rule compliance for both SMILES, flag any PAINS substructures, compute Morgan fingerprint
  (radius=2, nBits=2048) Tanimoto similarity between the two compounds, and interpret
  whether their chemical similarity supports a shared mechanism of action.


  3. **Structure-based design strategy**: Using the 2.9 Å KCNQ3 cryo-EM structure,
  outline a virtual screening cascade to identify KCNQ3-selective positive modulators
  that lack retigabine''s pigmentation liabilities. Specify binding site definition,
  docking strategy, scoring function selection, and how you would use MM-GBSA rescoring
  and MD simulation (50 ns) to prioritize the top 10 candidates from an initial 500-compound
  virtual library.'
target_skills:
- drug-repurposing
- cheminformatics
- structure-based-drug-design
domain: drug-discovery
difficulty: intermediate
