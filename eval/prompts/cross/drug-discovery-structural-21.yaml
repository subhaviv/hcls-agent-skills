id: drug-discovery-structural-21
prompt: 'A rare pediatric glioma cohort study (n=847 patients, DIPG subtype) has identified
  recurrent H3K27M mutations co-occurring with ACVR1 gain-of-function variants in
  34% of cases. Transcriptomic profiling via L1000 perturbation signatures revealed
  that the disease state most closely anti-correlates with the connectivity map signature
  of **saracatinib** (AZ-AstraZeneca, approved for osteoporosis trials, Src/Abl inhibitor)
  and **gilteritinib** (approved AML therapy, FLT3/AXL inhibitor). OpenTargets scores
  for ACVR1 as a target in pediatric glioma are 0.71 (genetic association) and 0.54
  (expression). DGIdb confirms both drugs have documented interactions with ACVR1
  pathway nodes (BMP signaling intermediates SMAD1/5/8).


  You have the SMILES strings for both candidates:

  - Saracatinib: `CN1CCN(CC1)c1cc2c(Nc3ccc(F)c(Cl)c3)ncnc2s1` (fictional simplified
  analog)

  - Gilteritinib: `COc1cc2ncnc(Nc3ccc(F)cc3)c2cc1OCCCN1CCC(O)CC1` (fictional simplified
  analog)


  **Your deliverables:**


  1. **Drug Repurposing Analysis**: Rank saracatinib vs. gilteritinib as DIPG repurposing
  candidates using an evidence hierarchy framework. Justify using CMap connectivity
  scores, OpenTargets data, DGIdb interaction evidence, and existing clinical safety
  profiles. Explicitly address pediatric translatability concerns (BBB penetration,
  dosing, toxicity).


  2. **Cheminformatics Pipeline**: Using RDKit, compute Lipinski Ro5 descriptors,
  Veber rule parameters (rotatable bonds ≤10, TPSA ≤140 Å²), and flag any PAINS alerts
  for both SMILES. Calculate Morgan fingerprint (radius=2, nBits=2048) Tanimoto similarity
  between the two compounds. Report whether either compound should be deprioritized
  based on these filters.


  3. **Structure-Based Drug Design Strategy**: ACVR1 (PDB: 3H9R) has a well-defined
  ATP-binding pocket with a gatekeeper residue Leu263. Design a virtual screening
  cascade to identify optimized analogs of the top-ranked repurposing candidate. Specify
  docking software choice, scoring function, binding site definition radius (in Å
  from Leu263), whether induced-fit docking is warranted given the H3K27M-driven conformational
  changes in ACVR1, and propose one allosteric site worth investigating based on known
  BMP pathway structural biology.'
target_skills:
- drug-repurposing
- cheminformatics
- structure-based-drug-design
domain: drug-discovery
difficulty: easy
