id: drug-discovery-structural-19
prompt: 'A rare pediatric glioma cohort study (n=847 patients) has identified recurrent
  gain-of-function mutations in FGFR3 (K650E and K650M) correlating with poor progression-free
  survival. Your team wants to rapidly identify repurposable approved drugs targeting
  this altered kinase before designing a focused optimization campaign.


  You have retrieved the following three candidate drugs from DGIdb/OpenTargets with
  their SMILES strings and interaction evidence:


  - **Erdafitinib** (pan-FGFR inhibitor; approved for urothelial carcinoma): `COc1cc2c(ncnc2c(OC)c1OCCCN1CCOCC1)Nc1ccc(N=C)cc1`
  — DGIdb interaction score 0.87, 3 supporting clinical studies

  - **Ponatinib** (BCR-ABL/FGFR inhibitor; approved for CML): `Cc1ccc(C(=O)Nc2ccc(CN3CCN(C)CC3)c(C(F)(F)F)c2)cc1C#Cc1cnc2ccccc2n1`
  — DGIdb score 0.61, 1 supporting study

  - **Lenvatinib** (multi-kinase inhibitor; approved for thyroid carcinoma): `C=CC(=O)Nc1ccc(Oc2cc3c(cc2F)nccc3NC(=O)c2ccc(C)cn2)cc1`
  — DGIdb score 0.54, 2 supporting studies


  Using these three candidates, please provide the following deliverables:


  1. **Repurposing evidence ranking**: Rank the three drugs using a structured evidence
  hierarchy (mechanism-of-action overlap with FGFR3 K650E/M, clinical translatability
  to pediatric CNS indications, existing safety profiles, and BBB penetration considerations).
  Justify your top candidate.


  2. **Cheminformatics analysis**: For all three compounds, compute Lipinski Rule
  of Five descriptors (MW, HBD, HBA, LogP — estimate from SMILES if needed), flag
  any PAINS structural alerts, calculate pairwise Tanimoto similarity using Morgan
  fingerprints (radius=2, nBits=2048), and assess druglikeness for CNS penetration
  using a PSA threshold of ≤90 Ų.


  3. **Structure-based design strategy**: For your top repurposing candidate, propose
  a structure-based optimization plan targeting the FGFR3 K650E/M gated mutant binding
  pocket. Specify your docking strategy (rigid vs. induced-fit), scoring function
  rationale, whether an allosteric site should be explored, and outline a 3-step virtual
  screening cascade to identify analogs with improved selectivity over wild-type FGFR3.'
target_skills:
- drug-repurposing
- cheminformatics
- structure-based-drug-design
domain: drug-discovery
difficulty: hard
