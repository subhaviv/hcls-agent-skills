id: genomics-variant-pipeline-16
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples from patients with suspected hereditary colorectal cancer syndrome. The
  sequencing was performed on an Illumina NovaSeq 6000 with 150 bp paired-end reads,
  targeting a 60 Mb exome capture kit. The raw data consists of paired FASTQs (`sample_R1.fastq.gz`
  / `sample_R2.fastq.gz`), and downstream processing has produced a coordinate-sorted
  BAM (`sample.bam`) aligned to GRCh38 using BWA-MEM2, plus a reference `ref.fasta`
  and target intervals file `targets.bed`.


  During variant calling with GATK HaplotypeCaller in GVCF mode followed by joint
  genotyping, the team identified a candidate variant in **MLH1**: `chr3:37,067,251
  C>T`, resulting in a canonical splice site disruption at the intron 14 donor site
  (c.1731+1G>A in standard nomenclature). The variant has the following annotations:

  - gnomAD v3.1.2 allele frequency: 0.000008 (2 heterozygous alleles, 0 homozygous)

  - ClinVar: 2 submissions — one "Likely Pathogenic" (germline, Lynch syndrome, 2019)
  and one "Uncertain Significance" (2021, no assertion criteria)

  - SpliceAI delta score: 0.91 (DS_DL)

  - CADD Phred: 34.2

  - REVEL: 0.87

  - The cohort has only 45 samples, making VQSR statistically unreliable


  Given this scenario, please provide the following deliverables:


  1. **A complete bash QC pipeline** using `fastp`, `mosdepth`, and `MultiQC` (assume
  `THREADS=8`, `OUT=qc_out`) that assesses adapter contamination, per-base quality,
  and WES target coverage at 20× and 50× thresholds, flagging any sample with mean
  target coverage below 80×.


  2. **A GATK variant calling strategy** explaining why VQSR is inappropriate for
  this cohort size, what hard-filter thresholds to apply for SNVs and indels in WES
  data, and the exact `HaplotypeCaller` and `GenotypeGVCFs` commands needed.


  3. **A structured ACMG/AMP variant classification** for the MLH1 c.1731+1G>A variant,
  explicitly applying or rejecting each relevant criterion (PVS1, PS1–PS4, PM1–PM6,
  PP1–PP5, BA1, BS1–BS4, BP1–BP7), resolving the conflicting ClinVar submissions,
  and providing a final classification with clinical reporting recommendation.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: intermediate
