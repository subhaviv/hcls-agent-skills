id: pharma-rwd-clinical-14
prompt: 'You are a pharmacoepidemiologist at a large integrated health system with
  access to a linked claims-EHR database containing 2.8 million commercially insured
  adults (2018–2023). Your team is designing a real-world evidence study to evaluate
  whether empagliflozin (an SGLT2 inhibitor) reduces the risk of acute kidney injury
  (AKI) compared to sitagliptin (a DPP-4 inhibitor) in patients with type 2 diabetes
  and moderate chronic kidney disease (CKD stage G3a–G3b, eGFR 30–59 mL/min/1.73m²).


  **Design and Coding Requirements:**


  1. **Target Trial Emulation & Study Design:** Specify the complete target trial
  protocol you would emulate, including: eligibility criteria (with a 365-day baseline
  washout period for prior SGLT2i/DPP-4i use), treatment strategies, assignment procedures,
  follow-up rules, and how you would handle the time-varying nature of treatment discontinuation
  and switching using a marginal structural model with stabilized IPTW weights. Explain
  how you would avoid immortal time bias in the index date assignment and justify
  the active comparator selection. Calculate an E-value for a hypothetical hazard
  ratio of 0.72 (95% CI lower bound 0.61) to quantify unmeasured confounding sensitivity.


  2. **Cohort Identification Pipeline:** Provide the specific ICD-10-CM code sets
  for type 2 diabetes (E11.xx), CKD stage G3 (N18.31, N18.32), and AKI (N17.x) that
  you would use for cohort entry and outcome ascertainment. Specify NDC code strategy
  for empagliflozin (10mg and 25mg formulations) and sitagliptin (100mg). Calculate
  the PDC threshold (≥0.80) for defining sustained exposure during a 180-day landmark
  window, and describe the Cox proportional hazards model specification including
  time-varying covariates and how you would test the proportional hazards assumption
  using Schoenfeld residuals.


  3. **Adverse Event Coding & MedDRA Mapping:** The primary safety outcome (AKI) must
  be coded for regulatory submission. Map ICD-10-CM N17.0, N17.1, and N17.2 to their
  corresponding MedDRA Preferred Terms under the Renal and Urinary Disorders SOC,
  identify the appropriate High Level Term (HLT) grouping, and justify whether AKI
  events should be reported at the PT level or aggregated to the HLT level in your
  primary safety table.'
