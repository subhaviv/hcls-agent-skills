id: genomics-variant-pipeline-29
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples (paired-end 150bp Illumina NovaSeq 6000, ~100x mean target coverage) from
  patients with suspected hereditary colorectal cancer syndrome. You have been handed
  the following partially completed analysis and must resolve several outstanding
  issues before a clinical report can be issued.


  **Pipeline context:**

  - Alignment: BWA-MEM2 against GRCh38, coordinate-sorted BAMs available

  - Variant calling: GATK HaplotypeCaller in GVCF mode, joint genotyping completed

  - Raw VCF: `cohort_45samples.vcf.gz`

  - Target intervals: `agilent_sureselect_v7_hg38.bed`

  - Reference: `ref.fasta`

  - THREADS=8, OUT=`qc_out`


  **Deliverable 1 — QC Assessment:** Write the complete shell commands using fastp,
  mosdepth, and MultiQC to generate per-sample QC metrics. One sample (SAMPLE_032)
  shows a flagged duplication rate of 41% and mean target coverage of 58x in preliminary
  Picard output. State whether SAMPLE_032 should be retained or excluded, citing specific
  thresholds, and identify which downstream variant calling steps are most affected
  by high duplication rates.


  **Deliverable 2 — Variant Filtering:** The cohort has only 45 samples, making VQSR
  unreliable for indels. Provide the complete GATK hard-filter commands for both SNVs
  and indels, specifying the exact filter expressions and thresholds recommended for
  WES data. Additionally, write the Mutect2 command for tumor-only somatic calling
  on SAMPLE_019 (suspected Lynch syndrome with MSI-H tumor biopsy available), including
  appropriate flags for a panel of normals-free workflow.


  **Deliverable 3 — Variant Interpretation:** After filtering, three variants in MLH1
  require classification:

  - **Variant A:** c.1852_1853delAG (p.Ser618Leufs*6) — gnomAD AF = 0.000004, not
  in ClinVar

  - **Variant B:** c.655A>G (p.Ile219Val) — REVEL = 0.31, gnomAD AF = 0.0021, 2 ClinVar
  submissions: 1× VUS, 1× Likely Benign

  - **Variant C:** c.1731+2T>C — SpliceAI delta score = 0.91, gnomAD AF = 0.000001,
  no ClinVar entry


  Apply ACMG/AMP 2015 criteria to each variant, explicitly naming every criterion
  invoked (e.g., PVS1, PM2, BP4), its strength, and provide a final classification
  with clinical reporting recommendation for each.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: hard
