id: genomics-variant-pipeline-15
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples from patients with suspected hereditary colorectal cancer syndrome. The
  pipeline uses BWA-MEM2 for alignment to hg38, followed by GATK HaplotypeCaller in
  GVCF mode and joint genotyping. Due to the small cohort size, the team is debating
  whether to apply VQSR or hard filters for variant refinement.


  During QC review using FastQC and mosdepth, the team notices that three samples
  show mean target coverage of only 18× (target intervals: `capture_v6.bed`), and
  MultiQC reports adapter contamination >12% in two samples (sample_R1.fastq.gz /
  sample_R2.fastq.gz, THREADS=8, OUT=qc_out). A fourth sample has a Picard duplication
  rate of 47%.


  After variant calling, a heterozygous variant is identified in **MLH1** (NM_000249.4):
  c.1039-3C>A, a splice region variant located 3 bp upstream of exon 12. The variant
  has the following annotations:

  - gnomAD v4 non-cancer AF: 0.00004 (8 heterozygotes, 0 homozygotes)

  - SpliceAI delta score: 0.61 (DS_AL)

  - CADD Phred: 24.3

  - REVEL: 0.62

  - ClinVar: 2 submissions — one VUS (2021, single lab), one Likely Pathogenic (2023,
  CLIA-certified lab with functional evidence cited)

  - The variant is absent from the patient''s unaffected parent (confirmed by Sanger)


  **Deliverables requested:**


  1. **QC remediation plan**: For each of the three QC failures identified (low coverage,
  adapter contamination, high duplication), provide specific fastp and/or pipeline
  parameter adjustments and thresholds for determining whether affected samples should
  be excluded or reprocessed.


  2. **Variant calling strategy**: Justify whether VQSR or hard filters should be
  applied for this 45-sample cohort, specifying any SNP/indel filter expressions and
  tranches if VQSR is chosen, or explicit hard-filter cutoffs (QD, FS, MQ, etc.) if
  hard filters are preferred.


  3. **ACMG variant classification**: Apply the ACMG/AMP 2015 framework to the MLH1
  c.1039-3C>A variant. Explicitly evaluate PVS1 applicability, PS3/BS3 considerations
  given the ClinVar functional evidence, PM2, PP3/BP4, and the de novo-like segregation
  data. Provide a final classification with justification.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: intermediate
