id: pharma-rwd-clinical-23
prompt: 'You are a pharmacoepidemiologist at a large health system with access to
  a commercial claims database containing 4.2 million continuously enrolled adults
  (2018–2023). Your team is designing a real-world evidence study to evaluate whether
  sodium-glucose cotransporter-2 (SGLT2) inhibitors reduce the risk of hospitalized
  heart failure compared to dipeptidyl peptidase-4 (DPP-4) inhibitors among patients
  with type 2 diabetes.


  Your claims database captures diagnoses as ICD-10-CM codes, medications as NDC codes,
  and procedures as CPT codes. The outcome of interest — hospitalized heart failure
  — must be identified from this data, and your team has noted that MedDRA PT "Cardiac
  failure congestive" (10007559) and related terms are used in your safety reporting
  system, requiring a crosswalk to ICD-10-CM for cohort identification.


  Please provide the following concrete deliverables:


  1. **Study Design Specification**: Describe how you would implement an active comparator
  new-user design with target trial emulation principles. Specify the washout period,
  index date definition, eligibility criteria, and how you would avoid immortal time
  bias. Explain why DPP-4 inhibitors are an appropriate active comparator versus no
  treatment.


  2. **Cohort Identification Code Logic**: Outline the ICD-10-CM code groupings (including
  relevant I-codes and E-codes) and NDC code selection strategy to identify SGLT2
  inhibitor initiators versus DPP-4 inhibitor initiators. Map the MedDRA PT "Cardiac
  failure congestive" and its parent HLT "Cardiac failure" (10007554) to the corresponding
  ICD-10-CM codes you would use to define the hospitalized heart failure outcome,
  justifying any decisions to include or exclude adjacent codes.


  3. **Propensity Score Analysis**: Describe your propensity score model covariates
  (at minimum 12 clinically relevant variables), specify whether you would use IPTW
  with stabilized weights or 1:1 matching and why, define your trimming strategy,
  and explain how you would assess covariate balance using SMD thresholds.


  4. **Survival Analysis Plan**: Specify your Kaplan-Meier and Cox proportional hazards
  model approach, including how you would handle time-varying confounding with marginal
  structural models if baseline-only adjustment is insufficient, and how you would
  assess the proportional hazards assumption using Schoenfeld residuals.


  5. **Sensitivity and Bias Analysis**: Propose two negative control outcomes appropriate
  for this drug-outcome pair, calculate a hypothetical E-value for an observed HR
  of 0.78 (95% CI: 0.65–0.93), and describe a quantitative bias analysis approach
  for unmeasured confounding by HbA1c severity.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: easy
