id: pharma-rwd-clinical-18
prompt: 'You are a pharmacoepidemiologist at a large health system that has linked
  Medicare claims data (2018–2023, n = 847,000 beneficiaries) with EHR data to study
  the comparative cardiovascular safety of two SGLT2 inhibitors: empagliflozin versus
  dapagliflozin. Your team wants to emulate a target trial using a new-user active
  comparator design.


  **Context and constraints:**


  - Exposure: new users of empagliflozin (NDC prefix 00597-0462) vs. dapagliflozin
  (NDC prefix 00310-0756), defined as no fills in the prior 365-day washout period

  - Primary outcome: hospitalized heart failure, coded as the **primary discharge
  diagnosis**

  - Follow-up: intention-to-treat from cohort entry through 36 months, with administrative
  censoring

  - Sample sizes after applying inclusion/exclusion criteria: empagliflozin n = 12,340;
  dapagliflozin n = 9,870

  - Measured confounders include 47 baseline covariates extracted from claims using
  ICD-10 and CPT codes

  - Concern exists about time-varying confounding by eGFR (available in EHR as LOINC-coded
  lab values) and HbA1c, which may lie on the causal pathway


  **Deliverables requested:**


  1. **Terminology and coding**: Specify the correct ICD-10-CM code(s) for hospitalized
  heart failure to use as the primary outcome, explain the appropriate MedDRA Preferred
  Term and System Organ Class for this adverse event, and identify the correct LOINC
  codes for eGFR (CKD-EPI equation) and HbA1c to extract from the EHR.


  2. **Study design and bias mitigation**: Explain how to handle immortal time bias
  in this setting, justify the choice of IPTW over propensity score matching given
  the sample sizes, and describe how marginal structural models should be applied
  to address time-varying confounding by eGFR and HbA1c while avoiding the problem
  of these variables being potential mediators.


  3. **Analytical pipeline**: Describe how to calculate PDC over 12 months to characterize
  adherence, specify which SMD threshold indicates acceptable covariate balance after
  IPTW, provide the stabilized weight formula, and outline how to assess the proportional
  hazards assumption in the final Cox model using Schoenfeld residuals.


  4. **Sensitivity analysis**: Propose an E-value calculation for an observed hazard
  ratio of 0.82 (95% CI: 0.71–0.95) and suggest two negative control outcomes appropriate
  for this drug class and data source.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: hard
