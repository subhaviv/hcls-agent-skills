id: genomics-variant-pipeline-11
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples from patients with suspected hereditary colorectal cancer syndrome. The
  pipeline uses BWA-MEM2 for alignment to GRCh38, GATK HaplotypeCaller in GVCF mode,
  and joint genotyping. Due to the small cohort size, the team is debating whether
  to apply VQSR or hard filters for variant refinement.


  During QC review of one sample (sample_CRC_017), the following metrics were flagged:
  mean target coverage of 38×, 14% of target bases below 20×, duplicate rate of 32%,
  and FastQC reports showing per-base quality dropping below Q28 in the last 15 bases
  of R2 reads. The sample was sequenced on an Illumina NovaSeq 6000 with 150 bp paired-end
  reads using a SureSelect Human All Exon V7 capture kit.


  After variant calling, a candidate variant was identified in **MLH1** (NM_000249.4):
  c.1852_1853delinsAA (p.Lys618Asn). This variant has the following annotations:

  - gnomAD v3.1.1 allele frequency: 0.000041 (8 heterozygotes, 0 homozygotes)

  - ClinVar: 2 submissions — one VUS (2019, single lab), one Likely Pathogenic (2021,
  CLIA lab, Lynch syndrome)

  - REVEL score: 0.74

  - SpliceAI delta score: 0.08 (acceptor gain)

  - The variant falls in the MLH1 ATPase domain; functional studies in a 2022 publication
  demonstrated partial MMR deficiency (~40% reduction in repair activity) in a cell-based
  assay


  **Deliverables requested:**


  1. Recommend and justify a variant filtering strategy (VQSR vs. hard filters) for
  this cohort, including specific GATK hard filter thresholds if applicable.


  2. Evaluate the QC metrics for sample_CRC_017 and provide a concrete remediation
  plan, including any fastp trimming parameters and mosdepth commands to quantify
  the low-coverage regions using the assumed default file naming conventions.


  3. Perform a full ACMG/AMP 2015 germline variant classification for the MLH1 c.1852_1853delinsAA
  variant, explicitly invoking or rejecting each applicable criterion (PS3, PM2, PP3,
  BP4, BP7, PP5, and any others relevant), and provide a final classification with
  clinical reporting recommendation.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: easy
