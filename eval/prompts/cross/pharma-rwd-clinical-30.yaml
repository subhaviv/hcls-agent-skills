id: pharma-rwd-clinical-30
prompt: 'You are a pharmacoepidemiologist at a large health system with access to
  a commercial claims database containing 4.2 million continuously enrolled members
  (2018–2023). Your team is designing a real-world evidence study to evaluate whether
  empagliflozin (SGLT2 inhibitor) reduces the risk of acute kidney injury (AKI) compared
  to sitagliptin (DPP-4 inhibitor) in patients with type 2 diabetes and stage 3 chronic
  kidney disease (CKD).


  **Deliver the following:**


  1. **Target Trial Emulation Protocol**: Define the eligibility criteria, time zero,
  treatment strategies, and outcomes for a target trial emulation. Explain how you
  will implement a new-user active comparator design to avoid prevalent user bias
  and confounding by indication. Describe the washout period logic and how you will
  handle immortal time bias in the exposure definition window.


  2. **Cohort Identification Code Plan**: Specify the exact ICD-10-CM code sets for
  type 2 diabetes (E11.xx) and stage 3 CKD (N18.3x), the NDC code strategy for empagliflozin
  vs. sitagliptin identification (including combination products), and CPT codes for
  nephrology visits that will serve as CKD severity proxies. Explain how you will
  calculate PDC over a 180-day baseline window to confirm adherence and exclude non-initiators.


  3. **Propensity Score Analysis and Balance Diagnostics**: Describe the propensity
  score model covariates (minimum 8 specific variables), your choice between IPTW
  with stabilized weights vs. 1:1 nearest-neighbor matching (justify this choice given
  n=18,400 empagliflozin initiators and n=61,200 sitagliptin initiators), and the
  SMD threshold you will apply to declare balance. Specify how you will handle time-varying
  confounding from loop diuretic co-initiation using a marginal structural model.


  4. **Outcome Coding and Survival Analysis**: Define AKI using both ICD-10-CM codes
  (N17.xx hierarchy) and MedDRA preferred terms under the SOC "Renal and urinary disorders,"
  noting the relevant HLT grouping. Specify the LOINC codes for serum creatinine and
  eGFR that will serve as secondary biochemical endpoints. Present the Cox model specification
  including covariates, time scale, and how you will test the proportional hazards
  assumption using Schoenfeld residuals, plus interpret a hypothetical HR of 0.73
  (95% CI: 0.61–0.87) with an E-value calculation.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: hard
