id: pharma-rwd-clinical-16
prompt: 'You are a pharmacoepidemiologist at a large integrated health system with
  access to 5 years (2019–2023) of linked claims and EHR data covering 2.1 million
  commercially insured adults. Your team has been asked to evaluate whether initiating
  sodium-glucose cotransporter-2 (SGLT2) inhibitors versus dipeptidyl peptidase-4
  (DPP-4) inhibitors is associated with incident heart failure hospitalization among
  patients with type 2 diabetes who have no prior heart failure diagnosis.


  Your data warehouse contains pharmacy claims with NDC codes, medical claims with
  ICD-10-CM diagnosis codes, CPT-4 procedure codes, and structured EHR lab values
  including HbA1c and eGFR. You have identified 48,320 new users of SGLT2 inhibitors
  and 61,740 new users of DPP-4 inhibitors after applying a 365-day washout period
  with no prior use of either drug class.


  Please provide the following concrete deliverables:


  1. **Target trial emulation protocol**: Specify the eligibility criteria, time zero
  definition, treatment strategies, outcome definition, and follow-up rules that emulate
  a hypothetical randomized trial, explicitly addressing how you would avoid immortal
  time bias in cohort entry and outcome ascertainment.


  2. **Outcome and covariate coding scheme**: Define heart failure hospitalization
  using a defensible ICD-10-CM code grouping (specify at least 5 relevant codes with
  their descriptions), and map the primary outcome concept to its MedDRA Preferred
  Term and System Organ Class. Additionally, identify the LOINC codes for the two
  key laboratory confounders (HbA1c and eGFR) you would extract from the EHR.


  3. **Propensity score analysis plan**: Describe whether you would use propensity
  score matching, inverse probability of treatment weighting (IPTW) with stabilized
  weights, or stratification for this specific study, justifying your choice given
  the sample sizes. Include how you would assess covariate balance using standardized
  mean differences (SMD), and specify a trimming rule for extreme propensity scores.


  4. **Residual confounding assessment**: Calculate and interpret an E-value for a
  hypothetical observed hazard ratio of 0.74 (95% CI: 0.68–0.81), and propose one
  negative control outcome you would use to detect unmeasured confounding, explaining
  the biological rationale for why it should be null.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: intermediate
