id: genomics-variant-pipeline-28
prompt: 'A clinical genomics laboratory is processing a cohort of 45 hereditary breast/ovarian
  cancer patients sequenced on an Illumina NovaSeq 6000 (2×150 bp WES, ~100× mean
  target coverage, Agilent SureSelect Human All Exon V7 capture kit). The raw data
  consists of paired FASTQs (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`) per sample,
  a coordinate-sorted BAM (`sample.bam`), and a target intervals BED file. After running
  the pipeline, a variant of interest has been flagged in **BRCA2** (NM_000059.4):
  `chr13:32,340,300 C>T`, resulting in a **p.Arg2336Cys** missense substitution. Preliminary
  annotations show: gnomAD v3.1 non-cancer allele frequency = 0.00021 (NFE subpopulation
  = 0.00019), REVEL score = 0.74, CADD Phred = 24.1, SpliceAI delta scores all <0.05,
  ClinVar contains 3 submissions (2× VUS, 1× Likely Pathogenic from a single lab),
  and the patient has a strong family history of breast cancer (2 first-degree relatives
  affected before age 50).


  Please provide the following **four concrete deliverables**:


  1. **QC pipeline commands**: Write a complete shell script (using `fastp`, `mosdepth`,
  and `MultiQC`, with `THREADS=8` and `OUT=qc_out`) to assess adapter contamination,
  per-base quality, and on-target coverage uniformity for this WES dataset. Include
  a threshold-based pass/fail decision for mean on-target coverage and percentage
  of bases ≥20× coverage.


  2. **Variant calling workflow**: Provide the exact GATK commands (BWA-MEM2 alignment
  → HaplotypeCaller GVCF → GenomicsDBImport → GenotypeGVCFs) appropriate for this
  45-sample cohort, and justify whether VQSR or hard filtering should be applied at
  this cohort size for SNVs and indels separately.


  3. **ACMG/AMP variant classification**: Apply the 2015 ACMG/AMP framework systematically
  to the BRCA2 p.Arg2336Cys variant. Explicitly evaluate criteria PS1, PS3, PM1, PM2,
  PM5, PP2, PP3, PP5, BP4, and BS1, citing the specific data values provided. Assign
  a final five-tier classification with justification.


  4. **Reporting decision**: Given the final classification, state whether this variant
  should be reported as a primary finding under ACMG SF v3.1 guidelines and what clinical
  action should be recommended.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: hard
