id: genomics-variant-pipeline-23
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples (paired-end 150bp Illumina NovaSeq 6000, ~100x target coverage) from patients
  with suspected hereditary colorectal cancer syndrome. The samples were aligned with
  BWA-MEM2 to GRCh38, and you have coordinate-sorted BAMs with indices, paired FASTQs
  (sample_R1.fastq.gz / sample_R2.fastq.gz), reference ref.fasta, and a SureSelect
  CRC panel BED file covering 127 genes including MLH1, MSH2, MSH6, PMS2, and APC.


  During variant calling with GATK HaplotypeCaller in GVCF mode followed by GenomicsDBImport
  joint genotyping, the team is deciding whether to apply VQSR or hard filters given
  the cohort size. Additionally, three samples show unexpectedly low mean target coverage
  (~28x) and elevated duplicate rates (>35%) flagged during preliminary review.


  After joint genotyping, the following variant was identified in 2/45 patients in
  MSH2 (NM_000251.3): c.942+3A>T — a deep intronic-adjacent splice-region variant.
  The variant has the following computational annotations: SpliceAI delta score =
  0.61 (acceptor loss), CADD Phred = 24.3, gnomAD v3.1 allele frequency = 0.000032
  (8 heterozygotes, 0 homozygotes), ClinVar = 2 submissions as VUS (no stars), and
  no functional studies are available. The gene MSH2 has definitive ClinGen gene-disease
  validity for Lynch syndrome.


  Please provide the following concrete deliverables:


  1. **QC pipeline**: A bash command sequence using fastp, mosdepth, and MultiQC (THREADS=8,
  OUT=qc_out) to assess the three problematic samples, including a threshold-based
  decision rule for whether to resequence or proceed.


  2. **Variant calling decision**: Justify whether VQSR or hard filters should be
  applied for this cohort, and provide the specific GATK hard-filter expressions for
  SNVs and indels if hard filtering is chosen.


  3. **Variant classification**: Apply ACMG/AMP 2015 criteria to c.942+3A>T in MSH2,
  explicitly evaluating PVS1 applicability, PM2, PP3, and BP4, and provide a final
  classification with a one-paragraph clinical reporting recommendation.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: easy
