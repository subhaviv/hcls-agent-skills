id: pharma-rwd-clinical-13
prompt: 'You are a pharmacoepidemiologist tasked with designing and executing a real-world
  evidence study using a large US commercial claims database (Optum Clinformatics,
  2015–2023, approximately 18 million continuously enrolled members) to evaluate whether
  initiation of sodium-glucose cotransporter-2 (SGLT2) inhibitors versus dipeptidyl
  peptidase-4 (DPP-4) inhibitors is associated with reduced risk of hospitalized heart
  failure among adults with type 2 diabetes.


  Please provide the following concrete deliverables:


  **1. Target Trial Emulation Protocol**

  Specify the eligibility criteria, treatment strategies, assignment procedures, follow-up
  period, and outcome definition for the emulated target trial. Explicitly address
  how you will implement a new-user active comparator design, define the index date,
  apply a 365-day washout period, and avoid immortal time bias in follow-up accrual.


  **2. Outcome and Covariate Coding Schema**

  Define the hospitalized heart failure outcome using ICD-10-CM codes (specify primary
  discharge diagnosis codes, e.g., I50.x groupings), and map at least three key confounders
  — atrial fibrillation, chronic kidney disease, and prior diuretic use — to their
  appropriate ICD-10-CM code clusters and NDC drug class codes. Additionally, specify
  the MedDRA Preferred Term and System Organ Class under which heart failure adverse
  events would be coded in a parallel pharmacovigilance context.


  **3. Propensity Score Analysis and Balance Diagnostics**

  Describe how you will estimate a propensity score using baseline covariates extracted
  from claims, specify whether you will use 1:1 nearest-neighbor matching, inverse
  probability of treatment weighting (IPTW) with stabilized weights, or fine stratification
  — justifying your choice — and state the SMD threshold you will use to declare adequate
  balance. Include how you will handle time-varying confounding by HbA1c-driven treatment
  switching using a marginal structural model with stabilized IPTW.


  **4. Survival Analysis and Sensitivity Analyses**

  Specify the Kaplan-Meier estimator setup, the Cox proportional hazards model covariates,
  how you will test the proportional hazards assumption using Schoenfeld residuals,
  and two sensitivity analyses: (a) an E-value calculation to quantify unmeasured
  confounding, and (b) a negative control outcome analysis using appendicitis (ICD-10-CM
  K35–K37) to detect residual bias.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: easy
