id: pharma-rwd-clinical-27
prompt: 'You are a pharmacoepidemiologist at a large health system that has linked
  Medicare claims data (2018–2023, n = 847,000 beneficiaries) with EHR data to study
  the comparative effectiveness and safety of two SGLT2 inhibitors — empagliflozin
  versus dapagliflozin — for reducing hospitalized heart failure (HHF) in patients
  with type 2 diabetes and established cardiovascular disease.


  Your team must design and execute a rigorous real-world evidence study. Provide
  the following concrete deliverables:


  **1. Study Design Specification (pharmacoepidemiology)**

  Design a new-user active comparator cohort study emulating a target trial. Define
  the eligibility criteria, index date, washout period (justify the length), and explain
  how you will avoid immortal time bias in the exposure definition. Specify how you
  will handle time-varying confounding from loop diuretic initiation (a post-baseline
  covariate that is both a confounder and mediator) using marginal structural models
  with stabilized IPTW weights. Describe how you would assess residual unmeasured
  confounding using E-values, given an observed HR of 0.81 (95% CI: 0.71–0.93) favoring
  empagliflozin.


  **2. Cohort Identification and Analysis Pipeline (real-world data)**

  Specify the exact code types (ICD-10-CM, NDC, CPT) needed to identify: (a) the exposed
  cohorts using NDC codes for both drugs, (b) the outcome of hospitalized heart failure,
  and (c) the cardiovascular disease eligibility criterion. Describe how you would
  calculate PDC over a 12-month baseline period to exclude prevalent users, estimate
  propensity scores using a logistic model listing at least eight covariate domains,
  evaluate balance using SMD thresholds, and run a Cox proportional hazards model
  with assessment of the proportional hazards assumption via Schoenfeld residuals.


  **3. Adverse Event Coding and Terminology Mapping (clinical data standards)**

  The primary safety outcome is "diabetic ketoacidosis" and a secondary safety outcome
  is "urinary tract infection — complicated." For each: provide the correct MedDRA
  Preferred Term and System Organ Class, the corresponding ICD-10-CM codes (including
  relevant subgroups), and the SNOMED CT concept IDs. Additionally, explain whether
  you would aggregate the UTI outcome at the PT or HLT level for your AE frequency
  table and justify this choice given the regulatory context of an FDA post-marketing
  safety commitment.'
target_skills:
- pharmacoepidemiology
