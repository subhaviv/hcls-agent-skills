id: drug-discovery-structural-16
prompt: '## Research Question


  You are a computational drug discovery scientist working on a rare pediatric neurological
  disorder called **KCNQ3-associated epileptic encephalopathy**, caused by gain-of-function
  mutations in the KCNQ3 potassium channel (specifically the p.Arg230Cys variant).
  A phenotypic screen of 847 FDA-approved small molecules against a patient-derived
  iPSC neuron model identified 12 hits that normalized burst firing frequency by >60%
  at 10 µM. Of these 12 hits, your cheminformatics team has already filtered out 4
  compounds for PAINS flags, leaving **8 candidates** with the following properties
  relevant to your analysis:


  - **Compound A** (SMILES: `CC1=CC2=C(C=C1)N(CC(=O)NCC3=CC=CO3)C(=O)C2`): MW=298.3,
  cLogP=2.1, HBD=1, HBA=4, TPSA=58 Å², Tanimoto similarity 0.71 to retigabine (a known
  KCNQ2/3 opener)

  - **Compound B** (SMILES: `O=C(Nc1ccc(F)cc1)c1ccc(NC2CCCC2)nc1`): MW=313.4, cLogP=3.8,
  HBD=2, HBA=4, TPSA=62 Å²; originally approved for Type 2 diabetes (PPAR-γ agonist)

  - **Compound C** (SMILES: `CC(C)Cc1ccc(C(C)C(=O)O)cc1`): MW=206.3, cLogP=3.6, HBD=1,
  HBA=2, TPSA=37 Å²; an NSAID with known carbonic anhydrase off-target activity


  The KCNQ3 cryo-EM structure (PDB: 7CR2) shows a well-defined voltage-sensor domain
  and a cytoplasmic helical domain binding pocket (residues Trp265, Leu268, Phe272,
  Arg230) with an estimated druggability score of 0.82 (DoGSiteScorer).


  **Please provide the following deliverables:**


  1. **Repurposing evidence ranking**: Using a target-based and phenotype-based hybrid
  framework, rank Compounds A, B, and C by repurposing evidence strength. Query rationale
  should reference DGIdb/OpenTargets logic, existing safety data relevance for pediatric
  use, and mechanism-of-action overlap with KCNQ3 modulation.


  2. **Cheminformatics assessment**: For all three compounds, verify Lipinski and
  Veber rule compliance, flag any remaining druglikeness concerns, and interpret the
  Tanimoto similarity of Compound A to retigabine in the context of scaffold hopping
  versus direct analog risk.


  3. **Structure-based design strategy**: Propose a docking and virtual screening
  cascade using PDB 7CR2 to validate and prioritize the hits. Specify binding site
  preparation steps for the p.Arg230Cys mutant, recommend a scoring function and whether
  induced-fit docking is warranted, and outline a 3-step MM-GBSA re-scoring protocol
  to distinguish the candidates. Identify which compound is most suitable as a fragment-based
  starting point for lead optimization targeting the cytoplasmic helical domain.'
