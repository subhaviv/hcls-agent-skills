id: pharma-rwd-clinical-26
prompt: 'You are a pharmacoepidemiologist at a large health system with access to
  a commercial claims database containing 4.2 million continuously enrolled adults
  (2018–2023). Your team is designing a real-world evidence study to evaluate whether
  empagliflozin (SGLT2 inhibitor) reduces the risk of acute kidney injury (AKI) compared
  to sitagliptin (DPP-4 inhibitor) among patients with type 2 diabetes and stage 3
  chronic kidney disease (CKD).


  **Deliver the following concrete outputs:**


  **1. Study Design Specification (Pharmacoepidemiology)**

  Describe how you would implement a new-user active comparator design with target
  trial emulation. Explicitly address: (a) how to define the index date and a 365-day
  washout period to exclude prevalent users, (b) how immortal time bias could arise
  if patients must survive 90 days post-index to be classified as "adherent users"
  and how to avoid it, (c) your approach to time-varying confounding (e.g., eGFR trajectory,
  loop diuretic initiation) using marginal structural models with stabilized IPTW
  weights, and (d) how you would quantify residual unmeasured confounding using E-values
  given an observed hazard ratio of 0.74.


  **2. Cohort Identification Pipeline (RWD Cohort Analysis)**

  Specify the exact ICD-10-CM code groups and NDC-based drug identification logic
  needed to: (a) identify incident type 2 diabetes with stage 3 CKD (distinguish 3a
  vs. 3b using N18.31/N18.32), (b) identify new initiators of empagliflozin vs. sitagliptin
  using NDC codes with a 30-day supply lookback, (c) calculate 12-month PDC for each
  drug class with a grace period of 15 days, and (d) run a Cox proportional hazards
  model with the primary outcome being first AKI hospitalization, including Schoenfeld
  residual diagnostics for the proportional hazards assumption.


  **3. Outcome and Covariate Coding (Clinical Data Standards)**

  Construct a MedDRA-aligned AKI outcome definition by mapping the primary ICD-10-CM
  codes (N17.0, N17.1, N17.2, N17.9) to their corresponding MedDRA Preferred Terms
  and High-Level Terms within the Renal and Urinary Disorders SOC. Additionally, specify
  LOINC codes for the three key lab covariates (serum creatinine, eGFR CKD-EPI, urine
  albumin-to-creatinine ratio) and explain how you would handle patients with SNOMED
  CT–coded CKD concepts in a linked EHR component that must be crosswalked to ICD-10-CM
  for cohort inclusion.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: intermediate
