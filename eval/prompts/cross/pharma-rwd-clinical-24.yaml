id: pharma-rwd-clinical-24
prompt: 'Here is the research question:


  ---


  You are a pharmacoepidemiologist at a large health analytics firm tasked with evaluating
  whether new users of GLP-1 receptor agonists (GLP-1 RAs) have a lower risk of major
  adverse cardiovascular events (MACE) compared to new users of DPP-4 inhibitors among
  patients with type 2 diabetes, using a 2018–2023 commercial claims database containing
  4.2 million continuously enrolled members.


  **Please provide the following deliverables:**


  **1. Study Design Specification:** Using a target trial emulation framework with
  an active comparator new-user design, define the eligibility criteria, time zero,
  treatment strategies, and outcome. Explain how you will implement a 365-day washout
  period and 180-day baseline covariate assessment window to avoid prevalent user
  bias. Describe how you will handle time-varying confounding (e.g., HbA1c proxies,
  concomitant antihyperglycemic intensification) using marginal structural models
  with stabilized IPTW weights, and explain why standard Cox regression would be insufficient
  here.


  **2. Cohort Identification and Coding:** Provide the specific code types (NDC, ICD-10-CM,
  CPT) you would use to identify: (a) GLP-1 RA and DPP-4 inhibitor initiators using
  NDC codes, (b) the MACE composite outcome (MI, stroke, CV death) using ICD-10-CM
  codes with the relevant code ranges (e.g., I21.x, I63.x), and (c) baseline comorbidities
  including heart failure (I50.x) and CKD stages (N18.1–N18.6). Additionally, calculate
  the proportion of days covered (PDC) over the first 180 days post-initiation and
  define adherence as PDC ≥ 0.80. Specify how you would assess covariate balance using
  standardized mean differences (SMD < 0.10 threshold) after IPTW weighting.


  **3. Adverse Event Coding and Terminology Mapping:** The safety monitoring team
  needs to code pancreatitis events identified in claims (K85.0–K85.9) into MedDRA
  for regulatory submission. Map ICD-10-CM code K85.1 (Biliary acute pancreatitis)
  to its appropriate MedDRA hierarchy from LLT through SOC, and explain whether you
  would report this AE at the Preferred Term or HLT level in the primary safety table,
  and why. Also describe how SNOMED CT concept 197456007 would cross-map to this hierarchy
  for EHR-sourced events in a federated data network.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
