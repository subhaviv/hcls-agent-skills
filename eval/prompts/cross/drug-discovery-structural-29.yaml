id: drug-discovery-structural-29
prompt: '## Research Question


  You are a computational drug discovery scientist tasked with identifying repurposing
  candidates for **TRPM7 kinase**, a recently validated target in treatment-resistant
  glioblastoma (GBM). A CRISPR screen across 847 GBM patient-derived cells identified
  TRPM7 as a synthetic lethal partner with EGFR amplification (present in ~34% of
  GBM cases). The crystal structure of the TRPM7 kinase domain bound to a tool compound
  (PDB: 6BWS) has been resolved at 2.1 Å resolution, revealing a DFG-out inactive
  conformation with a well-defined allosteric back pocket (volume ~420 ų, hydrophobicity
  score 0.74).


  You have access to DGIdb and OpenTargets, and have pulled a shortlist of 12 approved
  kinase inhibitors with documented TRPM7 activity or structural similarity to known
  TRPM7 binders. Their SMILES strings are available, and preliminary Tanimoto similarity
  scores against the co-crystallized tool compound (Morgan radius=2, 2048-bit fingerprints)
  range from 0.31 to 0.78.


  **Deliverables required:**


  1. **Repurposing strategy**: Using the OpenTargets and DGIdb evidence hierarchy,
  rank the top 3 candidates from the shortlist by repurposing evidence strength. Describe
  whether a target-based or phenotype-based approach is more appropriate here, and
  justify your reasoning given the synthetic lethality context.


  2. **Cheminformatics filtering pipeline**: For all 12 candidates, describe a step-by-step
  RDKit pipeline to (a) compute Lipinski Ro5 and Veber descriptors, (b) flag PAINS
  scaffolds, and (c) apply a Tanimoto ≥ 0.45 cutoff against the tool compound. Specify
  which candidates would likely survive all three filters given that 5 of the 12 have
  molecular weight >550 Da and 3 contain known PAINS motifs (rhodanine and catechol
  substructures).


  3. **Structure-based assessment**: For the top surviving candidate post-filtering,
  outline a virtual screening cascade using the 6BWS allosteric pocket. Address whether
  induced-fit docking or rigid docking is more appropriate given the DFG-out conformation,
  recommend a scoring function hierarchy (e.g., Glide SP → MM-GBSA rescoring), and
  describe how you would validate predicted binding poses using a 100 ns MD simulation
  with RMSD and per-residue energy decomposition analysis.'
