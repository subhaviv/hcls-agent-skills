id: genomics-variant-pipeline-17
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples from patients with suspected hereditary colorectal cancer syndrome. The
  sequencing was performed on an Illumina NovaSeq 6000 (2×150 bp), and you have paired
  FASTQs (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`), a coordinate-sorted BAM (`sample.bam`),
  reference `hg38.fasta`, and a SureSelect CRC panel BED file covering 127 genes including
  *MLH1*, *MSH2*, *MSH6*, *PMS2*, and *APC*.


  During routine analysis, a novel variant `MLH1 c.1852_1853+4delAGGTAA` (a 6-bp deletion
  spanning the last 2 bases of exon 16 and the first 4 bases of intron 16) was identified
  in one proband. The following annotations were retrieved:


  - **gnomAD v4 AF**: 0.000018 (2 heterozygous alleles, 0 homozygous)

  - **SpliceAI scores**: DS_DL = 0.91, DS_AL = 0.04, DS_DP = 0.07, DS_AG = 0.02

  - **CADD Phred**: 28.4

  - **ClinVar**: not previously submitted

  - **OMIM**: MLH1 associated with Lynch syndrome (autosomal dominant, high penetrance)

  - **Functional assays**: none available


  Please provide the following deliverables:


  1. **QC assessment**: Write a complete bash pipeline (using `fastp`, `mosdepth`,
  and `Picard CollectHsMetrics`) to evaluate adapter contamination, on-target coverage,
  and mean depth for this sample. Specify the minimum coverage threshold you would
  require before proceeding to variant calling for a clinical CRC panel, and flag
  any QC failure criteria.


  2. **Variant calling rationale**: Given the cohort size of 45 samples, explain whether
  you would apply VQSR or hard filters for germline variant calling using GATK HaplotypeCaller
  in GVCF mode. Justify your choice with specific parameter recommendations for WES
  data, and describe how you would configure the joint genotyping step.


  3. **Variant classification**: Apply the ACMG/AMP 2015 criteria to classify `MLH1
  c.1852_1853+4delAGGTAA`. Explicitly evaluate PVS1 applicability given the SpliceAI
  scores, assign all applicable criteria with evidence codes (e.g., PM2, PP3), and
  provide a final classification with clinical reporting recommendation.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: intermediate
