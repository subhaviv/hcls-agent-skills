id: genomics-variant-pipeline-13
prompt: 'A clinical genomics laboratory is processing whole-exome sequencing data
  from a 47-year-old patient with a strong family history of hereditary breast and
  ovarian cancer syndrome. The sequencing was performed on an Illumina NovaSeq 6000
  (2×150 bp), yielding paired FASTQs (`BRCA_patient_R1.fastq.gz` / `BRCA_patient_R2.fastq.gz`).
  A coordinate-sorted BAM (`BRCA_patient.bam`) has already been generated using BWA-MEM2
  against hg38, and a target intervals file (`agilent_sureselect_v7.bed`) is available.
  The reference is `hg38.fasta`.


  During preliminary analysis, two variants of interest were flagged in the VCF after
  GATK HaplotypeCaller germline calling:


  **Variant A:** `BRCA2 c.8331+2T>C` — a canonical splice site variant. SpliceAI delta
  score: 0.91. ClinVar has 3 submissions: 2× VUS, 1× Likely Pathogenic (no stars).
  gnomAD v3.1 allele frequency: 0.000008 (3 heterozygotes, 0 homozygotes). REVEL score:
  N/A (splice variant).


  **Variant B:** `BRCA1 p.Arg1699Trp (c.5095C>T)` — a missense variant. REVEL score:
  0.74. CADD Phred: 28.3. gnomAD v3.1 AF: 0.00004. ClinVar: 2× VUS (no stars). The
  variant falls outside known RING or BRCT functional domains.


  Please provide the following deliverables:


  1. **QC Assessment:** Write a complete shell script using `fastp`, `mosdepth`, and
  `MultiQC` (assume `THREADS=8`, `OUT=qc_out`) to assess sequencing quality and WES
  coverage, and specify the minimum mean target coverage threshold and uniformity
  metric you would require before proceeding to variant calling.


  2. **Variant Calling Pipeline:** Describe the complete GATK HaplotypeCaller germline
  calling command for this single-sample WES case, including appropriate flags for
  WES mode, and explain whether VQSR or hard filtering is appropriate here and why.


  3. **Variant Interpretation:** Apply ACMG/AMP 2015 criteria to both Variant A and
  Variant B independently. For each variant, enumerate every applicable criterion
  (with evidence strength), assign a final classification, and explicitly justify
  whether PVS1 applies to Variant A given the SpliceAI score and canonical splice
  site context.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: easy
