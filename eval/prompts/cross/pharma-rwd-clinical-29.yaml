id: pharma-rwd-clinical-29
prompt: 'You are a pharmacoepidemiologist tasked with designing and executing a real-world
  evidence study using a large US commercial claims database (Optum Clinformatics,
  2018–2023, approximately 18 million continuously enrolled members) to evaluate the
  comparative safety of two GLP-1 receptor agonists — semaglutide versus dulaglutide
  — with respect to incident acute pancreatitis.


  Please provide the following concrete deliverables:


  **1. Study Design Specification (Target Trial Emulation)**

  Define the target trial protocol including eligibility criteria, treatment strategies,
  assignment procedures, follow-up, and outcome definition. Specify how you will implement
  a new-user active comparator design, define the washout period (justify your chosen
  duration), and explain how you will avoid immortal time bias in the index date assignment.
  Describe how time-varying confounding by HbA1c trajectory and concomitant medication
  use will be handled using marginal structural models with stabilized IPTW, and explain
  when you would prefer this approach over propensity score matching.


  **2. Cohort Identification Code Specification**

  Provide the specific ICD-10-CM code(s) for acute pancreatitis outcome identification
  (justify your choice of granularity using ICD-10 structural logic), the NDC-level
  drug identification strategy for semaglutide versus dulaglutide (distinguishing
  injectable from oral formulations), and CPT codes relevant to confirming pancreatitis-related
  hospitalization. Additionally, map the acute pancreatitis outcome to its correct
  MedDRA hierarchy levels (LLT → PT → HLT → HLGT → SOC) and explain whether you would
  use PT-level or HLT-level aggregation for your primary safety endpoint, given a
  scenario where you have 47 outcome events.


  **3. Balance Diagnostics and Survival Analysis Plan**

  Specify at least eight covariates to include in propensity score estimation (with
  their corresponding ICD-10 or NDC code families), define your SMD threshold for
  acceptable balance, describe how you would assess the proportional hazards assumption
  using Schoenfeld residuals, and explain what you would do if the assumption is violated.
  Calculate and interpret an E-value for a hypothetical weighted hazard ratio of 1.82
  (95% CI: 1.11–2.98) to quantify robustness to unmeasured confounding.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
