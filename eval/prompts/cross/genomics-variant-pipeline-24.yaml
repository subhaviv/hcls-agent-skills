id: genomics-variant-pipeline-24
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline whole-exome
  sequencing samples (paired-end 150bp Illumina NovaSeq 6000) for a hereditary cancer
  study. The pipeline uses BWA-MEM2 for alignment to GRCh38, followed by GATK HaplotypeCaller
  in GVCF mode and joint genotyping. You have coordinate-sorted BAMs, paired FASTQs
  (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`), target intervals (`agilent_sureselect_v7.bed`),
  and reference `hg38.fasta`. Assume `THREADS=8` and `OUT=qc_out`.


  During QC review, one sample (NA_CRC_031) shows mean target coverage of 38×, with
  72% of bases above 20×, a duplication rate of 34%, and FastQC flags adapter contamination
  in reads 1–10bp. A second sample (NA_CRC_019) has a Ti/Tv ratio of 1.94 on the exome
  target regions.


  After joint genotyping across all 45 samples, VQSR was attempted but failed the
  SNP model due to insufficient variant counts. In the resulting VCF, the following
  variant is flagged for clinical review in gene **MLH1** (NM_000249.4): `chr3:37,067,436
  C>T`, predicted to create a stop codon at p.Arg265Ter. Annotation shows: gnomAD
  v3.1 allele frequency = 0.000008 (2 heterozygotes, 0 homozygotes), CADD Phred =
  44, SpliceAI delta scores all < 0.1, ClinVar has two submissions — one "Likely Pathogenic"
  (2019, no functional evidence cited) and one "VUS" (2021, computational evidence
  only). The variant is absent from the LOVD MLH1 database.


  Please provide the following deliverables:


  1. **QC remediation plan** for NA_CRC_031 and NA_CRC_019, including specific fastp/Picard
  commands and thresholds for pass/fail decisions.

  2. **Variant calling fix** for the failed VQSR step, recommending an appropriate
  alternative strategy with justified GATK parameters for this cohort size.

  3. **ACMG/AMP variant classification** for the MLH1 `p.Arg265Ter` variant, explicitly
  applying each relevant criterion (PVS1, PM2, PP5, etc.), resolving the conflicting
  ClinVar submissions, and providing a final classification with clinical reporting
  recommendation.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: intermediate
