id: genomics-variant-pipeline-21
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples from patients with suspected hereditary colorectal cancer syndrome. The
  sequencing was performed on an Illumina NovaSeq 6000 (2×150 bp), and you have paired
  FASTQs (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`), a coordinate-sorted BAM (`sample.bam`),
  reference `hg38.fasta`, and a SureSelect Human All Exon V7 target BED file.


  During pipeline execution, FastQC flagged one sample (CRC_044) with mean Q-score
  of 28.5, adapter content >12% in the last 15 bases, and a duplication rate of 41%
  reported by Picard MarkDuplicates. Coverage analysis via mosdepth shows 78% of target
  bases at ≥20× for this sample, compared to a cohort median of 94%.


  Variant calling with GATK HaplotypeCaller (GVCF mode) and joint genotyping across
  all 45 samples produced a raw VCF. Given the cohort size, you must decide between
  VQSR and hard filtering. After filtering, a candidate variant in **MLH1** was identified
  in CRC_044:


  - **Variant**: chr3:37,067,436 C>T (NM_000249.4: c.1852_1853+2delinsTA)

  - **gnomAD v3.1 AF**: 0.000008 (2 heterozygotes, 0 homozygotes)

  - **CADD Phred**: 27.4

  - **SpliceAI delta score**: 0.91 (donor loss)

  - **ClinVar**: 1 submission, "Uncertain significance," no functional studies

  - **REVEL**: 0.74


  Please provide the following deliverables:


  1. A complete fastp command to remediate the QC issues in CRC_044, including parameters
  justified by the observed metrics, and specify which MultiQC modules should be prioritized
  for cohort-level review.

  2. A decision and justification for VQSR versus hard filtering for this 45-sample
  cohort, including the specific GATK command structure for the chosen approach.

  3. A full ACMG/AMP variant classification for the MLH1 variant, explicitly invoking
  or rejecting PVS1, PP3, PM2, and any other applicable criteria, concluding with
  a final classification tier and clinical reporting recommendation given the QC concerns
  in CRC_044.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: easy
