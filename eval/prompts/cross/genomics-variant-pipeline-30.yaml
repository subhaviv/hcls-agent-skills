id: genomics-variant-pipeline-30
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples from patients with suspected hereditary breast and ovarian cancer syndrome.
  The sequencing was performed on an Illumina NovaSeq 6000 (2×150 bp), and the raw
  data consists of paired FASTQs (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`) per
  sample, a coordinate-sorted BAM (`sample.bam`), and a target intervals BED file
  covering the BRCA1/BRCA2 panel regions. Initial FastQC reports flagged adapter contamination
  in 8 samples, and mosdepth output shows 6 samples with mean target coverage below
  30×.


  During variant calling with GATK HaplotypeCaller in GVCF mode followed by joint
  genotyping, the team is debating whether to apply VQSR or hard filters given the
  cohort size of 45 samples. One sample, HBOC-031, carries a candidate variant in
  BRCA2: `chr13:32338837 C>T`, which introduces a premature stop codon (p.Arg2336Ter).
  A second variant in the same sample, `chr13:32914438 A>G` in BRCA2, is a missense
  change (p.Asn3124Ser) with a REVEL score of 0.62, a CADD score of 22, and a SpliceAI
  delta score of 0.08. gnomAD v3.1 reports the missense variant at an allele frequency
  of 0.0004 in the non-Finnish European population. ClinVar contains two submissions
  for the missense variant: one VUS from a clinical lab in 2019 and one likely pathogenic
  from a research group in 2021, with no starred review status on either.


  Please provide the following deliverables:


  1. A complete QC remediation plan for the flagged samples, including specific fastp
  adapter-trimming commands and the coverage threshold decision for downstream inclusion/exclusion.

  2. A justified recommendation on VQSR versus hard filtering for this 45-sample WES
  cohort, including the specific GATK command adjustments needed.

  3. A full ACMG/AMP 2015 variant classification for both the nonsense variant (p.Arg2336Ter)
  and the missense variant (p.Asn3124Ser), explicitly invoking each applicable criterion
  (PVS1, PS, PM, PP, BA1, BS, BP) with supporting evidence and a final classification
  for each.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: hard
