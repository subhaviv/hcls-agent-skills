id: genomics-variant-pipeline-18
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples from patients with suspected hereditary colorectal cancer syndrome. The
  sequencing was performed on Illumina NovaSeq 6000 (2×150 bp), and the raw data consists
  of paired FASTQs (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`) per sample, along
  with a coordinate-sorted BAM (`sample.bam`) aligned to GRCh38 using BWA-MEM2. A
  target interval BED file (`agilent_sureselect_v7.bed`) is available. The pipeline
  uses GATK HaplotypeCaller in GVCF mode followed by joint genotyping across all 45
  samples.


  During QC review, one sample (HCC-031) shows a mean target coverage of 28× with
  72% of bases exceeding 20× depth, flagged by mosdepth. After variant calling and
  VQSR filtering, a candidate variant is identified in **MLH1** (NM_000249.4): `chr3:37,067,251
  C>T`, resulting in a canonical splice site disruption at the donor site of intron
  13 (c.1731+1G>A in complementary notation). The variant has the following annotations:


  - **gnomAD v3.1.2 AF**: 0.000008 (2 heterozygous alleles in 251,000 total alleles)

  - **ClinVar**: 2 submissions — one "Likely Pathogenic" (germline, 2019), one "VUS"
  (germline, 2021), no star rating consensus

  - **SpliceAI delta score**: 0.91 (donor loss)

  - **CADD Phred**: 34.2

  - **REVEL**: N/A (splice variant)


  Please provide the following deliverables:


  1. **QC assessment**: Given the coverage metrics for HCC-031, determine whether
  this sample meets standard WES quality thresholds for clinical variant reporting,
  referencing relevant Picard/mosdepth metrics and any recommended remediation steps
  using fastp or MultiQC review.


  2. **Pipeline decision**: With only 45 samples, evaluate whether VQSR or hard filtering
  is more appropriate for this cohort, specifying which VQSR tranches and annotations
  you would use for SNVs versus indels, or justifying hard filter cutoffs if VQSR
  is inappropriate.


  3. **Variant classification**: Apply the ACMG/AMP 2015 framework to classify the
  MLH1 c.1731+1G>A variant, explicitly invoking or rejecting each applicable criterion
  (PVS1, PS, PM, PP, BA1, BS, BP) with justification, and provide a final classification
  with confidence rationale.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: hard
