id: pharma-rwd-clinical-20
prompt: 'A large integrated health system has provided you with 4 years (2019–2022)
  of linked commercial claims and EHR data covering 2.3 million commercially insured
  adults. You are tasked with designing and executing a pharmacoepidemiologic study
  evaluating whether initiation of sodium-glucose cotransporter-2 (SGLT2) inhibitors
  is associated with a reduced risk of hospitalized heart failure compared with initiation
  of dipeptidyl peptidase-4 (DPP-4) inhibitors among patients with type 2 diabetes.
  The study must use an active comparator new-user design to emulate a target trial.
  The dataset contains 41,200 new users of SGLT2 inhibitors and 38,750 new users of
  DPP-4 inhibitors identified after a 365-day washout period.


  Please provide ALL of the following deliverables:


  **1. Cohort Definition & Coding Framework**

  Specify the ICD-10-CM diagnosis codes (with grouping rationale) for type 2 diabetes
  and heart failure that you would use for cohort entry and outcome ascertainment.
  Identify the appropriate MedDRA Preferred Terms and System Organ Class for the primary
  outcome (hospitalized heart failure) and at least two negative control outcomes,
  explaining your terminology mapping decisions and why you selected these specific
  MedDRA hierarchy levels rather than HLT-level groupings.


  **2. Study Design & Bias Mitigation**

  Describe how you would structure the target trial emulation, define the index date,
  handle immortal time bias, and address time-varying confounding by HbA1c and eGFR
  using marginal structural models with stabilized inverse probability of treatment
  weights (IPTW). Specify the weight-trimming strategy and how you would detect violations
  of the positivity assumption.


  **3. Cohort Analysis Pipeline**

  Detail the propensity score estimation approach including which covariates to include,
  how to assess balance using standardized mean differences (SMD threshold ≤0.10),
  and how to construct Kaplan-Meier curves and a weighted Cox proportional hazards
  model. Explain how you would assess the proportional hazards assumption using Schoenfeld
  residuals, and calculate the proportion of days covered (PDC) over 12 months to
  define an as-treated sensitivity analysis.


  **4. Unmeasured Confounding Assessment**

  Compute an E-value interpretation for a hypothetical hazard ratio of 0.74 (95% CI:
  0.68–0.81) and explain what strength of unmeasured confounding would be required
  to fully explain away this association.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: hard
