id: genomics-variant-pipeline-20
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples (paired-end 150bp Illumina NovaSeq 6000) from patients with suspected hereditary
  colorectal cancer syndrome. The pipeline uses BWA-MEM2 for alignment to GRCh38,
  followed by GATK HaplotypeCaller in GVCF mode and joint genotyping. Raw FASTQs are
  available as `sample_R1.fastq.gz` / `sample_R2.fastq.gz`, the coordinate-sorted
  BAM is `sample.bam`, and the reference is `ref.fasta`. Target intervals covering
  98Mb of exonic sequence are provided.


  After joint genotyping, a critical variant of interest emerges in **MLH1** (NM_000249.4):
  `chr3:37,090,074 C>T`, resulting in a canonical splice site disruption at the intron
  14 donor site (c.1731+1G>A in legacy coordinates). SpliceAI delta score is 0.91
  (DS_DL). The variant appears in 3/45 affected probands, is absent from gnomAD v4
  non-cancer genomes, has one conflicting ClinVar submission (one lab classified it
  as VUS in 2019, one as Likely Pathogenic in 2022), and the CADD Phred score is 34.2.
  Co-segregation data shows the variant tracks with disease in 2 of 3 families (LOD
  ~1.1).


  **Please provide the following deliverables:**


  1. **QC assessment**: Write a complete shell script using fastp, mosdepth, Picard
  CollectHsMetrics, and MultiQC to evaluate adapter contamination, mean target coverage
  (flag if <100×), and on-target rate for this WES cohort. Include thresholds that
  would trigger sample failure.


  2. **Variant calling configuration**: Specify the exact GATK HaplotypeCaller and
  GenotypeGVCFs parameters appropriate for this 45-sample WES cohort, including whether
  to use VQSR or hard filters (justify based on cohort size), and any MLH1-region-specific
  considerations such as interval padding.


  3. **Variant classification**: Classify `chr3:37,090,074 C>T` using ACMG/AMP 2015
  criteria. Explicitly evaluate PVS1, PM2, PP3, BS1, and BP4 criteria, reconcile the
  conflicting ClinVar submissions, assess whether the SpliceAI score meets the threshold
  for strong functional evidence, and provide a final classification with a clinical
  reporting recommendation.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: hard
