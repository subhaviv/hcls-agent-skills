id: pharma-rwd-clinical-12
prompt: 'You are a pharmacoepidemiologist at a large health system with access to
  a commercial claims database containing 4.2 million continuously enrolled adult
  members (2018–2023). Your team is designing a real-world evidence study to evaluate
  whether empagliflozin (SGLT2 inhibitor) reduces the risk of acute kidney injury
  (AKI) compared to sitagliptin (DPP-4 inhibitor) among patients with type 2 diabetes
  and stage 3 chronic kidney disease (CKD).


  **Deliverable 1 — Study Design Protocol:**

  Specify a complete target trial emulation framework for this comparison, including:
  (a) how to define a new-user active comparator design with a 180-day washout period,
  (b) how to handle immortal time bias given that some patients fill their index prescription
  on day 0 while others have a 3–7 day pharmacy lag, (c) whether IPTW with stabilized
  weights or 1:1 propensity score matching is more appropriate given an anticipated
  70/30 empagliflozin/sitagliptin split, and (d) how time-varying confounding from
  loop diuretic initiation during follow-up should be addressed using marginal structural
  models.


  **Deliverable 2 — Cohort Identification and Coding:**

  Provide the specific ICD-10-CM code sets to identify type 2 diabetes (with and without
  CKD stage 3 complication codes), the NDC product class codes or RxNorm concept identifiers
  for empagliflozin and sitagliptin, and the ICD-10-CM and CPT codes to define AKI
  as the primary outcome. Then map the AKI outcome to its correct MedDRA hierarchy
  from LLT through SOC, and identify the appropriate SNOMED CT concept for "Stage
  3 chronic kidney disease" and explain how it differs from the ICD-10 representation.


  **Deliverable 3 — Analysis and Validation:**

  Describe how to calculate the proportion of days covered (PDC) over a 12-month follow-up
  to define a per-protocol sensitivity analysis, run a Cox proportional hazards model
  with Schoenfeld residual diagnostics to verify the proportional hazards assumption,
  compute an E-value for an estimated hazard ratio of 0.74 (95% CI: 0.61–0.89), and
  propose two negative control outcomes to assess residual confounding, justifying
  each choice based on biological plausibility.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: easy
