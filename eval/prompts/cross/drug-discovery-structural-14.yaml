id: drug-discovery-structural-14
prompt: 'A rare pediatric glioma cohort study (n=847 patients) has identified aberrant
  overexpression of DYRK1B kinase as a primary oncogenic driver, with 73% of tumors
  showing DYRK1B amplification confirmed by RNA-seq. You are tasked with designing
  a computational drug repurposing and hit identification pipeline to accelerate therapeutic
  development.


  **Repurposing component:** Using OpenTargets and DGIdb, you have retrieved a shortlist
  of five approved drugs with documented DYRK1B or DYRK-family interactions: harmine
  (MAO-A inhibitor with DYRK1A activity), AZ191 (DYRK1B-selective, investigational),
  INDY (DYRK1/2 inhibitor), leucettine L41 (CLK/DYRK inhibitor), and palbociclib (CDK4/6
  inhibitor with reported DYRK1B off-target binding at IC₅₀ ~2.1 µM). Rank these five
  candidates using a repurposing evidence hierarchy, explicitly addressing mechanism-of-action
  overlap with DYRK1B oncogenic signaling, existing pediatric safety data, and clinical
  translatability. Justify whether a target-based or phenotype-based repurposing strategy
  is more appropriate here.


  **Cheminformatics component:** The SMILES strings for all five compounds are available.
  Describe the complete RDKit pipeline you would run to: (a) calculate Lipinski Ro5
  and Veber descriptors, flagging any violations; (b) screen for PAINS substructures;
  (c) compute pairwise Morgan fingerprint (radius=2, 2048 bits) Tanimoto similarity
  matrix and identify any compound pairs with similarity >0.4 that might represent
  a tractable chemical series for optimization. Specify which compounds you would
  deprioritize and why.


  **Structure-based design component:** DYRK1B has a resolved crystal structure (PDB:
  3DNF) with a well-defined ATP-binding pocket (volume ~820 ų, DogSiteScorer druggability
  score 0.83). For the top-ranked repurposing candidate surviving your cheminformatics
  filters, outline a complete virtual screening cascade: define binding site preparation
  steps, justify your choice between rigid docking and induced-fit docking given DYRK1B''s
  glycine-rich loop flexibility, recommend an appropriate scoring function with rationale,
  and describe how you would apply MM-GBSA rescoring with explicit solvent treatment
  to prioritize the final top-10 poses for experimental validation.


  Provide all three components as integrated, sequential deliverables.'
target_skills:
- drug-repurposing
- cheminformatics
- structure-based-drug-design
domain: drug-discovery
difficulty: intermediate
