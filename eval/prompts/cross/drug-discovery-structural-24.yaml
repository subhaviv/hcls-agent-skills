id: drug-discovery-structural-24
prompt: 'A rare pediatric glioma cohort study (n=847 patients) has identified recurrent
  activating mutations in FGFR2 (K659E and N549H) correlating with poor prognosis.
  Your team wants to rapidly identify repurposable approved drugs targeting FGFR2
  and evaluate their suitability for CNS penetration and binding compatibility with
  the mutant receptor.


  You have pulled the following candidate drugs from DGIdb and OpenTargets with known
  FGFR2 interactions: **erdafitinib** (SMILES: `COc1cc2ncnc(Nc3ccc(N4CCN(C)CC4)c(OC)c3)c2cc1/C=C/CN(C)C`),
  **pemigatinib** (SMILES: `COc1cnc(Nc2nc3cc(OCC(F)(F)F)ccc3s2)nc1OC`), and **infigratinib**
  (SMILES: `CS(=O)(=O)Nc1ccc(Oc2cc3c(Nc4ccc(Cl)c(Cl)c4)ncnc3[nH]2)cc1`).


  Given this context, provide the following deliverables:


  1. **Repurposing Evidence Ranking**: Using a target-based repurposing framework,
  rank the three candidates by strength of evidence for FGFR2 K659E and N549H coverage,
  referencing mechanism-of-action overlap, existing clinical data in related FGFR-driven
  cancers, and known resistance profiles. Justify your ranking using the repurposing
  evidence hierarchy (genetic association → preclinical → clinical).


  2. **Cheminformatics Filtering**: For all three compounds, calculate key Lipinski
  and Veber descriptors (MW, logP, HBD, HBA, TPSA, rotatable bonds) and assess CNS
  penetration likelihood using a BBB-relevant TPSA cutoff (≤90 Ų). Additionally, compute
  pairwise Tanimoto similarity using Morgan fingerprints (radius=2, nBits=2048) and
  flag any PAINS substructures.


  3. **Structure-Based Assessment**: The FGFR2 K659E mutant crystal structure (PDB:
  2PVF, modified in silico) shows a gatekeeper region shift creating a 1.8 Å displacement
  in the DFG motif. Describe a docking strategy to evaluate each candidate''s binding
  pose in this mutant context, specifying whether induced-fit docking or rigid docking
  is appropriate, which scoring function to use, and how you would validate binding
  predictions using MM-GBSA rescoring. Identify which structural features of the candidates
  are most critical for maintaining kinase hinge-region contacts given the DFG shift.'
target_skills:
- drug-repurposing
- cheminformatics
- structure-based-drug-design
domain: drug-discovery
difficulty: intermediate
