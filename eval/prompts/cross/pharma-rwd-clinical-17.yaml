id: pharma-rwd-clinical-17
prompt: 'You are a pharmacoepidemiologist at a large health system with access to
  a commercial claims database containing 2.4 million patients with Type 2 diabetes
  diagnosed between 2018–2023. Your team is designing a real-world evidence study
  to evaluate whether SGLT2 inhibitors (specifically empagliflozin, identified by
  NDC prefix 00597-0188) reduce the risk of hospitalized heart failure compared to
  DPP-4 inhibitors (sitagliptin, NDC prefix 00006-0277) as an active comparator.


  The database contains ICD-10-CM diagnosis codes, NDC drug codes, CPT procedure codes,
  and structured lab results. Your preliminary cohort has 187,420 new users of empagliflozin
  and 203,115 new users of sitagliptin after applying a 365-day washout period. Hospitalized
  heart failure will be defined using ICD-10-CM codes I50.x (all subtypes), and you
  must map these codes to their corresponding MedDRA Preferred Terms and System Organ
  Class for regulatory submission, as well as identify the appropriate LOINC codes
  for NT-proBNP lab values that will serve as a time-varying covariate.


  Please provide the following concrete deliverables:


  1. **Target trial emulation protocol**: Specify the eligibility criteria, time zero
  definition, treatment strategies, outcome definition, and follow-up rules that emulate
  a hypothetical randomized trial, explicitly addressing how immortal time bias is
  avoided.


  2. **Propensity score analysis plan**: Identify at least eight clinically relevant
  covariates (with their ICD-10 or CPT code representations), specify whether you
  would use IPTW with stabilized weights or propensity score matching and justify
  the choice, and define your SMD threshold for acceptable balance.


  3. **Survival analysis pipeline**: Describe the Kaplan-Meier and Cox proportional
  hazards modeling steps, including how you would handle time-varying confounding
  by HbA1c (LOINC code 4548-4) using marginal structural models, and how you would
  test the proportional hazards assumption using Schoenfeld residuals.


  4. **Terminology mapping table**: Provide the MedDRA hierarchy (LLT → PT → HLT →
  HLGT → SOC) for at least three ICD-10 I50.x subtypes, and identify the LOINC code
  and component name for NT-proBNP.


  5. **Unmeasured confounding assessment**: Calculate or interpret an E-value for
  a hypothetical hazard ratio of 0.78 (95% CI: 0.71–0.86) and propose two negative
  control outcomes appropriate for this study.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: intermediate
