id: genomics-variant-pipeline-22
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline whole-exome
  sequencing samples from patients with suspected hereditary colorectal cancer syndrome.
  The sequencing was performed on an Illumina NovaSeq 6000 (2×150 bp), and you have
  paired FASTQs (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`), a coordinate-sorted
  BAM (`sample.bam`), reference genome `hg38.fasta`, and a SureSelect CRC panel BED
  file (`crc_targets.bed`). One index case (patient CRC-017) has a candidate variant
  flagged in **MLH1**: `chr3:37,067,251 C>T`, resulting in a predicted splice-site
  change 3 bp upstream of exon 12 (SpliceAI delta score: 0.61, CADD: 28.4, REVEL:
  0.74). ClinVar shows two submissions: one "Uncertain Significance" (2019, no evidence
  provided) and one "Likely Pathogenic" (2022, functional study cited). gnomAD v3.1
  shows an allele frequency of 0.000031 (4 heterozygotes, 0 homozygotes) in the non-Finnish
  European population.


  **Please provide the following deliverables:**


  1. **QC pipeline**: Write a complete shell script (assuming `THREADS=8`, `OUT=qc_out`)
  using fastp, mosdepth, Picard CollectHsMetrics, and MultiQC to assess adapter contamination,
  on-target coverage (minimum 20× threshold), and duplicate rates. Specify which QC
  metrics would trigger sample failure and exclusion from downstream analysis.


  2. **Variant calling**: Given the cohort size of 45 samples, design the optimal
  GATK germline variant calling strategy (HaplotypeCaller in GVCF mode → GenomicsDBImport
  → GenotypeGVCFs), and justify whether VQSR or hard filtering is more appropriate
  for this cohort. Include the specific VQSR tranche thresholds or hard filter expressions
  you would apply for SNVs and indels.


  3. **Variant interpretation**: Classify the MLH1 `chr3:37,067,251 C>T` variant using
  the ACMG/AMP 2015 framework. Explicitly evaluate criteria PS3, PM2, PP3, BP4, and
  PVS1 (or its splice-site modification), reconcile the conflicting ClinVar submissions,
  and state your final classification with a confidence rationale.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: easy
