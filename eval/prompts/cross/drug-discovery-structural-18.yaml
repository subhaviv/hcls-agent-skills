id: drug-discovery-structural-18
prompt: 'You are a computational drug discovery scientist working on a rare pediatric
  neurodegenerative disease caused by a gain-of-function mutation in **NRXN4** (a
  fictional synaptic scaffolding protein). Structural genomics has resolved the NRXN4
  PDZ domain at 1.8 Å resolution (PDB: 7ZXQ), revealing a well-defined orthosteric
  binding groove (volume ~420 ų, hydrophobicity score 0.72) and a cryptic allosteric
  pocket (~180 ų) identified by SiteMap. A phenotypic screen of 847 approved drugs
  in a patient-derived iPSC neuronal model identified 12 hits that rescued mitochondrial
  membrane potential (ΔΨm) by ≥40% at 10 µM. Among these hits, **metformin** (SMILES:
  `CN(C)C(=N)NC(=N)N`) and **riluzole** (SMILES: `CCOC1=CC2=C(C=C1)N=C(S2)N`) were
  flagged as top candidates.


  Please provide the following deliverables:


  1. **Repurposing evidence assessment**: Using OpenTargets and DGIdb reasoning, rank
  metformin and riluzole as NRXN4-modulating candidates. Evaluate mechanism-of-action
  overlap with NRXN4 biology, classify each by the repurposing evidence hierarchy
  (genetic association → preclinical → clinical), and recommend which candidate has
  stronger translational rationale for a pediatric CNS indication, citing blood-brain
  barrier penetration and existing pediatric safety data as factors.


  2. **Cheminformatics filter**: For both compounds, calculate key Lipinski/Veber
  descriptors (MW, LogP, HBD, HBA, rotatable bonds, TPSA), flag any PAINS concerns,
  compute Morgan fingerprint Tanimoto similarity (radius=2, 2048 bits) between the
  two compounds, and assess CNS-MPO scores to determine which better satisfies CNS
  druglikeness criteria.


  3. **Structure-based design strategy**: Given the two NRXN4 binding pockets, recommend
  whether to pursue orthosteric or allosteric docking for each compound, justify your
  scoring function selection (Glide SP vs. XP vs. induced-fit docking), propose a
  virtual screening cascade incorporating MM-GBSA rescoring, and suggest one fragment-based
  elaboration strategy if neither compound achieves a predicted binding affinity better
  than −7.0 kcal/mol.'
target_skills:
- drug-repurposing
- cheminformatics
- structure-based-drug-design
domain: drug-discovery
difficulty: hard
