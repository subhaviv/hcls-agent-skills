id: pharma-rwd-clinical-25
prompt: 'You are a pharmacoepidemiologist tasked with designing and executing a real-world
  evidence study using a large US commercial claims database (Optum Clinformatics,
  2015–2023, approximately 18 million continuously enrolled members) to evaluate whether
  new users of GLP-1 receptor agonists (GLP-1 RAs) have a lower risk of major adverse
  cardiovascular events (MACE) compared to new users of DPP-4 inhibitors among patients
  with type 2 diabetes.


  **Specific deliverables required:**


  1. **Study Design Specification**: Describe the complete target trial emulation
  framework for this comparison, explicitly addressing: (a) how to define new-user
  cohort entry using NDC codes for GLP-1 RAs (e.g., semaglutide, liraglutide, dulaglutide)
  and DPP-4 inhibitors (e.g., sitagliptin, saxagliptin), including a 365-day washout
  period; (b) why an active comparator design mitigates confounding by indication
  here; (c) how immortal time bias could be introduced if index date is misassigned
  and how to prevent it; and (d) how to specify stabilized inverse probability of
  treatment weights (IPTW) using a marginal structural model to handle time-varying
  confounding by HbA1c and eGFR measured quarterly.


  2. **Cohort Identification and Outcome Coding**: Provide the ICD-10-CM code groupings
  for the three components of MACE (acute MI, stroke, cardiovascular death), specifying
  appropriate codes at the correct granularity (e.g., whether to use I21.x broadly
  or restrict to specific subtypes). Additionally, map each MACE component to its
  corresponding MedDRA Preferred Terms and High-Level Terms, and identify which System
  Organ Class covers all three. Explain whether to define outcomes at the HLT or PT
  level for the primary analysis and sensitivity analysis.


  3. **Propensity Score Pipeline and Diagnostics**: Using the 18 million member database
  where approximately 42,000 GLP-1 RA new users and 89,000 DPP-4 inhibitor new users
  are identified, describe the propensity score estimation approach, specify a minimum
  of eight clinically relevant covariates (with their ICD-10 or CPT code families),
  define acceptable SMD thresholds post-weighting, and explain how to assess the proportional
  hazards assumption using Schoenfeld residuals in the subsequent Cox model. Finally,
  calculate and interpret an E-value for a hypothetical hazard ratio of 0.78 (95%
  CI: 0.71–0.86) to quantify robustness to unmeasured confounding.'
