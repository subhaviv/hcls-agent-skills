id: genomics-variant-pipeline-19
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples (paired-end 150bp Illumina NovaSeq 6000, ~100x target coverage) from patients
  with suspected hereditary colorectal cancer syndrome. The pipeline uses BWA-MEM2
  for alignment to GRCh38, GATK HaplotypeCaller in GVCF mode, and joint genotyping
  across all 45 samples. Target intervals are defined by a custom SureSelect panel
  covering 127 genes including MLH1, MSH2, MSH6, PMS2, and APC.


  During pipeline execution, MultiQC flagged three samples (CRC_021, CRC_034, CRC_041)
  with mean on-target coverage of 28x, 31x, and 19x respectively, and mosdepth reports
  show >35% of target bases below 20x in CRC_041. Additionally, FastQC identified
  adapter contamination (>12% of reads) in CRC_034.


  After joint genotyping, VQSR was attempted but failed due to insufficient variant
  counts. The team is considering hard-filter thresholds as a fallback.


  One candidate variant emerged in sample CRC_028: MLH1 c.1852_1853delAA (NM_000249.4),
  a frameshift deletion resulting in p.Lys618Asnfs*6. Annotation data shows: gnomAD
  v4 allele frequency = 0.000004 (2 heterozygous alleles in 503,000 total alleles),
  ClinVar has 3 submissions — two as "Pathogenic" (2018, 2021) and one as "VUS" (2023)
  with no functional evidence provided — CADD score = 38, SpliceAI delta scores all
  <0.05, and the variant falls in exon 18 of 19. The patient has a strong family history
  consistent with Lynch syndrome.


  Please provide the following deliverables:


  1. **QC remediation plan**: Specify concrete fastp command-line parameters to address
  the adapter contamination in CRC_034, and state whether CRC_041 should be excluded
  or retained with caveats, citing specific coverage thresholds from ACMG/CAP sequencing
  guidelines.


  2. **Hard-filter strategy**: Provide exact GATK hard-filter expressions for SNVs
  and indels appropriate for this cohort size and WES context, explaining why VQSR
  failed and what minimum cohort size is typically recommended.


  3. **Variant classification**: Apply ACMG/AMP 2015 criteria systematically to the
  MLH1 frameshift variant, explicitly evaluating PVS1 (including the exon 18/19 consideration),
  PM2, PP5, and BP1, and assign a final five-tier classification with confidence reasoning.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: hard
