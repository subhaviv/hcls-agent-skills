id: drug-discovery-structural-12
prompt: 'A rare pediatric glioma program has identified **TRKB kinase (NTRK2)** as
  a high-confidence oncogenic driver based on RNA-seq from 47 tumor samples showing
  12-fold overexpression and a recurrent F617L activating mutation. The team wants
  to rapidly advance a clinical candidate by repurposing approved or late-stage investigational
  drugs rather than pursuing de novo synthesis.


  From a DGIdb query, three candidates have emerged with documented NTRK2 interactions:


  - **Entrectinib** (SMILES: `COc1cc2c(cc1OC)CN(C(=O)c1ccc(NC(=O)c3cc(F)cc(F)c3)cc1)CC2`)
  — approved for NTRK-fusion solid tumors

  - **Ponatinib** (SMILES: `Cc1ccc(C(=O)Nc2ccc(CN3CCN(C)CC3)cn2)cc1C#Cc1cnc2ccccc2n1`)
  — approved BCR-ABL inhibitor with reported off-target NTRK activity

  - **CEP-701 (Lestaurtinib)** (SMILES: `O=C1NC(=O)c2c(c3ccc4c(c3[nH]2)CCN4)c1C`)
  — investigational FLT3/JAK2 inhibitor with NTRK1/2 activity reported in ChEMBL


  The team has a crystal structure of NTRK2 F617L (PDB-like pocket centered at residues
  **K544, E560, D668, F617**) with a known ATP-binding cleft volume of **~820 Å³**
  and a secondary allosteric pocket of **~310 Å³**.


  **Please provide the following deliverables:**


  1. **Repurposing evidence ranking**: Score each candidate using a structured evidence
  hierarchy (mechanism-of-action overlap, clinical safety data, existing pediatric
  data, NTRK2 F617L mutant selectivity) and recommend a lead.


  2. **Cheminformatics analysis**: Using the provided SMILES, compute Lipinski/Veber
  compliance, flag any PAINS substructures, and calculate pairwise Tanimoto similarity
  (Morgan fingerprint, radius=2, 2048 bits) between all three compounds. Identify
  which pair is most chemically similar and discuss implications for selectivity profiling.


  3. **Structure-based design assessment**: For the top repurposing candidate, evaluate
  its fit to the F617L mutant binding pocket (ATP cleft vs. allosteric), recommend
  a docking strategy (rigid vs. induced-fit), specify an appropriate scoring function,
  and propose one specific matched molecular pair modification to improve selectivity
  for the F617L mutant over wild-type NTRK2.'
target_skills:
- drug-repurposing
- cheminformatics
- structure-based-drug-design
domain: drug-discovery
difficulty: easy
