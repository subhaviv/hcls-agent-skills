id: genomics-variant-pipeline-26
prompt: 'A clinical genomics laboratory is processing a cohort of 45 germline WES
  samples from patients with suspected hereditary colorectal cancer syndrome. Sequencing
  was performed on an Illumina NovaSeq 6000 (2×150 bp), and you have received paired
  FASTQs (`sample_R1.fastq.gz` / `sample_R2.fastq.gz`), a coordinate-sorted BAM (`sample.bam`),
  and a VCF produced by GATK HaplotypeCaller in GVCF mode with joint genotyping. The
  target intervals cover a 48 Mb exome panel, reference is `hg38/ref.fasta`, and `THREADS=8`,
  `OUT=qc_out`.


  During QC review, mosdepth reports that 12% of target bases fall below 20× coverage,
  mean insert size is 142 bp (Picard), and FastQC flags adapter contamination in 8%
  of reads for three samples. The VQSR tranche sensitivity was set to 99.5% for SNVs
  and 95% for indels.


  After variant calling, a heterozygous variant in **MLH1** is flagged: `chr3:37,067,647
  C>T`, annotating as `NM_000249.4:c.1852_1853+2delinsAT` — a complex indel disrupting
  the canonical splice donor of exon 16. The variant has the following annotations:

  - **gnomAD v3.1.2 AF**: 0.000031 (8 heterozygotes, 0 homozygotes)

  - **SpliceAI delta score**: 0.91 (DS_DL)

  - **REVEL**: 0.74

  - **ClinVar**: 2 submissions — one "Uncertain significance" (2019, no functional
  data) and one "Likely pathogenic" (2022, Lynch syndrome, criteria provided)

  - **CADD Phred**: 28.4


  Please provide the following deliverables:


  1. **QC remediation plan**: Describe the fastp command to address adapter contamination,
  specify the mosdepth command to regenerate per-base coverage metrics, and define
  the threshold criteria you would apply to flag or fail samples before variant calling
  proceeds.


  2. **Pipeline decision**: Given the cohort size of 45 samples and the observed VQSR
  tranche settings, evaluate whether VQSR or hard filtering is more appropriate for
  SNVs and indels separately, and justify your choice with specific metric thresholds.


  3. **Variant classification**: Apply ACMG/AMP 2015 criteria to the MLH1 variant,
  explicitly invoking or rejecting PVS1, PM2, PP3, and BP4, reconcile the conflicting
  ClinVar submissions, and provide a final classification with a clinical reporting
  recommendation for a Lynch syndrome context.'
target_skills:
- genomic-variant-interpretation
- variant-calling
- ngs-quality-control
domain: genomics
difficulty: intermediate
