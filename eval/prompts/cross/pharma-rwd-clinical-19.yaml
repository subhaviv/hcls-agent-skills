id: pharma-rwd-clinical-19
prompt: 'You are a pharmacoepidemiologist at a large health system with access to
  a 3-million-member commercial claims database spanning 2018–2023. Your team is designing
  a real-world evidence study to evaluate whether sodium-glucose cotransporter-2 (SGLT2)
  inhibitors reduce the risk of hospitalized heart failure compared to dipeptidyl
  peptidase-4 (DPP-4) inhibitors among adults with type 2 diabetes (T2D).


  The database contains medical claims coded in ICD-10-CM, pharmacy claims with NDC
  codes, and procedure claims with CPT codes. You have identified approximately 84,200
  new users of SGLT2 inhibitors and 61,500 new users of DPP-4 inhibitors during the
  study period, defined by a 365-day washout period with no prior fills of either
  drug class.


  Please provide the following concrete deliverables:


  **1. Study Design Specification:** Describe how you would emulate a target trial
  using an active comparator new-user design. Specify how you would define cohort
  entry, handle immortal time bias in the follow-up period, and justify the 365-day
  washout. Explain when you would prefer IPTW with stabilized weights over propensity
  score matching given the sample sizes, and describe how you would handle time-varying
  confounding from insulin initiation during follow-up using a marginal structural
  model.


  **2. Cohort Identification Code Logic:** Describe the complete ICD-10-CM code grouping
  strategy to identify T2D patients (specifying relevant E11.x subcategories to include
  or exclude), the NDC-based logic to identify SGLT2 inhibitor and DPP-4 inhibitor
  new users, and the CPT codes you would use to identify hospitalizations. Then specify
  how you would calculate the proportion of days covered (PDC) at 180 days as a time-varying
  covariate and how you would assess covariate balance using standardized mean differences
  (SMD threshold ≤0.10).


  **3. Outcome Coding and Survival Analysis:** Define the hospitalized heart failure
  outcome using both ICD-10-CM primary diagnosis codes (specifying I50.x subcategories)
  and relevant MedDRA preferred terms and their SOC classification. Explain how you
  would map between the ICD-10 groupings and MedDRA hierarchy (from LLT through SOC)
  for regulatory submission. Finally, describe your Kaplan-Meier and Cox proportional
  hazards modeling approach, including how you would test the proportional hazards
  assumption using Schoenfeld residuals and compute an E-value to assess unmeasured
  confounding.'
target_skills:
- pharmacoepidemiology
- rwd-cohort-analysis
- clinical-data-standards
domain: pharmacoepidemiology
difficulty: hard
