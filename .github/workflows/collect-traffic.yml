name: Collect GitHub Traffic Data

on:
  schedule:
    # Run daily at 23:00 UTC to capture the full day's traffic
    - cron: "0 23 * * *"
  workflow_dispatch: # Allow manual triggers

env:
  S3_BUCKET: hcls-agent-skills-traffic-dashboard
  S3_PREFIX: data
  REPO: awslabs/hcls-agent-skills

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  collect-traffic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::530414579875:role/github-actions-hcls-traffic-collector
          aws-region: us-east-1

      - name: Download existing data from S3
        run: |
          mkdir -p data
          aws s3 cp s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/views.json data/views.json || true
          aws s3 cp s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/clones.json data/clones.json || true
          aws s3 cp s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/referrers.json data/referrers.json || true
          aws s3 cp s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/paths.json data/paths.json || true

      - name: Fetch and merge traffic data
        env:
          GITHUB_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: python .github/scripts/merge_traffic.py

      - name: Upload merged data to S3
        run: |
          aws s3 cp data/views.json s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/views.json
          aws s3 cp data/clones.json s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/clones.json
          aws s3 cp data/referrers.json s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/referrers.json
          aws s3 cp data/paths.json s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/paths.json
